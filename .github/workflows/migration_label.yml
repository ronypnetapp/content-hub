name: Auto-label migration PRs

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label migration PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for migration files
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
