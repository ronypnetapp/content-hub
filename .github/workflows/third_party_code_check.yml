name: Third-Party Integration Code Checks
permissions:
  contents: read
on:
  push:
    branches:
      - '**'
    paths:
      - 'content/response_integrations/third_party/**'
      - 'content/response_integrations/power_ups/**'

  pull_request:
    branches:
      - '**'
    paths:
      - 'content/response_integrations/third_party/**'
      - 'content/response_integrations/power_ups/**'

jobs:
  mp_check:
    name: Code Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mp package
        # language=bash
        run: |
          pip install --upgrade pip
          pip install -e ./packages/mp

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            content/response_integrations/third_party/**/*.py
            content/response_integrations/power_ups/**/*.py

      - name: Run mp check with changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        # language=bash
        run: |
          mp config --root-path . --processes 10 --display-config
          mp check $ALL_CHANGED_FILES --raise-error-on-violations --output-format grouped