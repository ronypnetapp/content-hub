name: Test Content-Hub

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'content/**'
      - 'packages/**'

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      mp: ${{ steps.filter.outputs.mp }}
      integration_packages: ${{ steps.filter.outputs.integration_packages }}
      response_integrations_third_party: ${{ steps.filter.outputs.response_integrations_third_party }}
      changed_integrations: ${{ steps.find_integrations.outputs.integrations }}
      test_all: ${{ steps.find_integrations.outputs.test_all }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.pull_request.base.sha }}
          list-files: csv
          # language=yaml
          filters: |
            mp:
              - 'packages/mp/**'
            integration_packages:
              - 'packages/envcommon/**'
              - 'packages/tipcommon/**'
              - 'packages/integration_testing/**'
              - 'packages/integration_testing_whls/**'
            response_integrations_third_party:
              - 'content/response_integrations/third_party/**'
              - 'content/response_integrations/power_ups/**'

      - name: Find changed integrations
        id: find_integrations
        env:
          FILTER_MP: ${{ steps.filter.outputs.mp }}
          FILTER_PACKAGES: ${{ steps.filter.outputs.integration_packages }}
          FILTER_THIRD_PARTY: ${{ steps.filter.outputs.response_integrations_third_party }}
          FILTER_THIRD_PARTY_FILES: ${{ steps.filter.outputs.response_integrations_third_party_files }}
        # language=bash
        run: |
          # If shared packages or mp changed, test everything
          if [[ "$FILTER_MP" == "true" ]] || \
             [[ "$FILTER_PACKAGES" == "true" ]]; then
            echo "test_all=true" >> $GITHUB_OUTPUT
            echo "integrations=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "test_all=false" >> $GITHUB_OUTPUT

          # Extract unique integration names from changed file paths
          if [[ "$FILTER_THIRD_PARTY" == "true" ]]; then
            INTEGRATIONS=$(echo "$FILTER_THIRD_PARTY_FILES" | tr ',' '\n' | \
              sed 's/"//g' | \
              grep "^content/response_integrations/" | \
              sed 's|content/response_integrations/third_party/[^/]*/||' | \
              sed 's|content/response_integrations/power_up[s]*/||' | \
              cut -d'/' -f1 | \
              sort -u | \
              tr '\n' ' ' | xargs)
            echo "integrations=$INTEGRATIONS" >> $GITHUB_OUTPUT
          else
            echo "integrations=" >> $GITHUB_OUTPUT
          fi

  test_third_party:
    name: Test Third-Party Integrations
    needs: changes
    if: >-
      (needs.changes.outputs.test_all == 'true' ||
       needs.changes.outputs.changed_integrations != '') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-tests') &&
      !contains(github.event.pull_request.labels.*.name, 'ci-minimal')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install mp package
        # language=bash
        run: |
          python -m pip install uv
          uv pip install --system -e ./packages/mp

      - name: Run integration tests
        env:
          GITHUB_PR_SHA: ${{ github.event.pull_request.head.sha }}
          TEST_ALL: ${{ needs.changes.outputs.test_all }}
          CHANGED_INTEGRATIONS: ${{ needs.changes.outputs.changed_integrations }}
        # language=bash
        run: |
          mp config --root-path . --processes 10 --display-config

          if [[ "$TEST_ALL" == "true" ]]; then
            echo "Shared packages changed — testing all integrations"
            mp test --repository third_party --raise-error-on-violations
          else
            echo "Testing only changed integrations: $CHANGED_INTEGRATIONS"
            FAILED=0
            for integration in $CHANGED_INTEGRATIONS; do
              echo "--- Testing: $integration ---"
              mp test --integration "$integration" --raise-error-on-violations || FAILED=1
            done
            exit $FAILED
          fi

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ./artifacts/test_report.md
          retention-days: 2
