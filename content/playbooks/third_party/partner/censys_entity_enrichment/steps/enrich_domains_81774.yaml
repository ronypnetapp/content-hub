name: Censys_Enrich Web Properties
description: This action retrieves comprehensive information about a web property
    (domain/hostname(IP Address)) using the Censys Platform API. Web properties are
    identified using a combination of a hostname and port (e.g., platform.censys.io:80).
    It provides detailed intelligence about web-facing assets including HTTP/HTTPS
    services, certificates, technologies, and security configurations.
