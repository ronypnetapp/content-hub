name: Censys_Enrich Certificates
description: This action retrieves comprehensive information about a single SSL/TLS
    certificate using the Censys Platform API. A certificate is identified by its
    SHA-256 fingerprint in the Censys dataset. It provides detailed certificate intelligence
    including issuer, subject, validity periods, SANs (Subject Alternative Names),
    and associated hosts.
