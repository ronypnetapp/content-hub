Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the IPQualityScore (IPQS) server to ensure the integration
    is correctly configured and the API key is valid. This action performs a health
    check by attempting a sample query against the IPQS API.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used for authentication with the IPQualityScore
    service. This is retrieved from the integration's configuration settings. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Key from the integration's
    global configuration.

    2. **Test Preparation**: Sets up a dummy request using a standard support email
    address to verify API responsiveness.

    3. **API Interaction**: Sends a POST request to the IPQS email validation endpoint.

    4. **Response Validation**: Analyzes the JSON response from the server to check
    the 'success' status.

    5. **Result Reporting**: Returns a success message if the connection is established.
    If the connection fails or the API key is invalid, it returns a failure status
    along with the error message provided by the service.


    ### Additional Notes

    This action does not process any entities and is strictly used for diagnostic
    purposes to verify the integration's communication with the external service.
