Enrich Email:
  ai_description: >-
    ### General Description

    The **Enrich Email** action provides real-time email address reputation scoring
    and validation using the IPQualityScore (IPQS) API. It performs a variety of checks,
    including syntax validation, DNS verification, and SMTP checks to determine if
    an email inbox exists and is active. Additionally, it identifies if an email address
    is associated with recent abuse, fraud, or disposable mail services, providing
    a comprehensive risk assessment for security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Abuse Strictness** | DDL | Yes | Sets the strictness level (0, 1, or 2) for
    machine learning pattern recognition of abusive email addresses. Higher levels
    are more aggressive in flagging potential threats. |

    | **Fast** | Boolean | No | If enabled, the API skips the SMTP check with the
    mail service provider, which significantly increases the speed of the action but
    may reduce validation depth. |

    | **Timeout in seconds** | String | No | Specifies the maximum number of seconds
    to wait for a reply from a mail service provider. The default value is 7 seconds.
    |

    | **Suggest Domain** | Boolean | No | If enabled, the action checks if the email
    domain has a typo and suggests a correction to a popular mail service (e.g., correcting
    'gmial.com' to 'gmail.com'). |


    ### Flow Description

    1. **Initialization**: The action extracts the API key from the integration configuration
    and retrieves the user-defined parameters (Abuse Strictness, Fast mode, Timeout,
    and Domain Suggestion).

    2. **Entity Filtering**: The action iterates through the case entities, specifically
    targeting `USER` entities that match a standard email address format via regular
    expression.

    3. **API Interaction**: For each valid email entity, a POST request is sent to
    the IPQS Email Validation API with the configured parameters.

    4. **Risk Scoring**: The action processes the API response to determine a risk
    verdict (e.g., CLEAN, LOW RISK, HIGH RISK, DISPOSABLE, or INVALID) based on the
    fraud score and validation flags.

    5. **Internal Enrichment**:
        * **Entity Attributes**: Updates the entity's additional properties with detailed
    IPQS data (e.g., deliverability, domain age, leak status).
        * **Suspicious Status**: Marks the entity as suspicious if the risk assessment
    exceeds internal thresholds.
        * **Insights**: Generates a Case Insight summarizing the IPQS verdict and
    key risk indicators.
        * **Data Tables**: Adds a detailed enrichment table to the entity for quick
    reference in the SOAR UI.
    6. **Finalization**: Updates the entities within Google SecOps and returns a structured
    JSON result of the enrichment data.


    ### Additional Notes

    - This action is strictly for enrichment and does not modify any data in the IPQualityScore
    platform.

    - The action specifically maps `USER` entities to email validation logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with IPQS reputation data, sets the entity's suspicious
      flag based on risk scores, and creates case insights summarizing the findings.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
