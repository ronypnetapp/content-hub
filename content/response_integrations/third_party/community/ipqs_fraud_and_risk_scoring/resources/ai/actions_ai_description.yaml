Enrich Domain:
  ai_description: "### General Description\nEnriches Hostname entities using the IPQualityScore\
    \ (IPQS) service to detect malicious URLs, phishing links, and malware. This action\
    \ leverages machine learning models to provide real-time risk scoring, domain\
    \ age analysis, and reputation checks for domains and links.\n\n### Parameters\
    \ Description\n\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Strictness | DDL | Yes | Determines the intensity of the\
    \ scan. Options are '0', '1', or '2'. Higher strictness levels provide more thorough\
    \ checks but may increase the false-positive rate. |\n| Fast | Boolean | No |\
    \ When enabled (true), the API performs lighter analysis to provide faster response\
    \ times. Defaults to false. |\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ Retrieves the API Key from the integration configuration and the 'Strictness'\
    \ and 'Fast' settings from the action parameters.\n2. **Entity Filtering:** Identifies\
    \ all Hostname entities within the current context.\n3. **External API Interaction:**\
    \ For each Hostname, the action sends a POST request to the IPQS URL API endpoint,\
    \ passing the strictness and speed preferences.\n4. **Risk Evaluation:** Analyzes\
    \ the API response to determine a risk verdict (e.g., CLEAN, SUSPICIOUS, HIGH\
    \ RISK, CRITICAL) based on malware/phishing flags and the numerical risk score.\n\
    5. **Internal Data Enrichment:** \n    *   Updates the entity's additional properties\
    \ with detailed metadata (e.g., domain rank, DNS validity, domain age).\n    *\
    \   Sets the entity's 'is_suspicious' attribute if the risk score exceeds defined\
    \ thresholds.\n    *   Creates a Case Insight summarizing the IPQS verdict.\n\
    \    *   Adds a detailed data table to the entity in the SOAR interface.\n6. **Result\
    \ Reporting:** Returns a JSON object containing the full enrichment data for all\
    \ processed entities."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with IPQS reputation data, modifies the 'is_suspicious'
      and 'is_enriched' flags, and creates case insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
