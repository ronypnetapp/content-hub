    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich IP:
  ai_description: "### General Description\nEnriches IP Address entities using the\
    \ IPQualityScore (IPQS) Fraud and Risk Scoring service. This action performs real-time\
    \ lookups to determine the risk level of an IP address, identifying if it is associated\
    \ with proxies, VPNs, TOR nodes, or malicious activity. It retrieves over 20 data\
    \ points, including geolocation, ISP, connection type, and a fraud score, to help\
    \ analysts classify the reputation and risk of network traffic.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Strictness | DDL | Yes | Sets the depth/strictness of the query\
    \ (0, 1, or 2). Higher values increase processing time and potential false-positive\
    \ rates. |\n| User Agent | String | No | Optional browser user agent string to\
    \ help identify bots or invalid browsers. |\n| User Language | String | No | Optional\
    \ language header to assist in fraud score evaluation. |\n| Fast | Boolean | No\
    \ | If enabled, bypasses certain forensic checks to speed up processing. |\n|\
    \ Mobile | Boolean | No | If enabled, treats the lookup as a mobile device. |\n\
    | Allow Public Access Points | Boolean | No | Bypasses checks for education, research,\
    \ and corporate connections. |\n| Lighter Penalties | Boolean | No | Skips certain\
    \ denylists to reduce false positives for sensitive audiences. |\n\n### Flow Description\n\
    1. **Initialization**: Extracts the API Key from the integration configuration\
    \ and retrieves action parameters (Strictness, User Agent, etc.).\n2. **Entity\
    \ Filtering**: Identifies all IP Address entities within the current context.\n\
    3. **API Interaction**: For each IP Address, sends a POST request to the IPQS\
    \ API with the specified parameters.\n4. **Data Processing**: Parses the API response\
    \ to extract fraud scores, geolocation data (Country, City, Zip), ISP information,\
    \ and proxy/VPN status.\n5. **Risk Assessment**: Calculates a risk verdict (CLEAN,\
    \ SUSPICIOUS, MEDIUM, HIGH, or CRITICAL) based on the returned fraud score.\n\
    6. **Internal Updates**: \n    * Updates the entity's additional properties with\
    \ the prefix 'IPQualityScore'.\n    * Marks the entity as 'enriched'.\n    * Sets\
    \ the 'is_suspicious' flag if the fraud score meets the threshold (>= 60).\n \
    \   * Adds a detailed data table to the entity.\n    * Creates a Case Insight\
    \ containing the IPQS verdict.\n7. **Completion**: Returns a summary message of\
    \ processed, failed, or skipped entities.\n\n### Additional Notes\nThis action\
    \ is strictly for IP Address enrichment. While the underlying manager supports\
    \ other types, this specific action logic is hardcoded to process only ADDRESS\
    \ entities."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with enrichment data, sets the suspicious
      status based on fraud scores, and creates case insights.
  categories:
    enrichment: true
  entity_usage:
