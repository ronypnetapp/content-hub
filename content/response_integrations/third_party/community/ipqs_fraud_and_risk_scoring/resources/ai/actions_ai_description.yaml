Enrich Phone:
  ai_description: "### General Description\nEnriches Phone Number entities using the\
    \ IPQualityScore (IPQS) API. This action validates phone numbers globally, retrieves\
    \ carrier and line type details (e.g., VOIP, prepaid, mobile), and performs risk\
    \ analysis to detect fraudulent, inactive, or disposable numbers. It helps security\
    \ analysts identify numbers associated with abusive behavior or virtual services.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Strictness** | DDL | Yes | Determines the depth\
    \ of the reputation check. Higher values (0, 1, 2) increase strictness, which\
    \ may lead to higher detection rates but also potential false positives. |\n|\
    \ **Country(For multiple countries, provide comma-separated values)** | String\
    \ | No | An optional comma-separated list of ISO country codes suspected to be\
    \ associated with the phone number to improve validation accuracy. |\n\n### Flow\
    \ Description\n1. **Configuration Extraction:** Retrieves the API Key from the\
    \ integration configuration and the 'Strictness' and 'Country' parameters from\
    \ the action input.\n2. **Entity Filtering:** Identifies all `PHONENUMBER` entities\
    \ within the current context.\n3. **External API Query:** For each phone number,\
    \ it sends a POST request to the IPQS Phone Validation API including the strictness\
    \ level and optional country hints.\n4. **Risk Scoring:** Evaluates the API response\
    \ (fraud score, active status, and validity) to determine a risk verdict (e.g.,\
    \ CLEAN, SUSPICIOUS, HIGH RISK).\n5. **Internal Data Mutation:** \n    * Updates\
    \ the entity's `additional_properties` with detailed enrichment data (carrier,\
    \ line type, region, etc.).\n    * Marks the entity as `is_enriched`.\n    * Sets\
    \ the `is_suspicious` flag if the risk score exceeds defined thresholds.\n6. **Reporting:**\
    \ Adds a detailed data table to the entity, creates a Case Insight with the IPQS\
    \ verdict, and attaches the raw JSON result to the action output."
