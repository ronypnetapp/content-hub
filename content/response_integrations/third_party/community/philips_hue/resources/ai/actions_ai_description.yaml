Turn On Light and Color:
  ai_description: >-
    ### General Description

    The **Turn On Light and Color** action allows users to control a specific Philips
    Hue light bulb by its ID. It enables turning the light on while simultaneously
    setting a specific color and an optional visual alert effect (like flickering).
    This is often used in physical security or SOC environments to provide visual
    cues for alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Light ID** | String | Yes | The unique identifier of the light bulb to be
    controlled. |

    | **Color** | DDL | Yes | The color to set the light to. Options include Red,
    Orange, Yellow, Green, Blue, Purple, and Pink. |

    | **Alert effect** | DDL | Yes | The visual effect to apply. `None` just turns
    it on, `Flicker-Once` performs a single flash, and `Flicker-Loop` flashes for
    15 seconds. |


    ### Flow Description

    1. **Initialization**: Connects to the Philips Hue Bridge using the provided IP
    and authorized username.

    2. **Validation**: Checks if the specified `Light ID` exists on the bridge via
    a GET request.

    3. **Reachability Check**: Verifies if the light bulb is currently reachable by
    the bridge.

    4. **State Mutation**: Sends a PUT request to the bridge to turn the light on
    and apply the selected color and alert effect.

    5. **Completion**: Returns the result of the operation and updates the action
    status in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action changes the physical state of a Philips Hue light bulb (turning
      it on, changing color, or triggering an alert effect) via a PUT request to the
      Philips Hue Bridge API.
    fetches_data: true
    internal_data_mutation_explanation: null
