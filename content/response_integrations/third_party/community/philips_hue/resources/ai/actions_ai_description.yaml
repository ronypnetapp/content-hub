Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Philips HUE Bridge to ensure that the provided configuration
    parameters (Bridge IP and Authorized Username) are correct and that the bridge
    is reachable over the network. This action is primarily used for health checks
    and verifying integration settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bridge IP | String | Yes (Config) | The IP address of the Philips HUE bridge,
    retrieved from the integration configuration. |

    | Authorized Username | String | Yes (Config) | The username used to authorize
    access to the bridge's API, retrieved from the integration configuration. |


    ### Additional Notes

    This action does not take any runtime parameters; it relies entirely on the integration's
    configuration settings. As per standard practice, Ping actions are used for health
    checks and do not perform data enrichment or mutation.


    ### Flow Description

    1. **Initialization**: The action starts by initializing the Siemplify context
    and logging the start of the process.

    2. **Configuration Retrieval**: It extracts the 'Bridge IP' and 'Authorized Username'
    from the integration's configuration parameters.

    3. **Connectivity Test**: It uses the PhilipsManager to perform a GET request
    to the bridge's API endpoint (https://{bridge_ip}/api/{user_name}).

    4. **Result Handling**: If the GET request is successful (returns a 200 OK), the
    action returns a success message. If an error occurs (e.g., timeout, authentication
    failure, or network unreachable), it catches the exception and returns a failure
    message with the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
