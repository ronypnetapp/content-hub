Turn Off Light:
  ai_description: >-
    ### General Description

    The **Turn Off Light** action allows users to programmatically turn off a specific
    Philips HUE light bulb via the Philips HUE Bridge. This action is useful for physical
    security responses or automation scenarios where lighting control is required
    based on security events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Light ID** | String | Yes | The unique identifier of the light bulb you wish
    to turn off. This ID is specific to the Philips HUE Bridge configuration. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Bridge IP and Authorized Username
    from the integration configuration and the Light ID from the action parameters.

    2. **Validation**: It first checks if the provided Light ID exists within the
    Philips HUE Bridge environment.

    3. **Reachability Check**: If the ID exists, the action verifies if the light
    bulb is currently reachable by the bridge.

    4. **State Mutation**: If reachable, the action sends a PUT request to the bridge's
    API to set the light's 'on' state to `false` (off).

    5. **Reporting**: The action returns a success message if the light was successfully
    turned off, or an error message if the light was unreachable or the ID was invalid.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a PUT request to the Philips HUE Bridge API to change the
      physical state of a light bulb from 'on' to 'off'.
    fetches_data: true
    internal_data_mutation_explanation: null
