Update:
  ai_description: >-
    ### General Description

    Updates specific records in an Airtable table based on a search criterion. This
    action allows for bulk updates of records that share a common field value, enabling
    automated data management within Airtable bases.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base id | string | Yes | The unique identifier for the Airtable base, found
    in the API URL. |

    | Table name | string | Yes | The name of the table within the base where the
    update will occur. |

    | Field name | string | Yes | The name of the column used to filter/search for
    records to be updated. |

    | Field value | string | Yes | The specific value to search for in the 'Field
    name' column. |

    | Json fields | content | Yes | A JSON-formatted string representing a dictionary
    of field names and the new values to be applied (e.g., `{"Status": "Closed", "Priority":
    "Low"}`). |

    | Max records | string | Yes | The maximum number of records that the action will
    attempt to search for and update in a single execution. |


    ### Flow Description

    1. **Initialization**: The action extracts the API key from the integration configuration
    and parameters from the action input.

    2. **Search**: It connects to the specified Airtable base and table to search
    for records where the `Field name` matches the `Field value`.

    3. **Limit**: The search result is limited by the `Max records` parameter to prevent
    accidental bulk changes beyond the intended scope.

    4. **Update**: The action iterates through each record found in the search results
    and performs an update operation using the key-value pairs provided in the `Json
    fields` parameter.

    5. **Completion**: It returns a summary message indicating the total number of
    records that were successfully updated.


    ### Additional Notes

    - The `Json fields` parameter must be a valid JSON object string.

    - The action performs a search-then-update flow; if no records match the search
    criteria, no updates will be performed.
