Delete:
  ai_description: >-
    ### General Description

    The **Delete** action allows users to remove records from a specific Airtable
    table based on a matching field value. It searches for records where a designated
    column (field) contains a specific value and deletes the resulting records up
    to a defined limit.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Field value** | The specific value to search for within the designated field.
    | String | Yes | Records containing this value will be targeted for deletion.
    |

    | **Field name** | The name of the column (field) in the Airtable table to search.
    | String | Yes | This identifies which column to check for the 'Field value'.
    |

    | **Table name** | The name of the table within the Airtable base. | String |
    Yes | Specifies the target table for the operation. |

    | **Base id** | The unique identifier for the Airtable base (database). | String
    | Yes | Found in the Airtable API documentation URL for the specific base. |

    | **Max records** | The maximum number of records to be deleted in a single execution.
    | String | Yes | Default is 100. This limits the scope of the deletion to prevent
    accidental mass data loss. |


    ### Additional Notes

    *   **Warning:** This action performs a destructive operation by deleting entire
    records (rows) from Airtable, not just clearing specific cell values.

    *   The action first performs a search to identify record IDs and then iterates
    through those IDs to execute the deletion.


    ### Flow Description

    1.  **Configuration Extraction:** Retrieves the Airtable API key from the integration
    settings and the Base ID, Table Name, and search criteria from the action parameters.

    2.  **Search Phase:** Connects to the Airtable API and searches the specified
    table for records where the `Field name` matches the `Field value`, limited by
    the `Max records` parameter.

    3.  **Deletion Phase:** Iterates through the list of matching records retrieved
    in the search phase.

    4.  **Execution:** For each matching record, it calls the Airtable delete method
    using the unique record ID.

    5.  **Reporting:** Returns a summary message to the Google SecOps platform indicating
    the total number of records successfully deleted.
