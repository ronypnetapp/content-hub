Enrich Entities From Table:
  ai_description: >-
    Enriches entities by searching for matching records within a specified Airtable
    table. This action allows users to map entity identifiers or specific entity properties
    to columns in Airtable to retrieve supplemental context.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base id | String | Yes | The unique identifier for the Airtable base (database).
    |

    | Table name | String | Yes | The name of the table within the base to search.
    |

    | Field name | String | Yes | The specific column name in the Airtable table to
    match against. |

    | Enrichment Prefix | String | No | A prefix added to the keys of the retrieved
    data when stored in entity properties (default: 'AT_'). |

    | Max records | String | No | The maximum number of records to consider for the
    search (default: '100'). |

    | Entity Field | String | No | The entity property to use for the search. If not
    provided, the entity's identifier is used. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Airtable API key from the integration
    configuration and extracts the user-provided parameters (Base ID, Table Name,
    Field Name, etc.).

    2. **Entity Processing**: For each target entity, the action determines the search
    value. It uses either a specific property defined in 'Entity Field' or the entity's
    identifier.

    3. **Airtable Query**: It performs a search in the specified Airtable table, matching
    the 'Field name' column against the search value. It also attempts a case-insensitive
    (lowercase) search if the initial search yields no results.

    4. **Data Enrichment**: If a matching record is found, the action flattens the
    record's data structure and updates the entity's additional properties with this
    data, applying the specified prefix.

    5. **Finalization**: The action updates all successfully enriched entities in
    Google SecOps and provides a summary of the results, including any errors encountered
    during the process.
