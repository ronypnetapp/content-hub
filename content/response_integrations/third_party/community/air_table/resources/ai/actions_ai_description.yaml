Get All Records:
  ai_description: >-
    ### General Description

    The **Get All Records** action retrieves a specified number of records from a
    designated table within an Airtable base. It allows for sorting the results based
    on a specific column in either ascending or descending order. This action is primarily
    used for data retrieval and synchronization tasks between Airtable and Google
    SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base Id** | string | Yes | The unique ID of the Airtable base (database).
    Found in the API documentation URL for the base. |

    | **Table name** | string | Yes | The name of the specific table within the base
    from which to fetch records. |

    | **Max Records** | string | Yes | The maximum number of rows/records to be retrieved
    by the action. |

    | **Sort by** | string | No | The name of the column to use for sorting the retrieved
    records. |

    | **Sort Direction** | ddl | Yes | Specifies whether the records should be sorted
    in 'Ascending' or 'Descending' order. |


    ### Additional Notes

    - This action does not operate on SecOps entities; it is a utility action for
    database interaction.

    - If **Sort by** is not provided, the records will be returned in the default
    order provided by the Airtable API.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Airtable API key from
    the integration configuration and the user-provided parameters (Base ID, Table
    Name, Max Records, Sort By, and Sort Direction).

    2. **Client Initialization**: An Airtable client is initialized using the provided
    Base ID, Table Name, and API Key.

    3. **Sort Logic**: The action maps the user-friendly 'Ascending/Descending' input
    to the API-required 'asc/desc' values.

    4. **Data Retrieval**: The action calls the Airtable API to fetch the records,
    applying the limit and sorting criteria if specified.

    5. **Result Processing**: The retrieved records are counted and formatted into
    a JSON result, which is then attached to the action output in Google SecOps.
