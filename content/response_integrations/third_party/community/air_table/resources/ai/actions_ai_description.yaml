AddOrUpdate:
  ai_description: >-
    ### General Description

    This action allows users to synchronize data with an Airtable table by either
    adding new records or updating existing ones. It is designed to handle batch operations
    provided via a JSON-formatted string. The action searches for existing records
    based on a user-defined unique field; if a match is found, the record is updated
    with the new data; if no match is found, a new record is created.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Base id** | The unique identifier for the Airtable base where the table resides.
    | String | Yes | Found in the Airtable API documentation for the specific base.
    |

    | **Table name** | The name of the table within the specified base to perform
    operations on. | String | Yes | Must match the table name in Airtable exactly.
    |

    | **Field name** | The name of the field (column) used to identify existing records
    for updates. | String | Yes | This field acts as the unique key for the 'search'
    logic. |

    | **Json fields** | A JSON-formatted string representing a list of record objects
    to be processed. | String | Yes | Expected format is a list of dictionaries, e.g.,
    `[{"Email": "test@example.com", "Status": "Active"}]`. |


    ### Additional Notes

    - The action expects the `Json fields` parameter to be a valid JSON array of objects.

    - If multiple records in Airtable match the `Field name` value, all matching records
    will be updated with the provided data.


    ### Flow Description

    1. **Initialization**: The action retrieves the Airtable API key from the integration
    configuration and extracts the Base ID, Table Name, Field Name, and JSON data
    from the action parameters.

    2. **Data Parsing**: The `Json fields` string is parsed into a Python list of
    dictionaries.

    3. **Search and Match**: For each dictionary in the list, the action performs
    a search in the specified Airtable table where the column defined by `Field name`
    matches the value provided in the input data.

    4. **Update Logic**: If the search returns one or more existing records, the action
    iterates through them and updates each record using the provided data.

    5. **Insert Logic**: If no records are found during the search, the action inserts
    a new record into the table using the provided data.

    6. **Completion**: The action concludes by providing a summary message indicating
    the total number of records inserted and updated.
