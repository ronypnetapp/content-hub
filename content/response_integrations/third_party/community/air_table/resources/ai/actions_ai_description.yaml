Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the AirTable service. It ensures that the provided credentials and configuration
    details (API Key, Base ID, and Table Name) are valid and that the service is reachable.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api key | String | Yes | The API key used to authenticate with the AirTable
    API. This is extracted from the integration configuration. |

    | Base id | String | Yes | The unique identifier for the AirTable base. This is
    extracted from the integration configuration. |

    | Table name | String | Yes | The name of the specific table within the base to
    test connectivity against. This is extracted from the integration configuration.
    |


    ### Additional Notes

    This action does not process any entities and is strictly used for health checks
    of the integration configuration. It does not accept any action-specific input
    parameters.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Key, Base ID, and
    Table Name from the integration's configuration settings.

    2. **Client Initialization**: An AirTable client is initialized using the retrieved
    credentials.

    3. **Connectivity Test**: The action attempts to fetch a single record from the
    specified table using the `get_all` method with `maxRecords=1`.

    4. **Result Reporting**: If the request is successful, the action concludes with
    a success message indicating that AirTable is connected.
