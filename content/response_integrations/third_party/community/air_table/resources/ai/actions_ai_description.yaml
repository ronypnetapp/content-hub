Delete All Records:
  ai_description: >-
    ### General Description

    Deletes all records from a specified table within an Airtable base. This action
    is useful for clearing out temporary data or resetting a table's state as part
    of an automated workflow.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Base Id | The unique identifier for the Airtable base (database). This can be
    found in the Airtable API documentation for the specific base. | string | Yes
    | Required to locate the correct database. |

    | Table name | The name of the table within the specified base from which all
    records will be deleted. | string | Yes | Required to target the specific data
    set. |


    ### Additional Notes

    **Warning:** This is a destructive action. It retrieves all record IDs currently
    in the table and performs a batch delete. Ensure the correct Base ID and Table
    Name are provided to avoid accidental data loss.


    ### Flow Description

    1. **Authentication:** The action retrieves the Airtable API key from the integration
    configuration.

    2. **Data Retrieval:** It connects to the specified Airtable base and table to
    fetch all existing records.

    3. **ID Extraction:** The action iterates through the retrieved records to collect
    their unique identifiers.

    4. **Batch Deletion:** It uses the collected IDs to perform a batch delete operation,
    removing all records from the table.

    5. **Reporting:** The action concludes by reporting the total number of records
    successfully deleted.
