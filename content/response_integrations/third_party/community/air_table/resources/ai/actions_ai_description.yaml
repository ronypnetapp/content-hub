Create:
  ai_description: >-
    ### General Description

    The **Create** action allows users to programmatically insert new records into
    a specific table within an AirTable base. It is designed to handle bulk operations
    by accepting a JSON array of field-value pairs, making it suitable for logging,
    tracking, or synchronizing data from Google SecOps to AirTable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | string | Yes | The unique identifier for the AirTable base (database).
    This can be found in the URL of the AirTable API page for the specific base. |

    | **Table name** | string | Yes | The name of the specific table within the base
    where the records should be inserted. |

    | **Json fields** | content | Yes | A JSON-formatted array of objects. Each object
    represents a single row to be created, with keys matching the AirTable column
    names and values matching the desired cell content. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the AirTable API key from
    the integration settings and the Base ID, Table Name, and JSON fields from the
    action parameters.

    2. **Connection Initialization**: It initializes the AirTable client using the
    provided credentials and base/table identifiers.

    3. **Data Parsing**: The action parses the `Json fields` string into a list of
    Python dictionaries.

    4. **Record Creation**: It iterates through each dictionary in the list and performs
    an `insert` operation into the target AirTable table.

    5. **Result Compilation**: The action collects the unique IDs and field data of
    the successfully created records.

    6. **Finalization**: It outputs a summary message indicating the number of records
    added and attaches the full JSON response of the created records to the action
    results.
