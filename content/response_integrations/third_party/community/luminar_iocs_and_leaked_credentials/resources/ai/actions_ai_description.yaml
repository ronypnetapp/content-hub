Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ used to verify the connectivity between Google SecOps and the Luminar API. Its\
    \ primary purpose is to validate that the integration's configuration parameters\u2014\
    specifically the API credentials and the base URL\u2014are correct and that the\
    \ external service is reachable.\n\n### Parameters Description\n| Parameter Name\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Luminar\
    \ API Client ID | String | Yes | The Client ID used for OAuth2 authentication\
    \ with the Luminar service. |\n| Luminar API Client Secret | String | Yes | The\
    \ Client Secret used for OAuth2 authentication with the Luminar service. |\n|\
    \ Luminar API Account ID | String | Yes | The specific Account ID (Realm) used\
    \ to construct the API endpoint path. |\n| Luminar Base URL | String | Yes | The\
    \ base URL of the Luminar API instance. |\n\n### Additional Notes\nThis action\
    \ does not have any action-specific parameters; it relies entirely on the integration's\
    \ global configuration. It does not process entities, fetch threat intelligence\
    \ data for alerts, or modify any internal or external records. It is strictly\
    \ a connectivity test.\n\n### Flow Description\n1. **Configuration Extraction**:\
    \ The script retrieves the Client ID, Client Secret, Account ID, and Base URL\
    \ from the integration's configuration settings.\n2. **Manager Initialization**:\
    \ It initializes the `LuminarManager` with the retrieved credentials.\n3. **Connectivity\
    \ Test**: The action invokes the `test_connectivity` method, which sends an HTTP\
    \ POST request to the Luminar token endpoint (`/externalApi/realm/{account_id}/token`)\
    \ using the provided credentials.\n4. **Response Evaluation**: The script evaluates\
    \ the HTTP response. If the response is successful (HTTP 200 OK), the connection\
    \ is confirmed. If the response indicates an authentication error (401, 403) or\
    \ other failures, the action reports a connection error.\n5. **Execution Completion**:\
    \ The action terminates, providing a status message and a boolean result indicating\
    \ whether the connection was successful."
