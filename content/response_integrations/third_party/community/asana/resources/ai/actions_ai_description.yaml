List My Tasks:
  ai_description: >-
    ### General Description

    The **List My Tasks** action retrieves a list of tasks associated with a specific
    user within a designated Asana workspace. It allows analysts to view task details,
    including names, due dates, and direct links to the tasks in Asana. This action
    is useful for tracking user activity or verifying task statuses during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User's Email** | String | Yes | The email address of the Asana user whose
    tasks you want to retrieve. |

    | **Workspace Name** | String | Yes | The exact name of the Asana workspace. Note:
    This is case-sensitive. |

    | **Completed Status** | Boolean | No | If checked (True), the action retrieves
    only tasks that have been marked as completed. If unchecked (False), it retrieves
    only incomplete tasks. |


    ### Flow Description

    1. **Authentication**: The action initializes the Asana manager using the configured
    Personal Access Token and Base URL.

    2. **User Identification**: It retrieves the unique Asana User ID (GID) associated
    with the provided email address.

    3. **Workspace Identification**: It retrieves the unique Workspace ID (GID) by
    matching the provided workspace name.

    4. **Task List Retrieval**: It fetches the specific 'User Task List' ID for the
    identified user within the specified workspace.

    5. **Task Enumeration**: It retrieves the list of tasks contained within that
    user's task list.

    6. **Detail Fetching & Filtering**: For each task in the list, the action fetches
    full task details and filters them based on the **Completed Status** parameter.

    7. **Output**: Filtered tasks are added to the JSON result, and direct URLs to
    the tasks are added as links in the action output.


    ### Additional Notes

    - This action does not iterate over entities in the case; it relies entirely on
    the provided input parameters.

    - The `Workspace Name` must be an exact match to the name in Asana.
