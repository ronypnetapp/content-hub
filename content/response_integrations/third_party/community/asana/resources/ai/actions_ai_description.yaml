List Project Tasks:
  ai_description: >-
    ### General Description

    The **List Project Tasks** action retrieves all tasks associated with a specific
    project in Asana. It is designed to provide visibility into project progress by
    fetching task details and filtering them based on their completion status. The
    action outputs a detailed JSON result for each task and provides direct links
    to the tasks in the Asana web interface for quick access.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Project Name** | String | Yes | The name of the Asana project from which you
    want to fetch tasks. The action resolves this name to a project ID internally.
    |

    | **Completed Status** | Boolean | No | Determines which tasks to retrieve. If
    set to `true`, only completed tasks are returned. If set to `false` (default),
    only incomplete tasks are returned. |


    ### Flow Description

    1. **Initialization**: The action extracts the Asana API token and base URL from
    the integration configuration and the project name and completion status from
    the action parameters.

    2. **Project Identification**: It calls the Asana API to find the unique project
    ID associated with the provided **Project Name**.

    3. **Task Listing**: It retrieves a list of all task identifiers associated with
    that project ID.

    4. **Detail Retrieval & Filtering**: For each task identifier, the action fetches
    full task details (including completion status, name, due date, and permalink).
    It then filters these tasks to match the user-specified **Completed Status**.

    5. **Result Compilation**: Matching tasks are added to the final JSON result.
    For each matching task, a direct link containing the task name and due date is
    added to the SOAR interface.

    6. **Completion**: The action ends by providing a summary message and the collected
    task data.


    ### Additional Notes

    - This action does not process SOAR entities (such as IP addresses or Hostnames);
    it operates strictly based on the provided project name string.

    - If the specified project name cannot be found or contains no tasks matching
    the filter, the action will return a failure status.
