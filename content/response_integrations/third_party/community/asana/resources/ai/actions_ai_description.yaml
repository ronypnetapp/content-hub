Update Task:
  ai_description: >-
    ### General Description

    Updates an existing task in Asana by modifying its assignee, due date, or description.
    This action is useful for programmatically managing task lifecycles and ensuring
    task metadata is kept up-to-date based on security orchestration workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Task ID** | String | Yes | The unique identifier of the Asana task to be updated.
    This can be found in the task's URL. |

    | **Due Date** | String | No | The new due date for the task in `YYYY-MM-DD` format.
    |

    | **Description** | String | No | The new description or notes for the task. |

    | **Assignee** | String | No | The email address of the user to whom the task
    should be reassigned. Note that this is case-sensitive and will be resolved to
    a user ID internally. |


    ### Additional Notes

    - The **Assignee** parameter requires a valid email address that exists within
    the Asana workspace. The action will attempt to resolve this email to a GID (Global
    ID) before updating the task.

    - If optional parameters like **Due Date**, **Description**, or **Assignee** are
    left blank, the action will still proceed, but those specific fields may be overwritten
    with null or empty values depending on the API's behavior.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Asana API Token and Base URL from
    the integration settings.

    2. **Parameter Retrieval**: Extracts the Task ID and the optional update fields
    (Assignee, Due Date, Description) from the action input.

    3. **User Resolution**: If an Assignee email is provided, the action calls the
    Asana API to retrieve the corresponding User GID.

    4. **Task Update**: Executes a PUT request to the Asana API endpoint for the specific
    Task ID, updating the assignee, due date, and notes.

    5. **Result Processing**: Captures the API response, adds the updated task data
    as a JSON result to the action, and returns a success message.
