Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the Asana service. It ensures that the integration is correctly configured
    with a valid Personal Access Token (PAT) and that the specified Base URL is reachable.
    This action is typically used during the initial setup or for troubleshooting
    communication issues.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration parameters:

    * **Token**: The Personal Access Token used for authentication.

    * **Base URL**: The API endpoint URL for Asana.


    ### Additional Notes

    As per standard SOAR practices, Ping actions are used solely for health checks
    and do not process entities or modify data within the case or the external system.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'Token' and 'Base URL'
    from the Asana integration settings.

    2. **Manager Initialization**: An instance of the `AsanaManager` is created using
    the retrieved credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the Asana `/users/me` endpoint.

    4. **Response Validation**: The code checks if the API call was successful and
    returned a valid JSON response.

    5. **Result Reporting**: If the connection is successful, it returns a positive
    status and a success message; otherwise, it reports a failure.
