Get Task:
  ai_description: >-
    ### General Description

    The **Get Task** action retrieves comprehensive details for a specific task in
    Asana using its unique Task ID. This action allows analysts to pull context about
    work items directly into Google SecOps for investigation or tracking purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Task ID** | String | Yes | The unique identifier for the Asana task, typically
    found in the task's URL (e.g., `https://app.asana.com/0/project_id/task_id`).
    |


    ### Additional Notes

    - This action does not process or filter SecOps entities; it is a standalone data
    retrieval task based on the provided ID.

    - The action provides a direct link to the Asana task in the SecOps interface
    for quick access.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Token and Base URL from the
    Asana integration configuration.

    2. **Parameter Retrieval**: Extracts the `Task ID` from the action parameters.

    3. **API Interaction**: Initializes the Asana Manager and performs a GET request
    to the `/tasks/{task_id}` endpoint.

    4. **Result Processing**: If the task is found, it extracts the task name, due
    date, and permalink.

    5. **Output**: Adds a link to the task and the full JSON response to the action
    results, then terminates with a success message.
