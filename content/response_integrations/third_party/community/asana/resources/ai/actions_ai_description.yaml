Remove User From Workspace:
  ai_description: >-
    ### General Description

    Removes a specific user from an Asana workspace using their email address. This
    action is useful for offboarding users or managing workspace access programmatically
    through Google SecOps.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Workspace Name | The name of the Asana workspace from which the user should
    be removed. Note: This value is case-sensitive. | String | Yes |

    | User's Email | The email address of the user to be removed from the workspace.
    | String | Yes |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Asana API Token and Base URL from
    the integration settings.

    2. **Parameter Retrieval**: Extracts the target Workspace Name and the User's
    Email from the action inputs.

    3. **Workspace Identification**: Calls the Asana API to list workspaces and identifies
    the unique Workspace ID corresponding to the provided name.

    4. **User Removal**: Sends a POST request to the Asana `/removeUser` endpoint
    for the identified workspace, passing the user's email in the request body.

    5. **Result Handling**: Validates the API response. If the user is successfully
    removed, it returns a success message; otherwise, it reports a failure.


    ### Additional Notes

    This action does not run on entities; it relies entirely on the provided string
    parameters for the workspace name and user email.
