Create Task:
  ai_description: >-
    ### General Description

    Creates a new task within a specific project in Asana. This action allows users
    to automate task management and tracking directly from Google SecOps by generating
    tasks with specific subjects, descriptions, assignees, and due dates.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task Subject | String | Yes | The title or subject line of the new task to be
    created. |

    | Assignee | String | No | The user to whom the task will be assigned. Note: This
    is case-sensitive and typically expects the user's email or unique identifier.
    |

    | Due Date | String | No | The deadline for the task, which must be provided in
    the format YYYY-MM-DD. |

    | Description | String | Yes | The detailed content or notes for the new task.
    |

    | Project Name | String | Yes | The name of the Asana project where the task will
    be assigned. Note: This is case-sensitive. |


    ### Additional Notes

    - Either the project name must exist exactly as provided (case-sensitive) for
    the action to successfully retrieve the project ID.

    - If the Assignee parameter is provided, the action will attempt to resolve the
    user's email to a unique Asana GID.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the Asana API Token and Base
    URL from the integration configuration.

    2. **Project ID Resolution**: It queries the Asana API to find the unique project
    ID corresponding to the provided `Project Name`.

    3. **User ID Resolution (Optional)**: If an `Assignee` is specified, the action
    fetches the unique user ID for that individual.

    4. **Task Creation**: The action sends a POST request to the Asana `/tasks` endpoint,
    including the subject, description, project ID, and optional assignee/due date.

    5. **Output Generation**: Upon successful creation, the action adds a direct link
    to the new task in the SOAR interface and provides the full JSON response for
    downstream use.
