Add User To Workspace:
  ai_description: >-
    ### General Description

    This action adds a user to a specific Asana workspace using their email address.
    It is used to manage workspace membership programmatically within the Asana platform.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Workspace Name | string | Yes | The name of the Asana workspace to which you
    want to add the user. Note: This field is case-sensitive. |

    | User's Email | string | Yes | The email address of the user you want to add
    to the workspace. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Asana API token and
    base URL from the integration configuration.

    2. **Parameter Extraction**: The action extracts the target workspace name and
    the user's email from the action parameters.

    3. **Workspace Identification**: It calls the Asana API to list all workspaces
    and finds the unique identifier (GID) for the workspace matching the provided
    name.

    4. **User Addition**: It sends a POST request to the Asana API endpoint `/workspaces/{workspace_id}/addUser`
    with the user's email.

    5. **Result Processing**: The action captures the API response, adds it as a JSON
    result to the SOAR case, and provides a success or failure message based on the
    outcome.
