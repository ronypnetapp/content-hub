Ping:
  ai_description: >-
    ### General Description

    This action is designed to test the connectivity between Google SecOps and the
    SendGrid API. It validates the provided API Token by checking if it has the necessary
    permissions to perform core functions, specifically the ability to send emails.


    ### Parameters Description

    There are no parameters for this action. It relies solely on the 'API Token' provided
    in the SendGrid integration configuration.


    ### Additional Notes

    - This action is a standard 'Ping' utility used to ensure the integration is correctly
    configured before running other functional actions.

    - It specifically looks for the `mail.send` scope in the API response to confirm
    the token is valid for sending operations.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'API Token' from the
    SendGrid integration settings.

    2. **API Connection**: It establishes an HTTPS connection to `api.sendgrid.com`.

    3. **Permission Check**: A GET request is sent to the `/v3/scopes` endpoint to
    retrieve the list of permissions associated with the token.

    4. **Validation**: The script parses the JSON response and uses a regular expression
    to search for the `mail.send` scope.

    5. **Result Reporting**: If the scope is found, the action completes successfully
    with a confirmation message. If the scope is missing or the connection fails,
    it returns an error message.
  capabilities:
