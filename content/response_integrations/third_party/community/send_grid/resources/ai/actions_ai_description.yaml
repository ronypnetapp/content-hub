Send Email:
  ai_description: "### General Description\nSends an email message through the SendGrid\
    \ service using the SendGrid API. This action is designed to facilitate automated\
    \ communication within playbooks, such as sending notifications, reports, or alerts\
    \ to specific recipients.\n\n### Parameters Description\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Email From | String\
    \ | Yes | The email address that will appear as the sender. |\n| Email To | String\
    \ | Yes | The email address of the recipient. |\n| Subject | String | Yes | The\
    \ subject line of the email. |\n| Content | Email Content | Yes | The HTML-formatted\
    \ body of the email. |\n| Return Message Status | Boolean | No | If set to true,\
    \ the action will include the SendGrid API response status code and metadata in\
    \ the action's JSON results. Default is false. |\n\n### Flow Description\n1. **Configuration\
    \ Retrieval**: The action retrieves the SendGrid API Token from the integration\
    \ settings.\n2. **Message Construction**: It builds a mail object using the provided\
    \ 'Email From', 'Email To', 'Subject', and 'Content' parameters.\n3. **API Interaction**:\
    \ The action initializes the SendGrid API client and attempts to send the email.\n\
    4. **Result Processing**: \n    * If the email is sent successfully, it logs the\
    \ success.\n    * If 'Return Message Status' is enabled, it captures the status\
    \ code and recipient details into the action's JSON result.\n5. **Error Handling**:\
    \ If the API call fails, the action logs the exception and returns a failure state.\n\
    \n### Additional Notes\nThis action does not operate on entities (IPs, Hosts,\
    \ etc.) within the case; it relies entirely on the provided input parameters to\
    \ execute the email delivery."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an email message to an external recipient via the SendGrid API, which
      creates a new outbound communication record in the SendGrid service.
    fetches_data: false
    internal_data_mutation_explanation: null
