Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Cybersixgill Darkfeed API. This action is used to
    validate that the provided credentials (Client ID and Client Secret) are correct
    and that the Google SecOps environment can successfully communicate with the Cybersixgill
    service.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is a standard connectivity test and does not process any entities
    or modify any data.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Client Id` and `Client
    Secret` from the integration's configuration settings.

    2. **Client Initialization**: It initializes the `SixgillEnrichManager` with the
    retrieved credentials.

    3. **Authentication Check**: The manager attempts to create a Sixgill client and
    requests an access token via the `get_access_token` method.

    4. **Result Reporting**: If the token is successfully retrieved, the action completes
    with a success message. If an error occurs during the process, an exception is
    raised, indicating a connection failure.
