Ping:
  ai_description: "### General Description\nThe Ping action is a utility designed\
    \ to verify the connectivity between Google SecOps and the EclecticIQ platform.\
    \ It ensures that the provided configuration parameters, such as the URL and API\
    \ Token, are correct and that the network path is open.\n\n### Parameters\nThis\
    \ action does not require any input parameters.\n\n### Flow Description\n1. **Configuration\
    \ Retrieval**: The action starts by fetching the integration's global configuration,\
    \ including the EclecticIQ URL, API Token, and SSL verification settings.\n2.\
    \ **Manager Initialization**: It initializes the `EclecticIQManager` with the\
    \ retrieved credentials.\n3. **Connectivity Test**: The manager executes the `test_connectivity`\
    \ method, which performs a GET request to the `/api/v2/sources` endpoint of the\
    \ EclecticIQ API.\n4. **Result Handling**: \n    * If the API call is successful\
    \ (returns a 200 OK status), the action completes with a success message.\n  \
    \  * If an exception occurs (e.g., authentication failure, timeout, or invalid\
    \ URL), the action catches the error, logs the details, and returns a failure\
    \ status.\n\n### Additional Notes\nThis action is primarily used during the initial\
    \ setup of the integration or for troubleshooting communication issues. It does\
    \ not process any entities or modify any data."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
