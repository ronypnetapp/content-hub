Send Entities to EclecticIQ:
  ai_description: >-
    ### General Description

    This action sends entities from a Google SecOps case to the EclecticIQ Intelligence
    Center. Its primary purpose is to record sightings of specific entities within
    the threat intelligence platform. By default, the action creates 'sighting' objects
    in EclecticIQ, but it can be configured to also create 'indicator' objects. This
    integration helps in synchronizing local security findings with a centralized
    threat intelligence management system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Group Name** | string | Yes | The name of the EclecticIQ Intelligence Center
    Group (e.g., 'Testing Group') where the entities will be created. |

    | **Create Indicator** | boolean | No | If set to `true`, the action creates both
    a sighting and an indicator in EclecticIQ. If `false` (default), only a sighting
    is created. |


    ### Flow Description

    1. **Initialization**: The action retrieves the EclecticIQ URL, API Token, and
    SSL verification settings from the integration configuration, along with the user-provided
    'Group Name' and 'Create Indicator' flag.

    2. **Group Identification**: It queries the EclecticIQ API to find the internal
    source ID associated with the provided 'Group Name'.

    3. **Data Preparation**: The action constructs a detailed description for the
    EclecticIQ objects using metadata from the current SecOps case (e.g., Title, Priority,
    Status, Sla Expiration).

    4. **Entity Mapping**: It iterates through the target entities in the case, filtering
    for supported types (IPs, Hostnames, Hashes, URLs, etc.) and mapping them to EclecticIQ
    observable types.

    5. **External Creation**: A PUT request is sent to the EclecticIQ `/api/v2/entities`
    endpoint to create the sighting (and optionally the indicator) containing the
    mapped entities.

    6. **Internal Updates**: Upon success, the action adds a comment to the SecOps
    case wall and attaches a direct platform link to the newly created EclecticIQ
    entity.


    ### Additional Notes

    - The action only processes entities that match the internal `ENTITY_MAP` (e.g.,
    ADDRESS, HOSTNAME, FILEHASH, etc.). Entities not in this map are ignored.

    - The action uses UUID v5 (namespace X500) based on the case identifier to generate
    consistent IDs for the created EclecticIQ objects.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new sighting and/or indicator entities in the EclecticIQ Intelligence
      Center platform via a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a case comment to the case wall and creates an entity link pointing to
      the EclecticIQ platform.
