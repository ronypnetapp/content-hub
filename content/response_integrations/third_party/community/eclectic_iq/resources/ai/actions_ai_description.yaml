Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities by querying the EclecticIQ Threat Intelligence Platform. This
    action retrieves comprehensive context for entities, including observable details,
    associated threat entities, confidence levels (maliciousness), and source information.
    It enhances the visibility of potential threats within the Google SecOps environment
    by attaching external intelligence directly to the entities.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the EclecticIQ manager using the
    URL and API token retrieved from the integration configuration.

    2. **Data Retrieval**: It performs a bulk lookup for all target entities to find
    matching observables in the EclecticIQ database.

    3. **Context Enrichment**: For identified observables, it fetches related entity
    data and resolves source identifiers to human-readable names.

    4. **Entity Update**: It flattens the retrieved intelligence data, applies an
    'EIQ' prefix, and updates the `additional_properties` of the SecOps entities.
    It also marks the entities as enriched (`is_enriched = True`).

    5. **UI Enhancement**: It adds direct links to the EclecticIQ platform and populates
    data tables for each entity to provide a detailed view of the findings within
    the case wall.

    6. **Completion**: The action returns the count of enriched entities and lists
    any entities that were not found in EclecticIQ in the output message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with threat intelligence data from EclecticIQ
      and sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - ALERT
    - APPLICATION
    - CHILDHASH
    - CHILDPROCESS
    - CLUSTER
    - CONTAINER
    - CREDITCARD
    - CVE
    - CVEID
    - DATABASE
    - DEPLOYMENT
    - DESTINATIONDOMAIN
    - DOMAIN
    - EMAILSUBJECT
    - EVENT
    - FILEHASH
    - FILENAME
    - GENERICENTITY
    - HOSTNAME
    - IPSET
    - MacAddress
    - PARENTHASH
    - PARENTPROCESS
    - PHONENUMBER
    - POD
    - PROCESS
    - SERVICE
    - SOURCEDOMAIN
    - THREATACTOR
    - THREATCAMPAIGN
    - THREATSIGNATURE
    - DestinationURL
    - USB
    - USERUNIQNAME
