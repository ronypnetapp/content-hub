Run Query:
  ai_description: >-
    ### General Description

    Executes a custom search query against the Flashpoint platform to retrieve threat
    intelligence data. This action allows users to perform complex searches using
    Flashpoint's query syntax, filtering by tags, date ranges, and sorting preferences.
    It is designed as a standalone search utility rather than an entity-specific enrichment
    tool.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The search query content using Flashpoint syntax (e.g.,
    `+basetypes:+indicator`). |

    | Results count limit | String | No | The maximum number of results to return
    (default is 100). |

    | Sort By | String | No | Specifies the fields and order for sorting results (e.g.,
    `posted_at:desc,title:asc`). |

    | Tags | String | No | A comma-separated list of tags to filter the search results.
    |

    | Date Range | String | No | The time range for the search (e.g., `[now-1y TO
    now]`). |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the query string, result limit,
    date range, sorting criteria, and tags from the action parameters.

    2. **Manager Initialization**: Initializes the `FlashpointManager` using the API
    Key provided in the integration configuration.

    3. **Query Execution**: Executes the custom query against the Flashpoint API using
    the provided parameters.

    4. **Result Processing**: Receives the query response and attaches the raw JSON
    data to the action's results in Google SecOps for use in downstream playbook steps.


    ### Additional Notes

    This action does not iterate over or modify entities within a case. It returns
    a broad set of data based on the query provided.
