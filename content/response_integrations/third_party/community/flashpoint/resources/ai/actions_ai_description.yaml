Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Flashpoint platform. Its primary purpose is to ensure that
    the integration's API credentials are valid and that the Flashpoint API is reachable
    over the network.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action is a standard connectivity check. It does not process any entities
    or modify any data within Google SecOps or Flashpoint. It is typically executed
    during the initial configuration of the integration or for troubleshooting purposes.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the API Key from the integration's
    global configuration.

    2. **Manager Initialization**: It initializes the `FlashpointManager` with the
    provided API Key.

    3. **Connectivity Test**: The action invokes the `test_connectivity` method, which
    performs a sample GET request to the Flashpoint `/all/search` endpoint using a
    hardcoded query.

    4. **Validation**: The logic checks if the API returns a successful response and
    valid JSON data.

    5. **Final Status**: If the request succeeds, the action ends with a success message;
    if the request fails or returns an error, it reports a connection failure.
