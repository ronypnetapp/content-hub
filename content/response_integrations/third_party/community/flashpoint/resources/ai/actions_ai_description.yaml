Indicators Custom Query:
  ai_description: >-
    ### General Description

    This action executes a custom search query against the Flashpoint Indicators API
    to retrieve specific threat intelligence data, such as events and attributes.
    It allows users to perform granular searches using keywords, tags, and time-based
    filters to gather indicators of compromise (IOCs) directly from Flashpoint's intelligence
    database.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sort By Time | ddl | No | Determines the chronological order of the results
    (Ascending or Descending). |

    | Entity Types | string | No | A comma-separated list of MISP-style entity types
    to retrieve (e.g., 'url,domain,ip-src'). |

    | Limit | string | No | The maximum number of result objects to return (default
    is 10). |

    | Start Date | string | No | Filters for indicators created after this specific
    ISO 8601 date/time. |

    | End Date | string | No | Filters for indicators created before this specific
    ISO 8601 date/time. |

    | Search Tags | string | No | A comma-separated list of keywords or tags to filter
    the search (e.g., 'malware,ransomware'). |

    | Query | string | No | The specific search query string to execute. |

    | Indicator Type | ddl | Yes | Specifies the level of indicator data to retrieve:
    'simple' (simplified list), 'attribute' (specific IOCs), or 'event' (grouped IOCs).
    |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Flashpoint API Key from
    the integration settings and all user-defined search parameters.

    2. **Client Initialization:** An instance of the FlashpointManager is created
    to handle API communication.

    3. **API Request:** The action calls the `indicators_custom_query` method, which
    constructs a GET request to the Flashpoint `/indicators/{type}` endpoint using
    the provided filters (limit, dates, tags, query, and sorting).

    4. **Result Processing:** If the query returns data, the raw JSON response is
    attached to the action's results in Google SecOps.

    5. **Completion:** The action concludes with a success message if data is found,
    or a notification if no matching indicators were identified.


    ### Additional Notes

    This action is a standalone search utility and does not automatically iterate
    over or enrich entities currently present in a Google SecOps case. It is intended
    for manual or automated threat hunting and intelligence gathering.
