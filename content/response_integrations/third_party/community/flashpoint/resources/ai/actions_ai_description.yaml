Custom Query:
  ai_description: >-
    ### General Description

    This action executes a custom search query against the Flashpoint API. It allows
    users to define complex search criteria in JSON format and specify the target
    API endpoint, providing flexibility to interact with various Flashpoint search
    capabilities beyond standard enrichment actions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query Content | Code (JSON) | Yes | A JSON-formatted string containing the search
    parameters. This typically includes keys like `query`, `limit`, `start_date`,
    `end_date`, and `search_tags`. |

    | New Query URL | String | Yes | The API endpoint path to append to the Flashpoint
    base URL (e.g., `/all/search` or `/indicators/attribute`). |


    ### Flow Description

    1. **Initialization**: The action retrieves the Flashpoint API Key from the integration
    configuration and the `Query Content` and `New Query URL` from the action parameters.

    2. **Manager Setup**: An instance of the `FlashpointManager` is created to handle
    the HTTP session and authentication.

    3. **Request Execution**: The action parses the `Query Content` JSON string into
    a Python dictionary and sends a POST request to the constructed URL (Base API
    + New Query URL).

    4. **Result Processing**: The JSON response from Flashpoint is retrieved and added
    to the action's result JSON.

    5. **Completion**: The action concludes by reporting whether the query was successful
    or if an error occurred during the API interaction.


    ### Additional Notes

    - This action does not automatically iterate over entities in the Google SecOps
    case; it is a standalone query tool.

    - The `Query Content` must be a valid JSON string, otherwise the action will fail
    during the parsing stage.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
