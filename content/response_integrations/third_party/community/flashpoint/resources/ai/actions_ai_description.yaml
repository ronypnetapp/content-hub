IOC_Enrichment:
  ai_description: >-
    ### General Description

    The **IOC Enrichment** action retrieves threat intelligence for entities from
    the Flashpoint platform. It queries the Flashpoint Indicator Attribute API to
    find matches for entity identifiers (such as IPs, Domains, or Hashes) and enriches
    the Google SecOps entities with the retrieved metadata. This action helps analysts
    quickly identify known malicious indicators by pulling context directly into the
    case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Limit | String | No | The maximum number of result objects to return from Flashpoint
    for each entity. Default is "100". |


    ### Flow Description

    1. **Initialization**: Retrieves the Flashpoint API key from the integration configuration
    and the result limit from the action parameters.

    2. **API Query**: For each target entity in the case, the action sends a GET request
    to the Flashpoint `/indicators/attribute` endpoint using the entity's identifier
    as the query string.

    3. **Data Processing**: If a report is found for an entity, the action:
        * Flattens the nested JSON response from Flashpoint.
        * Adds a `FlashPoint` prefix to the flattened keys to avoid attribute collisions.
        * Updates the entity's `additional_properties` with the enriched data.
        * Marks the entity as `enriched` and `suspicious` within the SOAR environment.
    4. **Insight Generation**: Creates a SOAR entity insight for each matched entity,
    explicitly marking it as suspicious based on Flashpoint data.

    5. **Finalization**: Aggregates all retrieved reports into a single JSON result
    and provides a summary message listing any entities that were not found in the
    Flashpoint database.


    ### Additional Notes

    * This action is strictly for enrichment; it does not perform any blocking or
    state-changing operations in Flashpoint.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties with enriched data from Flashpoint,
      marks entities as enriched and suspicious, and creates entity insights.
