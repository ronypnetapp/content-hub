Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Cybersixgill Darkfeed threat intelligence. This action
    identifies, investigates, and retrieves context for URLs that have been shared
    or hosted on underground file-sharing and paste sites. It provides deep visibility
    into the dark web context of a URL, including associated actors, feed sources,
    and severity levels.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for authenticating with the Cybersixgill
    API. |

    | Client Secret | String | Yes | The Client Secret for authenticating with the
    Cybersixgill API. |


    ### Additional Notes

    * This action automatically marks enriched entities as **suspicious** and **enriched**
    within the Google SecOps environment if data is found.

    * It integrates external references from VirusTotal and MITRE ATT&CK when available
    in the Cybersixgill data.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Cybersixgill API credentials from
    the integration settings.

    2. **Entity Filtering:** Identifies all URL entities within the current alert
    context.

    3. **Threat Intelligence Retrieval:** For each URL, it queries the Cybersixgill
    Darkfeed API to find matches in underground sources.

    4. **Entity Enrichment:** If data is found, it updates the entity's additional
    properties with metadata such as the Sixgill Feed Name, Source, Actor, Confidence,
    and Severity.

    5. **Insight Generation:** Creates a detailed Case Insight containing a summary
    of the threat intelligence and external references.

    6. **Data Visualization:** Adds a data table to the entity and attaches external
    links (e.g., to the Cybersixgill Portal, VirusTotal, or MITRE ATT&CK) for further
    investigation.
