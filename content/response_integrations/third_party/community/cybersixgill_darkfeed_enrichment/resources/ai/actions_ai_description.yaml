Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the Cybersixgill Darkfeed Enrichment service.
    Its primary purpose is to ensure that the provided API credentials (Client ID
    and Client Secret) are valid and that the network path to the Cybersixgill API
    is open.


    ### Parameters Description

    This action does not require any user-provided input parameters at runtime. It
    relies entirely on the integration's global configuration settings.


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action uses no runtime parameters. |


    ### Additional Notes

    - This action uses a hardcoded IP address (8.8.8.8) to perform a test enrichment
    query to validate the API connection.

    - It is typically used during the initial setup of the integration or for troubleshooting
    communication issues.


    ### Flow Description

    1. **Credential Retrieval**: The action extracts the `Client Id` and `Client Secret`
    from the integration's configuration parameters.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` and the
    `SixgillActionResultProcessor` using the retrieved credentials.

    3. **Connectivity Test**: The processor attempts to create a Cybersixgill client
    and executes a test enrichment call for the IP `8.8.8.8`.

    4. **Status Reporting**: If the API call is successful, the action returns a success
    message. If an exception occurs (e.g., authentication failure or network timeout),
    it logs the error and returns a failure status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
