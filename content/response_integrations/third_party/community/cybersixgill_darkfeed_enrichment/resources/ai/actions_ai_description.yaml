Enrich Actor:
  ai_description: >-
    ### General Description

    Enriches **Threat Actor** entities using Cybersixgill Darkfeed intelligence. This
    action retrieves comprehensive data regarding a threat actor's activities in the
    underground, including IOCs shared within the last 90 days, their primary areas
    of activity, preferred targets, and utilized techniques. The retrieved data is
    used to update entity attributes, provide detailed insights, and populate data
    tables within the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The API Client ID used to authenticate with the Cybersixgill
    service. |

    | Client Secret | String | Yes | The API Client Secret used to authenticate with
    the Cybersixgill service. |


    ### Flow Description

    1. **Authentication**: Extracts the Client ID and Client Secret from the integration
    configuration to initialize the Cybersixgill manager.

    2. **Entity Filtering**: Identifies all entities of type `THREATACTOR` within
    the current alert context.

    3. **Data Retrieval**: Queries the Cybersixgill API for each identified threat
    actor to fetch enrichment data and associated indicators.

    4. **Entity Enrichment**: Updates the entity's status to `is_enriched` and `is_suspicious`.
    It also populates the entity's `additional_properties` with metadata such as description,
    feed name, source, actor details, confidence, and severity.

    5. **Insight Generation**: Creates a detailed case insight for each actor, summarizing
    the intelligence found.

    6. **Data Visualization**: Adds a data table to the entity containing structured
    records of the actor's activity and provides external links to the Cybersixgill
    portal and other sources like VirusTotal or MITRE ATT&CK.


    ### Additional Notes

    This action specifically targets the `THREATACTOR` entity type. While the underlying
    processor supports other types, this specific action script restricts processing
    to threat actors only.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (is_enriched, is_suspicious), populates
      additional properties with threat intelligence, creates case insights, and adds
      data tables and external links to the entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - THREATACTOR
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich Domain:
  ai_description: >-
    ### General Description

    Enriches Hostname (Domain) entities using Cybersixgill Darkfeed threat intelligence.
    This action identifies if a domain is associated with compromised sites or is
    for sale on the dark web, providing critical context for security investigations.
    It retrieves detailed threat indicators, including feed names, actors, severity,
    and confidence scores, and maps them to the entity's profile in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for the Cybersixgill API, configured
    at the integration level. |

    | Client Secret | String | Yes | The Client Secret for the Cybersixgill API, configured
    at the integration level. |


    ### Additional Notes

    There are no action-specific parameters; the action relies on integration-level
    configuration. It automatically marks entities as suspicious and enriched if threat
    data is found. It also parses STIX patterns to identify related file hashes (MD5,
    SHA-1, SHA-256) and integrates external references from VirusTotal and MITRE ATT&CK
    where available.


    ### Flow Description

    1. **Credential Retrieval**: Extracts the Client ID and Client Secret from the
    integration configuration.

    2. **Entity Filtering**: Identifies Hostname entities from the target entities
    list.

    3. **API Query**: Queries the Cybersixgill Darkfeed API for each identified Hostname
    to retrieve enrichment indicators.

    4. **Data Processing**: If enrichment data is found, the action:
        * Marks the entity as 'Enriched' and 'Suspicious'.
        * Updates the entity's additional properties with threat details such as Feed
    Name, Source, Actor, Severity, and Confidence.
        * Parses STIX patterns within the results to find and map related file hashes.
    5. **Output Generation**: Creates a detailed case insight and an entity table
    containing the full threat context. It also adds external links to the Cybersixgill
    portal and relevant third-party sources like VirusTotal or MITRE ATT&CK.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (is_enriched, is_suspicious, additional_properties)
      and creates case insights, entity tables, and entity links within Google SecOps.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using Cybersixgill Darkfeed threat intelligence. This
    action proactively analyzes and investigates malware hashes as they emerge on
    the dark web, providing context even for malware undetected by traditional antivirus
    vendors. It retrieves comprehensive metadata, including actor information, severity,
    confidence scores, and cross-references with VirusTotal and MITRE ATT&CK.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The API Client ID for Cybersixgill authentication.
    |

    | Client Secret | String | Yes | The API Client Secret for Cybersixgill authentication.
    |


    ### Additional Notes

    This action specifically targets `FILEHASH` entities. It automatically marks enriched
    entities as suspicious if threat data is found in the Cybersixgill database.


    ### Flow Description

    1. **Authentication**: Initializes the Cybersixgill manager using the provided
    Client ID and Secret.

    2. **Entity Identification**: Filters the target entities to identify all `FILEHASH`
    objects.

    3. **Threat Intelligence Query**: For each hash, it queries the Cybersixgill Darkfeed
    API for matching indicators.

    4. **Internal Data Mutation**: If a match is found, the action updates the entity's
    `is_enriched` and `is_suspicious` flags and populates its `additional_properties`
    with detailed threat metadata.

    5. **Insight Generation**: Creates a detailed Case Insight summarizing the findings,
    including feed names, actor details, and severity.

    6. **Contextual Enrichment**: Adds a data table to the entity, attaches raw JSON
    results, and provides external links to the Cybersixgill Portal, VirusTotal, and
    MITRE ATT&CK documentation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (is_enriched, is_suspicious, additional_properties)
      and creates case insights based on the retrieved threat intelligence from Cybersixgill.
  categories:
    enrichment: true
  entity_usage:
