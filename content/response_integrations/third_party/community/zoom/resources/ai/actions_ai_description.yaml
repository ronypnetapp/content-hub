Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with detailed account information retrieved from Zoom.
    This action identifies User entities within the case, queries the Zoom API for
    their specific profile details, and maps the retrieved data back to the entity's
    additional properties. It is primarily used to provide security analysts with
    context regarding a user's Zoom account status, type, and other metadata during
    an investigation.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration for authentication (JWT Token or OAuth credentials).


    ### Additional Notes

    * The action specifically targets entities of type `USER`.

    * All retrieved data points are flattened and prefixed with 'Zoom' before being
    added to the entity's properties to avoid naming collisions.

    * If a user is not found in Zoom, the action will skip that specific entity and
    continue processing others.


    ### Flow Description

    1. **Authentication**: Initializes the Zoom Manager using either JWT or OAuth
    credentials provided in the integration configuration.

    2. **Entity Filtering**: Iterates through the target entities and filters for
    those with the `USER` entity type.

    3. **Data Retrieval**: For each valid User entity, it calls the Zoom API's `/users/{user_id}`
    endpoint using the entity identifier (email).

    4. **Data Transformation**: Flattens the resulting JSON response and adds the
    'Zoom' prefix to all keys.

    5. **Internal Update**: Updates the entity's `additional_properties` with the
    transformed data and sets the `is_enriched` flag to `True`.

    6. **Finalization**: Updates the entities in Google SecOps and returns a JSON
    result containing the raw data for all successfully enriched users.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of User entities with Zoom profile data
      and sets the 'is_enriched' attribute to true.
  categories:
    enrichment: true
