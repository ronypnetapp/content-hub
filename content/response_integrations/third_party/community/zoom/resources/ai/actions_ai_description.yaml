Get Meeting Recording:
  ai_description: "### General Description\nThe **Get Meeting Recording** action retrieves\
    \ metadata and the cloud sharing URL for a specific Zoom meeting recording stored\
    \ in the cloud. It allows users to programmatically access recording details using\
    \ a unique Meeting ID, facilitating investigations or automated workflows that\
    \ require access to recorded session data.\n\n### Parameters\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Meeting ID | String\
    \ | Yes | The unique identifier of the Zoom meeting recording to be retrieved.\
    \ |\n\n### Flow Description\n1. **Parameter Extraction**: The action extracts\
    \ the `Meeting ID` from the input parameters.\n2. **Authentication**: The action\
    \ initializes the `ZoomManager` using provided credentials (either OAuth or JWT)\
    \ to authenticate with the Zoom API.\n3. **API Request**: It performs a GET request\
    \ to the Zoom `/meetings/{meeting_id}/recordings` endpoint to fetch the recording\
    \ details.\n4. **Result Processing**: \n    *   Extracts the `share_url` from\
    \ the API response.\n    *   Adds the sharing URL as a clickable link in the Google\
    \ SecOps interface.\n    *   Attaches the full recording metadata as a JSON result\
    \ for downstream use.\n5. **Completion**: The action concludes by returning the\
    \ sharing URL as the primary result value.\n\n### Additional Notes\nThis action\
    \ only retrieves recordings that are stored in the Zoom Cloud. It does not support\
    \ local recordings."
