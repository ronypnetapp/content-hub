Create Meeting:
  ai_description: >-
    ### General Description

    Creates a scheduled or instant meeting in Zoom for a specified host. This action
    allows users to automate the creation of Zoom meetings directly from Google SecOps,
    specifying details such as topic, start time, duration, and recording preferences.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Meeting Type | Dropdown | Yes | Defines if the meeting is 'Instant' or 'Scheduled'.
    |

    | Meeting Start Time | String | Yes | The start time in GMT (yyyy-mm-dd hh:mm:ss).
    Used for scheduled meetings. |

    | Meeting Topic | String | Yes | The title or topic of the meeting. |

    | Auto Recording Type | Dropdown | Yes | Specifies if the meeting should be recorded
    ('local', 'cloud', or 'none'). |

    | Time Zone | String | Yes | The time zone for the meeting (e.g., 'America/New_York').
    |

    | Meeting Duration | String | Yes | The duration of the meeting in minutes. |

    | Host Email Address | String | Yes | The email address of the Zoom user who will
    host the meeting. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves meeting details (topic, type, time, duration,
    timezone, recording type, and host email) from the action inputs.

    2. **Authentication**: Initializes the Zoom Manager using OAuth or JWT credentials
    provided in the integration configuration.

    3. **Meeting Creation**: Sends a POST request to the Zoom API endpoint (`/users/{host_email}/meetings`)
    with the provided configuration payload.

    4. **Result Handling**: If the meeting is created successfully, it adds the 'join_url'
    as a clickable link in the SOAR interface and returns the full meeting metadata
    as a JSON result.


    ### Additional Notes

    - The 'Meeting Start Time' is specifically required for 'Scheduled' meetings.

    - Ensure the 'Host Email Address' corresponds to a valid user in the Zoom account.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new meeting record in the Zoom platform, which consumes API quota
      and adds data to the Zoom account.
    fetches_data: false
    internal_data_mutation_explanation: null
