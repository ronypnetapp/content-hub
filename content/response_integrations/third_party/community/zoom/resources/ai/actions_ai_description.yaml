Delete User:
  ai_description: "### General Description\nThe **Delete User** action permanently\
    \ removes a user from a Zoom account. This action is designed for administrative\
    \ cleanup or security response scenarios, such as offboarding or responding to\
    \ compromised accounts. It provides the capability to transfer the user's assets\u2014\
    including future meetings, webinars, and cloud recordings\u2014to another specified\
    \ user before the deletion is executed to prevent data loss.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| **Deleted User Email** | String | Yes | The email address of\
    \ the user to be permanently deleted from Zoom. |\n| **Transfer Email** | String\
    \ | No | The email address of the recipient who will take ownership of the deleted\
    \ user's data. |\n| **Transfer Meeting** | Boolean | No | If set to true, transfers\
    \ all future scheduled meetings to the Transfer Email recipient. |\n| **Transfer\
    \ Recordings** | Boolean | No | If set to true, transfers all cloud recordings\
    \ to the Transfer Email recipient. |\n| **Transfer Webinar** | Boolean | No |\
    \ If set to true, transfers all future scheduled webinars to the Transfer Email\
    \ recipient. |\n\n### Additional Notes\n- The action includes a safety check:\
    \ it verifies the existence of recordings, webinars, and meetings before attempting\
    \ a transfer. If no data is found for a category, the transfer flag for that category\
    \ is automatically disabled to ensure API compatibility.\n- This action uses the\
    \ `delete` action type in the Zoom API, which is a permanent removal.\n\n### Flow\
    \ Description\n1. **Initialization**: Extracts the target user's email and transfer\
    \ configurations from the action parameters.\n2. **Data Verification**: Calls\
    \ the Zoom API to check if the user has any existing recordings, webinars, or\
    \ meetings that can be transferred.\n3. **Logic Optimization**: Adjusts the transfer\
    \ flags based on the actual presence of data to avoid unnecessary transfer requests.\n\
    4. **Execution**: Sends a DELETE request to the Zoom `/users/{userId}` endpoint\
    \ with the specified transfer parameters.\n5. **Completion**: Returns a success\
    \ message and a JSON result indicating whether the user was successfully deleted."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Permanently deletes a user account from the Zoom platform and reassigns their
      meetings, webinars, and recordings to another user.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
