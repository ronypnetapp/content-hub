Create User:
  ai_description: >-
    ### General Description

    Creates a new user account in Zoom using the provided user details and license
    type. This action is designed to automate the provisioning of Zoom users as part
    of IT or security workflows.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First Name | string | Yes | The first name of the user to be created. |

    | Last Name | string | Yes | The last name of the user to be created. |

    | Email | string | Yes | The email address of the user to be created. |

    | User Type | ddl | Yes | The user license type. Supported values: 'Basic', 'Licensed',
    'On-prem'. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the user's first name, last name, email,
    and license type from the action parameters.

    2. **Pre-check**: Queries the Zoom API to check if a user with the specified email
    already exists to prevent duplicate creation.

    3. **User Creation**: If the user does not exist, sends a POST request to the
    Zoom `/users` endpoint with the specified user information.

    4. **Result Processing**: Captures the API response containing the new user's
    details and attaches it to the action's JSON results.


    ### Additional Notes

    This action requires valid Zoom API credentials (either JWT or OAuth) to be configured
    in the integration settings. If the user already exists, the action will fail
    with a specific error message.
  capabilities:
    can_create_case_comments: false
