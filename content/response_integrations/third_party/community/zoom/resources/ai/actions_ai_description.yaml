Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity between Google SecOps and
    the Zoom API. It ensures that the provided credentials (either OAuth or JWT) are
    valid and that the network path to the Zoom service is open.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration parameters:

    * **JWT Token**: Used for JWT-based authentication (legacy).

    * **Account ID**: Used for OAuth-based authentication.

    * **Client ID**: Used for OAuth-based authentication.

    * **Client Secret**: Used for OAuth-based authentication.


    ### Additional Notes

    Either the JWT Token or the set of OAuth credentials (Account ID, Client ID, Client
    Secret) must be configured in the integration settings for this action to function.
    This action is primarily used for troubleshooting and initial setup verification.


    ### Flow Description

    1. **Initialize Manager**: The action initializes the ZoomManager using the credentials
    provided in the integration configuration.

    2. **Authentication**: Depending on the configuration, it either sets the JWT
    bearer token or performs an OAuth login flow to retrieve an access token.

    3. **Connectivity Test**: It executes a GET request to the Zoom `/users` endpoint
    (requesting active users) to verify that the API responds successfully.

    4. **Result Reporting**: If the request is successful, it returns a 'Connected
    successfully' message. If any step fails (authentication or network), it reports
    a failure with the specific error encountered.
