Check Url:
  ai_description: >-
    ### General Description

    Checks if a specific URL is marked as suspicious by the PhishTank Community. This
    action enriches URL entities with reputation data, including verification status
    and links to PhishTank detail pages. It helps security analysts quickly identify
    known phishing links based on community-sourced intelligence.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Url | String | Yes | The API endpoint for the PhishTank service, retrieved
    from the integration configuration. |


    ### Flow Description

    1. **Configuration Retrieval**: Fetches the PhishTank Service URL from the integration
    settings.

    2. **Entity Filtering**: Identifies all URL entities within the current scope
    for processing.

    3. **External Lookup**: For each URL, performs a POST request to the PhishTank
    API to retrieve its status.

    4. **Data Parsing**: Converts the XML response from PhishTank into a structured
    format.

    5. **Reputation Assessment**: Checks if the URL exists in the PhishTank database
    and evaluates its verification status.

    6. **Internal Updates**:
        * Adds an **Entity Insight** to the URL entity containing the verification
    status and a link to the PhishTank detail page.
        * Marks the entity as **Suspicious** within Google SecOps if the URL is confirmed
    as verified phishing.
        * Updates the entity attributes to reflect the new suspicious status.
    7. **Result Reporting**: Consolidates the findings into a final action message
    and provides a detailed JSON result for downstream playbooks.


    ### Additional Notes

    * The action attempts to use the `OriginalIdentifier` from the entity's additional
    properties to ensure the most accurate URL is queried, falling back to the standard
    identifier if necessary.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute of URL entities if they are verified as
      phishing in PhishTank and adds entity insights with the lookup results.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the PhishTank service to ensure the integration is properly
    configured and the service is reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the 'Service
    Url' defined in the integration's global configuration.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Service Url' from the
    PhishTank integration settings.

    2. **Connectivity Check**: It sends a POST request to the configured URL with
    a sample payload (checking the status of 'google.com') to verify the API's responsiveness.

    3. **Validation**: The action checks the HTTP response status code using `res.raise_for_status()`.

    4. **Completion**: If the request is successful, it reports that PhishTank is
    connected.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the initial setup
    of the PhishTank integration. Per the guidelines, Ping actions are not categorized
    as enrichment actions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
