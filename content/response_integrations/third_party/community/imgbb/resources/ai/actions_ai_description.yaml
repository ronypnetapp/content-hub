Upload Image From File Path:
  ai_description: >-
    ### General Description

    The **Upload Image From File Path** action enables the uploading of a local image
    file to the Imgbb hosting service. Its primary purpose is to take a file stored
    on the local system, upload it to a cloud-based hosting provider, and retrieve
    a public URL for the image. This is particularly useful for sharing screenshots
    or visual evidence captured during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image File Path | String | Yes | The full system path to the image file that
    needs to be uploaded to Imgbb. |


    ### Flow Description

    1. **Setup**: Retrieves the Imgbb API Key and SSL verification preferences from
    the integration configuration.

    2. **File Encoding**: Reads the image file from the specified local path and converts
    the binary data into a Base64-encoded string.

    3. **External Upload**: Executes a POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    with the Base64 data. The upload is configured with a 600-second (10-minute) expiration.

    4. **Data Extraction**: Parses the JSON response from Imgbb to extract the direct
    URL of the uploaded image.

    5. **Result Reporting**: Adds the image URL as a clickable link in the Google
    SecOps interface and provides the URL in the action's JSON result for use in subsequent
    playbook steps.


    ### Additional Notes

    - The action requires the Google SecOps runner to have filesystem access to the
    provided path.

    - The uploaded image is temporary and will expire after 10 minutes as per the
    hardcoded API parameter.
