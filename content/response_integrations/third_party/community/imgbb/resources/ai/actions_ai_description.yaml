Upload Image From Base64:
  ai_description: >-
    ### General Description

    Uploads a base64-encoded image to the Imgbb hosting service and retrieves a public
    URL for the image. This action is primarily used as a utility to host images (such
    as screenshots or evidence) externally and provide a direct link within the SOAR
    case.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Image in base64 | The base64 string representation of the image to be uploaded
    to Imgbb. | String | Yes |


    ### Flow Description

    1. **Configuration Retrieval**: Fetches the API Key and SSL verification settings
    from the Imgbb integration configuration.

    2. **Parameter Extraction**: Retrieves the mandatory base64 image string from
    the action parameters.

    3. **API Interaction**: Sends a POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    containing the image data. The request includes a default expiration of 600 seconds
    (10 minutes) for the uploaded image.

    4. **Response Processing**: Parses the JSON response from Imgbb to extract the
    generated image URL.

    5. **Output Generation**: Adds the resulting image URL as a clickable link to
    the action result and includes the full response data in the JSON result block.


    ### Additional Notes

    * The uploaded image is set to expire automatically after 10 minutes as per the
    API endpoint configuration in the script.

    * This action does not process or iterate over SecOps entities; it operates solely
    on the provided base64 string parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a base64 encoded image to the Imgbb service, creating a new hosted image
      resource on their servers.
    fetches_data: false
    internal_data_mutation_explanation: null
