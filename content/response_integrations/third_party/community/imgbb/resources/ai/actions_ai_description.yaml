    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Imgbb upload endpoint, which results
      in a sample image being uploaded to the external service to verify connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
