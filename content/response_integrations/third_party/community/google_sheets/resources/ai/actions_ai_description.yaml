Update Row:
  ai_description: >-
    ### General Description

    Updates a specific row in a Google Sheet with a provided set of values. This action
    is useful for logging data, updating status trackers, or maintaining external
    records directly from a SOAR playbook.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | String | Yes | The unique identifier of the spreadsheet, found in
    the URL: `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`. |

    | Worksheet Name | String | No | The name of the specific tab (worksheet) to update.
    If not provided, the action defaults to the first worksheet (Sheet1). |

    | Row Number | String | Yes | The numerical index of the row to be updated (e.g.,
    "1", "5"). |

    | Values | String | Yes | A comma-separated list of values to be written into
    the row (e.g., "val1,val2,val3"). Each value will be placed in a sequential column
    starting from Column A. |


    ### Additional Notes

    * This action does not process or require any SOAR entities.

    * The `Values` parameter is parsed by splitting the string at each comma. Ensure
    your data does not contain unexpected commas unless they are intended as column
    delimiters.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Sheets using
    the provided Service Account credentials.

    2. **Spreadsheet Access**: It opens the spreadsheet identified by the `Sheet Id`.

    3. **Worksheet Selection**: It selects the worksheet specified by `Worksheet Name`
    or defaults to the first available sheet.

    4. **Data Parsing**: The `Values` string is split into a list of individual cell
    values.

    5. **Row Update**: The action iterates through the list of values, updating each
    cell in the specified `Row Number` sequentially, starting from the first column
    (Column 1).
