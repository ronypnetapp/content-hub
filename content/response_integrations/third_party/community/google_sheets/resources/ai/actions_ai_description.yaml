Update Rows:
  ai_description: >-
    ### General Description

    Updates specific rows in a Google Spreadsheet with provided values. This action
    allows for bulk updates of multiple rows by specifying row indices and a sequence
    of values to be inserted starting from the first column of each specified row.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Row Number** | String | Yes | Comma-separated list of row numbers to update
    (e.g., '1,2,5'). |

    | **Values** | Content | Yes | Comma-separated list of values to be written into
    the cells (e.g., 'ValueA,ValueB'). |

    | **Sheet Id** | String | Yes | The unique ID of the spreadsheet found in the
    URL. |

    | **Worksheet Name** | String | No | The name of the worksheet tab. Defaults to
    the first sheet (Sheet1) if not provided. |


    ### Flow Description

    1. **Authentication**: Connects to the Google Sheets service using the provided
    service account credentials.

    2. **Spreadsheet Access**: Opens the spreadsheet identified by the `Sheet Id`.

    3. **Worksheet Selection**: Targets the specified `Worksheet Name` or defaults
    to the first available sheet.

    4. **Data Processing**: Parses the input row numbers and values from comma-separated
    strings.

    5. **Cell Update**: Iterates through each specified row and updates columns sequentially
    starting from column 1 with the provided values.


    ### Additional Notes

    - The action overwrites existing data in the specified cells.

    - Column indexing starts at 1 for each row updated.
