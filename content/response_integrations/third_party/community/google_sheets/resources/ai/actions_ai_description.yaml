Import CSV:
  ai_description: >-
    ### General Description

    Imports the content of a CSV file into a specific Google Spreadsheet. This action
    is designed to populate a spreadsheet with external data. **Warning:** This operation
    is destructive; it replaces all content in the first worksheet of the target spreadsheet
    and removes all other existing worksheets.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | string | Yes | The unique identifier of the Google Spreadsheet, which
    can be extracted from the spreadsheet's URL (e.g., the string between '/d/' and
    '/edit'). |

    | CSV Path | string | Yes | The absolute or relative path on the local file system
    where the CSV file to be imported is located. |


    ### Additional Notes

    - The integration must be configured with valid Google Service Account credentials
    that have 'Editor' access to the target spreadsheet.

    - Because this action deletes other worksheets, it should be used with caution
    on spreadsheets containing multiple tabs of data.


    ### Flow Description

    1. **Authentication:** The action initializes a connection to the Google Sheets
    API using the provided Service Account credentials.

    2. **File Retrieval:** It reads the raw text content from the CSV file specified
    in the `CSV Path` parameter.

    3. **Spreadsheet Access:** It verifies access to the spreadsheet using the `Sheet
    Id`.

    4. **Data Import:** It calls the Google Sheets API to import the CSV data. This
    process overwrites the first sheet and deletes all other worksheets in the file.

    5. **Completion:** The action returns the Spreadsheet ID and a success message
    upon completion.
