Get All:
  ai_description: >-
    ### General Description

    Retrieves all rows from a specified Google Sheet worksheet and returns them as
    a JSON array of objects. This action is designed to ingest tabular data from Google
    Sheets into a Google SecOps playbook for further processing, such as lookups or
    data manipulation. It uses service account credentials to authenticate and access
    the spreadsheet.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | String | Yes | The unique identifier of the spreadsheet, found in
    the URL: `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`. |

    | Worksheet Name | String | No | The name of the specific tab to retrieve data
    from. If not provided, the action defaults to the first worksheet (Sheet1). Note:
    This is case-sensitive. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Sheets using
    the provided Service Account credentials from the integration configuration.

    2. **Spreadsheet Access**: It opens the spreadsheet identified by the `Sheet Id`
    parameter.

    3. **Worksheet Selection**: It selects the worksheet based on the `Worksheet Name`
    parameter. If the parameter is empty, it defaults to the first sheet in the workbook.

    4. **Data Retrieval**: It fetches all records from the worksheet using the `get_all_records()`
    method, which converts rows into a list of dictionaries where the keys are the
    column headers.

    5. **Output**: The retrieved data is attached to the action result as a JSON object
    for use in subsequent playbook steps.


    ### Additional Notes

    - The Service Account must have at least "Viewer" permissions on the target spreadsheet
    to successfully retrieve data.

    - The action assumes the first row of the worksheet contains headers used as keys
    in the resulting JSON.
