Delete Rows:
  ai_description: >-
    ### General Description

    The **Delete Rows** action allows users to remove a specific range of rows from
    a Google Sheets worksheet. This is useful for cleaning up logs, removing processed
    data, or managing spreadsheet-based databases directly from Google SecOps.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Sheet Id** | The unique identifier of the spreadsheet, found in the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`.
    | String | Yes | Required to locate the file. |

    | **Worksheet Name** | The name of the specific tab (e.g., "Sheet1"). | String
    | No | If not provided, the action defaults to the first worksheet in the file.
    |

    | **From Row** | The starting row number for the deletion range. | String | Yes
    | Must be a valid integer. |

    | **To Row** | The ending row number for the deletion range. | String | Yes |
    Must be a valid integer. |


    ### Additional Notes

    - This action does not process or require any entities from the case.

    - The row indices are 1-based (the first row is 1).


    ### Flow Description

    1. **Authentication**: The action retrieves service account credentials from the
    integration configuration.

    2. **Spreadsheet Access**: It connects to the Google Sheets API and opens the
    spreadsheet identified by the `Sheet Id`.

    3. **Worksheet Selection**: It selects the worksheet specified by the `Worksheet
    Name` or defaults to the first sheet if the parameter is empty.

    4. **Row Deletion**: It executes a command to delete all rows within the range
    defined by `From Row` and `To Row`.

    5. **Completion**: Returns a success message if the rows were deleted or an error
    message if the operation failed.
