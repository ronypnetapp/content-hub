Update  Cell:
  ai_description: >-
    ### General Description

    Updates a specific cell in a Google Sheets spreadsheet with a provided value.
    This action is useful for logging, tracking status, or updating external records
    directly from a playbook.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | string | Yes | The unique identifier of the spreadsheet, found in
    the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`. |

    | Worksheet Name | string | No | The name of the specific tab (worksheet) to update.
    If not provided, the action defaults to the first sheet (Sheet1). Note: This is
    case-sensitive. |

    | Cell | string | Yes | The A1 notation of the cell to update (e.g., 'A1', 'B12').
    |

    | Value | string | Yes | The data/value to be written into the specified cell.
    |


    ### Additional Notes

    This action requires a service account with appropriate permissions to access
    and edit the target spreadsheet. If the 'Worksheet Name' is not found, the action
    will fail.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Sheets using
    the provided service account credentials.

    2. **Spreadsheet Access**: It opens the spreadsheet identified by the 'Sheet Id'.

    3. **Worksheet Selection**: It selects the worksheet specified by 'Worksheet Name'
    or defaults to the first worksheet if the parameter is empty.

    4. **Cell Update**: It executes an update command to write the 'Value' into the
    designated 'Cell'.

    5. **Completion**: Returns a success message if the update is successful or an
    error message if the operation fails.
