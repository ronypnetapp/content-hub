Add  Permission:
  ai_description: >-
    ### General Description

    This action adds permissions to a specific Google Sheet for one or more users.
    It allows administrators to programmatically manage access levels (Owner, Writer,
    Reader) for spreadsheets stored in Google Drive.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | string | Yes | The unique identifier of the spreadsheet, found in
    the URL (e.g., `https://docs.google.com/spreadsheets/d/{SheetId}/edit`). |

    | Role | ddl | Yes | The permission level to grant. Options include: **Owner**
    (full control), **Writer** (can edit/comment), and **Reader** (view only). |

    | Emails | string | Yes | A semicolon-separated list of email addresses (e.g.,
    `user1@gmail.com;user2@gmail.com`) to which the permissions will be applied. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Google service account
    credentials from the integration configuration.

    2. **Parameter Parsing**: It extracts the target Sheet ID, the desired role, and
    the list of email addresses from the action input.

    3. **Client Initialization**: A Google Sheets client is initialized using the
    provided service account JSON.

    4. **Permission Insertion**: The action iterates through the provided emails and
    calls the Google Drive API to insert the specified permission role for each user
    on the target spreadsheet.

    5. **Result Reporting**: The action concludes by returning a success message if
    the permissions were granted or an error message if the operation failed.


    ### Additional Notes

    This action does not process entities from the case; it relies entirely on the
    manually provided parameters.
