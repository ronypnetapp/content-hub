Add or Update Rows:
  ai_description: "### General Description\nThe **Add or Update Rows** action allows\
    \ users to manage records in a Google Sheet dynamically. It provides a mechanism\
    \ to synchronize data by searching for an existing entry based on a specific column\
    \ value. If the entry exists, the action updates the row; otherwise, it appends\
    \ a new row. This is particularly useful for maintaining logs, asset lists, or\
    \ tracking statuses within a spreadsheet.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Column\
    \ Number** | String | Yes | The column index (e.g., \"1\") where the action will\
    \ look for the search value. |\n| **Start Column** | String | Yes | The starting\
    \ column identifier (e.g., \"A\") for the update/append operation. |\n| **End\
    \ Column** | String | Yes | The ending column identifier (e.g., \"C\") for the\
    \ update/append operation. |\n| **Field Name** | String | Yes | The key within\
    \ the provided JSON objects used to find the search value. |\n| **Json** | Code\
    \ | Yes | A JSON array of objects. Each object represents a row to be processed.\
    \ |\n| **Sheet Id** | String | Yes | The unique ID of the spreadsheet (found in\
    \ the URL). |\n| **Worksheet Name** | String | No | The name of the specific sheet\
    \ tab. Defaults to the first sheet if not provided. |\n\n### Flow Description\n\
    1. **Initialization**: The action extracts credentials and parameters, then connects\
    \ to the Google Sheets API via the `GoogleSheetFactory`.\n2. **Worksheet Selection**:\
    \ It opens the spreadsheet by ID and selects the specified worksheet (or the first\
    \ one by default).\n3. **Data Processing**: It iterates through each object in\
    \ the provided JSON array.\n4. **Search**: For each object, it retrieves the value\
    \ associated with the `Field Name` and searches for it in the specified `Column\
    \ Number` using the `find` method.\n5. **Update/Append**: \n    * If the value\
    \ is found, it calculates the target range and updates the existing row with the\
    \ new values.\n    * If the value is not found, it appends the values as a new\
    \ row at the bottom of the sheet.\n6. **Completion**: The action returns the count\
    \ of processed rows and the specific ranges updated.\n\n### Additional Notes\n\
    * The `Json` parameter must be a valid JSON array of objects.\n* Ensure the service\
    \ account has the necessary permissions (Editor access) to the spreadsheet."
