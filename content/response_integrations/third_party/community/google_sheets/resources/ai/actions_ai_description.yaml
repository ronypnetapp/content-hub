Search Rows:
  ai_description: >-
    ### General Description

    The **Search Rows** action allows users to search for specific values within a
    designated column of a Google Sheets spreadsheet. It identifies all rows where
    the search value exists in the specified column and returns the row numbers as
    a list. This is useful for lookups, data validation, or retrieving record identifiers
    from a centralized spreadsheet.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | string | Yes | The unique identifier of the spreadsheet, found
    in the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`. |

    | **Worksheet Name** | string | No | The name of the specific tab/worksheet to
    search. If not provided, the action defaults to the first worksheet (Sheet1).
    |

    | **Column Number** | string | Yes | The numerical index of the column to search
    within (e.g., "1" for Column A). |

    | **Search value** | string | Yes | The specific string or value to search for
    within the specified column. |


    ### Additional Notes

    - The search is performed using the `findall` method, which identifies all occurrences
    of the value in the sheet, but the action specifically filters these results to
    only include matches found in the user-defined **Column Number**.

    - The action returns the total count of matching rows as the main result value
    and a list of row numbers in the JSON result.


    ### Flow Description

    1. **Initialization**: The action extracts the Google Sheets credentials from
    the integration configuration and the search parameters (Sheet ID, Worksheet Name,
    Column Number, and Search Value) from the action input.

    2. **Connection**: It establishes a connection to the Google Sheets API using
    a service account.

    3. **Worksheet Selection**: It opens the spreadsheet by ID and selects the specified
    worksheet (or the first one by default).

    4. **Search Execution**: It searches the entire worksheet for the provided value.

    5. **Filtering**: It iterates through the search results and keeps only those
    where the cell's column index matches the provided **Column Number**.

    6. **Data Retrieval**: It collects the row numbers of the matching cells.

    7. **Completion**: The action outputs the list of row numbers and the total count
    of rows found.
