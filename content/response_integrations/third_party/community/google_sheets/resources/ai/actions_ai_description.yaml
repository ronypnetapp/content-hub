Create Sheet:
  ai_description: >-
    ### General Description

    The **Create Sheet** action enables the automated creation of a new Google Spreadsheet
    within a Google Drive account. This action is primarily used to generate external
    reports, logs, or collaborative documents during the lifecycle of an investigation.
    It also supports sharing the newly created spreadsheet with specific users by
    granting them 'writer' permissions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Name** | String | Yes | The name assigned to the new Google Spreadsheet
    file. |

    | **Share with emails** | String | No | A semicolon-separated list of email addresses
    (e.g., 'user1@gmail.com;user2@gmail.com') to grant 'writer' access to the spreadsheet.
    |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Google Sheets and Google
    Drive APIs using the provided service account credentials.

    2. **Resource Creation**: It creates a new Google Spreadsheet file with the name
    provided in the 'Sheet Name' parameter.

    3. **Access Control**: If email addresses are provided in the 'Share with emails'
    parameter, the action iterates through the list and updates the spreadsheet's
    permissions to grant 'writer' access to each user.

    4. **Output**: The action returns the unique Spreadsheet ID as the result value
    upon successful creation.


    ### Additional Notes

    - This action creates a new Spreadsheet file, not just a tab within an existing
    file.

    - If the 'Share with emails' parameter is left empty, the spreadsheet remains
    private to the service account owner.
