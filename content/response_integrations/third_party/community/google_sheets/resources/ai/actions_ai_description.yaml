    ### General Description

    Tests connectivity with Google Sheets by verifying the validity of the provided
    service account credentials. The action attempts to create a temporary spreadsheet
    and then immediately deletes it to ensure that the integration has both read and
    write permissions to the Google Drive and Google Sheets APIs.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Credentials Json | String | Yes | The JSON content of the Google Service Account
    key file used for authentication. This is typically retrieved from the integration's
    configuration settings. |


    ### Flow Description

    1. **Authentication**: Initializes a Google Sheets client using the provided Service
    Account JSON credentials.

    2. **Creation Test**: Generates a unique spreadsheet name using a UUID and attempts
    to create a new spreadsheet in the associated Google account.

    3. **Cleanup**: Immediately deletes the newly created spreadsheet using its unique
    identifier to leave the environment clean.

    4. **Status Reporting**: If both the creation and deletion succeed, the action
    returns a success message. If any step fails (e.g., invalid credentials or insufficient
    permissions), it catches the exception and reports the failure.


    ### Additional Notes

    This action is a standard 'Ping' utility used to validate the setup of the Google
    Sheets integration. It requires the service account to have scopes for both `https://www.googleapis.com/auth/spreadsheets`
    and `https://www.googleapis.com/auth/drive`.
