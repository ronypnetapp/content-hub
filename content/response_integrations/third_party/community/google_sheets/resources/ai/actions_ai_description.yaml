    Id`.

    3. **Worksheet Selection**: It identifies the target worksheet. If a `Worksheet
    Name` is specified, it selects that sheet; otherwise, it defaults to the first
    sheet (`sheet1`).

    4. **Data Extraction**: It retrieves all cell values for the row specified by
    the `Row Number`.

    5. **Result Output**: The extracted row values are returned as a JSON array in
