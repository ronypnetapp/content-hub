Add Row:
  ai_description: >-
    ### General Description

    Adds a new row of data to a specified Google Sheets spreadsheet. This action is
    useful for logging information, exporting alert data, or maintaining external
    tracking sheets directly from a playbook.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the URL: `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`. |

    | **Worksheet Name** | String | No | The name of the specific tab (worksheet)
    within the spreadsheet. Defaults to the first sheet (Sheet1) if not provided.
    Note: This is case-sensitive. |

    | **Row Index** | String | No | The one-based index where the row should be inserted.
    If omitted, the behavior depends on the underlying API (typically appends or inserts
    at the top). |

    | **Values** | String | Yes | A comma-separated list of values to be placed into
    the cells of the new row (e.g., "val1,val2,val3"). |


    ### Additional Notes

    - The action requires a service account with appropriate permissions (configured
    in the integration settings) to access the target spreadsheet.

    - The `Values` parameter is parsed by splitting the string at every comma.


    ### Flow Description

    1. **Initialization**: Extracts the service account credentials from the integration
    configuration and the spreadsheet details from the action parameters.

    2. **Data Parsing**: Converts the comma-separated `Values` string into a list
    of individual cell values.

    3. **Connection**: Authenticates with Google APIs and opens the spreadsheet using
    the provided `Sheet Id`.

    4. **Worksheet Selection**: Targets the specific worksheet by name; if no name
    is provided, it defaults to the first worksheet in the file.

    5. **Row Insertion**: Executes the `insert_row` command on the Google Sheets API,
    placing the parsed values at the specified `Row Index` (or the default position
    if the index is not provided).
