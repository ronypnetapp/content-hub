Search Row:
  ai_description: >-
    ### General Description

    The **Search Row** action identifies and retrieves a specific row from a Google
    Spreadsheet based on a provided search value. It is designed to act as a lookup
    utility, allowing playbooks to fetch contextual data stored in spreadsheets, such
    as asset owners, contact lists, or whitelist entries. The action returns the row
    index and the full content of the row as a JSON array.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, which
    can be extracted from the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`.
    |

    | **Worksheet Name** | String | No | The name of the specific tab (worksheet)
    to search within. If not provided, the action defaults to the first worksheet
    (Sheet1). |

    | **Column Number** | String | Yes | The column index where the search is intended
    to be performed. **Note:** The current implementation searches the entire worksheet
    for the value, but uses this parameter for reporting in the output message. |

    | **Search value** | String | Yes | The string or value to search for within the
    spreadsheet. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Google Sheets
    API using service account credentials provided in the integration configuration.

    2. **Spreadsheet Access**: It opens the target spreadsheet using the provided
    `Sheet Id`.

    3. **Worksheet Selection**: It selects the specified worksheet by name or defaults
    to the first available sheet.

    4. **Search Execution**: The action performs a search across the worksheet to
    find the first cell containing the `Search value`.

    5. **Data Extraction**: Upon finding a match, it retrieves the row index and all
    values contained within that specific row.

    6. **Result Processing**: The row data is added to the action's JSON results,
    and the row number is returned as the primary result value.


    ### Additional Notes

    * The search is case-sensitive and will return the first match found in the sheet.

    * If the value is not found, the action will return a failure status with a 'CellNotFound'
    message.
