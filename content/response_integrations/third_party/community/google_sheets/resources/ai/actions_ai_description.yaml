Get Range:
  ai_description: >-
    ### General Description

    Retrieves the values for a specified range within a Google Spreadsheet. This action
    is designed to pull data from a spreadsheet into the Google SecOps platform, enabling
    playbooks to use external spreadsheet data for lookups, configuration, or reporting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | string | Yes | The unique identifier of the spreadsheet, which can
    be found in the spreadsheet URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`.
    |

    | Worksheet Name | string | No | The name of the specific worksheet (tab) to query.
    If not provided, the action defaults to the first worksheet (Sheet1). Note: this
    is case-sensitive. |

    | Range | string | Yes | The range of cells to retrieve using A1 notation (e.g.,
    'A1:B10' or 'Sheet1!A:C'). |


    ### Additional Notes

    - The action requires valid service account credentials (Credentials Json) to
    be configured in the integration settings.

    - The 'Range' parameter must follow the standard Google Sheets A1 notation.


    ### Flow Description

    1. **Authentication**: Initializes the Google Sheets client using the provided
    service account credentials.

    2. **Spreadsheet Access**: Opens the target spreadsheet using the provided 'Sheet
    Id'.

    3. **Worksheet Selection**: Selects the specified 'Worksheet Name' or defaults
    to the first sheet in the spreadsheet.

    4. **Data Retrieval**: Executes a batch get request to fetch the values for the
    specified 'Range'.

    5. **Output**: Returns the retrieved cell values as a JSON object and completes
    the action with a success message.
