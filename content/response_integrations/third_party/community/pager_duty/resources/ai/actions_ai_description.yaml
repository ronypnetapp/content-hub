Get User By Email:
  ai_description: >-
    ### General Description

    The **Get User By Email** action retrieves comprehensive details for a specific
    user in PagerDuty using their email address. This action is primarily used to
    fetch user-specific metadata such as user IDs, roles, contact methods, and team
    associations from the PagerDuty platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Email** | String | Yes | The exact email address of the PagerDuty user whose
    information you want to retrieve. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Email` parameter provided
    in the action configuration.

    2. **API Initialization**: It initializes the PagerDuty manager using the integration's
    API key.

    3. **Data Retrieval**: The action performs a GET request to the PagerDuty `/users`
    endpoint, using the email as a query parameter.

    4. **Exact Match Filtering**: Since the PagerDuty API may return partial matches,
    the script iterates through the results to identify the user object that exactly
    matches the provided email address.

    5. **Result Processing**: If a match is found, the user's full JSON profile is
    added to the action results. If no user is found, the action returns a failure
    state.


    ### Additional Notes

    - This action does not operate on SecOps entities; it relies entirely on the manual
    input of an email address.

    - The action is read-only and does not modify any data within PagerDuty.
