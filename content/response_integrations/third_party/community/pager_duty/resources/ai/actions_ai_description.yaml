Run Response Play:
  ai_description: >-
    ### General Description

    Runs a specified PagerDuty response play on a given incident. Response plays are
    pre-defined sets of actions in PagerDuty that can be manually or automatically
    triggered to streamline incident response, such as notifying specific stakeholders
    or adding responders. This action is currently marked as deprecated.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the PagerDuty user performing the
    action. This is required for the 'From' header in the API request. |

    | Response ID | String | Yes | The unique identifier of the response play to be
    executed. |

    | Incident_ID | String | Yes | The unique identifier of the PagerDuty incident
    on which the response play will be applied. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the user's email, the specific
    Response Play ID, and the target Incident ID from the input parameters.

    2. **Manager Initialization**: Initializes the PagerDuty API manager using the
    integration's API key.

    3. **API Execution**: Sends a POST request to the PagerDuty `/response_plays/{response_play_id}/run`
    endpoint with the incident reference in the payload.

    4. **Result Reporting**: Captures the API response, adds it to the action results,
    and provides a success or failure message based on the HTTP response status.


    ### Additional Notes

    * **Deprecated**: This action is officially marked as deprecated in the integration
    metadata.

    * **No Entity Support**: This action does not iterate over or utilize Google SecOps
    entities; it operates strictly based on the provided parameters.
