List All OnCall:
  ai_description: >-
    ### General Description

    The **List All OnCall** action retrieves a comprehensive list of all current on-call
    entries from PagerDuty. This utility action is designed to provide visibility
    into which personnel are currently active across various escalation policies,
    schedules, and services within the PagerDuty environment.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the PagerDuty API manager using
    the API key defined in the integration's configuration.

    2. **API Request**: It executes a GET request to the PagerDuty `/oncalls` endpoint
    to retrieve the current on-call status for the entire organization.

    3. **Data Output**: The retrieved list of on-call records is processed and added
    to the action's execution results as a JSON object.

    4. **Finalization**: The action completes with a success message if the data is
    retrieved, or a failure message if the PagerDuty API returns an error or no data
    is found.


    ### Additional Notes

    This action does not operate on specific entities (like Hostnames or Users) within
    the Google SecOps case; it fetches global organizational data from the external
    PagerDuty service.
