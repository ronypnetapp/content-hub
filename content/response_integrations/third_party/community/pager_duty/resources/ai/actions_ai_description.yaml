Get Incident By ID:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific PagerDuty incident using its unique
    Incident Key. This action is primarily used to fetch the current status, urgency,
    and metadata of an incident from PagerDuty to provide context within a Google
    SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Key | String | Yes | The unique identifier (Incident Key) of the PagerDuty
    incident to retrieve. |

    | Email | String | Yes | The email address of the PagerDuty user performing the
    action. This is required for the 'From' header in PagerDuty API requests. |


    ### Flow Description

    1. **Initialization**: The action extracts the `Incident Key` and `Email` from
    the input parameters and retrieves the API token from the integration configuration.

    2. **API Request**: The action calls the PagerDuty API's `/incidents` endpoint
    using a GET request, passing the user's email in the 'From' header.

    3. **Data Processing**: The script receives a list of incidents and iterates through
    them to find the specific entry where the `incident_key` matches the provided
    input.

    4. **Result Delivery**: If found, the incident details are returned as a JSON
    object. If no match is found, the action completes with a 'No Incident Found'
    message.


    ### Additional Notes

    This action does not operate on SecOps entities (like IPs or Hostnames); it is
    a standalone utility that relies on the provided `Incident Key` parameter.
