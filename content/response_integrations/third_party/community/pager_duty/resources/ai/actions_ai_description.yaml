Create Incident:
  ai_description: >-
    ### General Description

    This action creates a new incident in PagerDuty. It is used to programmatically
    trigger incident response workflows by providing specific details such as title,
    urgency, and description. The incident is associated with a specific service defined
    in the integration configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Details | String | Yes | Detailed information about the incident, such as logs
    or investigation context. |

    | Title | String | Yes | A concise summary of the incident. |

    | Email | String | Yes | The email address of the PagerDuty user creating the
    incident. This is used for attribution in PagerDuty. |

    | Urgency | String | Yes | The urgency level of the incident (e.g., 'high' or
    'low'). |


    ### Additional Notes

    - The **Service ID** used to create the incident is retrieved from the 'Services'
    parameter in the integration configuration.

    - The action returns the full JSON response from PagerDuty, including the incident
    number and ID.


    ### Flow Description

    1. **Initialization**: Retrieves the API token and Service ID from the PagerDuty
    integration configuration.

    2. **Input Collection**: Captures the Title, Email, Urgency, and Details from
    the action parameters.

    3. **API Request**: Sends a POST request to the PagerDuty `/incidents` endpoint
    with the incident payload.

    4. **Completion**: Processes the API response, attaches the incident data to the
    action results, and marks the action as completed.
