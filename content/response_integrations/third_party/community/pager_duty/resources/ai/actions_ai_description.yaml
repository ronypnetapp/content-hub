Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and authentication between Google SecOps and the PagerDuty API. Its primary purpose
    is to ensure that the provided API key is valid and that the network environment
    allows for outbound communication to PagerDuty's infrastructure.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | api_key | String | Yes | The API key used to authenticate with the PagerDuty
    API. This is typically retrieved from the integration configuration. |


    ### Additional Notes

    - This action does not interact with or process any entities (e.g., IPs, Hostnames).

    - It is strictly a connectivity test and does not retrieve or modify any incident
    data.

    - According to standard SOAR practices, this action is not classified as an enrichment
    action.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory `api_key` from
    the integration's configuration settings.

    2. **Client Initialization**: It initializes the `PagerDutyManager` with the provided
    API key to handle HTTP requests.

    3. **Connectivity Test**: The action executes a GET request to the PagerDuty `/abilities`
    endpoint.

    4. **Validation**: If the API responds with a successful status code, the action
    confirms connectivity. If the request fails (e.g., 401 Unauthorized or network
    timeout), an error message is generated.
