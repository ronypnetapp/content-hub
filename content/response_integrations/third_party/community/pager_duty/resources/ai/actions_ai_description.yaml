Filtered Incident List:
  ai_description: >-
    ### General Description

    The **Filtered Incident List** action retrieves a list of incidents from PagerDuty
    based on a variety of user-defined filters. It allows security analysts to search
    for specific incidents by status, urgency, assigned users, teams, or specific
    timeframes, providing a flexible way to query PagerDuty data directly from a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Email** | String | Yes | The email address of the PagerDuty user. While mandatory
    for the action configuration, it is primarily used for auditing and header requirements
    in PagerDuty API interactions. |

    | **Additional_Data** | Multi-select | No | Specifies additional details to include
    in the response, such as 'users', 'services', 'assignees', or 'teams'. |

    | **sort_by** | Multi-select | No | Determines the field to sort by (e.g., incident_number,
    created_at) and the order (asc, desc). |

    | **Urgencies** | Multi-select | No | Filters the results by incident urgency
    level (low or high). |

    | **User_IDS** | String | No | Filters incidents assigned to specific user IDs.
    Can be provided as a single ID or a JSON-formatted list of IDs. |

    | **Team_IDS** | String | No | Filters incidents associated with specific team
    IDs. Supports JSON-formatted lists. |

    | **Incident_Key** | String | No | Filters results by a specific PagerDuty incident
    key. |

    | **Incidents_Statuses** | Multi-select | No | Filters incidents by their current
    state: triggered, acknowledged, or resolved. |

    | **Since** | String | No | The start date for the incident search (format: YYYY-MM-DD).
    |

    | **Until** | String | No | The end date for the incident search (format: YYYY-MM-DD).
    |

    | **Data_Range** | String | No | A predefined data range filter for the query.
    |

    | **Service_IDS** | String | No | Filters incidents associated with specific service
    IDs. |


    ### Additional Notes

    - Parameters that accept multiple values (like `User_IDS` or `Team_IDS`) can be
    passed as a standard string or a JSON array string (e.g., `["P123", "P456"]`).

    - The action performs a read-only query and does not modify any incident data
    in PagerDuty.


    ### Flow Description

    1. **Initialization**: The action initializes the PagerDuty manager using the
    API token from the integration configuration.

    2. **Parameter Parsing**: It extracts all input parameters and processes them,
    converting JSON-formatted strings into Python lists and removing empty values.

    3. **Query Construction**: A dictionary of filter parameters is constructed, mapping
    SOAR inputs to PagerDuty API query keys (e.g., `statuses[]`, `service_ids[]`).

    4. **API Execution**: The action sends a GET request to the PagerDuty `/incidents`
    endpoint with the constructed query parameters.

    5. **Result Handling**: The retrieved list of incidents is attached to the action's
    result as a JSON object, and the execution status is updated based on whether
    incidents were found.
