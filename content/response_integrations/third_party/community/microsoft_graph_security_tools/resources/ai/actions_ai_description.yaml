Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity and authentication configuration between\
    \ Google SecOps and the Microsoft Graph Security API. Its primary purpose is to\
    \ ensure that the provided credentials (Client ID, Secret ID, Tenant ID, or Certificates)\
    \ are valid and that the system can successfully establish a secure session with\
    \ Microsoft's identity platform.\n\n### Parameters Description\nThis action does\
    \ not require any input parameters. It utilizes the global configuration settings\
    \ defined at the integration level.\n\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| N/A | N/A | N/A | This action has no input\
    \ parameters. |\n\n### Additional Notes\n- The action attempts to generate an\
    \ OAuth2 access token. If successful, it confirms that the integration is correctly\
    \ configured.\n- It supports both Client Secret and Certificate-based authentication\
    \ based on the integration's configuration.\n\n### Flow Description\n1. **Configuration\
    \ Retrieval:** The action extracts the integration's configuration parameters,\
    \ including Client ID, Secret ID, Tenant ID, and certificate details.\n2. **Manager\
    \ Initialization:** It initializes the `MicrosoftGraphSecurityManager` using the\
    \ retrieved credentials.\n3. **Authentication Request:** The manager attempts\
    \ to authenticate with the Microsoft Graph API by requesting an access token via\
    \ a POST request to the Microsoft identity endpoint.\n4. **Execution Outcome:**\
    \ \n    - If the token is successfully acquired, the action concludes with a 'Connection\
    \ Established' message and a success status.\n    - If an exception occurs (e.g.,\
    \ network error, invalid credentials), the action logs the error and returns a\
    \ failure status."
