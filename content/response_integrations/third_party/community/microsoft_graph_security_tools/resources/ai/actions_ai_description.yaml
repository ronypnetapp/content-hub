Delete Attachment:
  ai_description: >-
    ### General Description

    The **Delete Attachment** action allows analysts to programmatically remove a
    specific attachment from a user's mailbox within Microsoft 365 using the Microsoft
    Graph API. This is primarily used in incident response scenarios to remediate
    malicious files delivered via email after they have been identified.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | String | Yes | The User ID or User Principal Name (typically the
    email address) of the mailbox owner. |

    | **Message ID** | String | Yes | The unique identifier of the email message that
    contains the attachment. |

    | **Attachment ID** | String | Yes | The unique identifier of the specific attachment
    to be deleted. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to Microsoft Graph
    using the provided Client ID, Tenant ID, and either a Secret ID or a Certificate.

    2. **Parameter Extraction**: It retrieves the target User ID, Message ID, and
    Attachment ID from the action input.

    3. **API Execution**: The action sends a `DELETE` request to the Microsoft Graph
    endpoint: `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`.

    4. **Result Processing**: If the API returns a `204 No Content` status, the action
    reports a successful deletion. Otherwise, it reports a failure with the corresponding
    status code.
  capabilities:
