List Attachments:
  ai_description: >-
    ### General Description

    The **List Attachments** action retrieves metadata for all attachments associated
    with a specific email message in a user's mailbox using the Microsoft Graph API.
    This action is primarily used for forensic analysis and automated investigation
    to identify files (such as malicious documents or executables) sent via email.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | String | Yes | The user's principal name (UPN/email address) or
    unique Azure AD identifier. |

    | **Message ID** | String | No | The unique identifier of the message from which
    to retrieve attachments. Note: While marked as non-mandatory in configuration,
    the API request requires this ID to successfully locate the message. |


    ### Additional Notes

    This action performs a read-only operation and does not download the actual file
    content; it retrieves the attachment objects (metadata) which typically include
    the name, size, and content type.


    ### Flow Description

    1. **Authentication**: The action initializes the Microsoft Graph Security Manager
    using the provided integration credentials (Client ID, Secret/Certificate, and
    Tenant ID).

    2. **Input Extraction**: It extracts the `User ID` and `Message ID` from the action
    parameters.

    3. **API Execution**: It sends a GET request to the Microsoft Graph endpoint:
    `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}/attachments`.

    4. **Data Output**: The resulting list of attachment objects is returned as a
    JSON object and added to the action's execution results.
