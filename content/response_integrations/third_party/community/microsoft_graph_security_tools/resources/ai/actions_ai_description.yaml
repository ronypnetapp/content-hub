Delete Message:
  ai_description: "### General Description\nThe **Delete Message** action allows security\
    \ analysts to programmatically remove specific email messages from one or more\
    \ Microsoft 365 mailboxes. This is primarily used for incident response, such\
    \ as removing phishing emails or malicious attachments from user inboxes after\
    \ they have been identified. The action interacts with the Microsoft Graph API\
    \ to perform a hard delete of the specified message.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Message ID** | string | Yes | The unique identifier of the email message to\
    \ be deleted. This is typically retrieved from previous search or listing actions.\
    \ |\n| **User ID** | string | Yes | The email address (userPrincipalName) or unique\
    \ ID of the user whose mailbox contains the message. This parameter supports a\
    \ comma-separated list (CSV) to target multiple mailboxes simultaneously. |\n\n\
    ### Flow Description\n1.  **Authentication**: The action initializes a connection\
    \ to the Microsoft Graph Security API using the configured Client ID, Secret/Certificate,\
    \ and Tenant ID.\n2.  **Input Parsing**: It retrieves the `Message ID` and `User\
    \ ID` from the action parameters. If the `User ID` contains commas, it is split\
    \ into a list of individual users.\n3.  **API Execution**: For each user provided,\
    \ the action sends a `DELETE` request to the Microsoft Graph endpoint: `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}`.\n\
    4.  **Result Processing**: The action checks the HTTP response status. A `204\
    \ No Content` status indicates a successful deletion. \n5.  **Finalization**:\
    \ The action reports the overall success or failure and attaches the raw JSON\
    \ response data to the action results in Google SecOps.\n\n### Additional Notes\n\
    - This action performs a permanent deletion of the message.\n- If multiple User\
    \ IDs are provided via CSV, the action will attempt to delete the message with\
    \ the same `Message ID` from every specified mailbox."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes email messages from specified user mailboxes in Microsoft 365 using
      the Microsoft Graph API.
    fetches_data: false
    internal_data_mutation_explanation: null
