Get User MFA:
  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) registration and status details for
    users from Microsoft Graph. This action is designed to provide visibility into
    a user's security posture by checking if they have MFA enabled, registered, and
    which authentication methods are in use. It targets a specific email provided
    as a parameter and also processes email-based entities within the case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Email | String | Yes | The primary User Principal Name (UPN) to query.
    This will always be the first result in the output JSON. |

    | Create Insight | Boolean | No | If enabled, the action will create a detailed
    insight in the case for every user found with MFA statistics. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Microsoft Graph API using
    the configured Client ID, Secret, and Tenant ID.

    2. **Primary Query**: Fetches MFA registration details for the specific email
    provided in the 'User Email' parameter.

    3. **Entity Processing**: Scans all entities associated with the current case.
    For any entity whose identifier contains an '@' symbol (identifying it as a potential
    email/UPN), the action performs a lookup for its MFA status.

    4. **Insight Generation**: If 'Create Insight' is set to true, the action generates
    a formatted insight for the primary user and each discovered entity, detailing
    registration status, enablement, and authentication methods.

    5. **Results**: Aggregates all found MFA records into a JSON result and completes
    the execution.


    ### Additional Notes

    The action utilizes the Microsoft Graph Beta endpoint (`/beta/reports/credentialUserRegistrationDetails`)
    to retrieve comprehensive MFA data. The JSON result will always return the 'User
    Email' input first at index zero.
