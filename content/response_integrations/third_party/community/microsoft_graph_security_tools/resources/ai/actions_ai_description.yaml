Get Message:
  ai_description: >-
    ### General Description

    Retrieves the full details of a specific email message from a user's Microsoft
    365 inbox using the Microsoft Graph API. This action is primarily used for forensic
    investigation and incident response to inspect the content, headers, and metadata
    of a specific email.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | string | Yes | The email address or userPrincipalName of the user
    whose inbox contains the message. |

    | Message ID | string | Yes | The unique identifier of the specific email message
    to retrieve from the Microsoft Graph API. |


    ### Flow Description

    1. **Authentication**: The action initializes the Microsoft Graph Security Manager
    using the integration's configuration parameters (Client ID, Secret/Certificate,
    and Tenant ID).

    2. **Parameter Extraction**: It extracts the `User ID` and `Message ID` provided
    as action inputs.

    3. **Data Retrieval**: It performs a GET request to the Microsoft Graph endpoint
    `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}`.

    4. **Result Processing**: The retrieved message data is added to the action's
    JSON results and the execution is marked as completed.


    ### Additional Notes

    This action does not operate on SecOps entities (like IP or Hostname) but instead
    uses explicit input parameters to target a specific message in a specific mailbox.
