List Messages:
  ai_description: >-
    ### General Description

    The **List Messages** action retrieves a list of email messages from a specified
    user's mailbox using the Microsoft Graph API. This action is primarily used for
    investigative purposes, allowing analysts to search for specific emails or list
    recent activity within a mailbox without modifying the content.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | String | Yes | The User ID or userPrincipalName (email address)
    of the target mailbox. |

    | **Select Filter** | String | No | A comma-separated list of specific message
    fields to return (e.g., `subject,sender,receivedDateTime`). If omitted, default
    fields are returned. |

    | **Query Parameters** | String | No | OData query parameters used to filter the
    results. It should begin with `$` (e.g., `$filter=subject eq 'Urgent'`). |


    ### Flow Description

    1. **Authentication**: The action establishes a session with Microsoft Graph using
    the integration's Client ID, Secret, and Tenant ID.

    2. **Parameter Processing**: It extracts the target User ID and any optional OData
    query or selection filters provided by the user.

    3. **Request Construction**: The action builds a GET request targeting the `/users/{user_id}/messages`
    endpoint, incorporating the `$select` and `$filter` parameters into the query
    string.

    4. **Data Retrieval**: It executes the API call to fetch the message data from
    the Microsoft 365 environment.

    5. **Result Processing**: The retrieved list of messages is formatted and added
    to the action's JSON results, making the data available for subsequent playbook
    steps.


    ### Additional Notes

    - This action is a read-only operation and does not impact the state of the mailbox
    or the messages within it.

    - Ensure that the OData syntax in the `Query Parameters` field follows Microsoft
    Graph specifications to avoid API errors.
