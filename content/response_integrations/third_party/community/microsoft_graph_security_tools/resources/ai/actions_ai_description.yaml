List Mail Rules:
  ai_description: >-
    ### General Description

    The **List Mail Rules** action retrieves all message rules (messageRule objects)
    defined for a specific user's Inbox in Microsoft 365. This action is useful for
    security investigations to identify suspicious mail forwarding, deletion, or redirection
    rules that might indicate account compromise or data exfiltration.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **User ID** | The `userPrincipalName` (typically the email address) of the user
    whose inbox rules you want to retrieve. | String | Yes |


    ### Flow Description

    1.  **Authentication**: The action initializes a connection to the Microsoft Graph
    API using the provided Client ID, Secret/Certificate, and Tenant ID from the integration
    configuration.

    2.  **Parameter Extraction**: It retrieves the target `User ID` from the action
    input.

    3.  **Data Retrieval**: It calls the Microsoft Graph API endpoint `GET /users/{id}/mailFolders/inbox/messageRules`
    to fetch the list of rules.

    4.  **Result Processing**: The retrieved list of mail rules is attached to the
    action's result as a JSON object, and the action completes successfully.


    ### Additional Notes

    *   This action is read-only and does not modify any settings in the user's mailbox.

    *   The output includes rule details such as conditions, actions (e.g., move to
    folder, delete), and whether the rule is enabled.
