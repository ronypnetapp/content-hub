Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity between Google SecOps and
    the Docker Hub instance. It ensures that the provided credentials (Username and
    Password) are valid and that the environment can successfully communicate with
    the Docker Hub API.


    ### Parameters Description

    There are no parameters for this action. It relies entirely on the integration's
    global configuration for authentication.


    ### Additional Notes

    - This action is a standard connectivity test and does not process any entities
    or modify any data.

    - Although the metadata description mentions inviting users, the actual implementation
    code performs a connectivity check via the `test_connectivity` method.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify SDK and sets the script
    name.

    2. **Configuration Retrieval**: It fetches the Username and Password from the
    Docker Hub integration configuration.

    3. **Authentication**: It instantiates the Docker Hub manager, which triggers
    a login process (POST request) to obtain a JWT authentication token.

    4. **Connectivity Test**: It calls the `test_connectivity` method, which performs
    a GET request to the `_catalog` endpoint of the Docker Hub API.

    5. **Completion**: If the request is successful, the action terminates with a
    success status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
