Invite User:
  ai_description: "Invites a user to a specific team within a Docker Hub organization\
    \ using their email address. This action facilitates user management by automating\
    \ the invitation process to organizational groups.\n\n### Parameters\n| Parameter\
    \ | Description | Type | Mandatory | \n| --- | --- | --- | --- |\n| Organization\
    \ | The name of the Docker Hub organization where the team resides. | string |\
    \ Yes |\n| Team | The specific team name within the organization to which the\
    \ user will be invited. | string | Yes |\n| Email | The email address of the user\
    \ to receive the invitation. | string | Yes |\n\n### Flow Description\n1. **Authentication**:\
    \ The action authenticates with the Docker Hub API using the credentials (Username\
    \ and Password) provided in the integration configuration.\n2. **Parameter Retrieval**:\
    \ It extracts the Organization, Team, and Email values from the action parameters.\n\
    3. **API Request**: It executes a POST request to the Docker Hub endpoint `orgs/{org}/groups/{team}/members`\
    \ with the user's email.\n4. **Outcome Reporting**: The action returns a success\
    \ status if the invitation is sent successfully or logs the error if the request\
    \ fails."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user invitation record within the specified Docker Hub organization
      and team.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
