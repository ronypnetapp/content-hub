Ping:
  ai_description: >-
    ### General Description

    This action is designed to verify the connectivity between Google SecOps and the
    beSECURE instance. It serves as a health check to ensure that the provided configuration
    (URL and API Key) is valid and that the beSECURE API is reachable and responding
    correctly.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration settings (URL, API Key, and SSL verification).


    ### Flow Description

    1. **Configuration Retrieval**: The action starts by fetching the integration's
    configuration, including the API Key, URL, and SSL verification preference.

    2. **Data Sanitization**: The API Key is cleaned of any non-alphanumeric characters
    (excluding hyphens) to ensure a valid request format.

    3. **Connectivity Test**: The action performs a GET request to the beSECURE `/json.cgi`
    endpoint. It specifically requests a list of networks (`action=returnnetworks`)
    with a search limit and a recent scan time filter to validate that the API can
    process administrative queries.

    4. **Response Validation**: The script checks the JSON response for any error
    keys. If the request is successful and no errors are returned, the action completes
    with a success status. If an error is detected or the request fails, the action
    reports a failure.


    ### Additional Notes

    This is a standard 'Ping' action used primarily for troubleshooting integration
    setup and verifying credentials.
