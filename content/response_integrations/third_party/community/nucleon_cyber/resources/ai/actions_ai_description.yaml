GetIPs:
  ai_description: >-
    ### General Description

    The **GetIPs** action retrieves a feed of active cyber threat intelligence from
    the Nucleon Cyber Active Threats API. It is designed to provide security teams
    with a list of recently collected malicious or suspicious IP addresses and associated
    metadata to be used for further analysis or automated blocking in a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **limit** | String | Yes | Specifies the maximum number of threat records to
    retrieve from the API. Default is "10". |


    ### Additional Notes

    - This action requires valid Nucleon Cyber credentials (Username, Password, Client
    Name, and Client ID) configured at the integration level.

    - The action does not process specific entities from the SOAR case; instead, it
    fetches a global feed of data.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API credentials
    and the `limit` parameter.

    2. **API Request**: It performs a POST request to the Nucleon Cyber `activethreats`
    endpoint using Basic Authentication.

    3. **Error Handling**: The script checks for successful authentication and valid
    response codes. If authentication fails or the data section is missing, it raises
    an exception.

    4. **Data Processing**: The "data" section of the JSON response is extracted.

    5. **Output Generation**: The retrieved threat data is added to the action's JSON
    results, making it available for downstream playbook tasks.
