Ping:
  ai_description: >-
    ### General Description The Ping action is designed to verify the connectivity
    between Google SecOps and the NucleonCyber API. It ensures that the provided credentials
    and client identifiers are valid and that the service is reachable. ### Parameters
    Description | Parameter | Type | Mandatory | Description | | :--- | :--- | :---
    | :--- | | limit | String | Yes | Specifies the maximum number of results to request
    from the API during the connectivity test. | ### Flow Description 1. Configuration
    Retrieval: The action fetches the integration's global settings, including the
    Username, Password, Client Name, and Client ID. 2. Parameter Extraction: It retrieves
    the limit parameter from the action input. 3. API Request: It executes a POST
    request to the NucleonCyber activethreats endpoint using Basic Authentication.
    4. Validation: The action checks if the API returns a HTTP 200 status code. 5.
    Completion: If successful, it reports a Successful Connection.
