Stop Instance:
  ai_description: >-
    ### General Description

    Stops one or more specified AWS EC2 instances. This action interacts with the
    AWS EC2 service to transition instances from a running state to a stopped state.
    It supports stopping multiple instances simultaneously and provides an option
    to force the shutdown. Because instance shutdown can take time, the action is
    designed to run asynchronously, tracking the state until the instances are confirmed
    as stopping or stopped.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | String | Yes | A comma-separated list of AWS EC2 instance identifiers
    (e.g., `i-0123456789abcdef0, i-0abcdef1234567890`) to be stopped. |

    | Force Instance To Stop | Boolean | No | If set to `true`, forces the instance
    to stop immediately without flushing file system caches or metadata. Default is
    `false`. |


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials (Access Key, Secret Key) and
    the default region from the integration configuration.

    2. **Parameter Parsing**: Extracts the list of instance IDs from the action parameters
    and splits them into individual identifiers.

    3. **Execution**: Iterates through each instance ID and calls the AWS EC2 `stop_instances`
    API via the `EC2Manager`.

    4. **State Monitoring**: Evaluates the response for each instance:
        * If the state is `stopping`, the instance is added to a tracking list, and
    the action status is set to `IN_PROGRESS` to allow for asynchronous completion.
        * If the state is `stopped`, the instance is marked as successfully stopped.
        * If the instance is in an incompatible state or an error occurs, an exception
    is logged for that specific instance.
    5. **Result Reporting**: Returns the total count of successfully stopped instances
    as the result value and provides detailed JSON data for each processed instance.
