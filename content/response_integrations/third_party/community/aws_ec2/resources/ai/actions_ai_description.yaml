Revoke Security Group ingress:
  ai_description: >-
    ### General Description

    This action revokes specific inbound (ingress) IP permissions from a designated
    AWS EC2 Security Group within a VPC. It is primarily used for containment or security
    posture management by removing existing rules that allow network traffic based
    on protocol, port ranges, and CIDR blocks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | No | The unique identifier of the security group (e.g.,
    `sg-1a2b3c4d`) from which you want to revoke inbound permissions. |

    | IP Permissions | code | No | A JSON-formatted string defining the specific IP
    permissions to be removed. It should include keys like `FromPort`, `ToPort`, `IpProtocol`,
    and `IpRanges`. |


    ### Additional Notes

    - This action interacts directly with the AWS EC2 API using the `boto3` library.

    - While the parameters are marked as not mandatory in the configuration, the action
    logic requires both a valid `Group ID` and `IP Permissions` JSON to successfully
    execute the revocation request to AWS.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves AWS credentials (Access
    Key ID, Secret Access Key) and the default region from the integration settings.

    2. **Parameter Parsing**: It extracts the `Group ID` and the `IP Permissions`
    string from the action input. The `IP Permissions` string is parsed from JSON
    into a Python dictionary.

    3. **Manager Initialization**: An instance of the `EC2Manager` is created using
    the provided AWS credentials and region.

    4. **Revocation Execution**: The action calls the `revoke_security_group_ingress`
    method in the manager, which sends a request to the AWS EC2 service to remove
    the specified rules.

    5. **Result Handling**: If successful, the API response is added to the action's
    JSON results, and the action completes with a success message. If an error occurs
    during the API call, it is logged, and the action reports a failure.
