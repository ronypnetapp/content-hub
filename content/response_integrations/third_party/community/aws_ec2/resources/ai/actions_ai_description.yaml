Authorize Security Group Ingress:
  ai_description: >-
    ### General Description

    The **Authorize Security Group Ingress** action adds or updates inbound (ingress)
    IP permissions for a specific AWS Security Group within a VPC. This action is
    used to programmatically modify network access rules, allowing traffic from specified
    IP ranges, protocols, and ports to reach AWS resources associated with the security
    group.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Group ID** | String | No | The unique identifier of the AWS Security Group
    (e.g., `sg-1a2b3c4d`) to which the inbound rules will be added. |

    | **IP Permissions** | Code (JSON) | No | A JSON-formatted string defining the
    ingress rule. It typically includes `IpProtocol` (e.g., 'tcp'), `FromPort`, `ToPort`,
    and `IpRanges` (containing `CidrIp`). |


    ### Flow Description

    1. **Credential Retrieval:** The action extracts AWS Access Key ID, Secret Access
    Key, and Default Region from the integration configuration.

    2. **Parameter Extraction:** It retrieves the target `Group ID` and the `IP Permissions`
    JSON string from the action parameters.

    3. **Data Parsing:** The `IP Permissions` string is parsed from JSON into a dictionary
    format required by the AWS SDK.

    4. **AWS API Call:** The action utilizes the `EC2Manager` to invoke the `authorize_security_group_ingress`
    method, which communicates with the AWS EC2 service to apply the new rules.

    5. **Result Processing:** The response from AWS is captured and attached as a
    JSON result. The action concludes with a success message if the rules were applied
    successfully, or an error message if the operation failed.


    ### Additional Notes

    - This action performs a state-changing operation in the external AWS environment.

    - Although parameters are marked as non-mandatory in the configuration, the action
    logic expects valid values to successfully execute the AWS API call.
