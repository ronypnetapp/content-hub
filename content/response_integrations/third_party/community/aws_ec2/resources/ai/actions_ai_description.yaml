Create Tags:
  ai_description: >-
    ### General Description

    This action creates or overwrites tags for specified AWS EC2 resources, such as
    instances, volumes, or security groups. It allows users to programmatically manage
    metadata for their AWS infrastructure directly from Google SecOps by providing
    a list of resource IDs and a JSON-formatted set of tags.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Resources ID | A comma-separated list of AWS resource IDs (e.g., i-1234567890abcdef0)
    that you want to tag. | String | Yes |

    | Tags | A JSON-formatted string defining the tags to be applied. It must follow
    the structure: `{"tags": [{"Key": "key1", "Value": "value1"}]}`. | Code | Yes
    |


    ### Additional Notes

    - This action is case-sensitive regarding tag keys and values.

    - If a tag key already exists on a resource, its value will be overwritten by
    the new value provided in this action.

    - Each resource can have a maximum of 50 tags.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves AWS credentials (Access Key,
    Secret Key, Region) from the integration configuration and the target Resource
    IDs and Tags from the action parameters.

    2. **Data Parsing**: The `Tags` parameter is parsed from a JSON string into a
    Python list, and the `Resources ID` string is split into individual identifiers.

    3. **AWS Interaction**: For each provided Resource ID, the action calls the AWS
    EC2 `create_tags` API via the `EC2Manager` to apply the specified tag set.

    4. **Result Logging**: The action tracks which resources were successfully tagged
    and which encountered errors.

    5. **Final Output**: Success and failure details are added to the action's JSON
    results, and a summary message is displayed in the SOAR interface.
  capabilities:
