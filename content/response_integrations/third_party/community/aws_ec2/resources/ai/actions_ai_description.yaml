Find Instance:
  ai_description: >-
    ### General Description

    This action fetches detailed information about specific AWS EC2 instances or searches
    for instances based on provided filters. It is primarily used for visibility and
    data gathering regarding the state and configuration of virtual machines within
    an AWS environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | String | No | A comma-separated list of AWS Instance IDs (e.g.,
    i-1234567890abcdef0). If provided, the action fetches details for these specific
    instances. |

    | Filters | Content (JSON) | No | A JSON-formatted string defining filters to
    apply to the search (e.g., `{"Name": "instance-type", "Values": ["t2.micro"]}`).
    |

    | Max Results | String | No | The maximum number of instances to return in the
    result set, ranging from 5 to 1000. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves AWS credentials (Access Key,
    Secret Key, Region) and the user-provided parameters (Instance IDs, Filters, Max
    Results).

    2. **Manager Initialization:** An EC2 Manager is initialized to handle communication
    with the AWS API using the Boto3 library.

    3. **Data Retrieval:**
        - If **Instance Ids** are provided: The action iterates through the list and
    calls the `describe_instances` API for each ID individually.
        - If **Instance Ids** are NOT provided: The action performs a single `describe_instances`
    call using the provided **Filters** and **Max Results**.
    4. **Result Processing:** The action collects the metadata for all found instances
    and formats it into a JSON object.

    5. **Completion:** The action outputs the JSON result and a summary message indicating
    which instances were successfully retrieved.


    ### Additional Notes

    - If neither **Instance Ids** nor **Filters** are specified, the action will attempt
    to return information for all instances in the configured region (subject to the
    **Max Results** limit).

    - This action is read-only and does not modify any AWS resources.
