Revoke Security Group Egress:
  ai_description: >-
    ### General Description

    Revokes specified outbound (egress) IP permissions from a specific AWS EC2 Security
    Group within a VPC. This action is used to tighten network security by removing
    existing rules that allow traffic to leave the environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | No | The unique identifier of the security group (e.g.,
    sg-1a2b3c4d) from which permissions will be revoked. |

    | IP Permissions | Code (JSON) | No | A JSON-formatted object defining the protocol,
    port range, and CIDR blocks to be removed. Example: `{"FromPort": 80, "IpProtocol":
    "tcp", "IpRanges": [{"CidrIp": "1.1.1.1/16"}], "ToPort": 80}`. |


    ### Additional Notes

    - While parameters are marked as non-mandatory in the configuration, providing
    both the `Group ID` and valid `IP Permissions` is required for the action to successfully
    execute the revocation logic.

    - This action interacts directly with the AWS EC2 API and requires appropriate
    IAM permissions (`ec2:RevokeSecurityGroupEgress`).


    ### Flow Description

    1. **Configuration Extraction**: Retrieves AWS credentials (Access Key ID, Secret
    Access Key) and the default region from the integration settings.

    2. **Parameter Parsing**: Extracts the target Security Group ID and the IP permissions
    JSON string, converting the latter into a Python dictionary.

    3. **API Interaction**: Utilizes the `EC2Manager` to call the AWS Boto3 `revoke_security_group_egress`
    method.

    4. **Result Processing**: Captures the API response, logs the outcome, and provides
    the raw JSON result to the SOAR platform.
