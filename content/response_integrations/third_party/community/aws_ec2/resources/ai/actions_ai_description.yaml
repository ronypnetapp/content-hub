Authorize Security Group Egress:
  ai_description: "### General Description\nThis action adds or updates outbound (egress)\
    \ IP permissions for a specific AWS EC2 Security Group within a VPC. It allows\
    \ administrators to programmatically define network traffic rules, such as allowed\
    \ protocols, port ranges, and destination IP ranges (CIDR), directly from Google\
    \ SecOps.\n\n### Parameters Description\n| Parameter | Description | Type | Mandatory\
    \ |\n| :--- | :--- | :--- | :--- |\n| Group ID | The unique identifier of the\
    \ security group (e.g., sg-1a2b3c4d) where the outbound rules will be applied.\
    \ | String | Yes |\n| IP Permissions | A JSON-formatted string defining the egress\
    \ rules. This includes fields like `FromPort`, `ToPort`, `IpProtocol`, and `IpRanges`\
    \ (containing `CidrIp`). | Code | Yes |\n\n### Additional Notes\n- The `IP Permissions`\
    \ parameter must be a valid JSON array or object as expected by the Boto3 EC2\
    \ client. \n- This action performs a state-changing operation in the AWS environment.\n\
    \n### Flow Description\n1. **Credential Retrieval**: Extracts AWS Access Key,\
    \ Secret Key, and Default Region from the integration configuration.\n2. **Parameter\
    \ Extraction**: Retrieves the target Security Group ID and the JSON-formatted\
    \ IP permissions from the action input.\n3. **JSON Parsing**: Converts the `IP\
    \ Permissions` string into a structured Python dictionary/list.\n4. **AWS API\
    \ Interaction**: Uses the `EC2Manager` to call the AWS `authorize_security_group_egress`\
    \ API with the provided parameters.\n5. **Result Processing**: Captures the API\
    \ response, logs the outcome, and attaches the raw JSON result to the action output\
    \ for use in subsequent playbook steps."
