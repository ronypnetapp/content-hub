Create Instance:
  ai_description: >-
    ### General Description

    Creates one or more Amazon EC2 instances based on a specified Amazon Machine Image
    (AMI). This action is designed to be asynchronous, polling the AWS environment
    until the instances transition from a 'pending' state to a 'running' state.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image ID | String | No | The AMI ID used to create the instance (e.g., `ami-12345`).
    |

    | Instance Type | String | No | The hardware configuration for the instance (e.g.,
    `m1.small`). Defaults to `m1.small` if not provided. |

    | Max Count | String | Yes | The maximum number of instances to launch. |

    | Min Count | String | Yes | The minimum number of instances to launch. |

    | Security Group ID | String | No | Comma-separated list of Security Group IDs
    to associate with the instances. |


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials and region from the
    integration configuration and parameters from the action settings.

    2. **Instance Creation (First Run)**: It calls the AWS EC2 `run_instances` API
    to initiate the creation of the specified number of instances.

    3. **State Check**: If the created instances are in a `pending` state, the action
    saves the instance IDs and sets the execution status to `IN_PROGRESS`.

    4. **Polling (Subsequent Runs)**: The action periodically checks the status of
    the pending instances using the `describe_instances` API.

    5. **Completion**: Once all instances reach the `running` state, the action completes
    and returns the full JSON details of the created instances.


    ### Additional Notes

    This action requires the AWS EC2 integration to be configured with valid Access
    Key ID, Secret Access Key, and Default Region.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new EC2 instances in the AWS environment based on the provided AMI and
      configuration.
    fetches_data: true
    internal_data_mutation_explanation: null
