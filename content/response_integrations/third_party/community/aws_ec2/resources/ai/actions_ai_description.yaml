Delete Instance:
  ai_description: >-
    ### General Description

    Deletes (terminates) specific Amazon EC2 instances within a specified AWS region.
    This action is used to permanently remove virtual server instances from an AWS
    environment. It supports processing multiple instances in a single execution and
    handles the asynchronous nature of AWS instance termination.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | Content | Yes | A comma-separated list of EC2 instance IDs to
    be deleted (e.g., `i-1234567890abcdef0, i-0987654321fedcba0`). |


    ### Flow Description

    1. **Credential Extraction**: Retrieves AWS Access Key ID, Secret Access Key,
    and Default Region from the integration configuration.

    2. **Input Parsing**: Extracts the `Instance Ids` parameter and splits the comma-separated
    string into a list of individual identifiers.

    3. **Instance Termination**: Iterates through the list of instance IDs and calls
    the AWS EC2 `terminate_instances` API for each.

    4. **State Verification**: Evaluates the `CurrentState` returned by AWS. If an
    instance is in the `shutting-down` state, the action status is set to `IN_PROGRESS`
    (async). If the state is `terminated`, the instance is logged as successfully
    deleted.

    5. **Result Reporting**: Adds the raw API response for each successfully terminated
    instance to the JSON results and returns the total count of deleted instances
    as the final result value.


    ### Additional Notes

    - Deleted instances remain visible in the AWS console for approximately one hour
    after termination.

    - The action will log an error for any instance that cannot be transitioned to
    a terminated state from its current state.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Terminates (deletes) EC2 instances in the target AWS account and region, which
      is a permanent state change for those resources.
