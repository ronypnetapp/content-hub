Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches **USER** entities (email addresses) using the Full Contact API. This
    action retrieves comprehensive data about both the individual (e.g., job title,
    gender, LinkedIn profile) and the organization associated with their email domain
    (e.g., company name, industry, employee count, location). It enhances the context
    of a case by populating entity properties with external identity and firmographic
    intelligence.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    * The action requires a valid Full Contact API Key to be configured in the integration
    settings.

    * It specifically targets entities of type **USER** (interpreted as email addresses).

    * It handles the asynchronous nature of the Full Contact API by polling when a
    `202 Accepted` status is received during domain enrichment.


    ### Flow Description

    1. **Configuration Retrieval**: Fetches the API Key from the 'Full Contact' integration
    configuration.

    2. **Entity Filtering**: Iterates through the target entities and selects those
    identified as `USER` types.

    3. **Domain Extraction**: Parses the email address of the user entity to extract
    the domain name.

    4. **Company Enrichment**: Queries the Full Contact `company.enrich` endpoint
    using the extracted domain. It includes logic to retry if the API returns a 202
    status.

    5. **Person Enrichment**: Queries the Full Contact `person.enrich` endpoint using
    the user's email address.

    6. **Data Mapping**: Maps the retrieved JSON data (Company Name, Industry, Founded
    Year, Employees, Website, Location, Gender, Title, LinkedIn) to a local dictionary.

    7. **Internal Update**: Updates the `additional_properties` of the entity within
    Google SecOps with the enriched data.

    8. **Finalization**: Updates the entities in the case and returns a JSON result
    containing the enrichment details for all processed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' field of USER entities with data retrieved
      from Full Contact.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Full Contact service. Its primary purpose is to ensure that the integration's
    API Key is correctly configured and that the environment can successfully communicate
    with the Full Contact API endpoints.


    ### Parameters Description

    There are no user-facing parameters for this action. It relies entirely on the
    'API Key' provided in the integration's configuration settings.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'API Key' from the Full
    Contact integration configuration.

    2. **API Connection Attempt**: It initializes a connection to the Full Contact
    API and performs a test request to the company enrichment endpoint (`https://api.fullcontact.com/v3/company.enrich`)
    using the hardcoded domain 'google.com'.

    3. **Validation**: The action checks the response from the API. If a 401 Unauthorized
    status is returned, it raises an exception to notify the user of invalid credentials.

    4. **Result Reporting**: If the request is successful, the action returns a success
    message and a boolean result of `True`.


    ### Additional Notes

    This action does not interact with or process any entities within a case. It is
    a diagnostic tool used for integration setup and troubleshooting.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
