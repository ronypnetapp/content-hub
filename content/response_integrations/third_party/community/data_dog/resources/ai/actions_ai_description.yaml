Get RDS Metric:
  ai_description: >-
    ### General Description

    Retrieves AWS RDS performance metrics from DataDog for specific database instances.
    This action fetches time-series data for CPU utilization, freeable memory, and
    free storage space within a user-defined time range. It is designed to provide
    visibility into the health and resource consumption of RDS databases directly
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database Instance Identifier | String | Yes | A comma-separated list of AWS
    RDS database instance identifiers (e.g., 'db-1, db-2') to query metrics for. |

    | Start Time | String | Yes | The start of the metric query period in Unix timestamp
    format (e.g., '1507040000'). |

    | End Time | String | Yes | The end of the metric query period in Unix timestamp
    format (e.g., '1610557457'). |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the DataDog API and APP keys
    from the integration configuration and the database identifiers and time range
    from the action parameters.

    2. **Identifier Parsing**: The provided string of database identifiers is split
    into a list for individual processing.

    3. **Metric Retrieval**: For each database identifier, the action performs three
    distinct API calls to DataDog:
        *   Fetches CPU utilization metrics (`aws.rds.cpuutilization`).
        *   Fetches freeable memory metrics (`aws.rds.freeable_memory`).
        *   Fetches free storage space metrics (`aws.rds.free_storage_space`).
    4. **Data Validation**: The action verifies that the API responses have a status
    of 'ok' and contain actual time-series data points.

    5. **Result Aggregation**: Successful metrics are aggregated into a JSON result
    object, while identifiers that returned no data are tracked separately.

    6. **Final Output**: The action returns the aggregated JSON data and a summary
    message indicating success or failure for the requested identifiers.
