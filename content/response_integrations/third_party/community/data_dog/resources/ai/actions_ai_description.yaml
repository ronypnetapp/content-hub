Get Pod Metric:
  ai_description: >-
    ### General Description

    The **Get Pod Metric** action retrieves performance data and process information
    for one or more Kubernetes Pods from DataDog. It specifically fetches CPU utilization,
    memory usage percentages, and a list of active processes associated with the specified
    pods within a defined time range. This action is useful for troubleshooting performance
    issues or investigating suspicious activity within a Kubernetes environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Pod Name | String | Yes | A comma-separated list of Kubernetes Pod names to
    retrieve metrics for. |

    | Start Time | String | Yes | The start time for the metric query in Unix timestamp
    format (e.g., 1507040000). |

    | End Time | String | Yes | The end time for the metric query in Unix timestamp
    format (e.g., 1610557457). |


    ### Additional Notes

    This action does not automatically iterate over Google SecOps entities. It relies
    entirely on the pod names provided in the `Pod Name` parameter. If multiple pod
    names are provided, the action will iterate through each and aggregate the results
    into a single JSON output.


    ### Flow Description

    1. **Initialization**: The action extracts the DataDog API Key and APP Key from
    the integration configuration.

    2. **Parameter Parsing**: It retrieves the `Pod Name`, `Start Time`, and `End
    Time` from the action parameters. The `Pod Name` string is split by commas into
    a list of individual pod identifiers.

    3. **Data Retrieval**: For each pod in the list, the action performs three distinct
    queries to DataDog:
        *   **CPU Metrics**: Fetches the average CPU system total for the pod.
        *   **Memory Metrics**: Fetches the average memory usage percentage for the
    pod.
        *   **Process Information**: Retrieves a list of active processes tagged with
    the specific `pod_name`.
    4. **Result Aggregation**: The retrieved metrics and process data for each pod
    are stored in a structured dictionary.

    5. **Final Output**: The action adds the aggregated data as a JSON result to the
    action execution and provides a summary message indicating which metrics were
    successfully retrieved.
