Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the DataDog platform. It ensures that the provided API Key and
    Application Key are valid and that the network path to the DataDog API is open.


    ### Parameters

    There are no action-specific parameters for this task. It relies entirely on the
    integration's global configuration parameters:

    * **API Key**: The secret key used to authenticate requests to DataDog.

    * **APP Key**: The application key used to identify the specific application making
    the request.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `API Key` and `APP Key`
    from the DataDog integration settings.

    2. **Manager Initialization**: It initializes the `DataDogManager` with the retrieved
    credentials.

    3. **Connectivity Test**: The action calls the DataDog `/api/v1/validate` endpoint
    via a GET request.

    4. **Validation**: It checks the response for a `valid: True` status.

    5. **Result Reporting**: If valid, it returns a success message; otherwise, it
    reports a connection failure.
