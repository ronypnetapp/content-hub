Get Metric Timeseries Points:
  ai_description: >-
    ### General Description

    Retrieves timeseries data points for a specific metric query from Datadog within
    a defined time range. This action allows analysts to fetch granular monitoring
    data directly into a case for investigation, performance analysis, or anomaly
    detection.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | Yes | The Datadog metric query to execute. Example: `avg:aws.rds.dbload{dbinstanceidentifier:db}by{dbinstanceidentifier}`.
    |

    | Start Time | string | Yes | The start time of the timeseries points in Unix
    timestamp format (e.g., 1400000470). |

    | End Time | string | Yes | The end time of the timeseries points in Unix timestamp
    format (e.g., 1610557457). |


    ### Flow Description

    1. **Initialization**: The action extracts the Datadog API Key and APP Key from
    the integration configuration.

    2. **Input Retrieval**: It captures the user-provided metric query and the start/end
    Unix timestamps.

    3. **API Execution**: The action calls the Datadog `v1/query` endpoint via the
    `DataDogManager` to fetch the requested timeseries data.

    4. **Validation**: It verifies if the API response status is "ok" and checks if
    any data series were returned.

    5. **Output**: The raw JSON response from Datadog is attached to the action results,
    and a success message is generated if data points were found.


    ### Additional Notes

    This action is a utility query tool and does not automatically map data to specific
    entities in the Google SecOps environment.
