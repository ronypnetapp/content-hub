Get Events:
  ai_description: >-
    ### General Description

    This action retrieves event logs from DataDog based on a specified time range
    and filtering criteria. It is designed to fetch historical or real-time event
    data from various sources within the DataDog environment, allowing analysts to
    review triggered monitors, alerts, or other system events directly within Google
    SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sources | String | Yes | Specifies the sources to retrieve events from (e.g.,
    'alert' to see events from triggered monitors). |

    | Start Time | String | Yes | The start time for the event search in Unix timestamp
    format. |

    | End Time | String | Yes | The end time for the event search in Unix timestamp
    format. |

    | Priority | DDL | No | Filters events by priority level. Options include 'all',
    'normal', or 'low'. Default is 'all'. |

    | Tags | String | No | A comma-separated list of tags to filter the events by
    scope (e.g., 'monitor'). |

    | Unaggregated | Boolean | No | If set to 'true', retrieves the full list of events.
    If 'false', retrieves an aggregated list. |


    ### Additional Notes

    This action does not operate on specific entities within the case; instead, it
    performs a global search based on the provided time and filter parameters. The
    results are returned as a JSON array.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the API Key and APP Key
    from the DataDog integration settings.

    2. **Parameter Processing:** It extracts the search filters including time range
    (Start/End), sources, priority, tags, and aggregation preference.

    3. **API Interaction:** The action uses the `DataDogManager` to perform a GET
    request to the DataDog `/api/v1/events` endpoint with the specified query parameters.

    4. **Result Handling:** If events are successfully retrieved, they are attached
    to the action's JSON results. The action then concludes with a status message
    indicating whether data was found.
