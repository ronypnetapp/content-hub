Get Logs:
  ai_description: >-
    ### General Description

    Retrieves Kubernetes logs from DataDog for specific namespaces within a defined
    time range. This action allows security analysts to gather log data for troubleshooting
    or investigation purposes directly from DataDog's log management system. The results
    are returned as a JSON object containing the log entries for each requested namespace.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Namespace | String | Yes | A comma-separated list of Kubernetes namespaces to
    retrieve logs for (e.g., 'name_space1, name_space2'). |

    | Start Time | String | Yes | The start time for the log retrieval in ISO 8601
    format (e.g., '2020-02-02T02:02:02Z'). |

    | End Time | String | Yes | The end time for the log retrieval in ISO 8601 format
    (e.g., '2020-02-02T02:02:02Z'). |


    ### Additional Notes

    - The action uses the DataDog Logs API (`/api/v1/logs-queries/list`) via a POST
    request to perform the query.

    - Multiple namespaces can be queried in a single execution by providing them as
    a comma-separated string.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the DataDog API Key and
    APP Key from the integration's global configuration.

    2. **Parameter Parsing**: It extracts the target namespaces, start time, and end
    time from the action parameters. The namespace string is split into a list for
    processing.

    3. **Data Retrieval**: For each namespace provided, the action calls the DataDog
    manager to fetch logs filtered by the `kube_namespace` tag and the specified time
    range.

    4. **Result Aggregation**: The action checks if logs were returned for each namespace.
    If logs exist, they are added to a cumulative JSON result object.

    5. **Completion**: The action concludes by providing a summary message of which
    namespaces were successfully queried and attaches the aggregated log data to the
    action's JSON result.
