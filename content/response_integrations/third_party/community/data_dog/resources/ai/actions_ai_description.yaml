Get Beautiful Metric:
  ai_description: >-
    ### General Description

    The **Get Beautiful Metric** action is a data processing utility designed to analyze
    and summarize DataDog metric timeseries data. Instead of fetching data directly
    from the DataDog API, this action takes a JSON-formatted series of data points
    as input and performs statistical calculations to provide a clear overview of
    the metric's behavior over a specific time range.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Series** | Code (JSON) | Yes | A JSON string containing the DataDog timeseries
    data. It must include a `pointlist` (list of [timestamp, value] pairs), `start`
    and `end` timestamps, and metadata like `unit` and `aggr`. |


    ### Flow Description

    1. **Input Parsing**: The action extracts the `Series` parameter and parses it
    from a JSON string into a Python dictionary.

    2. **Validation**: It verifies the presence of the `pointlist` key to ensure the
    input is valid for analysis.

    3. **Statistical Analysis**: The script iterates through the `pointlist`, extracting
    the raw metric values. It then calculates the **Sum**, **Average**, **Minimum**,
    and **Maximum** values for the dataset.

    4. **Result Construction**: It compiles these statistics along with the original
    metadata (unit, aggregation type, time range, and expression) into a structured
    JSON object.

    5. **Output**: The final analysis is attached to the action's JSON results for
    use in subsequent playbook steps.


    ### Additional Notes

    * This action does not make external API calls. It processes data provided in
    the `Series` parameter, which is typically output by a preceding DataDog "Get
    Metrics" or "Query Metrics" action.
