Get Metric Snapshot Graph:
  ai_description: >-
    ### General Description

    This action retrieves a metric snapshot graph from DataDog based on a specific
    metric query and a defined time range. It is primarily used for visual investigation
    and monitoring, allowing analysts to see historical metric data directly within
    the Google SecOps platform. The action generates a snapshot URL which is then
    provided as a clickable link in the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The DataDog metric query to visualize. For example: `avg:aws.rds.cpuutilization{cloud_env:production}by{dbinstanceidentifier}`.
    |

    | Start Time | String | Yes | The start time for the snapshot graph in Unix timestamp
    format (e.g., `1400000470`). |

    | End Time | String | Yes | The end time for the snapshot graph in Unix timestamp
    format (e.g., `1610557457`). |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the DataDog API Key and
    APP Key from the integration configuration.

    2. **Parameter Retrieval**: It extracts the user-provided metric query, start
    time, and end time.

    3. **API Interaction**: The action uses the `DataDogManager` to send a GET request
    to the DataDog API's `/api/v1/graph/snapshot` endpoint.

    4. **Result Processing**: If a snapshot is successfully generated, the action
    extracts the `snapshot_url` from the response.

    5. **Output Generation**: The snapshot URL is added as a link to the SOAR case,
    and the full JSON response is attached as a result for further use in playbooks.


    ### Additional Notes

    This action does not process entities; it operates solely on the provided query
    string and time parameters.
