Update Rank:
  ai_description: >-
    ### General Description

    The **Update Rank** action is designed to modify the rank of a specific user within
    the Vanilla Forums platform. This action is primarily used for administrative
    management, allowing security teams or administrators to programmatically adjust
    user status or permissions based on external triggers or manual intervention.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Rank ID** | String | Yes | The unique identifier of the rank to be assigned
    to the user. |

    | **User ID** | String | Yes | The unique identifier of the user whose rank is
    being updated. |


    ### Flow Description

    1. **Initialization**: The action extracts the `Rank ID` and `User ID` from the
    input parameters and retrieves the integration configuration (API Token and URL).

    2. **API Interaction**: It utilizes the `VanillaManager` to call the `change_user_rank`
    method.

    3. **External Mutation**: The manager performs a `PUT` request to the Vanilla
    Forums endpoint `/v2/users/{user_id}/rank` with the new rank details.

    4. **Outcome Reporting**: The action captures the API response, adds it as a JSON
    result to the case, and provides a success or failure message based on the execution
    outcome.
