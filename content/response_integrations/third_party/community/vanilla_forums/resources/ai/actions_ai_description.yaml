Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the VanillaForums platform. It serves as a diagnostic tool to ensure that
    the integration configuration, including the API Token and Base URL, is valid
    and that the external service is reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is primarily used for health checks and troubleshooting integration
    setup. It does not interact with any entities or modify any data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration's global
    configuration, specifically the **API Token** and **URL**.

    2. **Manager Initialization**: It initializes the `VanillaManager` with the provided
    credentials.

    3. **Connectivity Check**: The action calls the `test_connectivity` method, which
    performs a `GET` request to the `/v2/categories` endpoint of the VanillaForums
    API with minimal depth and limit to minimize resource usage.

    4. **Final Status**: If the API call is successful, the action returns a success
    message. If an exception occurs (e.g., 401 Unauthorized or 404 Not Found), it
    captures the error and reports a connection failure.
