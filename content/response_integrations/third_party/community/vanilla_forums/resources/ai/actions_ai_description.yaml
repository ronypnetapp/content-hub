Generate Password:
  ai_description: >-
    ### General Description

    Generates a random password that complies with Vanilla Forums' complexity requirements.
    This utility action is typically used in workflows involving user creation or
    password resets to ensure the generated credentials meet the platform's minimum
    security standards (at least one uppercase letter, one lowercase letter, and digits).


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Length | The total number of characters for the generated password. | String
    | No | Must be an integer of at least 6. Defaults to 6 if not provided. |


    ### Additional Notes

    - The action performs local string generation and does not communicate with the
    Vanilla Forums API to generate the password.

    - If a length less than 6 is provided, the action will fail with an explicit error
    message.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'Length' parameter from the action
    input and converts it to an integer.

    2. **Validation**: Checks if the requested length is at least 6 characters. If
    not, the execution fails.

    3. **Password Generation**: Uses the `VanillaManager` to construct a string consisting
    of:
        - One random uppercase letter.
        - One random lowercase letter.
        - Random digits for the remaining length (Length - 2).
    4. **Result Output**: Returns the generated password string as the action's result
    value and provides a success message.
