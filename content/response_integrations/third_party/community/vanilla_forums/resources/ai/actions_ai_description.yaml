Update Badge:
  ai_description: >-
    ### General Description

    The **Update Badge** action allows administrators to award a specific badge to
    a user within the Vanilla Forums platform. This is a management action used to
    reward or categorize users based on their activity or status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | String | Yes | The unique identifier of the user in Vanilla Forums
    who will receive the badge. |

    | **Badge ID** | String | Yes | The unique identifier of the badge to be awarded
    to the user. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `User ID` and `Badge ID`
    from the input parameters.

    2. **API Connection**: It establishes a connection to the Vanilla Forums instance
    using the configured API Token and Base URL.

    3. **Badge Assignment**: The action calls the `give_user_badge` method in the
    manager, which sends a POST request to the `/v2/badges/{badge_id}/users` endpoint.

    4. **Result Processing**: The response from the API, containing the details of
    the assignment, is captured and added to the action's JSON results.

    5. **Completion**: The action concludes by providing an output message indicating
    whether the badge was successfully awarded.


    ### Additional Notes

    - This action does not interact with entities present in the Google SecOps case.
    It operates solely on the IDs provided in the parameters.
