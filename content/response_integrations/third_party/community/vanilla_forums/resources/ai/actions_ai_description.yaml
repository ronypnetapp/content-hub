Update User Role:
  ai_description: >-
    ### General Description

    The **Update User Role** action allows for the modification of a user's assigned
    role within the Vanilla Forums platform. This action is primarily used for administrative
    tasks such as promoting users, changing permissions, or managing access levels
    programmatically based on security workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **UserID** | String | Yes | The unique identifier of the user in Vanilla Forums
    whose role is to be changed. |

    | **RoleID** | String | Yes | The unique identifier of the role to be assigned
    to the user. |


    ### Additional Notes

    This action performs a partial update (PATCH) on the user object in Vanilla Forums.
    It expects a single Role ID which will be passed as an array to the external API.


    ### Flow Description

    1. **Initialization**: The action initializes the Vanilla Forums manager using
    the provided API Token and Base URL from the integration configuration.

    2. **Parameter Extraction**: It extracts the `UserID` and `RoleID` from the action
    parameters.

    3. **API Request**: The action calls the `give_user_role` method in the manager,
    which sends a `PATCH` request to the `/v2/users/{user_id}` endpoint with the new
    `roleID` in the payload.

    4. **Validation**: The action checks the response for errors or invalid role IDs.

    5. **Completion**: It returns the updated user details as a JSON result and provides
    a success message if the update was successful.
