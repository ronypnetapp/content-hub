Add User:
  ai_description: >-
    ### General Description

    This action adds a new user to Vanilla Forums with comprehensive details including
    name, email, role, and password. It includes logic to handle username conflicts
    by optionally using alternative separators between the first and last names.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First Name | String | Yes | The first name of the new user. |

    | Last Name | String | Yes | The last name of the new user. |

    | Email | String | Yes | The email address for the new user account. |

    | Role ID | String | Yes | The specific ID of the role to be assigned to the user
    in Vanilla Forums. |

    | Password | Password | Yes | The account password. Must be at least 6 characters
    long and contain both letters and digits. |

    | Override Name Duplicity | Boolean | No | If set to 'True', the action will attempt
    to create the user even if the name exists by using alternative separators. Default
    is 'False'. |

    | Additional Identifiers | String | No | A comma-separated list of characters
    (e.g., '_,~,-') used to replace the space in the username if the primary name
    is already taken. |

    | Email Confirmed | Boolean | No | If 'True', the user's email will be marked
    as confirmed upon creation. Default is 'True'. |

    | Photo URL | String | No | The URL for the user's profile picture. |


    ### Additional Notes

    - The action performs a validation check on the password complexity before attempting
    to communicate with the API.

    - If `Override Name Duplicity` is enabled but all provided `Additional Identifiers`
    result in existing usernames, the action will fail.


    ### Flow Description

    1. **Validation**: The action first validates that the provided password meets
    the complexity requirements (minimum 6 characters, includes letters, and includes
    digits).

    2. **Conflict Check**: It searches Vanilla Forums for an existing user with the
    name 'First Name Last Name'.

    3. **Username Resolution**: If a conflict is found and `Override Name Duplicity`
    is enabled, the action iterates through the `Additional Identifiers` list to find
    a unique username combination (e.g., 'First_Last').

    4. **User Creation**: Once a unique username is determined (or if no conflict
    exists), the action sends a POST request to the Vanilla Forums API to create the
    user account with the specified parameters.

    5. **Result Handling**: The action returns the user details in a JSON format and
    provides a success message upon completion.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user account in the Vanilla Forums platform via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
