Get a Leaderboard Analytics:
  ai_description: >-
    ### General Description

    The **Get a Leaderboard Analytics** action retrieves statistical data for specified
    leaderboards from a Vanilla Forums instance. It allows users to fetch engagement
    metrics, such as top posters or discussion starters, within a defined date range.
    This action is primarily used for reporting and monitoring community activity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Leaderboards** | String | Yes | A comma-separated list of leaderboard identifiers
    to query (e.g., `top-posters, top-discussion-starters`). |

    | **From** | String | Yes | The start date for the analytics report in `yyyy-mm-dd`
    format. |

    | **To** | String | Yes | The end date for the analytics report in `yyyy-mm-dd`
    format. |

    | **Amount Limit** | String | Yes | The maximum number of rows (positions) to
    return for each requested leaderboard. |


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the API Token and Base URL from the integration configuration.

    2. **Parameter Extraction**: It extracts the user-provided date range, row limit,
    and the list of leaderboards to be queried.

    3. **Data Retrieval**: The action iterates through the list of leaderboards. For
    each board, it calls the Vanilla Forums API via a GET request to the `/analytics/leaderboard`
    endpoint, passing the specified time frame and limit.

    4. **Result Processing**: The retrieved analytics data for each leaderboard is
    aggregated into a JSON structure.

    5. **Completion**: The action returns the aggregated JSON data and provides a
    summary message indicating which leaderboards were successfully fetched.


    ### Additional Notes

    - This action does not interact with or process entities (such as IPs, Hosts,
    or Users) found within a Google SecOps case. It operates purely on the provided
    string parameters to fetch global forum data.
