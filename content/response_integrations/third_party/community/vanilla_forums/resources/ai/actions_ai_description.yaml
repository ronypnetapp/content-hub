Search User By Email and Name:
  ai_description: >-
    ### General Description

    This action searches for a user within the Vanilla Forums platform using both
    an email address and a username. It is designed to verify the existence of a user
    account and retrieve associated details. The action performs two separate lookups
    and returns a consolidated result indicating whether each identifier was found.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Email | string | Yes | The email address of the user to search for. The
    search is case-insensitive. |

    | User Name | string | Yes | The full name or username of the user to search for.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `User Email` and `User Name`
    from the input parameters, performing basic sanitization (stripping whitespace
    and converting email to lowercase).

    2. **Manager Initialization**: It initializes the `VanillaManager` using the integration's
    API Token and Base URL.

    3. **Email Search**: The action calls the `search_user_by_email` method, which
    paginates through the Vanilla Forums user list to find a matching email.

    4. **Username Search**: The action calls the `search_user_by_name` method to check
    for the existence of the provided username.

    5. **Result Compilation**: It constructs a JSON result containing boolean flags
    for `Email` and `UserName` existence. If the email is found, the full user details
    are included in the `UserDetails` field.

    6. **Final Output**: The action concludes by providing an output message summarizing
    the findings and setting the execution status to completed.
