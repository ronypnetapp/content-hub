Send Analyst Feedback to Arcanna:
  ai_description: >-
    ### General Description

    This action sends analyst feedback for a specific event to the Arcanna.ai platform.
    It is used to provide human-validated labels or feedback on AI-processed events,
    which is essential for model training and refinement within the Arcanna ecosystem.
    The action interacts with the Arcanna API via a PUT request to update the feedback
    status of a specific event associated with a job.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Event Id | The unique identifier of the event in Arcanna for which feedback
    is being provided. | string | Yes | N/A |

    | Username | The name of the analyst providing the feedback. This is used for
    auditing and tracking within Arcanna. | user | Yes | Admin |

    | Job Id | The unique identifier of the Arcanna job that the event belongs to.
    | string | Yes | N/A |

    | Analyst Feedback | The specific feedback or label (e.g., a decision or classification)
    that the analyst wants to assign to the event. | string | Yes | N/A |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Arcanna URL, API Key,
    and SSL verification settings from the integration configuration.

    2. **Parameter Retrieval**: It extracts the `Job Id`, `Event Id`, `Username`,
    and `Analyst Feedback` from the action parameters.

    3. **Client Initialization**: An `ArcannaClient` is initialized using the provided
    connection details.

    4. **API Interaction**: The action calls the `send_feedback` method, which performs
    a PUT request to the Arcanna endpoint `/api/v1/events/{job_id}/{event_id}/feedback`
    with the analyst's feedback and username.

    5. **Result Processing**: The response from the Arcanna API is captured and added
    to the action's JSON results. If successful, the action completes with a success
    status; otherwise, it logs the error and fails.
