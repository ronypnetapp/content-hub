Get Arcanna decision:
  ai_description: >-
    ### General Description

    Retrieves the AI decision for a specific event from Arcanna.ai. This action is
    designed to poll the Arcanna API to fetch the inference results for an event that
    has been previously submitted. It uses a configurable retry mechanism to wait
    for the decision if it is still in a pending state.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job Id | string | Yes | The unique identifier of the Arcanna Job associated
    with the event. |

    | Event Id | string | Yes | The unique identifier of the specific event for which
    the decision is being requested. |

    | Retry count | string | Yes | The maximum number of times the action will poll
    the API if the decision is still 'pending_inference'. Default is 20. |

    | Seconds per retry | string | Yes | The duration (in seconds) to wait between
    each polling attempt. Default is 5. |


    ### Additional Notes

    This action does not operate on SecOps entities. It relies entirely on the provided
    `Job Id` and `Event Id` parameters to identify the data to retrieve. The action
    will fail if the decision is not available within the total retry window (Retry
    count * Seconds per retry) or if the API returns an error status.


    ### Flow Description

    1. **Initialization**: Extracts the Arcanna integration configuration (URL, API
    Key, SSL) and the action parameters.

    2. **Client Setup**: Initializes the Arcanna API client.

    3. **Polling Loop**: Enters a loop that continues for the specified `Retry count`.

    4. **Status Check**: Calls the Arcanna API to get the status of the event using
    the `Job Id` and `Event Id`.

    5. **Decision Handling**:
        * If the status is `OK`, the decision data is retrieved, added to the action's
    JSON results, and the action completes successfully.
        * If the status is `pending_inference`, the action waits for the specified
    `Seconds per retry` and then attempts the next poll.
        * If the status is `ERROR`, the action logs the error and terminates with
    a failure state.
    6. **Timeout**: If the loop finishes without receiving an `OK` or `ERROR` status,
    the action fails, notifying the user that the decision could not be retrieved
    within the configured window.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
