Export full event:
  ai_description: >-
    ### General Description

    The **Export full event** action retrieves the complete data structure of a specific
    event processed by Arcanna.ai. This action is primarily used to gather the full
    context and raw data of an event that has been analyzed by an Arcanna AI job,
    making the detailed results available for further processing or investigation
    within the SOAR platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | String | Yes | The unique identifier of the Arcanna job associated
    with the event. Note: The code converts this value to an integer internally. |

    | **Event ID** | String | Yes | The unique identifier of the specific event to
    be exported from Arcanna. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Arcanna base URL, API
    Key, and SSL verification settings from the integration's global configuration.

    2. **Input Parsing**: It extracts the `Job ID` and `Event ID` from the action
    parameters.

    3. **API Request**: The action initializes the Arcanna client and performs a GET
    request to the `/api/v1/events/{job_id}/{event_id}/export` endpoint.

    4. **Result Processing**: The retrieved JSON response, containing the full event
    details, is added to the action's result JSON.

    5. **Completion**: The action terminates, providing the exported data as the primary
    output.


    ### Additional Notes

    This action does not iterate over or process SOAR entities (such as IP addresses
    or Hostnames). It relies entirely on the specific IDs provided in the parameters
    to fetch data.
