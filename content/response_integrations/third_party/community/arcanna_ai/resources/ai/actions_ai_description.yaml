Send Active Alert from Case to Arcanna:
  ai_description: >-
    ### General Description

    Sends the currently active alert from a Google SecOps case to Arcanna.ai for processing.
    This action allows users to forward specific alert data to Arcanna's AI engine
    for decision-making or further analysis based on a configured Job ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | String | Yes | The ID of the Arcanna.ai job that will receive and
    process the alert. Note: The action converts this value to an integer internally.
    |

    | **Alert identifier field** | String | No | The specific field in the alert JSON
    to use as the identifier. Defaults to "identifier". |

    | **Use Alert ID as ID in Arcanna** | Boolean | No | If set to `True`, the action
    uses the value from the "Alert identifier field" as the ID in Arcanna. If `False`,
    Arcanna generates a new unique ID. |


    ### Additional Notes

    If **Use Alert ID as ID in Arcanna** is enabled, the **Alert identifier field**
    should be correctly configured to point to a valid field in the alert payload
    (using dot notation if necessary) to ensure the identifier is correctly mapped
    in Arcanna.ai.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (URL, API Key, SSL Verification)
    and action parameters.

    2. **Context Retrieval**: Fetches the full case details and identifies the currently
    active alert in the SOAR context.

    3. **Alert Matching**: Iterates through the alerts in the case to find the one
    matching the active alert's identifier.

    4. **ID Resolution**: If configured to use an existing ID, it extracts the value
    from the specified alert field using a dot-notation helper.

    5. **External Transmission**: Sends the raw alert payload to the Arcanna.ai API
    via a POST request to the events endpoint.

    6. **Result Handling**: Captures the API response and attaches it to the action
    results as JSON.
