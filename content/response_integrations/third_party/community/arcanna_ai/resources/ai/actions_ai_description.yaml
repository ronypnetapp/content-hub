Send event to Arcanna:
  ai_description: >-
    Sends case or alert data from Google SecOps to Arcanna.ai for AI-driven analysis
    and decision-making. This action acts as a bridge, exporting security event data
    to a specific Arcanna AI job to leverage its machine learning capabilities.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves the Arcanna URL and API Key from the
    integration settings, along with action-specific parameters like Job ID and Username.

    2. **Data Retrieval:** Fetches the full case details from Google SecOps.

    3. **Payload Preparation:** Depending on the 'Send individual alerts from case'
    parameter, the action either isolates the current alert or packages the entire
    case (including target entities) as the payload.

    4. **Identifier Mapping:** If an 'Event ID mapping field' is provided, the action
    uses dot-notation to extract a specific value from the data to serve as the external
    reference ID in Arcanna.

    5. **API Interaction:** Performs a POST request to the Arcanna API to submit the
    event data to the designated Job ID.

    6. **Result Handling:** Captures the API response and attaches it as a JSON result
    to the action output.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | String | Yes | The unique identifier of the Arcanna.ai job that will
    process the sent event. |

    | Username | User | Yes | The username registered in Arcanna for audit and tracking
    purposes. |

    | Event ID mapping field | String | No | A dot-notation path (e.g., `alert.id`
    or `case.id`) used to extract a specific field from the payload to be used as
    the Event ID in Arcanna. |

    | Send individual alerts from case | Boolean | No | If set to `true`, only the
    alert currently being processed is sent. If `false` (default), the entire case
    data is sent. |


    ### Additional Notes:

    - This action is primarily used for exporting data to Arcanna.ai for further analysis
    rather than retrieving enrichment data for SecOps entities.
