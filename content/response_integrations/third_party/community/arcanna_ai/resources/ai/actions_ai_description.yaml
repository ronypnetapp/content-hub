Trigger AI Model training:
  ai_description: >-
    ### General Description

    Triggers the AI model training process for a specific job within the ArcannaAI
    platform. This action is typically used after providing feedback or adding new
    data to a job to ensure the underlying AI model is updated and refined based on
    the latest information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | String | Yes | The unique identifier of the Arcanna job for which the
    AI model training should be initiated. The value is internally converted to an
    integer. |

    | Username | User | Yes | The username of the person or system account triggering
    the training, used for audit logging within ArcannaAI. |


    ### Additional Notes

    - This action performs a state-changing operation in ArcannaAI by initiating a
    background training task.

    - It does not interact with or require any Google SecOps entities to run.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Arcanna URL, API Key, and SSL verification
    settings from the integration configuration.

    2. **Parameter Retrieval**: Extracts the `Job ID` and `Username` from the action
    parameters.

    3. **Client Initialization**: Initializes the `ArcannaClient` with the provided
    credentials and connection settings.

    4. **API Request**: Sends a POST request to the ArcannaAI `/train` endpoint for
    the specified Job ID.

    5. **Result Handling**: Captures the API response, adds it to the action's JSON
    results, and reports the execution status (Completed or Failed).
