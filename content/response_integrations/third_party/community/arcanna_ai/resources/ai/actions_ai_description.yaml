Send JSON Document to Arcanna:
  ai_description: >-
    ### General Description

    The **Send JSON Document to Arcanna** action enables the ingestion of custom JSON
    data into the Arcanna.ai platform. It is designed to send a raw JSON payload to
    a specific Arcanna Job ID, allowing for external processing, AI analysis, or decision-making
    based on the provided data. This action is highly flexible as it allows users
    to define the document structure and optionally specify a unique identifier from
    within the JSON content.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | String | Yes | The unique ID of the Arcanna.ai job that will receive
    and process the document. |

    | **Identifier field** | String | No | A dot-notation path (e.g., 'id' or 'metadata.uuid')
    used to extract a specific value from the JSON document to serve as the document's
    ID in Arcanna. |

    | **Use document ID as ID in Arcanna** | Boolean | Yes | If set to `True`, the
    action uses the value found in the 'Identifier field' as the document ID. If `False`,
    Arcanna generates a new unique ID. |

    | **JSON Document** | Code/String | Yes | The JSON object to be sent to Arcanna.ai.
    Note: The root of the document must be a JSON object (dictionary), not a list.
    |


    ### Additional Notes

    - The action validates that the input is a valid JSON object. If a list is provided
    at the root level, the action will fail.

    - If 'Use document ID as ID in Arcanna' is enabled but the 'Identifier field'
    is not provided or the path is not found in the JSON, the document will be sent
    without a specific ID override.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Arcanna API credentials
    and the user-provided parameters (Job ID, JSON Document, etc.).

