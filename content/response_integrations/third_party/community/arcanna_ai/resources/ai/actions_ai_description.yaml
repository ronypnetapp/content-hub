Update alert priority:
  ai_description: >-
    ### General Description

    Updates the priority level of the current alert within Google SecOps. This action
    is typically used to dynamically adjust alert severity based on external analysis
    or decision logic (e.g., from an AI model like Arcanna.ai).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Priority | string | Yes | The new priority level to assign to the alert. Must
    be one of the following: `Informative`, `Low`, `Medium`, `High`, or `Critical`.
    |


    ### Additional Notes

    - This action requires Google SecOps (Siemplify) version 5.6 or higher to function.

    - The action interacts with the internal SOAR API to perform the update.


    ### Flow Description

    1. **Validation**: The action retrieves the current alert identifier and validates
    that the provided `Priority` parameter matches one of the five allowed values.

    2. **Version Check**: It checks the system version to ensure compatibility (version
    5.6+).

    3. **Internal API Call**: It constructs a request containing the Case ID, Alert
    Identifier, Alert Name, and the new Priority.

    4. **Execution**: It sends a POST request to the internal Google SecOps endpoint
    `/external/v1/sdk/UpdateAlertPriority` to commit the change.
