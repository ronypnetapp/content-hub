Superna Zero Trust User Lockout:
  ai_description: >-
    ### General Description

    The **Superna Zero Trust User Lockout** action is designed to immediately revoke
    a user's access to all Superna-protected Network Attached Storage (NAS). By communicating
    with the Superna Eyeglass API, it resolves existing user permissions and applies
    a 'deny read' permission to SMB shares, effectively containing a suspected compromised
    account.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **UserName** | String | Yes | The identifier of the user to be locked out. Should
    be provided in `domain\username` or `user@domain` format. |


    ### Flow Description

    1. **Initialization**: The action retrieves the necessary connection details (Eyeglass
    IP, API Token) and the target username from the action parameters.

    2. **Encoding**: The username is URL-encoded to ensure compatibility with the
    API endpoint structure.

    3. **API Request**: A POST request is sent to the Superna Eyeglass lockout endpoint
    (`/sera/v2/ransomware/lockout/{user}`).

    4. **Outcome Handling**: The action monitors the HTTP response. If successful,
    it confirms the lockout; otherwise, it logs specific error types (Timeout, Connection,
    or HTTP errors) and fails the action.


    ### Additional Notes

    This action does not process entities from the case context; it relies solely
    on the provided `UserName` parameter.
