Superna Zero Trust User Un Lock:
  ai_description: >-
    ### General Description

    This action unlocks a user account that was previously locked out from Superna-protected
    NAS storage. It communicates with the Superna Eyeglass Zero Trust API to restore
    access for the specified user.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | String | Yes | The identifier of the user to be unlocked. The expected
    format is `domain\username` or `username@domain`. |


    ### Additional Notes

    * The action requires the `api_token` and `eyeglass_ip` to be correctly configured
    in the integration settings.

    * The `Verify SSL` configuration parameter determines whether the action validates
    the SSL certificate of the Eyeglass server.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the API token, Eyeglass IP
    address, and SSL verification settings from the integration configuration.

    2. **Input Processing**: The `UserName` provided in the action parameters is retrieved
    and URL-encoded to ensure compatibility with the API endpoint.

    3. **API Request Construction**: A POST request URL is constructed using the Eyeglass
    IP and the encoded username (e.g., `https://{eyeglass_ip}/sera/v2/ransomware/unlock/{user}`).

    4. **External Execution**: The action sends a POST request to the Superna Eyeglass
    API using the provided API key for authentication.

    5. **Response Handling**: The action processes the API response, handling various
    error states such as timeouts, connection failures, and HTTP errors, and returns
    the final status and response text to Google SecOps.
