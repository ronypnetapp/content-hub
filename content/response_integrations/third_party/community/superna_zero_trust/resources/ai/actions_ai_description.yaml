Ping:
  ai_description: >-
    ### General Description: Tests the connectivity and health of the Superna Zero
    Trust (Eyeglass) API. This action is primarily used to verify that the integration
    is correctly configured and can successfully communicate with the target server.
    ### Parameters Description: | Parameter | Type | Mandatory | Description | | :---
    | :--- | :--- | :--- | | api_token | String | Yes | (Configuration) The API key
    used for authentication with the Superna Zero Trust service. | | eyeglass_ip |
    String | Yes | (Configuration) The IP address or hostname of the Superna Eyeglass
    server. | | Verify SSL | Boolean | No | (Configuration) Determines whether to
    verify the SSL certificate of the server. Defaults to False. | ### Additional
    Notes: This action does not require any input entities and relies solely on the
    integration's configuration parameters. It is categorized as a connectivity test.
    ### Flow Description: 1. **Configuration Extraction**: Retrieves the api_token,
    eyeglass_ip, and Verify SSL settings from the integration configuration. 2. **URL
    Construction**: Builds the full API URL using the provided IP and the /sera/v1/healthcheck
    endpoint. 3. **API Request**: Sends a GET request to the health check endpoint
    with the API key included in the headers. 4. **Error Handling**: Catches timeouts,
    connection errors, and HTTP errors, logging the specific failure reason for troubleshooting.
    5. **Result Reporting**: Returns a success message if the API responds correctly,
    or a failure message with details if an error occurs.
