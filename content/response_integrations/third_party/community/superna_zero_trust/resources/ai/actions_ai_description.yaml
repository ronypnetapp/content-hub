Superna Snapshot Critical NAS Data:
  ai_description: >-
    ### General Description

    Triggers a snapshot of critical NAS (Network Attached Storage) data via the Superna
    Eyeglass Zero Trust API. This action is designed to initiate a protective snapshot
    of critical data paths, typically as a response to detected ransomware activity
    or as a proactive security measure within a Zero Trust framework.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | api_token | String | Yes | The API key used for authentication with the Superna
    Eyeglass server. This is retrieved from the integration configuration. |

    | eyeglass_ip | String | Yes | The IP address or hostname of the Superna Eyeglass
    instance. This is retrieved from the integration configuration. |

    | Verify SSL | Boolean | No | Determines whether to verify the SSL certificate
    of the Superna Eyeglass server. Defaults to `False`. |


    ### Additional Notes

    * This action does not operate on specific entities (like IPs or Hostnames) within
    a case. Instead, it performs a global operation on the configured Superna Eyeglass
    environment.

    * The action uses a POST request to the `/sera/v2/ransomware/criticalpaths` endpoint,
    which triggers the snapshot process on the external system.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the `api_token`, `eyeglass_ip`, and
    `Verify SSL` settings from the integration configuration.

    2. **URL Construction**: Builds the target API endpoint using the provided Eyeglass
    IP and the predefined critical paths route.

    3. **API Request**: Executes an authenticated HTTP POST request to the Superna
    Eyeglass API to trigger the snapshot.

    4. **Error Handling**: Implements comprehensive error handling for timeouts, connection
    issues, and HTTP errors (e.g., 4xx or 5xx responses).

    5. **Result Reporting**: Returns the raw API response text as the action result
    and sets the execution status based on the success of the API call.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers the creation of a data snapshot for critical NAS paths within the Superna
      Eyeglass platform.
    fetches_data: true
    internal_data_mutation_explanation: null
