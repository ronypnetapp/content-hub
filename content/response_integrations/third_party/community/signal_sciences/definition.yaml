identifier: SignalSciences
name: SignalSciences
parameters:
- name: API Root
  type: string
  default_value: "https://dashboard.signalsciences.net"
  description: "The base API root URL for Signal Sciences."
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Email
  type: string
  description: "The email address associated with the Signal Sciences account."
  is_mandatory: true
  integration_identifier: SignalSciences
- name: API Token
  type: password
  description: "The API token used for authentication with Signal Sciences."
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Corporation Name
  type: string
  description: "The unique name of the organization or corporation context as defined in Signal Sciences."
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Verify SSL
  default_value: true
  description: "If selected, the integration validates the SSL certificate when connecting to the Signal Sciences server."
  type: boolean
  is_mandatory: true
  integration_identifier: SignalSciences
