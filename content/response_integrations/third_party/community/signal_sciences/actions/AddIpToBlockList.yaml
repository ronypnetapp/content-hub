identifier: SignalSciences_AddIpToBlockList
name: Add IP to Block List
description: "Use the **Add IP to Block List** action to add a specific IP address to the block list of a designated site. Supported Entities: IP address."
script_file_name: AddIpToBlockList.py
is_simulatable: false
script_run_environment: default
enabled: true
integration_identifier: SignalSciences
dynamic_results_metadata:
- result_example_path: resources/add_ip_to_block_list_json_example.json
  result_name: JsonResult
  show_result: true
script_result_name: is_success
creator: Siemplify
parameters:
- name: Site Name
  type: string
  description: "The API name of the site as defined in the Signal Sciences dashboard."
  is_mandatory: true
- name: IP Address
  type: string
  description: "A comma-separated list of IP addresses to add to the Signal Sciences block list."
  is_mandatory: false
- name: Note
  type: string
  description: "The descriptive note or justification associated with the blocked IP address.\\nThis field is mandatory for the Signal Sciences API."
  is_mandatory: true
