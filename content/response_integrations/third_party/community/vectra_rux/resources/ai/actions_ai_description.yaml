    1. **Parameter Extraction:** The action retrieves the `Entity ID` and `Entity
    Type` from the input parameters.

    2. **Validation:** Validates that the `Entity ID` is a valid integer.

    3. **Entity Retrieval:** Calls the Vectra RUX API to describe the entity and retrieve
    the list of all associated `detection_ids` currently linked to that entity.

    4. **Detection Update:** If detections are found, the action sends a PATCH request
    to the Vectra RUX detections endpoint to update the state of all retrieved detection
    IDs to 'fixed'.

    5. **Result Reporting:** Adds the raw API response to the action's JSON results
    and provides a summary message indicating the number of detections updated.
