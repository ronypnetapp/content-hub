Add Note:
  ai_description: >-
    Adds a note to a specific entity within the Vectra RUX platform. This action allows
    users to attach textual context or observations to specific Accounts, Hosts, or
    Detections by providing the entity's unique identifier and type. The action performs
    a POST request to the Vectra API and returns the details of the created note,
    including its ID and creation timestamp.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | string | Yes | The textual content of the note to be added to the entity.
    |

    | Entity ID | string | Yes | The unique numeric identifier of the entity in Vectra
    RUX. |

    | Entity Type | ddl | Yes | The type of entity to which the note will be attached.
    Supported values: Account, Host, Detection. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API configuration (Root, Client ID,
    Secret) and action parameters (Note, Entity ID, Entity Type).

    2. **Validation:** Validates that the provided `Entity ID` is a valid integer.

    3. **API Interaction:** Authenticates with Vectra RUX and sends a POST request
    to the `/entities/{entity_id}/notes` endpoint with the note content and entity
    type.

    4. **Result Processing:** Parses the API response into a `Note` object.

    5. **Output Generation:** Adds the note details to a data table and provides the
    raw JSON response for downstream use in the playbook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
