Describe Detection:
  ai_description: >-
    ### General Description

    The **Describe Detection** action retrieves comprehensive details for a specific
    detection from the Vectra RUX platform using its unique Detection ID. This action
    is designed to provide deep-dive visibility into a security event, including its
    state, category, threat level, and the source entities (hosts or accounts) involved.
    It is typically used in playbooks to gather context about a specific alert identifier
    before making further orchestration decisions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the detection to retrieve.
    This value must be a numeric string representing a valid integer. |


    ### Additional Notes

    - This action does not automatically iterate over entities in the current Google
    SecOps case; it requires the `Detection ID` to be explicitly provided as an input
    parameter.

    - The action validates the input ID to ensure it is a non-negative integer before
    making the API call.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Detection ID` from the
    input parameters.

    2. **Validation:** It validates that the provided ID is a valid integer using
    an internal utility function.

    3. **Authentication:** The action initializes the `VectraRUXManager`, which handles
    OAuth2 authentication and token management.

    4. **API Interaction:** It performs a GET request to the Vectra RUX API endpoint
    (`/api/v3.4/detections/{detection_id}`) to fetch the detection metadata.

    5. **Data Processing:** The raw API response is parsed into a structured `Detection`
    data model.

    6. **Output Generation:** The action populates the SOAR results with a flattened
    data table for UI display and the full raw JSON response for downstream playbook
    logic.
