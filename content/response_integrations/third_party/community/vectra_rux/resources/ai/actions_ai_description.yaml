    \ | String | No | |\n| Email | Filters the user list by a specific email address.\
    \ | String | No | |\n| Last Login GTE | Filters for users whose last login timestamp\
    \ is greater than or equal to the provided value. | String | No | Expected format\
    \ is typically ISO 8601 or as defined by the Vectra API. |\n| Limit | Specifies\
    \ the maximum number of user records to retrieve. | String | No | Must be a positive\
    \ integer. If not provided, a default system limit is applied. |\n\n### Additional\
    \ Notes\n- This action does not operate on specific entities within a case; it\
    \ performs a global search across the Vectra RUX environment.\n- If no users match\
