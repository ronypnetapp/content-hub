Assign Group:
  ai_description: "### General Description\nThe **Assign Group** action allows users\
    \ to add multiple members to a specific group within the Vectra RUX platform.\
    \ This action is designed to manage group memberships dynamically, supporting\
    \ various group types such as hosts, accounts, IPs, or domains. It appends the\
    \ provided members to the existing group list without overwriting current members.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| **Group ID** | String | Yes | The unique numerical identifier\
    \ of the target group in Vectra RUX. |\n| **Members** | String | Yes | A comma-separated\
    \ list of member identifiers to be added to the group. The identifier type (e.g.,\
    \ IP address, Hostname, Account UID) must correspond to the group's specific type.\
    \ |\n\n### Flow Description\n1. **Parameter Extraction and Validation**: The action\
    \ retrieves the `Group ID` and `Members` list. It validates that the `Group ID`\
    \ is a positive integer and parses the `Members` string into a unique list of\
    \ identifiers.\n2. **Authentication**: The action establishes a session with the\
    \ Vectra RUX API using provided client credentials.\n3. **External Mutation**:\
    \ It executes a `PATCH` request to the Vectra RUX `/groups/{group_id}` endpoint\
    \ with the `membership_action` set to `append`, effectively adding the new members\
    \ to the group.\n4. **Response Processing**: The action receives the updated group\
    \ object from Vectra. It compares the requested members against the actual members\
    \ in the updated group to identify any identifiers that failed to be assigned\
    \ (e.g., if the member does not exist in the Vectra system).\n5. **Reporting**:\
    \ \n    - If successful, it generates an HTML summary table showing the group's\
    \ updated properties (ID, Name, Type, Importance) and the current member list.\n\
    \    - It provides a raw JSON result of the updated group object.\n    - It returns\
    \ a status message indicating how many members were successfully assigned and\
    \ listing any that were not.\n\n### Additional Notes\n- This action performs an\
    \ **append** operation; it does not remove existing members.\n- The action will\
    \ fail if none of the provided members can be successfully assigned to the group."
