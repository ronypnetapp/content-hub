Remove Tags:
  ai_description: >-
    ### General Description

    The **Remove Tags** action allows users to remove specific tags from an entity
    within the Vectra RUX platform. It supports three types of entities: **Account**,
    **Host**, and **Detection**. The action first retrieves the existing tags for
    the specified entity, filters out the tags requested for removal, and then updates
    the entity with the remaining tags.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Tags** | String | Yes | A comma-separated list of tags to be removed from
    the entity. |

    | **Entity ID** | String | Yes | The unique identifier of the entity (Account,
    Host, or Detection) from which tags should be removed. |

    | **Entity Type** | DDL | Yes | The type of entity. Options are: `Account`, `Host`,
    or `Detection`. |


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra RUX manager using the
    provided API credentials (API Root, Client ID, and Client Secret).

    2. **Parameter Processing**: It parses the comma-separated `Tags` input into a
    unique list and validates that the `Entity ID` is a valid integer.

    3. **Fetch Current State**: The action calls the Vectra API to retrieve the current
    list of tags associated with the specified `Entity ID` and `Entity Type`.

    4. **Tag Comparison**: It compares the requested tags against the existing tags.
    If a requested tag exists, it is marked for removal.

    5. **Update External System**: If valid tags were found and removed, the action
    sends a `PATCH` request to the Vectra platform to update the entity's tag list.

    6. **Reporting**: The action generates a JSON result and a data table ('Tag Updated
    Status') summarizing the success or failure of the removal for each tag.


    ### Additional Notes

    - If none of the tags provided in the input exist on the target entity, the action
    will fail with a `TagsUpdateFailException`.

    - The `Entity Type` parameter is case-insensitive in the logic but provided as
    a DDL for user convenience.
