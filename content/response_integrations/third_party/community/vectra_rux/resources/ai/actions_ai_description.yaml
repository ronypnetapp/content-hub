List Groups:
  ai_description: >-
    ### General Description

    The **List Groups** action retrieves a list of groups from the Vectra AI platform
    based on various user-defined filtering criteria. It is primarily used for administrative
    oversight or to gather context about existing group configurations within the
    Vectra environment. The action supports extensive filtering by group name, type,
    importance, and specific member identifiers like IP addresses or hostnames.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Last Modified Timestamp GTE | String | No | Filters for groups modified on or
    after the specified timestamp (ISO 8601 format). |

    | Last Modified By | String | No | Filters groups by the username of the person
    who last modified them. |

    | Name | String | No | Filters groups by their specific name. |

    | Type | DDL | No | Filters groups by their category. Options include: `account`,
    `ip`, `domain`, `host`, or `None`. |

    | Limit | String | No | Specifies the maximum number of group records to retrieve.
    Defaults to a system maximum if not provided. |

    | Account Names | String | No | A comma-separated list of account names to filter
    the groups. |

    | Domains | String | No | A comma-separated list of domain names to filter the
    groups. |

    | Host Ids | String | No | A comma-separated list of host IDs to filter the groups.
    |

    | Host Names | String | No | A comma-separated list of host names to filter the
    groups. |

    | Importance | DDL | No | Filters groups by their assigned importance level. Options:
    `low`, `medium`, `high`, `never_prioritize`, or `None`. |

    | IPs | String | No | A comma-separated list of IP addresses to filter the groups.
    |

    | Description | String | No | Performs a case-insensitive match against the group's
    description field. |


    ### Additional Notes

    - Comma-separated parameters (like IPs or Host Names) are automatically parsed
    into lists before the API request is made.

    - The action utilizes pagination to ensure that large sets of results are handled
    efficiently up to the specified limit.


    ### Flow Description

    1. **Initialization**: The action extracts the necessary API credentials (API
    Root, Client ID, Client Secret) and all optional filtering parameters.

    2. **Validation**: It validates the `Limit` parameter to ensure it is a non-negative
    integer.

    3. **Data Processing**: Comma-separated string inputs for accounts, domains, hosts,
    and IPs are converted into clean lists for API consumption.

    4. **API Request**: The action authenticates with Vectra AI and sends a GET request
    to the `/groups` endpoint, applying all provided filters as query parameters.

    5. **Pagination**: If the number of results exceeds the page size, the action
    iterates through subsequent pages until the `Limit` is reached or all data is
    retrieved.

    6. **Output**: The retrieved group details are formatted into a SOAR data table
    titled "List Of Groups" and the raw JSON response is attached to the action result.
