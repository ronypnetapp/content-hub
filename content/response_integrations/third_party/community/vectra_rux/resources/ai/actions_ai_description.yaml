    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | Yes | The unique identifier of the target group in Vectra
    AI. This value must be a valid integer. |

    | Members | String | Yes | A comma-separated list of member identifiers to be
    removed from the group. The identifier type must match the group's type (e.g.,
    IP addresses for IP groups, account UIDs for account groups). |


    ### Additional Notes

    - The action performs a validation check on the `Group ID` to ensure it is a positive
    integer.

    - If the action is unable to remove any of the provided members (e.g., if the
    members were not part of the group or the identifiers were invalid), the action
    will return a failure status.

    - The action provides a detailed HTML table showing the updated group properties
    and its remaining members.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the `Group ID` and the list of `Members`
    from the action input.

    2. **Validation:** Validates that the `Group ID` is a valid integer and processes
    the `Members` string into a clean list.

    3. **Pre-check:** Fetches the current members of the group from Vectra AI to establish
    a baseline.

    4. **Mutation:** Sends a `PATCH` request to the Vectra AI API with the `membership_action`
    set to `remove` for the specified members.

    5. **Result Processing:** Compares the API response with the requested removal
    list to determine which members were successfully removed and which were not.

    6. **Output Generation:** Creates an HTML representation of the updated group,
    attaches the raw JSON response, and returns a success or failure message based
    on the outcome.
