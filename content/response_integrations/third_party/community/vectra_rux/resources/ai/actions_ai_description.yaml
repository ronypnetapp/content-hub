List Detections:
  ai_description: >-
    ### General Description

    This action retrieves a list of detections from the Vectra RUX platform based
    on a wide variety of filtering criteria. It is primarily used for searching and
    auditing detections associated with specific entities (Hosts or Accounts) or broad
    categories within the Vectra environment. The results are presented as a formatted
    data table on the case wall and as a raw JSON object for further playbook processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection Category | DDL | No | Filters detections by category (e.g., Exfiltration,
    Lateral Movement, Reconnaissance). |

    | Threat GTE | String | No | Filters detections with a threat score greater than
    or equal to the provided integer. |

    | Certainty GTE | String | No | Filters detections with a certainty score greater
    than or equal to the provided integer. |

    | Last Timestamp GTE | String | No | Filters detections with a last seen timestamp
    greater than or equal to the provided value. |

    | Last Timestamp LTE | String | No | Filters detections with a last seen timestamp
    less than or equal to the provided value. |

    | Tags | String | No | A comma-separated list of tags to filter detections. |

    | Entity Type | DDL | No | Specifies the type of entity to filter by (Host or
    Account). |

    | Entity ID | String | No | The specific ID of the entity for which to list detections.
    |

    | Is Targeting Key Asset | DDL | No | Filters detections based on whether they
    target a key asset (True/False). |

    | Note Modified Timestamp GTE | String | No | Filters detections based on when
    their notes were last modified. |

    | Limit | String | No | The maximum number of detection records to retrieve. |

    | Order | DDL | No | Specifies the sort order (Ascending or Descending). |

    | Order By | DDL | No | The field to sort results by (last_timestamp, threat_score,
    or certainty_score). |

    | State | DDL | No | Filters detections by their current state (Active, Inactive,
    Fixed). |

    | Detection Type | String | No | Filters detections by a specific detection type
    string. |


    ### Additional Notes

    - The action performs validation on integer-based parameters like 'Threat GTE',
    'Certainty GTE', and 'Limit'. If invalid values are provided, the action will
    fail.

    - If 'Order By' is selected, the action automatically handles the mapping of score
    fields (e.g., converting 'threat_score' to 'threat' for the API call).


    ### Flow Description

    1. **Parameter Extraction:** The action extracts configuration details (API Root,
    Credentials) and all 15 optional filtering parameters.

    2. **Validation:** It validates that numeric inputs (Limit, Threat, Certainty)
    are valid integers and processes DDL selections into the format expected by the
    Vectra API.

    3. **API Interaction:** The action authenticates with the Vectra RUX service and
    performs a paginated GET request to the detections endpoint using the provided
    filters.

    4. **Data Processing:** Retrieved detections undergo URL cleaning (removing API
    version strings) and field extraction for reporting.

    5. **Output Generation:** The action populates a data table named 'List Of Detections'
    on the case wall and attaches the full raw JSON response to the action result.
