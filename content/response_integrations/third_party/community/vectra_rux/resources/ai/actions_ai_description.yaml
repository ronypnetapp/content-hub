Mark Entity Fixed:
  ai_description: >-
    ### General Description

    Marks all detections associated with a specific entity as 'fixed' in the Vectra
    RUX platform. This action is used to programmatically resolve or acknowledge multiple
    security detections linked to a single Host or Account entity simultaneously.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | string | Yes | The unique numeric identifier of the entity in Vectra
    RUX whose detections should be marked as fixed. |

    | Entity Type | ddl | Yes | The type of entity associated with the ID. Supported
    values are 'Account' or 'Host'. |


