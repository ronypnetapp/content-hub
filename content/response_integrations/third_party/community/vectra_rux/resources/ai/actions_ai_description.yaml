    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Vectra RUX instance. |

    | Client ID | String | Yes | The Client ID for OAuth2 authentication. |

    | Client Secret | String | Yes | The Client Secret for OAuth2 authentication.
    |


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    that the configuration is correct. It does not process any entities or modify
    any data. The parameters listed are configuration parameters required for the
    integration to function.


    ### Flow Description

    1. **Initialization**: The action starts by retrieving the integration's configuration
    parameters: API Root, Client ID, and Client Secret.

    2. **Manager Setup**: It initializes the `VectraRUXManager`, which handles the
    session and authentication logic.

    3. **Connectivity Test**: The manager calls the `test_connectivity` method, which
    internally attempts to generate or refresh an OAuth2 access token using the provided
    credentials.

    4. **Result Handling**: If a token is successfully retrieved, the action reports
    a successful connection. If an error occurs (e.g., invalid credentials, network
    timeout), the action fails and provides an error message.
