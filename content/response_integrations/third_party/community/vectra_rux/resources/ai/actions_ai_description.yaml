Add Tags:
  ai_description: >-
    ### General Description

    Adds one or more tags to specific entities within the Vectra platform. This action
    supports tagging Accounts, Hosts, and Detections by their unique Vectra identifiers.
    It ensures that existing tags are preserved by fetching the current tag list before
    appending the new ones.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tags to be added to the target
    entities. |

    | Entity IDs | String | Yes | A comma-separated list of the unique identifiers
    (IDs) for the entities in Vectra. |

    | Entity Type | DDL | Yes | The type of Vectra entity being tagged. Options are:
    `Account`, `Host`, or `Detection`. |


    ### Flow Description

    1. **Initialization**: The action parses the comma-separated strings for `Tags`
    and `Entity IDs` into unique lists and converts the `Entity Type` to lowercase.

    2. **Data Retrieval**: For each provided Entity ID, the action calls the Vectra
    API to retrieve the current list of tags associated with that entity.

    3. **Tag Merging**: The new tags are merged with the existing tags to create a
    deduplicated set.

    4. **External Mutation**: The action sends a PATCH request to Vectra to update
    the entity's tags with the new combined list.

    5. **Result Reporting**: Successes and failures are tracked per ID. A data table
    named "Tag Update Status" is created in the SOAR case to summarize the outcome
    for each entity.


    ### Additional Notes

    This action does not process entities currently present in the SOAR case scope;
    it operates strictly on the IDs provided in the input parameters.
