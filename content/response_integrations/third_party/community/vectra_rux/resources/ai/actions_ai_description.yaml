Unmark Detection Fixed:
  ai_description: >-
    ### General Description

    Unmarks specified detections as fixed in the Vectra AI platform. This action is
    used to revert the status of detections that were previously marked as resolved
    or fixed, allowing them to be re-evaluated or tracked as active issues within
    the Vectra console.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection IDs | String | Yes | Comma-separated values of numeric IDs for the
    detections to be unmarked as fixed. |


    ### Flow Description

    1. **Initialization**: The action initializes the VectraRUXManager using the provided
    API Root, Client ID, and Client Secret to establish an authenticated session.

    2. **Parameter Parsing**: It extracts the `Detection IDs` string from the input,
    splits it by commas, and validates that each ID is a valid integer.

    3. **API Interaction**: It sends a PATCH request to the Vectra AI detections endpoint
    (`/api/v3.4/detections`) with a payload containing the list of IDs and the `mark_as_fixed`
    flag set to `False`.

    4. **Result Handling**: The raw JSON response from the Vectra API is captured
    and added to the action's result JSON, and the action completes with a success
    message if the request was processed.


    ### Additional Notes

    This action does not operate on Google SecOps entities; it requires the manual
    provision of Detection IDs via the action parameters.
