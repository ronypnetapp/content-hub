Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for a Vectra RUX assignment associated with a specific
    entity. This action is used to reassign investigations or tasks within the Vectra
    platform to a different user by targeting the assignment linked to a Host or Account.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier of the entity (Host or Account)
    whose assignment is being updated. |

    | Entity Type | DDL | Yes | The category of the entity. Supported values: `Account`,
    `Host`. |

    | User ID | String | Yes | The unique identifier of the Vectra user to whom the
    assignment will be transferred. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Entity ID, Entity Type,
    and target User ID from the input parameters.

    2. **Validation**: It validates that the Entity ID and User ID are valid integers.

    3. **Assignment Retrieval**: It queries the Vectra API to find the specific assignment
    ID associated with the provided entity.

    4. **Update Execution**: It performs a PUT request to the Vectra assignments endpoint
    to update the `assign_to_user_id` field with the new User ID.

    5. **Result Reporting**: The action returns the updated assignment details as
    a JSON object and populates a data table named "Updated Assignment" for visibility
    in the case wall.


    ### Additional Notes

    The action will fail if the specified entity does not have an active assignment
    or if the provided IDs are invalid.
