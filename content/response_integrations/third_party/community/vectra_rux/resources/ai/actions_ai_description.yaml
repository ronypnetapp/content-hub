List Assignments:
  ai_description: >-
    ### General Description

    The **List Assignments** action retrieves a list of assignments from the Vectra
    RUX platform based on user-defined filtering criteria. It allows security analysts
    to query assignments by account, host, assignee, resolution status, and creation
    time. The results are presented in a structured data table and a raw JSON format
    for further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Accounts IDs** | String | No | A comma-separated list of account IDs to filter
    the assignments. |

    | **Assignees IDs** | String | No | A comma-separated list of user IDs (assignees)
    to filter the assignments. |

    | **Resolution IDs** | String | No | A comma-separated list of outcome/resolution
    IDs to filter the assignments. |

    | **Resolved** | DDL | No | Filters assignments by their resolution status. Options
    are `None`, `True`, or `False`. |

    | **Created After** | String | No | Filters assignments created after a specific
    timestamp. Supports relative formats (e.g., "2 hours", "2 days") and absolute
    ISO 8601 formats. |

    | **Limit** | String | No | The maximum number of assignment records to retrieve.
    |

    | **Hosts IDs** | String | No | A comma-separated list of host IDs to filter the
    assignments. |


    ### Additional Notes

    - All ID-based parameters (Accounts, Assignees, Resolution, Hosts) are validated
    as integers before being sent to the API.

    - If no assignments match the criteria, the action will complete successfully
    with a message indicating no results were found.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration details (API Root,
    Credentials) and user-provided filter parameters.

    2. **Validation:** ID strings are parsed into lists of integers, and the `Limit`
    parameter is validated for numeric integrity.

    3. **Query Construction:** A mapping of query parameters is created based on the
    provided filters (e.g., `resolved`, `created_after`, `accounts`, `hosts`).

    4. **API Interaction:** The `VectraRUXManager` authenticates and performs a paginated
    `GET` request to the `/assignments` endpoint.

    5. **Data Processing:** The retrieved assignment data is parsed into internal
    models for structured output.

    6. **Output Generation:** The action populates a data table named "Assignment
    Details" with key assignment information and attaches the full raw JSON response
    to the action result.
