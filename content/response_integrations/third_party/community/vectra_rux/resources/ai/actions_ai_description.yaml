Download PCAP:
  ai_description: >-
    ### General Description

    Downloads a Packet Capture (PCAP) file from Vectra RUX associated with a specific
    detection ID. This action allows security analysts to retrieve raw network traffic
    data for forensic investigation and detailed protocol analysis directly within
    Google SecOps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | string | Yes | The unique identifier of the detection in Vectra
    RUX for which the PCAP file should be downloaded. |


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra RUX manager using the
    provided API Root, Client ID, and Client Secret.

    2. **Validation**: Validates that the provided `Detection ID` is a valid integer.

    3. **Data Retrieval**: Performs a GET request to the Vectra RUX API endpoint `/api/v3.4/detections/{detection_id}/pcap`
    to fetch the file content.

    4. **File Processing**: Extracts the filename from the `Content-Disposition` header
    and saves the binary content to a local path.

    5. **Attachment**: Encodes the PCAP file content into Base64 and adds it as an
    attachment to the action result in Google SecOps.

    6. **Completion**: Returns a success message indicating the file has been retrieved
    and attached.
