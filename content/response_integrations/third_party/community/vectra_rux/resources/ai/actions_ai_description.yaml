List Entities:
  ai_description: >-
    ### General Description

    The **List Entities** action retrieves a filtered list of entities (either Hosts
    or Accounts) from the Vectra RUX platform. It serves as a search utility allowing
    analysts to query the Vectra environment for specific entity data based on various
    attributes like threat scores, status, and timestamps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity Type** | DDL | Yes | Specifies the category of entities to retrieve.
    Valid values are 'Host' or 'Account'. |

    | **Order By** | DDL | No | Determines the field used to sort the records (e.g.,
    urgency_score, last_detection_timestamp). |

    | **Fields** | Multi-choice | No | Allows the user to select specific data fields
    to be returned in the results. |

    | **Name** | String | No | Filters the results to entities matching a specific
    name. |

    | **State** | DDL | No | Filters entities by their current state: 'Active' or
    'Inactive'. |

    | **Last Detection Timestamp GTE** | String | No | Filters for entities where
    the last detection occurred on or after this timestamp. |

    | **Last Detection Timestamp LTE** | String | No | Filters for entities where
    the last detection occurred on or before this timestamp. |

    | **Tags** | String | No | Filters entities by a comma-separated list of tags.
    |

    | **Note Modified Timestamp GTE** | String | No | Filters for entities where notes
    were modified on or after this timestamp. |

    | **Prioritized** | DDL | No | Filters entities based on their prioritization
    status (True/False). |

    | **Limit** | String | No | The maximum number of entity records to fetch from
    the API. |

    | **Order** | DDL | No | Specifies the sorting direction: 'Ascending' or 'Descending'.
    |


    ### Additional Notes

    - This action is a search/query tool and does not process entities currently associated
    with the SOAR case (it does not iterate over `target_entities`).

    - The action automatically cleans API versioning from returned URLs to ensure
    they are user-friendly.


    ### Flow Description

    1. **Initialization:** The action extracts the Vectra RUX configuration and user-provided
    filter parameters.

    2. **Validation:** It validates the 'Limit' parameter to ensure it is a valid
    positive integer.

    3. **API Query:** It executes a GET request to the Vectra RUX `/entities` endpoint,
    applying all provided filters and handling pagination if the requested limit exceeds
    the default page size.

    4. **Data Refinement:** The action processes the raw JSON response, removing internal
    API version strings from URLs and extracting a set of mandatory fields (ID, Name,
    Severity, etc.) for the summary view.

    5. **Output:** It generates a CSV-formatted data table for the SOAR case wall
    and attaches the full raw JSON response for further automated processing.
