Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps (Chronicle) server and the Vectra
    RUX platform. This action ensures that the provided credentials (Client ID and
    Client Secret) and the API Root URL are correct and that the SOAR server can successfully
    authenticate and communicate with the Vectra API.


