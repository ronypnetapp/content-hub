Remove Note:
  ai_description: >-
    ### General Description

    Removes a specific note from a designated entity within the Vectra platform. This
    action allows users to manage and clean up annotations on Hosts, Accounts, or
    Detections by providing the unique identifiers for both the entity and the note.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier of the entity (Host, Account,
    or Detection) from which the note will be removed. |

    | Note ID | String | Yes | The unique identifier of the specific note to be deleted.
    |

    | Entity Type | DDL | Yes | The category of the entity. Supported values are 'Account',
    'Host', and 'Detection'. |


    ### Additional Notes

    - The action validates that both the 'Entity ID' and 'Note ID' are valid integers
    before attempting the API call.

    - This action performs a hard delete of the note in the external Vectra system.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (Root, Client ID,
    Secret) and the action parameters (Entity ID, Note ID, Entity Type).

    2. **Validation**: Validates that the provided 'Entity ID' and 'Note ID' are integers
    using a utility manager.

    3. **API Interaction**: Initializes the VectraRUXManager and executes a DELETE
    request to the specific note endpoint: `api/v3.4/entities/{entity_id}/notes/{note_id}`.

    4. **Result Handling**: If the request is successful, it returns a completion
    status. If the note or entity is not found, or if permissions are insufficient,
    it catches the specific exception and fails the action with a descriptive error
    message.
