Resolve Assignment:
  ai_description: >-
    ### General Description

    Resolves a specific assignment in Vectra RUX using a provided Assignment ID and
    Outcome ID. This action allows analysts to programmatically close assignments
    in the Vectra platform, optionally applying triage rules, notes, and associating
    specific detection IDs with the resolution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Outcome ID | String | Yes | The ID representing the resolution outcome. Standard
    values include 1 (Benign True Positive), 2 (Malicious True Positive), and 3 (False
    Positive). Custom outcome IDs are also supported. |

    | Assignment ID | String | Yes | The unique integer identifier of the assignment
    to be resolved. |

    | Note Title | String | No | An optional note or title to be attached to the assignment
    resolution record. |

    | Triage As | String | No | An optional triage rule to apply to the assignment.
    |

    | Detection IDs | String | No | A comma-separated list of integer detection IDs
    to be associated with this resolution. |


    ### Additional Notes

    - **Dependency:** If the **Triage As** parameter is provided, at least one **Detection
    ID** must also be provided; otherwise, the action will fail with a validation
    error.

    - **Validation:** Both the **Assignment ID** and **Outcome ID** must be valid
    integer strings.


    ### Flow Description

    1. **Parameter Extraction and Validation:** The action retrieves all input parameters
    and validates that the Assignment ID and Outcome ID are integers. It also ensures
    that if a triage rule is specified, detection IDs are also present.

    2. **Authentication:** The action authenticates with the Vectra RUX API using
    the provided Client ID and Client Secret to obtain a bearer token.

    3. **API Request:** It executes a `PUT` request to the Vectra RUX resolution endpoint
    (`/assignments/{assignment_id}/resolve`) with a payload containing the outcome,
    notes, and triage details.

    4. **Result Handling:** Upon a successful API response, the action parses the
    updated assignment object, adds the raw JSON to the execution results, and generates
    a data table for the case wall displaying the resolution details.
