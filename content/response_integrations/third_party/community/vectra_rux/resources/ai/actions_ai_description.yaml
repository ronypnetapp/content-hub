Assign Entity:
  ai_description: >-
    ### General Description

    Assigns a Vectra entity (Host or Account) to a specific user within the Vectra
    RUX platform. This action is primarily used for workflow orchestration and incident
    management, allowing analysts to programmatically manage resource ownership and
    responsibility within the Vectra console.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier of the entity to be assigned.
    This must be a valid integer representing a Host or Account ID in Vectra. |

    | Entity Type | DDL | Yes | The category of the entity. Must be either 'Account'
    or 'Host'. |

    | User ID | String | Yes | The unique identifier of the user to whom the entity
    will be assigned. This must be a valid integer. |


    ### Additional Notes

    This action does not automatically process entities from the SOAR case context.
    It requires the explicit input of IDs via the action parameters. Both the Entity
    ID and User ID are validated as integers before the API request is made.


    ### Flow Description

    1. **Initialization:** The action initializes the Vectra RUX manager using provided
    API credentials (API Root, Client ID, and Client Secret).

    2. **Parameter Validation:** It extracts the User ID, Entity ID, and Entity Type
    from the action parameters and validates that the IDs are numeric.

    3. **API Request:** It executes a POST request to the Vectra RUX assignments endpoint
    (`api/v3.4/assignments`) with the assignment details.

    4. **Data Processing:** Upon a successful response, the action parses the new
    assignment data into a structured object.

    5. **Output Generation:** It populates a data table named 'Assign Entity' with
    the assignment details and attaches the full raw JSON response to the action results.
