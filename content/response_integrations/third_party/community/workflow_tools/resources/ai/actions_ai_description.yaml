Approval Request:
  ai_description: >-
    The **Approval Request** action is designed to pause a workflow and require manual
    intervention from a designated reviewer. It facilitates the approval process by
    reassigning cases within Google SecOps and notifying stakeholders via Slack.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Move Alert If Grouped** | boolean | No | If set to `true` (default), and the
    current alert is part of a case containing multiple alerts, the action will move
    this specific alert into its own new case before assigning it to the reviewer.
    If `false`, the entire case is assigned as-is. |


    ### Flow Description

    1. **Configuration Extraction:** Retrieves integration-level settings including
    API credentials, the target Siemplify/SecOps hostname, Slack webhook URL, and
    the designated Approval Managers.

    2. **Grouping Logic:** Checks the `Move Alert If Grouped` parameter. If enabled
    and the case contains more than one alert, it triggers an internal API call to
    move the current alert into a newly created case.

    3. **Case Assignment:** Reassigns the target case (either the original or the
    newly created one) to the user specified as the 'Approval Manager'.

    4. **External Notification:** Sends a formatted message to a Slack channel via
    a webhook, providing a direct link to the case awaiting approval.

    5. **Result Reporting:** Returns a JSON object containing the original case ID,
    any new case ID created, and the identities of the assigned managers.


    ### Additional Notes

    - This action requires the 'Workflow Tools' integration to be configured with
    valid API credentials for the SecOps instance itself to perform the case reassignment
    and alert movement.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to an external Slack channel via a webhook to alert
      reviewers of the pending approval request.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Reassigns the case owner to the designated Approval Manager and can move an
      alert from one case to a new case using internal API calls.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
