Assign Case to Current User:
  ai_description: "### General Description\nThe **Assign Case to Current User** action\
    \ is a workflow utility designed to automatically assign a Google SecOps case\
    \ and its current alert to the analyst who manually triggered the playbook action.\
    \ This is typically used at the beginning of a playbook to ensure that the person\
    \ investigating the case is officially recorded as the owner.\n\n### Parameters\
    \ Description\nThis action does not require any input parameters from the user\
    \ at runtime. It relies on the execution context to identify the requesting user.\n\
    \n### Additional Notes\n* **Manual Execution Required:** This action is specifically\
    \ designed for manual execution. If triggered by the 'System' user (e.g., via\
    \ an automated trigger without human intervention), the action will fail with\
    \ an error. \n* **Integration Configuration:** Requires the 'Workflow Tools' integration\
    \ to be configured with a valid Siemplify API Key, API Root, and Instance Hostname\
    \ to interact with the platform's internal API.\n\n### Flow Description\n1. **Configuration\
    \ Extraction:** The action retrieves the API credentials and connection details\
    \ for the Google SecOps instance from the integration settings.\n2. **Context\
    \ Identification:** It identifies the unique identifiers for the current case\
    \ and the active alert.\n3. **User Validation:** It retrieves the username of\
    \ the person who initiated the action (`original_requesting_user`). It checks\
    \ if the user is the 'System' user.\n4. **Assignment:** If the user is a valid\
    \ human analyst, it calls the internal API to assign the case and alert to that\
    \ specific user.\n5. **Completion:** The action logs the assignment and returns\
    \ the username as the result value."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the ownership/assignment of the case and alert within Google SecOps
      to the user who executed the action.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
