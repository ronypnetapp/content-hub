Approval Response:
  ai_description: >-
    ### General Description

    The **Approval Response** action enables a formal approval workflow within Google
    SecOps. It allows designated 'Approval Managers' to either approve or deny a pending
    request. The action ensures security by verifying that the user executing the
    action matches the authorized personnel or roles defined in the integration settings.
    It provides a mechanism for human-in-the-loop decision-making within automated
    playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Action Approved** | Boolean | Yes | Determines the outcome of the request.
    Set to `True` to approve or `False` to deny. |

    | **Response Comments** | String | No | Optional notes or justification for the
    decision. If provided, these are added as a case comment and included in the Slack
    notification. |


    ### Flow Description

    1. **Authorization Check**: The action identifies the user currently executing
    the task (`original_requesting_user`) and compares them against the configured
    `Approval Manager` and `Secondary Approval Manager`. If a manager is defined as
    a role (prefixed with `@`), the action queries the Google SecOps API to verify
    the user's role membership.

    2. **Decision Processing**: Based on the `Action Approved` input, the action sets
    the internal result state to approved or denied.

    3. **Internal Documentation**: If `Response Comments` are provided, the action
    adds them as a comment to the current case and alert using the `add_comment` method.

    4. **External Notification**: A notification message containing the decision,
    the reviewer's name, and any comments is sent to a configured Slack channel via
    a webhook.

    5. **Result Reporting**: The action returns a JSON object summarizing the review
    details (reason, reviewer, comments, approval status) and sets the action's final
    status.


    ### Additional Notes

    - If an unauthorized user attempts to run this action, it will fail with a `ValueError`
    and send an unauthorized access alert to Slack.

    - The `Approval Manager` configuration can accept specific usernames or role names
    (prefixed with `@`).
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to a Slack channel via a webhook to report the
      approval or denial of a request.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a comment to the case and alert if 'Response Comments' are provided.
  categories:
    enrichment: false
  entity_usage:
