Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and configuration of the Workflow Tools integration. It serves as a health check
    to ensure that the Google SecOps (Siemplify) environment can communicate with
    its own internal API and external services like Slack.


    ### Parameters Description

    This action does not require any direct input parameters. It utilizes the following
    integration configuration settings to perform its checks:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Siemplify API Key | String | Yes | The API key used to authenticate requests
    to the Google SecOps internal API. |

    | Siemplify API Root | String | Yes | The base URL for the Google SecOps API.
    |

    | Siemplify Instance Hostname | String | Yes | The hostname of the current instance.
    |

    | Slack Webhook URL | String | No | The URL used to send test messages to Slack.
    If omitted, the Slack test is skipped. |

    | Approval Manager | String | Yes | A username or role (prefixed with @) to validate
    against the user profile database. |

    | Secondary Approval Manager | String | No | An optional secondary username or
    role to validate. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts necessary API keys, endpoints,
    and manager identities from the integration's global settings.

    2. **Internal API Validation**: It initializes the `WorkflowToolsManager` and
    performs a lookup for the configured 'Approval Manager' and 'Secondary Approval
    Manager' using the `/api/external/v1/settings/GetUserProfiles` endpoint. This
    confirms the API key and root URL are correct.

    3. **External Notification Test**: If a Slack Webhook URL is provided, the action
    sends a test POST request to Slack to verify outbound connectivity.

    4. **Execution Finalization**: The action completes with a success status if the
    API queries and Slack notification (if applicable) are processed without exceptions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action sends a test message to a Slack Webhook URL to verify connectivity,
      which creates a new message entry in the external Slack channel.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
