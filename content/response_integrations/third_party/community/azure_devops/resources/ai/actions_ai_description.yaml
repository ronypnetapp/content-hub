Wait Until Web Resource Is Up:
  ai_description: "### General Description\nThis action is a utility designed to monitor\
    \ the availability of a specific web resource. It performs an HTTP GET request\
    \ to a provided URL and checks if the resource is accessible (returning a successful\
    \ status code). Because the action is marked as asynchronous, it is typically\
    \ used in playbooks to pause execution until a specific service or endpoint becomes\
    \ reachable.\n\n### Parameters Description\n| Parameter Name | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| URL | String | Yes | The full\
    \ URL of the web resource to check for availability. |\n\n### Additional Notes\n\
    - This action does not interact with Google SecOps entities.\n- It is an asynchronous\
    \ action; if the web resource is down, the action returns an 'In Progress' state,\
    \ allowing the SOAR platform to retry the check until the resource is up or a\
    \ timeout is reached.\n\n### Flow Description\n1. **Parameter Extraction**: The\
    \ action retrieves the mandatory `URL` parameter from the input.\n2. **Connectivity\
    \ Check**: It performs an HTTP GET request to the specified URL with a 5-second\
    \ timeout.\n3. **Status Evaluation**: \n    - If the request is successful (status\
    \ code < 400), the resource is considered 'up'.\n    - If the request fails or\
    \ an exception occurs, the resource is considered 'down'.\n4. **Execution Control**:\
    \ \n    - If 'up', the action finishes with a `COMPLETED` state.\n    - If 'down',\
    \ the action finishes with an `IN_PROGRESS` state, signaling the platform to retry\
    \ later."
  capabilities:
