Trigger Azure Build:
  ai_description: >-
    ### General Description

    Triggers an Azure DevOps build pipeline for a specific build definition ID and
    monitors its progress until completion. This action is designed to automate CI/CD
    workflows or infrastructure-as-code tasks directly from Google SecOps by interacting
    with the Azure DevOps REST API.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Build Definition Id | String | Yes | The unique identifier for the build definition
    (pipeline) in Azure DevOps that you want to trigger. |

    | Build Variables | Code (JSON) | Yes | A JSON-formatted string containing the
    variables to be passed to the build pipeline. For example: `{"ENV": "production",
    "VERSION": "1.0.1"}`. |


    ### Additional Notes

    - This action is asynchronous. It will trigger the build and then periodically
    poll Azure DevOps to check the status of the job until it reaches a terminal state
    (Succeeded, Failed, or Canceled).

    - The integration must be configured with a valid Organization, Project, and Personal
    Access Token (PAT) with sufficient permissions to trigger and view builds.


    ### Flow Description

    1. **Initialization**: The action retrieves integration configuration (Base URL,
    Organization, Project, PAT) and action parameters (Build Definition ID, Build
    Variables).

    2. **Trigger Build**: It sends a POST request to the Azure DevOps API (`_apis/build/builds`)
    to initiate the pipeline execution.

    3. **Capture Build ID**: Upon a successful trigger, it extracts the `build_id`
    from the response and transitions to an 'In Progress' state.

    4. **Status Polling (Async)**: The `query_job` function periodically sends GET
    requests to the Azure DevOps API to monitor the `status` and `result` of the specific
    `build_id`.

    5. **Completion**: The action concludes with a 'Completed' status if the build
    result is `succeeded` or `partiallySucceeded`. It returns a 'Failed' status if
    the build fails, is canceled, or encounters an error.
