Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Azure DevOps instance using the provided configuration
    parameters. This action is primarily used to verify that the Personal Access Token,
    Organization, and Base URL are correctly configured and that the Google SecOps
    environment can reach the Azure DevOps API.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | N/A | This action does not have any input parameters. It relies solely on the
    integration's configuration parameters (Personal Access Token, Organization, and
    Base URL). | N/A | N/A |


    ### Additional Notes

    * This is a standard 'Ping' action used for integration health checks.

    * It uses the `azure-devops` Python library to interact with the API.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `Personal Access Token`,
    `Organization`, and `Base URL` from the integration settings.

    2. **Authentication**: It sets up Basic Authentication using the provided token.

    3. **Connection Initialization**: It establishes a connection to the Azure DevOps
    service URL (constructed as `Base URL/Organization`).

    4. **Connectivity Test**: It attempts to retrieve the list of projects using the
    `get_projects()` method to verify the API connection.

    5. **Result Reporting**: Based on the success or failure of the API call, it returns
    a boolean result and a status message to the SOAR platform.
