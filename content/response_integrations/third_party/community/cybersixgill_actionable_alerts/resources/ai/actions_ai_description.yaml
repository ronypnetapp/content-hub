Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a connectivity test designed to verify the communication
    between Google SecOps and the Cybersixgill API. Its primary purpose is to ensure
    that the provided credentials (Client ID and Client Secret) are valid and that
    the network configuration allows for a successful connection to the Cybersixgill
    service.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | password | Yes | The unique identifier for the Cybersixgill API
    client. |

    | Client Secret | password | Yes | The secret key associated with the Client ID
    used for authentication. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Client Id` and `Client
    Secret` from the integration configuration.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` using
    the provided credentials.

    3. **Authentication Test**: The manager attempts to create a `SixgillBaseClient`
    and calls the `get_access_token` method to verify connectivity.

    4. **Result Reporting**: If an access token is successfully retrieved, the action
    returns a success message. If an exception occurs or the token cannot be retrieved,
    it returns a failure message with the error details.


    ### Additional Notes

    - This action does not interact with any entities or modify any data within Google
    SecOps or Cybersixgill.

    - It is strictly used for configuration validation.
