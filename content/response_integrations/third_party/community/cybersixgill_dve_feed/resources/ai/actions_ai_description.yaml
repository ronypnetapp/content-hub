Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity and
    authentication configuration between Google SecOps and the Cybersixgill platform.
    Its primary purpose is to ensure that the provided API credentials (Client ID
    and Client Secret) are valid and that the SecOps environment can successfully
    communicate with the Cybersixgill API.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Client Id** | String | Yes | The unique identifier for the Cybersixgill API
    account, configured at the integration level. |

    | **Client Secret** | String | Yes | The secret key associated with the Cybersixgill
    API account, configured at the integration level. |


    *Note: This action does not have specific runtime parameters; it relies entirely
    on the integration's global configuration.*


    ### Additional Notes

    - This action is typically used during the initial setup of the Cybersixgill integration
    or for troubleshooting connection issues.

    - It does not process any entities or modify any data within Google SecOps or
    Cybersixgill.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the `Client Id` and `Client
    Secret` from the integration's configuration settings.

    2. **Manager Initialization:** It initializes the `SixgillEnrichManager` using
    the extracted credentials.

    3. **Connectivity Test:** The manager attempts to create a `SixgillBaseClient`
    and requests an access token from the Cybersixgill authentication endpoint.

    4. **Result Reporting:** If an access token is successfully retrieved, the action
    returns a success status and message. If the authentication fails or a network
    error occurs, an exception is raised, and the action reports a failure.
