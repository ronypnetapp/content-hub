Set User Permissions:
  ai_description: >-
    ### General Description

    This action modifies user permissions within a Telegram supergroup or channel.
    It allows administrators to promote or demote users by toggling specific rights
    such as pinning messages, deleting content, or inviting new members. The bot must
    have administrative privileges in the target chat to execute these changes.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | string | Yes | The unique identifier or username of the target chat.
    |

    | User ID | string | Yes | The unique identifier of the user whose permissions
    are being modified. |

    | Is Anonymous | boolean | No | If true, the user's presence in the chat is hidden.
    |

    | Can Edit The Info | boolean | No | Allows the user to change the chat title,
    photo, and other settings. |

    | Can Post Messages | boolean | No | Allows the user to post messages (relevant
    for channels). |

    | Can Edit Messages | boolean | No | Allows the user to edit messages of other
    users. |

    | Can Delete Messages | boolean | No | Allows the user to delete messages of other
    users. |

    | Can Invite Users | boolean | No | Allows the user to invite new users to the
    chat. |

    | Can Restrict Members | boolean | No | Allows the user to restrict, ban, or unban
    chat members. |

    | Can Promote Members | boolean | No | Allows the user to add or revoke other
    administrators. |

    | Can Pin Messages | boolean | No | Allows the user to pin messages (relevant
    for supergroups). |


    ### Additional Notes

    - The bot must be an administrator in the chat for this action to work.

    - This action uses the Telegram `promoteChatMember` API endpoint.


    ### Flow Description

    1. **Initialization**: Retrieves the Telegram API Token from the integration configuration.

    2. **Parameter Extraction**: Collects the Chat ID, User ID, and all permission-related
    boolean flags from the action input.

    3. **API Execution**: Calls the Telegram Manager to execute the `set_user_permissions`
    method, which sends a request to the Telegram API to update the user's status.

    4. **Result Handling**: Captures the API response. If successful, it returns a
    success message and the resulting JSON; otherwise, it reports a failure with the
    error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
