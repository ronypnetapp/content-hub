Get Messages:
  ai_description: >-
    ### General Description

    The **Get Messages** action retrieves updates and messages from the Telegram Bot
    API. It allows a bot to pull incoming messages, channel posts, and other update
    types from chats where the bot is a member. This action is essential for monitoring
    chat activity or ingesting external communications into a workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Last Message ID** | String | No | Corresponds to the `offset` parameter in
    the Telegram API. It specifies the identifier of the first update to be returned.
    Updates with an identifier smaller than this value will be ignored. |

    | **Message Types** | Content (List) | No | A JSON list of update types to retrieve
    (e.g., `["message", "channel_post", "poll_answer"]`). If left empty, all update
    types are retrieved. |


    ### Flow Description

    1. **Initialization**: The action initializes the Telegram Manager using the API
    Token provided in the integration configuration.

    2. **Parameter Extraction**: It extracts the `Last Message ID` and `Message Types`
    from the action parameters.

    3. **API Interaction**: The action calls the Telegram `/getUpdates` endpoint via
    a GET request, passing the offset and allowed update types as parameters.

    4. **Output**: The raw JSON response containing the list of updates/messages is
    attached to the action results for use in the playbook.


    ### Additional Notes

    - The bot must be a member of the chat/channel to retrieve messages.

    - This action does not operate on specific SOAR entities (like IPs or Hostnames)
    but rather fetches global updates for the bot.
