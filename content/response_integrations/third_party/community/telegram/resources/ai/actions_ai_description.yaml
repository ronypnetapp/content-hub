Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Telegram Bot API. Its primary purpose is to ensure
    that the integration is correctly configured and that the provided Bot API Token
    is valid and authorized to communicate with Telegram's servers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Token** | String | Yes | This is a configuration-level parameter (not
    an action parameter). It is the unique authentication token for the Telegram bot,
    used to authorize requests to the Telegram API. |


    ### Additional Notes

    This action does not take any user-provided input parameters at runtime. It relies
    solely on the credentials provided in the integration's configuration settings.
    As a 'Ping' action, it does not interact with entities or modify any data within
    the SOAR or external systems.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `API Token` from the Telegram
    integration settings.

    2. **Manager Initialization**: It initializes the `TelegramManager` with the retrieved
    token.

    3. **Connectivity Check**: The action calls the `test_connectivity` method, which
    sends a GET request to the Telegram API's `getMe` endpoint.

    4. **Response Validation**: It checks the API response for a successful status
    code and an 'ok' boolean in the JSON body.

    5. **Status Reporting**: If the request is successful, it returns a 'Connected
    successfully' message; otherwise, it reports a connection failure.
