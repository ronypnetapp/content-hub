Set Default Chat Permissions:
  ai_description: >-
    ### General Description

    Sets the default chat permissions for all new members in a specific Telegram group
    or supergroup. This action allows administrators to define what actions new members
    are permitted to perform by default, such as sending messages, polls, or inviting
    others. Note that the bot must be an administrator in the target group with 'can_restrict_members'
    permissions for this action to succeed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier for the Telegram chat where permissions
    will be updated. |

    | Can Send Messages | Boolean | No | If true, allows users to send text messages,
    contacts, and locations. Default is true. |

    | Can Send Polls | Boolean | No | If true, allows users to send polls. Default
    is true. |

    | Can Pin Messages | Boolean | No | If true, allows users to pin messages. Note:
    This cannot be applied in supergroups. Default is true. |

    | Can Invite Users | Boolean | No | If true, allows users to invite new users
    to the chat. Default is true. |

    | Can Edit Info | Boolean | No | If true, allows users to edit chat title, photo,
    and other settings. Note: This cannot be applied in supergroups. Default is true.
    |


    ### Additional Notes

    - The bot must have administrative privileges in the group.

    - Certain permissions like 'Can Pin Messages' and 'Can Edit Info' are restricted
    in supergroups when applied as default permissions.


    ### Flow Description

    1. **Initialization**: The action initializes the Telegram Manager using the provided
    API Token from the integration configuration.

    2. **Parameter Extraction**: It retrieves the target Chat ID and the specific
    permission boolean flags from the action parameters.

    3. **API Interaction**: The action calls the Telegram API's `setChatPermissions`
    endpoint with the specified parameters.

    4. **Result Processing**: If the API call is successful, it returns a success
    message and the resulting JSON data. If it fails (e.g., insufficient bot permissions),
    it returns a failure status and the error details.
