Get Chat Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific Telegram chat (group, channel,
    or private chat) using its unique ID or username. This action is primarily used
    to gather metadata about a chat, such as its title, type, and invite link, which
    can be useful for investigation or automated reporting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier or username of the target Telegram
    chat (e.g., '123456' or '@my_channel'). |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Telegram Bot API Token from
    the integration configuration and the Chat ID from the action parameters.

    2. **API Interaction**: It initializes the Telegram Manager and calls the `/getChat`
    endpoint of the Telegram Bot API using a GET request.

    3. **Data Processing**: Upon a successful response, the action extracts the chat's
    invite link from the result payload.

    4. **Result Reporting**: The action adds the invite link as a clickable resource
    in the SOAR interface and attaches the full JSON response containing all chat
    details to the action result.


    ### Additional Notes

    This action does not run on entities; it requires a manual input of the Chat ID
    parameter.
