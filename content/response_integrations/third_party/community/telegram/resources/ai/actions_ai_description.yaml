Wait for poll results:
  ai_description: "### General Description\nThe **Wait for poll results** action is\
    \ an asynchronous task designed to monitor a specific Telegram poll and retrieve\
    \ its results. It is primarily used to automate workflows that require user feedback\
    \ or voting via Telegram. The action periodically checks the status of a poll\
    \ until a specific vote threshold is reached or a predefined timeout occurs.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Poll ID** | String | Yes | The unique identifier\
    \ of the Telegram poll to monitor. |\n| **Answer Votes Threshold** | String |\
    \ Yes | The number of votes for any single option that will trigger the action\
    \ to complete successfully. |\n| **Waiting Timeframe** | String | Yes | The maximum\
    \ duration (in minutes) the action should wait for the threshold to be met before\
    \ finishing. |\n| **Scan back Limit** | String | Yes | The maximum number of poll\
    \ updates to retrieve and scan from the Telegram bot's history. |\n\n### Flow\
    \ Description\n1. **Initialization**: The action retrieves the Telegram API token\
    \ from the integration configuration and extracts the user-provided parameters\
    \ (Poll ID, Threshold, Timeframe, and Limit).\n2. **State Recovery**: Since the\
    \ action is asynchronous, it checks if it is the first run. If not, it restores\
    \ the execution state (start time and last processed update ID) from the `additional_data`\
    \ parameter.\n3. **Data Fetching**: It interacts with the Telegram API's `getUpdates`\
    \ method to fetch recent poll-related activity.\n4. **Filtering**: The action\
    \ filters the incoming updates to find the specific poll matching the provided\
    \ **Poll ID**.\n5. **Evaluation**: \n    - **Threshold Check**: It checks if any\
    \ option in the poll has reached the **Answer Votes Threshold**.\n    - **Timeout\
    \ Check**: It calculates the elapsed time since the action started and compares\
    \ it against the **Waiting Timeframe**.\n6. **Outcome**: \n    - If the threshold\
    \ is met, the action completes with a success status.\n    - If the timeframe\
    \ expires, the action completes, returning whatever results were found.\n    -\
    \ If neither condition is met, the action saves its current state and remains\
    \ in an 'In Progress' state for the next polling cycle.\n\n### Additional Notes\n\
    - This action does not operate on Google SecOps entities (e.g., IPs, Hostnames)\
    \ and instead relies entirely on the provided **Poll ID**.\n- It is an asynchronous\
    \ action, meaning it will yield execution back to the SOAR platform between polling\
    \ intervals."
