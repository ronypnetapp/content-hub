Send Message:
  ai_description: >-
    ### General Description

    Sends a message to a specific Telegram chat using a configured bot. This action
    allows for automated communication from Google SecOps to Telegram users, groups,
    or channels, facilitating notifications or alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | 123456 | The unique identifier for the target chat
    or username where the message will be sent. |

    | Message | String | Yes | (Empty) | The text content of the message to be delivered
    by the bot. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the Telegram Bot API Token
    from the integration's configuration settings.

    2. **Parameter Extraction**: It retrieves the target `Chat ID` and the `Message`
    content from the action's input parameters.

    3. **API Interaction**: The action initializes the `TelegramManager` and calls
    the `telegram_bot_sendmessage` method, which sends a request to the Telegram Bot
    API's `sendMessage` endpoint.

    4. **Result Processing**: The response from the Telegram API is captured and added
    to the action's JSON results. The action then terminates with a success or failure
    message based on the API response.


    ### Additional Notes

    This action does not operate on entities and requires a valid Bot API Token to
    be configured at the integration level.
