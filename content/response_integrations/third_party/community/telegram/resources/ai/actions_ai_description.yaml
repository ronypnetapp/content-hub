Send Poll:
  ai_description: >-
    ### General Description

    This action sends a poll with pre-defined answer options to a specific Telegram
    chat or channel using a Telegram bot. It is primarily used for interactive communication
    or gathering feedback within a chat environment during incident response or operational
    workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier for the target chat or the username
    of the target channel (e.g., @channelusername). |

    | Question | String | Yes | The question text to be sent in the poll. |

    | Options | Content | Yes | A JSON array of strings representing the answer options
    (e.g., ["Yes", "No"]). |

    | Is Anonymous | Boolean | No | Determines if the poll results will be anonymous.
    Default is false. Note: Non-anonymous polls cannot be sent to channel chats. |


    ### Additional Notes

    - The bot must be a member of the target chat or channel with appropriate permissions
    to send messages and polls.

    - If 'Is Anonymous' is set to false, the action will fail if the target is a Telegram
    Channel.


    ### Flow Description

    1. **Initialization**: The action retrieves the Telegram API Token from the integration
    configuration and extracts the user-provided parameters (Chat ID, Question, Options,
    and Anonymity status).

    2. **API Interaction**: It utilizes the `TelegramManager` to call the Telegram
    Bot API's `sendPoll` endpoint.

    3. **Execution**: The manager sends a GET request (standard for Telegram Bot API
    methods) containing the poll details to the Telegram servers.

    4. **Result Handling**: If successful, the action captures the JSON response representing
    the sent poll object, attaches it to the action results, and completes with a
    success message. If the API returns an error, the action fails and reports the
    error details.
