Send Location:
  ai_description: >-
    ### General Description

    Sends a geographic location to a specific Telegram chat using a Telegram bot.
    This action allows users to share coordinates (latitude and longitude) directly
    into a chat, which is useful for operational coordination or reporting physical
    locations associated with an incident.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | string | Yes | The unique identifier for the target chat or the username
    of the target channel/private chat (e.g., '123456789'). |

    | Latitude | string | Yes | The latitude coordinate of the location to be sent
    (e.g., '30.0123213'). |

    | Longitude | string | Yes | The longitude coordinate of the location to be sent
    (e.g., '30.456468'). |


    ### Flow Description

    1. **Initialization**: The action retrieves the Telegram API Token from the integration
    configuration and the Chat ID, Latitude, and Longitude from the action parameters.

    2. **API Interaction**: It uses the `TelegramManager` to call the Telegram Bot
    API's `sendLocation` endpoint with the provided coordinates and chat identifier.

    3. **Result Processing**: The action captures the response from Telegram, which
    includes details of the sent message.

    4. **Completion**: The response is added to the action's JSON results, and the
    action completes with a success message if the location was sent successfully,
    or a failure message if an error occurred.
