Send Document:
  ai_description: >-
    ### General Description

    Sends a document to a specified Telegram chat using a provided URL. This action
    allows a Telegram bot to share files (such as reports, logs, or evidence) directly
    within a chat or group by providing a publicly accessible link to the file.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document URL | string | Yes | The direct URL of the document to be sent to the
    Telegram chat. |

    | Chat ID | string | Yes | The unique identifier or username of the target Telegram
    chat where the document will be sent. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Telegram Bot API Token
    from the integration's global configuration.

    2. **Parameter Extraction**: It extracts the target Chat ID and the Document URL
    from the action's input parameters.

    3. **API Interaction**: The action uses the Telegram Manager to call the `sendDocument`
    endpoint of the Telegram Bot API, passing the Chat ID and the Document URL.

    4. **Result Processing**: The action captures the JSON response from Telegram,
    which contains metadata about the sent message, and attaches it to the action's
    results.

    5. **Completion**: The action concludes with a success message if the document
    was sent or a failure message if an error occurred during the API call.
