Get Bot Details:
  ai_description: >-
    ### General Description

    Retrieves the configuration details of the Telegram bot associated with the provided
    API token. This action is used to verify the bot's identity and connectivity status
    by fetching its metadata from the Telegram API.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the 'API
    Token' configured at the integration level.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'API Token' from the
    Telegram integration settings.

    2. **API Interaction**: It utilizes the `TelegramManager` to call the Telegram
    `getMe` endpoint.

    3. **Data Retrieval**: The action fetches bot-specific information, including
    the bot's unique ID, name, and username.

    4. **Output**: The retrieved bot details are added to the action's JSON results
    for visibility.


    ### Additional Notes

    This action does not process entities and is primarily diagnostic or informational
    in nature.
