Gather Remote Agent Datapoints:
  ai_description: >-
    ### General Description\n\nGathers comprehensive diagnostic data and logs from
    a Remote Agent to assist in troubleshooting integration and connector issues.
    It retrieves system performance metrics, agent status, and parses log files for
    error patterns.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory
    | Description |\n| :--- | :--- | :--- | :--- |\n| IntegrationName | String | Yes
    | The name of the integration for which logs and data should be collected. |\n|
    ConnectorName | String | No | The specific connector name to target for log collection.
    If provided, the action will attempt to locate and parse the specific connector
    runner logs. |\n\n### Flow Description\n\n1. **Configuration Extraction**: Retrieves
    the target Integration and Connector names from the action parameters.\n2. **Agent
    Status Collection**: Reads and parses `agent_status.json` to identify installed
    integration versions and general agent health, while masking sensitive information
    like IP and MAC addresses.\n3. **System Load Analysis**: Executes system commands
    (`lscpu`, `uptime`, `free`) to capture CPU, memory, and uptime statistics.\n4.
    **Environment & File Audit**: Captures environment variables (excluding secrets)
    and performs a directory listing of the agent's working directory.\n5. **Log Parsing**:
    Scans the main agent log (`agent.log`) and specific connector logs (`connectors_runner.log`)
    for error-level entries, capturing the most recent occurrences for analysis.\n\n###
    Additional Notes\n\nThis action is a diagnostic tool. All collected information
    is written to the action's execution logs (LOGGER) rather than being returned
    as structured case data or insights.
