    \ Supports partial matching. |\n| Filter - Start Date | String | No | Filters\
    \ for items quarantined after this specific date. Must be in ISO 8601 format.\
    \ |\n| Filter - End Date | String | No | Filters for items quarantined before\
    \ this specific date. Must be in ISO 8601 format. |\n| Filter - File Path | String\
    \ | No | Filters by the file path where the item originated. Supports partial\
    \ matching and wildcards (e.g., using '*' as a suffix). Only available for the\
