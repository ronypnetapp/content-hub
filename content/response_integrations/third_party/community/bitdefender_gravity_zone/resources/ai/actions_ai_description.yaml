Blocklist - Add Hashes:
  ai_description: "### General Description\nThe **Blocklist - Add Hashes** action\
    \ allows users to programmatically add file hashes to the Bitdefender GravityZone\
    \ blocklist. This is a containment action used to prevent specific malicious files\
    \ from executing across the environment managed by Bitdefender. It supports both\
    \ MD5 and SHA256 hash formats.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Hash List**\
    \ | String | Yes | A comma-separated list of SHA256 or MD5 hashes to be blocked.\
    \ |\n| **Source Info** | String | Yes | A description or reason for blocking these\
    \ hashes (e.g., 'Determined to be malicious'). |\n\n### Flow Description\n1. **Configuration\
    \ Extraction**: The action retrieves the Bitdefender API Key, Access URL, and\
    \ SSL verification settings from the integration configuration.\n2. **Input Parsing**:\
    \ It extracts the `Hash List` and `Source Info` provided as action parameters.\n\
    3. **Hash Categorization**: The logic splits the comma-separated string and uses\
    \ regular expressions to categorize each hash as either MD5 or SHA256.\n4. **API\
    \ Interaction**: \n    - If SHA256 hashes are identified, it sends a request to\
    \ the Bitdefender `addToBlocklist` endpoint with the appropriate type identifier.\n\
    \    - If MD5 hashes are identified, it sends a separate request to the same endpoint\
    \ with the MD5 type identifier.\n5. **Validation**: If any hashes in the list\
    \ do not conform to MD5 or SHA256 formats, the action raises an error and stops\
    \ execution.\n6. **Result Reporting**: Upon successful API calls, the action returns\
    \ a JSON result containing the lists of hashes that were successfully submitted."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds file hashes to the Bitdefender GravityZone blocklist, which modifies the
      security policy and prevention state of the external Bitdefender environment.
    fetches_data: false
    internal_data_mutation_explanation: null
