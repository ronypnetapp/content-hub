Set Endpoint Label:
  ai_description: >-
    ### General Description

    Sets or resets a label for a specific endpoint in Bitdefender GravityZone. This
    action allows administrators to organize or tag endpoints within the Bitdefender
    Control Center by applying a string label (up to 64 characters) to a target endpoint
    identified by its ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Label | string | Yes | A string representing the label to be applied. The maximum
    allowed length is 64 characters. To reset/remove a previously set label, provide
    an empty string. |

    | Endpoint ID | string | Yes | The unique identifier of the endpoint for which
    the label will be set. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Key, Access URL, and SSL verification
    settings from the integration configuration.

    2. **Parameter Extraction**: Retrieves the target `Endpoint ID` and the desired
    `Label` from the action parameters.

    3. **Manager Initialization**: Connects to the Bitdefender GravityZone Control
    Center using the provided credentials.

    4. **API Execution**: Calls the `setEndpointLabel` method via the Bitdefender
    API, passing the endpoint ID and the label string.

    5. **Result Handling**: Evaluates the API response and terminates the action with
    a success or failure status based on whether the label was successfully applied.
