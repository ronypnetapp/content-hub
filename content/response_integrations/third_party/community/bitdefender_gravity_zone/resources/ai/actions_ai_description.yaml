Get Network Inventory Items:
  ai_description: >-
    ### General Description

    Retrieves a list of network inventory items from Bitdefender GravityZone. This
    action allows users to search for and list various network objects such as endpoints,
    virtual machines, security servers, and custom groups managed within the GravityZone
    environment. It provides extensive filtering capabilities to narrow down results
    based on management status, roles (e.g., Relay, Exchange), or specific identifiers
    like MAC addresses and SSIDs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter - Name | String | No | Filters items by name. Supports partial matching.
    Requires a minimum of 3 characters. |

    | Filter - MAC Addresses | String | No | A comma-separated list of MAC addresses
    to filter endpoints. |

    | Filter - SSID | String | No | The Active Directory SID of the endpoint used
    for filtering. |

    | Filter - Depth - All Items Recursively | Boolean | No | If set to true, the
    action searches all endpoints recursively within the network hierarchy. |

    | Filter - Security Servers | Boolean | No | Filters the results to include only
    Security Servers. |

    | Filter - Managed Relays | Boolean | No | Filters the results to include only
    endpoints with the Relay role. |

    | Filter - Managed Exchange Servers | Boolean | No | Filters the results to include
    only protected Exchange servers. |

    | Filter - Managed with BEST | Boolean | No | Filters for endpoints that have
    the Bitdefender Endpoint Security Tools (BEST) agent installed. |

    | Filter - Virtual Machines | Boolean | No | Filters the results to include only
    virtual machines. |

    | Filter - Computers | Boolean | No | Filters the results to include only physical
    computers. |

    | Filter - EC2 Instances | Boolean | No | Filters the results to include only
    Amazon EC2 instances. |

    | Filter - Groups | Boolean | No | Filters the results to include only custom
    groups of endpoints. |

    | Parent ID | String | No | The ID of the container or group for which the network
    items will be returned. |


    ### Additional Notes

    - The `Filter - Name` parameter must be at least 3 characters long if provided;
    otherwise, the action will raise an error.

    - Some filters may be ignored by the Bitdefender API if the corresponding license
    is not active in the GravityZone environment.


    ### Flow Description

    1. **Connection**: The action initializes a connection to the Bitdefender GravityZone
    Control Center using the configured API Key and Access URL.

    2. **Parameter Processing**: It extracts all optional filter parameters and the
    Parent ID from the action input.

    3. **API Query**: It executes a paginated request to the `getNetworkInventoryItems`
    endpoint. The manager handles the JSON-RPC communication and iterates through
    all result pages to compile a complete list.

    4. **Result Handling**: The retrieved inventory data is attached to the action
    as a JSON result.

    5. **Completion**: The action concludes by reporting a success status and providing
    the collected inventory items.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
