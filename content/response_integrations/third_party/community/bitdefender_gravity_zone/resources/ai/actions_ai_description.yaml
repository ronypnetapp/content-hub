Create Scan Task by MAC Address:
  ai_description: >-
    ### General Description

    This action generates a scan task for managed endpoints within Bitdefender GravityZone,
    identified by their MAC addresses. It allows security analysts to trigger various
    types of scans (Quick, Full, Memory, or Custom) directly from Google SecOps to
    remediate or investigate potential threats on specific network interfaces.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | MAC Addresses | String | Yes | A comma-separated list of MAC addresses for the
    endpoints to be scanned. A maximum of 100 MAC addresses can be processed in a
    single request. |

    | Scan Type | DDL | Yes | The category of scan to perform. Options include: Quick,
    Full, Memory, or Custom. |

    | Task Name | String | No | A custom name for the scan task. If omitted, Bitdefender
    will automatically generate a name. |

    | Custom Scan - Depth | DDL | No | Specifies the scanning intensity (Aggressive,
    Normal, Permissive). This is only applicable when 'Scan Type' is set to 'Custom'.
    |

    | Custom Scan - Paths | String | No | A comma-separated list of specific file
    system paths to scan. This is only applicable when 'Scan Type' is set to 'Custom'.
    |


    ### Additional Notes

    - This action does not utilize Google SecOps entities (e.g., MAC entities in the
    case). Instead, it relies entirely on the MAC addresses provided in the input
    parameter.

    - There is a known discrepancy between the parameter name in the configuration
    (`MAC Addresses`) and the identifier used in the script logic (`Target IDs`),
    which may require alignment for successful execution.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves integration credentials
    (API Key, Access URL) and user-provided scan parameters.

    2. **Manager Initialization:** It establishes a connection to the Bitdefender
    GravityZone Control Center using the provided API Key.

    3. **Task Creation:** The action calls the `createScanTaskByMac` API method, passing
    the list of MAC addresses and the specified scan configuration (type, depth, paths).

    4. **Status Reporting:** The action evaluates the API response and returns a success
    or failure status to the Google SecOps platform.
