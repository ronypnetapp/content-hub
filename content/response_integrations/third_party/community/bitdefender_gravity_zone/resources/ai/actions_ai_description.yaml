Get Endpoints List:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of endpoints from the Bitdefender GravityZone Control
    Center. This action allows users to search and filter endpoints based on management
    status, security roles, network location, and specific identifiers like MAC addresses
    or SSIDs. It is primarily used for asset discovery and inventory verification
    within the security environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Endpoints** | DDL | Yes | Determines whether to return 'Managed', 'Unmanaged',
    or 'All' endpoints. |

    | **Parent ID** | String | No | The ID of the target company or group. If omitted,
    returns endpoints under Computers and Groups. |

    | **Filter - Managed with BEST** | Boolean | No | If true, filters for endpoints
    with the Bitdefender Endpoint Security Tools (BEST) agent installed. |

    | **Filter - Managed Exchange Servers** | Boolean | No | If true, filters for
    protected Exchange servers. |

    | **Filter - Managed Relays** | Boolean | No | If true, filters for endpoints
    acting as Relays. |

    | **Filter - Security Servers** | Boolean | No | If true, filters for Security
    Servers. |

    | **Filter - Depth - All Items Recursively** | Boolean | No | If true, searches
    all endpoints recursively within the network inventory. |

    | **Filter - SSID** | String | No | Filters endpoints by their Active Directory
    SID. |

    | **Filter - MAC Addresses** | String | No | A comma-separated list of MAC addresses
    to filter the results. |

    | **Filter - Name** | String | No | Filters items by name. Requires a minimum
    of three characters. |


    ### Additional Notes

    - The **Filter - Name** parameter has a strict requirement: if provided, the string
    must be at least 3 characters long, otherwise the action will fail with an error.

    - This action does not operate on specific entities within a case; it performs
    a global or scoped query against the Bitdefender environment.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves API credentials (API Key, Access URL)
    and SSL verification settings.

    2. **Parameter Parsing**: Collects all filtering criteria from the action input,
    including the mandatory 'Endpoints' selection.

    3. **Manager Initialization**: Establishes a connection to the Bitdefender GravityZone
    API using the provided credentials.

    4. **Data Retrieval**: Executes a paginated JSON-RPC request (`getEndpointsList`)
    to the Bitdefender Network API endpoint.

    5. **Result Processing**: Aggregates all items from paginated responses and returns
    the final list as a JSON object for use in subsequent playbook steps.
