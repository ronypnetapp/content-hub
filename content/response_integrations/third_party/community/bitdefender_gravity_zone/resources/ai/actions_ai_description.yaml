Restore Isolated Endpoint:
  ai_description: >-
    ### General Description

    Restores a specified endpoint from network isolation within the Bitdefender GravityZone
    environment. This action is used to reverse a previous isolation command, allowing
    the endpoint to resume normal network communications.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Endpoint ID | The unique identifier of the endpoint to be restored from isolation.
    | String | True |


    ### Additional Notes

    This action does not process entities from the Google SecOps scope; it relies
    solely on the provided 'Endpoint ID' parameter to identify the target system in
    Bitdefender GravityZone.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Key, Access URL, and SSL verification
    settings from the integration configuration.

    2. **Parameter Extraction**: Retrieves the mandatory 'Endpoint ID' from the action
    parameters.

    3. **Manager Initialization**: Establishes a connection to the Bitdefender GravityZone
    Control Center using the provided credentials.

    4. **Task Creation**: Executes the `createRestoreEndpointFromIsolationTask` API
    method to trigger the restoration process for the specified endpoint.

    5. **Result Reporting**: Evaluates the API response and returns a success or failure
    status to the Google SecOps workbench.
