Blocklist - Remove Item:
  ai_description: >-
    ### General Description

    Removes a specific hash entry from the Bitdefender GravityZone blocklist. This
    action is used to manage the blocklist by deleting entries identified by their
    unique internal ID, effectively unblocking the associated file hash in the Bitdefender
    environment.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Hash ID | The unique internal identifier of the item in the Bitdefender blocklist
    to be deleted (e.g., a UUID). | String | Yes |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Bitdefender GravityZone
    Control Center using the provided API Key and Access URL.

    2. **Request Execution**: Sends a JSON-RPC request to the Bitdefender API using
    the `removeFromBlocklist` method, passing the `Hash ID` as the target identifier.

    3. **Result Handling**: Evaluates the API response. If the operation is successful,
    the action completes with a success status; otherwise, it reports a failure.


    ### Additional Notes

    Note that the `Hash ID` refers to the internal ID assigned by Bitdefender to the
    blocklist entry, not the MD5 or SHA256 hash value itself. To find this ID, one
    might typically use a 'List Blocklist' action first.
