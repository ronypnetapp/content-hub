Create Scan Task:
  ai_description: >-
    ### General Description

    Creates a scan task in Bitdefender GravityZone for specified target endpoints
    or containers. This action allows security teams to initiate various types of
    scans (Quick, Full, Memory, or Custom) on demand to identify potential threats
    on managed systems. Note: While the internal metadata description mentions isolation,
    the actual implementation and API calls are strictly for creating scan tasks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Target IDs | String | Yes | A comma-separated list of IDs for the targets (endpoints
    or containers) to be scanned. |

    | Scan Type | DDL | Yes | The type of scan to perform. Available options: Quick
    (1), Full (2), Memory (3), Custom (4). |

    | Task Name | String | No | A custom name for the scan task. If not provided,
    the name is automatically generated by Bitdefender. |

    | Custom Scan - Depth | DDL | No | The scanning intensity for 'Custom' scans.
    Options: Aggressive (1), Normal (2), Permissive (3). Defaults to Normal. |

    | Custom Scan - Paths | String | No | A comma-separated list of target paths to
    be scanned. This is only used when the Scan Type is set to 'Custom'. Defaults
    to LocalDrives. |


    ### Additional Notes

    * The 'Custom Scan' parameters (Depth and Paths) are only processed by the Bitdefender
    API when the 'Scan Type' is explicitly set to 'Custom'.

    * This action does not automatically process SOAR entities; it requires the manual
    input of Target IDs.


    ### Flow Description

    1. **Authentication**: Connects to the Bitdefender GravityZone Control Center
    using the API Key and Access URL provided in the integration configuration.

    2. **Parameter Mapping**: Converts the user-selected scan type and depth strings
    into the specific integer values required by the Bitdefender JSON-RPC API.

    3. **Task Creation**: Sends a `createScanTask` POST request to the Bitdefender
    network endpoint with the target IDs and scan configuration.

    4. **Status Reporting**: Evaluates the API response and terminates the action
    with a success or failure message based on whether the task was successfully created
    in Bitdefender.
