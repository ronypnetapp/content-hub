Blocklist - List Items:
  ai_description: >-
    ### General Description

    This action retrieves a comprehensive list of all file hashes (MD5 and SHA256)
    currently stored in the Bitdefender GravityZone blocklist. It is primarily used
    for auditing blocked items or verifying the current state of the environment's
    hash-based prevention rules.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Use JSON Filter | String | No | Intended for filtering results, though not currently
    utilized by the underlying API call logic in this specific action. |

    | Filter | String | No | Intended for filtering results, though not currently
    utilized by the underlying API call logic in this specific action. |

    | Parent ID | String | No | Intended to scope the request to a specific parent
    container, though not currently utilized by the underlying API call logic in this
    specific action. |

    | Endpoints | String | No | Intended to scope the request to specific endpoints,
    though not currently utilized by the underlying API call logic in this specific
    action. |


    ### Additional Notes

    While the action extracts several parameters (Filter, Parent ID, etc.) from the
    UI, the current implementation of the `blocklist_hashes_list` method in the Bitdefender
    manager retrieves the entire blocklist without applying these specific filters
    to the API request.


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Bitdefender GravityZone
    Control Center using the provided API Key and Access URL.

    2. **Data Retrieval**: Executes the `getBlocklistItems` JSON-RPC method against
    the Incidents API endpoint.

    3. **Pagination**: Automatically handles paginated responses from the API to ensure
    all blocked items are collected into a single list.

    4. **Output**: Consolidates the retrieved items and returns them as a JSON object
    in the action's results for further processing in the playbook.
