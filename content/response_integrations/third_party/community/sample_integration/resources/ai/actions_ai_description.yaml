Simple Action Example:
  ai_description: >-
    ### General Description

    This action retrieves currency exchange rate data from the external service 'api.vatcomply.com'.
    It allows users to specify multiple currencies and a time range to fetch historical
    or current rates. The results are presented as data tables, links on the case
    wall, and a JSON file attachment within the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Currencies String | string | No | A comma-separated list of currency codes (e.g.,
    USD, EUR) to be processed. |

    | Currencies DDL | ddl | No | A dropdown menu to select a single currency. The
    action combines values from both 'Currencies String' and 'Currencies DDL'. |

    | Time Frame | ddl | No | Defines the temporal scope of the data. Options include
    'Today', 'Last 7 Days', or 'Custom'. |

    | Start Time | string | No | The starting timestamp in ISO 8601 format. This is
    **mandatory** if 'Time Frame' is set to 'Custom'. |

    | End Time | string | No | The ending timestamp in ISO 8601 format. If omitted
    while 'Custom' is selected, the current time is used. |

    | Return JSON Result | boolean | Yes | If enabled, the action will populate the
    JSON result field in the SOAR output. |


    ### Additional Notes

    - At least one currency must be provided via either 'Currencies String' or 'Currencies
    DDL'.

    - The maximum allowed time delta between 'Start Time' and 'End Time' is 7 days;
    the action will automatically truncate the range if it exceeds this limit.

    - This action does not process or interact with Google SecOps entities.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves input parameters including currency
    lists and time frame configurations.

    2. **Validation**: It validates that at least one currency is provided and ensures
    the time range logic is sound (e.g., checking if 'Start Time' is provided for
    'Custom' ranges).

    3. **Data Retrieval**: The action performs a GET request to the VatComply API
    to fetch exchange rates for the specified currencies and dates.

    4. **Internal Data Processing**: It constructs data tables and case wall links
    for each retrieved rate.

    5. **Case Mutation**: The action saves the raw JSON response as a temporary file
    and attaches it to the current Google SecOps case for audit and review.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates a temporary JSON file containing the retrieved exchange rates
      and adds it as an attachment to the current case.
  categories:
    enrichment: false
