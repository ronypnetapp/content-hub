Ping:
  ai_description: >-
    The Ping action is a diagnostic tool used to verify the connectivity between Google
    SecOps and the API Service (VatComply). It ensures that the integration's configuration
    parameters, such as the API Root and authentication credentials, are correct and
    that the external service is reachable.


    ### Parameters

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration settings:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the API Service (default: https://api.vatcomply.com).
    |

    | Password Field | String | No | The password or API key used for authentication.
    |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the API
    server. |


    ### Flow Description

    1. **Initialization**: The action initializes the API client by retrieving the
    global integration configuration (API Root, Password, and SSL settings).

    2. **Authentication**: It sets up an authenticated session using the provided
    password in a custom header.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    typically performs a lightweight GET request to a predefined endpoint (e.g., `/rates`)
    to check for a valid response.

    4. **Result Reporting**: If the request is successful, it returns a success message.
    If the connection fails or returns an error, it reports a failure message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
