Async Action Example:
  ai_description: "### General Description\nThis is an asynchronous utility action\
    \ designed to synchronize workflows by waiting for specific tags to be applied\
    \ to one or more Google SecOps cases. It is primarily used in playbooks where\
    \ a subsequent step should only proceed once a manual or automated tagging event\
    \ has occurred on designated cases.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Case IDs\
    \ | String | No | A comma-separated list of Case IDs to monitor. If left empty,\
    \ the action defaults to monitoring the Case ID from which it was executed. |\n\
    | Case Tag To Wait For | String | Yes | The specific tag string the action will\
    \ look for in the target cases. The action remains 'In Progress' until all specified\
    \ cases contain this tag. |\n\n### Additional Notes\n- This action is defined\
    \ as `is_async: true`, meaning it will yield execution and resume periodically\
    \ until the condition is met or the system timeout is reached.\n- It uses the\
    \ `additional_data` parameter internally to maintain state (tracking which cases\
    \ have already been tagged) between asynchronous iterations.\n\n### Flow Description\n\
    1. **Initialization**: The action extracts the target Case IDs and the required\
    \ tag from the input parameters.\n2. **Validation**: If no Case IDs are provided,\
    \ it identifies the current case ID as the target. It then parses the CSV string\
    \ into a list of integers.\n3. **Status Check**: The action iterates through the\
    \ target cases and calls the SOAR API to retrieve their current metadata, specifically\
    \ looking at the tags.\n4. **Tag Verification**: It compares the tags found on\
    \ each case against the 'Case Tag To Wait For' parameter.\n5. **State Management**:\
    \ \n    - If all target cases possess the required tag, the action sets its state\
    \ to `COMPLETED` and returns a success message.\n    - If any cases are still\
    \ missing the tag, the action updates its internal state (tracking progress) and\
    \ sets the execution state to `IN_PROGRESS` to be retried in the next cycle.\n\
    6. **Timeout Handling**: If the action approaches the global asynchronous timeout\
    \ before all cases are tagged, it will exit gracefully with a timeout error."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
