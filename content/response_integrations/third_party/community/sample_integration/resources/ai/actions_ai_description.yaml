Enrich Entity Action Example:
  ai_description: >-
    ### General Description

    Enriches entities within Google SecOps by adding metadata and data tables. This
    action serves as a template for processing entities based on their type (IP, Hash,
    or User) and applying enrichment logic. It generates a timestamped enrichment
    record for each eligible entity to provide context within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Type | DDL | Yes | Defines which entities from the alert scope should
    be processed. Options include 'All Entities', 'IP', 'Hash', and 'User'. This selection
    determines the filtering logic applied to the target entities. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'Entity Type' selection from the action
    configuration to define the scope of work.

    2. **Entity Filtering**: Identifies entities in the current alert scope that match
    the selected type (e.g., mapping 'IP' to ADDRESS entities or 'Hash' to FILEHASH,
    CHILDHASH, and PARENTHASH entities).

    3. **Enrichment Generation**: For each matching entity, the action generates a
    data dictionary containing a 'true' enrichment status and a current Unix timestamp.

    4. **Internal Updates**:
        *   **Entity Attributes**: Updates the entity's attributes with prefixed fields
    (e.g., `SampleIntegration_enriched` and `SampleIntegration_timestamp`).
        *   **Data Tables**: Attaches a Data Table to the entity containing the enrichment
    details in CSV format for visibility in the entity's profile.
    5. **Finalization**: Produces a summary message listing all successfully enriched
    entities and sets the action result to success.


    ### Additional Notes

    This is a synchronous action designed for demonstration and template purposes.
    It does not interact with an external API but simulates the enrichment process
    internally.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data and attaches data tables to the
      entities.
  categories:
