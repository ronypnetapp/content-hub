Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Cybersixgill's Dynamic Vulnerability Exploit (DVE)
    Score. This action provides deep visibility into vulnerabilities by retrieving
    real-time threat intelligence from the deep and dark web, including DVE scores,
    trending status, and proof-of-concept (POC) details. It helps security teams prioritize
    critical vulnerabilities based on actual exploitation risk rather than static
    scores alone.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for Cybersixgill API authentication.
    |

    | Client Secret | String | Yes | The Client Secret for Cybersixgill API authentication.
    |


    ### Flow Description

    1. **Authentication:** Retrieves API credentials (Client ID and Secret) from the
    integration configuration.

    2. **Entity Filtering:** Identifies CVE entities within the current context.

    3. **Data Retrieval:** Queries the Cybersixgill API for each CVE to fetch DVE
    scores and associated metadata (NVD links, CVSS scores, exploitability probability).

    4. **Internal Enrichment:** Updates the entity's additional properties with the
    retrieved data and marks the entity as enriched.

    5. **Insight Generation:** Creates a detailed case insight for each CVE containing
    a summary of the threat intelligence.

    6. **Data Visualization:** Adds a structured data table to the entity results
    for easy review of vulnerability details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties with Cybersixgill DVE scores and metadata, and creates
      case insights for the enriched CVEs.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - CVE
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic utility designed to verify the connectivity between
    Google SecOps and the Cybersixgill DVE Enrichment service. Its primary purpose
    is to ensure that the provided API credentials (Client ID and Client Secret) are
    valid and that the network path to the Cybersixgill API is open.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the global
    integration configuration for authentication.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting authentication issues. It does not process entities or modify
    any data within the SOAR or the external system.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'Client Id' and 'Client
    Secret' from the integration's global settings.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` with
    the extracted credentials.

    3. **Connectivity Test**: The manager attempts to obtain an access token from
    the Cybersixgill API using the `SixgillBaseClient`.

    4. **Result Reporting**: If the token is successfully retrieved, the action returns
    a success status. If an exception occurs (e.g., invalid credentials or network
    timeout), it returns a failure status with the error details.
