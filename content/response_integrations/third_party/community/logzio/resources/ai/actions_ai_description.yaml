logzio-get-logs-by-event-id:
  ai_description: >-
    ### General Description

    This action fetches the logs that triggered a specific security event from Logz.io.
    It retrieves the logs in JSON format and provides them as a paginated list. The
    action is designed to help investigators see the raw data behind a security alert
    by querying the Logz.io Security API using a unique event identifier.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | alert_event_id | string | Yes | The unique GUID of the security event in your
    Logz.io security account. This ID is used to filter and retrieve the specific
    logs associated with the event. |

    | page_size | string | No | Controls the number of results per page. Valid inputs
    are between 1 and 1000. If an invalid value is provided, it defaults to 25. |


    ### Additional Notes

    - The action automatically handles pagination to ensure all logs associated with
    the event ID are collected, even if they span multiple pages.

    - The action uses a ThreadPoolExecutor to fetch multiple pages concurrently for
    better performance.

    - Retrieved logs are added to the case as insights for immediate visibility.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Logz.io API token, region,
    and optional custom endpoint from the integration configuration.

    2. **Endpoint Construction:** It determines the correct API URL based on the provided
    region or custom endpoint.

    3. **Initial API Call:** It sends a POST request to the Logz.io search logs endpoint
    using the `alert_event_id` and the specified `page_size`.

    4. **Pagination Handling:** If the total number of available logs exceeds the
    initial page, the action calculates the remaining pages and fetches them concurrently.

    5. **Data Processing:** All collected logs are aggregated into a single JSON structure.

    6. **Insight Creation:** The action creates case insights within Google SecOps,
    containing the retrieved log data.

    7. **Completion:** The action returns the aggregated JSON results and a success
    message indicating the number of logs retrieved.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates case insights within Google SecOps to display the retrieved
      logs.
