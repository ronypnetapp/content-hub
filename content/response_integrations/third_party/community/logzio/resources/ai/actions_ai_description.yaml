json-adapter:
  ai_description: >-
    General Description: The Json Adapter action is a utility designed to transform
    raw JSON log data, specifically formatted for Logz.io, into a standardized JSON
    structure compatible with Google SecOps playbooks. It extracts specific fields
    from a list of log results and maps them to a consistent entityType and entityIdentifier
    format, facilitating easier downstream processing and entity mapping. Parameters
    Description: 1. fields_to_search (String, Mandatory): A comma-separated list of
    keys (e.g., src_ip, dest_ip, user_name) to search for within each log entry in
    the provided JSON. 2. raw_json (String, Mandatory): The raw JSON data to be processed.
    The expected structure is an object containing a results key, which holds an array
    of log objects. Flow Description: 1. Parameter Extraction: The action retrieves
    the list of target fields and the raw JSON input. 2. Parsing: It converts the
    fields_to_search string into a list and parses the raw_json string into a Python
    dictionary. 3. Data Iteration: The script iterates through each log entry found
    in the results array of the input JSON. 4. Field Mapping: For each log entry,
    it checks if any of the specified search fields exist. If a match is found, it
    creates a mapping: entityType (the field name) and entityIdentifier (the field
    value). 5. Result Aggregation: All identified mappings are collected into a final
    results object. 6. Output: If at least one field was successfully mapped, the
    action returns the structured JSON and completes successfully. Additional Notes:
    This action is strictly a data transformation utility and does not interact with
    external APIs or modify existing entities within the SOAR environment directly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
