logzio-search-logs:
  ai_description: >-
    ### General Description

    Searches logs in a Logz.io operations account using Lucene syntax. This action
    allows users to retrieve specific log data within a defined time range, providing
    raw log results for further analysis within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | query | string | No | A search query written in valid Lucene syntax. Defaults
    to '*' (wildcard) if not provided. |

    | size | string | No | The number of log results to retrieve per query. It is
    limited to a maximum of 1000 logs. If an invalid value is provided, it defaults
    to 1000. |

    | from_time | string | Yes | The earliest time to search. It accepts Unix timestamps,
    relative time (e.g., '1 hour ago'), or specific date formats. |

    | to_time | string | No | The latest time to search. This should be left empty
    if a relative time is used for the 'from_time' parameter. |


    ### Additional Notes

    - The action requires a valid Logz.io API token and region (or custom endpoint)
    to be configured in the integration settings.

    - Time parsing is handled by the `dateparser` library, supporting a wide range
    of natural language and technical time formats.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Logz.io API token, region,
    and optional custom endpoint from the integration configuration.

    2. **Parameter Processing:** It extracts the search query, validates the result
    size (clamping it between 1 and 1000), and parses the 'from' and 'to' time parameters
    into Unix timestamps.

    3. **Request Construction:** A JSON request body is constructed following the
    Logz.io Search API schema, including the Lucene query and the timestamp range
    filters.

    4. **API Interaction:** The action performs a POST request to the Logz.io search
    endpoint (`v1/search`).

    5. **Data Parsing:** Upon a successful response (HTTP 200), the action iterates
    through the hits and extracts the `_source` data for each log entry.

    6. **Result Delivery:** The collected logs are formatted into a JSON object and
    added to the action's result, and the action completes successfully.
