Ping:
  ai_description: >-
    ### General Description

    Validates connectivity to Logz.io by testing the provided Security and Operations
    API tokens. This action ensures that the integration can successfully communicate
    with the Logz.io API and that the credentials provided in the configuration are
    valid.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `logzio_security_token` | String | Yes | The API token for the Logz.io Security
    account. |

    | `logzio_operations_token` | String | Yes | The API token for the Logz.io Operations
    account. |

    | `logzio_region` | String | No | The Logz.io region (e.g., 'us', 'eu'). If left
    empty or set to 'us', the default base URL is used. |

    | `logzio_custom_endpoint` | String | No | A custom URL for the Logz.io API. If
    provided, it overrides the regional URL logic. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the security token, operations token, region,
    and custom endpoint from the integration configuration.

    2. **Token Validation**: Checks that both tokens are non-empty strings.

    3. **Endpoint Construction**: Determines the target API URL using the provided
    region or custom endpoint, appending the `whoami` suffix.

    4. **Connectivity Test**: Executes GET requests to the Logz.io `whoami` endpoint
    for both the Operations and Security tokens.

    5. **Result Verification**: Confirms that both API calls return a 200 OK status
    code and logs the associated account names.


    ### Additional Notes

    This action is primarily used for troubleshooting and initial setup verification.
    It does not process any entities or modify any data.
