Revoke Access:
  ai_description: >-
    ### General Description

    Revokes an employee's access to the Hibob platform using their email address.
    This action is primarily used during offboarding or security incidents to ensure
    a user can no longer log into the Hibob system by transitioning their status to
    'uninvited'.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | The email address of the employee whose access needs to be
    revoked in Hibob. | String | Yes |


    ### Flow Description

    1. **Fetch Details**: The action first retrieves the employee's internal Hibob
    ID and current status using the provided email address.

    2. **Existence Check**: It verifies if the employee exists in the Hibob database.
    If not, the action terminates with a failure message.

    3. **Status Validation**: It checks the employee's current 'state'. If the employee
    is already in an 'uninvited' state, the action informs the user that access was
    already revoked.

    4. **Revocation**: If the employee is active, the action sends a POST request
    to the Hibob API to revoke access (uninvite) for that specific employee ID.


    ### Additional Notes

    This action does not operate on Google SecOps entities (like ADDRESS or USER).
    It relies entirely on the 'Employee's Email' input parameter provided by the user
    or playbook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Hibob API endpoint '/v1/employees/{employee_identifier}/uninvite',
      which changes the employee's status to 'uninvited' and revokes their access
      to the platform.
    fetches_data: true
