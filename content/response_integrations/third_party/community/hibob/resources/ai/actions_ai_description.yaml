Send Invitation:
  ai_description: "### General Description\nThis action sends an invitation to an\
    \ employee to join the Hibob system. It is used to invite new employees for their\
    \ first login or to re-invite existing users who have been previously disabled.\
    \ The action ensures the user exists and is not already invited before triggering\
    \ the invitation process using a specified onboarding wizard.\n\n### Parameters\
    \ Description\n| Parameter Name | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Employee's Email | string | true | The email address of the\
    \ employee to whom the invitation will be sent. |\n| Welcome Wizard Name | string\
    \ | true | The specific name of the 'Welcome Wizard' configured in Hibob (Settings\
    \ -> Flows). This value is case-sensitive (e.g., 'Welcome!'). |\n\n### Flow Description\n\
    1. **Configuration Retrieval:** The action initializes the Hibob manager using\
    \ the provided API token and root URL.\n2. **Employee Lookup:** It retrieves the\
    \ employee's details from Hibob using the provided email address.\n3. **Validation:**\
    \ \n    - If the employee does not exist, the action stops and reports that the\
    \ user was not found.\n    - If the employee exists but has already been invited\
    \ (state is 'invited'), the action stops to prevent duplicate invitations.\n4.\
    \ **Wizard Identification:** If the employee is eligible, the action fetches all\
    \ available onboarding wizards from Hibob and matches the provided 'Welcome Wizard\
    \ Name' to find the corresponding ID.\n5. **Send Invitation:** The action performs\
    \ a POST request to the Hibob API to send the invitation to the employee using\
    \ the identified wizard ID.\n6. **Result Reporting:** The action returns a JSON\
    \ result indicating whether the employee exists and if the invitation was successfully\
    \ sent.\n\n### Additional Notes\n- This action does not process entities from\
    \ the Google SecOps environment; it relies entirely on the provided action parameters.\n\
    - The 'Welcome Wizard Name' must exactly match the name defined in the Hibob UI."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Hibob API to create an invitation
      for an employee, which changes the user's state in the external system and triggers
      an automated email.
    fetches_data: true
    internal_data_mutation_explanation: null
