Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Hibob platform.\
    \ It ensures that the provided API credentials (API Token) are valid and that\
    \ the Hibob API service is reachable.\n\n### Parameters Description\nThere are\
    \ no input parameters for this action. It relies solely on the integration's global\
    \ configuration (API Token).\n\n### Additional Notes\n- This action is typically\
    \ used during the initial setup of the integration or for troubleshooting connection\
    \ issues.\n- It performs a simple GET request to the Hibob `/api/user` endpoint\
    \ to validate authentication.\n\n### Flow Description\n1. **Configuration Retrieval**:\
    \ The action retrieves the API Token from the Hibob integration settings.\n2.\
    \ **Manager Initialization**: It initializes the `HibobManager` with the API root\
    \ URL and the retrieved token.\n3. **Connectivity Test**: It calls the `test_connectivity`\
    \ method, which sends a GET request to the Hibob API.\n4. **Response Validation**:\
    \ \n    - If the response is successful (HTTP 200) and contains valid JSON, the\
    \ connection is considered successful.\n    - If the response returns a 401 (Unauthorized)\
    \ or 404 (Not Found), an exception is raised with a specific error message.\n\
    5. **Final Result**: The action ends by returning a boolean value (`True` for\
    \ success, `False` for failure) and a descriptive output message to the SOAR interface."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
