Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches USER entities with detailed profile information from the Hibob HR platform.
    This action retrieves employee data such as department, role, and contact details,
    flattens the response, and maps it directly to the entity's additional properties
    within Google SecOps to provide security analysts with organizational context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Get User Image | Boolean | No | A toggle to determine if user avatar/image data
    should be processed during the enrichment flow. |


    ### Additional Notes

    - The action specifically targets entities of type `USER`.

    - All retrieved data is prefixed with 'Hibob' when added to the entity's additional
    properties to ensure clear data lineage and prevent field collisions.

    - The action uses the entity's identifier (typically an email or employee ID)
    to query the Hibob API.


    ### Flow Description

    1. **Configuration Retrieval:** The action initializes by fetching the Hibob API
    token from the integration settings.

    2. **Entity Filtering:** It iterates through the list of target entities and filters
    for those with the type `USER`.

    3. **External API Request:** For each valid user entity, it calls the Hibob `/v1/people/`
    endpoint using the entity's identifier.

    4. **Data Transformation:** The resulting JSON profile is flattened into a single-level
    dictionary using a recursive utility and prefixed with 'Hibob'.

    5. **Internal Enrichment:** The entity's `additional_properties` are updated with
    the flattened data, and the `is_enriched` flag is set to `True`.

    6. **Update and Finalize:** The action updates the modified entities in the Google
    SecOps environment and returns a summary of the enriched users along with the
    raw JSON data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' attribute of USER entities with flattened
      Hibob profile data and sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
