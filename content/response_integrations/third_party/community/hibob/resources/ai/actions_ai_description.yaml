Upload User Image:
  ai_description: >-
    ### General Description

    This action uploads a profile image (avatar) to a specific employee's profile
    in the Hibob platform using a provided image URL. It first resolves the employee's
    unique identifier based on their email address and then performs an update to
    their avatar record.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Employee's Email | The email address of the employee whose image you want to
    upload. | string | True | Used to fetch the internal Hibob ID. |

    | Url Image | The public URL of the image to be set as the employee's avatar.
    | string | True | Must be a valid, accessible URL. |


    ### Additional Notes

    - This action does not operate on Google SecOps entities (e.g., IP, Hostname).
    It relies entirely on the provided email and URL parameters.

    - If the user is not found in Hibob, the action will fail with a descriptive message.


    ### Flow Description

    1. **Fetch Employee ID**: The action calls the Hibob API to retrieve details for
    the provided email address to obtain the internal `employee_identifier`.

    2. **Validate User**: If the user does not exist, the action terminates with a
    failure message.

    3. **Upload Image**: If the user is found, the action sends a `PUT` request to
    the Hibob avatars endpoint with the provided image URL.

    4. **Finalize**: The action returns a success message if the image is uploaded
    or a failure message if the API returns an error (e.g., 404).
