Search User:
  ai_description: >-
    ### General Description

    Searches for a specific user's details in the Hibob HR platform using their email
    address. This action is used to verify the existence of an employee and retrieve
    their profile information from the Hibob system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | String | Yes | The email address of the employee to search
    for in Hibob. |


    ### Flow Description

    1. **Configuration**: Retrieves the API Token and Root URL from the integration
    settings.

    2. **Input Extraction**: Extracts the target email address from the action parameters.

    3. **API Request**: Calls the Hibob API GET `/v1/people/{email}` endpoint via
    the HibobManager.

    4. **Processing**: If the user is found, the profile data is captured and formatted
    into a JSON result.

    5. **Output**: Returns a boolean success status and populates the JSON result
    with the user's details for use in subsequent playbook steps.


    ### Additional Notes

    This action does not iterate over entities in the SecOps case; it performs a lookup
    based strictly on the provided parameter. If the user is not found, the action
    returns a failure status.
