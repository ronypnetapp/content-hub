Get User Image:
  ai_description: >-
    ### General Description


    The **Get User Image** action retrieves the profile image (avatar) for a specific
    employee from the Hibob HR platform. By providing an employee's email address,
    the action identifies the user within Hibob and retrieves their profile picture,
    providing it as both a Base64-encoded string and raw data in the action's JSON
    results.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | String | Yes | The email address of the employee whose profile
    image is to be retrieved. |


    ### Flow Description


    1. **Extract Input:** The action retrieves the `Employee's Email` from the input
    parameters.

    2. **Lookup User:** It queries the Hibob API (`/v1/people/{email}`) to find the
    employee and obtain their internal unique identifier (`id`).

    3. **Fetch Image:** Using the internal identifier, it makes a request to the Hibob
    avatar endpoint (`/v1/avatars/{id}`) to download the image content.

    4. **Process Data:** The binary image content is encoded into a Base64 string
    for easy use in subsequent playbook steps.

    5. **Finalize:** The action populates the JSON result with the Base64 string and
    the image data, then completes with a success message.


    ### Additional Notes


    * **Entity Support:** This action does not run on entities. It uses the email
    address provided in the parameters.

    * **Parameter Typo:** Note that while the internal parameter description in the
    metadata mentions 'uploading', the actual function of this action is to retrieve/download
    the image.

    * **Data Handling:** The action returns the image in the `JsonResult` under the
    keys `imageBase64` and `imageUrl`.
