    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Lead By Email Param:
  ai_description: >-
    ### General Description

    Retrieves lead information from Marketo based on a provided email address. This
    action is used to verify the existence of a lead and fetch their associated data
    from the Marketo platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the user to retrieve details for.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Client ID, Client Secret,
    and Munchkin ID from the integration configuration, and the Email from the action
    parameters.

    2. **Client Initialization**: A MarketoClient is initialized with the retrieved
    credentials.

    3. **Data Retrieval**: The action calls the Marketo API to get lead details using
    the email as a filter.

    4. **Response Handling**: The action checks if lead data was returned. If found,
    it extracts the lead ID and sets the result to success. If not, it indicates the
    user was not found.

    5. **Finalization**: The lead details are added to the action's JSON results,
    and the action completes with a summary message.


    ### Additional Notes

    This action operates on a manual input parameter and does not automatically iterate
    over or enrich entities present in the SecOps case.
