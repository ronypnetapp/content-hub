Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity with the Marketo service to ensure that the integration
    is correctly configured and that the Google SecOps environment can communicate
    with the Marketo API. This action is primarily used for troubleshooting and initial
    setup verification.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the following
    integration configuration parameters:

    * **Client Id**: The client ID for the Marketo API.

    * **Client Secret**: The client secret for the Marketo API.

    * **Munchkin Id**: The Munchkin ID for the Marketo instance.


    ### Additional Notes

    This action follows the standard 'Ping' pattern for Google SecOps integrations.
    It performs a read-only operation (fetching a lead by a static ID) to verify the
    validity of the credentials and the network path.


    ### Flow Description

    1. **Initialize Action**: The action initializes the Siemplify context.

    2. **Retrieve Configuration**: It extracts the Client Id, Client Secret, and Munchkin
    Id from the integration settings.

    3. **Establish Connection**: It instantiates the MarketoClient using the provided
    credentials.

    4. **Test API Call**: It executes a `get_lead_by_id` call for a lead with ID '1'
    to verify that the API responds correctly.

    5. **Finalize**: If the call is successful, the action ends with a success status.
