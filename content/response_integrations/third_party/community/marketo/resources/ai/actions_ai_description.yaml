Request Campaign:
  ai_description: >-
    ### General Description

    This action triggers a specific Marketo campaign for a designated lead. It allows
    users to programmatically initiate marketing workflows directly from Google SecOps
    by providing the campaign and lead identifiers along with optional dynamic tokens.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Campaign Id | string | Yes | The unique integer identifier of the Marketo campaign
    to be requested. |

    | Lead Id | string | Yes | The unique integer identifier of the lead for whom
    the campaign is being requested. |

    | Tokens Json | string | No | A JSON-formatted string containing key-value pairs
    (tokens) to be used within the campaign. The action automatically lowercases keys
    and values unless the key contains the word 'password'. |


    ### Additional Notes

    - This action does not operate on entities within the Google SecOps case; it relies
    entirely on the IDs provided in the action parameters.

    - The `Campaign Id` and `Lead Id` are treated as integers by the underlying Marketo
    SDK.


    ### Flow Description

    1. **Initialization**: The action retrieves Marketo integration credentials (Client
    ID, Client Secret, and Munchkin ID) and the action parameters.

    2. **Token Processing**: If provided, the `Tokens Json` is parsed. The logic iterates
    through the dictionary to lowercase keys and values, preserving the case for any
    values associated with keys containing 'password'.

    3. **API Execution**: The action initializes the `MarketoClient` and calls the
    `execute` method with the `request_campaign` operation, passing the `campaign_id`,
    `lead_id`, and processed tokens.

    4. **Result Handling**: If the API call is successful, the action completes with
    a success message. If an error occurs, it logs the exception and fails the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers the execution of a marketing campaign for a specific lead within the
      Marketo platform, which initiates external workflows and communications.
    fetches_data: false
    internal_data_mutation_explanation: null
