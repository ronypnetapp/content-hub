Create lead:
  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using provided user details. This action allows
    for the programmatic addition of individuals to the Marketo database directly
    from a SOAR workflow, facilitating marketing automation and lead management processes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the new lead to be created. |

    | First Name | String | Yes | The first name of the new lead. |

    | Last Name | String | Yes | The last name of the new lead. |

    | Country | String | Yes | The country of the new lead. |


    ### Flow Description

    1. **Initialization**: The action retrieves Marketo integration credentials (Client
    ID, Client Secret, and Munchkin ID) and the specific lead details from the action
    parameters.

    2. **API Connection**: It establishes a connection to the Marketo API using the
    `MarketoClient`.

    3. **Lead Creation**: The action executes a `create_update_leads` call with the
    `createOnly` action flag, ensuring that it only attempts to create a new lead
    rather than updating an existing one, using the email as the lookup field.

    4. **Response Handling**: It parses the API response to check for success or specific
    failure reasons (such as the lead already existing).

    5. **Finalization**: The action outputs the raw JSON result from Marketo and provides
    a human-readable summary, including the new Lead ID upon success.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new lead record in the external Marketo marketing automation system.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
