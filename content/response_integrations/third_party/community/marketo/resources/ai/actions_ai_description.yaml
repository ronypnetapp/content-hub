Get Lead By Entity Email:
  ai_description: >-
    ### General Description

    Retrieves lead information from Marketo for User entities that possess a valid
    email address format. This action is used to enrich user profiles with marketing
    data such as names and lead identifiers.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the Marketo
    integration configuration (Client Id, Client Secret, and Munchkin Id).


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the Marketo API credentials
    from the integration settings.

    2. **Entity Filtering**: It iterates through the target entities, selecting only
    those of type `USER` that match a standard email regex pattern.

    3. **External API Call**: For each valid email, it queries the Marketo API using
    the `get_multiple_leads_by_filter_type` method.

    4. **Data Enrichment**: If a lead is found, the action extracts the first name,
    last name, email, and Lead ID.

    5. **Internal Update**: The entity's additional properties are updated with the
    retrieved data, and the `is_enriched` flag is set to true.

    6. **Finalization**: The action updates all enriched entities in Google SecOps
    and provides a JSON summary of the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with lead information from Marketo and
      sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
