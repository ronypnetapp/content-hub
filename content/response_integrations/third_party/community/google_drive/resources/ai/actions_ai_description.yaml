Add Permission:
  ai_description: >-
    ### General Description

    Adds permissions for a specific file stored in Google Drive to one or more users.
    This action allows administrators to programmatically manage access control by
    assigning roles such as Owner, Writer, or Reader to specific email addresses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Id** | String | Yes | The unique ID of the file in Google Drive. This
    can be found in the file's URL. |

    | **Role** | DDL | Yes | The level of access to grant. Options include: `owner`
    (full control), `writer` (can edit and comment), and `reader` (view only). |

    | **Emails** | String | Yes | Semicolon-separated list of email addresses to which
    permissions will be granted (e.g., `user1@example.com;user2@example.com`). |

    | **Should send notification** | Boolean | No | If set to true, Google Drive will
    send an email notification to the users about the granted permission. |


    ### Flow Description

    1. **Initialization**: The action extracts the Google Drive service account credentials
    from the integration configuration and the specific file ID, role, and email list
    from the action parameters.

    2. **Parsing**: The semicolon-separated string of email addresses is split into
    a list of individual emails.

    3. **API Interaction**: For each email address in the list, the action calls the
    Google Drive API's permissions endpoint to create a new permission entry with
    the specified role and notification settings.

    4. **Completion**: The action returns a success message confirming that the permissions
    were granted for the specified file.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds new permission entries to Google Drive files, which modifies the access
      control list (ACL) of the resource in the external Google Drive system.
    fetches_data: false
    internal_data_mutation_explanation: null
