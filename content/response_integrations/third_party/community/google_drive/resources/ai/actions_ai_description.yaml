Upload File From Base64:
  ai_description: >-
    ### General Description

    This action uploads a file to Google Drive using a Base64 encoded string. It allows
    users to specify a file name, provide the file content in Base64 format, and optionally
    share the uploaded file with specific email addresses by granting them 'writer'
    permissions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Name | String | Yes | The name of the file to be created in Google Drive
    (e.g., 'report.pdf'). |

    | Share with emails | String | Yes | A semicolon-separated list of email addresses
    (e.g., 'user1@example.com;user2@example.com') to grant 'writer' access to the
    file. |

    | Base64 String | String | Yes | The content of the file encoded as a Base64 string.
    |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Google Drive service
    account credentials from the integration settings.

    2. **Parameter Retrieval**: It extracts the file name, Base64 content, and the
    list of emails to share with from the action inputs.

    3. **Data Decoding**: The Base64 string is decoded into a binary stream for processing.

    4. **File Upload**: The action interacts with the Google Drive API to create a
    new file with the provided name and content. The MIME type is automatically determined
    based on the file extension.

    5. **Permission Management**: If email addresses are provided, the action iterates
    through each email and grants 'writer' permissions to the newly created file ID.

    6. **Result Reporting**: The action returns the metadata of the created file (including
    the unique Google Drive File ID) and completes the execution.


    ### Additional Notes

    - The action uses the 'writer' role when sharing files, allowing recipients to
    edit the document.

    - If the 'Share with emails' parameter is empty or contains invalid emails, the
    file upload will still proceed, but the sharing step may be skipped or fail for
    specific entries.
