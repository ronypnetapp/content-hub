Upload File From Path:
  ai_description: >-
    ### General Description

    The **Upload File From Path** action enables the automated uploading of files
    from a local system path to a Google Drive account. This action is particularly
    useful for archiving reports, logs, or evidence collected during an investigation.
    Beyond simple uploading, it allows for immediate collaboration by sharing the
    uploaded file with specified email addresses.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Path** | String | Yes | The absolute local path of the file to be uploaded
    (e.g., `/tmp/evidence.zip`). |

    | **Share with emails** | String | Yes | A semicolon-separated list of email addresses
    to grant 'writer' permissions to the uploaded file (e.g., `analyst@company.com;manager@company.com`).
    |


    ### Additional Notes

    - The action requires a valid Google Service Account JSON configuration to interact
    with the Google Drive API.

    - Although the parameter 'Share with emails' is marked as mandatory in the configuration,
    the script logic handles the sharing process iteratively for each email provided.


    ### Flow Description

    1. **Initialization**: The action extracts the Google Drive credentials and the
    user-provided file path and email list.

    2. **File Upload**: The `GoogleDriveManager` reads the file from the local path
    and performs a multipart upload to Google Drive using the file's original name.

    3. **Permission Assignment**: If email addresses are provided, the action iterates
    through the list and calls the Google Drive Permissions API to grant 'writer'
    access to each recipient.

    4. **Result Reporting**: The action returns the Google Drive File ID and the complete
    JSON metadata of the created file object.
