Remove Permission:
  ai_description: >-
    ### General Description

    The **Remove Permission** action is designed to revoke a specific user or group's
    access to a file stored in Google Drive. By providing the unique identifiers for
    both the file and the permission, security teams can programmatically restrict
    access as part of an incident response or data loss prevention (DLP) workflow.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Id** | String | Yes | The unique identifier of the Google Drive file.
    This can be found in the file's URL (e.g., `https://drive.google.com/drive/u/0/folders/{file-id}`).
    |

    | **Permission Id** | String | Yes | The unique identifier for the specific permission
    to be removed. This ID is typically retrieved using a 'List Permissions' action.
    |


    ### Additional Notes

    - This action requires valid Google Drive API credentials with sufficient scopes
    (`drive` or `drive.file`) to modify permissions.

    - Removing a permission is a permanent action on the external system and cannot
    be undone through this specific action (a new permission would need to be created).


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google Drive service
    account credentials from the integration settings.

    2. **Parameter Retrieval:** It extracts the `File Id` and `Permission Id` provided
    by the user or playbook.

    3. **Manager Initialization:** The `GoogleDriveManager` is initialized using the
    credentials to establish a connection with the Google Drive API.

    4. **Execution:** The action calls the `remove_permission` method, which sends
    a DELETE request to the Google Drive permissions endpoint for the specified file
    and permission ID.

    5. **Finalization:** Upon successful deletion, the action returns a success message
    and terminates.
