Download File To Path:
  ai_description: >-
    ### General Description

    Downloads a file stored in Google Drive to a specific local path on the system
    where the action is executed. This action is designed to retrieve files for local
    processing, analysis, or storage within a workflow. It supports both standard
    binary files and Google Workspace documents (Docs, Sheets, Slides) by automatically
    converting them to standard formats (docx, xlsx, pptx) during the download process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Id | String | Yes | The unique identifier of the file in Google Drive.
    This can be extracted from the file's sharing URL. |

    | Folder Path | String | Yes | The local directory path on the runner where the
    file should be saved. |


    ### Additional Notes

    - **Parameter Discrepancy**: While the configuration metadata indicates that 'Folder
    Path' is optional with a default value of `/temp`, the Python implementation explicitly
    marks it as mandatory during extraction. Users should ensure this value is provided.

    - **File Conversion**: Google-native files are exported to OpenXML formats (e.g.,
    Google Docs to .docx) to ensure they can be opened locally.


    ### Flow Description

    1. **Initialization**: Authenticates with the Google Drive API using the provided
    service account credentials.

    2. **Metadata Fetching**: Retrieves the file's metadata from Google Drive to identify
    its name and MIME type.

    3. **Type Determination**: Checks if the file is a Google Workspace document.
    If so, it selects the appropriate export format (docx, pptx, or xlsx).

    4. **Data Retrieval**: Downloads the file content. It uses `export_media` for
    Google Workspace files and `get_media` for standard binary files.

    5. **File Writing**: Saves the binary stream to the specified local `Folder Path`
    using the original file name (and appropriate extension if converted).

    6. **Result Reporting**: Returns a JSON object containing the file name, type,
    and the final local path where the file was saved.
