Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Google Drive service. Its primary purpose is to
    ensure that the integration's configuration, specifically the service account
    credentials, is valid and that the Google Drive API is reachable.


    ### Parameters

    This action does not require any input parameters. It utilizes the **Credentials
    Json** provided in the integration's global configuration to authenticate.


    ### Flow Description

    1. **Authentication**: The action extracts the service account credentials from
    the integration settings and initializes the Google Drive API client using the
    `drive:v3` discovery service.

    2. **API Verification**: It executes a test call to the Google Drive API by attempting
    to list files with the `mimeType='image/jpeg'` filter. This specific call is used
    as a lightweight check to confirm read permissions and network connectivity.

    3. **Execution Completion**: If the API call succeeds, the action returns a success
    message ('Connected successfully') and sets the execution state to completed.
    If the credentials are invalid or the service is unreachable, the action will
    fail with an error.
