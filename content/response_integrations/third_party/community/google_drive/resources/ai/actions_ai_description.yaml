Delete File:
  ai_description: >-
    ### General Description

    The **Delete File** action permanently removes a specific file from Google Drive
    using its unique File ID. This action is typically used in response to security
    incidents where a malicious or sensitive file needs to be purged from the cloud
    environment to prevent further access or distribution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Id** | String | Yes | The unique identifier of the file to be deleted.
    This ID is found in the file's URL (e.g., `https://drive.google.com/drive/u/0/folders/{file-id}`).
    |


    ### Additional Notes

    *   **Permanent Deletion**: This action performs a permanent deletion, meaning
    the file skips the Google Drive trash/bin and cannot be easily recovered.

    *   **No Entity Context**: This action does not automatically process entities
    from the alert; it requires the specific File ID to be provided manually or via
    a previous playbook step.


    ### Flow Description

    1.  **Credential Setup**: The action extracts the service account credentials
    from the integration configuration to authenticate with the Google Drive API.

    2.  **Input Validation**: It retrieves the mandatory `File Id` parameter provided
    in the action configuration.

    3.  **API Execution**: The action utilizes the `GoogleDriveManager` to call the
    Google Drive API's delete method for the specified file identifier.

    4.  **Finalization**: Upon successful execution, the action returns a confirmation
    message stating that the file was successfully deleted.
