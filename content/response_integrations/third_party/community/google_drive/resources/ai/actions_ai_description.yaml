Get File Metadata:
  ai_description: >-
    ### General Description

    Retrieves comprehensive metadata for a specific file stored in Google Drive. This
    action allows users to fetch detailed information about a file, including its
    name, MIME type, size, creation/modification times, and ownership details, using
    the unique Google Drive File ID.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Id | String | Yes | The unique identifier of the file, which can be found
    in the file's URL (e.g., `https://drive.google.com/file/d/{file-id}/view`). |


    ### Additional Notes

    This action does not process or filter Google SecOps entities. It operates strictly
    on the provided `File Id` parameter. It is a read-only operation and does not
    modify any data in Google Drive.


    ### Flow Description

    1. **Credential Retrieval**: Extracts the Google service account credentials from
    the integration configuration.

    2. **Parameter Extraction**: Retrieves the mandatory `File Id` provided by the
    user.

    3. **API Connection**: Initializes the Google Drive API client using the provided
    credentials.

    4. **Metadata Retrieval**: Executes a GET request to the Google Drive API to fetch
    all available metadata fields for the specified file.

    5. **Output Generation**: Adds the retrieved metadata to the action's JSON results
    and completes the action with a success message.
