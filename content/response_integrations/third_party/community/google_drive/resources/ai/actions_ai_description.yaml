Download File To Base64:
  ai_description: "### General Description\nThe **Download File To Base64** action\
    \ retrieves a file from Google Drive using its unique File ID and converts the\
    \ file's content into a Base64-encoded string. This is particularly useful for\
    \ automated workflows that need to process file contents (e.g., for malware analysis,\
    \ attachment forwarding, or document parsing) without requiring local file system\
    \ storage. It supports both standard binary files and Google Workspace documents\
    \ (Docs, Sheets, Slides) by automatically converting them to standard formats\
    \ (DOCX, XLSX, PPTX) during the download process.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **File Id** | String | Yes | The unique identifier of the file in Google Drive.\
    \ This ID can be found in the file's sharing URL (e.g., `https://drive.google.com/file/d/{file-id}/view`).\
    \ |\n\n### Flow Description\n1.  **Initialization**: The action initializes the\
    \ Google Drive manager using the provided service account credentials.\n2.  **Metadata\
    \ Retrieval**: It fetches the metadata for the specified `File Id` to determine\
    \ the file name and MIME type.\n3.  **Download Logic**: \n    *   If the file\
    \ is a Google Workspace document (Doc, Sheet, or Slide), the action uses the `export`\
    \ method to convert it into a Microsoft Office format (DOCX, XLSX, or PPTX).\n\
    \    *   If the file is a standard binary file, it uses the direct `get_media`\
    \ download method.\n4.  **Encoding**: The downloaded binary stream is converted\
    \ into a Base64 string.\n5.  **Output**: The action returns a JSON object containing\
    \ the file name, MIME type, size (for binary files), and the Base64-encoded content."
