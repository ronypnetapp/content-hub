Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Google Safe Browsing service.
    This action is primarily used to verify that the provided API Key is valid and
    that the environment can reach the Google Safe Browsing API endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action has no input parameters. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the 'Api Key' from the integration's
    global configuration.

    2. **Connectivity Test**: Initializes the Safe Browsing client and performs a
    lookup for a hardcoded test URL (`http://malware.testing.google.test/testing/malware/`).

    3. **Result Reporting**: If the API call is successful, the action concludes with
    a success message.


    ### Additional Notes

    This action does not process any entities from the case; it uses a static test
    URL to validate the connection.
