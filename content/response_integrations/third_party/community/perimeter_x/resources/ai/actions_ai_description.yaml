Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity and authentication status
    between Google SecOps and the Slack API as part of the PerimeterX integration.
    It ensures that the configured credentials are correct and that the system can
    successfully communicate with Slack.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Slack API Key | String | Yes | The API token used to authenticate requests to
    the Slack platform. This is a configuration-level parameter. |

    | Slack Channel | String | Yes | The specific Slack channel name associated with
    the integration. This is a configuration-level parameter. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Slack API Key and Slack
    Channel from the integration's configuration settings.

    2. **Manager Initialization**: It initializes the PerimeterXManager with the provided
    credentials.

    3. **Authentication Check**: The action calls the auth() method, which performs
    a POST request to the Slack auth.test endpoint to verify the token.

    4. **Result Reporting**: If the API returns a successful authentication response,
    the action completes with a success message. If an error occurs or authentication
    fails, it reports a failure status.


    ### Additional Notes

    This action does not process any entities and is strictly used for health checks
    of the integration configuration. As a Ping action, it is not categorized as an
    enrichment action.
