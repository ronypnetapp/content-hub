Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the **WHOIS XML API** service. It ensures that the provided API credentials
    are valid and that the external service is reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration for the **API Key**.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `API Key` from the integration's
    configuration settings.

    2. **Connectivity Test**: It performs a `GET` request to the WHOIS XML API endpoint,
    querying a hardcoded domain (`google.com`) to test the connection.

    3. **Authentication Validation**: The script checks the response body for specific
    error messages indicating authentication failure.

    4. **Result Reporting**: If the request is successful and no authentication errors
    are found, the action completes with a "Successful Connection" status.


    ### Additional Notes

    This action does not process any entities from the case; it is purely for administrative
    connectivity testing.
