Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities by retrieving domain registration information
    from the WHOIS XML API. This action helps analysts understand the ownership and
    registration history of a domain by pulling data such as registrant name, organization,
    and contact details directly into the Google SecOps entity profile.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used to authenticate with the WHOIS XML
    API service. This is extracted from the integration configuration. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the API Key from the integration's
    configuration settings.

    2. **Entity Filtering**: It iterates through the target entities, selecting only
    those that are either non-internal Hostnames or URLs.

    3. **External API Interaction**: For each eligible entity, the action sends a
    GET request to the WHOIS XML API `WhoisService` endpoint using the entity's identifier
    as the domain name.

    4. **Data Extraction**: The action parses the JSON response to locate registrant
    details within the `WhoisRecord`.

    5. **Internal Enrichment**: If registrant details are found, they are mapped to
    the entity's `additional_properties`.

    6. **Finalization**: The action updates the entities in Google SecOps with the
    new metadata and attaches the raw JSON response to the action's execution results
    for further review.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with registrant information (name, organization,
      etc.) retrieved from the WHOIS XML API.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Domain Details:
  ai_description: >-
    ### General Description

    The **Get Domain Details** action retrieves comprehensive WHOIS information for
    a specified domain using the WHOIS XML API. This action is designed to provide
    security analysts with registration details, ownership information, and domain
    status to assist in investigations and threat intelligence gathering.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Domain Name** | String | Yes | The specific domain (e.g., google.com) to be
    scanned for WHOIS information. |

    | **Check availability** | Boolean | No | If set to `true`, the action will include
    a check for the domain's availability in the response. Defaults to `false`. |


    ### Flow Description

    1. **Initialization**: The action extracts the API Key from the integration configuration
    and retrieves the target domain and availability preference from the action parameters.

    2. **Request Construction**: It constructs a GET request URL for the WHOIS XML
    API, incorporating the API key, the target domain, and the availability check
    flag.

    3. **Data Retrieval**: The action performs a synchronous HTTP GET request to the
    WHOIS XML API service.

    4. **Output Generation**: The resulting JSON data is processed and added to the
    action's results in two formats: as a script result (for use in subsequent playbook
    steps) and as an action JSON (for display in the context details view).


    ### Additional Notes

    This action operates independently of the alert's entity context; it requires
    the domain to be explicitly provided as a parameter rather than iterating over
    entities like IP or Domain objects found in the alert.
