Enrich IP:
  ai_description: "### General Description\nEnriches IP Address entities using Pulsedive\
    \ threat intelligence. This action retrieves comprehensive indicator data, including\
    \ risk levels, risk factors, and community comments, to provide context for security\
    \ investigations. It allows users to define a risk threshold to automatically\
    \ flag suspicious entities within Google SecOps.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Threshold** | DDL | Yes | The minimum risk level (verylow, low, medium, high,\
    \ critical) required for the action to mark an entity as suspicious. |\n| **Retrieve\
    \ Comments** | Boolean | No | If enabled, the action will fetch and display community\
    \ comments associated with the IP indicator. Default is true. |\n| **Only Suspicious\
    \ Entity Insight** | Boolean | No | If enabled, the action will only generate\
    \ a case insight for entities that meet or exceed the specified risk threshold.\
    \ Default is false. |\n| **Max Comments To Return** | String | No | Specifies\
    \ the maximum number of comments to retrieve and display in the case wall data\
    \ table. Default is 50. |\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ Retrieves integration configuration (API Key, Root) and action-specific parameters\
    \ (Threshold, Comment settings).\n2. **Entity Filtering**: Identifies all `ADDRESS`\
    \ (IP) entities within the current context.\n3. **External Lookup**: For each\
    \ IP, queries the Pulsedive API to fetch indicator details and risk scores.\n\
    4. **Risk Assessment**: Compares the retrieved Pulsedive risk level against the\
    \ user-defined `Threshold`. If the threshold is met, the entity is marked as suspicious.\n\
    5. **Internal Enrichment**: Updates the entity's additional properties with Pulsedive\
    \ metadata and marks the entity as enriched.\n6. **Case Documentation**: \n  \
    \  * Creates a data table on the case wall containing community comments (if enabled).\n\
    \    * Generates a detailed insight for the entity (subject to the `Only Suspicious\
    \ Entity Insight` filter).\n7. **Finalization**: Updates the entities in the Google\
    \ SecOps platform and returns a JSON summary of the results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (enrichment fields and suspicious status), creates
      case insights, and adds data tables to the case wall.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich URL:
  ai_description: >-
    Enriches URL entities using threat intelligence from Pulsedive. The action retrieves
    comprehensive indicator data, including risk levels, risk factors, and community
    comments. It evaluates the URL's risk against a user-defined threshold to determine
    if the entity should be marked as suspicious within Google SecOps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | DDL | Yes | The risk level (verylow, low, medium, high, critical)
    at which the URL is marked suspicious. |

    | Retrieve Comments | Boolean | No | If enabled, fetches community comments associated
    with the URL from Pulsedive. |

    | Max Comments To Return | String | No | The maximum number of comments to retrieve
    (default is 50). |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, entity insights
    will only be created for URLs that meet or exceed the risk threshold. |


    ### Flow Description

    1. **Entity Filtering:** Filters the target entities to identify URL types.

    2. **Data Retrieval:** For each URL, it queries the Pulsedive API to fetch indicator
    details, risk scores, and risk factors.

    3. **Risk Evaluation:** Compares the Pulsedive risk level against the user-provided
    `Threshold` parameter. If the risk is equal to or higher than the threshold, the
    entity is marked as suspicious.

    4. **Enrichment:** Updates the entity's additional properties with Pulsedive metadata
    (e.g., indicator ID, retired status, seen dates).

    5. **Comment Processing:** If `Retrieve Comments` is active, it fetches comments
    and adds them as a structured data table to the case wall.

    6. **Insight Generation:** Creates an HTML-formatted entity insight containing
    a risk summary and detailed risk factors. This is conditional based on the `Only
    Suspicious Entity Insight` parameter.

    7. **Finalization:** Updates the entities in the system and returns a JSON result
    containing the raw data and a global risk flag.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious status, populates enrichment fields, adds data tables
      for comments to the case wall, and creates entity insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
