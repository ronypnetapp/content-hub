    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    Tests the connectivity to the Pulsedive server using the provided configuration
    parameters. This action ensures that the API Root and API Key are valid and that
    the network connection to Pulsedive is functional.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Pulsedive API. |

    | API Key | String | Yes | The API key used for authentication with Pulsedive.
    |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Pulsedive server. Default is True. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, API Key, and SSL verification
    settings from the integration configuration.

    2. **Manager Initialization**: Initializes the PulsediveManager with the extracted
    credentials.

    3. **Connectivity Test**: Executes a test search request to the Pulsedive API
    to verify the connection and credentials.

    4. **Result Reporting**: Returns a success message if the connection is established,
    or a failure message with error details if the test fails.


    ### Additional Notes

    - This action does not process any entities and is used solely for configuration
    validation.
