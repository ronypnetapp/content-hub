    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Threat Details:
  ai_description: >-
    ### General Description

    This action retrieves comprehensive threat intelligence from Pulsedive based on
    a provided threat name or threat ID. It is designed to provide security analysts
    with deep context regarding specific threat actors, campaigns, or malware families,
    including risk levels, wiki summaries, associated news, and user comments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat Name | String | No | The name of the threat to retrieve information for
    (e.g., 'Zeus'). |

    | Threat ID | String | No | The specific Pulsedive ID (TID) of the threat to retrieve
    information for. |

    | Retrieve Comments | Boolean | No | If set to `true`, the action will fetch user
    comments associated with the threat. Default is `true`. |

    | Split Risk | Boolean | No | If set to `true`, the action will provide a breakdown
    of indicator counts by risk level (Critical, High, Medium, etc.). Default is `true`.
    |

    | Create Insight | Boolean | No | If set to `true`, the action will generate a
    formatted HTML insight in the Google SecOps case containing the threat summary.
    Default is `false`. |


    ### Additional Notes

    *   **Input Requirement**: Either the `Threat Name` or the `Threat ID` must be
    provided for the action to successfully identify a threat. If both are provided,
    the `Threat Name` takes precedence in the logic.

    *   **Data Tables**: If comments are retrieved, they are presented in a dedicated
    data table on the case wall.


    ### Flow Description

    1.  **Initialization**: The action initializes the Pulsedive manager using the
    provided API Root and API Key.

    2.  **Parameter Extraction**: It extracts the threat identifier (Name or ID) and
    configuration flags (Retrieve Comments, Split Risk, Create Insight) from the action
    parameters.

    3.  **Data Retrieval**: The action queries the Pulsedive API (`/api/info.php`)
    to fetch detailed information about the specified threat.

    4.  **Internal Mutation (Data Table)**: If the threat has associated comments
    and `Retrieve Comments` is enabled, the action constructs a CSV-formatted table
    and adds it to the case wall.

    5.  **Internal Mutation (Insight)**: If `Create Insight` is enabled, the action
    generates a formatted HTML insight containing the threat's risk level, category,
    risk summary, wiki summary, and recent news.

    6.  **Completion**: The action populates the JSON results with the full threat
    data and completes the execution with a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the case wall containing threat comments and
      can create a detailed case insight with threat summaries and risk scores.
  categories:
    enrichment: false
  entity_usage:
