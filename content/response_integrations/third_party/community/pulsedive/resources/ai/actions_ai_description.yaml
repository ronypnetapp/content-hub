Scan Indicator:
  ai_description: >-
    ### General Description

    Performs an automated scan on indicators (IPs, Domains, URLs, and Hashes) using
    the Pulsedive threat intelligence platform. This action is asynchronous, meaning
    it submits indicators for analysis, polls for completion, and then retrieves the
    final report. It supports both Passive scans (retrieving existing data) and Active
    scans (initiating a fresh probe). The action enriches entities with risk levels,
    risk factors, and community comments, and can automatically mark entities as suspicious
    based on a configurable risk threshold.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan Type | DDL | Yes | Determines the scan depth. 'Passive' fetches existing
    data without direct interaction, while 'Active' performs a more intrusive, real-time
    scan. |

    | Threshold | DDL | Yes | The risk level (verylow, low, medium, high, critical)
    at which an entity will be labeled as suspicious in Google SecOps. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, the action will
    only generate an entity insight if the indicator's risk score meets or exceeds
    the specified threshold. |

    | Retrieve Comments | Boolean | No | If enabled, the action fetches community
    comments associated with the indicator from Pulsedive. |

    | Max Comments To Return | String | No | Specifies the maximum number of comments
    to retrieve and display in the case wall data table. Defaults to 50. |


    ### Additional Notes

    - This action is **Asynchronous**: It will transition through 'In Progress' states
    while waiting for Pulsedive to complete the analysis.

    - The action uses the `OriginalIdentifier` of an entity if available, ensuring
    accurate lookups for renamed or modified entities.


    ### Flow Description

    1. **Submission (First Run):** The action iterates through all target entities
    and submits them to Pulsedive's analysis engine using the specified `Scan Type`
    (Active or Passive).

    2. **Status Polling:** The action enters an asynchronous loop, checking the status
    of each submitted scan ID until Pulsedive reports the analysis is 'done'.

    3. **Data Retrieval:** Once completed, the action fetches the full report for
    each indicator, including risk scores, risk factors, and comments.

    4. **Risk Evaluation:** It compares the retrieved risk level against the user-defined
    `Threshold`. If the risk is equal to or higher than the threshold, the entity
    is marked as suspicious.

    5. **Enrichment & Insights:** The action updates the entity's additional properties
    with Pulsedive data, creates detailed entity insights (optionally filtered by
    the 'Only Suspicious' flag), and adds data tables containing community comments
    to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious status, adds enrichment properties to entities, creates
      entity insights, and adds data tables for comments within the case.
  categories:
    enrichment: true
  entity_usage:
