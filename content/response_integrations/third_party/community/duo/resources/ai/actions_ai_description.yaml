Get Authentication Logs for User:
  ai_description: >-
    ### General Description

    This action retrieves user profile information and authentication logs from DUO
    MFA for a specific username. It is designed to provide visibility into a user's
    authentication patterns over a specified period (defaulting to 1 day). The action
    also performs a frequency analysis on successful authentication sources (IP addresses,
    states, operating systems, applications, devices, and factors) and filters them
    based on a user-defined threshold to identify 'known' or 'safe' sources.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Authentication Threshold | string | Yes | The minimum number of successful authentications
    required for an authentication source (e.g., an IP or device) to be included in
    the summary lists. Default is 2. |

    | Number Days Back | string | Yes | The number of days prior to the current time
    to retrieve logs for. Default is 1. |

    | Username | string | No | The DUO username for which to retrieve data. |


    ### Flow Description

    1. **Authentication**: Connects to the DUO Admin API using the configured Hostname,
    Integration Key, and Secret Key.

    2. **User Identification**: Queries DUO to find the `user_id` associated with
    the provided `Username` parameter.

    3. **Log Retrieval**: Fetches all authentication logs for that user within the
    time window defined by `Number Days Back`.

    4. **Data Processing**: Iterates through the logs to identify successful authentications.

    5. **Frequency Analysis**: Counts occurrences of specific metadata fields (IP,
    OS, Location, Device, etc.) for successful logins.

    6. **Filtering**: Removes entries from the frequency counts that do not meet the
    `Authentication Threshold`.

    7. **Output**: Returns a comprehensive JSON object containing the user's profile,
    raw logs, and the filtered frequency analysis.
