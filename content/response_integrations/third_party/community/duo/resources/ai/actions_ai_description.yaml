Get Users by Name:
  ai_description: >-
    ### General Description

    Retrieves detailed user information from DUO MFA using the Admin API based on
    a specific username. This action is designed to fetch user-specific metadata,
    including user IDs, authentication details, and device data, providing visibility
    into a user's status within the DUO ecosystem.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Username | String | Yes | The specific username to query in the DUO Admin API
    to retrieve associated data. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the DUO API Hostname, Admin Secret
    Key, and Admin Integration Key from the integration's configuration settings.

    2. **Parameter Extraction**: Retrieves the target `Username` provided as an action
    input.

    3. **API Initialization**: Initializes the DUO Admin API client using the extracted
    credentials.

    4. **Data Retrieval**: Calls the `get_users_by_name` endpoint to fetch all records
    associated with the provided username.

    5. **Result Processing**: Iterates through the returned data to identify the `user_id`
    and aggregates the full response into a structured JSON result for use in subsequent
    playbook steps.
