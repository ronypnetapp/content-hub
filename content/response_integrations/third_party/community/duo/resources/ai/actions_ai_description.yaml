Ping:
  ai_description: >-
    ### General Description

    Verifies the connectivity and credentials for the DUO Auth API. This action uses
    the DUO Python SDK to call the `/check` endpoint, ensuring that the provided API
    Hostname, Secret Key, and Integration Key are valid and that the request signature
    is generated correctly.


    ### Parameters

    There are no input parameters for this action. It relies entirely on the integration's
    configuration settings (API Hostname, Auth Secret Key, and Auth Integration Key).


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the `API Hostname`, `Auth Secret Key`,
    and `Auth Integration Key` from the DUO integration settings.

    2. **Client Initialization**: Initializes the DUO Auth API client using the retrieved
    credentials.

    3. **Connectivity Check**: Executes the `check()` method against the DUO API to
    verify the integration setup.

    4. **Result Handling**: If the check is successful, it returns a confirmation
    message. If an exception occurs, it reports a failure with the specific error
    details.
