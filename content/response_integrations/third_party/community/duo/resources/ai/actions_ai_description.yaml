Get Trust Monitor Events:
  ai_description: >-
    ### General Description

    Retrieves Trust Monitor events from DUO Security for a specified lookback period.
    This action interacts with the DUO Admin API to fetch security events that help
    monitor trust assessments and potential security anomalies within the DUO environment.
    It is primarily used for data gathering and auditing purposes.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Number Days Back | String | Yes | The number of days prior to the current time
    to retrieve events from. The value is converted to an integer and used to calculate
    the start timestamp for the API request. Default is '1'. |


    ### Additional Notes

    - This action requires valid DUO Admin API credentials (API Hostname, Admin Secret
    Key, and Admin Integration Key) to be configured in the integration settings.

    - The action does not process specific entities; it performs a global fetch of
    events based on the time range provided.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the DUO API Hostname, Admin
    Secret Key, and Admin Integration Key from the integration's provider configuration.

    2. **Time Calculation**: It calculates the start and end timestamps in milliseconds.
    The start timestamp is determined by subtracting the specified number of days
    (converted from the `Number Days Back` parameter) from the current time.

    3. **API Initialization**: Initializes the DUO Admin API client using the provided
    credentials.

    4. **Data Retrieval**: Calls the DUO SDK method `get_trust_monitor_events_by_offset`
    using the calculated time range to fetch Trust Monitor events.

    5. **Result Processing**: Formats the retrieved events into a JSON structure and
    attaches them to the action's result object for use in subsequent playbook steps.
