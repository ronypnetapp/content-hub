Get Country Flag:
  ai_description: >-
    ### General Description

    The **Get Country Flag** action retrieves a base64-encoded image of a country's
    flag from the `countryflags.io` service. This utility is used to provide visual
    context for countries associated with entities or provided as direct input. The
    action maintains a local cache to optimize performance and reduce API calls.\n\n###
    Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---
    | :--- | :--- | :--- |\n| Country Code Two Digit | string | No | A 2-letter ISO
    country code (e.g., 'us', 'fr') to fetch the flag for. |\n| Country Code From
    Entity Field | string | No | A comma-separated list of field names to look for
    in an entity's `additional_properties` (e.g., 'country', 'location'). |\n\n###
    Additional Notes\n- The action uses a local `flags.json` file in the run folder
    for caching.\n- If no country code is found and no parameter is provided, the
    action completes without fetching data.\n\n### Flow Description\n1. **Load Cache**:
    Attempts to read existing flag data from a local JSON file.\n2. **Identify Country
    Codes**: Checks the `Country Code Two Digit` parameter and iterates through entities
    to find codes in specified `additional_properties` fields.\n3. **Fetch Missing
    Flags**: For any code not in the cache, it performs a GET request to the external
    flag service.\n4. **Process and Encode**: Converts the image content to a base64
    string.\n5. **Update and Output**: Updates the local cache file and adds the base64
    strings to the action's JSON result.
