  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the **Vorlon** instance.\
    \ It ensures that the provided credentials (Client ID and Client Secret) are valid\
    \ and that the API Root is reachable.\n\n### Parameters Description\n| Parameter\
