Get Secrets:
  ai_description: >-
    ### General Description

    Retrieves detailed information about secrets from the Vorlon platform. This action
    allows users to fetch data for specific secrets using their unique identifiers
    or to retrieve all secrets associated with a particular service. The retrieved
    data is returned as a JSON object for use in subsequent playbook steps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Service ID** | String | No | The unique identifier (typically the service
    name) for which to retrieve associated secrets. |

    | **Secret IDs** | String | No | A comma-separated list of specific secret IDs
    to retrieve details for. |


    ### Additional Notes

    - **Mutual Exclusivity:** The action requires exactly one of the two parameters
    to be provided. If both `Service ID` and `Secret IDs` are provided, or if neither
    is provided, the action will fail with an error message.

    - **Entity Support:** This action does not operate on SecOps entities; it is a
    data retrieval utility based on user-provided parameters.


    ### Flow Description

    1. **Initialization:** The action initializes the Vorlon manager using the API
    Root, Client ID, and Client Secret from the integration configuration.

    2. **Parameter Extraction:** It extracts the `Service ID` and `Secret IDs` from
    the action parameters.

    3. **Validation & Request:** The manager validates that only one parameter is
    set and then performs a GET request to the `/rest/v1/secrets` endpoint on the
    Vorlon server.

    4. **Result Handling:** The resulting secret data is added to the action's JSON
    result, and the action completes with a success message if the data is successfully
    fetched.
