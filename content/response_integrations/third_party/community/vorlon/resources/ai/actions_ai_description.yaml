Get Linked Alerts:
  ai_description: >-
    ### General Description

    Retrieves a list of alerts from the Vorlon platform that are linked to a specific
    Alert ID. Alerts are considered linked if they share the same secret ID and belong
    to the same alert group. This action is primarily used for incident investigation
    to identify related security events and understand the broader context of a specific
    alert.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert for which linked
    alerts should be retrieved. |

    | **Alert Status** | DDL | No | Filters the linked alerts by their current status.
    Supported values: `open`, `dismissed`, `resolved`. |

    | **Page** | String | No | The page number to retrieve for paginated results.
    |

    | **Limit** | String | No | The maximum number of linked alerts to return in the
    response. Default is 100. |


    ### Additional Notes

    - This action does not process SecOps entities; it operates solely based on the
    provided **Alert ID** parameter.

    - The retrieved data is returned as a JSON object, which can be used for downstream
    logic in playbooks.


    ### Flow Description

    1. **Initialization**: The action extracts the Vorlon API configuration (API Root,
    Client ID, Client Secret) and the user-provided parameters.

    2. **API Connection**: It establishes a session with the Vorlon server and retrieves
    an access token.

    3. **Data Retrieval**: The action performs a GET request to the Vorlon endpoint
    `/rest/v1/alerts/linked/{id}` using the provided Alert ID and optional filters
    (status, page, limit).

    4. **Output**: The list of linked alerts is processed and added to the action's
    JSON results, and a success message is returned to the SOAR platform.
