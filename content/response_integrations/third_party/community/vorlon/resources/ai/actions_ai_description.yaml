Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert's details or status within the Vorlon platform. This action allows
    for programmatic management of alerts, such as dismissing them or changing their
    status, by providing a JSON-formatted update request. It is primarily used for
    workflow automation where alert states need to be synchronized between Google
    SecOps and the Vorlon server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert Object | String | Yes | The alert update request JSON body. This string
    must be a valid JSON object containing the `alert_id` and the desired changes
    (e.g., `new_status`, `apply_to_linked_alerts`). |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection configuration
    (API Root, Client ID, Client Secret) and the mandatory `Alert Object` parameter.

    2. **Manager Initialization**: It initializes the `VorlonManager`, which handles
    OAuth2 token generation and session management.

    3. **JSON Validation**: The action attempts to parse the `Alert Object` string
    into a Python dictionary. If the string is not valid JSON, the action fails with
    an informative error.

    4. **External API Call**: It performs a `PUT` request to the Vorlon API endpoint
    `/rest/v1/alerts/update` using the parsed JSON body.

    5. **Result Handling**: The response from the Vorlon server (the updated alert
    object) is captured and added to the action's JSON results. The action then completes
    with a success message.


    ### Additional Notes

    - This action does not operate on SecOps entities; it requires a specific JSON
    payload to identify the target alert in the external system.

    - Ensure the `Alert Object` follows the schema expected by the Vorlon API to avoid
    400-series errors.
  capabilities:
