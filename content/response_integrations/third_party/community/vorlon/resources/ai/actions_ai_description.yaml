Get Connection Summary:
  ai_description: >-
    ### General Description

    The **Get Connection Summary** action retrieves a summary of network connections
    for a specific service from the Vorlon platform. This action is used to gather
    high-level connection statistics and metadata, allowing users to filter results
    by instance, time range, and connection type (observed or detected).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Service ID** | string | Yes | The unique identifier (typically the service
    name or application name) for which to retrieve the connection summary. |

    | **Instance ID** | string | No | If provided, filters the connection summary
    by a specific instance ID of the service. |

    | **From** | string | No | Filters connections starting from this timestamp. Expected
    format: `YYYY-MM-DDTHH:MM:SS` (e.g., `2023-01-01T12:00:00`). |

    | **To** | string | No | Filters connections up to this timestamp. Expected format:
    `YYYY-MM-DDTHH:MM:SS` (e.g., `2023-01-01T13:00:00`). |

    | **Type** | ddl | No | The type of connection to retrieve. Available options
    are `observed` (default) or `detected`. |

    | **Secret IDs** | string | No | A comma-separated list of secret IDs to filter
    the connection summary. |


    ### Additional Notes

    - This action does not operate on entities within the SOAR case; it relies entirely
    on the provided `Service ID` and optional filter parameters.

    - The `Service ID` is a required path parameter for the underlying API request.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the Vorlon API configuration
    (API Root, Client ID, Client Secret) and the user-provided action parameters.

    2. **Time Validation**: If `From` or `To` parameters are provided, the action
    validates the format and converts the strings into epoch timestamps.

    3. **API Request**: The action initializes the `VorlonManager` and calls the `get_connection_summary`
    method, which sends a GET request to the Vorlon API endpoint `/rest/v1/connections/summary/{service_id}`
    with the specified filters.

    4. **Result Handling**: The retrieved JSON data is added to the action's result
    object.

    5. **Completion**: The action concludes with a success message and the fetched
    data, or fails if the service ID is missing, the API returns an error, or the
    response is empty.
  capabilities:
