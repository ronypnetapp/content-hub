Get All Services:
  ai_description: >-
    ### General Description

    The **Get All Services** action retrieves a comprehensive list of all detected
    and observed services from the Vorlon platform. This action is primarily used
    for visibility and auditing, allowing users to see the full scope of services
    monitored by the Vorlon integration.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration parameters:

    * **API Root**: The base URL of the Vorlon API.

    * **Client ID**: The unique identifier for API authentication.

    * **Client Secret**: The secret key for API authentication.


    ### Additional Notes

    This action does not operate on specific entities (such as IPs or Hostnames) and
    instead fetches a global list of services from the connected Vorlon instance.
    The results are returned as a raw JSON object.


    ### Flow Description

    1. **Initialization**: The action initializes the connection to the Vorlon platform
    using the provided API Root and credentials.

    2. **Authentication**: It retrieves an OAuth2 access token using the Client ID
    and Client Secret.

    3. **Data Retrieval**: The action performs a GET request to the `/rest/v1/services`
    endpoint to fetch all service data.

    4. **Output**: The retrieved service list is attached to the action results as
    a JSON object, and the action completes with a success message.
