    \ ID** | String | Yes | The unique identifier for the API client used for authentication.\
    \ |\n| **Client Secret** | String | Yes | The secret key associated with the Client\
    \ ID for secure authentication. |\n\n*Note: These parameters are extracted from\
    \ the integration configuration rather than action-specific inputs.*\n\n### Flow\
    \ Description\n1.  **Initialization**: The action starts by initializing the Siemplify\
