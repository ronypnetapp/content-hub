Get Alerts:
  ai_description: >-
    ### General Description

    This action retrieves a list of alerts from the Vorlon platform based on user-defined
    filters. It is primarily used for searching and auditing alerts within the Vorlon
    environment, allowing analysts to fetch specific alert details or broad sets of
    alerts based on service IDs, timeframes, and status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Requesting Service | String | No | A comma-separated list of requesting service
    IDs to include in the filter. |

    | Responding Service | String | No | A comma-separated list of responding service
    IDs to include in the filter. |

    | Alert IDs | String | No | A comma-separated list of specific alert IDs to retrieve.
    |

    | From | String | No | Filter alerts from this start time. Expected format: "YYYY-MM-DDTHH:MM:SS"
    (e.g., 2023-01-01T00:00:00). |

    | To | String | No | Filter alerts up to this end time. Expected format: "YYYY-MM-DDTHH:MM:SS".
    |

    | Alert Status | DDL | No | The status of alerts to retrieve. Options: `open`,
    `dismissed`, `resolved`. Default is `open`. |

    | Limit | String | No | The maximum number of alerts to return. Default is 100.
    |


    ### Additional Notes

    - The action performs time conversion from the provided string format to epoch
    timestamps required by the Vorlon API.

    - If no alerts are found, the action returns an empty JSON object.

    - This action does not operate on specific entities within the Google SecOps case;
    it is a standalone search action.


    ### Flow Description

    1. **Initialization**: The action extracts configuration credentials (API Root,
    Client ID, Client Secret) and action parameters.

    2. **Authentication**: It initializes the `VorlonManager`, which handles OAuth2
    token retrieval and session management.

    3. **Data Preparation**: It cleans input strings (removing extra spaces) and converts
    the `From` and `To` time strings into epoch timestamps.

    4. **API Request**: It sends a GET request to the `/rest/v1/alerts` endpoint with
    the constructed query parameters.

    5. **Result Processing**: The retrieved alerts are added to the action's JSON
    result, and the action completes successfully.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
