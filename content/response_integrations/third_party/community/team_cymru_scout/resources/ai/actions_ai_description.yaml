Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity and authentication configuration between\
    \ Google SecOps and the Team Cymru Scout platform. Its primary purpose is to ensure\
    \ that the integration parameters (such as API keys or credentials) are correct\
    \ and that the Team Cymru Scout API is reachable.\n\n### Parameters Description\n\
    This action does not require any input parameters. It utilizes the global integration\
    \ configuration settings (Authentication Type, API Key, Username, Password, and\
    \ Verify SSL) to perform the connectivity test.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify environment and retrieves the integration's\
    \ configuration parameters.\n2. **API Manager Setup**: An `ApiManager` instance\
    \ is created using the provided authentication details (either Token-based or\
    \ Basic Auth).\n3. **Connectivity Test**: The action calls the `api_usage` method,\
    \ which sends a GET request to the Team Cymru Scout `/usage` endpoint.\n4. **Result\
    \ Evaluation**: \n    * If the API returns a successful response (HTTP 200), the\
    \ action concludes with a success message indicating a valid connection.\n   \
    \ * If an exception occurs or the API returns an error (e.g., 401 Unauthorized),\
    \ the action captures the error details and reports a failure.\n5. **Finalization**:\
    \ The action ends by returning the execution status and a descriptive output message\
    \ to the SOAR interface.\n\n### Additional Notes\n* This action is strictly for\
    \ testing purposes and does not process any entities or modify data in either\
    \ Google SecOps or Team Cymru Scout."
