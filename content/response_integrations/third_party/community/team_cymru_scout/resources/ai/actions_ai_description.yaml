Get Whois Info:
  ai_description: >-
    ### General Description

    The **Get Whois Info** action retrieves detailed Whois information for a list
    of provided IP addresses from the Team Cymru Scout platform. This action is designed
    to provide security analysts with ownership and registration context, including
    Autonomous System Numbers (ASN), AS names, BGP information, network names, and
    organizational contact details (admin, tech, and abuse).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch Whois information for. |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    from the input list (default is 10). |

    | **Start Date** | String | No | The latest date for results (YYYY-MM-DD). If
    not provided, defaults to 29 days prior to today. |

    | **End Date** | String | No | The earliest date for results (YYYY-MM-DD). If
    not provided, defaults to today's date. |

    | **Days** | String | No | Relative offset in days (integer) from current time.
    If provided, this takes priority over Start Date and End Date. |

    | **Size** | String | No | The number of records to return in the search results
    (maximum allowed is 1000). |


    ### Flow Description

    1. **Initialization**: The action extracts the provided IP addresses and configuration
    parameters (Limit, Dates, Size).

    2. **Validation**: It validates the format of the IP addresses and ensures the
    date parameters (Start Date, End Date, Days) are within acceptable ranges (e.g.,
    Start Date not older than 90 days and date range not exceeding 30 days).

    3. **Data Retrieval**: For each valid IP address (up to the specified limit),
    the action performs a GET request to the Team Cymru Scout API to fetch detailed
    IP information.

    4. **Processing**: The action specifically extracts the "Whois" section from the
    API response for each IP.

    5. **Output Generation**:
        *   Adds the raw API response as a JSON result.
        *   Generates a data table named "Whois" containing ASN, Org Name, and contact
    IDs.
        *   Generates a data table named "Account Usage" showing remaining API query
    limits.

    ### Additional Notes

    *   If the number of valid IPs exceeds the **Limit**, the extra IPs are skipped
    and a warning is logged.

    *   The **Days** parameter, if provided, overrides the **Start Date** and **End
    Date** parameters.
