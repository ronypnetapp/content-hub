Advanced Query:
  ai_description: >-
    ### General Description

    The **Advanced Query** action executes a search using the Team Cymru Scout query
    language to retrieve comprehensive summary information about network indicators.
    It allows for flexible filtering by date ranges or relative day offsets and returns
    detailed intelligence across multiple categories, including PDNS, open ports,
    top peers, and SSL certificates.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | A simple or advanced query following the Scout query
    language (e.g., `comms.ip="1.1.1.1"`). |

    | **Start Date** | String | No | The latest date for results (YYYY-MM-DD). Defaults
    to 29 days ago if not provided. |

    | **End Date** | String | No | The earliest date for results (YYYY-MM-DD). Defaults
    to today. |

    | **Days** | String | No | Relative offset in days from current time. If provided,
    this takes priority over Start/End dates. |

    | **Size** | String | No | The number of records to return (Maximum: 5000). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the query string and optional
    time/size filters from the user input.

    2. **Validation:** It validates the date formats and ensures the requested range
    does not exceed platform limits (e.g., a 30-day window).

    3. **API Request:** The action sends a GET request to the Team Cymru Scout `/search`
    endpoint.

    4. **Data Processing:** The response is parsed to extract various intelligence
    categories, including PDNS, open ports, top peers, service counts, fingerprints,
    and SSL certificates.

    5. **Output Generation:** The action populates multiple data tables in the SOAR
    interface and provides the raw JSON response for further downstream processing.

    6. **Usage Tracking:** It also retrieves and displays the current API account
    usage to monitor query quotas.


    ### Additional Notes

    - This action is standalone and does not automatically iterate over entities in
    the SOAR case; the user must provide the specific query.

    - The **Days** parameter takes precedence over **Start Date** and **End Date**
    if all are provided.

    - The maximum result size is capped at 5000 records.
