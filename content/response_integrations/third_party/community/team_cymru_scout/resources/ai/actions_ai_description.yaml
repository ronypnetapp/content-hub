Get Communications Info:
  ai_description: >-
    ### General Description

    The **Get Communications Info** action retrieves detailed network communication
    and peer information for a specified list of IP addresses from the Team Cymru
    Scout platform. This action is designed to provide visibility into the communication
    patterns of an IP, including protocol details, client/server relationships, geographic
    locations, and associated autonomous system (AS) information. It is primarily
    used for network forensics and threat infrastructure mapping.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch detailed communication information for. |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    in a single execution. Default is 10. |

    | **Start Date** | String | No | The earliest date for results in the range (formatted
    YYYY-MM-DD in UTC). If not provided, defaults to 29 days prior to today. |

    | **End Date** | String | No | The latest date for results in the range (formatted
    YYYY-MM-DD in UTC). If not provided, defaults to the current date. |

    | **Days** | String | No | A relative offset in days from the current time. If
    provided, this integer value takes priority over the Start and End date parameters.
    |

    | **Size** | String | No | The number of records to return per IP address (maximum
    allowed is 1000). |


    ### Additional Notes

    - **Date Constraints**: The `Start Date` cannot be older than 90 days from the
    current time, and the total window between `Start Date` and `End Date` cannot
    exceed 30 days.

    - **Priority Logic**: The `Days` parameter, if provided, will override any values
    entered in the `Start Date` and `End Date` fields.

    - **IP Validation**: The action automatically filters out duplicate and invalid
    IP formats before making API requests.


    ### Flow Description

    1. **Initialization**: The action extracts the provided IP addresses, limits,
    and time-range parameters from the environment.

    2. **Validation**: It validates the IP address formats and ensures the requested
    date range complies with Team Cymru Scout's API limitations (e.g., the 30-day
    window and 90-day history limit).

    3. **API Interaction**: For each valid IP address (up to the specified limit),
    the action performs a GET request to the Team Cymru Scout `/details` endpoint,
    specifically requesting the `comms` (communications) section.

    4. **Data Processing**: The retrieved data is parsed to extract peer connection
    details, including protocols, country codes, top services, and AS names.

    5. **Output Generation**: The action produces a raw JSON result for further automation
    and renders a detailed "Peers" data table in the Google SecOps interface. It also
    provides an "Account Usage" table to track API quota consumption.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
