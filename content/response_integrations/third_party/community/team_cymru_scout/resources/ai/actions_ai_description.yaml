Get Fingerprints Info:
  ai_description: >-
    ### General Description

    Retrieves detailed Fingerprints information for specified IP addresses from Team
    Cymru Scout. This action allows security analysts to gather technical fingerprinting
    data (such as SSL/TLS or SSH signatures) associated with network indicators to
    assist in threat profiling and infrastructure analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | Comma-separated list of IPv4 or IPv6 addresses
    to investigate. Default is "1.1.1.1". |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    in a single execution. Default is "10". |

    | **Start Date** | String | No | The latest date for results (YYYY-MM-DD in UTC).
    Defaults to 29 days prior to today if not provided. |

    | **End Date** | String | No | The earliest date for results (YYYY-MM-DD in UTC).
    Defaults to today's date if not provided. |

    | **Days** | String | No | Relative offset in days (integer) from current time
    in UTC. This takes priority over Start and End dates if all are provided. |

    | **Size** | String | No | The number of records to retrieve per search (Maximum
    1000). |


    ### Additional Notes

    - The action performs validation on the IP formats and date ranges before making
    API calls.

    - If the number of valid IPs provided exceeds the **Limit**, the additional IPs
    are skipped and noted in the output message.

    - The **Days** parameter, if provided, will override any values provided in the
    **Start Date** and **End Date** parameters.


    ### Flow Description

    1. **Input Validation**: The action parses the `IP Addresses` parameter, removes
    duplicates, and validates the format of each IP. It also validates date and size
    parameters.

    2. **API Connection**: Establishes a connection to the Team Cymru Scout API using
    the configured authentication method (API Key or Username/Password).

    3. **Data Fetching**: Iterates through the valid IPs (up to the `Limit`) and requests
    detailed fingerprint information for each from the Team Cymru Scout service.

    4. **Result Compilation**: Aggregates the API responses into a JSON object and
    formats the data into "Fingerprints" and "Account Usage" data tables.

    5. **Action Completion**: Returns a success or failure status along with a detailed
    output message summarizing the results for each IP.
