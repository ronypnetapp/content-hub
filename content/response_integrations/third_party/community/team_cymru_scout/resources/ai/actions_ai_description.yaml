Account Usage:
  ai_description: >-
    ### General Description

    The **Account Usage** action retrieves real-time metrics regarding the query consumption
    and quota limits for the Team Cymru Scout API. It provides security analysts with
    visibility into their remaining API balance, ensuring that automated workflows
    or manual investigations do not exceed subscription limits. The action fetches
    data for both standard queries and foundation API usage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - This action is a utility task used for monitoring integration health and quota
    status.

    - It does not interact with or require any entities (IPs, Domains, etc.) to execute.


    ### Flow Description

    1. **Authentication**: The action retrieves the configured authentication credentials
    (either API Key or Username/Password) from the Team Cymru Scout integration settings.

    2. **API Connection**: It initializes a connection to the Team Cymru Scout service
    via the `ApiManager`.

    3. **Data Retrieval**: A GET request is dispatched to the `/usage` endpoint to
    fetch current account statistics.

    4. **Metric Extraction**: The logic parses the response to identify key metrics:
    `used_queries`, `remaining_queries`, `query_limit`, and specific foundation API
    usage details.

    5. **Output Generation**: The action returns the raw JSON response and renders
    a formatted data table titled "Account Usage" within the Google SecOps case wall.
