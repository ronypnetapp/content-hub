Extract Tags:
  ai_description: >-
    ### General Description

    This action extracts tags from a specified IP address and its communicating peers
    using the Team Cymru Scout service. It allows users to search for specific tags
    within the retrieved data to identify potentially malicious or noteworthy associations.
    This is useful for identifying if an IP or its immediate network neighborhood
    is associated with known threats like malware or phishing.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | IP Address | The IP address for which tags and peer information will be retrieved.
    | String | Yes |

    | Tags to Search | A comma-separated list of tags (e.g., 'malware, phishing')
    to look for in the results. | String | Yes |


    ### Flow Description

    1. **Validation**: The action validates the format of the provided IP address
    to ensure it is a valid IPv4 or IPv6 address.

    2. **Data Retrieval**: It calls the Team Cymru Scout API's `get_ip_details` endpoint
    to fetch comprehensive details for the IP, including its metadata and a list of
    peer IPs it has communicated with.

    3. **Tag Extraction**: The logic processes the API response to compile a map of
    IPs (the target and its peers) to their respective tags.

    4. **Tag Matching**: It performs an intersection between the tags found in the
    response and the tags provided in the 'Tags to Search' parameter.

    5. **Reporting**: If matches are found, it returns the matching IPs and tags in
    JSON format and provides a summary message. It also renders a data table showing
    the current API account usage statistics.
