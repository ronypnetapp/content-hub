List IP Summary:
  ai_description: >-
    ### General Description

    The **List IP Summary** action retrieves comprehensive summary information for
    a user-provided list of IP addresses from the Team Cymru Scout platform. It is
    designed to provide quick visibility into the reputation, geographic location,
    and associated threat intelligence for multiple IPs simultaneously, without requiring
    existing entities in the Google SecOps context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | A comma-separated list of IP addresses to
    be queried (e.g., "1.1.1.1, 8.8.8.8"). |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    from the provided list. This helps manage API usage and performance. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of IP addresses and
    the processing limit from the user input.

    2. **Validation:** It validates the format of each IP address, identifies duplicates,
    and filters out invalid entries.

    3. **Batching:** The valid IP addresses are grouped into batches (up to 10 per
    batch) to optimize API communication.

    4. **API Interaction:** The action sends GET requests to the Team Cymru Scout
    `/ip/foundation` endpoint for each batch.

    5. **Data Aggregation:** Results from all batches are aggregated into a single
    dataset.

    6. **Output Generation:** The action populates the action results with a JSON
    summary and creates multiple data tables, including "Summary Information for IPs",
    "Insights", and "Account Usage".


    ### Additional Notes

    - This action does not automatically process entities from the Google SecOps context;
    it relies entirely on the manually provided "IP Addresses" parameter.

    - If the number of valid IPs exceeds the specified "Limit", the extra IPs are
    skipped, and a warning is logged.
