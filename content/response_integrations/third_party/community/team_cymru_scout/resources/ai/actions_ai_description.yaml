Get X509 Info:
  ai_description: >-
    ### General Description

    Retrieves detailed X509 certificate information for specified IP addresses using
    the Team Cymru Scout threat intelligence platform. This action allows analysts
    to investigate SSL/TLS certificates associated with an IP, providing visibility
    into certificate subjects, issuers, validity periods, and fingerprints. This data
    is crucial for identifying malicious infrastructure, verifying host identities,
    or detecting certificate-related anomalies during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch certificate information for. |

    | Limit | String | Yes | The maximum number of valid IP addresses to process in
    a single execution. Must be a positive integer. |

    | Start Date | String | No | The latest date for results in YYYY-MM-DD format
    (UTC). If not provided, defaults to 29 days prior to today. |

    | End Date | String | No | The earliest date for results in YYYY-MM-DD format
    (UTC). If not provided, defaults to today's date. |

    | Days | String | No | An integer representing a relative offset in days from
    the current time in UTC. If provided, this parameter takes priority over Start
    Date and End Date. |

    | Size | String | No | The number of records to return in the search results.
    The maximum allowed size is 1000. |


    ### Additional Notes

    - The action performs validation on all input IP addresses, filtering out duplicates
    and invalid formats before processing.

    - If the number of valid IP addresses provided exceeds the specified 'Limit',
    the additional IPs will be skipped.

    - The 'Days' parameter acts as a priority filter, overriding any values provided
    in the 'Start Date' or 'End Date' parameters.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify environment and retrieves
    integration configuration parameters such as API keys or credentials.

    2. **Parameter Extraction**: It extracts the target IP addresses and search filters
    (dates, limit, size) from the action parameters.

    3. **Validation**: The script validates the IP address formats and ensures that
    date ranges and size limits are within the allowed thresholds defined by the Team
    Cymru Scout API.

    4. **API Request**: For each valid IP address (up to the defined limit), the action
    sends a GET request to the Team Cymru Scout API endpoint, specifically requesting
    the 'x509' data section.

    5. **Data Parsing**: The received JSON response is parsed to extract certificate
    details, including Subject, Issuer, Validity Period, and Fingerprints.

    6. **Output Generation**: The action generates a 'Certificates' data table and
    an 'Account Usage' table for the SOAR case wall. It also attaches the raw JSON
    response to the action results for use in subsequent playbook steps.
