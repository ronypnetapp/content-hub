Enrich IPs:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using threat intelligence from the Team Cymru Scout
    platform. This action retrieves reputation ratings, tags, and last enrichment
    timestamps to provide context for security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. |


    ### Additional Notes

    The action uses a 24-hour caching mechanism based on the 'TCS_last_enriched' property
    to prevent redundant API calls. Enrichment data added to entities is prefixed
    with 'TCS'.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` entities in the current
    context.

    2. **Cache Validation**: It checks the `TCS_last_enriched` property of each entity.
    If the entity was enriched within the last 24 hours, it is skipped.

    3. **Data Retrieval**: The action calls the Team Cymru Scout Foundation API to
    retrieve summary information for the remaining IP addresses.

    4. **Reputation Analysis**: It evaluates the 'rating' provided by the API. If
    the rating is 'malicious' or 'suspicious', the entity's `is_suspicious` flag is
    set to true.

    5. **Entity Enrichment**: The action updates the entity's `additional_properties`
    with the retrieved data (prefixed with 'TCS') and sets the `is_enriched` flag.

    6. **Platform Update**: Finally, it updates the entities in Google SecOps and
    returns the raw summary data as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity fields including 'is_suspicious', 'is_enriched', and populates
      'additional_properties' with enrichment data.
