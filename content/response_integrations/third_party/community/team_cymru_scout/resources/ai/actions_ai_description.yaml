Get Ports Info:
  ai_description: >-
    ### General Description

    Retrieves detailed open port information for specified IP addresses from Team
    Cymru Scout. This action allows users to input a list of IPv4 or IPv6 addresses
    to fetch historical and current port data, including service names, port numbers,
    protocols, and first/last seen timestamps. The results are presented as a JSON
    object and formatted into 'Open Ports' and 'Account Usage' data tables within
    the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | Comma-separated list of IPv4 or IPv6 addresses
    to fetch information for. |

    | Limit | String | Yes | The maximum number of valid IP addresses to be allowed
    for processing. Default is 10. |

    | Start Date | String | No | The latest date for results, formatted YYYY-MM-DD
    in UTC. If not provided, defaults to 29 days prior to today. |

    | End Date | String | No | The earliest date for results, formatted YYYY-MM-DD
    in UTC. If not provided, defaults to today's date. |

    | Days | String | No | Relative offset in days (integer) from current time in
    UTC. This takes priority over Start Date and End Date if all three are provided.
    |

    | Size | String | No | Size, in records, of the search results per IP. The maximum
    allowed size is 1000. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of IP addresses, processing
    limits, and date filters from the user input.

    2. **IP Validation:** It validates each IP address format, filters out duplicates,
    and ensures the number of IPs processed does not exceed the specified `Limit`.

    3. **Date Validation:** It validates the date range or relative day offset to
    ensure they fall within the supported 90-day window and 30-day range limit.

    4. **API Request:** It sends a GET request to the Team Cymru Scout API for each
    valid IP, specifically targeting the 'open_ports' section.

    5. **Data Processing:** The action parses the returned JSON to extract service
    names, port numbers, protocols, and observation dates.

    6. **Result Reporting:** It attaches the raw JSON response to the action, generates
    an 'Open Ports' data table for the case, and provides an 'Account Usage' table
    showing remaining API quota.


    ### Additional Notes

    - The `Days` parameter, if provided, overrides the `Start Date` and `End Date`
    parameters.

    - The maximum allowed `Size` for records is 1000.

    - This action does not automatically iterate over entities in the case; it processes
    the specific IPs provided in the `IP Addresses` parameter.
  capabilities:
    can_create_case_comments: false
