Get Proto Info:
  ai_description: >-
    ### General Description

    Retrieves detailed protocol information for a list of IP addresses from Team Cymru
    Scout. This action is designed to provide visibility into the types of network
    protocols associated with specific IPs, aiding in network traffic analysis and
    security investigations. It allows users to query protocol data over a specific
    time window or a relative number of days.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to be queried. |

    | Limit | String | Yes | The maximum number of valid IP addresses to process from
    the input list. Default is 10. |

    | Start Date | String | No | The latest date for results in YYYY-MM-DD format
    (UTC). Defaults to 29 days prior to today. |

    | End Date | String | No | The earliest date for results in YYYY-MM-DD format
    (UTC). Defaults to today. |

    | Days | String | No | Relative offset in days from the current time. If provided,
    this value takes precedence over Start Date and End Date. |

    | Size | String | No | The number of records to return per IP address (maximum
    1000). |


    ### Additional Notes

    - The action performs validation on the provided IP addresses, filtering out invalid
    formats and removing duplicates.

    - The time difference between the start and end dates must not exceed 30 days.

    - The action provides information on API usage, including remaining query counts,
    via an 'Account Usage' table.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the IP addresses, limit, and
    date-related parameters from the user input.

    2. **Validation**: It validates the IP addresses and date ranges, ensuring they
    meet the integration's requirements (e.g., date range < 30 days).

    3. **API Interaction**: For each valid IP address (up to the defined limit), the
    action sends a GET request to the Team Cymru Scout API's protocol information
    endpoint (`proto_by_ip`).

    4. **Data Processing**: The retrieved protocol data is processed and formatted
    into a structured JSON response.

    5. **Reporting**: The action generates a 'Proto By IP' data table and an 'Account
    Usage' table, which are attached to the Google SecOps case for review.
