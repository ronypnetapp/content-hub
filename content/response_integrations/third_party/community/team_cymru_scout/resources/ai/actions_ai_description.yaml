Get PDNS Info:
  ai_description: >-
    ### General Description

    The **Get PDNS Info** action retrieves detailed Passive DNS (PDNS) information
    for a specified list of IP addresses from the Team Cymru Scout platform. This
    action is used to uncover historical domain associations, providing visibility
    into which domains have resolved to the target IPs over time. It is particularly
    useful for threat hunting and incident investigation to identify potentially malicious
    infrastructure or related domains.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | A comma-separated list of IPv4 or IPv6 addresses to fetch
    PDNS information for. | String | Yes |

    | **Limit** | The maximum number of valid IP addresses to process in a single
    execution. Default is 10. | String | Yes |

    | **Start Date** | The latest date for results, formatted as YYYY-MM-DD in UTC.
    If omitted, it defaults to 29 days prior to the current date. | String | No |

    | **End Date** | The earliest date for results, formatted as YYYY-MM-DD in UTC.
    If omitted, it defaults to the current date. | String | No |

    | **Days** | An integer representing a relative offset in days from the current
    time. This parameter takes priority over Start Date and End Date if all are provided.
    | String | No |

    | **Size** | The number of records to return in the search results (maximum 1000).
    | String | No |


    ### Flow Description

    1. **Initialization:** The action extracts the provided IP addresses and configuration
    parameters from the SOAR environment.

    2. **Validation:** It validates the IP address formats and ensures date/day parameters
    are within valid ranges (e.g., Start Date must be within the last 90 days, and
    the range cannot exceed 30 days).

    3. **API Request:** For each valid IP address (up to the defined limit), the action
    sends a GET request to the Team Cymru Scout API's IP details endpoint, specifically
    requesting the 'pdns' section.

    4. **Data Processing:** The action parses the API response to extract domain names,
    event counts, and first/last seen timestamps for each IP.

    5. **Reporting:** It generates a JSON result containing the raw data and renders
    two data tables: "PDNS" (containing the extracted records) and "Account Usage"
    (showing API quota information).


    ### Additional Notes

    - The action supports both IPv4 and IPv6 addresses.

    - If the number of valid IPs exceeds the `Limit`, the extra IPs are skipped and
    a warning is logged.

    - The `Days` parameter is the preferred way to define the search window and will
    override specific date inputs if both are provided.

    - This action does not run on existing SecOps entities but rather on the list
    of IPs provided in the parameters.
