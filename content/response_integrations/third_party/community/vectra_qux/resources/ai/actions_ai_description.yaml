Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) within the Vectra
    platform. This action allows analysts to document findings or provide context
    directly on the Vectra entity record from within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | String | Yes | The text content of the note to be added to the entity.
    |

    | Entity ID | String | Yes | The unique numerical identifier of the entity in
    Vectra. |

    | Entity Type | DDL | Yes | The category of the entity. Supported values: `Account`,
    `Host`, `Detection`. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the note content, entity ID, and entity
    type from the action inputs.

    2. **Validation:** Validates that the provided Entity ID is a valid integer.

    3. **API Interaction:** Sends a POST request to the Vectra API endpoint corresponding
    to the entity type and ID.

    4. **Result Processing:** Parses the response from Vectra, which includes the
    new note's ID and creation details, and displays it in a data table and JSON result.


    ### Additional Notes

    This action does not automatically process entities from the current case scope;
    it requires the specific Entity ID to be provided manually or via a previous playbook
    step.
