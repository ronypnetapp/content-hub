Search Detections:
  ai_description: >-
    ### General Description

    This action searches for and retrieves a list of detections from the Vectra QUX
    platform based on a wide variety of user-defined query parameters. It allows analysts
    to filter detections by time, host, tags, asset status, scores (threat/certainty),
    and state. The results are returned as a detailed JSON object and a summary data
    table within the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Last Timestamp GTE | String | No | Filters detections with a last seen timestamp
    greater than or equal to the provided value. |

    | Host ID | String | No | Filters detections associated with a specific Host ID.
    |

    | Tags | String | No | Filters detections by a comma-separated list of tags. |

    | Is Targeting Key Asset | DDL | No | Filters detections based on whether they
    target a key asset (True/False). |

    | Note Modified Timestamp GTE | String | No | Filters detections where the associated
    note was modified after the given timestamp. |

    | Order | DDL | No | Specifies the sort direction: 'Ascending' or 'Descending'.
    |

    | Limit | String | No | The maximum number of detection records to retrieve. |

    | Order By | DDL | No | The field used to sort the results (e.g., last_timestamp,
    t_score, c_score). |

    | Fields | Multi-select | No | A list of specific fields to include in the response
    for each detection. |

    | State | DDL | No | Filters detections by their current state (Active, Inactive,
    Fixed). |

    | Detection Type | String | No | Filters by the specific type of detection. |

    | Detection Category | DDL | No | Filters by the detection category (e.g., Command
    and Control, Exfiltration). |

    | Src IP | String | No | Filters detections by the source IP address. |

    | Threat GTE | String | No | Filters detections with a threat score greater than
    or equal to the provided value. |

    | Certainty GTE | String | No | Filters detections with a certainty score greater
    than or equal to the provided value. |


    ### Additional Notes

    - The 'Limit' parameter is validated to ensure it is a positive integer.

    - If 'Order' is set to 'Descending', the 'Order By' field is prefixed with a minus
    sign (-) before being sent to the Vectra API.

    - The 'Fields' parameter expects a JSON-formatted list of strings if provided
    manually, though typically handled by the UI multi-choice selector.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration settings (API
    Root, Token) and all 15 optional search parameters.

    2. **Validation:** It validates numeric inputs such as 'Limit', 'Threat GTE',
    and 'Certainty GTE' to ensure they are valid integers.

    3. **Query Construction:** It prepares the API request, including formatting the
    sort order and joining selected fields into a comma-separated string.

    4. **API Interaction:** The action calls the Vectra QUX `search_detections` endpoint
    via a GET request, utilizing pagination to retrieve the requested number of records.

    5. **Data Processing:** For each retrieved detection, the script cleans up internal
    API versioning strings from URLs and extracts a set of mandatory fields (ID, type,
    category, timestamps, state).

    6. **Output Generation:** The processed data is added to the action results as
    a raw JSON object and a formatted data table titled 'List Of Detections'.
