Unmark Detection Fixed:
  ai_description: >-
    ### General Description

    Unmarks specific detections as fixed within the Vectra AI platform. This action
    is used to revert the status of detections that were previously marked as resolved,
    allowing them to be treated as active or requiring further investigation. It interacts
    with the Vectra AI API via a PATCH request to update the state of the specified
    detection IDs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection IDs | String | Yes | A comma-separated list of numeric identifiers
    for the detections that should be unmarked as fixed. Each ID is validated as an
    integer before processing. |


    ### Flow Description

    1. **Initialization**: The action initializes the VectraQUX manager using the
    provided API Root, API Token, and SSL verification settings.

    2. **Parameter Parsing**: It extracts the 'Detection IDs' string, splits it by
    commas, and validates that each entry is a valid integer.

    3. **API Interaction**: The action calls the `unmark_detection_as_fixed` method
    in the manager, which sends a PATCH request to the Vectra AI detections endpoint.

    4. **State Mutation**: The request payload includes the list of detection IDs
    and explicitly sets the `mark_as_fixed` attribute to `False`.

    5. **Result Handling**: The response from the Vectra AI API is captured and added
    to the action's result JSON for auditing and further playbook logic.
