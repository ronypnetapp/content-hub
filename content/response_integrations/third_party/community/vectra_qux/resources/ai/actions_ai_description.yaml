Assign Group:
  ai_description: "### General Description\nThis action adds members to a specific\
    \ group within the Vectra AI platform using its unique Group ID. It is designed\
    \ to manage group memberships dynamically by appending a list of provided identifiers\
    \ (such as hostnames, IPs, account UIDs, or domains) to an existing group. The\
    \ action validates the input, performs the update via the Vectra API, and provides\
    \ a detailed summary of which members were successfully assigned and which were\
    \ not.\n\n### Parameters Description\n| Parameter | Description | Type | Mandatory\
    \ |\n| :--- | :--- | :--- | :--- |\n| Group ID | The unique integer identifier\
    \ of the specific group in Vectra AI to which members will be added. | String\
    \ | Yes |\n| Members | A comma-separated list of member identifiers to assign\
    \ to the group. The type of identifier required depends on the group's configuration\
    \ in Vectra (e.g., IP addresses for an IP group, hostnames for a host group).\
    \ | String | Yes |\n\n### Additional Notes\n- The action uses the 'append' membership\
    \ action, meaning existing members in the group are preserved.\n- The success\
    \ of the assignment depends on whether the provided member identifiers exist and\
    \ match the group's type (Host, IP, Account, or Domain).\n- The Group ID must\
    \ be a valid positive integer.\n\n### Flow Description\n1. **Initialization**:\
    \ Retrieves configuration parameters (API Root, Token, SSL verification) and action\
    \ parameters (Group ID, Members).\n2. **Validation**: Validates that the Group\
    \ ID is a valid integer and processes the Members string into a clean list of\
    \ unique identifiers.\n3. **API Interaction**: Calls the Vectra AI API using a\
    \ PATCH request to the group's endpoint to append the new members.\n4. **Result\
    \ Processing**: Compares the requested members against the updated group membership\
    \ returned by the API to identify successful assignments and any failures.\n5.\
    \ **Output Generation**: \n    - Generates a descriptive output message summarizing\
    \ the results.\n    - Renders an HTML table showing the group's updated properties\
    \ and member list.\n    - Returns the full group object as a JSON result for downstream\
    \ use."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates group membership in the Vectra AI platform by appending new members
      to a specified group via a PATCH request to the /groups/{group_id} endpoint.
