Search Hosts:
  ai_description: >-
    ### General Description

    The **Search Hosts** action allows users to query and retrieve a list of host
    entities from the Vectra AI platform based on a wide array of filtering criteria.
    It is primarily used for threat hunting and asset discovery, enabling analysts
    to find hosts based on their threat scores, certainty levels, active traffic status,
    or specific tags. The action returns detailed host metadata, including IP addresses,
    severity levels, and detection summaries.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Limit | String | No | The maximum number of host records to retrieve. Defaults
    to 0 (all available up to system limits). |

    | Tags | String | No | Filter hosts that match specific tags. |

    | Last Source | String | No | Filter hosts based on their last reported source.
    |

    | Order | DDL | No | Specifies whether the results should be in 'Ascending' or
    'Descending' order. |

    | Fields | Multi-choice | No | A list of specific host attributes to include in
    the response (e.g., id, name, ip, threat). |

    | Name | String | No | Filter hosts by their specific name. |

    | State | DDL | No | Filter hosts by their current state: 'Active' or 'Inactive'.
    |

    | Threat GTE | String | No | Filter for hosts with a threat score greater than
    or equal to this value. |

    | Certainty GTE | String | No | Filter for hosts with a certainty score greater
    than or equal to this value. |

    | Last Detection Timestamp GTE | String | No | Filter for hosts with detections
    occurring on or after this timestamp. |

    | Last Detection Timestamp LTE | String | No | Filter for hosts with detections
    occurring on or before this timestamp. |

    | Is Targeting Key Asset | DDL | No | Filter hosts based on whether they are targeting
    key assets ('True' or 'False'). |

    | Privilege Level GTE | String | No | Filter for hosts with a privilege level
    greater than or equal to this value. |

    | Privilege Category | DDL | No | Filter hosts by privilege category: 'Low', 'Medium',
    or 'High'. |

    | Active Traffic | DDL | No | Filter hosts that have shown active traffic within
    the last two hours ('True' or 'False'). |

    | Order By | DDL | No | The field used to sort the results (e.g., t_score, c_score,
    last_detection_timestamp). |

    | Note Modified Timestamp GTE | String | No | Filter hosts where notes were modified
    on or after this timestamp. |


    ### Additional Notes

    - The action performs input validation on numeric fields like `Limit`, `Threat
    GTE`, and `Certainty GTE` to ensure they are valid integers.

    - If `Order` is set to 'Descending', the action automatically prefixes the `Order
    By` parameter with a minus sign (e.g., `-t_score`) to comply with the Vectra API
    requirements.

    - The action automatically strips API version strings (e.g., `/api/v2.5`) from
    returned URLs to provide cleaner data for the SOAR interface.


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra AI manager using the
    provided API Root and Token.

    2. **Parameter Extraction**: It retrieves all user-defined filters and sorting
    preferences from the action parameters.

    3. **Validation**: It validates that the `Limit` and score-based parameters are
    valid integers.

    4. **API Request**: It constructs a GET request with the specified query parameters
    and sends it to the Vectra `/hosts` endpoint.

    5. **Pagination**: If the number of results exceeds the page size, the action
    handles pagination to retrieve the requested number of records up to the `Limit`.

    6. **Data Processing**: The action iterates through the retrieved hosts, cleans
    up URL fields, and extracts mandatory fields for the summary table.

    7. **Output**: It populates a data table named 'List Of Hosts' and attaches the
    full JSON response to the action results.
