Assign Entity:
  ai_description: >-
    ### General Description

    Assigns a specific entity (either a Host or an Account) to a user within the Vectra
    platform. This action is used to establish ownership and accountability for specific
    entities during an investigation by creating an assignment record in the external
    Vectra system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier of the entity in Vectra. This
    must be a valid integer string. |

    | Entity Type | DDL | Yes | The type of entity being assigned. Options are 'Account'
    or 'Host'. |

    | User ID | String | Yes | The unique identifier of the user to whom the entity
    will be assigned. This must be a valid integer string. |


    ### Additional Notes

    - Both 'Entity ID' and 'User ID' are validated as integers before the API call
    is made. If they are not numeric, the action will fail.

    - This action does not run on SecOps entities automatically; it requires manual
    input of IDs.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration (Root,
    Token, SSL) and the action parameters (User ID, Entity ID, Entity Type).

    2. **Validation**: It validates that the provided 'Entity ID' and 'User ID' are
    valid non-negative integers.

    3. **API Interaction**: It initializes the VectraQUXManager and calls the `assign_entity`
    method, which sends a POST request to the Vectra API endpoint `/api/v2.5/assignments`
    with the assignment details.

    4. **Result Processing**: Upon success, it parses the returned assignment data,
    creates a data table for the case wall, and attaches the raw JSON response to
    the action results.
