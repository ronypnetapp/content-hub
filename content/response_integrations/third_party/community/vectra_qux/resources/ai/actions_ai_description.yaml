Describe Assignment:
  ai_description: >-
    ### General Description

    The **Describe Assignment** action retrieves comprehensive details for a specific
    assignment within the Vectra QUX platform using its unique Assignment ID. This
    action is designed to provide analysts with full context regarding an assignment's
    lifecycle, including ownership, resolution status, and associated entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Assignment ID** | String | Yes | The unique identifier of the assignment to
    retrieve details for. The action validates this input to ensure it is a valid
    non-negative integer. |


    ### Flow Description

    1. **Input Validation**: The action first validates the provided `Assignment ID`
    to ensure it is a valid integer.

    2. **API Request**: It performs a GET request to the Vectra QUX API endpoint for
    assignments (`/api/v2.5/assignments/{assignment_id}`).

    3. **Data Parsing**: The manager parses the JSON response into an internal data
    model, extracting details such as the assigned user, the user who resolved the
    assignment, the outcome title, and the linked entity (Host or Account).

    4. **Result Generation**: The action populates the result JSON with the full API
    response and constructs a data table for the case wall containing the summarized
    assignment information.


    ### Additional Notes

    - This action does not process entities from the case scope; it relies entirely
    on the provided `Assignment ID` parameter.

    - If the ID does not exist in Vectra QUX, the action will return a 'not found'
    error.
