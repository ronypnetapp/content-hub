List Assignments:
  ai_description: >-
    ### General Description

    The **List Assignments** action retrieves a list of assignments from the Vectra
    QUX platform based on various filtering criteria. It is primarily used for auditing,
    reporting, or identifying specific task assignments related to hosts or accounts
    within the Vectra environment. The action supports pagination and allows users
    to limit the number of returned records.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Accounts IDs | String | No | Comma-separated list of account IDs to filter the
    assignments. |

    | Hosts IDs | String | No | Comma-separated list of host IDs to filter the assignments.
