Remove Group:
  ai_description: >-
    ### General Description

    The **Remove Group** action allows users to remove specific members from a group
    in Vectra AI using the group's unique ID. This action is designed to manage group
    memberships dynamically, which is useful for containment or policy adjustments
    during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Group ID** | String | Yes | The unique identifier of the group in Vectra.
    Although provided as a string, the action validates it as a positive integer.
    |

    | **Members** | String | Yes | A comma-separated list of members to be removed
    from the group. The identifier type (e.g., IP, hostname, account UID, or domain)
    must correspond to the group's defined type. |


    ### Flow Description

    1. **Initialization**: The action extracts the API configuration (Root, Token,
    SSL) and the action parameters (Group ID and Members).

    2. **Validation**: The `Group ID` is validated to ensure it is a valid positive
    integer. The `Members` string is processed into a list of individual identifiers.

    3. **Pre-Execution Fetch**: The action retrieves the current members of the group
    to facilitate a comparison after the removal process.

    4. **External Mutation**: A `PATCH` request is sent to the Vectra API endpoint
    for the specific group ID, using the `membership_action="remove"` parameter to
    delete the specified members.

    5. **Post-Execution Analysis**: The action compares the updated group membership
    with the initial state to identify which members were successfully removed and
    which were not found or could not be removed.

    6. **Result Reporting**: The action outputs the updated group details as a JSON
    object and renders an HTML table for the case wall. It provides a status message
    indicating the count of removed members and any identifiers that were not found
    in the group.


    ### Additional Notes

    - The action will fail if none of the provided members exist in the specified
    group.

    - The type of member identifiers provided must match the group's type (e.g., if
    the group type is 'host', the members should be hostnames).
