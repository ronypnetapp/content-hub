Add Outcome:
  ai_description: "### General Description\nThe **Add Outcome** action allows users\
    \ to define and create a new outcome within the Vectra system. Outcomes are used\
    \ to categorize the resolution of assignments, providing structured feedback on\
    \ whether a detection was a true positive (malicious or benign) or a false positive.\
    \ This action is primarily used for administrative setup or to dynamically add\
    \ custom resolution categories to the Vectra platform.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Title** | String | Yes | The unique name/title for the new outcome (e.g.,\
    \ 'Confirmed Phishing'). |\n| **Category** | DDL | Yes | The broad classification\
    \ for the outcome. Supported values: `malicious_true_positive`, `benign_true_positive`,\
    \ `false_positive`. |\n\n### Flow Description\n1. **Parameter Extraction:** The\
    \ action retrieves the API configuration (Root, Token, SSL) and the user-provided\
    \ `Title` and `Category`.\n2. **Manager Initialization:** It initializes the `VectraQUXManager`\
    \ to handle communication with the Vectra API.\n3. **API Interaction:** The action\
    \ sends a `POST` request to the `/assignment_outcomes` endpoint with the specified\
    \ title and category.\n4. **Result Processing:** \n    * If successful, it parses\
    \ the created outcome object.\n    * It generates a data table displaying the\
    \ new Outcome ID, Title, and Category.\n    * It attaches the full JSON response\
    \ to the action results for further use in playbooks.\n5. **Completion:** The\
    \ action concludes by providing a success message containing the unique ID of\
    \ the newly created outcome."
