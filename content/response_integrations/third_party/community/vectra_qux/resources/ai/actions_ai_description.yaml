Add Tags:
  ai_description: >-
    This action adds tags to specific entities (Accounts, Hosts, or Detections) within
    the Vectra platform using their unique Vectra IDs. It is designed to update the
    metadata of these entities to assist in categorization and tracking.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | string | Yes | A comma-separated list of tags to be added to the specified
    entities. |

    | Entity IDs | string | Yes | A comma-separated list of the unique Vectra identifiers
    for the entities to be tagged. |

    | Entity Type | ddl | Yes | The type of Vectra entity being targeted. Options
    are 'Account', 'Host', or 'Detection'. |


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves the API configuration and the
    user-provided tags, entity IDs, and entity type.

    2.  **Validation:** It cleans the tag list and validates that the provided Entity
    IDs are valid integers.

    3.  **Tag Retrieval:** For each provided Entity ID, the action first fetches the
    existing tags from the Vectra API to ensure no data is overwritten.

    4.  **Tag Merging:** It merges the new tags with the existing ones, removing any
    duplicates.

    5.  **External Update:** The action sends a PATCH request to the Vectra API to
    update the entity's tag list with the combined set.

    6.  **Result Reporting:** It compiles a status report for each ID, providing a
    summary table and JSON result indicating which updates succeeded or failed.
