Resolve Assignment:
  ai_description: >-
    ### General Description

    Resolves a specific assignment in Vectra AI based on a provided Assignment ID
    and Outcome ID. This action allows security analysts to close out assignments
    by marking them with specific outcomes (e.g., Benign, Malicious, or False Positive)
    and optionally adding triage rules and notes. It interacts with the Vectra API
    via a PUT request to the resolution endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Assignment ID | string | Yes | The unique identifier of the assignment to be
    resolved. Must be a valid integer. |

    | Outcome ID | string | Yes | The ID representing the resolution outcome. Common
    values: 1 (Benign True Positive), 2 (Malicious True Positive), 3 (False Positive).
    Custom outcomes are also supported. |

    | Note Title | string | No | An optional note or title to be associated with the
    resolution of the assignment. |

    | Triage As | string | No | An optional triage rule to apply. If provided, at
    least one Detection ID must also be specified. |

    | Detection IDs | string | No | A comma-separated list of integer detection IDs
    to be associated with the resolution. Required if 'Triage As' is used. |


    ### Additional Notes

    - The action performs strict validation on the 'Assignment ID' and 'Outcome ID'
    to ensure they are valid integers.

    - If the 'Triage As' parameter is populated, the action requires at least one
    'Detection ID' to be provided; otherwise, it will fail with a validation error.

    - The 'Triage As' value must be at least 4 characters long and cannot contain
    special characters like `!@#$%^&*()`.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Assignment ID, Outcome ID, and optional
    parameters (Note, Triage, Detection IDs) from the action input.

    2. **Validation**: Validates that IDs are integers and checks the logical dependency
    between 'Triage As' and 'Detection IDs'.

    3. **API Interaction**: Initializes the VectraQUXManager and sends a PUT request
    to the `/assignments/{assignment_id}/resolve` endpoint with the resolution payload.

    4. **Data Processing**: Parses the updated assignment object returned by the API.

    5. **Output Generation**: Adds the raw JSON response to the action results and
    creates a data table named 'Resolved Assignment' containing the key details of
    the resolution.
