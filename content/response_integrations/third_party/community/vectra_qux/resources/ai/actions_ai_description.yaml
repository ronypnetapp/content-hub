Search Accounts:
  ai_description: >-
    Searches for and retrieves account details from Vectra AI based on user-defined
    query parameters. This action allows for granular filtering of accounts using
    scores, states, timestamps, and tags, providing a comprehensive list of matching
    accounts for investigation.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Order | String (DDL) | No | Determines the sort direction of the results: 'Ascending'
    or 'Descending'. |

    | Limit | String | No | The maximum number of account records to retrieve. |

    | Order By | String (DDL) | No | The field used to sort the results (e.g., threat
    score, certainty score, last detection timestamp, or ID). |

    | Fields | Multi-select | No | A list of specific account attributes to include
    in the output (e.g., name, state, threat, tags). |

    | Name | String | No | Filters the search results to accounts matching a specific
    name. |

    | State | String (DDL) | No | Filters accounts by their current state: 'Active'
    or 'Inactive'. |

    | Threat GTE | String | No | Filters for accounts with a threat score greater
    than or equal to the specified value. |

    | Certainty GTE | String | No | Filters for accounts with a certainty score greater
    than or equal to the specified value. |

    | Last Detection Timestamp GTE | String | No | Filters for accounts with a last
    detection timestamp greater than or equal to this value. |

    | Last Detection Timestamp LTE | String | No | Filters for accounts with a last
    detection timestamp less than or equal to this value. |

    | Tags | String | No | A comma-separated list of tags to filter the accounts by.
    |

    | Note Modified Timestamp GTE | String | No | Filters for accounts where notes
    were modified after the specified timestamp. |

    | Privilege Level | String | No | Filters accounts by a specific privilege level.
    |

    | Privilege Category | String (DDL) | No | Filters accounts by privilege category:
    'Low', 'Medium', or 'High'. |


    ### Additional Notes


    This action does not operate on specific entities within the SOAR case; instead,
    it performs a global search within the Vectra AI platform based on the provided
    criteria.


    ### Flow Description


    1. **Parameter Extraction**: The action retrieves configuration settings (API
    Root, Token) and user-provided search filters from the action parameters.

    2. **Validation**: Numeric parameters such as 'Limit', 'Threat GTE', and 'Certainty
    GTE' are validated to ensure they are proper integers.

    3. **API Query**: The action constructs a request and queries the Vectra AI `/accounts`
    endpoint, applying the specified filters and pagination logic.

    4. **Data Sanitization**: The returned account data is processed to remove API
    versioning strings from URLs and to extract a subset of mandatory fields for display.

    5. **Result Delivery**: The action outputs the full account details as a JSON
    object and creates a summary data table titled "List Of Accounts" in the SOAR
    interface.
