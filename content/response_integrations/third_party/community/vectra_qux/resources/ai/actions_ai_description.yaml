Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps (Chronicle) environment and the Vectra platform. It ensures that
    the provided credentials (API Root and API Token) are valid and that the network
    path is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Vectra API instance. |

    | **API Token** | String | Yes | The API token used for authentication with the
    Vectra platform. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the Vectra server. Default is `True`. |


    ### Flow Description

    1. **Initialization**: The action retrieves the configuration parameters (API
    Root, API Token, and SSL verification setting).

    2. **Manager Setup**: It initializes the `VectraQUXManager` with the provided
    credentials.

    3. **Connectivity Test**: The manager executes a `test_connectivity` call, which
    performs a simple `GET` request to the Vectra `hosts` endpoint to validate the
    connection.

    4. **Result Handling**:
        - If the request is successful, the action returns a success message and a
    `True` result.
        - If an exception occurs (e.g., authentication failure, timeout, or invalid
    URL), the action catches the error, logs the details, and returns a failure message
    with a `False` result.

    ### Additional Notes

    - This action does not interact with any entities or modify any data. It is strictly
    for diagnostic purposes.
