    the entity should be reassigned. |


    ### Additional Notes

    - This action requires the entity to already have an existing assignment; it will
    fail if no assignment is currently associated with the provided Entity ID.

    - Both the Entity ID and User ID must be valid numeric values.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and action parameters (Entity
    ID, Entity Type, and User ID).

    2. **Validation**: Validates that the provided Entity ID and User ID are integers.

    3. **Pre-check**: Fetches the current details of the entity from Vectra QUX to
    verify its existence and check for an existing assignment.

    4. **Execution**: If an assignment exists, it sends a `PUT` request to the Vectra
    QUX API to update the assignment with the new User ID.

    5. **Output**: Returns the updated assignment details as a JSON object and populates
    a data table named 'Updated Assignment' with the reassignment information.
