Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Webhook service. Its primary purpose is to ensure that the
    integration is correctly configured and that the target service is reachable over
    the network.


    ### Parameters Description

    There are no parameters for this action. It relies entirely on the integration's
    global configuration.


    ### Additional Notes

    This action utilizes the **URL** parameter defined in the integration settings
    to perform its check. It does not interact with any entities or alert data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the base URL from the Webhook
    integration configuration.

    2. **Manager Initialization**: It initializes the `WebhookManager` with the provided
    base URL.

    3. **Connectivity Check**: The action executes the `test_connectivity` method,
    which performs an HTTP GET request to the base URL.

    4. **Execution Result**: If the GET request returns a successful status code,
    the action completes with a success message. If the request fails or an exception
    occurs, it returns a failure message with the error details.
