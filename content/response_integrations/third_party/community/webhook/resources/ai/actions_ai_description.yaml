Create Token:
  ai_description: >-
    ### General Description\nThis action creates a new webhook token within the Webhook
    integration. Its primary purpose is to generate a unique endpoint (URL) that can
    receive external HTTP requests. Users can configure the response that the webhook
    URL provides when accessed, including the body content and the content type.\n\n###
    Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| **Default Content** | string | Yes | The content to be returned in
    the response body when the generated webhook URL is accessed. |\n| **Default Content
    Type** | string | Yes | The MIME type of the content (e.g., `text/html` or `application/json`).
    |\n| **Timeout** | string | No | The number of seconds (up to 10) the service
    should wait before returning a response to a request made to the webhook URL.
    |\n\n### Flow Description\n1. **Initialization**: The action retrieves the base
    URL from the integration configuration and extracts the user-provided parameters
    for content, content type, and timeout.\n2. **API Interaction**: It performs a
    POST request to the Webhook service's `/token` endpoint with the specified configuration.\n3.
    **URL Generation**: Upon a successful response, the action extracts the unique
    UUID for the new token and constructs the full webhook URL.\n4. **Completion**:
    The action returns the token metadata and the generated URL as a JSON result and
    marks the execution as successful.\n\n### Additional Notes\n- This action does
    not process or require any SecOps entities to run.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new webhook token and a corresponding unique URL endpoint on the external
      Webhook service.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
