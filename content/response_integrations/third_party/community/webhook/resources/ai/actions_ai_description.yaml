Delete Token:
  ai_description: >-
    ### General Description

    The **Delete Token** action is designed to remove a specific webhook token from
    the Webhook service. By deleting the token, the unique URL associated with it
    becomes inactive and inaccessible, preventing further data from being received
    or processed through that specific endpoint. This is typically used for cleanup
    or to revoke access to a temporary webhook.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Token ID | The unique identifier of the token to be deleted. | String | Yes
    | This ID is used to construct the specific API endpoint for the deletion request.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Token ID` provided by the
    user and strips any leading/trailing whitespace.

    2. **Manager Initialization**: It initializes the `WebhookManager` using the base
    URL defined in the integration's configuration.

    3. **External API Call**: The action invokes the `delete_token` method in the
    manager, which sends an HTTP DELETE request to the external Webhook service's
    endpoint (`/token/{token_id}`).

    4. **Result Handling**: The action captures the HTTP status code from the response.
    If the request is successful, it marks the execution as completed and returns
    a success message. If an error occurs, it logs the error and reports a failure.


    ### Additional Notes

    This action does not process or interact with entities (such as IPs or Hostnames)
    within the Google SecOps case; it operates strictly based on the provided `Token
    ID` parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a webhook token from the external Webhook service, which permanently
      removes the token and makes the associated URL endpoint inaccessible.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
