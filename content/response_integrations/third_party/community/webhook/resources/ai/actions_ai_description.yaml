Get Webhook Response:
  ai_description: >-
    ### General Description

    The **Get Webhook Response** action is designed to retrieve data from a specific
    webhook URL endpoint (formatted as `{Base URL}/{Token ID}`). This action is particularly
    useful for scenarios where a workflow needs to wait for an external trigger, such
    as a user clicking a link or an external system sending a callback. It supports
    asynchronous execution, allowing the SOAR platform to poll the endpoint until
    specific conditions are met.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Pending Condition** | DDL | Yes | Determines the logic for ending the action.
    `TimeFrame` waits for a specific duration before fetching data. `AwaitClick` polls
    the endpoint and completes as soon as at least one request is detected. |

    | **TimeFrame** | String | Yes | The number of minutes to wait before the action
    fetches the data and completes. This is only relevant when `Pending Condition`
    is set to `TimeFrame`. |

    | **Responses To Retrieve** | DDL | Yes | Specifies whether to retrieve `All`
    recorded requests for the token or only the `Latest` one. |

    | **Token ID** | String | Yes | The unique identifier for the webhook token to
    monitor. |


    ### Additional Notes

    - This action is **asynchronous**. It will remain in an 'In Progress' state until
    the specified timeframe expires or a request is received (depending on the configuration).

    - The action automatically filters out requests generated by Slackbots (identified
    via User-Agent) to prevent false positives in chat-based workflows.


    ### Flow Description

    1. **Initialization**: The action extracts the Token ID, the pending condition,
    and the retrieval preference (All vs. Latest).

    2. **Condition Check**:
        - If **TimeFrame** is selected: The action calculates the elapsed time since
    the first run. If the timeframe has not yet passed, it returns an `INPROGRESS`
    status. Once the timeframe expires, it fetches the requests.
        - If **AwaitClick** is selected: The action immediately checks for any requests
    associated with the Token ID. If no requests are found, it returns `INPROGRESS`.
    If requests are found, it proceeds to completion.
    3. **Data Retrieval**: The action calls the Webhook Manager to fetch request data
    from the external service.

    4. **Filtering**: The retrieved data is filtered to remove Slackbot-related entries.
    If 'Latest' was selected, only the most recent request is kept.

    5. **Completion**: The action outputs the retrieved JSON data and provides a summary
    message indicating how many requests were found or if the timeout was reached.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
