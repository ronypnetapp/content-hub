Spelling Check:
  ai_description: >-
    ### General Description

    This action identifies misspelled words within a provided text string and suggests
    potential corrections based on word frequency. It is designed to help analysts
    clean up notes, communications, or extracted data within the SOAR platform by
    highlighting typographical errors.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input | String | No | The raw text that will be analyzed for spelling errors.
    If left empty, the action will process an empty string. |


    ### Flow Description

    1. **Text Retrieval**: The action retrieves the string provided in the `Input`
    parameter.

    2. **Sanitization**: It cleans the input text using regular expressions to remove
    special characters while preserving letters, spaces, and specific symbols like
    '@' (to identify emails).

    3. **Filtering**: The logic splits the text into individual words and filters
    out potential false positives such as email addresses and URLs (containing 'http').

    4. **Misspelling Identification**: It utilizes a spell-checking manager (augmented
    with a custom allowlist of technical terms like 'siemplify' and 'playbook') to
    identify words not found in its dictionary.

    5. **Suggestion Generation**: For every misspelled word found, the action generates
    a list of candidate corrections.

    6. **Output Generation**: The results are formatted into a JSON object and a data
    table titled 'Found spelling mistakes' which is attached to the action output
    in the SOAR case.


    ### Additional Notes

    This action performs local text processing and does not require connectivity to
    external web services or APIs. It does not interact with or filter entities within
    the case scope.
  capabilities:
