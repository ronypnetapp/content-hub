Generate QR Code:
  ai_description: >-
    ### General Description

    The **Generate QR Code** action creates a QR code image from a provided string
    of data, such as a URL, text, or identifier. This utility action is designed to
    facilitate the visual representation of data within a case, allowing analysts
    to generate codes for physical tracking, mobile access, or documentation purposes.
    It interacts with the GOQR API to render the image based on customizable parameters
    like size, color, and error correction levels.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | **Content** | String | Yes | N/A | The data, URL, or text string to encode into
    the QR code. |

    | **Size** | String | No | 200x200 | The dimensions of the generated image in
    pixels (e.g., 300x300). Maximum value is 1000x1000. |

    | **Image Format** | DDL | No | png | The file format for the output image. Options:
    png, jpg, gif, svg. |

    | **Error Correction** | DDL | No | Low | The level of data redundancy (Low, Medium,
    Quartile, High). Higher levels increase damage resistance but result in a more
    complex image. |

    | **Margin** | String | No | 1 | The width of the blank border (quiet zone) around
    the QR code in pixels. |

    | **Foreground Color** | String | No | 0-0-0 | The color of the QR code modules
    in R-G-B format (e.g., 255-0-0 for red). |

    | **Background Color** | String | No | 255-255-255 | The color of the image background
    in R-G-B format. |


    ### Additional Notes

    * This action **does not run on entities**. It is a standalone utility that processes
    the provided 'Content' parameter.

    * The generated image is automatically attached to the case wall for immediate
    viewing.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the content to be encoded and
    optional styling parameters (size, format, colors) from the user input.

    2. **API Interaction:** It sends a request to the GOQR service to generate the
    QR code image bytes based on the specified configuration.

    3. **File Management:** The received image bytes are saved as a temporary file
    with a sanitized name derived from the content.

    4. **Internal Mutation:** The action attaches the generated image file to the
    Google SecOps case wall.

    5. **Result Finalization:** It returns a JSON object containing the base64-encoded
    image blob and the metadata used for generation, marking the action as successful.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds the generated QR code image as an attachment to the case wall.
  categories:
    enrichment: false
