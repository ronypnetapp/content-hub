Scan QR Code:
  ai_description: >-
    ### General Description

    The **Scan QR Code** action extracts and reads data from a QR code image provided
    as a Base64-encoded string. It utilizes the GOQR API to decode the image and retrieve
    the embedded information, making it useful for analyzing suspicious QR codes found
    in digital artifacts.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default |

    | :--- | :--- | :--- | :--- | :--- |

    | **QR Image Base64 Blob** | The Base64-encoded string representing the QR code
    image file. | String | Yes | N/A |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Base64-encoded image string
    from the input parameters.

    2. **Decoding**: The Base64 string is decoded into raw image bytes.

    3. **API Interaction**: The image bytes are sent to the GOQR API's read endpoint
    (`v1/read-qr-code/`).

    4. **Result Parsing**: The action parses the API response into structured data
    models, extracting the decoded text from the QR code symbols.

    5. **Output**: The decoded information is returned as a JSON result, and the action
    status is set to success.


    ### Additional Notes

    - This action does not process entities from the SecOps environment; it operates
    solely on the provided Base64 input.

    - Ensure the Base64 string is valid to avoid decoding errors.
