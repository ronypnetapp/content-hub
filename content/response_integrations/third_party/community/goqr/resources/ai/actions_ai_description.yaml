Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the QR Server API. Its primary purpose is to ensure
    that the integration's configuration (such as the API Root and SSL settings) is
    correct and that the external service is reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is a standard connectivity test and does not process any entities
    or alert data. It is typically used during the initial setup of the GOQR integration
    or for troubleshooting network issues.


    ### Flow Description

    1. **Client Initialization**: The action initializes the GOQR API client using
    the global integration configuration parameters, specifically the API Root and
    Verify SSL settings.

    2. **Connectivity Check**: It executes a request to the QR Server's ping endpoint
    (defined as a small QR code generation request) to validate the communication
    path.

    3. **Status Reporting**: The action returns a success message if the API responds
    correctly, or an error message if the connection fails.
