Remove Content:
  ai_description: >-
    ### General Description

    Removes specific content from a Google Document using its unique ID and a JSON-formatted
    list of index ranges. This action is primarily used for automated document editing,
    such as removing sensitive information or cleaning up generated reports.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Document Id** | String | Yes | The unique identifier of the Google Document.
    This can be found in the document's URL (e.g., `https://docs.google.com/document/d/{DocumentId}/`).
    |

    | **Json** | Code (JSON) | Yes | A JSON object containing an array of items. Each
    item must include `start_index` and `end_index` to define the range of characters
    to be deleted. |


    ### Flow Description

    1. **Initialization**: Retrieves the Google Docs service credentials from the
    integration configuration.

    2. **Input Parsing**: Extracts the `Document Id` and the `Json` payload containing
    the deletion ranges.

    3. **Request Construction**: Iterates through the provided JSON items to build
    a list of `deleteContentRange` requests compatible with the Google Docs API.

    4. **Execution**: Sends a `batchUpdate` request to the Google Docs API for the
    specified document.

    5. **Completion**: Returns the API response and logs the success of the operation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes content ranges within a Google Document via the Google Docs API batchUpdate
      method.
    fetches_data: false
    internal_data_mutation_explanation: null
