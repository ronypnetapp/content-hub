Replace Content:
  ai_description: >-
    ### General Description

    Replaces specific text strings within a Google Document using the Google Docs
    API. This action allows for bulk find-and-replace operations based on a provided
    JSON configuration, making it ideal for automating document updates, template
    filling, or report generation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | Yes | The unique identifier of the Google Document. This
    can be found in the document's URL (e.g., https://docs.google.com/document/d/**{DocumentId}**/).
    |

    | Json | code | Yes | A JSON-formatted string containing the replacement rules.
    It must include an `items` array where each object specifies `text_to_search`,
    `text_to_replace`, and `match_case` (a string value of "true" or "false"). |


    ### Flow Description

    1. **Initialization**: The action retrieves the Google service account credentials
    from the integration configuration and extracts the Document ID and replacement
    JSON from the action parameters.

    2. **Request Preparation**: It parses the input JSON string and iterates through
    the items to construct a list of `replaceAllText` requests. Each request defines
    the search string, the replacement string, and whether the search should be case-sensitive.

    3. **API Execution**: The action initializes the `GoogleDocsManager` and executes
    a `batchUpdate` call to the Google Docs API with the constructed requests for
    the specified Document ID.

    4. **Completion**: The API response is captured and added to the action's JSON
    results, and the action concludes with a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the content of a Google Document by performing a batch update to replace
      specified text strings.
