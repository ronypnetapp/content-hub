Create Document:
  ai_description: >-
    Creates a new Google Document and configures sharing permissions for specified
    users. This action automates the document creation process within Google Workspace,
    allowing for immediate collaboration by assigning roles such as Owner, Writer,
    or Reader to a list of email addresses.


    ### Flow Description:

    1. **Authentication**: Initializes the Google Docs and Drive API clients using
    the provided service account credentials.

    2. **Document Creation**: Sends a request to the Google Docs API to create a blank
    document with the user-defined title.

    3. **Permission Assignment**: Parses the semicolon-separated list of email addresses
    and, for each email, calls the Google Drive API to grant the specified access
    role (Owner, Writer, or Reader).

    4. **Metadata Retrieval**: Fetches the full metadata of the created file from
    Google Drive to confirm successful creation and configuration.

    5. **Output**: Returns the document metadata as a JSON result and provides the
    Document ID as the action's output value.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The title of the document to be created. Default is 'New
    Document'. |

    | Role | DDL | Yes | The access level granted to the specified emails. Options:
    'owner' (full control), 'writer' (can edit/comment), 'reader' (view only). |

    | Emails | String | Yes | A semicolon-separated list of email addresses (e.g.,
    'user1@example.com;user2@example.com') that will receive the specified permissions.
    |


    ### Additional Notes:

    * This action requires a service account with the 'https://www.googleapis.com/auth/drive.file'
    scope enabled.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new document in Google Docs and modifies file permissions in Google
      Drive to share the document with specified email addresses.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
