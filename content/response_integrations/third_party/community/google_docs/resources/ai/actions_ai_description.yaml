Create Content:
  ai_description: >-
    ### General Description

    The **Create Content** action allows users to programmatically insert text into
    a specific Google Document. It is designed to automate document updates by taking
    a structured JSON input that defines the text to be added and the specific character
    offsets (indices) where the text should be placed.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Document Id | The unique identifier of the Google Document. This can be extracted
    from the document's URL (e.g., https://docs.google.com/document/d/**{DocumentId}**/).
    | String | Yes |

    | Json | A JSON-formatted string containing an array of items to insert. Each
    item must include an `index` (the character position) and `text` (the content
    to insert). | Code/String | Yes |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Google service account credentials
    from the integration configuration and the `Document Id` and `Json` payload from
    the action parameters.

    2. **JSON Parsing:** The provided JSON string is parsed to extract the list of
    insertion items.

    3. **Request Construction:** For each item in the input, the action constructs
    a Google Docs `insertText` request object, mapping the text to the specified location
    index.

    4. **API Execution:** The action initializes the `GoogleDocsManager` and sends
    a `batchUpdate` request to the Google Docs API for the specified document.

    5. **Result Handling:** The response from the Google Docs API is attached as a
    JSON result, and the action completes with a success message.


    ### Additional Notes

    - The `index` values in the JSON input are zero-based character offsets. Providing
    an index that exceeds the document's current length or falls within certain protected
    structures may cause the API to return an error.

    - This action requires a service account with appropriate permissions (Drive/Docs
    scopes) to modify the target document.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action modifies the content of an existing Google Document by inserting
      text at specified indices using the Google Docs API batchUpdate method.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
