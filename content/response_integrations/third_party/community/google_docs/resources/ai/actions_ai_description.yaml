Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Google Docs/Drive API. Its primary purpose is to validate
    that the provided service account credentials are correct and that the integration
    can successfully communicate with Google's services.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Credentials Json | String | Yes | This is an integration-level configuration
    parameter. It requires the full JSON content of a Google Service Account key to
    authenticate requests. |


    ### Additional Notes

    - This action does not require or process any entities from the Google SecOps
    environment.

    - It is a read-only operation used strictly for testing the API handshake.


    ### Flow Description

    1. **Credential Retrieval**: The action extracts the `Credentials Json` from the
    integration's global configuration.

    2. **Service Initialization**: It initializes the `GoogleDocsManager`, which parses
    the JSON credentials and builds the authorized Google Drive and Google Docs service
    clients.

    3. **API Verification**: The action executes a `test_connectivity` call, which
    performs a `list` operation on the Google Drive API to verify that the service
    account has active access.

    4. **Status Reporting**: If the API call succeeds, the action returns a success
    message indicating a functional connection.
  capabilities:
    can_create_case_comments: false
