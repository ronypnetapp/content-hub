Add Domain to Allowed Lists:
  ai_description: >-
    ### General Description

    The **Add Domain to Allowed Lists** action allows users to add the domain component
    of URL entities to a specific Allowed List within the Bandura Cyber platform.
    This is typically used to whitelist known-safe domains to prevent them from being
    blocked by security policies.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List Name** | String | Yes | The exact name of the Allowed List in Bandura
    where the domain should be added. Note: This is case-sensitive. |

    | **Description** | String | No | A custom description to associate with the domain
    entry in the list. |

    | **Expiration Date** | String | No | The date and time when the domain should
    be automatically removed from the list (e.g., `2020-01-01T12:00:00.000+00:00`).
    |


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, credentials)
    and user-provided parameters (List Name, Description, Expiration Date).

    2. **Entity Filtering**: It identifies all URL entities within the current context.

    3. **Domain Extraction**: For each URL, the script parses the string to extract
    the network location (domain).

    4. **List Identification**: It queries the Bandura API to find the unique identifier
    (UUID) for the provided `List Name`.

    5. **External Mutation**: It sends a POST request to the Bandura Cyber API to
    create a new entry in the specified Allowed List containing the domain, description,
    and expiration date.

    6. **Result Reporting**: The action collects the API responses and provides a
    summary of which domains were successfully added to the list.
  capabilities:
