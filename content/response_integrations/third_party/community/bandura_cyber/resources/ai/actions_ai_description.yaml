Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity and
    authentication configuration between Google SecOps and the Bandura Cyber platform.
    Its primary purpose is to ensure that the integration can successfully communicate
    with the Bandura Cyber API using the provided credentials.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL for the Bandura Cyber API instance
    (e.g., https://gmc.banduracyber.com/api/v2/). |

    | **Username** | String | Yes | The username used for authenticating with the
    Bandura Cyber service. |

    | **Password** | String | Yes | The password used for authenticating with the
    Bandura Cyber service. |

    | **Verify SSL** | Boolean | No | Determines whether to verify the SSL certificate
    of the API endpoint. Defaults to `False`. |


    ### Additional Notes

    This action is a global utility and does not operate on specific entities (IPs,
    Domains, etc.). It uses the integration's configuration parameters to perform
    a test login and logout sequence.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, Username, Password,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `BanduraCyberManager`, which
    automatically attempts a login (`POST /auth/login`) to the Bandura Cyber API to
    retrieve an access token.

    3. **Session Termination**: The action immediately calls the `logout` method (`POST
    /auth/logout`) to invalidate the session and clean up resources.

    4. **Connectivity Check**: It evaluates whether an access token was successfully
    obtained during the initialization phase.

    5. **Final Result**: If a token was retrieved, the action returns a success message
    ("Connection Established"); otherwise, it returns a failure message ("Connection
    Failed").
