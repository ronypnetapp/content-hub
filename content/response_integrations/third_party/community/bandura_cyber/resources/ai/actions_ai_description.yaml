Add IP to Denied Lists:
  ai_description: >-
    ### General Description

    Adds IP Address entities to a specified Denied List in Bandura Cyber. This action
    allows security teams to dynamically block malicious or suspicious IP addresses
    by adding them to existing blocklists within the Bandura platform. It supports
    specifying CIDR masks, descriptions, and expiration dates for each entry.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | String | Yes | The exact name of the Denied List to which the IP
    will be added. Note: This value is case-sensitive. |

    | Description | String | No | A comment or description to be associated with the
    IP entry in the Bandura list. |

    | Maskbit | Integer | No | Defines the network mask for the IP address. Defaults
    to 32 (single host). |

    | Expiration Date | String | No | The timestamp for when the IP should be removed
    from the list. Expected format: `2020-01-01T12:00:00.000+00:00`. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Bandura Cyber API using
    the configured credentials to obtain an access token.

    2. **Entity Filtering**: It identifies all entities of type `ADDRESS` (IP addresses)
    within the current scope.

    3. **List Lookup**: For each IP, the action queries the Bandura API to find the
    unique identifier (UUID) of the Denied List provided in the 'List Name' parameter.

    4. **Addition**: It sends a POST request to the Bandura API to add the IP address
    to the identified Denied List, including the provided mask, description, and expiration
    date.

    5. **Result Processing**: The action collects the API responses and reports which
    entities were successfully added to the list.
