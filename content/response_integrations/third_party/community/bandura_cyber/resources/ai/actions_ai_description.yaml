Add Domain to Denied Lists:
  ai_description: >-
    Adds URL entities to a specified Denied List in Bandura Cyber. This action is
    primarily used for containment by blocking malicious or suspicious domains at
    the network level. It extracts the domain (netloc) from the URL entity and pushes
    it to the external Bandura Cyber platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The name of the Denied List where the domain should
    be added. Note: This value is case-sensitive. |

    | Description | string | No | A descriptive note to be attached to the entry in
    the denied list. |

    | Expiration Date | string | No | The date and time when the entity should be
    automatically removed from the list. Expected format: `YYYY-MM-DDTHH:MM:SS.mmm+00:00`.
    |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Bandura Cyber API using
    the configured Username and Password to retrieve an access token.

    2. **Entity Selection**: It filters the target entities to identify those of type
    URL.

    3. **Domain Parsing**: For each identified URL, the action extracts the domain
    component (netloc) using standard URL parsing logic.

    4. **List Lookup**: It queries the Bandura Cyber platform to find the internal
    UUID associated with the provided 'List Name'.

    5. **External Mutation**: The action performs a POST request to the Bandura Cyber
    API to add the domain to the specified denied list, including the optional description
    and expiration date if provided.

    6. **Result Processing**: It captures the API response for each entity and returns
    a summary of the entities successfully added to the list.


    ### Additional Notes

    - The action specifically targets the domain portion of a URL. If a full path
    is included in the URL entity, only the root domain/subdomain will be blocked
    in Bandura Cyber.

    - If the specified 'List Name' does not exist in the Bandura Cyber environment,
    the action will fail to add the entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds domain entries to a specified denied list within the Bandura Cyber platform
      via a POST request to the /denied-lists/domain/{uuid}/entries endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
