Add IP to Allowed Lists:
  ai_description: >-
    Adds IP address entities to a specified IPv4 Allowed List in Bandura Cyber. This
    action allows for automated whitelisting of IP addresses by adding them to existing
    manual lists within the Bandura GMC platform. It supports specifying network masks,
    descriptions, and expiration dates for each entry.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | String | Yes | The case-sensitive name of the Allowed List where
    the IP will be added. |

    | Description | String | No | A description to associate with the allowed list
    entry. |

    | Maskbit | Integer | No | The network mask for the IP address (default is 32).
    |

    | Expiration Date | String | No | The date and time when the entry should be automatically
    removed (Format: YYYY-MM-DDTHH:MM:SS.mmm+00:00). |


    ### Flow Description

    1. **Authentication**: Connects to the Bandura Cyber API using the provided credentials
    to obtain an access token.

    2. **List Identification**: Retrieves the unique identifier (UUID) for the specified
    'List Name' by querying the Bandura Cyber allowed lists.

    3. **Entity Processing**: Filters the target entities to identify all IP Address
    (ADDRESS) entities.

    4. **External Mutation**: For each identified IP, sends a POST request to Bandura
    Cyber to add the address to the identified Allowed List using the provided mask,
    description, and expiration date.

    5. **Result Reporting**: Aggregates the API responses and provides a summary of
    the entities successfully added to the list.
