DHCP Lease Lookup:
  ai_description: >-
    ### General Description

    The **DHCP Lease Lookup** action retrieves detailed DHCP lease information from
    Infoblox DDI based on user-defined filter criteria. This action is designed to
    help security analysts identify IP address assignments, hostnames, and hardware
    (MAC) addresses associated with network devices, providing critical context during
    investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **DHCP Lease Filter** | string | No | A logical expression used to filter DHCP
    leases (e.g., `address == "192.168.1.1"` or `hostname == "ubuntu"`). |

    | **Offset** | string | No | The starting point for pagination (default is "0").
    |

    | **Limit** | string | No | The maximum number of lease records to return (default
    is "100"). |

    | **Order By** | string | No | A comma-separated list of fields to sort the results
    by, supporting ascending (`asc`) or descending (`desc`) order. |


    ### Additional Notes

    - This action does not operate on specific entities within the Google SecOps case;
    it relies entirely on the provided filter string to query the Infoblox database.

    - The results are presented both as a raw JSON object and as a formatted data
    table named "DHCP Leases".


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and user-provided
    filter, pagination, and sorting parameters.

    2. **Validation**: The `Offset` and `Limit` parameters are validated to ensure
    they are non-negative integers.

    3. **API Request**: A GET request is sent to the Infoblox `/api/ddi/v1/dhcp/lease`
    endpoint using the specified filters.

    4. **Data Processing**: The retrieved lease records are parsed and converted into
    a flat format suitable for display.

    5. **Output Generation**: The action populates the JSON result with the full API
    response and creates a data table containing the lease details for visibility
    in the case wall.
