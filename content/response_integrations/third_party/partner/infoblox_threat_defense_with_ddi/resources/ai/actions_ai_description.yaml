Create Network List:
  ai_description: >-
    ### General Description

    This action creates a new network list within Infoblox Threat Defense. Network
    lists are used to group IP addresses or CIDR blocks, which can then be referenced
    in security policies to control traffic or apply specific security rules. This
    is a management action used to define network boundaries or groups for security
    enforcement.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name for the network list to be created. |

    | Items | String | Yes | A comma-separated string of items (e.g., IP addresses
    or CIDR blocks) to include in the network list. |

    | Description | String | No | An optional text description providing context or
    purpose for the network list. |


    ### Additional Notes

    * The **Items** parameter must be provided as a comma-separated string; the action
    will automatically parse this into a list for the API request.

    * The action performs validation to ensure that both **Name** and **Items** are
    non-empty strings before attempting the API call.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the 'Name', 'Items', and 'Description'
    from the input parameters.

    2. **Validation:** It validates that the mandatory 'Name' and 'Items' fields are
    not empty strings.

    3. **Data Preparation:** The comma-separated 'Items' string is converted into
    a Python list format.

    4. **API Interaction:** The action initializes the Infoblox API Manager and sends
    a POST request to the `/api/atcfw/v1/network_lists` endpoint with the network
    list details.

    5. **Result Processing:** The action parses the API response, populates a 'Network
    List Details' data table with the created list's metadata (ID, Name, Description,
    Policy ID), and returns the raw JSON result.
