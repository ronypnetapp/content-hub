Indicator Threat Lookup With TIDE:
  ai_description: >-
    ### General Description

    The **Indicator Threat Lookup With TIDE** action allows users to query Infoblox
    TIDE (Threat Intelligence Data Exchange) for detailed threat intelligence regarding
    specific indicators. It supports searching for IPs, Hosts, URLs, Emails, and Hashes,
    or filtering by broader criteria like domains, threat classes, and targets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Indicator Type** | Dropdown | No | The category of indicator to search for
    (e.g., IP, Host, URL, Email, Hash). Defaults to 'All'. |

    | **Indicator Value** | String | No | The specific value of the indicator to look
    up. |

    | **Domain** | String | No | Comma-separated list of domains to filter the search.
    |

    | **Top-Level Domain** | String | No | Comma-separated list of top-level domains
    (TLDs) to filter the search. |

    | **Threat Class** | String | No | Comma-separated list of threat classes (e.g.,
    malware, phishing) to search for. |

    | **Target** | String | No | Comma-separated list of targets to filter the search.
    |

    | **Expiration** | String | No | Period of time after which data is no longer
    considered active (ISO8601 format). |

    | **Limit** | String | No | Maximum number of results to return. Defaults to 1000.
    |


    ### Additional Notes

    This action does not automatically process entities from the current Google SecOps
    case. It is a manual lookup tool that relies on the values provided in the action
    parameters. If 'Indicator Type' is set to 'All', the 'Indicator Value' is ignored
    in favor of other filters like Domain or Threat Class.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves API credentials and user-defined search
    filters (Indicator Type, Value, Domain, etc.) from the action parameters.

    2. **API Request**: Executes a GET request to the Infoblox TIDE `/tide/api/data/threats`
    endpoint using the provided filters.

    3. **Data Processing**: Parses the JSON response into a list of threat records
    using the `IndicatorThreatLookupTideResult` model.

    4. **Output Generation**: Returns the raw JSON response for downstream logic and
    constructs a data table displaying key threat fields including Indicator, Type,
    Threat Level, Class, Property, Profile, and Detection status.
