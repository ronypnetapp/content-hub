Host Lookup:
  ai_description: >-
    ### General Description

    Retrieves host asset information from Infoblox IPAM (IP Address Management). This
    action allows users to search for host records using specific filtering criteria,
    tags, and sorting options. It is primarily used for asset discovery and inventory
    management within the Infoblox environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Host Filter | String | No | A logical expression to filter hosts (e.g., `name=="webserver01"`
    or `ip_address=="192.168.1.100"`). |

    | Tag Filter | String | No | A logical expression to filter hosts by their assigned
    tags (e.g., `'Tenable_scan'=='true'`). |

    | Offset | String | No | The starting index for pagination. Defaults to "0". |

    | Limit | String | No | The maximum number of host records to return. Defaults
    to "100". |

    | Order By | String | No | Comma-separated fields to sort the results (e.g., `name
    asc`). Supports dot notation for nested fields. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the filter criteria, pagination
    settings (Offset/Limit), and sorting preferences from the user input.

    2. **Validation:** It validates that the `Offset` and `Limit` parameters are valid
    non-negative integers using internal utility functions.

    3. **API Request:** It sends a GET request to the Infoblox `/api/ddi/v1/ipam/host`
    endpoint via the `APIManager` with the specified query parameters.

    4. **Data Processing:** The raw JSON response is captured and added to the action's
    result JSON.

    5. **Output Generation:** The action processes the results into `Host` data models
    and populates a data table named "Hosts" with the retrieved host details (up to
    a maximum of 20 records for display) and provides the full JSON result for further
    playbook processing.


    ### Additional Notes

    - This action does not automatically process entities present in the SecOps case;
    it relies entirely on the provided filter parameters.

    - If no records match the filters, the action completes successfully with a message
    indicating no records were found.

    - The `Limit` parameter controls the API response size, while the UI table is
    capped at 20 records.
