Update Custom List Items:
  ai_description: >-
    ### General Description

    Updates the items within an existing Infoblox Custom List. This action allows
    users to programmatically manage threat intelligence lists by adding or removing
    specific indicators such as IPv4 addresses, IPv6 addresses, or domain names. It
    is primarily used for maintaining blocklists or allowlists within the Infoblox
    Threat Defense platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Custom List ID** | String | Yes | The unique identifier of the Custom List
    to update. Although provided as a string, the action validates that it is a positive
    integer. |

    | **Action** | DDL | Yes | Specifies the operation to perform. Options are **Add**
    (to insert new items) or **Remove** (to delete existing items). |

    | **Items** | String | Yes | A comma-separated list of indicators to be processed.
    Supported formats include IPv4, IPv6, and domain names. |


    ### Flow Description

    1. **Parameter Extraction and Validation**: The action retrieves the Custom List
    ID, the desired action (Add/Remove), and the list of items. It validates that
    the ID is a valid positive integer and that every item in the list conforms to
    IP or domain name syntax.

    2. **API Request Construction**: Based on the selected action, the code prepares
    a JSON payload for a PATCH request. If the action is 'Add', items are placed in
    the `inserted_items_described` field; if 'Remove', they are placed in `deleted_items_described`.

    3. **External Mutation**: The action sends a PATCH request to the Infoblox API
    endpoint `/api/atcfw/v1/named_lists/{custom_list_id}/items` to update the list
    state.

    4. **Result Processing**: The action parses the response from Infoblox, calculates
    the number of items added, removed, or updated, and outputs a summary message
    along with the raw JSON result.


    ### Additional Notes

    - This action does not process entities from the SecOps environment; it relies
    entirely on the provided 'Items' parameter.

    - The action will fail if the 'Items' string is empty or contains invalid indicator
    formats.
