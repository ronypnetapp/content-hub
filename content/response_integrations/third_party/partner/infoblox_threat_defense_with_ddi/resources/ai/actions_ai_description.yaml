Get Security Policies:
  ai_description: >-
    ### General Description

    Retrieves all configured security policies and their associated metadata from
    the Infoblox Threat Defense platform. This action is primarily used for auditing,
    visibility, and policy management within a SOAR workflow, allowing users to fetch
    a list of security policies based on specific filters and tags.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

