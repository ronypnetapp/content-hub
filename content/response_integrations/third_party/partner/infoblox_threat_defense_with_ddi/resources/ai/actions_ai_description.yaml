DNS Record Lookup:
  ai_description: >-
    ### General Description


    The **DNS Record Lookup** action performs a DNS record query to retrieve associated
    IP addresses or domains from Infoblox Threat Defense. This action is designed
    as a search tool that allows analysts to query the Infoblox DDI database for specific
    DNS records using customizable filters, tags, and sorting parameters. It is particularly
    useful for infrastructure discovery, verifying DNS configurations, and investigating
    domain-to-IP mappings during security incidents.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **DNS Record Filter** | String | No | A logical expression used to filter DNS
    records (e.g., `type=='PTR' and absolute_zone_name == 'Test'`). |

    | **Tag Filter** | String | No | A logical expression used to filter DNS records
    based on specific tags (e.g., `'nios/federation_enabled'==true`). |

    | **Offset** | String | No | The starting point for pagination. Defaults to "0".
    |

    | **Limit** | String | No | The maximum number of results to return. Defaults
    to "100". |

    | **Order By** | String | No | A comma-separated list of JSON fields to sort the
    results. Supports `asc` or `desc` directions and dot notation for nested fields.
    |


    ### Additional Notes


    - This action does not operate on specific entities within a case; it is a global
    lookup tool based on the provided input parameters.

    - The action displays up to 20 records in the "DNS Records" data table for quick
    reference, while the full result set is available in the JSON output.


    ### Flow Description


    1. **Parameter Extraction:** The action retrieves the user-provided filters, pagination
    settings (Offset, Limit), and sorting preferences (Order By).

    2. **Validation:** The `Offset` and `Limit` parameters are validated to ensure
    they are non-negative integers, with `Limit` specifically required to be greater
    than zero.

    3. **API Execution:** The action initializes the Infoblox API Manager and performs
    a GET request to the DNS record endpoint using the configured filters and pagination
    parameters.

    4. **Data Transformation:** The retrieved DNS records are parsed and mapped to
    a structured data model. The action flattens the data for tabular display.

    5. **Result Reporting:** The full API response is attached as a JSON result to
    the action. Additionally, a summary table titled "DNS Records" is created containing
    the first 20 records for immediate visibility in the Google SecOps interface.
