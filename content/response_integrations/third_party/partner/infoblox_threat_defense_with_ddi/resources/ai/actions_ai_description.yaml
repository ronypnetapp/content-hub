    on Tags. |

    | Offset | String | No | Specifies the starting point (offset) for pagination.
    Defaults to "0". |

    | Limit | String | No | Specifies the maximum number of results to return in a
    single request. Defaults to "100". |


    ### Additional Notes

    - This action does not operate on specific entities (like IPs or Domains) but
    rather fetches global configuration data from the Infoblox environment.

    - The action includes built-in validation for the `Offset` and `Limit` parameters
    to ensure they are non-negative integers.

    - A maximum of 20 records will be displayed in the Siemplify Data Table for UI
    performance, while the full result set is available in the JSON output.


