Create Security Policy:
  ai_description: >-
    ### General Description

    Creates a new security policy in the Infoblox Threat Defense platform. This action
    allows administrators to define policy names, descriptions, security rules, and
    associations with network lists, DNS Forwarding Proxies (DFPs), and roaming device
    groups. It also supports advanced security features like DNS rebinding protection
    and safe search filtering.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | string | True | The unique name for the security policy. |

    | Description | string | False | A brief description of the policy's purpose.
    |

    | Rules | string | False | A JSON array of rule objects defining actions (e.g.,
    block, allow) and data types. |

    | Network Lists | string | False | Comma-separated IDs of network lists to associate
    with this policy. |

    | DFPS | string | False | Comma-separated IDs of DNS Forwarding Proxies to associate
    with this policy. |

    | Roaming Device Groups | string | False | Comma-separated IDs of roaming device
    groups to associate with this policy. |

    | Block DNS Rebinding | boolean | False | If true, enables protection against
    DNS rebinding attacks. Default is false. |

    | Safe Search | boolean | False | If true, enables safe search filtering for the
    policy. Default is false. |

    | Tags | string | False | A JSON object containing key-value pairs to categorize
    the policy. |

    | Additional Parameters | string | False | A JSON object for advanced fields such
    as precedence, access_codes, or doh_enabled. |


    ### Additional Notes

    - The 'Rules' parameter must be a valid JSON array string.

    - The 'Tags' and 'Additional Parameters' must be valid JSON object strings.

    - 'Network Lists', 'DFPS', and 'Roaming Device Groups' expect comma-separated
    integers.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves all user-provided parameters
    and validates that the mandatory 'Policy Name' is present.

    2. **Payload Construction:** It parses the input strings into their respective
    formats (e.g., converting CSV strings to integer lists and JSON strings to Python
    dictionaries).

    3. **API Interaction:** The action sends a POST request to the Infoblox API endpoint
    `/api/atcfw/v1/security_policies` with the constructed payload.

    4. **Result Processing:** Upon success, the action returns the raw JSON response
    of the created policy and generates a data table titled 'Security Policy Details'
    for the case wall.
