Ping:
  ai_description: "### General Description\nVerifies connectivity to the Infoblox\
    \ Threat Defense with DDI server by performing a test API call. This action is\
    \ primarily used to validate that the integration's configuration parameters,\
    \ such as the API Root and API Key, are correct and that the Google SecOps environment\
    \ can successfully communicate with the Infoblox API.\n\n### Parameters Description\n\
    This action does not have any input parameters. It uses the global integration\
    \ configuration.\n\n### Additional Notes\nAs a standard 'Ping' action, it does\
    \ not process entities or modify any data within the SOAR or the external Infoblox\
    \ system.\n\n### Flow Description\n1. **Parameter Initialization**: The action\
    \ retrieves the global configuration parameters: API Root, API Key, and SSL verification\
    \ status.\n2. **API Manager Setup**: It initializes the `APIManager` with the\
    \ provided credentials and connection settings.\n3. **Connectivity Test**: The\
    \ action executes the `test_connectivity` method, which sends a GET request to\
    \ the `/api/authn/v1/account` endpoint.\n4. **Status Evaluation**: \n    * If\
    \ the API call is successful, the action returns a success message and sets the\
    \ execution state to completed.\n    * If an exception occurs (e.g., authentication\
