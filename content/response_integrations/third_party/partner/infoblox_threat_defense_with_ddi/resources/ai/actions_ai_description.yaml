Get Network List:
  ai_description: >-
    ### General Description

    Retrieves the contents of network lists from Infoblox Threat Defense. This action
    allows users to fetch details for a specific network list by its ID or to query
    multiple network lists using a logical filter expression. The retrieved data includes
    network list names, descriptions, and associated security policy IDs, which are
    presented as both a raw JSON result and a formatted data table within the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Network List ID | string | No | The unique identifier of the network list to
    retrieve. If provided, the action fetches only this specific list and ignores
    the 'Security Network Filter'. |

    | Security Network Filter | string | No | A logical expression string (e.g., `name
    == 'net_list1'`) used to filter network lists when no specific ID is provided.
    |

    | Offset | string | No | The starting index for pagination (default is '0'). |

    | Limit | string | No | The maximum number of results to return (default is '100').
    |


    ### Additional Notes

    - If a 'Network List ID' is provided, the 'Security Network Filter' is ignored
    by the API.

    - The action displays up to 20 records in the 'Network List' data table for readability,
    while the full response is available in the JSON result.


    ### Flow Description

    1. **Parameter Initialization**: Extracts the API configuration and action parameters
    (ID, Filter, Offset, Limit).

    2. **Validation**: Validates that the 'Network List ID', 'Offset', and 'Limit'
    are valid non-negative integers.

    3. **API Interaction**: Calls the Infoblox API's network lists endpoint. If an
    ID is provided, it targets the specific resource; otherwise, it applies the filter
    and pagination parameters.

    4. **Data Processing**: Parses the API response into the `NetworkList` data model.

    5. **Output Generation**: Adds the full JSON response to the action results and
    constructs a CSV-formatted data table named 'Network List' for the SOAR interface.
