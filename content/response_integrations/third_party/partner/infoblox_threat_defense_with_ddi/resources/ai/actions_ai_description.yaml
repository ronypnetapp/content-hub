Update Custom List:
  ai_description: >-
    ### General Description

    Updates the configuration of an existing custom list in the Infoblox Threat Defense
    platform. This action allows for the modification of metadata such as the list's
    name, description, confidence level, threat level, and associated tags. It ensures
    data consistency by fetching the current state of the list before applying updates,
    allowing users to modify only specific fields while preserving others.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Custom List ID | String | Yes | The unique identifier of the custom list to
    be updated. Must be a positive integer. |

    | Name | String | No | The new name for the custom list. If not provided, the
    existing name is retained. |

    | Description | String | No | The new description for the custom list. Use the
    keyword `empty` to remove the existing description. |

    | Confidence Level | DDL | No | The confidence level for the custom list. Options:
    High, Medium, Low. |

    | Threat Level | DDL | No | The threat level for the custom list. Options: High,
    Medium, Low, Info. |

    | Tags | String | No | A JSON object string representing tags to categorize the
    list. Use the keyword `empty` to remove all existing tags. |


    ### Additional Notes

    - The action uses a 'fetch-then-update' logic to ensure that fields not specified
    in the action parameters remain unchanged in the external system.

    - The `empty` keyword is a special trigger used to explicitly clear the `Description`
    or `Tags` fields.

    - Tags must be provided as a valid JSON object string (e.g., `{"key": "value"}`).


    ### Flow Description

    1. **Parameter Initialization:** The action extracts the integration configuration
    (API Root, API Key) and the action-specific parameters.

    2. **Validation:** Validates that the `Custom List ID` is a valid positive integer.

    3. **Data Retrieval:** Calls the Infoblox API to fetch the current details of
    the specified custom list. This is necessary to populate the update payload with
    existing values for any parameters not provided by the user.

    4. **Payload Construction:** Merges the user-provided updates with the existing
    data. It specifically handles the `empty` keyword to nullify fields and converts
    level strings to uppercase as required by the API.

    5. **API Execution:** Sends a `PUT` request to the Infoblox endpoint to update
    the custom list resource.

    6. **Result Processing:** Parses the API response, adds the raw JSON result to
    the action output, and constructs a data table titled "Custom List Details" for
    the case wall.
