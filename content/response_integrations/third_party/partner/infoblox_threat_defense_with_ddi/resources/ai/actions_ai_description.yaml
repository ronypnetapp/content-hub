Create Custom List:
  ai_description: >-
    ### General Description

    Creates a new custom list in the Infoblox Threat Defense platform. This action
    allows users to define a named collection of indicators (such as IPv4 addresses,
    IPv6 addresses, or domain names) that can be utilized within security policies
    for filtering or threat management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Name** | string | Yes | The unique name of the Custom List to be created.
    |

    | **Type** | string | Yes | The category or type of the Custom List (default is
    'custom_list'). |

    | **Items** | string | No | A comma-separated string of indicators (IPs or domains)
    to populate the list initially. |

    | **Description** | string | No | A brief explanation of the list's purpose. |

    | **Confidence Level** | ddl | No | The confidence score associated with the list
    indicators (High, Medium, Low). |

    | **Threat Level** | ddl | No | The severity of the threat associated with the
    list (High, Medium, Low, Info). |

    | **Tags** | string | No | A JSON-formatted string of tags to categorize the list.
    |


    ### Additional Notes

    - The **Items** parameter must contain valid IPv4, IPv6, or domain name formats;
    otherwise, the action will fail during validation.

    - The **Tags** parameter must be a valid JSON object string (e.g., `{"key": "value"}`).


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration settings (API
    Root, Key) and user-provided action parameters.

    2. **Validation:** It validates that mandatory strings are present and that any
    provided indicators in the 'Items' list match expected network patterns (IP/Domain).

    3. **Payload Construction:** A JSON payload is built containing the list metadata
    and items.

    4. **API Interaction:** The action sends a POST request to the Infoblox `/api/atcfw/v1/named_lists`
    endpoint.

    5. **Result Processing:** Upon success, the action returns the raw JSON response
    and generates a 'Custom List Details' data table in the Google SecOps interface.
