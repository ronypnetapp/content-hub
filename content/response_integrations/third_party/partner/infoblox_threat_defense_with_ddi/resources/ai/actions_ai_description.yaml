Get SOC Insights Assets:
  ai_description: >-
    ### General Description

    The **Get SOC Insights Assets** action retrieves a list of assets associated with
    a specific Infoblox SOC Insight ID. This action is used to identify which devices
    or users were involved in a particular security insight, providing critical context
    for incident response. It allows for granular filtering by IP address, MAC address,
    operating system version, and associated user, as well as time-based filtering
    for asset changes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Insight ID** | String | Yes | The unique identifier of the SOC Insight to
    retrieve assets from. |

    | **Asset IP** | String | No | Filter the results to include only assets with
    this specific IP address. |

    | **MAC Address** | String | No | Filter the results to include only assets with
    this specific MAC address. |

    | **OS Version** | String | No | Filter the results by the operating system version
    of the asset. |

    | **User** | String | No | Filter the results by the user associated with the
    asset. |

    | **Limit** | String | No | The maximum number of results to return (Default is
    100). |

    | **From** | String | No | Filter for assets changed after this time (Format:
    YYYY-MM-DDTHH:mm:ss.SSS). |

    | **To** | String | No | Filter for assets changed before this time (Format: YYYY-MM-DDTHH:mm:ss.SSS).
    |


    ### Additional Notes

    - The action returns a maximum of 20 records in the visible data table for performance
    reasons, though the full list (up to the specified limit) is available in the
    JSON result.

    - Time parameters must follow the ISO-like format `YYYY-MM-DDTHH:mm:ss.SSS` to
    be processed correctly by the Infoblox API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory `Insight ID` and
    optional filters (IP, MAC, OS, User, Time range, and Limit) from the input.

    2. **Validation**: It validates that the `Insight ID` is not empty and that the
    `Limit` is a valid positive integer.

    3. **API Request**: It utilizes the `APIManager` to send a GET request to the
    Infoblox `/api/v1/insights/{insight_id}/assets` endpoint with the provided query
    parameters.

    4. **Data Processing**: The response is parsed. If assets are found, they are
    mapped to the `SOCInsightAsset` data model.

    5. **Output Generation**: The action adds the raw JSON response to the execution
    results and constructs a CSV-formatted data table named "Assets" containing key
    details like Asset IP, MAC Address, Threat Level, OS Version, and User.

    6. **Completion**: The action concludes by providing a summary message of the
    number of assets found or an error message if the Insight ID is invalid.
