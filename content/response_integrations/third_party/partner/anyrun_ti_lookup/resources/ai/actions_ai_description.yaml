ANYRUN TI Lookup:
  ai_description: >-
    ### General Description

    Performs threat intelligence lookups using the ANY.RUN TI Lookup service. This
    action allows users to query for specific entities (IPs, Domains, URLs, Processes,
    Filehashes) or provide a raw ANY.RUN query string to retrieve detailed threat
    analysis. The results include threat levels (Malicious, Suspicious, Unknown) and
    full JSON reports.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Lookup Depth | Specify the number of days from the current date for which you
    want to lookup. | String | Yes |

    | Query | Raw query with necessary filters. Supports condition concatenation with
    AND, OR, NOT and Parentheses (). | String | No |

    | Identifiers | The target case entity identifiers. | String | Yes |

    | Types | The target case entity types. | String | Yes |


    ### Additional Notes

    The action requires either a raw query or a list of entity identifiers and types.
    If the 'Query' parameter is provided, the action will prioritize it and perform
    a lookup based on the query string. If 'Query' is empty, the action will iterate
    through the provided entities and perform lookups for supported types (Address,
    IPSet, DestinationURL, Domain, Process, and Filehash).


    ### Flow Description

    1. **Parameter Extraction**: Retrieve action parameters (Lookup Depth, Query,
    Identifiers, Types) and integration settings (API Key, SSL verification).

    2. **Lookup Mode Selection**: Check if a raw query is provided. If so, proceed
    with query lookup; otherwise, process the list of entities.

    3. **API Interaction**: For the query or each supported entity, call the ANY.RUN
    TI Lookup API to fetch intelligence data.

    4. **Internal Data Updates**: For each successful lookup:
        - Add a comment to the case with a direct link to the ANY.RUN portal.
        - Save the complete JSON intelligence report as an attachment to the case
    wall.
        - Calculate a verdict based on the threat level score.
    5. **Summary Reporting**: Aggregate the results for all processed items into a
    summary table and add it as a final comment to the case.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds lookup URLs and summary reports as comments and case wall attachments.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - IPSET
    - DestinationURL
    - DOMAIN
    - PROCESS
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description: Tests the connectivity between Google SecOps and the
    ANY.RUN TI Lookup service to ensure the integration is correctly configured and
    can successfully communicate with the ANY.RUN API. ### Parameters Description:
    1. ANYRUN TI Lookup API KEY (String, Mandatory): The API key required to authenticate
    requests to the ANY.RUN TI Lookup service. 2. Verify SSL (Boolean, Optional):
    If enabled, the action will verify the SSL certificate of the ANY.RUN API endpoint.
    3. Enable proxy (Boolean, Optional): If enabled, the action will attempt to connect
    through the specified proxy server. 4. Proxy host (String, Optional): The hostname
    or IP address of the proxy server. Required if 'Enable proxy' is true. 5. Proxy
    port (String, Optional): The port number of the proxy server. Required if 'Enable
    proxy' is true. ### Additional Notes: This action does not process any entities
    or modify any data. If 'Enable proxy' is selected, both 'Proxy host' and 'Proxy
    port' must be provided. ### Flow Description: 1. Configuration Extraction: The
    action retrieves the API key, SSL verification preference, and proxy settings
    from the integration configuration. 2. Proxy Validation (Optional): If proxying
    is enabled, the action first tests the connection through the specified proxy
    host and port. 3. Authorization Check: The action uses the LookupConnector to
    perform an authorization check against the ANY.RUN API using the provided API
    key. 4. Result Reporting: If the check is successful, a completion message is
    returned. If any step fails (e.g., invalid API key, network timeout), the action
    fails and logs the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
