Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the NetApp Ransomware Resilience
    Service. This action ensures that the integration is correctly configured and
    that the service is reachable using the provided credentials.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the following
    global integration configuration parameters:

    * **Client ID**: The OAuth client ID used for authentication.

    * **Client Secret**: The OAuth client secret used for authentication.

    * **Account ID**: The NetApp account identifier.

    * **Verify SSL**: A boolean flag to enable or disable SSL certificate validation
    for API requests.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the initial setup
    of the NetApp Ransomware Resilience integration. It does not process any entities.


    ### Flow Description

    1. **Initialization**: The action initializes the API manager and retrieves the
    integration's global configuration parameters.

    2. **Authentication Check**: It checks if a valid OAuth token already exists in
    the encrypted credential storage.

    3. **Token Generation**: If no valid token is found or if the existing token is
    expired, it sends a POST request to the NetApp Auth0 endpoint to generate a new
    access token.

    4. **Validation**: It verifies the token's validity to ensure the service is reachable
    and the credentials are correct.

    5. **Completion**: Returns a success status if authentication succeeds, or a failure
    status with a descriptive error message if any step fails.
