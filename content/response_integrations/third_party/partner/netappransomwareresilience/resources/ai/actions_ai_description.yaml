Enrich Storage:
  ai_description: >-
    ### General Description

    Retrieves detailed volume and storage information for a specific agent and system
    from the NetApp Ransomware Resilience Service (RRS). This action is used to gather
    context about the storage environment during an investigation, providing metadata
    that can help identify the scope of potential ransomware impact.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Agent ID | String | Yes | The unique identifier for the Console Agent associated
    with the storage system. |

    | System ID | String | Yes | The unique identifier for the Storage System to be
    enriched. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the mandatory `Agent ID` and
    `System ID` from the input parameters.

    2. **Authentication**: The `ApiManager` initializes and handles OAuth2 authentication
    with the NetApp BlueXP service to obtain a valid bearer token.

    3. **Data Retrieval**: The action performs a GET request to the RRS enrichment
    endpoint (`enrich/storage`) using the provided IDs as query parameters.

    4. **Result Processing**: The retrieved storage metadata is parsed and attached
    to the action's output as a JSON result for use in subsequent playbook logic.


    ### Additional Notes

    This action does not operate on SecOps entities (like IP or Hostname). It requires
    specific identifiers provided directly as action parameters. If the API call fails,
    the action will return a failed status and an empty result list.
