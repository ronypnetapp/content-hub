Volume Offline:
  ai_description: >-
    ### General Description

    The **Volume Offline** action is designed to programmatically take a specific
    storage volume offline within the NetApp Ransomware Resilience Service (RRS).
    This is a remediation action typically used to isolate potentially compromised
    storage volumes to prevent the spread of ransomware or further data exfiltration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Volume ID** | String | Yes | The unique identifier of the storage volume to
    be taken offline. |

    | **Agent ID** | String | Yes | The Console Agent ID associated with the NetApp
    environment. |

    | **System ID** | String | Yes | The identifier of the storage system where the
    volume is located. |


    ### Flow Description

    1. **Authentication**: The action initializes the `ApiManager`, which manages
    OAuth2 token generation and encrypted storage for communication with the NetApp
    BlueXP API.

    2. **Input Retrieval**: The action extracts the `Volume ID`, `Agent ID`, and `System
    ID` from the action parameters.

    3. **External Request**: It performs a POST request to the NetApp RRS endpoint
    (`storage/take-volume-offline`) using the extracted identifiers.

    4. **Outcome Handling**: If the request is successful, the action returns a success
    message and the raw JSON response. If the API returns an error or a connection
    issue occurs, it catches the exception, logs the error, and marks the action as
    failed.


    ### Additional Notes

    This action does not automatically process entities from the Google SecOps case.
    It relies entirely on the provided parameter inputs, which must be mapped from
    alert data or previous playbook steps.
