Take Snapshot:
  ai_description: >-
    ### General Description

    Triggers the creation of a volume snapshot using the NetApp Ransomware Resilience
    Service (RRS). This action is designed to create a point-in-time recovery point
    for a specific storage volume, serving as a critical defensive measure in ransomware
    mitigation and data protection workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Volume ID | String | Yes | The unique identifier of the volume for which the
    snapshot will be created. |

    | Agent ID | String | Yes | The console agent ID associated with the NetApp storage
    environment. |

    | System ID | String | Yes | The identifier of the storage system where the target
    volume resides. |


    ### Flow Description

    1. **Initialization**: The action initializes the `ApiManager`, which handles
    OAuth2 authentication and token management for the NetApp RRS API.

    2. **Parameter Extraction**: It retrieves the `Volume ID`, `Agent ID`, and `System
    ID` from the action input parameters.

    3. **API Execution**: The action sends a POST request to the `storage/take-snapshot`
    endpoint of the Ransomware Resilience Service.

    4. **Result Processing**: It captures the API response, which typically includes
    job or snapshot details, and attaches it as a JSON result to the action.

    5. **Completion**: The action reports a successful status if the snapshot creation
    was triggered or a failure status if an API or connection error occurred.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
