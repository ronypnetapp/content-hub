Enrich IP Address:
  ai_description: >-
    ### General Description

    Enriches a specific IP address with threat intelligence data from the NetApp Ransomware
    Resilience Service (RRS). This action allows users to retrieve contextual information
    about an IP to assist in security investigations and ransomware impact analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | String | Yes | The specific IP address that needs to be enriched
    with threat intelligence data. |


    ### Additional Notes

    This action does not automatically iterate over entities in the Google SecOps
    case. It requires the IP address to be provided explicitly as a parameter, which
    can be mapped from an entity or a previous action's output.


    ### Flow Description

    1. **Initialization**: The action initializes the API manager and handles OAuth2
    authentication with the NetApp service using stored credentials.

    2. **Parameter Extraction**: The target IP address is extracted from the action's
    input parameters.

    3. **External API Call**: The action sends a POST request to the NetApp RRS enrichment
    endpoint (`enrich/ip-address`) containing the IP address.

    4. **Data Processing**: The retrieved threat intelligence data is received from
    the external service.

    5. **Output**: The enrichment data is attached as a JSON result to the action,
    and the action completes with a success message.
