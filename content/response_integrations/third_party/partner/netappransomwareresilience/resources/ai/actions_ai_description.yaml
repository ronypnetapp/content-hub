Check Job Status:
  ai_description: >-
    ### General Description

    The **Check Job Status** action is designed to retrieve the current status of
    an asynchronous task previously initiated within the NetApp Ransomware Resilience
    Service (RRS). This action is essential for workflows that involve long-running
    operations, such as volume snapshots or taking volumes offline, allowing the SOAR
    platform to poll for completion before proceeding to subsequent steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Source** | String | Yes | The identifier for the source system (e.g., "rps-agent").
    |

    | **Agent ID** | String | Yes | The unique identifier for the Console Agent associated
    with the job. |

    | **Job ID** | String | Yes | The specific identifier of the job whose status
    is being queried. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Source`, `Agent ID`, and
    `Job ID` from the user-provided inputs.

    2. **Authentication:** It utilizes the `ApiManager` to ensure a valid OAuth2 token
    is available for communication with the NetApp BlueXP API.

    3. **API Request:** A GET request is dispatched to the RRS job status endpoint,
    passing the provided identifiers as query parameters.

    4. **Result Processing:** The API response, containing the job's current state
    and details, is captured and attached to the action's JSON result.

    5. **Completion:** The action concludes by reporting whether the status retrieval
    was successful.


    ### Additional Notes

    * This action does not operate on SOAR entities; it relies entirely on the provided
    input parameters.

    * It is a read-only operation and does not modify any data in the NetApp environment.
  capabilities:
