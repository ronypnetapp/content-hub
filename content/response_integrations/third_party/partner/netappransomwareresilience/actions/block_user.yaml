name: Block User
description: Block user from accessing resources protected by Ransomware Resilience
integration_identifier: netapp-ransomware-resilience
parameters:
-   name: User ID
    default_value: ''
    type: string
    description: ID of user
    is_mandatory: true
-   name: User IPs
    default_value: ''
    type: string
    description: Client IPs to block as comma-separated string (required for NFS; optional for CIFS)
    is_mandatory: false
-   name: Duration
    default_value: ''
    type: ddl
    description: Block duration - permanent or hours
    is_mandatory: false
    optional_values:
    - permanent
    - '1'
    - '2'
    - '4'
    - '8'
    - '12'
    - '24'
dynamic_results_metadata:
-   result_example_path: resources/block_user_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: 5c86e1e4-dd8c-4181-8fc9-f5e8f008caae
script_result_name: ScriptResult
