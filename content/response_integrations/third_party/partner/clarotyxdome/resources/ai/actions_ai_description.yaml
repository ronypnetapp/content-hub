AddVulnerabilities:
  ai_description: "### General Description\nEnriches entities with vulnerability information\
    \ retrieved from Claroty xDome. This action maps Google SecOps entities (such\
    \ as IP addresses, MAC addresses, or specific xDome UIDs) to devices managed within\
    \ the xDome platform. Once a device is identified, the action fetches all associated\
    \ vulnerability relations, including CVE IDs, risk scores, and remediation recommendations,\
    \ and attaches this data to the entity within the case.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | xdomeHost | string | Yes | The base URL for the Claroty xDome instance (e.g.,\
    \ `https://example.xdome.claroty.com`). |\n| xdomeApiToken | string | Yes | The\
    \ API token used for authenticating requests to the Claroty xDome API. |\n| Verify\
    \ SSL | boolean | No | If set to `true`, the action validates the SSL certificate\
    \ of the xDome host. Defaults to `true`. |\n\n### Additional Notes\n- The action\
    \ identifies devices by checking if the entity identifier matches an IP address\
    \ (IPv4/IPv6) or a MAC address pattern. \n- If the identifier is a string of 32-40\
    \ hexadecimal characters/hyphens, it is treated directly as an xDome Device UID.\n\
    - The action updates the `is_vulnerable` property of the entity based on whether\
    \ any vulnerabilities are found.\n\n### Flow Description\n1. **Configuration Extraction**:\
    \ Retrieves the xDome host, API token, and SSL verification settings.\n2. **Entity\
    \ Identification**: Iterates through all target entities in the case. For each\
    \ entity, it determines if the identifier is a UID, an IP, or a MAC address.\n\
    3. **Device Lookup**: If the identifier is not a UID, the action queries the xDome\
    \ `/api/v1/devices/` endpoint to find the corresponding device UID.\n4. **Vulnerability\
    \ Retrieval**: Uses the device UID to query the `/api/v1/device_vulnerability_relations/`\
    \ endpoint to fetch detailed vulnerability data.\n5. **Internal Enrichment**:\
    \ Updates the entity's `additional_properties` with the vulnerability list, count,\
    \ and device UID. It also sets the `is_enriched` flag to `true`.\n6. **Entity\
    \ Update**: Commits the enriched data back to the Google SecOps case for all successfully\
    \ processed entities."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with vulnerability data and sets the is_enriched
      flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - ALERT
    - APPLICATION
    - CHILDHASH
    - CHILDPROCESS
    - CLUSTER
    - CONTAINER
    - CREDITCARD
    - CVE
    - CVEID
    - DATABASE
    - DEPLOYMENT
    - DESTINATIONDOMAIN
    - DOMAIN
    - EMAILSUBJECT
    - EVENT
    - FILEHASH
    - FILENAME
    - GENERICENTITY
    - HOSTNAME
    - IPSET
    - MacAddress
    - PARENTHASH
    - PARENTPROCESS
    - PHONENUMBER
    - POD
    - PROCESS
    - SERVICE
    - SOURCEDOMAIN
    - THREATACTOR
    - THREATCAMPAIGN
    - THREATSIGNATURE
    - DestinationURL
    - USB
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
