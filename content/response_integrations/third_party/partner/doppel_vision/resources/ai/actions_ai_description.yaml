Get Alert:
  ai_description: >-
    ### General Description

    The **Get Alert** action retrieves comprehensive details for a specific alert
    from the DoppelVision platform. It allows users to query alert information using
    either a specific Alert ID or an associated entity (typically a URL). This action
    is primarily used to gather context about existing alerts for further investigation
    or automated decision-making within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity** | String | No | The entity (e.g., a URL) for which to fetch the alert
    details. |

    | **Alert_ID** | String | No | The unique identifier of the alert on the Doppel
    Tenant. |


    ### Additional Notes

    - **Mutual Exclusivity:** Either the `Entity` or the `Alert_ID` parameter must
    be provided for the action to run. However, providing both simultaneously will
    cause the action to fail.

    - This action is a read-only operation and does not change the state of the alert
    in DoppelVision.


    ### Flow Description

    1. **Initialization:** The action extracts the integration configuration (API
    Key, User API Key, and Organization Code) and the action parameters (`Entity`
    and `Alert_ID`).

    2. **Validation:** It verifies that exactly one of the two parameters (`Entity`
    or `Alert_ID`) is populated.

    3. **Data Retrieval:** The `DoppelManager` performs a GET request to the Doppel
    API's `/alert` endpoint using the provided identifier as a query parameter.

    4. **Output:** If the alert is successfully retrieved, the raw JSON data is added
    to the action's results. If the alert is not found or the API returns an error,
    the action fails with a descriptive message.
