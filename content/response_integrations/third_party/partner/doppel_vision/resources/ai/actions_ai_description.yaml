Create Abuse Alert:
  ai_description: >-
    ### General Description


    The **Create Abuse Alert** action allows users to programmatically report a specific
    entity (typically a URL) to the DoppelVision abuse box. This is useful for flagging
    malicious content or suspicious domains discovered during an investigation so
    that Doppel's system can process them. Note that the action will fail if the entity
    is invalid or belongs to a protected list (e.g., google.com).


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity** | String | Yes | The specific value (e.g., a URL) to be reported
    to the abuse box. |


    ### Flow Description


    1. **Parameter Extraction**: Retrieves the API Key, User API Key, and Organization
    Code from the integration configuration, and the target entity from the action
    parameters.

    2. **API Interaction**: Uses the `DoppelManager` to send a POST request to the
    `/alert/abuse` endpoint of the Doppel API.

    3. **Result Processing**: If the request is successful, the resulting alert data
    is stored as a JSON result in the SOAR.

    4. **Completion**: The action completes with a success message or logs an error
    if the creation fails (e.g., due to a protected entity).


    ### Additional Notes


    This action does not run on entities automatically; it requires the user to provide
    the entity value as a string parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new abuse alert in the DoppelVision system.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
