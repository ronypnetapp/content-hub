Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the DoppelVision platform. Its primary purpose is to validate
    that the provided credentials (API Key, User API Key, and Organization Code) are
    correct and that the DoppelVision API endpoint is reachable.


    ### Parameters Description

    There are no action-specific parameters for this task. It relies entirely on the
    integration's configuration parameters:

    * **API Key**: The primary authentication token for the DoppelVision API (Mandatory).

    * **User API Key**: An optional key for user-specific authentication.

    * **Organization Code**: An optional code used for multi-tenant or specific organizational
    routing.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting communication issues. It does not process any entities or modify
    any data within Google SecOps or DoppelVision.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Key, User API Key,
    and Organization Code from the integration settings.

    2. **Manager Initialization**: It initializes the `DoppelManager` with the extracted
    credentials.

    3. **Connectivity Test**: The action calls the `connection_test` method, which
    performs a `GET` request to the `/alerts` endpoint of the DoppelVision API.

    4. **Result Reporting**: If the API responds with a success status code, the action
    ends with a 'Connection successful' message. If the request fails or the credentials
    are invalid, it reports a connection failure.
