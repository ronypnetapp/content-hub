Get Alerts:
  ai_description: >-
    ### General Description

    The **Get Alerts** action retrieves a list of alerts from the Doppel platform
    based on various filtering criteria. It is designed to fetch alert data for ingestion,
    auditing, or further processing within a playbook. The action supports filtering
    by product category, creation timestamps, queue status, and specific search keys.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Search Key | String | No | Filters alerts by a specific identifier, currently
    supporting search by URL. |

    | Product | DDL | No | Filters alerts by product category (e.g., domains, social_media,
    mobile_apps, ecommerce, crypto, emails, paid_adds). |

    | Created Before | String | No | Filters for alerts created before a specific
    date and time (ISO8601 format, e.g., '2024-01-05T13:45:30'). |

    | Created After | String | No | Filters for alerts created after a specific date
    and time (ISO8601 format, e.g., '2024-01-05T13:45:30'). |

    | Sort Type | DDL | No | Specifies the field to sort the reports by. Defaults
    to 'date_sourced'. Options: date_sourced, date_last_actioned. |

    | Sort Order | DDL | No | Specifies the sorting order. Defaults to 'desc'. Options:
    asc, desc. |

    | Page | String | No | Specifies the page number for paginated results; defaults
    to 0. |

    | Queue State | DDL | No | Filters alerts by their current queue status (e.g.,
    doppel_review, actioned, taken_down). |

    | Tags | String | No | A comma-separated list of tags used to filter the alerts.
    |


    ### Additional Notes

    - If no parameters are provided, the action attempts to fetch all available alerts
    for the configured tenant.

    - The 'Tags' parameter is parsed from a comma-separated string into a list for
    the API request.


    ### Flow Description

    1. **Credential Extraction**: Retrieves the API Key, User API Key, and Organization
    Code from the integration configuration.

    2. **Parameter Collection**: Extracts user-provided filters including search keys,
    product categories, date ranges, and sorting preferences.

    3. **Filter Construction**: Builds a filter dictionary, removing any null values
    and splitting the 'Tags' string into a list.

    4. **API Execution**: Initializes the DoppelManager and calls the `get_alerts`
    method, which performs a GET request to the Doppel API.

    5. **Result Handling**: If alerts are found, they are stored in the action's JSON
    result. If no alerts are returned, the action fails with an error message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
