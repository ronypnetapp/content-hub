Create Alert:
  ai_description: >-
    ### General Description

    Creates a new alert within the Doppel system for a specified entity. This action
    is used to programmatically flag entities (such as URLs) for monitoring or investigation
    within the Doppel platform. It interacts with the Doppel API to register the entity
    and returns the resulting alert details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity | String | Yes | The specific entity identifier (e.g., a URL) for which
    the alert should be created in the Doppel system. |


    ### Flow Description

    1. **Credential Retrieval:** The action extracts the API Key, User API Key, and
    Organization Code from the integration configuration.

    2. **Input Extraction:** The action retrieves the 'Entity' string provided by
    the user.

    3. **API Interaction:** The `DoppelManager` sends a POST request to the `/alert`
    endpoint of the Doppel API with the entity data.

    4. **Response Processing:** If the request is successful, the JSON response from
    Doppel is attached to the action results. If the request fails or the entity is
    invalid/protected, the action reports a failure.


    ### Additional Notes

    This action does not operate on Google SecOps entities directly; it uses a manual
    string input. The action will fail if the entity is already protected or deemed
    invalid by Doppel's internal logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new alert record in the Doppel external system via a POST request
      to the /alert endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
