Update Alert:
  ai_description: >-
    ### General Description

    Updates the status and state of an alert within the DoppelVision platform. This
    action allows analysts to modify the lifecycle stage of an alert (Queue State)
    and the operational status of the associated entity (Entity State). It is primarily
    used for remediation and alert management workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert_ID** | string | No | The unique identifier for the specific alert in
    the Doppel tenant. Either this or 'Entity' must be provided. |

    | **Entity** | string | No | The entity (typically a URL) associated with the
    alert. Either this or 'Alert_ID' must be provided. |

    | **Queue_State** | ddl | Yes | The target queue state for the alert. Options
    include: `doppel_review`, `needs_confirmation`, `monitoring`, `taken_down`, `actioned`,
    `archived`. |

    | **Entity_State** | ddl | Yes | The target state for the entity. Options include:
    `active`, `down`, `parked`. |


    ### Additional Notes

    * **Validation Logic:** The action requires exactly one identifier. You must provide
    either the `Alert_ID` or the `Entity`. Providing both or neither will cause the
    action to fail.

    * **Side Effects:** This action performs a `PUT` request to the Doppel API, resulting
    in a state change in the external system.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves API credentials from the integration configuration
    and user-provided parameters from the action input.

    2. **Validation:** Checks that exactly one of `Alert_ID` or `Entity` is populated.

    3. **API Interaction:** Executes a `PUT` request to the DoppelVision `/alert`
    endpoint with the specified states and identifier.

    4. **Result Processing:** Captures the updated alert object from the response
    and attaches it as a JSON result to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'queue_state' and 'entity_state' of an alert in the DoppelVision
      platform via a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
