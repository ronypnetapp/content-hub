title: IPInfo - Get IP Information
type: html
scope: alert
action_identifier: Get IP Information
description: This widget highlights the most important items in Get IP Information
data_definition:
    html_height: 400
    safe_rendering: false
    widget_definition_scope: both
    type: html
condition_group:
    conditions:
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: '['
        match_type: starts_with
        custom_operator_name: null
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: '{'
        match_type: contains
        custom_operator_name: null
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: Entity
        match_type: contains
        custom_operator_name: null
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: EntityResult
        match_type: contains
        custom_operator_name: null
    logical_operator: and
default_size: half_width
