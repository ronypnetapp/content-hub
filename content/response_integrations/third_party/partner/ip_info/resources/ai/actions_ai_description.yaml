Get Domain Information:
  ai_description: "### General Description\nEnriches Hostname entities by fetching\
    \ domain-specific information from the IPInfo service. This action retrieves data\
    \ such as associated IP addresses, IP ranges, ASN details, and a list of related\
    \ domains. The retrieved information is used to populate entity properties and\
    \ provide a structured data table for analysts within the Google SecOps platform.\n\
    \n### Parameters Description\nThere are no parameters for this action.\n\n###\
    \ Additional Notes\n* The action automatically extracts the base domain from the\
    \ hostname identifier before querying the IPInfo API.\n* Entities are marked as\
    \ enriched upon successful data retrieval.\n\n### Flow Description\n1. **Filter\
    \ Entities**: The action identifies all `HOSTNAME` entities within the current\
    \ context.\n2. **Domain Extraction**: For each hostname, it extracts the root\
    \ domain using a utility function.\n3. **API Query**: It calls the IPInfo API's\
    \ `/domains` endpoint to retrieve metadata for the extracted domain.\n4. **Data\
    \ Processing**: The resulting JSON data is flattened and prefixed with 'IPInfo'.\n\
    5. **Internal Enrichment**: \n    * Updates the entity's `additional_properties`\
    \ with the flattened data.\n    * Sets the `is_enriched` flag to `True`.\n   \
    \ * Attaches a CSV-formatted data table to the entity in the SecOps UI.\n6. **Finalization**:\
    \ Updates all successfully enriched entities in the system and returns a summary\
    \ message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with domain metadata, sets the enriched
      flag, and adds a data table to the entity.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get IP Information:
  ai_description: >-
    ### General Description

    Enriches IP Address entities with detailed geolocation and network information
    using the IPInfo service. This action retrieves data such as city, region, country,
    ASN, and carrier details to provide context for security investigations.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (API Root, Token, and Verify SSL).


    ### Flow Description

    1. **Initialization**: The action initializes the IPInfo manager using the provided
    API Root and Token from the integration configuration.

    2. **Entity Filtering**: It identifies all entities of type `ADDRESS` within the
    current scope.

    3. **Data Retrieval**: For each identified IP address, the action sends a GET
    request to the IPInfo API.

    4. **Data Processing**: The retrieved JSON response is flattened and prefixed
    with 'IPInfo'.

    5. **Internal Updates**: The action updates the entity's additional properties,
    marks the entity as enriched, and attaches a CSV-formatted data table to the entity.

    6. **Finalization**: All successfully enriched entities are updated in Google
    SecOps, and a summary message is returned.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enriched IP information and adds data
      tables to the entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Verifies the connectivity and API token validity for the IPInfo integration. This
    action is used to ensure that the Google SecOps platform can successfully communicate
    with the IPInfo service using the provided credentials.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the integration's
    global configuration (API Root, Token, and Verify SSL).


    ### Additional Notes

    This action does not process any entities and is strictly for connectivity testing.
    It is a standard 'Ping' action used to validate integration health.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root, Token, and
    SSL verification settings from the integration's global configuration.

    2. **Manager Initialization**: Initializes the IPInfoManager with the retrieved
    settings.

    3. **Connectivity Test**: Executes a GET request to the IPInfo API using a hardcoded
    test IP address (8.8.8.8) to verify the token validity and network path.

    4. **Validation**: Validates the HTTP response status and content to ensure the
    request was successful and the token is authorized.

    5. **Completion**: Returns a success message 'Connection Established.' if the
    connection is verified.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
