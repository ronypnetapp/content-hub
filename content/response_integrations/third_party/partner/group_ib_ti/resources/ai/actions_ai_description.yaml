Get-TI-Search-Info-By-Collection:
  ai_description: >-
    ### General Description

    The **Get-TI-Search-Info-By-Collection** action searches the Group-IB Threat Intelligence
    (TI) database for specific indicators across a wide range of collections. It allows
    users to query for data related to Domains, IP Addresses, URLs, File Hashes, Bank
    Cards, and Emails. The action is highly configurable, allowing users to target
    specific collections and optionally apply a mapping parser to structure the raw
    API response into a more readable format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Collection** | DDL | Yes | Specifies the Group-IB TI collection to search.
    Options include `apt/threat`, `malware/cnc`, `compromised/account_group`, and
    many others. |

    | **Enable mapping parser** | Boolean | No | If set to `true`, the action transforms
    the raw API data into a structured JSON format based on internal mapping keys.
    If `false`, it returns the raw items from the API. Default is `false`. |

    | **Search tag** | String | No | An optional tag used to prefix the search query
    (e.g., `domain:google.com`). If provided, the query is formatted as `tag:identifier`.
    If omitted, the raw entity identifier is used. |


    ### Flow Description

    1.  **Initialization:** The action initializes the Group-IB TI connector and retrieves
    user-defined parameters including the target collection and search preferences.

    2.  **Entity Processing:** It iterates through all entities in the current scope.
    For each entity, it validates the identifier to determine if it matches supported
    formats (IP, Domain, Hash, etc.).

    3.  **Query Construction:** A search query is built for each valid entity. If
    a `Search tag` is specified, it is prepended to the entity identifier; otherwise,
    the identifier is used as the standalone query.

    4.  **Data Retrieval:** The action queries the Group-IB TI API for the selected
    collection. It uses a generator to handle data retrieval, supporting up to 3,000
    items per query.

    5.  **Parsing and Aggregation:** Based on the `Enable mapping parser` setting,
    the retrieved data is either parsed into a structured format or kept as raw JSON.
    All results are aggregated into a single result object.

    6.  **Completion:** The final aggregated JSON is attached to the action result,
    and the task is marked as completed.


    ### Additional Notes

    *   The action includes built-in rate-limiting protection by implementing a 1-second
    delay between API requests.

    *   While the `Enable mapping parser` parameter is a boolean, the underlying logic
    expects string comparisons ("true"/"false"), which is handled automatically by
    the integration's parameter extraction logic.
