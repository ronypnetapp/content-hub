Get-Graph-Info:
  ai_description: >-
    ### General Description

    The **Get-Graph-Info** action retrieves relational intelligence and infrastructure
    data (often associated with WHOIS information) from the Group-IB Threat Intelligence
    (TI) platform. It is specifically designed to provide context for network-based
    entities by querying Group-IB's graph utility endpoints.


    ### Parameters

    This action does not have any user-configurable parameters. It automatically processes
    supported entities found in the current alert or case context.


    ### Flow Description

    1. **Initialization**: The action initializes the Group-IB TI poller using the
    integration's global configuration (API Login, API Key, and API URL).

    2. **Entity Gathering**: It retrieves the list of target entities from the current
    Google SecOps context.

    3. **Type Validation**: The action uses an internal validator to identify the
    type of each entity. It explicitly filters the list to only include entities identified
    as **IP Addresses** or **Domains**.

    4. **API Interaction**: For each valid entity, it sends a GET request to the Group-IB
    TI `utils/graph` endpoint (e.g., `utils/graph/ip` or `utils/graph/domain`).

    5. **Rate Limiting**: The script pauses for 1 second between entity requests to
    respect external API rate limits.

    6. **Data Output**: The raw JSON responses from the API are aggregated and added
    to the action's result JSON, making the data available for subsequent playbook
    logic.


    ### Additional Notes

    - This action is a data-retrieval task. It does not automatically update entity
    fields, add insights, or create case comments. The output is provided as a raw
    JSON result for use in playbooks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
