Get-TI-Search-Info:
  ai_description: "### General Description\nThe **Get-TI-Search-Info** action allows\
    \ users to search for specific entities\u2014including Domains, IP Addresses,\
    \ File Hashes, Bank Cards, and Emails\u2014within the Group-IB Threat Intelligence\
    \ (TI) database. This action is designed to provide deep contextual enrichment\
    \ by identifying which threat collections (e.g., APT reports, malware configs,\
    \ compromised accounts) contain information about the target entities and retrieving\
    \ the detailed records associated with them.\n\n### Parameters Description\n|\
    \ Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Enable mapping parser | Boolean | No | If set to `true`, the action will use\
    \ predefined mapping keys to structure the JSON output into a more readable format.\
    \ If `false` (default), the action returns the raw data as provided by the Group-IB\
    \ API. |\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the Group-IB TI connector and poller using the integration's configuration (API\
    \ Key, Login, and URL).\n2. **Entity Identification**: It iterates through the\
    \ target entities in the current context and uses an internal validator to determine\
    \ their type (e.g., IP, Domain, Hash, Email, or Credit Card).\n3. **Global Search**:\
    \ For each valid entity, the action performs a global search across the Group-IB\
    \ TI database to identify all relevant data collections (API paths) that contain\
    \ matches.\n4. **Data Retrieval**: For every identified collection, the action\
    \ executes a specific query to fetch detailed records, limited to a maximum of\
    \ 3,000 items per collection.\n5. **Data Processing**: The retrieved records are\
    \ either parsed using a mapping configuration (if enabled) or kept in their raw\
    \ format.\n6. **Result Aggregation**: All findings are aggregated into a single\
    \ JSON object and attached to the action's execution results for use in subsequent\
    \ playbook steps."
