Get-Collection-Info-Async:
  ai_description: "### General Description\nThis action retrieves threat intelligence\
    \ data from specific Group-IB TI collections. It is designed for periodic data\
    \ extraction (e.g., daily updates) by tracking sequence numbers to ensure only\
    \ new data is ingested. It operates independently of case entities, acting as\
    \ a data retrieval utility for the Group-IB TI portal.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Collection | DDL | Yes | The specific Group-IB TI collection to download data\
    \ from (e.g., `apt/threat`, `malware/cnc`, `ioc/common`). |\n| Portion limit |\
    \ DDL | Yes | Controls the number of data portions (batches) received from the\
    \ TI Portal API in a single run. |\n| Enable mapping parser | Boolean | No | If\
    \ set to `true`, the action parses the JSON output using predefined Group-IB mapping\
    \ keys. If `false`, it returns raw data. |\n| Start date | String | No | The start\
    \ date (YYYY-MM-DD) for data download if no previous sequence timestamp is found\
    \ in the system. Defaults to 1 day ago if left empty. |\n\n### Additional Notes\n\
    - This action is asynchronous and ignores any entities present in the case; it\
    \ uses the execution trigger to start the collection download.\n- It utilizes\
    \ sequence tracking (via `fetch_timestamp`) to maintain state between runs, allowing\
    \ for incremental updates.\n\n### Flow Description\n1. **Initialization**: The\
    \ action initializes the Group-IB TI connector and retrieves user-defined parameters\
    \ including the collection name, portion limits, and parsing preferences.\n2.\
    \ **Sequence Tracking**: It attempts to fetch a stored timestamp (sequence update\
    \ number) from the environment. If found, it resumes data collection from that\
    \ specific sequence. \n3. **Fallback Logic**: If no sequence number is stored,\
    \ it calculates a starting point based on the provided 'Start date' or defaults\
    \ to 24 hours prior to the current time.\n4. **Data Retrieval**: It establishes\
    \ a connection to the Group-IB TI API and creates a generator to fetch data portions\
    \ for the selected collection, respecting the 'Portion limit'.\n5. **Processing\
    \ & Parsing**: For each retrieved portion, the action either applies a mapping\
    \ parser to structure the data into a standardized format or extracts the raw\
    \ items based on the 'Enable mapping parser' configuration.\n6. **Aggregation**:\
    \ The action aggregates all retrieved portions into a single result set, adds\
    \ it to the action's JSON output, and completes the execution."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
