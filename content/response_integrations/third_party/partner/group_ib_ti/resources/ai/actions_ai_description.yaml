Ping:
  ai_description: "### General Description\nThe **Ping** action is designed to verify\
    \ the connectivity between Google SecOps and the Group-IB Threat Intelligence\
    \ (TI) platform. Beyond a simple heartbeat check, it retrieves a list of all data\
    \ collections available to the user based on their current subscription level,\
    \ providing visibility into accessible threat feeds.\n\n### Parameters Description\n\
    | Parameter Name | Description | Type | Mandatory | Notes |\n| :--- | :--- | :---\
    \ | :--- | :--- |\n| None | This action does not require any input parameters.\
    \ | N/A | N/A | N/A |\n\n### Additional Notes\n- This action relies on the integration's\
    \ global configuration (API Login, API Key, and API URL) to authenticate.\n- The\
    \ output includes a JSON object listing the 'granted_collections' which helps\
    \ administrators verify which threat feeds are active.\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the Siemplify environment and sets\
    \ the script name.\n2. **Connector Setup**: It retrieves the global configuration\
    \ credentials (API Login, API Key, API URL) and initializes the `GIBConnector`\
    \ and `PlaybookAdapter`.\n3. **API Request**: The action sends a GET request to\
    \ the `user/granted_collections` endpoint of the Group-IB TI API.\n4. **Result\
    \ Processing**: \n    - If successful, the list of collections is added to the\
    \ action's JSON results, and a 'Connection Established' message is returned.\n\
    \    - If the request fails (e.g., due to authentication or network issues), an\
    \ error message is logged, and the action status is set to failed.\n5. **Termination**:\
    \ The action concludes by reporting the connectivity status and the retrieved\
    \ collection data to the SOAR workbench."
  capabilities:
    can_create_case_comments: false
