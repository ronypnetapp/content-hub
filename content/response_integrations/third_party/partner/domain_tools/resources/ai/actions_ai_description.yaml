    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the 'additional_properties' of the processed entities with
      the retrieved hosting history data and attaches a CSV-formatted table to the
      entity in the Google SecOps UI.
