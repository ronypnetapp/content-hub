Reverse Domain:
  ai_description: >-
    ### General Description

    Finds IP addresses that point to a specific domain or identifies domains associated
    with a given IP address using DomainTools. This action is primarily used for reverse
    DNS enrichment, allowing security analysts to understand the infrastructure associated
    with a hostname, URL, or domain entity.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (Username, API Token, and Verify SSL).


    ### Additional Notes

    *   The action supports `HOSTNAME`, `URL`, and `DOMAIN` entity types.

    *   It automatically extracts the domain from URLs or email-like strings before
    querying the API.

    *   If the input is identified as a valid IPv4 address, it performs a 'Host Domains'
    lookup; otherwise, it performs a 'Reverse IP' lookup.


    ### Flow Description

    1.  **Entity Filtering:** The action identifies all entities in the current scope
    that match the supported types (`URL`, `HOSTNAME`, `DOMAIN`).

    2.  **Domain Extraction:** For each entity, it extracts the base domain from the
    identifier (e.g., stripping 'www' or URL paths).

    3.  **API Query:** It calls the DomainTools `enrich_domain` method, which dynamically
    chooses between `host_domains` (for IPs) or `reverse_ip` (for domains) based on
    the input format.

    4.  **Internal Enrichment:** If results are found, the action:
        *   Flattens the API response and adds it to the entity's `additional_properties`
    with a `DT` prefix.
        *   Generates a CSV-formatted table of the results and attaches it to the
    entity in the case wall.
    5.  **Platform Update:** Updates the entities within Google SecOps to persist
    the new metadata.

    6.  **Final Output:** Returns a JSON object containing the full enrichment data
    for all processed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with DomainTools reverse DNS data and adds
      data tables to the entity's context in the case.
  categories:
    enrichment: true
  entity_usage:
