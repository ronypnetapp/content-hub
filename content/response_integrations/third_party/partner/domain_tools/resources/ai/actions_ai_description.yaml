Get Domain Profile:
  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and URL entities using DomainTools threat intelligence.
    This action retrieves the "Domain Profile" for a given domain, providing comprehensive
    details such as registration information, hosting history summaries, and risk
    indicators. It is designed to provide security analysts with immediate context
    regarding the reputation and ownership of external domains.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the integration configuration. |


    ### Additional Notes

    *   **License Requirement**: The action requires the "domain-profile" product
    to be active on the DomainTools account license.

    *   **Domain Extraction**: It automatically extracts the root domain from URLs
    and email addresses (e.g., extracting "example.com" from "www.example.com" or
    "user@example.com").

    *   **Data Prefixing**: Enrichment data is added to the entity's additional properties
    with a "DT" prefix to avoid naming collisions.


    ### Flow Description

    1. **Domain Extraction**: The action parses the entity identifier to extract the
    root domain name.

    2. **API Interaction**: It queries the DomainTools `domain_profile` endpoint using
    the extracted domain.

    3. **Data Transformation**: The JSON response is flattened and converted into
    a CSV format for UI presentation.

    4. **Internal Enrichment**:
        *   Updates the entity's `additional_properties` with the flattened profile
    data.
        *   Marks the entity as `is_enriched`.
        *   Attaches a CSV data table containing the profile details to the entity
    in the Google SecOps SOAR interface.
    5. **Finalization**: The action updates all processed entities in the case and
    returns the raw JSON results for downstream playbook logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with DomainTools profile data, sets the
      enriched status, and adds a CSV data table to the entity.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DOMAIN
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Domain Risk:
  ai_description: >-
    Enriches Domain, Hostname, and URL entities with risk scores and detailed risk
    profiles using DomainTools data. The action retrieves threat intelligence from
    DomainTools' risk and reputation endpoints to evaluate the potential threat level
    of a domain.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | String | Yes | A numeric value (e.g., 3) used as a cutoff. If the
    domain's risk score exceeds this value, the entity is marked as suspicious in
    Google SecOps. |


    ### Flow Description

    1. **Domain Extraction:** Parses the entity identifier (URL, Hostname, or Domain)
    to extract the base domain name.

    2. **Data Retrieval:** Queries the DomainTools API (Risk and Reputation products)
    to fetch the domain's risk score and component data.

    3. **Risk Evaluation:** Compares the retrieved risk score against the user-provided
    `Threshold` parameter.

    4. **Entity Enrichment:** Updates the entity's additional properties with the
    risk score (`DT_Risk`).

    5. **Suspicious Marking:** If the risk score is higher than the threshold, the
    entity's `is_suspicious` attribute is set to `True`.

    6. **Result Reporting:** Returns a JSON result containing the detailed risk profile
    and updates the case with the enrichment data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes by adding the 'DT_Risk' property and modifies the
      'is_suspicious' status of the entity if the risk score exceeds the defined threshold.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    - DOMAIN
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
