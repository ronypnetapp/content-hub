Recent Domains:
  ai_description: >-
    ### General Description

    This action searches for newly registered domains that contain a specific keyword
    using the DomainTools Phisheye service. It is designed to help security teams
    identify potential phishing or brand-impersonation domains shortly after they
    are registered. **Note:** This action is deprecated as the Phisheye product has
    been deprecated by DomainTools.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String Query | String | Yes | The specific word or string to search for within
    newly registered domain names. |


    ### Additional Notes

    - This action does not operate on entities within a case; it relies solely on
    the manual input provided in the `String Query` parameter.

    - Because the underlying Phisheye service is deprecated, this action may not return
    results or may fail depending on the current state of the DomainTools API.


    ### Flow Description

    1. **Initialization**: The action initializes the DomainTools manager using the
    integration's API credentials (Username and API Token).

    2. **Parameter Extraction**: It retrieves the user-provided `String Query` parameter.

    3. **API Query**: The action calls the DomainTools Phisheye API endpoint with
    the provided query string.

    4. **Data Transformation**: If results are returned, the action flattens the JSON
    response and converts it into a CSV-compatible format.

    5. **Reporting**: It creates a data table within the Google SecOps case to display
    the search results and sets the action's result to success.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the Google SecOps case containing the results
      of the domain search.
  categories:
