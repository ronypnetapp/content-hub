Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the DomainTools API. Its primary purpose is to ensure that the
    integration's configuration parameters, such as the Username and API Token, are
    correct and that the network path to the DomainTools service is open.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically executed during the initial setup of the DomainTools
    integration or when troubleshooting communication issues. It performs a 'Read-Only'
    operation by requesting account information from the API.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Username, API Token,
    and SSL verification settings from the DomainTools integration configuration.

    2. **Manager Initialization**: It instantiates the `DomainToolsManager` using
    the provided credentials.

    3. **Connectivity Verification**: Upon initialization, the manager automatically
    executes an API call to the DomainTools `account_information` endpoint to validate
    the credentials and retrieve the list of licensed products.

    4. **Final Status**: If the API call succeeds, the action returns a success message
    ('Connection Established'). If the initialization or API call fails, it indicates
    a connection failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
