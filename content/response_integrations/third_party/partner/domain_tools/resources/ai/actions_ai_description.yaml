Get Hosting History:
  ai_description: >-
    ### General Description

    This action retrieves the hosting history for a domain using the DomainTools API.
    It provides security analysts with historical context regarding where a domain
    has been hosted over time, which is useful for identifying infrastructure changes
    or malicious patterns. The action enriches Hostname and URL entities with this
    data and presents it in a structured CSV table within the Google SecOps UI.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all Hostname and URL entities within
    the current context.

    2. **Domain Extraction**: For each entity, it extracts the base domain name from
    the identifier (e.g., stripping protocols or email prefixes).

    3. **API Query**: It calls the DomainTools 'hosting-history' endpoint to retrieve
    historical records for the extracted domain.

    4. **Data Enrichment**: The retrieved data is flattened and added to the entity's
    'additional_properties' with a 'DT' prefix.

    5. **UI Enhancement**: A CSV-formatted table containing the hosting history is
    attached to the entity via the 'add_entity_table' method for visibility in the
    case wall.
  capabilities:
    can_create_case_comments: false
