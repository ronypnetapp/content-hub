Reverse IP:
  ai_description: >-
    ### General Description

    This action identifies domain names that share a specific IP address using the
    DomainTools Iris API. It is designed to enrich IP Address entities by uncovering
    their hosting relationships, which is critical for infrastructure mapping and
    threat intelligence gathering.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration settings:

    * **Username**: DomainTools API username.

    * **ApiToken**: DomainTools API key.

    * **Verify SSL**: Boolean flag to enable/disable SSL certificate verification.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` (IP) entities in
    the current scope that are not marked as internal.

    2. **API Query**: For each valid entity, the action calls the DomainTools Iris
    API (`get_domains_by_ip`) to retrieve a list of domains associated with that IP.

    3. **Data Processing**: If data is returned, the response is flattened and prefixed
    with 'DT' to avoid naming collisions.

    4. **Internal Enrichment**: The action updates the entity's 'additional_properties'
    with the flattened API data.

    5. **UI Visualization**: A data table containing the domain information is attached
    to the entity in the Google SecOps case view.

    6. **Finalization**: The action updates the entities in the system and returns
    a summary of the enrichment results.
