Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Stairwell API to ensure that the integration can
    successfully communicate with the service. This action is typically used during
    the initial setup or for troubleshooting purposes to verify that the provided
    credentials and API endpoint are valid.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration parameters to perform the connectivity test:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API. |

    | API Key | String | Yes | The API key used for authentication. |

    | Organization ID | String | No | The specific Organization ID associated with
    the account. |

    | User ID | String | No | The specific User ID associated with the account. |


    ### Additional Notes

    This action performs a read-only request to a dummy hostname to verify API access
    and does not process any entities from the current context.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, API Key, Organization
    ID, and User ID from the integration's configuration settings.

    2. **Manager Initialization**: A `StairwellManager` instance is created using
    the extracted configuration and credentials.

    3. **Connectivity Check**: The action executes the `test_connectivity` method,
    which sends a GET request to the Stairwell API for a dummy hostname (`www.google.com`)
    to verify the connection.

    4. **Completion**: If the API responds successfully, the action completes with
    a success status and a 'Connection Established' message. If the request fails
    (e.g., due to invalid credentials or network issues), it catches the exception
    and returns a failure status with the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
