Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using threat intelligence data from Stairwell. This
    action retrieves comprehensive file metadata, including size, entropy, multiple
    hash types (SHA256, SHA1, MD5, Imphash, TLSH), and file magic/MIME types. It also
    evaluates the file's reputation based on Stairwell's malicious probability scores
    and verdicts, updating the entity's status and providing detailed insights for
    security analysts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API instance. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | The specific Organization ID to include in the
    request headers for multi-tenant environments. |

    | User ID | String | No | The specific User ID to include in the request headers
    if required by the API configuration. |


    ### Additional Notes

    - The action specifically targets `FILEHASH` entities.

    - If a file is determined to be suspicious (based on the `MALICIOUS` verdict or
    high malicious probability), an entity insight is automatically generated.

    - Detailed reports are attached to the case as data tables.


    ### Flow Description

    1. **Initialization**: Retrieves connection details (API Root, API Key) and optional
    identifiers (Org ID, User ID) from the integration configuration.

    2. **Entity Filtering**: Identifies all `FILEHASH` entities within the current
    alert context.

    3. **Data Retrieval**: For each hash, it queries the Stairwell API to fetch the
    file's enrichment report.

    4. **Enrichment**: Updates the entity's additional properties with metadata such
    as file size, entropy, and alternative hashes.

    5. **Risk Assessment**: Evaluates the file's verdict. If the file is flagged as
    malicious or has a high malicious probability, the entity is marked as suspicious.

    6. **Insight & Reporting**: Generates a formatted insight for suspicious files
    and attaches a detailed CSV-style data table to the case wall for each processed
    entity.

    7. **Finalization**: Updates the entities in Google SecOps and returns a summary
    of successful and failed enrichments.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties with enrichment data, sets the
      'is_suspicious' and 'is_enriched' flags, creates entity insights, and adds data
      tables to the case wall.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich Hostname:
  ai_description: >-
    ### General Description

    Enriches Hostname entities with threat intelligence data from Stairwell. This
    action retrieves detailed host information, including community opinions, comments,
    and DNS records (A, AAAA, MX), to provide context for security investigations.
    It helps analysts determine the reputation and history of a host within the Stairwell
    platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API instance. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | The specific Stairwell Organization ID to scope
    the request. |

    | User ID | String | No | The specific Stairwell User ID to associate with the
    request. |


    ### Additional Notes

    - The action uses the `OriginalIdentifier` of the entity if available; otherwise,
    it defaults to the standard entity identifier.

    - Enrichment data is prefixed with `SW` in the entity's additional properties.

    - If no Hostname entities are found in the context, the action will complete with
    a 'No entities were enriched' message.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves API credentials and configuration from
    the integration settings.

    2. **Entity Filtering:** Identifies all Hostname entities within the target scope.

    3. **Data Retrieval:** For each hostname, it queries the Stairwell API's enrichment
    endpoint (`/labs/appapi/enrichment/v1/hostname_event/{hostname}`).

    4. **Entity Enrichment:** Updates the entity's additional properties with the
    retrieved data and marks the entity as enriched.

    5. **Risk Assessment:** Evaluates the host's verdict. If the verdict is 'MALICIOUS',
    it marks the entity as suspicious and creates a detailed insight containing the
    verdict.

    6. **Reporting:** Adds a formatted data table to the case wall for each host and
    attaches the raw JSON response to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with enrichment data, sets the suspicious
      flag, creates entity insights for malicious findings, and adds data tables to
      the case wall.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
