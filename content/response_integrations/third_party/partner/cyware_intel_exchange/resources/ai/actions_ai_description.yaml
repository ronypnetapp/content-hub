Mark IOCs False Positive:
  ai_description: >-
    ### General Description

    This action marks multiple Indicators of Compromise (IOCs) as false positives
    within the Cyware Intel Exchange (CTIX) platform. It is used to update the status
    of threat intelligence indicators that have been determined to be non-threatening,
    ensuring that future security analysis is accurate and noise is reduced.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration parameters:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base URL | String | Yes | The base URL of the Cyware CTIX tenant. |

    | Access ID | String | Yes | The Access ID used for API authentication. |

    | Secret Key | String | Yes | The Secret Key used for API authentication. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the CTIX server. Default is False. |


    ### Additional Notes

    * The action first performs a lookup to translate the Google SecOps entity identifiers
    into Cyware-specific internal IDs.

    * Only entities that already exist in the Cyware Intel Exchange platform will
    be processed; any entities not found in CTIX will be skipped.

    * The action performs a bulk update, meaning it processes all valid entities in
    a single API request to the external system.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify (Google SecOps) environment
    and retrieves the integration configuration (Base URL, credentials).

    2. **Entity Retrieval**: It collects all target entities associated with the current
    case.

    3. **IOC Lookup**: The action calls the Cyware API to perform a bulk lookup of
    the entity identifiers to retrieve their corresponding internal Cyware IDs.

    4. **Validation**: It identifies which entities have valid IDs in CTIX and logs
    any entities that are missing from the platform.

    5. **Status Update**: If valid IDs are found, the action sends a request to the
    Cyware bulk action endpoint to mark those specific indicators as 'False Positive'.

    6. **Result Reporting**: The action returns the API response as a JSON object
    and provides a summary message indicating the number of successfully updated indicators.
