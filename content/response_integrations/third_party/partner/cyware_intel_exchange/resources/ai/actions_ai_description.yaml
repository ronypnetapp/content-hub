Create Intel in Cyware Intel Exchange:
  ai_description: >-
    ### General Description

    This action creates new intelligence records (indicators) in Cyware Intel Exchange
    (CTIX) for entities found in the current Google SecOps context. It allows users
    to submit indicators with specific metadata such as TLP, confidence scores, and
    tags, and then monitors the creation process until completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The title for the intelligence record (maximum 100 characters).
    |

    | IOC Type | DDL | Yes | The STIX-compliant type of the indicator (e.g., ipv4-addr,
    domain-name, file). |

    | TLP | DDL | No | The Traffic Light Protocol level (RED, CLEAR, AMBER, AMBER_STRICT,
    NONE, GREEN). Default is NONE. |

    | Metadata Confidence Score | String | No | A source confidence score between
    0 and 100. |

    | Tags | String | No | Comma-separated list of tags to associate with the intelligence.
    |

    | Deprecates After | String | No | The expiration time of the indicator in days
    (maximum 1000 days). |

    | Description | String | No | A detailed description for the intelligence (maximum
    1000 characters). |


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the integration configuration
    (Base URL, Credentials) and the action-specific parameters.

    2. **Entity Collection**: It identifies all target entities associated with the
    current case.

    3. **Validation**: The action validates the lengths of the Title and Description,
    and ensures the Confidence Score and Expiration days are within valid numeric
    ranges.

    4. **Intel Creation**: For each entity, it sends a POST request to the Cyware
    CTIX API to initiate the creation of a STIX-based intelligence record.

    5. **Status Polling**: After initiation, the action enters a polling loop, checking
    the status of the creation task via the Cyware API at regular intervals until
    the record is successfully created, an error occurs, or the maximum number of
    attempts is reached.

    6. **Result Reporting**: Finally, it aggregates the results for all entities and
    provides a summary of successful and failed operations.


    ### Additional Notes

    * The action applies the same `IOC Type` to all entities processed in a single
    run. Ensure that the entities in the context match the selected type.

    * If no entities are found, the action will complete successfully with a message
    indicating no entities were processed.
