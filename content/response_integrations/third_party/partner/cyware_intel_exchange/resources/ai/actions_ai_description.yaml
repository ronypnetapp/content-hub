Add IOCs to Allowed list:
  ai_description: >-
    ### General Description

    The **Add IOCs to Allowed list** action allows users to whitelist specific indicators
    within the Cyware Intel Exchange (CTIX) platform. This is typically used to prevent
    known-safe indicators from triggering alerts or being flagged as malicious in
    future intelligence cycles.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC Type** | DDL | Yes | Specifies the type of the indicators being added
    (e.g., `ipv4-addr`, `domain-name`, `file`). This must match the type of the entities
    being processed. |

    | **Reason** | String | Yes | Provides a justification or context for why these
    indicators are being added to the allowed list. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `IOC Type` and `Reason`
    from the user input.

    2. **Entity Collection**: It identifies all entities currently associated with
    the case context.

    3. **API Interaction**: The action sends a bulk `POST` request to the Cyware `allowed_indicators`
    endpoint, containing the list of entity identifiers, the specified type, and the
    reason.

    4. **Result Processing**: It parses the response from Cyware, which details how
    many indicators were newly created, how many already existed in the list, and
    if any were considered invalid.

    5. **Output**: The action provides a summary message of the operation's success
    and attaches the full JSON response for further review.


    ### Additional Notes

    - This action performs a mutation on the external Cyware system by modifying its
    whitelist configuration.

    - If no entities are found in the context, the action will complete successfully
    with a message stating no entities were processed.
