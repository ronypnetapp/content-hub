Add Note to IOCs:
  ai_description: >-
    ### General Description

    The **Add Note to IOCs** action allows users to attach descriptive notes or structured
    JSON data to existing threat intelligence objects (IOCs) within the Cyware Intel
    Exchange platform. This action is primarily used to document analyst findings,
    add context from external tools, or update the status of an indicator within the
    threat intelligence lifecycle.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Note Type** | String | Yes | Specifies the category or type of the note being
    added (e.g., `threatdata`). |

    | **Note** | String | Yes | The actual content of the note. This can be plain
    text or a JSON string. |

    | **Is the Note in Json format** | Boolean | No | If set to `true`, the action
    validates that the `Note` parameter contains valid JSON before sending it to Cyware.
    |


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (Base URL, Access
    ID, Secret Key) and input parameters from the configuration.

    2. **Entity Identification**: It collects the identifiers of all entities currently
    attached to the Google SecOps case.

    3. **Bulk Lookup**: It queries Cyware Intel Exchange using a bulk lookup endpoint
    to map the case entity identifiers to their corresponding internal Cyware Indicator
    IDs.

    4. **Note Submission**: For every entity successfully matched to a Cyware indicator,
    the action sends a POST request to the `/ingestion/notes/` endpoint to create
    and attach the specified note.

    5. **Result Reporting**: The action provides a summary of which IOCs were successfully
    updated and includes the raw API responses in the JSON results for downstream
    playbook use.


    ### Additional Notes

    - If an entity is not found in Cyware Intel Exchange, it is skipped and reported
    as missing.

    - If the **Is the Note in Json format** parameter is enabled but the input provided
    in the **Note** field is not valid JSON, the action will fail with a specific
    error message.
