Create Task for IOCs:
  ai_description: >-
    ### General Description

    Creates tasks in Cyware Intel Exchange for specific Indicator of Compromise (IOC)
    entities. This action allows analysts to automate the creation of follow-up tasks
    or investigations within the Cyware platform, associated directly with threat
    data objects found in a Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Text** | String | Yes | The description of the task to be performed. Limited
    to 2000 characters. |

    | **Priority** | DDL | Yes | The priority level assigned to the task. Options:
    `high`, `medium`, `low`. |

    | **Status** | DDL | Yes | The initial status of the created task. Options: `not_started`,
    `in_progress`, `completed`. |

    | **Deadline** | String | Yes | The deadline for the task expressed in days from
    the current time. Must be an integer between 1 and 365. |

    | **Assignee Email ID** | String | No | The email address of a valid Cyware user
    to whom the task will be assigned. If omitted, the task is created as unassigned.
    |


    ### Flow Description

    1. **Initialization**: Extracts integration configuration and action parameters,
    including task details and the optional assignee email.

    2. **Validation**: Validates that the task description is within the character
    limit and that the deadline is a valid integer within the allowed range (1-365
    days).

    3. **User Resolution**: If an assignee email is provided, the action queries the
    Cyware API to retrieve the corresponding internal User ID. If the user is not
    found, the action fails.

    4. **IOC Lookup**: Retrieves all target entities from the case and performs a
    bulk lookup in Cyware Intel Exchange to map entity identifiers to their internal
    Cyware object IDs.

    5. **Task Creation**: Iterates through the valid IOCs found in Cyware and sends
    a POST request to create a task for each, including the description, priority,
    status, and calculated deadline timestamp.

    6. **Result Reporting**: Aggregates the responses, providing a summary of successful
    and failed task creations, and outputs the raw JSON results for each task.


    ### Additional Notes

    - **Entity Matching**: Only entities that already exist as indicators in Cyware
    Intel Exchange will have tasks created for them. Entities not found in Cyware
    are skipped.

    - **Error Handling**: The action will fail if no entities are provided, if the
    assignee email is invalid, or if the task description exceeds the 2000-character
    limit.
