Get Allowed IOCs:
  ai_description: >-
    ### General Description

    This action retrieves a list of Indicators of Compromise (IOCs) that have been
    marked as 'allowed' (whitelisted) within the Cyware CTIX platform. It allows security
    analysts to audit or verify the current allowlist status of various indicator
    types directly from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC Type** | DDL | No | Filters the results by a specific indicator type (e.g.,
    `domain-name`, `ipv4-addr`, `file`). If set to 'All' (default), all allowed indicators
    are retrieved. |

    | **Created From** | String | No | Filters records based on their creation time.
    Expects an epoch timestamp in seconds (e.g., `1767160932`). |


    ### Additional Notes

    - This action does not run on specific entities within a case; it performs a global
    retrieval from the Cyware platform based on the provided filters.

    - The action handles pagination automatically to ensure all matching records are
    retrieved, though the displayed data table is limited to the first 10 records
    for readability.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `IOC Type` and `Created
    From` filters from the user input.

    2. **Validation:** It validates that the `Created From` parameter is a valid non-negative
    integer if provided.

    3. **API Interaction:** It connects to the Cyware CTIX API and performs a GET
    request to the allowed indicators endpoint, applying the specified filters.

    4. **Data Processing:** The action aggregates paginated results into a single
    list and maps them to a structured data model.

    5. **Output Generation:** It populates a data table named 'Allowed IOCs' with
    the ID, Type, and Value of the retrieved indicators and attaches the full raw
    JSON response to the action results.
