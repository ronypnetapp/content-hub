Remove IOCs from Allowed list:
  ai_description: >-
    ### General Description

    The **Remove IOCs from Allowed list** action is used to un-whitelist indicators
    in Cyware Intel Exchange. It processes the entities present in a Google SecOps
    case, resolves their identifiers to internal Cyware indicator IDs, and then removes
    those IDs from the Cyware allowed list (allowlist).


    ### Parameters

    There are no specific action parameters for this action. It utilizes the global
    integration configuration (Base URL, Access ID, Secret Key, and Verify SSL) and
    the entities attached to the case.


    ### Flow Description

    1. **Initialization**: The action retrieves integration credentials and the list
    of target entities from the current case.

    2. **ID Resolution**: It performs a bulk lookup in Cyware Intel Exchange to map
    the entity identifiers (such as IP addresses, domains, or hashes) to their corresponding
    internal Cyware indicator IDs.

    3. **Validation**: The action identifies which entities exist in Cyware and logs
    any that are missing from the external system.

    4. **Removal**: For all successfully resolved IDs, it sends a bulk POST request
    to the Cyware API to remove these indicators from the allowed list.

    5. **Completion**: The action returns the raw API response as JSON and provides
    a summary message of the operation's success or failure.


    ### Additional Notes

    - This action requires the entities to already exist as indicators within Cyware
    Intel Exchange to be successfully removed from the allowed list.

    - If no entities are provided or no valid indicators are found in the external
    system, the action will complete gracefully with an informative message.
