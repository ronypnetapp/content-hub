    | Fields | string | No | A comma-separated list of specific fields to retrieve
    from the API. |


    ### Additional Notes

    - The action performs a bulk lookup for all target entities.

    - The data table displayed in the case wall is limited to the first 10 records.

    - Entities are enriched with properties prefixed with 'Cyware_'.


    ### Flow Description

    1. Extract parameters and identify target entities.

    2. Query the Cyware CTIX API for IOC details using entity identifiers.

    3. Parse the response and populate a data table for the case wall.

    4. Map the results back to the original entities.

    5. Update entity additional properties with threat intelligence and mark them
    as enriched.

    6. Return the full JSON response.
