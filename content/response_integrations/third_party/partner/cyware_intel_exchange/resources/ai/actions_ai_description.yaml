Manage Tags in IOCs:
  ai_description: "### General Description\nThe **Manage Tags in IOCs** action allows\
    \ users to programmatically add or remove tags from Indicators of Compromise (IOCs)\
    \ within the Cyware Intel Exchange platform. It facilitates bulk tagging operations\
    \ based on entities present in a Google SecOps case, ensuring that threat intelligence\
    \ metadata is kept up-to-date.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Tags** | String\
    \ | Yes | A comma-separated list of tag names to be added or removed (e.g., \"\
    malicious\", \"phishing\"). |\n| **Operation Type** | DDL | Yes | Determines the\
    \ action to perform. Options are `Add Tag` or `Remove Tag`. |\n\n### Additional\
    \ Notes\n- **Auto-Creation**: During an `Add Tag` operation, if a specified tag\
    \ does not exist in Cyware Intel Exchange, the action will automatically attempt\
    \ to create it before associating it with the IOCs.\n- **IOC Resolution**: The\
    \ action resolves SecOps entity identifiers to Cyware internal object IDs. If\
    \ an entity is not found in Cyware, it will be skipped, and a note will be included\
    \ in the output message.\n- **Validation**: For `Remove Tag` operations, only\
    \ existing tags found in Cyware will be processed; invalid or non-existent tags\
    \ are ignored.\n\n### Flow Description\n1. **Initialization**: Retrieves integration\
    \ credentials and extracts the `Tags` and `Operation Type` parameters.\n2. **Tag\
    \ Discovery**: Fetches the full list of available tags from Cyware Intel Exchange\
    \ to map the provided tag names to their respective internal IDs.\n3. **Entity\
    \ Resolution**: Converts the identifiers of the target entities into Cyware IOC\
    \ object IDs using a bulk lookup.\n4. **Tag Management (Add)**: \n    - Identifies\
    \ any tags that do not yet exist in Cyware and creates them.\n    - Executes a\
    \ bulk API call to associate the complete list of tag IDs with the identified\
    \ IOCs.\n5. **Tag Management (Remove)**: \n    - Filters the provided tag list\
    \ to include only those that currently exist in Cyware.\n    - Executes a bulk\
    \ API call to disassociate the specified tag IDs from the identified IOCs.\n6.\
    \ **Completion**: Returns a summary message indicating the number of tags processed\
    \ and any entities or tags that were skipped."
