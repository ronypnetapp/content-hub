Add Comment To Alert:
  ai_description: >-
    ### General Description

    This action allows users to add a comment to a specific alert within the Orca
    Security platform. It is primarily used for documentation and collaboration purposes,
    ensuring that analysts can record findings or notes directly on the source alert
    in Orca Security from within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | True | The unique identifier of the alert in Orca Security
    to which the comment will be added. |

    | Comment | String | True | The actual text content of the comment to be posted
    to the alert. |


    ### Additional Notes

    - This action requires either an **API Key** or an **API Token** to be configured
    in the integration settings for authentication.

    - The action performs an external state change by modifying the alert metadata
    in Orca Security.


    ### Flow Description

    1. **Authentication**: The action initializes the `OrcaSecurityManager` using
    the provided API Root and credentials (API Key or Token).

    2. **Parameter Extraction**: It retrieves the `Alert ID` and the `Comment` text
    from the action's input parameters.

    3. **API Interaction**: The manager executes a `PUT` request to the Orca Security
    endpoint `/api/alerts/{alert_id}/comment` with the comment payload.

    4. **Result Processing**: The action parses the response into an `AlertComment`
    object and attaches the raw JSON result to the action output for use in subsequent
    playbook steps.
