Update Alert:
  ai_description: >-
    Updates the state of a specific alert in Orca Security. This action allows users
    to modify an alert's status, initiate a verification process, or manage its snooze
    state (snooze/unsnooze). It interacts with the Orca Security API via PUT requests
    to apply changes and then retrieves the updated alert details to provide a final
    status report.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in Orca Security
    that needs to be updated. |

    | **Verify Alert** | Boolean | No | If set to `True`, the action will initiate
    the verification process for the specified alert. |

    | **Snooze State** | DDL | No | Determines the snooze status. Options include
    `Select One`, `Snooze`, or `Unsnooze`. |

    | **Snooze Days** | String | No | The number of days to snooze the alert. This
    is required if **Snooze State** is set to `Snooze`. Defaults to 1 if not provided.
    |

    | **Status** | DDL | No | The new status to assign to the alert. Options include
    `Open`, `In Progress`, `Close`, or `Dismiss`. |


    ### Additional Notes

    * **Validation Requirement:** At least one of the following parameters must be
    configured for the action to execute: `Status`, `Verify Alert`, or `Snooze State`.

    * **Unsnooze Logic:** If `Snooze State` is set to `Unsnooze` and no specific `Status`
    is provided, the action automatically sets the alert status to `Open`.

    * **Duplicate Handling:** If the alert already possesses the requested status,
    the action will complete successfully while noting that no change was necessary.


    ### Flow Description

    1. **Initialization:** Extracts configuration (API Root, Key/Token) and action
    parameters.

    2. **Validation:** Ensures that at least one update operation (Status, Verify,
    or Snooze) is requested and validates `Snooze Days` if applicable.

    3. **Verification:** If `Verify Alert` is enabled, sends a request to the Orca
    Security verification endpoint.

    4. **Snooze Management:** If `Snooze State` is `Snooze`, sends a request to the
    snooze endpoint with the specified duration.

    5. **Status Update:** Updates the alert status if a new status is provided or
    if the alert is being unsnoozed.

    6. **Data Retrieval:** Fetches the latest alert data from Orca Security to confirm
    the current state.

    7. **Output:** Returns the updated alert details as a JSON result and provides
    a summary message of the operations performed.
