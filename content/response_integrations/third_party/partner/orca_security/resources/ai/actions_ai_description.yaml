Get Compliance Info:
  ai_description: >-
    ### General Description

    The **Get Compliance Info** action retrieves detailed compliance framework information
    from Orca Security. It allows security analysts to monitor the compliance posture
    of their cloud environment by fetching data such as average scores, test results
    (pass/fail counts), and the active status of specific or all selected frameworks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Framework Names** | String | No | A comma-separated list of framework names
    (e.g., 'CIS AWS Foundations', 'SOC2') to retrieve. If left empty, the action returns
    information for all selected frameworks in the Orca Security account. |

    | **Create Insight** | Boolean | Yes | If enabled (default: true), the action
    creates a Case Insight in Google SecOps containing a formatted summary of the
    compliance data. |

    | **Max Frameworks To Return** | Integer | No | Specifies the maximum number of
    frameworks to include in the results. Default is 50. |


    ### Flow Description

    1. **Initialization:** The action extracts API credentials from the integration
    configuration and user-provided parameters (Framework Names, Insight toggle, and
    Limit).

    2. **API Query:** The action connects to the Orca Security API and sends a POST
    request to the `/api/serving-layer/compliance/frameworks/overview` endpoint. If
    specific framework names were provided, it iterates through them to fetch targeted
    data.

    3. **Data Parsing:** The raw JSON response is parsed into framework objects, extracting
    key metrics like `avg_score_percent`, `test_results_fail`, and `test_results_pass`.

    4. **Insight Creation:** If the 'Create Insight' parameter is true, the action
    generates an HTML-formatted insight with color-coded scores and attaches it to
    the case.

    5. **Result Output:** The action populates a data table named 'Compliance Details'
    and adds the raw framework data to the action's JSON results for use in subsequent
    playbook steps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
