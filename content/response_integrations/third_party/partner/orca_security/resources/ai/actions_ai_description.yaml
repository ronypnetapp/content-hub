Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Orca Security instance. It ensures that the provided configuration parameters,
    such as the API Root and authentication credentials (API Key or API Token), are
    correct and that the service is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Orca Security API. |

    | API Key | String | No | The API key for authentication. Required if API Token
    is not provided. |

    | API Token | String | No | The API token for authentication. This is the preferred
    authentication method. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API. |


    ### Additional Notes

    - Either the **API Key** or the **API Token** must be provided for the action
    to authenticate successfully.

    - This action does not process any entities and is strictly used for configuration
    validation.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, API Key, API Token,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization:** An instance of the `OrcaSecurityManager` is created
    using the extracted credentials.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    sends a POST request to the Orca Security vulnerability details endpoint with
    a result limit of 1 to verify the API's responsiveness.

    4. **Result Reporting:** Based on the success or failure of the API call, the
    action returns a completion or failure status along with a descriptive message.
