Scan Assets:
  ai_description: >-
    ### General Description

    The **Scan Assets** action initiates and monitors security scans for specific
    assets within the Orca Security platform. This action is designed to run asynchronously,
    meaning it triggers the scans and then periodically polls the Orca Security API
    to check for completion. It is useful for ensuring that assets are scanned for
    vulnerabilities or compliance issues as part of an automated response workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | String | Yes | A comma-separated list of unique Orca Security asset
    identifiers that you want to scan. |


    ### Flow Description

    1. **Initialization**: The action extracts the comma-separated list of Asset IDs
    from the input parameters and initializes the Orca Security manager.

    2. **Scan Initiation (First Run)**: For each provided Asset ID, the action sends
    a POST request to the Orca Security API to start a new scan. If a scan is already
    in progress for an asset, the action captures the existing scan's ID.

    3. **Asynchronous Polling**: The action enters an 'In Progress' state, storing
    the scan identifiers. In subsequent execution cycles, it polls the status of each
    pending scan.

    4. **Timeout Monitoring**: During polling, the script checks if it is approaching
    the global SOAR timeout or the Python process timeout to ensure a graceful exit
    and state preservation.

    5. **Data Retrieval and Completion**: Once all scans reach a 'done' status, the
    action retrieves the raw scan data, attaches it to the action's JSON results,
    and provides a summary of successful and failed scans.


    ### Additional Notes

    - This action is **asynchronous**. Users should ensure the script timeout value
    in the Google SecOps IDE is adjusted to accommodate the time required for Orca
    Security to complete asset scans.

    - The action handles cases where a scan is already running by tracking the existing
    process instead of failing.
