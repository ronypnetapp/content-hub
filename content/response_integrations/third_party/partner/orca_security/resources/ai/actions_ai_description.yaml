Get Asset Details:
  ai_description: >-
    ### General Description

    The **Get Asset Details** action retrieves comprehensive information for specific
    assets within Orca Security using their unique Asset IDs. It provides metadata
    such as asset name, type, account, category, and current security state. Additionally,
    the action can be configured to fetch associated vulnerabilities (CVEs) for each
    asset, filtered by a minimum severity threshold. The retrieved data is presented
    as a raw JSON result, a structured data table, and optionally as individual Case
    Insights for each asset.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Asset IDs** | String | Yes | A comma-separated list of unique Orca Security
    asset identifiers to be queried. |

    | **Return Vulnerabilities Information** | Boolean | No | If enabled (True), the
    action will also retrieve vulnerability data linked to the specified assets. Default
    is True. |

    | **Lowest Severity For Vulnerabilities** | DDL | Yes | The minimum severity level
    required for a vulnerability to be included in the results. Options include: Critical,
    High, Medium, Low, Unknown. Default is 'Hazardous'. |

    | **Max Vulnerabilities To Fetch** | String | No | The maximum number of vulnerabilities
    to return per asset. Must be a positive integer between 1 and 100. Default is
    50. |

    | **Create Insight** | Boolean | No | If enabled (True), the action will generate
    a Case Insight in Google SecOps for every successfully enriched asset, including
    a direct link to the asset in the Orca UI. Default is True. |


    ### Additional Notes

    - This action does not process entities from the current case scope; it relies
    entirely on the provided **Asset IDs** parameter.

    - The **Max Vulnerabilities To Fetch** parameter is capped at 100 to ensure performance
    and API stability.

    - Authentication requires either an **API Key** or an **API Token** to be configured
    in the integration settings.


    ### Flow Description

    1. **Parameter Validation**: The action extracts and validates input parameters,
    ensuring the vulnerability limit is within the allowed range (1-100).

    2. **Manager Initialization**: Initializes the `OrcaSecurityManager` using the
    provided API credentials and connection settings.

    3. **Asset Retrieval**: Iterates through the list of provided Asset IDs and performs
    a query to the Orca Security API to fetch asset metadata.

    4. **Vulnerability Enrichment (Optional)**: If enabled, it performs a secondary
    query for each asset to retrieve vulnerabilities that meet the specified severity
    criteria.

    5. **Data Formatting**: Aggregates the asset and vulnerability data into JSON
    and CSV formats for output.

    6. **Insight Generation (Optional)**: If enabled, creates a Case Insight for each
    asset, providing a summary of its security posture and a link to the Orca Security
    console.

    7. **Final Output**: Adds the aggregated JSON results and a summary data table
    to the action's output and completes the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates case insights and adds a data table to the Google SecOps
      case to display retrieved asset information.
