Get Vulnerability Details:
  ai_description: >-
    ### General Description

    The **Get Vulnerability Details** action retrieves comprehensive information about
    specific vulnerabilities (CVEs) from Orca Security. It allows security analysts
    to enrich a case with details such as vulnerability summaries, severity levels,
    affected assets, and remediation availability.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **CVE IDs** | String | Yes | A comma-separated list of CVE identifiers (e.g.,
    CVE-2021-44228) to be queried. |

    | **Fields To Return** | String | No | A comma-separated list of specific fields
    to include in the output. If left empty, all available fields are returned. |

    | **Output** | DDL | No | Determines the output format. Options are `JSON` (default)
    or `CSV`. If `CSV` is selected, a file is created and the path is returned. |

    | **Create Insight** | Boolean | No | If enabled (default), the action creates
    a detailed case insight for each successfully retrieved CVE. |

    | **Max Assets To Return** | String | No | The maximum number of assets associated
    with the CVE to retrieve. Default is 50, maximum is 10,000. |


    ### Flow Description

    1. **Initialization**: The action parses the input CVE IDs and validates the `Max
    Assets To Return` parameter.

    2. **API Interaction**: For each CVE ID provided, the action queries the Orca
    Security API using a paginated search to retrieve vulnerability and asset data.

    3. **Data Processing**: The retrieved data is filtered based on the `Fields To
    Return` parameter and formatted for output.

    4. **Insight Generation**: If `Create Insight` is true, the action generates a
    formatted HTML insight for the case, highlighting severity, description, and affected
    assets.

    5. **Final Output**: The results are attached to the case as a JSON object or
    a CSV file, and a "Vulnerability Details" data table is added to the case wall.


    ### Additional Notes

    - This action does not operate on existing entities in the case; it relies entirely
    on the CVE IDs provided in the input parameter.

    - The `Fields To Return` parameter supports flattened JSON keys (e.g., `object_id`
    for `{"object": {"id": 123}}`).
