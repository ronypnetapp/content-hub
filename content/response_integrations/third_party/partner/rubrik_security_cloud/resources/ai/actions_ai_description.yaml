Turbo IOC Scan:
  ai_description: >-
    ### General Description

    This action initiates a **Turbo IOC (Indicator of Compromise) Scan** within Rubrik
    Security Cloud. Turbo scans are high-performance threat hunts optimized for speed,
    allowing security teams to search for specific file hashes (MD5, SHA1, SHA256)
    across multiple clusters and snapshots. The action returns a unique Hunt ID which
    can be used to track the progress and results of the scan.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC** | String | Yes | A comma-separated list of indicator values (hashes)
    to scan for. |

    | **Scan Name** | String | No | A custom name for the threat hunt. If not provided,
    the system auto-generates a name using the format `Google-SecOps-YYYY-MM-DD-HH:MM:SS`.
    |

    | **Cluster ID** | String | No | A comma-separated list of specific Rubrik cluster
    IDs to target. If left empty, the scan will run across all available clusters.
    |

    | **Start Time** | String | No | Filters the snapshots to be scanned starting
    from this date. Supported formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | **End Time** | String | No | Filters the snapshots to be scanned until this
    date. Supported formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | **Max Snapshots Per Object** | String | No | The maximum number of snapshots
    to scan for each object (e.g., VM or File System). |


    ### Additional Notes

    - The `Start Time` must be chronologically before the `End Time` if both are provided.

    - The action uses GraphQL mutations to interact with the Rubrik Security Cloud
    API.

    - Results include a data table containing the generated `Turbo Threat Hunt ID`.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves and trims all input parameters,
    including the mandatory IOC list.

    2. **Validation:** It validates date formats for `Start Time` and `End Time`,
    ensures `Max Snapshots Per Object` is a valid integer, and generates a default
    scan name if none was provided.

    3. **Authentication:** Initializes the Rubrik API Manager, which handles OAuth
    token generation and encrypted storage.

    4. **Scan Initiation:** Executes a GraphQL mutation (`startTurboThreatHunt`) to
    the Rubrik Security Cloud endpoint with the specified IOCs and filters.

    5. **Result Processing:** Captures the `huntId` from the API response, adds the
    raw JSON response to the action results, and creates a data table for the SOAR
    interface displaying the Hunt ID.
