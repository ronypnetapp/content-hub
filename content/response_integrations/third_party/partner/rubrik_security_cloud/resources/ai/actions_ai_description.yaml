Get CDM Cluster Location:
  ai_description: >-
    ### General Description

    The **Get CDM Cluster Location** action retrieves the geographical location information
    for a specific Rubrik Cloud Data Management (CDM) cluster. It identifies the physical
    address associated with the nodes within the cluster by querying the Rubrik Security
    Cloud API. This action is useful for asset management and identifying the physical
    residency of data stored in specific clusters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Cluster ID** | String | Yes | The unique identifier of the CDM cluster for
    which the location is being requested. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory `Cluster ID` from
    the input parameters.

    2. **API Initialization**: It initializes the Rubrik Security Cloud API manager
    using the provided service account credentials and validates the connection.

    3. **Data Retrieval**: A GraphQL query is executed to fetch the `geoLocation`
    (specifically the `address` field) for the specified cluster ID.

    4. **Data Processing**: The response is parsed, and the location details for the
    cluster nodes are extracted and structured using the `CDMClusterLocationDatamodel`.

    5. **Result Output**: The action adds the raw JSON response to the execution results
    and constructs a data table named "CDM Cluster Location" containing the Cluster
    ID and its physical location for display in the SOAR interface.


    ### Additional Notes

    - This action does not operate on entities; it requires a specific Cluster ID
    as input.

    - The results are displayed in a data table for easy viewing within the SOAR interface,
    limited to a maximum number of records defined by the integration's constants.
