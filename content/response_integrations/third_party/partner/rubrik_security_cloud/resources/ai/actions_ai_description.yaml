Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity and authentication
    between the Google SecOps SOAR platform and the **Rubrik Security Cloud** instance.
    It ensures that the provided Service Account credentials are valid and that the
    network path to the Rubrik GraphQL API is open and functional.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | N/A | This action does not require any input parameters. | N/A | N/A | N/A |


    ### Additional Notes

    This action relies entirely on the global integration configuration (Service Account
    JSON and Verify SSL) to establish a connection. It does not interact with specific
    case entities.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify environment and retrieves
    the integration's global configuration parameters.

    2. **API Manager Setup**: It instantiates the `APIManager`, which handles OAuth2
    token management, including retrieving tokens from encrypted storage or generating
    new ones via the Rubrik OAuth adapter if the current token is expired or missing.

    3. **Connectivity Test**: It executes a lightweight GraphQL query (`deploymentVersion`)
    against the Rubrik API to confirm reachability and authorization.

    4. **Result Reporting**: The action concludes by returning a boolean status (`connectivity_result`)
    and a descriptive message indicating whether the connection was successful or
    failed.
