Advanced IOC Scan:
  ai_description: >-
    ### Advanced IOC Scan


    #### General Description

    Initiates an advanced Indicator of Compromise (IOC) scan (Threat Hunt) on specified
    Rubrik objects within the Rubrik Security Cloud. This action allows security teams
    to search for specific file patterns, hashes, or YARA rules across snapshots of
    protected systems, providing granular control over scan criteria such as file
    size, date ranges, and path inclusions/exclusions.


    #### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object ID** | String | Yes | Comma-separated list of Rubrik object IDs (snappables)
    to perform the scan on. |

    | **IOC Type** | DDL | No | The type of indicator to scan for. Options include:
    `INDICATOR_OF_COMPROMISE_TYPE_PATH_OR_FILENAME`, `INDICATOR_OF_COMPROMISE_TYPE_HASH`,
    or `INDICATOR_OF_COMPROMISE_TYPE_YARA_RULE`. |

    | **IOC Value** | String | No | The specific value of the indicator to search
    for (e.g., a file hash or path pattern). |

    | **Scan Name** | String | No | Custom name for the threat hunt. If not provided,
    a name is auto-generated using the format `Google-SecOps-YYYY-MM-DD-HH:MM:SS`.
    |

    | **Advanced IOC** | String | No | A JSON-encoded object where keys represent
    IOC types and values are lists of indicators. |

    | **Start Date** | String | No | Filter snapshots from this date. Supported formats:
    `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | **End Date** | String | No | Filter snapshots until this date. Supported formats:
    `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | **Max Snapshots Per Object** | String | No | The maximum number of snapshots
    to scan for each specified object. |

    | **Max Matches Per Snapshot** | String | No | The scan for a snapshot terminates
    once this number of matches is detected. |

    | **Min File Size** | String | No | Minimum file size in bytes to include in the
    scan. |

    | **Max File Size** | String | No | Maximum file size in bytes to include in the
    scan. |

    | **Paths To Include** | String | No | Comma-separated list of file paths to explicitly
    include in the scan. |

    | **Paths To Exclude** | String | No | Comma-separated list of file paths to exclude
    from the scan. |

    | **Paths To Exempt** | String | No | Comma-separated list of paths to exempt
    from the exclusion list. |


    #### Additional Notes

    - **Requirement Logic:** Either the `Advanced IOC` parameter must be configured,
    OR both `IOC Type` and `IOC Value` must be provided for the action to run. If
    neither set is provided, the action will fail.

    - The action returns a data table named "Advanced IOC Scan Results" containing
    the Hunt IDs and their initial statuses.


    #### Flow Description

    1. **Initialization:** Extracts configuration parameters and action inputs.

    2. **Validation:** Validates date formats, ensures integer parameters (like file
    sizes and snapshot limits) are non-negative, and parses the `Advanced IOC` JSON
    if provided.

    3. **Authentication:** Establishes a session with Rubrik Security Cloud using
    OAuth credentials.

    4. **Scan Initiation:** Executes a GraphQL mutation (`startBulkThreatHunt`) to
    trigger the scan on the Rubrik platform with the defined IOCs and filters.

    5. **Output:** Captures the resulting Hunt IDs and populates a data table and
    the raw JSON result in Google SecOps.
  capabilities:
