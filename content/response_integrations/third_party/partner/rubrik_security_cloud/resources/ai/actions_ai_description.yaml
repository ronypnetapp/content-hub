Get Sonar Sensitive Hits:
  ai_description: >-
    ### General Description

    The **Get Sonar Sensitive Hits** action retrieves data classification and sensitive
    discovery results for a specific object within Rubrik Security Cloud (RSC). It
    identifies violations and hits detected by Rubrik Sonar (the sensitive data discovery
    engine) based on a configurable lookback period. This action is primarily used
    to identify if sensitive data (such as PII, PHI, or financial information) exists
    on a specific workload, backup, or file share object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object Name** | String | Yes | The exact name of the Rubrik object (e.g.,
    a Virtual Machine, physical host, or database) to check for sensitive hits. |

    | **Lookback Days** | String | No | The number of days in the past to retrieve
    scan results from. For example, a value of 7 will return results as of 7 days
    ago. Defaults to 7 if not provided. |


    ### Flow Description

    1. **Input Validation**: The action validates that the `Object Name` is a non-empty
    string and that `Lookback Days` is a valid non-negative integer.

    2. **Date Calculation**: It calculates a target search date by subtracting the
    lookback days from the current system time.

    3. **Object Discovery**: The action queries the Rubrik Security Cloud API to list
    all policy objects that were scanned on the calculated target date.

    4. **Object Matching**: It iterates through the list of policy objects to find
    a match for the provided `Object Name`. If no match is found, or if the object
    has no snapshots for that date, the action fails.

    5. **Detail Retrieval**: Once the object is identified, it performs a secondary
    GraphQL query to fetch detailed sensitive hit information, including analyzer
    groups (e.g., 'US PII') and specific analyzer results (e.g., 'Social Security
    Number').

    6. **Data Formatting**: The retrieved data is parsed into a structured format,
    including hit counts and analyzer names.

    7. **Output Generation**: The action returns the raw JSON response and creates
    a data table named "Sonar Sensitive Hits" in the Google SecOps UI for analyst
    review.


    ### Additional Notes

    - This action does not operate on Google SecOps entities (like IP addresses or
    Hostnames); it relies entirely on the `Object Name` parameter provided by the
    user.

    - The action is read-only and does not modify any data within Rubrik Security
    Cloud.
