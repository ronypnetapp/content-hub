List Sonar File Contexts:
  ai_description: >-
    ### General Description

    Retrieves the Sonar file contexts for a specific object snapshot from Rubrik Security
    Cloud (RSC). This action allows security analysts to identify files, folders,
    or file shares that contain sensitive data findings detected by Rubrik Sonar.
    It provides detailed information such as file names, sizes, total sensitive hits,
    daily hit changes, and access/modification times. The action supports extensive
    filtering by file name, path, and user ID, as well as pagination and sorting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object ID** | string | Yes | The unique identifier of the Rubrik object (Snappable
    ID) to query. |

    | **Snapshot ID** | string | Yes | The unique identifier of the specific snapshot
    for the object. |

    | **File Name** | string | No | Filter results to include only files with a specific
    name. |

    | **File Path** | string | No | Filter results by a specific standard file path.
    |

    | **User ID** | string | No | Filter results by a specific user ID associated
    with the file context. |

    | **Include Whitelisted Results** | ddl | No | Boolean (True/False) indicating
    whether to include results that have been whitelisted in Rubrik. |

    | **Limit** | string | No | The maximum number of file contexts to retrieve in
    a single request (default is 50). |

    | **Next Page Token** | string | No | The cursor token used to retrieve the next
    set of paginated results. |

    | **Sort By** | ddl | No | The field used to sort the results (e.g., HITS, NAME,
    LAST_MODIFIED). |

    | **Sort Order** | ddl | No | The order of sorting, either 'Asc' (Ascending) or
    'Desc' (Descending). |


    ### Additional Notes

    - This action does not run on entities; it requires specific IDs provided as parameters.

    - The results are displayed in a data table named 'Sonar File Contexts' and also
    provided as a raw JSON result.


    ### Flow Description

    1. **Parameter Validation**: The action validates that the mandatory 'Object ID'
    and 'Snapshot ID' are provided and that the 'Limit' is a valid integer.

    2. **Authentication**: Initializes the Rubrik API Manager using the provided Service
    Account JSON and authenticates with Rubrik Security Cloud.

    3. **Data Retrieval**: Executes a GraphQL query (`SONAR_FILE_CONTEXTS_QUERY`)
    against the Rubrik API to fetch file context data based on the provided IDs and
    filters.

    4. **Data Processing**: Parses the GraphQL response into a structured data model,
    extracting file metadata and sensitive hit counts.

    5. **Output Generation**: Creates a data table 'Sonar File Contexts' containing
    the processed file details and attaches the full raw JSON response to the action
    results.
