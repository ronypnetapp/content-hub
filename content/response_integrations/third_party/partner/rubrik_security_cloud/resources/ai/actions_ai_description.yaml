List Events:
  ai_description: >-
    ### General Description

    Retrieves a list of events and activities from Rubrik Security Cloud (RSC). This
    action allows security analysts to search through system activities, backup events,
    and security anomalies by applying various filters such as status, severity, object
    types, and date ranges. It is primarily used for auditing, monitoring task progress,
    and investigating historical activities within the Rubrik environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sort By | DDL | No | Specifies the field to use for sorting the response (e.g.,
    Last Updated, Severity, Cluster Name). |

    | Sort Order | DDL | No | Specifies the order to sort the data (Asc or Desc).
    |

    | Limit | String | No | The number of results to retrieve (1 to 1000). Defaults
    to 50. |

    | Next Page Token | String | No | The cursor token used to retrieve the next set
    of results for paginated requests. |

    | Activity Status | String | No | Comma-separated list of statuses to filter by
    (e.g., "Failure", "Success", "Running"). |

    | Activity Type | String | No | Comma-separated list of activity types to filter
    by (e.g., "Backup", "Anomaly", "Recovery"). |

    | Severity | String | No | Comma-separated list of severity levels to filter by
    (e.g., "Critical", "Warning", "Info"). |

    | Object Name | String | No | Filters events based on a specific object name.
    |

    | Object Type | String | No | Comma-separated list of object types to filter by
    (e.g., "VmwareVm", "WindowsFileset"). |

    | Cluster ID | String | No | Comma-separated list of Rubrik cluster IDs to filter
    events. |

    | Start Date | String | No | The start date for the event search range. Supports
    YYYY-MM-DD or ISO 8601 formats. |

    | End Date | String | No | The end date for the event search range. Supports YYYY-MM-DD
    or ISO 8601 formats. |


    ### Additional Notes

    - **Date Formats**: Supported formats include `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`,
    and `yyyy-mm-ddTHH:MM:SS.fffZ`.

    - **Pagination**: If more results are available than the specified limit, the
    action provides a 'Next Page Token' in the output message which can be used in
    subsequent runs.

    - **Table Limits**: While the action can fetch up to 1000 records, the UI data
    table is limited to displaying the first 20 records for performance.


    ### Flow Description

    1. **Parameter Initialization**: The action extracts all user-provided filters,
    sorting preferences, and pagination tokens.

    2. **Validation**: It validates that the 'Limit' is a valid positive integer and
    ensures that the 'Start Date' occurs before the 'End Date'.

    3. **Authentication**: Connects to Rubrik Security Cloud using the provided Service
    Account JSON and manages OAuth token lifecycle.

    4. **API Request**: Executes a GraphQL query (`activitySeriesConnection`) against
    the Rubrik API with the specified filters.

    5. **Data Processing**: Parses the GraphQL response into a structured data model,
    extracting event IDs, object details, and status information.

    6. **Output**: Generates a JSON result containing the full response and populates
    a data table named "Events" in the Google SecOps interface.
