IOC Scan Results:
  ai_description: >-
    ### General Description

    The **IOC Scan Results** action retrieves comprehensive details and metrics for
    a specific threat hunt (either Turbo or Advanced) from Rubrik Security Cloud.
    It is designed to provide visibility into the progress and findings of an Indicator
    of Compromise (IOC) scan, including object metrics and scan status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Hunt ID** | String | Yes | The unique identifier of the threat hunt/IOC scan
    to retrieve results for. |


    ### Additional Notes

    - This action is **asynchronous**. If the threat hunt is still in a `PENDING`
    or `IN_PROGRESS` state in Rubrik, the action will return an 'In Progress' status
    to Google SecOps, allowing for subsequent polling.

    - The action outputs both the raw JSON response and a formatted data table named
    'IOC Scan Results'.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the mandatory `Hunt ID` from
    the input parameters.

    2. **API Initialization**: It initializes the Rubrik Security Cloud API manager
    using the provided service account credentials and handles OAuth token management.

    3. **Data Retrieval**: It executes a GraphQL query to fetch the scan's status,
    object metrics (scanned, affected, unaffected, and unscannable objects), and scan
    metrics (matched snapshots, unique file matches).

    4. **Data Processing**: The raw response is attached to the action results as
    JSON.

    5. **Internal Mutation**: A formatted data table is created containing key metrics
    such as Hunt Name, Hunt Type, Status, IOC Details, Object Metrics, and Scan Metrics.

    6. **Status Handling**: If the hunt is still running (status is `PENDING` or `IN_PROGRESS`),
    the action sets its state to `IN_PROGRESS`. Otherwise, it marks the execution
    as `COMPLETED`.
