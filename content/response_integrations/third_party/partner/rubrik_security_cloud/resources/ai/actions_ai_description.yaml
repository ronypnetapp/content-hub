List Object Snapshots:
  ai_description: "### General Description\nThe **List Object Snapshots** action retrieves\
    \ metadata for snapshots associated with a specific object ID from Rubrik Security\
    \ Cloud (RSC). This action is designed to provide visibility into the backup history\
    \ of a specific workload, allowing analysts to identify available recovery points\
    \ or audit snapshot frequency.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Object ID**\
    \ | String | Yes | The unique identifier of the Rubrik object (e.g., a VM, database,\
    \ or file share) for which snapshots are being retrieved. |\n| **Limit** | String\
    \ | No | The maximum number of snapshot records to return in the response. Default\
    \ is 50; the maximum allowed is 1000. |\n| **Next Page Token** | String | No |\
    \ A cursor used for pagination to retrieve the next set of results if the total\
    \ number of snapshots exceeds the limit. |\n| **Sort Order** | DDL | No | Specifies\
    \ the chronological order of the results. Options are **Asc** (Ascending) or **Desc**\
    \ (Descending). Default is Asc. |\n| **Start Date** | String | No | Filters snapshots\
    \ to include only those created on or after this date. Supports `yyyy-mm-dd` or\
    \ `yyyy-mm-ddTHH:MM:SSZ` formats. |\n| **End Date** | String | No | Filters snapshots\
    \ to include only those created on or before this date. Supports `yyyy-mm-dd`\
    \ or `yyyy-mm-ddTHH:MM:SSZ` formats. |\n| **Snapshot Type** | String | No | A\
    \ comma-separated list of snapshot types to filter the results (e.g., `OnDemand`,\
    \ `Scheduled`). |\n\n### Flow Description\n1. **Input Validation**: The action\
    \ validates the mandatory `Object ID`. It also checks that `Start Date` and `End\
    \ Date` follow supported ISO formats and that the start date does not occur after\
    \ the end date.\n2. **Authentication**: It initializes the Rubrik API manager\
    \ using the provided Service Account JSON, handling OAuth token lifecycle management.\n\
