Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Houdin.io API to ensure the integration is configured
    correctly and the service is reachable. This action is primarily used for troubleshooting
    and verifying that the provided API credentials and network settings allow communication
    with the Houdin.io platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used for authentication with the Houdin.io
    API. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Houdin.io API endpoint. Defaults to False. |


    ### Flow Description

    1. **Initialization**: The action extracts the API Key and SSL verification preference
    from the integration configuration.

    2. **Connectivity Check**: It initializes the HoudinManager and calls the `test_connectivity`
    method.

    3. **API Interaction**: The manager sends a POST request to the Houdin.io `/ping`
    endpoint using the provided API key.

    4. **Outcome**: If the API responds with a success status (HTTP 200), the action
    completes with a 'Connection Established' message. If the connection fails or
    the API returns an error, the action catches the exception and reports the failure.
