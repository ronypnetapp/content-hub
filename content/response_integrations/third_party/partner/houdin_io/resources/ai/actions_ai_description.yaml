Scan Artifact:
  ai_description: >-
    ### General Description

    The **Scan Artifact** action allows users to submit a specific artifact (such
    as an IP address, URL, Domain, or File Hash) to the Houdin.io platform for comprehensive
    security scanning. It integrates with various third-party scanners to provide
    a consolidated view of the artifact's reputation and threat profile. This action
    is designed to be used when a specific indicator needs deep analysis beyond standard
    enrichment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **artifact** | String | Yes | The specific indicator to be scanned. Supported
    formats include IPv4, IPv6, URL, Domain, MD5, SHA1, and SHA256. |

    | **scanOn** | Multi-choice | No | A list of specific scanners to utilize (e.g.,
    vt, urlscan, abuseipdb, alienvault, triage, mesmer, servicenow). If left empty,
    the platform uses its default scanner set. |


    ### Flow Description

    1. **Initialization**: The action extracts the API key from the integration configuration
    and initializes the Houdin connection manager.

    2. **Scan Submission**: It sends a POST request to the Houdin.io API (`scan/launch`)
    with the provided artifact and the list of selected scanners.

    3. **Asynchronous Polling**: The action enters a polling phase, sending GET requests
    to the Houdin API (`scan/result`) to check the status of the scan. It will continue
    to poll until the scan is complete or the maximum number of retries is reached.

    4. **Data Retrieval**: Once the scan is finished, the action retrieves the full
    JSON result set containing the findings from all utilized scanners.

    5. **Output**: The final results are attached to the action as a JSON result and
    a specific 'HoudinResult' object for use in subsequent playbook logic.


    ### Additional Notes

    - This action does not automatically iterate over entities in a Google SecOps
    case; the artifact must be explicitly provided as a parameter (often via a placeholder
    from a previous step or entity).

    - Because this action involves external scanning which can take time, it is marked
    as asynchronous. Users should ensure the action timeout in the Google SecOps IDE
    is configured appropriately for long-running scans.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
