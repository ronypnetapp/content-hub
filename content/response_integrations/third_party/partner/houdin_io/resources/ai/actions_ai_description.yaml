Enrich Entities:
  ai_description: "### General Description\nThe **Enrich Entities** action scans compatible\
    \ entities\u2014including Public IPv4/IPv6 addresses, URLs, Domains, and File\
    \ Hashes (MD5, SHA1, SHA256)\u2014using the **Houdin.io** platform. It retrieves\
    \ comprehensive threat intelligence by leveraging multiple third-party scanners\
    \ and Houdin's proprietary AI-driven analysis. The action updates entity attributes\
    \ with threat scores and analysis summaries, providing security analysts with\
    \ immediate context within the Google SecOps platform.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **scanOn** | Multi-choice | No | Specifies an array of scanners for Houdin to\
    \ utilize (e.g., `vt`, `urlscan`, `abuseipdb`, `mesmer`). If not provided, the\
    \ platform uses its default scanner configuration. |\n\n### Additional Notes\n\
    - **IP Filtering**: The action automatically filters out internal/private IP addresses,\
    \ only performing scans for global (public) IP entities.\n- **Asynchronous Polling**:\
    \ Although the action logic includes a polling loop, it is marked as asynchronous\
    \ in the configuration. Users should ensure the script timeout in the Google SecOps\
    \ IDE is sufficient for the scanners to complete their analysis.\n- **Data Enrichment**:\
    \ Results are written to the entity's `additional_properties`, specifically updating\
    \ `Houdin-io_Threat_Score`, `Houdin-io_AI_Analysis`, and `Houdin-io_Analysis_sources`.\n\
    \n### Flow Description\n1. **Entity Identification**: The action iterates through\
    \ target entities and selects those matching compatible types: URL, Domain, FileHash,\
    \ or Public IP Address.\n2. **Scan Initiation**: For each compatible entity, the\
    \ action sends a POST request to the Houdin.io API to launch a new scan job, passing\
    \ the optional `scanOn` parameters if configured.\n3. **Result Polling**: The\
    \ action enters a polling phase, periodically sending GET requests to retrieve\
    \ the status and final results of the initiated scans.\n4. **Intelligence Extraction**:\
    \ Upon scan completion, the action parses the response to extract the Mesmer global\
    \ threat score (normalized to a /10 scale) and the AI-generated analysis summary.\n\
    5. **Internal Update**: The action updates the `additional_properties` of the\
    \ successful entities with the retrieved intelligence and calls the internal update\
    \ method to persist these changes in Google SecOps.\n6. **Output Generation**:\
    \ Finally, the action produces a JSON result containing the full raw scan data\
    \ for each processed entity and ends with a summary message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      The action performs a POST request to the Houdin.io API to create and launch
      new scan jobs for the provided entities.
    fetches_data: true
    internal_data_mutation_explanation: null
