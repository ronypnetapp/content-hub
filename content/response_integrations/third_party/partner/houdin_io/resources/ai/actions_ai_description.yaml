    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Houdin.io API to initiate a new scan
      job, which creates a new scan resource and consumes platform credits/quota.
    fetches_data: true
    internal_data_mutation_explanation: null
