Create a Case:
  ai_description: >-
    ### General Description

    This action creates a case or incident in the Torq platform by triggering a specific
    Torq workflow via a Webhook. It automatically collects the current alert's metadata,
    including entity details and raw data, and packages it into a JSON payload sent
    to Torq. If Torq API credentials or a Bearer token are configured, the action
    will also poll the Torq Public API to retrieve the final execution status and
    output of the triggered workflow, providing the results directly within Google
    SecOps.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | **Deduplication Key** | An optional idempotency key used by Torq to prevent
    the creation of duplicate cases for the same event. | string | No | "" |

    | **Correlation Key** | An optional key used to group related cases or incidents
    within the Torq platform. | string | No | "" |

    | **Poll Max Seconds** | The maximum duration (in seconds) the action will wait
    and poll the Torq API for the workflow's final result. | string | No | "60" |

    | **Poll Interval Seconds** | The frequency (in seconds) at which the action will
    check the Torq API for the workflow status. | string | No | "3" |


    ### Additional Notes

    - The action requires a **Torq URL** and **Webhook Secret** to be configured in
    the integration settings.

    - To enable polling for the final workflow output, you must provide either **Client
    ID/Secret** (for OAuth) or a **Bearer Token (override)** in the integration configuration.

    - If polling is not configured or fails, the action will still succeed if the
    initial webhook trigger was accepted by Torq.


    ### Flow Description

    1. **Data Collection:** The action gathers context from the current Google SecOps
    case (Case ID, Environment) and the specific alert (Severity, Product, Vendor,
    Entities, and Raw Data).

    2. **Payload Construction:** It builds a JSON payload containing the source ("Google
    SecOps"), the action type ("create_case"), and the collected alert/case context.

    3. **Webhook Trigger:** It sends a POST request to the Torq Webhook URL, authenticated
    via the "secret" header.

    4. **Execution Tracking:** Upon a successful trigger, it extracts the `execution_id`
    from the Torq response.

    5. **Polling (Optional):** If API credentials are available, it enters a polling
    loop, querying the Torq Public API for the status of the execution ID until it
    reaches a terminal state (e.g., SUCCESS, FAILED) or the timeout is reached.

    6. **Result Reporting:** The final status, execution details, and any output returned
    by the Torq workflow are attached to the action's JSON result in Google SecOps.
