Run a Workflow:
  ai_description: >-
    ### General Description

    This action triggers a Torq workflow by sending a POST request to a configured
    Torq webhook. It is designed to bridge Google SecOps with Torq's automation capabilities,
    allowing users to pass custom JSON data and optionally include the full context
    of the current alert (including metadata and entities) to the workflow. If Torq
    API credentials (Client ID/Secret or a Bearer Token) are provided in the integration
    configuration, the action will also poll the Torq Public API to retrieve the final
    execution status and output, providing a synchronous-like experience for asynchronous
    workflow executions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Workflow Input** | String (JSON) | Yes | A JSON object containing the data
    to be passed into the Torq workflow. Must be a valid JSON dictionary. |

    | **Include Alert Payload** | Boolean | No | If set to `True`, the action retrieves
    the current alert's details (identifier, name, severity, entities, etc.) and includes
    them in the request payload under the 'alert' key. |

    | **Poll Max Seconds** | String | No | The maximum amount of time (in seconds)
    the action should wait and poll the Torq API for the workflow's completion. Defaults
    to 60 seconds. |

    | **Poll Interval Seconds** | String | No | The frequency (in seconds) at which
    the action checks the Torq API for the execution status. Defaults to 3 seconds.
    |


    ### Additional Notes

    - To enable polling for execution results, the Torq integration must be configured
    with either `Client ID` and `Client Secret` or a `Bearer Token (override)`. Without
    these, the action will only trigger the workflow and return the initial webhook
    response.

    - The action uses a 'best-effort' approach to collect alert data, attempting to
    find the current alert or falling back to the first alert in the case.


    ### Flow Description

    1. **Configuration Retrieval:** The action reads the Torq URL, Webhook Secret,
    and API credentials from the integration settings.

    2. **Payload Construction:** It builds a JSON payload containing the user-provided
    `Workflow Input`, minimal case context (Case ID, Environment), and the alert payload
    if `Include Alert Payload` is enabled.

    3. **Workflow Trigger:** It sends a POST request to the Torq Webhook URL. If the
    request is successful, it extracts the `execution_id` from the response.

    4. **Polling (Optional):** If an `execution_id` is found and API credentials are
    available, the action enters a polling loop. It repeatedly queries the Torq Public
    API for the status of the execution until it reaches a terminal state (e.g., SUCCESS,
    FAILED) or the `Poll Max Seconds` threshold is met.

    5. **Result Processing:** The action captures the final execution output and status,
    attaching the full JSON response to the action results in Google SecOps.
