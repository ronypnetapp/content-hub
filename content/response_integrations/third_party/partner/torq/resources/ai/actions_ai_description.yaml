Ping:
  ai_description: >-
    ### General Description

    Sends a ping request to a Torq workflow via a Webhook and optionally polls the
    Torq Public API to retrieve the execution result. This action is primarily used
    to verify connectivity between Google SecOps and Torq, and to trigger automated
    workflows within the Torq platform.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default |

    | :--- | :--- | :--- | :--- | :--- |

    | Poll Max Seconds | The maximum amount of time (in seconds) the action will wait
    for the Torq workflow execution to reach a terminal state. | String | No | 60
    |

    | Poll Interval Seconds | The interval (in seconds) between successive requests
    to the Torq API to check the status of the execution. | String | No | 3 |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches integration settings, including
    the Webhook URL, Secret, and API credentials (Client ID/Secret or Bearer Token).

    2. **Payload Preparation**: A JSON payload is constructed containing the source
    ("Google SecOps"), the action name ("ping"), and context from the current case
    (Case ID, Name, Environment).

    3. **Webhook Trigger**: The action sends a POST request to the Torq Webhook URL
    with the provided secret.

    4. **Execution Identification**: It parses the response to extract an `execution_id`.

    5. **Polling (Optional)**: If an execution ID is found and polling parameters
    are set, the action repeatedly queries the Torq Public API for the execution's
    status (e.g., SUCCESS, FAILED).

    6. **Result Reporting**: The final execution status, output data, and full API
    response are attached to the action result in Google SecOps.


    ### Additional Notes

    - This action is named "Ping" and is excluded from enrichment categorization.

    - To enable polling, the integration must be configured with either OAuth credentials
    or a Bearer Token override.

    - If the Webhook response does not contain an execution ID, polling is skipped.
