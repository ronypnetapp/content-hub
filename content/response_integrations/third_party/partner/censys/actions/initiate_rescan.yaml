name: Initiate Rescan
description: This action initiates a live rescan for a known host service at a specific
    IP and port or hostname and port. The scan may take several minutes to complete
    and returns a scan ID that can be used to monitor the scan's status.
integration_identifier: Censys
parameters:
-   name: IOC Type
    default_value: Service
    type: ddl
    optional_values:
    - Service
    - Web Origin
    description: Initiate a rescan for a known IP or domain.
    is_mandatory: true
-   name: IOC Value
    default_value: ''
    type: string
    description: IP address or domain name to initiate a rescan.
    is_mandatory: true
-   name: Port
    default_value: '443'
    type: string
    description: Port associated with IP or domain. Valid range is 1 to 65535.
    is_mandatory: true
-   name: Protocol
    default_value: ''
    type: string
    description: Name of service protocol (Required for SERVICE_ID_OBJECT).
    is_mandatory: false
-   name: Transport Protocol
    default_value: Unknown
    type: ddl
    optional_values:
    - Unknown
    - TCP
    - UDP
    - ICMP
    - QUIC
    description: Transport Protocol of service (Required for SERVICE_ID_OBJECT).
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/initiate_rescan_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
script_result_name: ScriptResult
