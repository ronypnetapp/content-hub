name: Enrich Web Properties
description: This action retrieves comprehensive information about a web property
    (domain/hostname(IP Address)) using the Censys Platform API. Web properties are
    identified using a combination of a hostname and port (e.g., platform.censys.io:80).
    It provides detailed intelligence about web-facing assets including HTTP/HTTPS
    services, certificates, technologies, and security configurations.
integration_identifier: Censys
parameters:
-   name: Port
    default_value: 80, 443
    type: string
    description: Comma separated ports associated with domain or hostname
    is_mandatory: true
-   name: At Time
    default_value: ''
    type: string
    description: RFC3339 Timestamp to view all requested hosts at a specific point
        in time. Ensure that you suffix the date with T00:00:00Z or a specific time.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_web_properties_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: 322ce0cd-9b16-4871-8c2d-134b55f8317f
script_result_name: ScriptResult
