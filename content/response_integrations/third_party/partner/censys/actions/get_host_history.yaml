name: Get Host History
description: This action retrieves the event history for a host (IP address). It allows
    users to view historical scan data, track infrastructure changes over time, and
    identify when services were added, removed, or modified.
integration_identifier: Censys
parameters:
-   name: Host ID
    default_value: ''
    type: string
    description: The IP address of a host.
    is_mandatory: true
-   name: Start Time
    default_value: ''
    type: string
    description: Start time of the host timeline. Must be a valid RFC3339 string 
        (e.g., 2025-01-01T00:00:00Z). It should be less than the end time.
    is_mandatory: true
-   name: End Time
    default_value: ''
    type: string
    description: End time of the host timeline. Must be a valid RFC3339 string 
        (e.g., 2025-01-02T00:00:00Z). It should be less than the current time.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_host_history_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
script_result_name: ScriptResult
