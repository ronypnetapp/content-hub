name: Enrich IPs
description: This action retrieves comprehensive information about multiple hosts
    (IP address) using the Censys Platform API. It provides detailed intelligence
    about internet-facing infrastructure including services, ports, protocols, certificates,
    vulnerabilities, and location data to help security teams understand their attack
    surface exposure.
integration_identifier: Censys
parameters:
-   name: At Time
    default_value: ''
    type: string
    description: RFC3339 Timestamp to view all requested hosts at a specific point
        in time. Ensure that you suffix the date with T00:00:00Z or a specific time.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_ips_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: 322ce0cd-9b16-4871-8c2d-134b55f8317f
script_result_name: ScriptResult
