name: Get Related Infrastructure Results
description: 'This action retrieves the detailed pivot results from a completed CensEye job, formats them into a table with 5 columns, and generates Censys search URLs for each pivot. Maximum 50 results per job. Learn more about CensEye in the Censys documentation: https://docs.censys.com/docs/platform-threat-hunting-use-censeye-to-build-detections'
integration_identifier: Censys
parameters:
  - name: Job ID
    default_value: ''
    type: string
    description: The unique identifier of the completed CensEye job.
    is_mandatory: true
dynamic_results_metadata:
  - result_example_path: resources/get_related_infrastructure_results_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
script_result_name: ScriptResult
