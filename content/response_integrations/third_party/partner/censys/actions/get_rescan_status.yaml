name: Get Rescan Status
description: This action retrieves the current status of a scan by its ID. It allows
    users to monitor the progress of previously initiated scans and determine when
    scan results are available.
integration_identifier: Censys
parameters:
-   name: Scan ID
    default_value: ''
    type: string
    description: The unique identifier of the tracked scan.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_rescan_status_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
is_async: true
script_result_name: ScriptResult
