name: Get Related Infrastructure Job Status
description: 'This action retrieves the current status of a CensEye job by its ID. It supports async execution and will return IN_PROGRESS status if the job is still running, allowing playbooks to poll until completion. Learn more about CensEye in the Censys documentation: https://docs.censys.com/docs/platform-threat-hunting-use-censeye-to-build-detections'
integration_identifier: Censys
parameters:
  - name: Job ID
    default_value: ''
    type: string
    description: The unique identifier of the CensEye job to check status for.
    is_mandatory: true
dynamic_results_metadata:
  - result_example_path: resources/get_related_infrastructure_job_status_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
is_async: true
script_result_name: ScriptResult
