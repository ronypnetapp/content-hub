name: Create Related Infrastructure Job
description: 'This action initiates a CensEye job to discover related infrastructure for a given target (host, web property, or certificate). The job runs asynchronously and returns a job ID that can be used to monitor status and retrieve results. Learn more about CensEye in the Censys documentation: https://docs.censys.com/docs/platform-threat-hunting-use-censeye-to-build-detections'
integration_identifier: Censys
parameters:
  - name: Target Type
    default_value: Host
    type: ddl
    optional_values:
      - Host
      - Web Property
      - Certificate
    description: The type of asset to analyze for related infrastructure.
    is_mandatory: true
  - name: Target Value
    default_value: ''
    type: string
    description: |
      The actual value to analyze:
      - Host: IP address (e.g., "14.84.5.68")
      - Web Property: domain:port (e.g., "example.com:443")
      - Certificate: SHA-256 fingerprint (64 hex characters)
    is_mandatory: true
dynamic_results_metadata:
  - result_example_path: resources/create_related_infrastructure_job_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
script_result_name: ScriptResult
