[project]
name = "Censys"
version = "3.0"
description = "Strengthen your security posture by integrating Censys with Google SecOps SOAR. This integration enables automated threat intelligence workflows, faster incident investigation through rich contextual insights from your Censys environment. Support Contact: support@censys.com"
requires-python = ">=3.11"
dependencies = [
    "environmentcommon",
    "requests>=2.32.4",
    "tipcommon",
]


[tool.uv.sources]
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.2.22-py2.py3-none-any.whl" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.2.22-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "integration-testing",
    "pytest>=9.0.2",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
