Get Host History:
  ai_description: >-
    ### General Description

    This action retrieves the event history for a specific host (IP address) from
    the Censys platform. It allows security analysts to view historical scan data,
    track infrastructure changes over time, and identify when specific services were
    added, modified, or removed. The action is particularly useful for forensic investigations
    and monitoring the evolution of an asset's exposure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Host ID** | string | Yes | The IP address of the host for which you want to
    retrieve the history. |

    | **Start Time** | string | Yes | The beginning of the timeline range. Must be
    a valid RFC3339 string (e.g., `2025-01-01T00:00:00Z`). This should be chronologically
    earlier than the End Time. |

    | **End Time** | string | Yes | The end of the timeline range. Must be a valid
    RFC3339 string (e.g., `2025-01-02T00:00:00Z`). This should be chronologically
    later than the Start Time and earlier than the current time. |


    ### Flow Description

    1. **Parameter Extraction and Validation**: The action extracts the Host ID, Start
    Time, and End Time. It validates that the Host ID is a valid IP address and that
    both timestamps conform to the RFC3339 standard.

    2. **API Initialization**: It initializes the Censys API Manager using the provided
    integration credentials (API Key and Organization ID).

    3. **Data Retrieval**: The action performs a series of paginated `GET` requests
    to the Censys Host Timeline endpoint. It automatically handles time-based pagination
    using the `scanned_to` cursor provided by the API.

    4. **Pagination Limits**: To ensure performance, the action retrieves a maximum
    of 1,000 records or performs up to 10 pagination calls. It also monitors the total
    payload size to prevent exceeding system limits.

    5. **Data Modeling**: Each retrieved event is processed through the `HostHistoryEventModel`,
    which parses resource types (e.g., service scans, DNS resolutions, WHOIS updates)
    and generates direct links to the Censys platform for historical viewing.

    6. **Result Output**: The full event history is attached as a JSON result. Additionally,
    a data table named "Host History Events" is created to display the first 1,000
    events directly in the SOAR interface.


    ### Additional Notes

    - If the API returns a partial data error during pagination, the action will still
    return the events collected up to that point along with a warning message.

    - The action implements a chronological-to-reverse-chronological mapping to align
    user input with the Censys API's internal timeline logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
