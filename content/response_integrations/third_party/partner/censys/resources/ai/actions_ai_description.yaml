Get Rescan Status:
  ai_description: "### General Description\nRetrieves the current status of a scan\
    \ in Censys using its unique Scan ID. This action is primarily used to monitor\
    \ the progress of scans initiated via the 'Initiate Rescan' action. It supports\
    \ asynchronous execution, allowing the playbook to poll until the scan reaches\
    \ a terminal state (Completed or Failed).\n\n### Parameters Description\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Scan ID\
    \ | String | Yes | The unique identifier of the tracked scan. |\n\n### Additional\
    \ Notes\nThis action does not run on entities. It is a utility for process monitoring\
    \ and is designed to be used in an asynchronous loop within a playbook to wait\
    \ for scan results to become available.\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: Retrieves the `Scan ID` from the input parameters and validates\
    \ that it is not empty.\n2. **API Interaction**: Connects to the Censys API and\
    \ calls the GET endpoint for the specific scan ID.\n3. **Status Evaluation**:\
    \ Analyzes the API response to check for the presence and value of the `completed`\
    \ field.\n4. **Execution State Management**: \n    - If the `completed` field\
    \ is missing, the action returns an `IN_PROGRESS` state.\n    - If `completed`\
    \ is `True`, the action returns `COMPLETED`.\n    - If `completed` is `False`,\
    \ the action returns `FAILED`.\n5. **Data Output**: Adds the full API response\
    \ as a JSON result for use in subsequent playbook steps."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
