Initiate Rescan:
  ai_description: >-
    ### General Description

    This action initiates a live rescan for a specific host service or web origin
    on the Censys platform. It allows users to trigger an immediate update of Censys's
    data for a particular IP/Port or Hostname/Port combination. The action returns
    a `tracked_scan_id`, which can be used to monitor the progress and eventual results
    of the scan.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC Type** | DDL | Yes | Specifies the type of target to rescan. Options are
    'Service' (for IP-based services) or 'Web Origin' (for hostname-based services).
    |

    | **IOC Value** | String | Yes | The target identifier. This should be an IP address
    if 'IOC Type' is 'Service', or a domain/hostname if 'IOC Type' is 'Web Origin'.
    |

    | **Port** | String | Yes | The port associated with the service (e.g., 443).
    Valid range is 1 to 65535. Default is '443'. |

    | **Protocol** | String | No | The name of the service protocol (e.g., 'http',
    'ssh'). This is **mandatory** if 'IOC Type' is set to 'Service'. |

    | **Transport Protocol** | DDL | No | The transport layer protocol (e.g., TCP,
    UDP). Default is 'Unknown'. |


    ### Additional Notes

    - If 'IOC Type' is 'Service', the 'IOC Value' must be a valid IP address and the
    'Protocol' parameter must be provided.

    - The scan may take several minutes to complete on the Censys side.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the target details (Type, Value,
    Port, Protocol) from the user input.

    2. **Validation:** It validates that the port is a valid integer and, if the type
    is 'Service', ensures the value is a valid IP and a protocol is specified.

    3. **API Request:** The action sends a POST request to the Censys `/v3/global/scans/rescan`
    endpoint with the target configuration.

    4. **Response Processing:** It parses the API response to extract the `tracked_scan_id`,
    creation time, and task count.

    5. **Completion:** The action outputs the scan ID and status message, providing
    the raw JSON response for further automation steps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new live rescan task on the Censys platform for the specified target,
      which creates a new scan job in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
