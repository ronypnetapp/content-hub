Enrich Certificates:
  ai_description: >-
    ### General Description

    This action retrieves comprehensive information about SSL/TLS certificates using
    the Censys Platform API. It identifies certificates by their SHA-256 fingerprint
    and provides detailed intelligence including issuer, subject, validity periods,
    and Subject Alternative Names (SANs).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. It relies
    on the global integration configuration (API Key, Organization ID, and Verify
    SSL). |


    ### Additional Notes

    This action specifically targets FILEHASH entities. The identifiers must be valid
    SHA-256 fingerprints (64 hex characters). If an entity identifier is not a valid
    fingerprint, it will be skipped.


    ### Flow Description

    1. **Initialization**: The action initializes the Censys API manager using the
    integration's global configuration.

    2. **Entity Selection**: It identifies all `FILEHASH` entities within the current
    scope.

    3. **Validation**: It validates that the entity identifiers are valid SHA-256
    fingerprints (exactly 64 hexadecimal characters).

    4. **API Request**: It performs a batch POST request to the Censys `/v3/global/asset/certificate`
    endpoint.

    5. **Data Processing**: For each matching certificate found, it extracts metadata
    such as Subject DN, Issuer DN, Common Name, and Validity dates.

    6. **Internal Update**: It clears any existing Censys enrichment data on the entity,
    updates the entity's additional properties with the new data, and marks the entity
    as enriched.

    7. **Completion**: The action returns a summary message and the full raw JSON
    results for the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with certificate metadata (e.g., issuer,
      subject, validity) and sets the 'is_enriched' attribute to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich IPs:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the Censys Platform API. This action retrieves
    comprehensive intelligence about internet-facing infrastructure, including active
    services, open ports, protocols, SSL/TLS certificates, known vulnerabilities,
    and geographic location data. It is designed to help security teams understand
    the attack surface exposure of specific IP addresses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | At Time | String | No | An RFC3339 formatted timestamp (e.g., `2024-01-15T00:00:00Z`)
    used to retrieve historical host data from a specific point in time. If omitted,
    the most recent data is returned. |


    ### Additional Notes

    - This action specifically targets `ADDRESS` entities. Other entity types in the
    scope will be ignored.

    - The action performs a batch request to Censys for all valid IP addresses found
    in the scope to optimize API usage.

    - Existing Censys-specific enrichment data on the entity is cleared before new
    data is applied to ensure accuracy.


    ### Flow Description

    1. **Initialization**: The action initializes the Censys API manager using the
    integration's API Key and Organization ID.

    2. **Entity Filtering**: It identifies all `ADDRESS` entities within the current
    SOAR scope.

    3. **Validation**: It validates the format of the IP addresses and the optional
    `At Time` timestamp parameter.

    4. **API Request**: A POST request is sent to the Censys `/v3/global/asset/host`
    endpoint with the list of valid IP addresses.

    5. **Data Processing**: For each IP found in the Censys database, the action parses
    the response into a structured data model, extracting fields such as ASN, location,
    service counts, and threat labels.

    6. **Internal Mutation**: It updates the entity's `additional_properties` with
    the retrieved intelligence and sets the `is_enriched` flag to `true`.

    7. **Completion**: The action returns a summary message indicating how many IPs
    were successfully enriched, not found, or failed to process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Censys enrichment data and sets the
      'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich Web Properties:
  ai_description: >-
    Enriches IP Address and Domain entities using the Censys Platform API to retrieve
    detailed web property intelligence. The action identifies assets by combining
    hostnames or IP addresses with specific ports to provide context on web-facing
    services, including HTTP/HTTPS configurations, SSL/TLS certificates, and detected
    software technologies.


    ### Parameters

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Port | String | Yes | 80, 443 | A comma-separated list of ports associated with
    the domain or hostname (e.g., '80, 443, 8080'). |

    | At Time | String | No | N/A | An RFC3339 formatted timestamp (e.g., '2023-10-01T00:00:00Z')
    used to retrieve historical data for the requested hosts at a specific point in
    time. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the list of ports and the optional historical
    timestamp from the action configuration.

    2. **Entity Filtering:** Identifies valid `ADDRESS` (IP) and `DOMAIN` entities
    within the current SOAR scope.

    3. **Identifier Construction:** For every valid entity, it generates a unique
    web property identifier for each specified port (e.g., `1.1.1.1:80`, `example.com:443`).

    4. **External API Query:** Performs a bulk lookup via the Censys API to fetch
    enrichment data for all constructed web property identifiers.

    5. **Internal Data Update:** For each successful match, it clears existing Censys
    enrichment data for that specific port, updates the entity's additional properties
    with new metadata (software, certificates, scan times), and marks the entity as
    enriched.

    6. **Result Reporting:** Updates the entities in the SOAR platform and returns
    a JSON result containing the full raw data for each enriched property.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with web property details such as service
      information, software versions, and certificate fingerprints. It also sets the
      'is_enriched' flag to true and clears previous enrichment values for the specific
      ports being processed to ensure data freshness.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - DOMAIN
    filters_by_additional_properties: false
