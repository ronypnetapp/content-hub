Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ used to verify the connectivity between the Google SecOps SOAR platform and\
    \ the Censys API. It ensures that the integration is correctly configured with\
    \ valid credentials and that the SOAR server can communicate with the Censys platform\
    \ over the network.\n\n### Parameters Description\nThis action does not have any\
    \ input parameters. It relies entirely on the integration's global configuration\
    \ parameters:\n* **API Key**: The credential used for authentication.\n* **Organization\
    \ Id**: The specific Censys organization identifier.\n* **Verify SSL**: A boolean\
    \ flag determining whether to validate SSL certificates during the connection.\n\
    \n### Flow Description\n1. **Parameter Extraction**: The action retrieves the\
    \ `API Key`, `Organization Id`, and `Verify SSL` settings from the integration\
    \ configuration.\n2. **Manager Initialization**: It initializes the `APIManager`\
    \ with the retrieved credentials and settings.\n3. **Connectivity Test**: The\
    \ action calls the `test_connectivity` method, which executes a `GET` request\
    \ to the Censys organization endpoint (`/v3/accounts/organizations/{organization_id}`).\n\
    4. **Status Evaluation**: \n    * If the API call is successful, the action concludes\
    \ with a success message and a positive connectivity result.\n    * If an exception\
    \ occurs (e.g., 401 Unauthorized, 404 Not Found, or network timeout), the error\
    \ is caught, logged, and the action returns a failure message with a negative\
    \ connectivity result."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
