Ping:
  ai_description: >-
    ### General Description

    This action is designed to verify the connectivity between Google SecOps and the
    Netenrich Resolution Intelligence Cloud. It serves as a diagnostic tool to ensure
    that the integration is correctly configured and that the external API endpoint
    is reachable using the provided credentials.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | RI Inbound Webhook URL | String | Yes | (Configuration Parameter) The base URL
    for the Netenrich inbound webhook. It must include a `{token}` placeholder which
    is dynamically replaced during execution. |

    | Token | String | Yes | (Configuration Parameter) The authentication token required
    to authorize the request to the Netenrich service. |

    | Verify SSL | Boolean | No | (Configuration Parameter) Determines whether the
    action should verify the SSL certificate of the target server. Defaults to `True`.
    |


    ### Additional Notes

    * This action does not take any input parameters directly; it relies entirely
    on the integration's configuration settings.

    * A successful connection is identified if the external service returns an HTTP
    status code of 200 or 400.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the `RI Inbound Webhook URL`,
    `Token`, and `Verify SSL` settings from the integration configuration.

    2. **URL Construction:** It replaces the `{token}` placeholder in the webhook
    URL with the actual authentication token.

    3. **Connectivity Test:** It performs an HTTP POST request with an empty JSON
    body to the constructed URL.

    4. **Response Validation:** The action evaluates the HTTP response status code.
    If the code is 200 or 400, the connection is considered successful.

    5. **Result Reporting:** It outputs a success message if reachable, or a failure
    message with the specific error or status code if the connection fails.
