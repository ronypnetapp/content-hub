Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connection
    between Google SecOps and the Wiz platform. Its primary purpose is to ensure that
    the integration's configuration parameters, such as the API Root, Client ID, and
    Client Secret, are correct and that the environment can successfully communicate
    with the Wiz API.


    ### Parameters

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration settings.


    ### Additional Notes

    - This action does not process any entities.

    - It performs a read-only operation and has no impact on the data stored in Wiz.

    - According to standard SOAR practices, Ping actions are not categorized as enrichment.


    ### Flow Description

    1. **Client Initialization**: The action initializes the Wiz API client using
    the global integration parameters (API Root, Client ID, Client Secret, and SSL
    verification settings).

    2. **Authentication**: It performs an OAuth2 handshake with the Wiz authentication
    server to obtain a bearer token.

    3. **Connectivity Test**: The action executes a minimal GraphQL query (fetching
    the ID of a single issue) to the Wiz `/graphql` endpoint to verify that the token
    is valid and the API is responsive.

    4. **Response Validation**: The action checks the HTTP status code and the GraphQL
    response body. If successful, it returns a confirmation message; otherwise, it
    raises an error with details about the failure.
