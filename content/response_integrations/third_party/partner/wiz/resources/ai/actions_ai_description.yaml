Get Issue Details:
  ai_description: >-
    ### General Description

    The **Get Issue Details** action retrieves comprehensive information about a specific
    security issue within the Wiz platform. It is designed to provide security analysts
    with detailed context regarding vulnerabilities, misconfigurations, or threats
    identified by Wiz, including resource metadata and project associations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the Wiz issue to retrieve.
    This ID is used to query the Wiz GraphQL API for specific issue metadata. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Issue ID` from the input
    parameters.

    2. **API Client Initialization**: It initializes the Wiz API client using the
    integration's configuration (API Root, Client ID, and Client Secret) and authenticates
    via OAuth2 to obtain a bearer token.

    3. **GraphQL Query Construction**: The action builds a GraphQL query specifically
    targeting the provided `Issue ID`. It requests fields such as status, severity,
    description, creation/resolution timestamps, and an `entitySnapshot` which includes
    cloud platform details (region, subscription, etc.).

    4. **Data Retrieval**: The query is sent to the Wiz `/graphql` endpoint via a
    POST request.

    5. **Result Output**: The action parses the response, converts the issue data
    into a structured JSON format, and returns it as the action result.


    ### Additional Notes

    - This is a read-only action and does not perform any mutations in the Wiz environment.

    - If the specified `Issue ID` is invalid or does not exist, the action will return
    an explicit 'Issue not found' error.
