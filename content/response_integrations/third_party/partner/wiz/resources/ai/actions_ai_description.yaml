Add Comment To Issue:
  ai_description: >-
    ### General Description

    The **Add Comment To Issue** action allows users to append a text comment (note)
    to a specific issue within the Wiz platform. This is primarily used for documenting
    investigation steps, providing updates, or collaborating on security findings
    directly from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the target issue in Wiz
    where the comment will be added. |

    | **Comment** | String | Yes | The actual text content of the comment to be posted
    to the issue. |


    ### Additional Notes

    - This action uses the Wiz GraphQL API (`createIssueNote` mutation) to perform
    the update.

    - If the provided **Issue ID** does not exist in Wiz, the action will return an
    error indicating the issue was not found.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Issue ID` and `Comment`
    text from the user input.

    2. **API Initialization**: It initializes the Wiz API client and authenticates
    using the configured credentials (Client ID and Client Secret).

    3. **Mutation Construction**: The action builds a GraphQL mutation payload using
    the `AddCommentThreadMutationBuilder`, mapping the `Issue ID` and `Comment` to
    the `createIssueNote` input.

    4. **Execution**: A POST request is sent to the Wiz GraphQL endpoint with the
    mutation payload.

    5. **Result Processing**: The action parses the response from Wiz, confirms the
    successful creation of the note, and returns the comment details as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment (note) to an existing issue in the Wiz platform via a GraphQL
      mutation.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
