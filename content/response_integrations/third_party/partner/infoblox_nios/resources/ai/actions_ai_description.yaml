Update RPZ CNAME Rule:
  ai_description: >-
    Updates an existing Response Policy Zone (RPZ) CNAME rule in Infoblox NIOS to
    modify DNS behavior. This action allows for the modification of rule types, names,
    and associated metadata for existing DNS security policies.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Reference ID | String | Yes | The unique reference ID of the existing RPZ rule
    to be updated. |

    | Rule Type | DDL | Yes | The behavior of the rule. Options include: 'Passthru',
    'Block (No such Domain)', 'Block (No data)', and 'Substitute (Domain name)'. |

    | Name | String | Yes | The rule name in FQDN format. |

    | RP Zone | String | Yes | The Response Policy Zone to which the rule belongs.
    |

    | Comment | String | No | An optional comment describing the rule or the update.
    |

    | Substitute Name | String | No | The substitute domain name to assign. This is
    mandatory if the 'Rule Type' is set to 'Substitute (Domain name)'. |

    | View | String | No | The DNS view where the records are located. Defaults to
    'default'. |

    | Additional Parameters | String | No | A JSON object string containing any additional
    Infoblox WAPI parameters for the rule update. |


    ### Additional Notes

    - If 'Rule Type' is 'Substitute (Domain name)', the 'Substitute Name' parameter
    must be provided.

    - The action will fail if the 'Reference ID' does not exist or if the 'Substitute
    (Domain name)' type is attempted on IP-based RPZ rules.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves all input parameters, including
    the mandatory 'Reference ID', 'Rule Type', 'Name', and 'RP Zone'.

    2. **Validation**: It validates that mandatory strings are non-empty and parses
    'Additional Parameters' if provided as a JSON string.

    3. **Logic Determination**: Based on the selected 'Rule Type', the script determines
    the correct 'canonical' value (e.g., '*' for Block (No data), 'rpz-passthru' for
    Passthru, or the 'Substitute Name' for substitution rules).

    4. **API Interaction**: The action performs a PUT request to the Infoblox WAPI
    using the provided 'Reference ID' to update the rule configuration.

    5. **Result Processing**: Upon success, the action returns the updated rule details
    in a JSON format and creates a data table named 'RPZ CNAME Rule' for the case
    wall.
