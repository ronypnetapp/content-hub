Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Infoblox NIOS\
    \ server. It ensures that the provided integration credentials (Username, Password)\
    \ and the API Root URL are correct and that the network path is open.\n\n### Parameters\
    \ Description\nThere are no specific input parameters for this action. It relies\
    \ entirely on the global integration configuration parameters:\n* **API Root**:\
    \ The base URL of the Infoblox NIOS WAPI.\n* **Username**: The account username\
    \ for authentication.\n* **Password**: The account password for authentication.\n\
    \n### Additional Notes\n* This action is typically used during the initial setup\
    \ of the Infoblox NIOS integration or for troubleshooting communication issues.\n\
    * It performs a simple `GET` request to the Infoblox schema endpoint (`/?_schema`)\
    \ to validate the connection.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify context and logs the start of the process.\n\
    2. **Parameter Retrieval**: It extracts the global integration configuration (API\
    \ Root, Username, Password).\n3. **Manager Setup**: An `APIManager` instance is\
    \ created using the retrieved credentials.\n4. **Connectivity Test**: The manager\
    \ executes a `GET` request to the Infoblox WAPI schema endpoint.\n5. **Result\
    \ Handling**: \n    * If the request is successful, it logs a success message\
    \ and sets the execution state to completed.\n    * If an exception occurs (e.g.,\
    \ authentication failure, timeout), it logs the error and sets the execution state\
    \ to failed.\n6. **Finalization**: The action ends by returning the connectivity\
    \ status and a descriptive message to the SOAR platform."
