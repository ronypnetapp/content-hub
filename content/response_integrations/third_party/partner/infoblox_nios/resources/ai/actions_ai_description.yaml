Search RPZ Rule:
  ai_description: >-
    ### General Description

    Searches for specific Response Policy Zone (RPZ) rules within Infoblox NIOS. This
    action allows users to query the Infoblox WAPI for various RPZ record types (such
    as A, CNAME, MX, or TXT) based on a rule name. It is primarily used for auditing
    existing security policies or verifying the presence of specific DNS block/allow
    rules.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object Type** | DDL | Yes | The Infoblox object type to search for. Supported
    types include `record:rpz:a`, `record:rpz:cname`, `record:rpz:txt`, etc. |

    | **Rule Name** | String | No | The full name of the rule to search for (e.g.,
    `malicious.domain.com`). |

    | **Output Fields** | String | No | A comma-separated list of specific fields
    to retrieve from the Infoblox object (e.g., `address, comment`). |

    | **Limit** | String | No | The maximum number of rule objects to return in the
    results. Defaults to 100. |


    ### Additional Notes

    - This action does **not** operate on entities from the alert context. It relies
    entirely on the manual input provided in the parameters.

    - The action automatically includes default fields (`name`, `view`) in the output
    even if not explicitly requested.

    - Results are displayed in a data table (up to 20 records) and the full raw data
    is available in the JSON result.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Root, Credentials)
    and action parameters.

    2. **Validation**: Validates the `Limit` parameter to ensure it is a positive
    integer and processes the `Output Fields` string into a list.

    3. **API Request**: Executes a paginated GET request to the Infoblox WAPI endpoint
    corresponding to the selected `Object Type` and `Rule Name`.

    4. **Data Transformation**: Parses the returned JSON data into `RPZRule` data
    models.

    5. **Output**: Adds the full result set to the action's JSON output and constructs
    a data table for the SOAR case wall showing the rule details.
