DHCP Lease Lookup:
  ai_description: >-
    ### General Description

    Retrieves DHCP lease details from Infoblox NIOS for a specific MAC address, IP
    address, or other identifiers. This action is essential for incident response
    and network forensics, as it helps identify the device and user associated with
    a specific network address at a given time. It queries the Infoblox WAPI `/lease`
    endpoint and returns detailed information about the lease's state, duration, and
    client metadata.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | string | No | The IPv4 or IPv6 address to search for in the DHCP
    leases. |

    | Hardware | string | No | The MAC address for IPv4 leases. Supports regex or
    exact search. |

    | Hostname | string | No | The hostname sent via DHCP option 12. Supports regex
    or exact search. |

    | IPv6 DUID | string | No | The IPv6 DUID identifier for IPv6 leases. Supports
    regex or exact search. |

    | Protocol | ddl | No | Filters results by protocol: BOTH, IPV4, or IPV6. Default
    is Both. |

    | Fingerprint | string | No | The DHCP client fingerprint. Supports case-insensitive
    or regex search. |

    | Username | string | No | The user associated with the lease request. Supports
    case-insensitive or regex search. |

    | Limit | string | No | Maximum number of objects to return. Default is 100. |


    ### Flow Description

    1. **Initialization**: The action initializes the API manager and extracts user-provided
    parameters.

    2. **Validation**: It validates the 'Limit' parameter to ensure it is a positive
    integer and verifies the format of the 'IP Address' if provided.

    3. **Data Retrieval**: It sends a GET request to the Infoblox NIOS `/lease` endpoint,
    applying filters for IP, MAC, hostname, DUID, fingerprint, and username as specified.

    4. **Processing**: The action iterates through the results, mapping them to a
    structured data model and preparing a subset (up to 20 records) for display in
    a data table.

    5. **Completion**: It outputs the full result set as JSON and populates the 'DHCP
    Lease Lookup Data' table in the Google SecOps UI.


    ### Additional Notes

    - This action does not automatically iterate over entities in the case scope;
    it relies on the parameters provided in the action configuration.

    - Regex search is supported for Hardware, Hostname, IPv6 DUID, Fingerprint, and
    Username parameters.
