Create RPZ NAPTR Rule:
  ai_description: >-
    Adds a NAPTR (Naming Authority Pointer) override rule in a Response Policy Zone
    (RPZ) within Infoblox NIOS. This action is used to control DNS-based service discovery
    by specifying how a domain name should be replaced or processed when multiple
    rules exist. It allows administrators to define the sequence of rule application
    and the preference for specific records.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | Specify the name of the rule to be created. |

    | RP Zone | String | Yes | The Response Policy Zone to which the rule will be
    assigned. |

    | Order | String | Yes | Defines the sequence of rule application when multiple
    rules exist. Must be a non-negative integer. |

    | Preference | String | Yes | The preference value for the NAPTR record. Must
    be a non-negative integer. |

    | Replacement | String | Yes | Specifies the next domain name to look up for non-terminal
    NAPTR records. |

    | Comment | String | No | An optional comment or description for the rule. |

    | Additional Parameters | String | No | A JSON object containing any additional
    WAPI parameters required for the rule creation. |


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves the configuration (API Root,
    credentials) and action parameters (Name, RP Zone, Order, Preference, Replacement,
    etc.).

    2.  **Validation:** It validates that mandatory strings are non-empty and that
    'Order' and 'Preference' are valid non-negative integers within the allowed range
    (0-65535). It also ensures 'Additional Parameters' is a valid JSON object if provided.

    3.  **API Interaction:** The action connects to the Infoblox NIOS API and performs
    a POST request to the `record:rpz:naptr` endpoint to create the rule.

    4.  **Result Processing:** Upon success, the action returns the raw JSON response
    from Infoblox and constructs a data table displaying the created rule's details
    (Reference ID, Name, RP Zone, Replacement, etc.).
