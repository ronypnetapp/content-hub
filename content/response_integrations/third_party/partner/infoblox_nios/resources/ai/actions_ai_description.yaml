Create RPZ AAAA Rule:
  ai_description: >-
    Creates a Response Policy Zone (RPZ) AAAA rule in Infoblox NIOS. This action allows
    for DNS redirection or blocking by mapping a domain name or an IPv6 address to
    a substitute IPv6 address. It is primarily used for security enforcement within
    a DNS environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Type | DDL | Yes | Determines if the rule is for a 'Domain Name' or an
    'IP Address'. This affects the underlying Infoblox record type created. |

    | Name | String | Yes | The name of the rule (e.g., the domain or IP address to
    be intercepted). |

    | RP Zone | String | Yes | The specific Response Policy Zone where the rule will
    be created. |

    | IPv6 Address | String | Yes | The substitute IPv6 address that the DNS query
    will be redirected to. |

    | Comment | String | No | An optional description or note for the rule. |

    | Additional Parameters | String | No | A JSON-formatted string containing extra
    parameters supported by the Infoblox WAPI for record creation. |


    ### Flow Description


    1. **Initialization**: The action retrieves integration configuration (API Root,
    credentials) and user-provided parameters.

    2. **Validation**: It validates that mandatory strings are non-empty, ensures
    the 'IPv6 Address' is a valid IPv6 format, and parses 'Additional Parameters'
    if provided.

    3. **Logic Branching**: Based on the 'Object Type' selection, it selects the appropriate
    Infoblox API identifier and record type (either a standard AAAA record or an IP-address-based
    AAAA record).

    4. **External Interaction**: It performs a POST request to the Infoblox WAPI to
    create the new RPZ rule.

    5. **Output**: Upon success, it adds the raw JSON response to the action results
    and constructs a data table displaying the rule's reference ID, name, and assigned
    zone.
