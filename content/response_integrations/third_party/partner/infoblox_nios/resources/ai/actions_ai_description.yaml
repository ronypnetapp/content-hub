Create RPZ A Rule:
  ai_description: >-
    ### General Description

    The **Create RPZ A Rule** action allows users to create a Response Policy Zone
    (RPZ) Substitute rule within Infoblox NIOS. This rule maps a specific domain name
    (A record) or an IPv4 address to a substitute IPv4 address. This is primarily
    used for DNS redirection, sinkholing, or blocking access to malicious destinations
    by providing an alternative IP response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object Type** | DDL | Yes | Determines the type of record to create. Options
    are `IP Address` or `Domain Name`. |

    | **Name** | String | Yes | The name or FQDN of the rule to be created. |

    | **RP Zone** | String | Yes | The specific Response Policy Zone where the rule
    will be assigned. |

    | **IPv4 Address** | String | Yes | The substitute IPv4 address that will be returned
    by the DNS server for this rule. |

    | **Comment** | String | No | An optional descriptive comment for the rule. |

    | **Additional Parameters** | String | No | A JSON-formatted string containing
    extra parameters for the Infoblox WAPI request. |


    ### Flow Description

    1.  **Parameter Extraction:** The action retrieves the configuration and action
    parameters, including the object type, rule name, target zone, and substitute
    IP.

    2.  **Validation:** It validates that the `Name` and `RP Zone` are non-empty,
    the `IPv4 Address` is a valid IPv4 format, and the `Additional Parameters` (if
    provided) is a valid JSON object.

    3.  **API Preparation:** Based on the `Object Type`, it selects the appropriate
    Infoblox WAPI endpoint (`record:rpz:a` for domains or `record:rpz:a:ipaddress`
    for IPs).

    4.  **Rule Creation:** It constructs the request body, ensuring the rule name
    is correctly formatted with the zone suffix, and sends a POST request to the Infoblox
    API.

    5.  **Result Processing:** Upon success, it parses the API response, creates a
    data table named 'RPZ A Rule' with the record details, and returns the raw JSON
    result.
