Create RPZ CNAME Rule:
  ai_description: >-
    ### General Description

    Adds a CNAME rule to an existing Response Policy Zone (RPZ) in Infoblox NIOS to
    override DNS behavior. This action allows administrators to define how specific
    domains or IP addresses should be handled (e.g., blocked, passed through, or redirected)
    within the DNS infrastructure. It supports various rule types such as Passthru,
    Block, and Substitute.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The rule name in a FQDN format. |

    | RP Zone | String | Yes | The zone to assign the rule to. |

    | Rule Type | DDL | Yes | The type of the rule to create. Options: `Passthru`,
    `Block (No such domain)`, `Substitute (Domain name)`, `Block (No data)`. |

    | Object Type | DDL | Yes | The type of the object for which to assign the rule.
    Options: `Domain Name`, `IP Address`, `Client IP Address`. |

    | Substitute Name | String | No | The substitute name to assign (substitute domain
    only). Mandatory if 'Rule Type' is 'Substitute (Domain name)'. |

    | Comment | String | No | Comment for this rule. |

    | View | String | No | The DNS view in which the records are located. Defaults
    to 'default'. |

    | Additional Parameters | String | No | JSON object containing additional parameters
    to create the RPZ rule. |


    ### Additional Notes

    - **Conditional Requirement:** If 'Rule Type' is set to 'Substitute (Domain name)',
    the 'Substitute Name' parameter must be provided.

    - **Compatibility Check:** 'Substitute (Domain name)' rule type is not applicable
    when 'Object Type' is 'IP Address' or 'Client IP Address'.

    - **Rule Logic:** The action automatically determines the 'canonical' value for
    the Infoblox API based on the selected 'Rule Type' (e.g., '*' for Block (No data),
    'rpz-passthru' for Passthru on Client IP).


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves and validates input parameters,
    ensuring mandatory fields like 'Name' and 'RP Zone' are present.

    2. **Logic Determination:** It determines the correct Infoblox API endpoint based
    on the 'Object Type' and calculates the 'canonical' value based on the 'Rule Type'.

    3. **API Interaction:** The action sends a POST request to the Infoblox NIOS WAPI
    to create the CNAME rule.

    4. **Result Processing:** Upon success, it parses the API response, creates a
    data table with the rule details, and adds the raw JSON result to the action output.
