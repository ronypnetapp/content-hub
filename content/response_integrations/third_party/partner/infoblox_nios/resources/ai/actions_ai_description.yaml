Create Response Policy Zone:
  ai_description: >-
    ### General Description

    Creates a new Response Policy Zone (RPZ) in Infoblox NIOS to define custom DNS
    responses. This action allows administrators to programmatically configure DNS
    security policies, such as blocking specific domains or redirecting traffic, by
    creating a dedicated zone with specific policies, severities, and types.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | FQDN | String | Yes | The name of the DNS zone in FQDN format. |

    | Substitute Name | String | No | The alternative name of the redirect target,
    used when the policy involves substitution. |

    | Comment | String | No | A descriptive comment for the zone. |

    | RPZ Policy | DDL | No | The override policy for the zone. Options include: DISABLED,
    GIVEN, NODATA, NXDOMAIN, PASSTHRU, SUBSTITUTE. Default is GIVEN. |

    | RPZ Severity | DDL | No | The severity level assigned to the zone. Options include:
    CRITICAL, MAJOR, WARNING, INFORMATIONAL. Default is MAJOR. |

    | RPZ Type | DDL | No | The type of the Response Policy Zone. Options include:
    FEED, FIREEYE, LOCAL. Default is LOCAL. |

    | Fireeye Rule Mapping | String | No | A JSON object string containing rules to
    map FireEye alerts to the zone. |

    | Additional Parameters | String | No | A JSON object string containing any additional
    parameters supported by the Infoblox WAPI for zone creation. |


    ### Additional Notes

    - This action does not operate on entities; it is a management action that requires
    manual input of the FQDN.

    - If 'Fireeye Rule Mapping' or 'Additional Parameters' are provided, they must
    be valid, parseable JSON objects.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the Infoblox connection
    details and the user-provided parameters (FQDN, Policy, etc.).

    2. **Validation**: It validates that the FQDN is a non-empty string and attempts
    to parse 'Fireeye Rule Mapping' and 'Additional Parameters' as JSON objects.

    3. **API Request**: The action calls the Infoblox WAPI via a POST request to the
    `zone_rp` endpoint, passing the constructed configuration body.

    4. **Response Handling**: Upon a successful API call, the action parses the returned
    zone data.

    5. **Output Generation**: It adds the raw JSON response to the action results
    and constructs a data table named "RP Zone" containing the details of the newly
    created zone.

    6. **Finalization**: The action completes with a success message indicating the
    zone was created.
