Create RPZ SRV Rule:
  ai_description: >-
    ### General Description

    Adds an SRV record override in a Response Policy Zone (RPZ) for service-based
    DNS lookups in Infoblox NIOS. This action allows security teams to redirect or
    block specific service lookups by creating a Substitute (SRV Record) Rule within
    a specified zone.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the rule to be created. |

    | Priority | String | Yes | The priority of the SRV record. Must be a non-negative
    integer (0-65535). |

    | RP Zone | String | Yes | The name of the response policy zone where the record
    will reside. |

    | Port | String | Yes | The port of the SRV record. Must be a non-negative integer
    (0-65535). |

    | Target | String | Yes | The target host associated with the record. |

    | Weight | String | Yes | The weight of the SRV record. Must be a non-negative
    integer (0-65535). |

    | Comment | String | No | An optional comment for the rule. |

    | Additional Parameters | String | No | An optional JSON object containing extra
    parameters for the Infoblox API call. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and the
    rule details from the input parameters.

    2. **Validation:** It validates that mandatory fields (Name, RP Zone, Target)
    are provided and that numeric fields (Priority, Port, Weight) are valid integers
    within the allowed range (0-65535).

    3. **API Interaction:** It uses the Infoblox API Manager to send a POST request
    to the `/record:rpz:srv` endpoint with the rule details.

    4. **Result Processing:** If successful, it returns the created rule's details
    in JSON format and displays them in a data table. If it fails, an error message
    is returned.


    ### Additional Notes

    - The `Priority`, `Port`, and `Weight` parameters are passed as strings but must
    represent valid integers between 0 and 65535.

    - The `Additional Parameters` must be a valid JSON object if provided.
