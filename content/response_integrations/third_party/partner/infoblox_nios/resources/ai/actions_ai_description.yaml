Create Host Record:
  ai_description: >-
    ### General Description

    The **Create Host Record** action adds a new host record to the Infoblox NIOS
    system. This action is used for IP Address Management (IPAM) and DNS inventory,
    allowing users to define a host with its associated IPv4 and IPv6 addresses, aliases,
    and metadata. When the DNS configuration is enabled, it automatically manages
    corresponding A, AAAA, and PTR records.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Name** | String | Yes | The FQDN of the host (e.g., `server1.example.com`).
    It must belong to an existing DNS zone. |

    | **IPv4 Addresses** | String | No | A JSON array of IPv4 address objects (e.g.,
    `[{"ipv4addr":"192.168.1.100","mac":"00:11:22:33:44:55","configure_for_dhcp":true}]`).
    |

    | **IPv6 Addresses** | String | No | A JSON array of IPv6 address objects (e.g.,
    `[{"ipv6addr":"2001:db8::1"}]`). |

    | **View** | String | No | The DNS view in which the record resides (default:
    `default`). |

    | **Comment** | String | No | Additional information or notes about this host
    record. |

    | **Aliases** | String | No | Comma-separated list of DNS aliases (CNAMEs) for
    this host. |

    | **Configure for DNS** | Boolean | No | If set to `false`, the host record will
    not have associated DNS records. Default is `true`. |

    | **Extended Attributes** | String | No | Comma-separated key/value pairs for
    Infoblox extended attributes (e.g., `Site=New York,Owner=Security`). |

    | **Additional Parameters** | String | No | A JSON object containing additional
    parameters supported by the Infoblox WAPI. |


    ### Flow Description

    1. **Input Validation**: The action validates that the `Name` is provided and
    that `IPv4 Addresses`, `IPv6 Addresses`, and `Additional Parameters` are provided
    in valid JSON formats.

    2. **Attribute Parsing**: It parses the `Extended Attributes` string into the
    specific dictionary format required by the Infoblox API.

    3. **API Request**: It sends a POST request to the Infoblox `/record:host` endpoint
    with the constructed payload.

    4. **Result Processing**: If successful, the action returns the created record's
    details in JSON format and populates a 'Hosts' data table in the case wall for
    visibility.


    ### Additional Notes

    - While `IPv4 Addresses` and `IPv6 Addresses` are technically optional in the
    parameter list, at least one is typically required by Infoblox to create a functional
    host record.

    - The `Name` parameter is effectively mandatory as the script performs a manual
    validation check and will fail if it is empty.
