Create RPZ PTR Rule:
  ai_description: >-
    ### General Description

    Adds a reverse DNS lookup override in a Response Policy Zone (RPZ) for an IP address
    within Infoblox NIOS. This action allows administrators to define custom PTR records
    within an RPZ to redirect or block reverse DNS queries by creating a `record:rpz:ptr`
    object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **RP Zone** | String | Yes | The specific Response Policy Zone where the rule
    will be created. |

    | **PTR DName** | String | Yes | The domain name of the RPZ substitute rule object
    for the PTR record. |

    | **Name** | String | No | The name of the RPZ Substitute rule object. |

    | **Comment** | String | No | A descriptive comment for the rule. |

    | **IPv4 Address** | String | No | The IPv4 address associated with the substitute
    rule. |

    | **IPv6 Address** | String | No | The IPv6 address associated with the substitute
    rule. |

    | **Additional Parameters** | String | No | A JSON object containing extra parameters
    for the Infoblox WAPI request. |


    ### Additional Notes

    At least one of the following parameters must be provided for the action to succeed:
    **Name**, **IPv4 Address**, or **IPv6 Address**. The action performs format validation
    on IP addresses if they are provided.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the RP Zone, PTR DName, and optional fields
    (Name, Comment, IPs, Additional Parameters) from the action input.

    2. **Validation:** Ensures mandatory fields are non-empty and that at least one
    identifying field (Name, IPv4, or IPv6) is populated. It also validates the syntax
    of provided IP addresses and parses the 'Additional Parameters' JSON.

    3. **API Interaction:** Executes a POST request to the Infoblox NIOS WAPI endpoint
    for RPZ PTR records (`/record:rpz:ptr`).

    4. **Result Processing:** Upon success, the action adds the raw JSON response
    to the action results and constructs a data table summarizing the created PTR
    rule for display in the case wall.
