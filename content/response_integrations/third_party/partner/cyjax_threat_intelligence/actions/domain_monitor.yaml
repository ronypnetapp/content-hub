name: Domain monitor
description: This action allows you to retrieve information for the Domain Monitor
    feature. The feature tracks your brands against newly registered global domains
    and the certificate transparency logs (CTL).
integration_identifier: CYJAXThreatIntelligence
parameters:
-   name: Query
    default_value: ''
    type: string
    description: A query string to search for a domain or part of it.
    is_mandatory: false
-   name: Since
    default_value: ''
    type: string
    description: 'The start date time in ISO8601 format. Ex: 2026-02-09T15:01:39Z'
    is_mandatory: false
-   name: Until
    default_value: ''
    type: string
    description: 'The end date time in ISO8601 format. Ex: 2026-02-09T15:01:39Z'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/domain_monitor_json_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: 3177f40c-bbb5-41d0-a90f-557c6f4bb822
script_result_name: ScriptResult
