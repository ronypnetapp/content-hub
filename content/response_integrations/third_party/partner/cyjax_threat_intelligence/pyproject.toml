[project]
name = "CYJAXThreatIntelligence"
version = "1.0"
description = "The CYJAX Threat Intelligence Integration for Google SecOps SOAR enables security teams to leverage CYJAX’s threat intelligence capabilities directly within automated investigation and response workflows. This integration enhances visibility into external threats by providing actionable intelligence on indicators, domains, and data exposure risks. In case of any queries, please reach out to info@cyjax.com."
requires-python = ">=3.11"
dependencies = [ "environmentcommon", "requests==2.32.5", "tipcommon",]

[dependency-groups]
dev = [ "environmentcommon", "integration-testing", "pytest-json-report>=1.5.0", "pytest>=8.3.5", "soar-sdk", "tipcommon",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../../packages/tipcommon/whls/TIPCommon-2.3.1-py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../../packages/integration_testing_whls/integration_testing-2.3.2-py3-none-any.whl"
