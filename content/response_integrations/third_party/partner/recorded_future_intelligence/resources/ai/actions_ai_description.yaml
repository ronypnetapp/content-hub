    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Recorded Future Sandbox for detonation and analysis, which
      creates a new analysis task in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights containing the detonation report and analysis details.
