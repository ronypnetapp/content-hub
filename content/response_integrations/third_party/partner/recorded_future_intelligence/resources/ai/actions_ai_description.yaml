Detonate URL:
  ai_description: >-
    ### General Description

    Submits URL entities to the Recorded Future Sandbox (Triage) for automated detonation
    and behavioral analysis. This action is designed to handle URLs asynchronously,
    meaning it initiates the detonation process and then polls the sandbox until the
    analysis is complete. Once finished, it retrieves a comprehensive report including
    risk scores, signatures, and observed network flows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Profile | String | No | Specifies the Sandbox profile to use for the detonation
    (e.g., a specific OS or browser environment). If left empty, the default sandbox
    profile is used. |


    ### Flow Description

    1. **Entity Extraction**: The action identifies all URL entities within the current
    context.

    2. **Submission**: It submits each identified URL to the Recorded Future Sandbox
    API. If a specific 'Profile' is provided, it is applied to the submission.

    3. **Polling (Async)**: Because detonation takes time, the action enters an 'In
    Progress' state, periodically polling the sandbox to check the status of the analysis.

    4. **Report Retrieval**: Once the sandbox reports the analysis as 'reported' (finished),
    the action fetches the full overview report.

    5. **Result Generation**: The action parses the report to extract risk scores,
    signatures, and IOCs.

    6. **Internal Updates**: It creates detailed Case Insights containing the detonation
    results in HTML format and adds the raw data to the action's JSON results and
    data tables.
