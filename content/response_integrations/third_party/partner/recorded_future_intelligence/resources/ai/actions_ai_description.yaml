Enrich IOC:
  ai_description: >-
    ### General Description

    The **Enrich IOC** action retrieves comprehensive threat intelligence from Recorded
    Future for various Indicators of Compromise (IOCs), including IP addresses, domains,
    hostnames, file hashes, URLs, and CVEs. It provides risk scores, evidence for
    maliciousness, and links to Recorded Future intelligence cards. This action is
    designed to automate the initial triage of entities within a case by providing
    context and automatically flagging suspicious entities based on a configurable
    risk threshold.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Risk Score Threshold** | Integer | Yes | The minimum Recorded Future risk
    score (0-100) required to mark an entity as suspicious. Default is 25. |

    | **Include Links** | Boolean | No | If enabled, the action retrieves related
    entity links (e.g., IPs related to a domain) and populates them into a data table.
    |

    | **Enable Collective Insights** | Boolean | No | If enabled, the action contributes
    detection data back to Recorded Future's Collective Insights platform to improve
    global threat intelligence. This is skipped for alerts originally generated by
    Recorded Future. |


    ### Additional Notes

    - This action updates the `is_suspicious` and `is_enriched` flags on entities
    within Google SecOps.

    - It populates the entity's `additional_properties` with Recorded Future specific
    data (prefixed with `RF_`).

    - Collective Insights submission is subject to both the action-level parameter
    and a global integration configuration.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves API credentials and action parameters (Threshold,
    Links, Collective Insights).

    2. **Entity Filtering:** Iterates through the case's target entities and filters
    for supported types (ADDRESS, HOSTNAME, DOMAIN, FILEHASH, CVE, DestinationURL).

    3. **Intelligence Retrieval:** For each supported entity, it queries the Recorded
    Future API to fetch the risk report and intelligence metadata.

    4. **External Contribution:** If 'Enable Collective Insights' is active, it submits
    the detection context to Recorded Future.

    5. **Data Visualization:** Adds multiple data tables to the case, including an
    overview report, triggered risk rules, and related links (if requested).

    6. **Risk Assessment:** Compares the retrieved risk score against the **Risk Score
    Threshold**. If the score is higher, the entity is marked as suspicious.

    7. **Insight Generation:** Creates a detailed Case Insight containing the risk
    score, portal links, and evidence details for risky entities.

    8. **Entity Update:** Updates the entities in the Google SecOps case with the
    new enrichment data and suspicious status.
