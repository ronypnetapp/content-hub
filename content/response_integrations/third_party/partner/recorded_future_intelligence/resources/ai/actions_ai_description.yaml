Enrich IP:
  ai_description: >-
    Enriches IP Address entities using Recorded Future threat intelligence. This action
    retrieves comprehensive reputation data, including risk scores, triggered risk
    rules, location details (ASN, country, city), and related entity links. It evaluates
    the risk score against a configurable threshold to automatically mark entities
    as suspicious within Google SecOps. Additionally, it can contribute detection
    data back to Recorded Future via the Collective Insights feature.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | The minimum malicious risk score (0-99)
    required to mark an IP as suspicious. Band levels: Very Malicious (90-99), Malicious
    (65-89), Suspicious (25-64), Unusual (5-24). Default is 25. |

    | Include Links | Boolean | No | If enabled, the action retrieves and displays
    information about related entity links in a dedicated data table. |

    | Enable Collective Insights | Boolean | No | If enabled, the action contributes
    detection data back to Recorded Future's Collective Insights platform. |


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and configuration settings (URL,
    API Key, SSL verification).

    2. **Parameter Extraction**: Parses the risk threshold, link inclusion preference,
    and Collective Insights toggle.

    3. **Entity Filtering**: Identifies all IP Address entities within the current
