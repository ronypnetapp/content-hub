Add Analyst Note:
  ai_description: >-
    ### General Description

    Adds an analyst note to the Recorded Future platform. This action allows users
    to document findings or context within Recorded Future, automatically associating
    the note with the entities currently present in the Google SecOps case scope by
    appending their identifiers to the note text.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note Title | String | Yes | Specifies the title for the analyst note. |

    | Note Text | String | Yes | Specifies the body text for the note. The action
    will automatically append a list of all entities collected from the current case
    to this text. |

    | Topic | DDL | No | Specifies the relevant note topic from a predefined list
    (e.g., Actor Profile, Malware/Tool Profile, YARA Rule). If not specified, it defaults
    to 'None'. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (URL,
    Key, SSL verification) and the user-provided note details (Title, Text, Topic).

    2. **Entity Collection:** It iterates through all entities in the current target
    scope and aggregates their identifiers into a single string.

    3. **Text Preparation:** The aggregated entity list is appended to the user-provided
    `Note Text` to ensure the note contains context about the specific case.

    4. **External API Call:** The action uses the `RecordedFutureManager` to publish
    the note to the Recorded Future platform via the `AnalystNoteMgr`.

    5. **Result Handling:** Upon successful creation, the action returns the unique
    `document_id` of the new note and completes the execution.
