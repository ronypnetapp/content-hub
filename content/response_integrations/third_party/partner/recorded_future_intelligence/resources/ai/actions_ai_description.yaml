Enrich IOCs Bulk:
  ai_description: >-
    ### General Description

    Enriches multiple IOCs (Indicators of Compromise) in bulk using Recorded Future's
    SOAR API. This action retrieves threat intelligence for a variety of entity types,
    including IP Addresses, Domains, Hostnames, File Hashes, URLs, and CVEs, in a
    single request. It is designed for high-efficiency enrichment of all supported
    entities present in the current context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enable Collective Insights | boolean | No | If enabled, the action will contribute
    detection information back to Recorded Future's Collective Insights platform.
    This submission only occurs if the alert did not originate from Recorded Future
    itself. Default is true. |


    ### Additional Notes

    - This action uses the Recorded Future SOAR API, which is optimized for bulk lookups.

    - The action retrieves raw intelligence data and attaches it as a JSON result
    to the action output.

    - Unlike individual enrichment actions, this bulk action does not automatically
    update entity fields or create case insights; it focuses on data retrieval.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (URL, Key, SSL verification)
    and the 'Enable Collective Insights' action parameter.

    2. **Entity Identification**: Scans the current context for all supported entities
    (ADDRESS, DOMAIN, HOSTNAME, FILEHASH, DestinationURL, CVE).

    3. **Bulk Request Preparation**: Groups the identified entities by their Recorded
    Future type (e.g., mapping 'ADDRESS' to 'ip') to construct a bulk query.

    4. **Intelligence Retrieval**: Executes a bulk lookup via the Recorded Future
    SOAR API to fetch intelligence for all entities simultaneously.

    5. **Collective Insights Submission**: If enabled and applicable (based on the
    alert vendor), submits detection metadata for the entities to Recorded Future's
    global intelligence platform.

    6. **Output Generation**: Aggregates the retrieved intelligence into a structured
    JSON result and completes the action.
