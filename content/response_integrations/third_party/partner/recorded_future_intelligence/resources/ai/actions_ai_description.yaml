Enrich CVE:
  ai_description: >-
    ### General Description

    This action queries Recorded Future to retrieve comprehensive threat intelligence
    for CVE (Common Vulnerabilities and Exposures) entities. It provides detailed
    risk scores, triggered risk rules, and intelligence cards. The action helps security
    analysts understand the severity of a vulnerability by comparing Recorded Future's
    risk score against a customizable threshold, automatically marking high-risk entities
    as suspicious and providing context through case insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | The minimum malicious risk score (0-99)
    required to mark a CVE as suspicious. Corresponds to Recorded Future's risk levels
    (e.g., Medium: 25-64, High: 65-79). |

    | Include Links | Boolean | No | If enabled, the action retrieves information
    about related entities and links from Recorded Future. |

    | Enable Collective Insights | Boolean | No | If enabled, the action contributes
    detection data back to Recorded Future's Collective Insights platform. |


    ### Additional Notes

    - **Collective Insights**: This feature is only active if enabled in both the
    integration configuration and the action parameters, and only for alerts where
    the reporting vendor is not 'Recorded Future'.

    - **Risk Levels**: The threshold corresponds to Recorded Future's risk levels:
    None (0), Low (5-24), Medium (25-64), High (65-79), Critical (80-89), and Very
    Critical (90-99).

    - **External Mutation**: This action is not categorized as a pure enrichment action
    because it can submit data to an external system (Collective Insights).


    ### Flow Description

    1. **Parameter Initialization**: Extracts API credentials and action-specific
    parameters like the risk threshold and link inclusion settings.

    2. **Entity Scoping**: Filters the target entities to process only those of type
    'CVE'.

    3. **Intelligence Query**: Calls the Recorded Future API to fetch vulnerability
    intelligence, including risk scores, evidence, and optional links.

    4. **Collective Insights Submission**: If enabled, the action sends detection
    telemetry to Recorded Future's Collective Insights service, provided the alert
    did not originate from Recorded Future.

    5. **Result Processing**: Populates data tables with the vulnerability report
    and triggered risk rules. It also adds a direct link to the Recorded Future intelligence
    card.

    6. **Risk Evaluation**: Compares the CVE's risk score against the user-defined
    'Risk Score Threshold'.

    7. **Internal Enrichment**: If the score exceeds the threshold, the entity is
    marked as suspicious, and a detailed case insight is created.

    8. **Entity Update**: Updates the entity's additional properties with the retrieved
    intelligence and marks it as enriched.
  capabilities:
