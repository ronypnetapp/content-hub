Enrich Host:
  ai_description: >-
    ### General Description

    The **Enrich Host** action queries Recorded Future to retrieve comprehensive threat
    intelligence for **Hostname** and **Domain** entities. It provides security analysts
    with critical context, including risk scores, triggered risk rules, and intelligence
    cards, to help evaluate the threat level of specific hosts within a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Risk Score Threshold** | String | Yes | The minimum risk score (0-99) required
    to mark a host as suspicious. Scores are categorized as: Very Malicious (90-99),
    Malicious (65-89), Suspicious (25-64), Unusual (5-24), and No Malicious Content
    (0). |

    | **Include Links** | Boolean | No | If enabled, the action retrieves additional
    information about related entity links from Recorded Future. |

    | **Enable Collective Insights** | Boolean | No | If enabled, the action contributes
    detection data back to Recorded Future's Collective Insights system, provided
    the alert did not originate from Recorded Future itself. |


    ### Flow Description

    1. **Initialization**: Extracts API configuration (URL, Key, SSL settings) and
    action parameters (Threshold, Links, Collective Insights).

    2. **Entity Filtering**: Identifies all `HOSTNAME` and `DOMAIN` entities within
    the current Google SecOps context.

    3. **Intelligence Retrieval**: For each identified entity, the action calls the
    Recorded Future API to fetch enrichment data, including risk scores and evidence.

    4. **External Contribution**: If `Enable Collective Insights` is true and the
    alert source is external, detection data is submitted to Recorded Future.

    5. **Data Augmentation**: Adds detailed data tables to the action results, including
    a general report, triggered risk rules, and optionally, related links.

    6. **Risk Assessment**: Compares the retrieved risk score against the user-defined
    `Risk Score Threshold`. If the score exceeds the threshold, the entity is marked
    as suspicious.

    7. **Internal Updates**: Updates the entity's properties in Google SecOps with
    the new intelligence and creates a case insight containing the risk analysis and
    portal links.


    ### Additional Notes

    - This action performs an external mutation by contributing to 'Collective Insights'
    if the parameter is enabled.

    - The action supports both `HOSTNAME` and `DOMAIN` entity types, even though the
    simulation data may only list one.
