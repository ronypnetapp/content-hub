Search Hash Malware Intelligence:
  ai_description: >-
    Queries Recorded Future's Malware Intelligence to retrieve sandbox analysis reports
    for SHA256 file hashes. This action allows security analysts to look up historical
    detonation results from the Recorded Future Sandbox (Triage) without re-submitting
    the file. It retrieves detailed technical data including risk scores, network
    flows, and behavioral signatures.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | My Enterprise | boolean | No | If set to `true`, the search is restricted to
    samples submitted by your organization's enterprise account. Default is `false`.
    |

    | Start Date | string | No | The starting point for the search lookback. Supports
    relative formats like `-30d` or specific dates like `2026-01-23`. Default is `-30d`.
    |

    | End Date | string | No | The ending point for the search lookback. Supports
    relative formats or specific dates. If left empty, it defaults to the current
    date. |


    ### Flow Description


    1. **Initialization**: The action extracts the API configuration and user-provided
    parameters (Enterprise scope and date range).

    2. **Entity Filtering**: It iterates through the target entities in the case,
    specifically looking for `FILEHASH` entities that are 64 characters long (SHA256).

    3. **External Query**: For each valid hash, it queries the Recorded Future Malware
    Intelligence API using the specified date filters and enterprise scope.

    4. **Data Processing**: If reports are found, the action parses the sandbox results,
    including analysis scores, completion timestamps, network flows (destination IPs/ports),
    and behavioral signatures (TTPs and descriptions).

    5. **Internal Enrichment**: It generates a detailed HTML Case Insight for each
    hash, providing a summary of the sandbox findings directly within the Google SecOps
    interface.

    6. **Output**: The raw report data is attached as a JSON result for use in downstream
    playbook logic.
