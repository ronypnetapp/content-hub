Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using Recorded Future's threat intelligence. This
    action retrieves risk scores, evidence details, and optional entity links. It
    evaluates the hash against a user-defined risk threshold to mark entities as suspicious
    and generates detailed insights and data tables within the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | Represents the minimum malicious risk
    score (0-89) for a Hash to be marked malicious. |

    | Include Links | Boolean | No | If enabled, the action retrieves information
    about related entity links. |

    | Enable Collective Insights | Boolean | No | If enabled, contributes detection
    data back to Recorded Future's Collective Insights service. |


    ### Additional Notes

    Collective Insights are only submitted if the alert's reporting vendor is not
    'Recorded Future'.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves API configuration and action parameters
    (Threshold, Links, Collective Insights).

    2. **Entity Filtering**: Iterates through target entities and filters for File
    Hash types.

    3. **Intelligence Retrieval**: Queries Recorded Future for reputation data, including
    risk scores, evidence, and optional links.

    4. **External Contribution**: If enabled and applicable, submits detection information
    back to Recorded Future via Collective Insights.

    5. **Internal Enrichment**: Updates entity attributes (is_suspicious, additional_properties)
    based on the risk score and threshold.

    6. **Reporting**: Generates case insights, data tables for risk rules and links,
    and adds a direct link to the Recorded Future portal.
