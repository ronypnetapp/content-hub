Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps (Chronicle) environment and the Recorded Future API. It ensures
    that the provided API URL and API Key are valid and that the network allows communication
    with the service.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | ApiUrl | The base URL for the Recorded Future API. | String | Yes | N/A |

    | ApiKey | The API Key used for authentication with Recorded Future. | String
    | Yes | N/A |

    | Verify SSL | If enabled, the action will verify the SSL certificate of the API
    endpoint. | Boolean | No | False |


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify SDK and logger.

    2. **Parameter Extraction**: It retrieves the `ApiUrl`, `ApiKey`, and `Verify
    SSL` settings from the integration configuration.

    3. **Manager Setup**: A `RecordedFutureManager` instance is created using the
    extracted credentials.

    4. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a sample enrichment lookup for a hardcoded IP address (8.8.8.8) to confirm
    the API is responsive and the credentials are valid.

    5. **Result Reporting**: If the test succeeds, it returns a 'Connection Established'
    message. If it fails, it captures the exception and reports a failure status.


    ### Additional Notes

    - This action does not process any entities from the current alert or case; it
    uses a static internal test to validate the integration configuration.

    - As per standard SOAR conventions, this action is categorized as a connectivity
    test and not as an enrichment action.
