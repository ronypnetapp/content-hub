Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Recorded Future Intelligence. This action retrieves
    comprehensive threat intelligence for URLs, including risk scores, evidence details,
    and intelligence cards. It helps security analysts determine the reputation of
    a URL and provides context for investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | string | Yes | Represents the minimum malicious risk
    score (0-99) for a URL to be marked as suspicious in Google SecOps. Default is
    25. |

    | Include Links | boolean | No | If enabled, the action retrieves additional information
    about related links associated with the URL. |

    | Enable Collective Insights | boolean | No | If enabled, the action contributes
    detection telemetry back to Recorded Future's Collective Insights API. |


    ### Additional Notes

    - The action will mark an entity as suspicious and create a case insight if the
    retrieved risk score exceeds the configured 'Risk Score Threshold'.

    - Collective Insights submissions are automatically disabled if the alert vendor
    is 'Recorded Future' to avoid redundant reporting.


    ### Flow Description

    1. **Parameter Initialization**: Extracts API configuration (URL, Key, SSL) and
    action parameters (Threshold, Include Links, Collective Insights).

    2. **Entity Filtering**: Identifies URL entities within the current alert scope.

    3. **Intelligence Retrieval**: For each URL, queries the Recorded Future API to
    fetch enrichment data, risk scores, and evidence.

    4. **Telemetry Submission**: If 'Enable Collective Insights' is active, submits
    detection context to Recorded Future.

    5. **Internal Enrichment**: Updates the entity's additional properties with Recorded
    Future data and sets the 'is_enriched' flag.

    6. **Risk Assessment**: Compares the risk score against the threshold. If exceeded,
    marks the entity as suspicious and generates a detailed case insight.

    7. **Data Visualization**: Adds data tables to the case wall containing the overview
    report, triggered risk rules, and related links.
