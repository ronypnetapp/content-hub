Detonate File:
  ai_description: >-
    ### General Description

    Submits a file to the Recorded Future Sandbox for automated detonation and behavioral
    analysis. This action is designed to handle files stored either in a Google Cloud
    Platform (GCP) Bucket or on the local file system. It is an asynchronous action
    that uploads the file, monitors the analysis progress, and retrieves a comprehensive
    report once completed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The full path or identifier of the file to be detonated.
    |

    | File Source | DDL | Yes | Specifies where the file is located. Options are `GCP
    Bucket` or `Local File System`. |

    | Profile | String | No | The specific Sandbox profile to use for the analysis.
    |

    | Password | String | No | The password required to extract the file if it is
    an encrypted archive. |


    ### Flow Description

    1. **Initialization**: The action extracts the file path and source configuration
    from the input parameters.

    2. **File Retrieval**: Depending on the `File Source`, it either reads the file
    from the local disk or fetches it from a GCP Bucket using the SecOps SDK.

    3. **Submission**: The file is uploaded to the Recorded Future Sandbox API for
    detonation.

    4. **Monitoring**: As an asynchronous action, it enters an 'In Progress' state,
    periodically polling the sandbox to check if the analysis is finished.

    5. **Reporting**: Once the analysis is complete, it retrieves the overview report,
    including scores, signatures, and IOCs.

    6. **Internal Update**: It generates a detailed Case Insight in Google SecOps
    containing the detonation results and analysis summary.


    ### Additional Notes

    This action requires a valid Recorded Future Sandbox API key and URL configured
    in the integration settings. It is an asynchronous action and will remain in progress
    until the sandbox analysis is finished or a timeout occurs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
