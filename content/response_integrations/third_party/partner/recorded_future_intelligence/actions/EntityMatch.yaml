creator: admin
description: Matches entity by name and (optionally) type.
dynamic_results_metadata:
-   result_example_path: resources/EntityMatch_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: RecordedFutureIntelligence
name: Entity Match
parameters:
-   description: This mandatory free text search field is used to match against entity names.
    is_mandatory: true
    name: Entity Name
    type: string
-   description: A comma separated string of types is optional. If in use, the Match operation will only try to match on entities that meet any of the type criteria.
    is_mandatory: false
    name: Entity Type
    type: string
-   default_value: '10'
    description: This optional field is used to limit the max number of responses returned (maximum 100).
    is_mandatory: false
    name: Limit
    type: string
script_result_name: is_success
