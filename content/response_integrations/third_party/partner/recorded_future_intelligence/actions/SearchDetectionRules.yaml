creator: admin
description: Search for detection rules based on various filter criteria.
dynamic_results_metadata:
-   result_example_path: resources/SearchDetectionRules_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: RecordedFutureIntelligence
name: Search Detection Rules
parameters:
-   description: Types of detection rules to search for.
    is_mandatory: false
    name: Detection Rule Type
    type: string
-   description: If the action should filter the search on the Target Entities.
    is_mandatory: false
    name: Filter on Target Entities
    type: boolean
-   description: A comma separated list of entities that may be associated with a given detection rule. All values in the list must be valid Recorded Future entity IDs.
    is_mandatory: false
    name: Entity ID
    type: string
-   description: Filter for rules created before this date or relative date.
    is_mandatory: false
    name: Created Before
    type: string
-   description: Filter for rules created after this date or relative date.
    is_mandatory: false
    name: Created After
    type: string
-   description: Filter for rules updated before this date or relative date.
    is_mandatory: false
    name: Updated Before
    type: string
-   description: Filter for rules updated after this date or relative date.
    is_mandatory: false
    name: Updated After
    type: string
-   description: Filter by document ID.
    is_mandatory: false
    name: Detection Rule ID
    type: string
-   description: Filter by Detection Rule title.
    is_mandatory: false
    name: Detection Rule Title
    type: string
-   description: Whether to filter by tagged entities.
    is_mandatory: false
    name: Tagged Entities
    type: boolean
-   description: Limit the total number of results returned.
    is_mandatory: false
    name: Max Results
    type: string
script_result_name: is_success
