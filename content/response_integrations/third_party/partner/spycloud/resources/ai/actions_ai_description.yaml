List Entity Breaches:
  ai_description: >-
    ### General Description

    This action retrieves breach information from SpyCloud for specific entities including
    IP Addresses, Usernames, Email Addresses, and Domains. It identifies if an entity
    has been compromised in known data breaches and provides details such as the source
    of the breach, severity, and obfuscated credentials if available.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Catalog Filter | String | No | Specify the name of a specific SpyCloud category/catalog
    to search within. If provided, the action validates the catalog exists before
    searching. |

    | Time Frame | DDL | Yes | Defines the temporal scope of the search. Options include
    'Last Week', 'Last Month', 'Last Year', or 'Custom'. |

    | Start Time | String | No | Mandatory only if 'Time Frame' is set to 'Custom'.
    Expects an ISO 8601 formatted string. |

    | End Time | String | No | Used when 'Time Frame' is 'Custom'. If omitted, the
    current time is used. Expects an ISO 8601 formatted string. |

    | Max Breaches To Return | String | No | Limits the number of breach records returned
    per entity. Default is 1, maximum is 1000. |


    ### Additional Notes

    - **Entity Mapping:** Email addresses are handled as `USERUNIQNAME` entities that
    match an email regex. Domains are extracted from `DestinationURL` entities.

    - **Data Privacy:** Passwords returned in the JSON results are automatically obfuscated
    by the integration logic (e.g., `p****rd`).

    - **Timeframe Logic:** If 'Custom' is selected, 'Start Time' must be provided,
    otherwise the action will fail.


    ### Flow Description

    1. **Initialization:** Extracts API configuration and action parameters, validating
    that the 'Max Breaches To Return' is a positive integer.

    2. **Timeframe Calculation:** Converts the selected 'Time Frame' or 'Custom' timestamps
    into date objects for the API request.

    3. **Catalog Resolution:** If a 'Catalog Filter' is provided, the action fetches
    available catalogs from SpyCloud to find the corresponding internal ID.

    4. **Entity Processing:** Iterates through supported entities (`ADDRESS`, `USERUNIQNAME`,
    `DestinationURL`):
        - Determines the SpyCloud breach type (ips, emails, usernames, or domains).
        - Normalizes the identifier (e.g., extracting the domain from a URL).
        - Queries the SpyCloud API for breach data associated with the entity and
    timeframe.
    5. **Enrichment:** For entities with found breaches, it updates the entity's `additional_properties`
    with a `was_breached` flag and marks the entity as enriched.

    6. **Finalization:** Updates the entities in the Google SecOps case, attaches
    the full breach details as a JSON result, and provides a summary message of successful
    and failed lookups.
  capabilities:
