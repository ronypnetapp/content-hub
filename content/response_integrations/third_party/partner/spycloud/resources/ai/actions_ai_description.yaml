List Catalogs:
  ai_description: >-
    ### General Description

    The **List Catalogs** action retrieves a list of available breach catalogs from
    SpyCloud based on specified timeframes and filtering criteria. This action is
    primarily used for discovery and auditing purposes, allowing users to see which
    data sources or breach collections are available within the SpyCloud platform
    for a given period.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | DDL | No | Determines the matching logic for the filter. Options
    are 'Equal' (exact match on title) or 'Contains' (substring match across all fields).
    Defaults to 'Equal'. |

    | Filter Value | String | No | The string value to search for. If 'Equal' is selected,
    the action filters results locally by title. If 'Contains' is selected, the value
    is passed to the API query. |

    | Time Frame | DDL | Yes | The temporal scope of the search. Options include 'Last
    Week', 'Last Month', 'Last Year', or 'Custom'. |

    | Start Time | String | No* | The start date/time for the search in ISO 8601 format.
    This is **mandatory** if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end date/time for the search in ISO 8601 format.
    If omitted while using 'Custom' timeframe, it defaults to the current time. |

    | Max Catalogs To Return | String | No | Limits the number of catalog records
    returned in the output. Defaults to 50. |


    ### Additional Notes

    - If the **Time Frame** is set to 'Custom', the **Start Time** parameter must
    be provided, otherwise the action will fail.

    - The action performs client-side filtering when the 'Equal' logic is selected
    to ensure exact title matches.


    ### Flow Description

    1. **Parameter Initialization**: Extracts API credentials and action parameters,
    validating that the result limit is a positive integer.

    2. **Timeframe Calculation**: Determines the start and end timestamps based on
    the selected 'Time Frame' or custom inputs.

    3. **Data Retrieval**: Connects to the SpyCloud API and fetches catalog data from
    the `/enterprise-v1/breach/catalog` endpoint, handling pagination automatically
    to retrieve all relevant records.

    4. **Filtering**: Applies the 'Equal' filter logic if specified, narrowing the
    results to catalogs whose titles exactly match the 'Filter Value'.

    5. **Result Processing**: Slices the result list based on the 'Max Catalogs To
    Return' parameter.

    6. **Output Generation**: Populates the action's JSON result with the raw catalog
    data and creates a formatted data table named 'Available Catalogs' for the case
    wall.
