Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the SpyCloud API. It ensures that the provided integration configuration
    parameters, such as the API Root and API Key, are correct and that the network
    path is open.


    ### Parameters Description

    This action does not take any dynamic input parameters during execution. It relies
    entirely on the configuration parameters defined at the integration level:


    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the SpyCloud instance. |

    | API Key | String | Yes | The API key used to authenticate requests to SpyCloud.
    |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the SpyCloud server. |


    ### Additional Notes

    * This action is typically used during the initial setup of the integration or
    for troubleshooting connection issues.

    * As per standard SOAR practices, Ping actions are not classified as enrichment
    actions.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, API Key, and SSL
    verification settings from the integration's configuration.

    2. **Manager Initialization:** It initializes the `SpyCloudManager` with the retrieved
    credentials.

    3. **Connectivity Test:** The manager executes a `GET` request to a specific SpyCloud
    endpoint (`/enterprise-v1/breach/catalog/1`).

    4. **Response Validation:** The action checks if the API returns a successful
    status code.

    5. **Final Status:** If the request is successful, the action completes with a
    success message; otherwise, it catches the exception and reports a failure.
