[project]
name = "SpyCloud"
version = "6.0"
description = "SpyCloud combines the world’s largest database of breach assets with automated remediation of exposed passwords to scale account takeover prevention for global enterprises.."
requires-python = ">=3.11"
dependencies = [
    "environmentcommon",
    "requests==2.32.3",
    "tipcommon",
]

[tool.uv.sources]
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.0-py3-none-any.whl" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-1.0.10-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
