Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity and
    authentication credentials between Google SecOps and the Thinkst Canary Console.
    It ensures that the provided API Key and Console Hash are valid and that the network
    path to the Canary API is open.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the integration's global configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Key** | String | Yes | The authentication token used to access the Thinkst
    Canary API. |

    | **Console Hash** | String | Yes | The unique subdomain identifier for your Canary
    Console (e.g., the 'example' in 'example.canary.tools'). |

    | **Verify SSL** | Boolean | No | Determines whether to verify the SSL certificate
    of the Canary Console. |


    ### Additional Notes

    * This action will fail immediately if the **API Key** or **Console Hash** are
    left as their default placeholder values.

    * Per Google SecOps standards, Ping actions are used for health checks and do
    not contribute to case enrichment or data mutation.


    ### Flow Description

    1. **Parameter Extraction:** The script retrieves the global configuration for
    the Thinkst integration, including the API Key, Console Hash, and SSL verification
    setting.

    2. **Validation:** It checks if the API Key and Console Hash have been changed
    from their default values. If not, the action fails with an error message.

    3. **Manager Initialization:** It initializes the `ThinkstActionManager` which
    sets up the HTTP session and base URL for the Canary API.

    4. **Connectivity Check:** The script calls the `/api/v1/ping` endpoint using
    a GET request.

    5. **Result Processing:** If the API returns a JSON response with a 'success'
    result, the action completes successfully. Otherwise, it reports a connection
    failure.
