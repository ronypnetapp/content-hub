Acknowledge Console Alert:
  ai_description: >-
    ### General Description


    Acknowledges an alert on the Thinkst Canary console. This action allows analysts
    to programmatically mark Canary incidents as acknowledged directly from the Google
    SecOps interface, ensuring synchronization between the SOAR and the Canary platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. It automatically
    identifies the alert to acknowledge using the `AlertId` stored in the alert's
    metadata. |


    ### Additional Notes


    This action requires the `AlertId` to be present in the `additional_properties`
    of the first security event of the alert. This ID is typically populated automatically
    by the Thinkst Canary connector when the alert is ingested. If the `AlertId` is
    missing, the action will fail.


    ### Flow Description


    1. **Extract Configuration**: Retrieves the API Key, Console Hash, and SSL verification
    settings from the integration configuration.

    2. **Identify Incident**: Accesses the current alert's security events and extracts
    the `AlertId` from the `additional_properties` field of the first event.

    3. **API Request**: Sends a POST request to the `/api/v1/incident/acknowledge`
    endpoint on the Canary Console using the extracted `AlertId`.

    4. **Finalize**: Reports the outcome of the acknowledgement request (success or
    failure) to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of an incident on the Thinkst Canary console to 'acknowledged'
      via a POST request to the API.
    fetches_data: false
    internal_data_mutation_explanation: null
