Push Breach Point Data:
  ai_description: >-
    ### General Description

    The **Push Breach Point Data** action allows users to apply specific labels (attributes)
    to entities within the XM Cyber platform based on filtering criteria defined in
    Google SecOps. This action is typically used to tag entities involved in a security
    incident as 'Breach Points' or other custom designations within the XM Cyber environment
    for further risk analysis and visibility.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Attribute Name** | String | Yes | The name of the attribute/label to be pushed
    to XM Cyber (e.g., `Google_SecOps_BP`). |

    | **Parameter** | DDL | Yes | The entity or event property to evaluate (e.g.,
    `Compromised Risk Score`, `Is Critical Asset`, `entityID`, `Labels`). |

    | **Operator** | DDL | Yes | The logical operator used to compare the `Parameter`
    against the `Value` (e.g., `Equals`, `Greater than`, `Contains`). |

    | **Value** | String | Yes | The specific value to match against the chosen `Parameter`.
    |


    ### Flow Description

    1. **Authentication**: The action authenticates with the XM Cyber API using either
    API Key or OAuth (Access Token) credentials.

    2. **Input Validation**: It validates the user-provided criteria (Parameter, Operator,
    Value) to ensure they are compatible (e.g., ensuring 'Contains' is only used with
    list-based parameters).

    3. **Entity Identification**:
       - The action scans all **Security Events** associated with the current alert
    to identify asset or user IDs.
       - It scans all **Target Entities** (specifically Hostnames and Users) in the
    current case scope.
    4. **Criteria Evaluation**: For each identified entity, the action checks if its
    properties (retrieved from `additional_properties` populated by previous enrichment)
    match the specified criteria.

    5. **Data Push**: For every entity that meets the criteria, the action sends a
    POST request to the XM Cyber API to apply the specified label (e.g., setting the
    attribute to `true`).

    6. **Completion**: The action returns a summary of the entities successfully updated
    in the XM Cyber platform.


    ### Additional Notes

    - This action requires entities to have been previously enriched by XM Cyber (specifically
    requiring the `XMC_product_object_id` property) to successfully map them back
    to the XM Cyber platform.

    - Supported entity types are **HOSTNAME** and **USER**.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Applies labels/attributes to entities in the XM Cyber platform via a POST request
      to the `/api/entityInventory/applyImportedLabelsOnEntities` endpoint.
