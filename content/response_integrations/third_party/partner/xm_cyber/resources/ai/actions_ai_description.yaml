Enrich Entities:
  ai_description: "### General Description\nThe **Enrich Entities** action retrieves\
    \ deep contextual information for **HOSTNAME** and **USER** entities from the\
    \ XM Cyber platform. It is designed to provide security analysts with visibility\
    \ into asset criticality, compromise risk scores, and associated attack techniques\
    \ by enriching entities with data stored in the XM Cyber environment.\n\n### Parameters\
    \ Description\nThere are no user-configurable parameters for this action. It automatically\
    \ processes all supported entities within the current alert context based on the\
    \ integration's configuration.\n\n### Flow Description\n1. **Entity Identification**:\
    \ The action identifies all `HOSTNAME` and `USER` entities associated with the\
    \ alert.\n2. **Pre-Enrichment Filtering**: \n    * It filters entities to ensure\
    \ they are of supported types.\n    * It checks if the entity has already been\
    \ enriched within the last 24 hours by inspecting the `XMC_last_enriched` property\
    \ in the entity's additional properties.\n    * It verifies if the entity is already\
    \ present in the security events to avoid redundant processing.\n3. **Data Retrieval**:\
    \ For eligible entities, the action queries the XM Cyber API (`/api/secopsPublisher/entities`)\
    \ using the entity identifiers.\n4. **Data Processing**: The retrieved data (e.g.,\
    \ risk scores, labels, AD risk details) is processed and prefixed with `XMC_`\
    \ to distinguish it from other enrichment sources.\n5. **Entity Update**: The\
    \ action updates the entities' `additional_properties` with the new data and marks\
    \ them as enriched by setting the `is_enriched` flag to `True`.\n\n### Additional\
    \ Notes\n* The action uses either API Key or OAuth-based authentication depending\
    \ on the integration configuration.\n* Enrichment data includes fields such as\
    \ `Compromise Risk Score`, `Is Critical Asset`, `Choke Point Score`, and `Attacked\
    \ By Techniques`."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data from XM Cyber and
      sets the is_enriched flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
