Calculate Risk Score:
  ai_description: >-
    ### General Description

    Calculates a comprehensive risk score for an alert by analyzing XM Cyber enrichment
    data embedded within security events and entity properties. This action acts as
    a logic engine that transforms raw enrichment attributes into a structured JSON
    object, enabling playbooks to make informed filtering and prioritization decisions
    based on calculated risk levels.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AD Risk to Domain | DDL | Yes | Select the weight for Active Directory risk
    to domain values (Disabled, Low, Default, High). |

    | AD Risky Principals | DDL | Yes | Select the weight for Active Directory risky
    principals values (Disabled, Low, Default, High). |

    | AD Admins And DCs | DDL | Yes | Select the weight for AD Admins and Domain Controllers
    values (Disabled, Low, Default, High). |

    | User without MFA | DDL | Yes | Select the weight for users lacking Multi-Factor
    Authentication (Disabled, Low, Default, High). |

    | Is Critical Asset | DDL | Yes | Select the weight applied if the entity is identified
    as a critical asset (Disabled, Low, Default, High). |

    | Predefined Admin | DDL | Yes | Select the weight applied if the entity is a
    predefined administrator (Disabled, Low, Default, High). |

    | Highly Privileged | DDL | Yes | Select the weight applied if the entity has
    high privileges (Disabled, Low, Default, High). |

    | Compromise Risk Score | DDL | Yes | Select the weight for the XM Cyber Compromise
    Risk Score (Low, Default, High). |

    | Choke Point Score | DDL | Yes | Select the weight for the XM Cyber Choke Point
    Score (Low, Default, High). |


    ### Additional Notes

    - This action does not perform external API calls; it processes data already present
    in the alert's security events and entity additional properties.

    - The final calculated risk score is capped at 100.

    - The impact score component of the calculation is capped at 1.7.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves user-defined weights for various risk factors
    (e.g., MFA status, administrative privileges) from the action configuration.

    2. **Event Analysis**: Iterates through the alert's security events, searching
    for XM Cyber specific metadata and labels associated with assets or users.

    3. **Entity Analysis**: Iterates through the alert's target entities (filtered
    for Users and Hostnames), checking for XM Cyber enrichment data stored in their
    additional properties.

    4. **Scoring Logic**: For each identified entity, it calculates a risk score using
    a formula that combines a base score with probability and impact multipliers derived
    from the found attributes and configured weights.

    5. **Aggregation**: Consolidates the findings from all events and entities, selecting
    the maximum risk scores and aggregating boolean flags (like 'Is Critical Asset').

    6. **Result Generation**: Produces a final JSON object containing the aggregated
    risk profile, which is then attached to the action result for use in playbook
    decision-making.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
