Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity and authentication configuration between\
    \ Google SecOps and the XM Cyber platform. It ensures that the provided Base URL\
    \ and credentials (either API Key or Access Token) are valid and that the network\
    \ path is open.\n\n### Parameters Description\nThere are no action-specific parameters\
    \ for this action. It relies entirely on the integration's global configuration\
    \ settings (Base URL, API Key, and Authentication Type).\n\n### Flow Description\n\
    1. **Configuration Retrieval**: The action fetches the integration's global settings,\
    \ including the Base URL, API Key, and the selected authentication method (API\
    \ Key vs. Access Token).\n2. **API Manager Initialization**: It initializes the\
    \ internal API communication module.\n3. **Connectivity Test**: \n    * If using\
    \ **API Key Authentication**, the action performs a `POST` request to the `/api/auth/`\
    \ endpoint to validate the key.\n    * If using **Access Token Based Authentication**,\
    \ it initializes the OAuth2 flow, which involves attempting to retrieve or refresh\
    \ an access token.\n4. **Status Reporting**: If the authentication handshake is\
    \ successful, the action returns a success message. If any step fails (e.g., 401\
    \ Unauthorized, connection timeout), it captures the error and reports a failure.\n\
    \n### Additional Notes\nThis action is intended for setup and troubleshooting\
    \ purposes and does not interact with specific security entities or alert data."
