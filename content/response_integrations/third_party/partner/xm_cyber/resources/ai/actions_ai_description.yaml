Get Event Data JSON:
  ai_description: >-
    ### General Description

    The **Get Event Data JSON** action aggregates XM Cyber-specific metadata from
    both the security events of an alert and the entities associated with the case.
    It compiles this information into a structured JSON object, mapping entity identifiers
    to their full XM Cyber context (e.g., risk scores, criticality, and labels). This
    allows playbooks to easily access consolidated threat intelligence and direct
    portal links for all relevant entities in a single step.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes

    - This action is a data-processing utility and does not communicate with the XM
    Cyber API during execution.

    - It relies on data being present from previous enrichment steps or ingestion
    mapping within the alert's `security_events` or the case's `target_entities`.


    ### Flow Description

    1. **Retrieve Context**: The action fetches all security events associated with
    the current alert and all target entities in the case.

    2. **Process Events**: It scans alert events for XM Cyber identifiers and attributes
    (e.g., labels, product object IDs) for assets and users.

    3. **Process Entities**: It filters case entities (Hostnames and Users) for those
    containing XM Cyber enrichment data in their `additional_properties`.

    4. **Map Attributes**: For each identified entity, it extracts specific XM Cyber
    fields such as 'Choke Point Score', 'Compromise Risk Score', and 'AD Risk'.

    5. **Generate Links**: It constructs direct URLs to the XM Cyber portal for each
    entity using the integration's base URL.

    6. **Output Results**: It compiles all gathered data into a single JSON object
    and returns it as the action result.
