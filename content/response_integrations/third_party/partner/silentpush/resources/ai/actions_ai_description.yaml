    3. **API Interaction:** Executes a GET request to the Silent Push Threat Check
    API endpoint (`https://api.threatcheck.silentpush.com/v1/`) using the provided
    parameters.

    4. **Result Processing:** If the API returns data, the action formats the response
    into an output message. If no data is found or the request fails, the action terminates
