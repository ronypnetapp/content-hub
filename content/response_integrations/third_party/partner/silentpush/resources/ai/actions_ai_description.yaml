Get Domain Certificates:
  ai_description: "### General Description\nThis action retrieves SSL/TLS certificate\
    \ data for a specified domain using the Silent Push API. It allows security analysts\
    \ to examine certificate history and metadata collected from domain scanning,\
    \ which is essential for identifying infrastructure patterns, verifying ownership,\
    \ or detecting malicious impersonation and phishing infrastructure.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Domain | string | Yes | The target domain to query certificates\
    \ for (e.g., silentpush.com). |\n| Domain Regex | string | No | A regular expression\
    \ to filter the domains returned in the certificate data. |\n| Certificate Issuer\
    \ | string | No | Filter results by the name of the certificate issuer (CA). |\n\
    | Date Min | string | No | Filter for certificates issued on or after this date\
    \ (ISO format). |\n| Date Max | string | No | Filter for certificates issued on\
    \ or before this date (ISO format). |\n| Prefer | string | No | Specifies whether\
    \ to wait for results (synchronous) or return a job_id immediately (asynchronous).\
    \ |\n| Max Wait | string | No | The number of seconds (0-25) to wait for results\
    \ before the API returns a job_id. |\n| With Metadata | string | No | If set to\
    \ true, includes a metadata object containing result counts and job identifiers.\
    \ |\n| Skip | string | No | The number of results to skip for pagination. |\n\
    | Limit | string | No | The maximum number of results to return. |\n\n### Flow\
    \ Description\n1. **Initialization:** The action extracts the Silent Push server\
    \ URL and API key from the integration configuration.\n2. **Parameter Extraction:**\
    \ It retrieves the target domain and optional filters (regex, issuer, dates, pagination)\
    \ from the action parameters.\n3. **API Request:** The action calls the Silent\
    \ Push `explore/domain/certificates/{domain}` endpoint using a GET request, passing\
    \ the filters as query parameters.\n4. **Response Handling:** \n    * If the API\
    \ returns a `job_status` (indicating a long-running query), the action completes\
    \ successfully and provides the job details for later retrieval.\n    * If the\
    \ API returns certificate data immediately, the action parses the list of certificates\
    \ and associated metadata.\n5. **Completion:** The action outputs the retrieved\
    \ certificate data or job information to the Google SecOps result JSON.\n\n###\
    \ Additional Notes\n* This action is parameter-driven and does not automatically\
    \ iterate over entities in the current case scope. The 'Domain' parameter must\
    \ be explicitly provided or mapped from an entity identifier in a playbook.\n\
    * If no certificates are found for the provided domain, the action will return\
    \ a failure status."
