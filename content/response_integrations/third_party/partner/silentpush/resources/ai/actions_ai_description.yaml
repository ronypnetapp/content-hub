List Domain Infratags:
  ai_description: >-
    ### General Description

    The **List Domain Infratags** action retrieves infrastructure tags (infratags)
    for a specified list of domains from the Silent Push platform. Infratags provide
    critical context about the infrastructure associated with a domain, such as hosting
    providers, shared IP space, or specific technology stacks. This action is designed
    for bulk lookups and can optionally cluster results to identify common infrastructure
    patterns across multiple domains.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Domain** | String | Yes | A comma-separated list of domains to query for infrastructure
    tags. |

    | **Mode** | String | No | The lookup mode to use. Options are `live` (current
    data) or `padns` (historical passive DNS data). Defaults to `live`. |

    | **Match** | String | No | Specifies the handling of self-hosted infrastructure.
    Defaults to `self`. |

    | **As Of** | String | No | A timestamp used when `Mode` is set to `padns` to
    retrieve infrastructure data as it existed at a specific point in time. |

    | **Cluster** | Boolean | No | If set to `true`, the action will cluster the results
    and provide a formatted summary of domain tag clusters. Defaults to `false`. |

    | **Origin UID** | String | No | An optional unique identifier for the request
    origin. |

    | **Use Get** | Boolean | No | A configuration flag; however, the underlying implementation
    uses a POST request to support bulk domain processing. |


    ### Flow Description

    1. **Initialization:** The action extracts the Silent Push API credentials and
    the user-provided parameters, including the list of domains to be analyzed.

    2. **API Interaction:** It sends a POST request to the Silent Push `explore/bulk/domain/infratags`
    endpoint. The request includes the domains, the selected mode (live/padns), and
    other filtering criteria like the 'As Of' timestamp.

    3. **Data Processing:** The action parses the API response to extract infrastructure
    tags. If the `Cluster` parameter is enabled, it also processes and formats the
    `tag_clusters` data into a readable structure.

    4. **Result Delivery:** The retrieved infratags and optional cluster details are
    attached to the action's JSON result. The action completes with a summary message
    indicating the success or failure of the data retrieval.


    ### Additional Notes

    - This action operates independently of the entities currently present in the
    Google SecOps case; it relies strictly on the domains provided in the **Domain**
    input parameter.

    - The `Use Get` parameter is present in the configuration but is not used to change
    the HTTP method, as the bulk lookup logic requires a POST request.
