Get ASNs for Domain:
  ai_description: >-
    ### General Description

    The **Get ASNs for Domain** action retrieves Autonomous System Numbers (ASNs)
    associated with a specific domain using the Silent Push platform. It identifies
    ASNs linked to A records for the domain and its subdomains that have been observed
    in the last 30 days. This action is primarily used for infrastructure mapping
    and network attribution during security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Domain | String | Yes | silentpush.com | The domain name for which to retrieve
    associated ASNs. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Silent Push Server URL
    and API Key from the integration's configuration settings.

    2. **Parameter Retrieval:** It extracts the target domain name from the action
    input parameters.

    3. **API Request:** The action calls the Silent Push `explore/padns/lookup/domain/asns`
    endpoint to fetch ASN records associated with the domain's historical A records.

    4. **Response Validation:** It checks the API response for valid records. If no
    ASNs are found, the action logs an error and terminates with a failure status.

    5. **Result Output:** Upon success, the action returns the list of ASNs in a JSON
    result and provides a summary message to the Google SecOps platform.


    ### Additional Notes

    This action is parameter-driven and does not automatically iterate over entities
    in a case. To use this action with entities, the 'Domain' parameter should be
    mapped to an entity identifier within a playbook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
