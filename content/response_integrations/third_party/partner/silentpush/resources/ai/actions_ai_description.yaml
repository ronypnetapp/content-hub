Density Lookup:
  ai_description: >-
    ### General Description

    The **Density Lookup** action queries the Silent Push platform to retrieve granular
    density information for various DNS and IP parameters. This capability allows
    security analysts to understand the prevalence and distribution of specific infrastructure
    components, such as Name Servers (NS), Mail Servers (MX), IP addresses, and ASNs.
    By analyzing the "density" of these records, analysts can identify patterns associated
    with malicious infrastructure, shared hosting environments, or large-scale campaigns.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qtype** | String | Yes | Specifies the type of density lookup to perform.
    Supported types include `nssrv` (Name Server), `mxsrv` (Mail Server), `nshash`,
    `mxhash`, `ipv4`, `ipv6`, `asn`, and `chv`. |

    | **Query** | String | Yes | The specific value to be queried (e.g., a nameserver
    domain like `ns1.example.com` or an IP address). |

    | **Scope** | String | No | Defines the match level or scope for the lookup to
    filter results. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Silent Push Server URL
    and API Key from the integration settings.

    2. **Parameter Parsing:** It extracts the `Qtype`, `Query`, and `Scope` provided
    by the user.

    3. **API Interaction:** The action calls the Silent Push `density_lookup` API
    endpoint using a GET request.

    4. **Data Validation:** It checks the API response for the presence of density
    records.

    5. **Result Reporting:** If records are found, the action completes successfully
    and returns the record data. If no records are found or an error occurs, the action
    reports a failure.


    ### Additional Notes

    - This action is a standalone lookup and does not automatically process entities
    from the current context; it relies entirely on the manually provided `Query`
    and `Qtype` parameters.
