search domains:
  ai_description: >-
    ### General Description

    This action searches for domains within the Silent Push platform using a wide
    variety of filtering criteria. It allows security analysts to perform advanced
    discovery of infrastructure by querying domain names, name servers, ASNs, registrars,
    and SSL certificate issuers. The action is primarily used for threat hunting and
    infrastructure mapping, returning a list of domain records that match the specified
    search parameters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | No | Name or wildcard pattern of domain names to search for.
    |

    | Domain Regex | string | No | A valid RE2 regex pattern to match domains. If
    provided, this typically overrides the standard domain argument. |

    | Name Server | string | No | Name server name or wildcard pattern used by the
    domains. |

    | Asnum | string | No | Autonomous System (AS) number to filter domains. |

    | Asname | string | No | Search for all AS numbers where the AS Name begins with
    the specified value. |

    | Min IP Diversity | string | No | Minimum IP diversity limit to filter domains.
    |

    | Registrar | string | No | Name or partial name of the registrar used to register
    domains. |

    | Min ASN Diversity | string | No | Minimum ASN diversity limit to filter domains.
    |

    | Certificate Issuer | string | No | Filter domains that had SSL certificates
    issued by the specified certificate issuer. Wildcards are supported. |

    | Whois Date After | string | No | Filter domains with a WHOIS creation date after
    this date (format: YYYY-MM-DD). |

    | Skip | string | No | Number of results to skip in the search query (used for
    pagination). |

    | Limit | string | No | Number of results to return. Defaults to the SilentPush
    API's default behavior. |


    ### Additional Notes

    *   The underlying Python script also attempts to extract parameters for `Start
    Date`, `End Date`, `Risk Score Min`, and `Risk Score Max`, although these are
    not explicitly defined in the provided YAML configuration.

    *   The action returns the search results as a string representation of the records
    list in the output message.


    ### Flow Description

    1.  **Initialization**: The action initializes the `SilentPushManager` using the
    integration's Server URL and API Key.

    2.  **Parameter Extraction**: It retrieves all search filters from the action
    parameters, including domain patterns, regex, network identifiers (ASN), and registration
    details.

    3.  **API Request**: It performs a GET request to the Silent Push `explore/domain/search`
    endpoint, passing the filtered parameters as query arguments.

    4.  **Response Processing**: The action parses the JSON response to extract the
    list of domain records found.

    5.  **Completion**: It sets the action's output message to include the retrieved
    records and marks the execution as completed.
