Add Feed:
  ai_description: >-
    ### General Description

    Adds a new feed to the Silent Push platform. This action allows users to programmatically
    create and configure threat intelligence feeds by providing metadata such as name,
    type, category, and vendor. It is typically used for administrative organization
    or for setting up containers for indicators within the Silent Push ecosystem.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | The unique name for the new feed. |

    | Type | string | Yes | The classification or type of the feed. |

    | Category | string | No | The category the feed belongs to. |

    | Vendor | string | No | The vendor associated with the feed data. |

    | Feed Description | string | No | A description for the feed. Note: The metadata
    suggests this field may be used for a screenshot URL. |

    | Tags | string | No | A comma-separated list of tags to be attached to the feed
    for organization. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Silent Push server URL
    and API key from the integration's global configuration.

    2. **Parameter Retrieval:** It extracts the feed details (Name, Type, Category,
    Vendor, Description, and Tags) from the action's input parameters.

    3. **API Interaction:** The action uses the `SilentPushManager` to send a POST
    request to the `/api/v1/feeds/` endpoint on the Silent Push server with the provided
    metadata.

    4. **Tag Processing:** If tags are provided, they are split into a list before
    being sent in the API payload.

    5. **Execution Finalization:** The action evaluates the API response. If the feed
    is successfully created, it returns a success message; otherwise, it logs an error
    and terminates with a failure status.


    ### Additional Notes

    - This action does not utilize or depend on entities within the Google SecOps
    case scope, although it may log entity identifiers if they are present in the
    context.
