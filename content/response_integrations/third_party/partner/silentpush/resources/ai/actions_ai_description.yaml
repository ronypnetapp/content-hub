  ai_description: "### General Description\nThe **Get ASN Reputation** action retrieves\
    \ historical reputation data for a specific Autonomous System Number (ASN) from\
    \ the Silent Push platform. This information helps security analysts understand\
    \ the risk profile of an ASN over time, including its reputation score and associated\
    \ metadata. \n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
