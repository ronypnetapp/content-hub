Reverse Padns Lookup:
  ai_description: >-
    ### General Description

    This action performs a reverse Passive DNS (PADNS) lookup using the Silent Push
    platform. While a forward DNS lookup resolves a hostname to an IP, a reverse PADNS
    lookup identifies all domain names associated with a specific DNS record value
    (the 'answer'). This allows analysts to find all domains pointing to a specific
    Name Server (NS), Mail Server (MX), or IP address, which is critical for infrastructure
    mapping and identifying related malicious assets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Qtype | string | No | The DNS record type to search for (e.g., 'ns', 'a', 'mx',
    'aaaa'). Defaults to 'ns'. |

    | Qname | string | Yes | The DNS record value (the answer) to lookup (e.g., 'ns1.example.com').
    |

    | Netmask | string | No | A netmask to filter the lookup results. |

    | subdomain | string | No | A flag to include subdomains in the lookup results.
    |

    | Regex | string | No | A regular expression to filter the returned DNS records.
    |

    | Match | string | No | The type of match for the query (e.g., 'exact', 'partial').
    |

    | First Seen After | string | No | Filter results to include only records first
    seen after this date (YYYY-MM-DD). |

    | First Seen Before | string | No | Filter results to include only records first
    seen before this date (YYYY-MM-DD). |

    | Last Seen After | string | No | Filter results to include only records last
    seen after this date (YYYY-MM-DD). |

    | Last Seen Before | string | No | Filter results to include only records last
    seen before this date (YYYY-MM-DD). |

    | As Of | string | No | Retrieve DNS records as they existed at a specific point
    in time. |

    | Sort | string | No | The field by which to sort the results (e.g., 'date').
    |

    | Output Format | string | No | The format for the returned results (e.g., 'JSON').
    |

    | Prefer | string | No | Preference for specific DNS servers or data sources.
    |

    | With Metadata | string | No | Flag to include additional metadata in the DNS
    records. |

    | Max Wait | string | No | Maximum seconds to wait for the API to return results.
    |

    | Skip | string | No | Number of results to skip for pagination. |

    | Limit | string | No | Maximum number of results to return. |


    ### Additional Notes

    Although the script iterates through the entities present in the Google SecOps
    scope, it does not use the entity identifiers to perform the lookup. The search
    is entirely driven by the `Qname` and `Qtype` action parameters provided by the
    user or playbook.


    ### Flow Description

    1. **Initialization**: The action retrieves the Silent Push API key and Server
    URL from the integration configuration.

    2. **Parameter Extraction**: It extracts 18 potential search and filter parameters
    from the action input, with `Qname` being the primary mandatory search term.

    3. **API Request**: The action initializes the `SilentPushManager` and executes
    a GET request to the reverse PADNS endpoint (`explore/padns/lookup/answer`).

    4. **Data Processing**: It parses the JSON response from Silent Push, specifically
    looking for the `records` list within the response object.

    5. **Error Handling**: The script validates the response; if the API returns an
    error or if no records are found for the given criteria, the action is marked
    as failed.

    6. **Finalization**: If successful, the DNS records are returned as a JSON result,
    and the action completes.
