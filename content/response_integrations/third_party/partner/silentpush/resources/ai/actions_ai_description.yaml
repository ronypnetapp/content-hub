Get ASN Takedown Reputation:
  ai_description: >-
    ### General Description

    The **Get ASN Takedown Reputation** action retrieves historical and current takedown
    reputation data for a specific Autonomous System Number (ASN) from the Silent
    Push platform. This information helps security analysts evaluate the risk associated
    with an ASN by reviewing its history of malicious activity and subsequent takedowns.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **ASN** | String | Yes | The Autonomous System Number (ASN) to investigate (e.g.,
    '211298'). |

    | **Explain** | Boolean | No | If set to `true` (default), the response includes
    the underlying information and logic used to calculate the reputation score. |

    | **Limit** | String | No | The maximum number of historical reputation records
    to retrieve from the API. |


    ### Flow Description

    1. **Initialization**: The action extracts the Silent Push Server URL and API
    Key from the integration configuration.

    2. **Input Extraction**: It retrieves the `ASN`, `Explain`, and `Limit` parameters
    provided by the user or playbook.

    3. **API Request**: The action calls the Silent Push API via the `get_asn_takedown_reputation`
    method in the manager class, which performs a GET request to the `explore/takedownreputation/asn/{asn}`
    endpoint.

    4. **Response Validation**: It checks if the API returned valid takedown reputation
    history. If no data is found, the action fails with an informative error message.

    5. **Output Generation**: The retrieved reputation data is formatted into a JSON
    object and returned as the action's primary result for use in playbooks.


    ### Additional Notes

    - This action operates based on the manually provided **ASN** parameter rather
    than automatically iterating through entities in the case scope. While it accesses
    the `target_entities` list, it does not use them to drive the lookup logic.
