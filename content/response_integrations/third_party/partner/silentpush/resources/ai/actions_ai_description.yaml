    ### General Description

    This action retrieves comprehensive enrichment information for a specific resource,
    such as a domain, IPv4, or IPv6 address, from the Silent Push platform. It is
    designed for manual lookups where a user provides a specific value to investigate.
    The action returns detailed metadata, including ASN information and reputation
    data, which can be used to assess the risk associated with the resource.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Resource | string | Yes | The type of resource for which information needs to
    be retrieved (e.g., domain, ipv4, ipv6). |

    | Value | string | Yes | The value corresponding to the selected resource (e.g.,
    silentpush.com or an IP address). |

    | Explain | boolean | No | When set to `true`, the response will include an explanation
    of how the data calculations were performed. |

    | Scan Data | boolean | No | When set to `true`, the response will include scan
    data. This is only applicable when the resource type is `ipv4`. |


    ### Additional Notes

    - This action does not automatically process entities from the Google SecOps case
    scope; it relies entirely on the provided `Value` and `Resource` parameters.

    - The `Scan Data` parameter is only applicable when the `Resource` type is set
    to `ipv4`.

    - The action performs a read-only operation and does not modify any data in Silent
    Push or Google SecOps.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction**: It retrieves the user-provided parameters: `Resource`,
    `Value`, `Explain`, and `Scan Data`.

    3. **Input Validation**: The action validates that the `Resource` type is one
    of the allowed values (`ipv4`, `ipv6`, `domain`). If the resource is an IP, it
    validates the format using the `validate_ip` helper.

    4. **Data Retrieval**: It calls the `get_enrichment_data` method in the `SilentPushManager`,
    which sends a GET request to the Silent Push API's enrichment endpoint.

    5. **Result Handling**: If data is retrieved, it is added to the action's JSON
    results. The action then concludes by providing an output message and a success
    status. If an error occurs or no data is found, it logs the error and ends with
    a failure status.
