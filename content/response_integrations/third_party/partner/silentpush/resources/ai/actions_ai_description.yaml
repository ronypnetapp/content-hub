Add Indicators:
  ai_description: >-
    ### General Description

    The **Add Indicators** action allows users to programmatically add a list of indicators
    (such as domains or IP addresses) to a specific feed within the Silent Push platform.
    This action is primarily used for updating threat intelligence feeds with new
    indicators identified during an investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed UUID | String | Yes | The unique identifier (UUID) of the target feed in
    Silent Push where indicators will be added. |

    | Indicators | String | Yes | A comma-separated list of indicators (e.g., 'example.com,
    1.2.3.4') to be added to the feed. |


    ### Additional Notes

    - Although the configuration metadata marks parameters as not mandatory, the action
    logic requires a valid `Feed UUID` to construct the API endpoint and `Indicators`
    to provide data to the external system.

    - The action code extracts an `ASN` parameter which is not defined in the provided
    YAML configuration; this parameter appears to be used primarily for error reporting
    in the current implementation.

    - The action iterates through all entities in the current scope and logs their
    identifiers, but it does not perform any enrichment or modifications on the entities
    themselves.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Silent Push server URL and API
    key from the integration settings.

    2. **Parameter Retrieval:** Extracts the target Feed UUID and the list of indicators
    from the action input parameters.

    3. **API Interaction:** Initializes the Silent Push Manager and sends a POST request
    to the indicators endpoint for the specified feed.

    4. **Entity Logging:** Iterates through the `target_entities` in the Google SecOps
    case and logs their identifiers to the script output for visibility.

    5. **Completion:** Returns a success message if the indicators were added successfully
    or terminates with a failure status if the API returns an error or no data.
