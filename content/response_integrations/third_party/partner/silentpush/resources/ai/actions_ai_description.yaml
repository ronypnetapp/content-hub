Live URL Scan:
  ai_description: >-
    ### General Description

    The **Live URL Scan** action performs a real-time scan of a specified URL using
    the Silent Push platform to retrieve comprehensive hosting metadata. This action
    is designed to provide technical insights into how a URL is served across various
    environments, including different platforms, operating systems, and browsers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **URL** | String | Yes | The target URL to be scanned for hosting metadata.
    |

    | **Platform** | String | No | The device platform to simulate during the scan.
    Supported values: `Desktop`, `Mobile`, `Crawler`. |

    | **Os** | String | No | The operating system to simulate during the scan. Supported
    values: `Windows`, `Linux`, `MacOS`, `iOS`, `Android`. |

    | **Browser** | String | No | The web browser to simulate during the scan. Supported
    values: `Firefox`, `Chrome`, `Edge`, `Safari`. |

    | **Region** | String | No | The geographic region from which the scan request
    should originate. Supported values: `US`, `EU`, `AS`, `TOR`. |


    ### Additional Notes

    - This action operates primarily on the provided **URL** parameter rather than
    iterating through SecOps entities.

    - The action includes built-in validation for optional parameters; providing a
    value outside the supported lists will result in an execution failure.

    - If the Silent Push API returns no scan data for the specified URL, the action
    will terminate with a failure status.


    ### Flow Description

    1. **Initialization:** The action extracts the integration configuration (Server
    URL and API Key) and the user-provided action parameters.

    2. **Validation:** It validates the optional simulation parameters (Platform,
    OS, Browser, Region) against allowed values to ensure a successful API request.

    3. **API Request:** The action sends a GET request to the Silent Push `scanondemand`
    endpoint with the specified URL and simulation criteria.

    4. **Data Processing:** It parses the API response to extract hosting metadata
    and scan results.

    5. **Output Generation:** The retrieved scan data is formatted and added to the
    action's result JSON, providing the user with a detailed summary of the URL's
    hosting environment.
