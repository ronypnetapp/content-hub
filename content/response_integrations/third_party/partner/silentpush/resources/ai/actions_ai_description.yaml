Add Feed Tags:
  ai_description: >-
    ### General Description

    The **Add Feed Tags** action allows users to append specific tags to an existing
    feed within the Silent Push platform. This is primarily used for organizing and
    categorizing threat intelligence feeds based on custom metadata or operational
    requirements.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Feed UUID** | String | Yes | The unique identifier (UUID) of the feed in Silent
    Push that you want to update. |

    | **Tags** | String | No | A comma-separated list of tags to be added to the specified
    feed. |


    ### Additional Notes

    - Although the YAML configuration lists the parameters as non-mandatory, the action
    logic requires a valid `Feed UUID` to construct the API endpoint.

    - The Python script attempts to extract an `ASN` parameter which is not present
    in the YAML configuration; this parameter is currently only used in error logging.

    - The YAML description incorrectly mentions adding "indicators," whereas the action
    specifically manages "tags."


    ### Flow Description

    1. **Initialization**: The action retrieves the Silent Push Server URL and API
    Key from the integration configuration.

    2. **Parameter Extraction**: It extracts the `Feed UUID` and the string of `Tags`
    provided by the user.

    3. **API Interaction**: The `SilentPushManager` formats the tags into a list and
    performs a **POST** request to the `/api/v1/feeds/{feed_uuid}/tags/` endpoint.

    4. **Result Handling**: The action checks the API response. If successful, it
    returns the result; otherwise, it logs an error and marks the action as failed.
