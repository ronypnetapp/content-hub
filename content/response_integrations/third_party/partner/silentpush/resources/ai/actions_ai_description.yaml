    \ System Number (ASN) to perform the reputation lookup for. |\n| **Explain** |\
    \ Boolean | No | If enabled, the action will include detailed information explaining\
    \ how the reputation score was calculated. |\n| **Limit** | String | No | Specifies\
    \ the maximum number of historical reputation records to retrieve. |\n\n### Additional\
    \ Notes\n* Although the action metadata description mentions IPv4, the logic specifically\
    \ performs a lookup based on the provided **ASN** parameter.\n* The results are\
    \ sorted by date in descending order (most recent first).\n\n### Flow Description\n\
    1. **Configuration Extraction:** Retrieves the Silent Push Server URL and API\
    \ Key from the integration settings.\n2. **Parameter Parsing:** Extracts the target\
    \ `ASN`, the `Explain` flag, and the `Limit` value from the action inputs.\n3.\
    \ **API Interaction:** Connects to the Silent Push API via the `SilentPushManager`\
    \ and requests reputation history for the specified ASN using a GET request.\n\
    4. **Data Processing:** Extracts the reputation records from the API response,\
    \ sorts them by date (newest first), and formats them into a structured list suitable\
    \ for a results table.\n5. **Result Delivery:** Adds the formatted reputation\
    \ data to the action's JSON results and completes the execution with a success\
