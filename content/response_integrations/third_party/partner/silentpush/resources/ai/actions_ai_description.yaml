    'API Key' from the integration configuration.

    2. **Manager Initialization:** It initializes the `SilentPushManager` with the
    extracted credentials.

    3. **Connectivity Test:** It executes the `test_connection` method, which performs
    a lightweight API call (a domain search with a limit of 1) to validate the credentials
    and server reachability.

    4. **Action Completion:** If the API call succeeds, the action completes with
    a success message. If it fails (e.g., due to invalid credentials or network issues),
    it reports the error and fails the execution.
