    \ score and a detailed explanation for each domain. Default is `false`. |\n| **Fetch\
    \ Whois Info** | Boolean | No | If set to `true`, the action performs a live WHOIS\
    \ lookup to retrieve registration details for each domain. Default is `false`.\
    \ |\n\n### Flow Description\n1. **Initialization**: The action extracts the API\
    \ key and server URL from the integration configuration and parses the input domain\
    \ list from the action parameters.\n2. **Data Retrieval**: \n    - The action\
    \ performs a bulk request to fetch general domain information (e.g., infrastructure\
    \ tags, IP diversity).\n    - If enabled, it fetches risk scores for the provided\
    \ domains.\n    - If enabled, it performs individual WHOIS lookups for each domain\
    \ in the list.\n3. **Processing**: The action aggregates the data from different\
    \ Silent Push endpoints into a unified structure for each domain.\n4. **Output**:\
    \ It generates a Markdown summary for the case wall and a structured JSON object\
    \ containing the full results for use in downstream playbook logic.\n\n### Additional\
