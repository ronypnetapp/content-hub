    The **Run Threat check** action queries the Silent Push Threat Check API to retrieve
    intelligence on a specific indicator, such as an IP address or domain. It allows
    users to verify if a value is present within a specific Silent Push data source
    (e.g., 'iofa') and returns the associated threat data. This action is primarily
    used for manual or automated lookups of indicators that may not be directly associated
    with the current alert's entities.


