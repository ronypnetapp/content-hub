Forward Padns Lookup:
  ai_description: >-
    ### General Description

    Performs a forward Passive DNS (PADNS) lookup using the Silent Push API. This
    action allows users to retrieve historical DNS records for a specific domain or
    record name (`Qname`) and record type (`Qtype`). It supports extensive filtering
    options such as date ranges (first/last seen), regex patterns, and netmasks to
    narrow down the results.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qname** | string | Yes | The DNS record name to lookup (e.g., 'silentpush.com').
    |

    | **Qtype** | string | No | The DNS record type to query (e.g., 'ns', 'a', 'mx').
    Defaults to 'ns'. |

    | **Netmask** | string | No | Filter results by a specific network mask. |

    | **subdomain** | string | No | Flag to include subdomains in the lookup results.
    |

    | **Regex** | string | No | A regular expression to filter the returned DNS records.
    |

    | **Match** | string | No | Specifies the match type for the query (e.g., 'exact',
    'partial'). |

    | **First Seen After** | string | No | Filter for records first observed after
    this timestamp. |

    | **First Seen Before** | string | No | Filter for records first observed before
    this timestamp. |

    | **Last Seen After** | string | No | Filter for records last observed after this
    timestamp. |

    | **Last Seen Before** | string | No | Filter for records last observed before
    this timestamp. |

    | **As Of** | string | No | Retrieve DNS records as they appeared at a specific
    point in time. |

    | **Sort** | string | No | Field used to sort the results. |

    | **Output Format** | string | No | The desired format for the output data. |

    | **Prefer** | string | No | Preference for specific DNS sources or servers. |

    | **With Metadata** | string | No | Whether to include additional metadata in
    the response. |

    | **Max Wait** | string | No | Maximum time in seconds to wait for the API response.
    |

    | **Skip** | string | No | Number of records to skip for pagination. |

    | **Limit** | string | No | Maximum number of records to return in the response.
    |


    ### Flow Description

    1. **Configuration**: Extracts the Silent Push server URL and API key from the
    integration settings.

    2. **Input Gathering**: Collects the mandatory `Qname` and optional filtering
    parameters from the action input.

    3. **API Execution**: Initiates a GET request to the Silent Push `explore/padns/lookup/query`
    endpoint, passing the query type, name, and filters as parameters.

    4. **Validation**: Checks the API response for errors. If the API returns an error
    or no records are found, the action fails with a descriptive message.

    5. **Completion**: Returns the list of DNS records found as the action result.


    ### Additional Notes

    This action is parameter-driven and does not automatically process entities from
    the current context. The `Qname` must be explicitly provided to perform the lookup.
