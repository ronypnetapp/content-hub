    |

    | **User Identifier** | string | Yes | A unique identifier for the user making
    the request, used by Silent Push for tracking and auditing. |


    ### Additional Notes

    - This action does not automatically process entities from the Google SecOps case;
    it relies entirely on the manually provided **Query** parameter.

    - Although the underlying script attempts to extract `Feed UUID` and `ASN` parameters,
