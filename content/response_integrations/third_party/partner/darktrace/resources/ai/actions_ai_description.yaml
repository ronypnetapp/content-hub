Update Model Breach Status:
  ai_description: >-
    ### General Description

    Updates the status of a specific model breach in Darktrace. This action allows
    security analysts to programmatically acknowledge or unacknowledge breaches identified
    by Darktrace, facilitating automated incident response workflows and status synchronization
    between Google SecOps and Darktrace.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Status | DDL | Yes | Specifies the target status for the model breach. Supported
    values are `Acknowledged` and `Unacknowledged`. |

    | Model Breach ID | String | Yes | The unique identifier of the model breach in
    Darktrace that needs to be updated. |


    ### Flow Description

    1. **Initialization**: The action initializes the Darktrace manager using API
    credentials and configuration parameters.

    2. **Current State Retrieval**: It fetches the current details of the specified
    model breach from Darktrace using the `Model Breach ID` to determine its existing
    acknowledgment status.

    3. **Status Comparison**: The action compares the current status with the requested
    `Status` parameter. If the breach already has the requested status, it raises
    an `AlreadyAppliedException` and completes successfully without further action.

    4. **Mutation**: If the status needs to be changed, the action sends a POST request
    to the Darktrace API to either acknowledge or unacknowledge the breach based on
    the input.

    5. **Completion**: The action returns a success message confirming the status
    update or indicating that the status was already set as requested.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the acknowledgment status of a model breach in the Darktrace platform
      by sending POST requests to the /acknowledge or /unacknowledge endpoints.
    fetches_data: true
    internal_data_mutation_explanation: null
