List Similar Devices:
  ai_description: >-
    ### General Description

    Retrieves a list of devices from Darktrace that exhibit similar behavioral patterns
    to the provided endpoint entities. This action leverages Darktrace's AI-driven
    analysis to identify related assets, which is critical for scoping potential compromises
    or identifying lateral movement during an investigation. It supports IP Address,
    Hostname, and MAC Address entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Max Devices To Return | Integer | No | 50 | Specifies the maximum number of
    similar devices to retrieve for each identified entity. |


    ### Flow Description

    1. **Parameter Validation**: Validates that the 'Max Devices To Return' parameter
    is a positive integer greater than zero.

    2. **Connection Initialization**: Establishes a secure connection to the Darktrace
    API using the configured API Root and tokens.

    3. **Entity Filtering**: Filters the case's target entities to identify supported
    types: ADDRESS (IP), HOSTNAME, and MacAddress.

    4. **Device Identification**: For each valid entity, the action searches Darktrace
    to find its corresponding internal Device ID (DID).

    5. **Similarity Query**: Queries the Darktrace '/similardevices' endpoint using
    the DID to fetch a list of similar devices, limited by the user-defined threshold.

    6. **Data Enrichment**: Enriches the case by adding a detailed data table to each
    successful entity and populating the action's JSON results with the raw device
    data.


    ### Additional Notes

    - The 'Max Devices To Return' parameter must be greater than 0; otherwise, the
    action will fail with an error.

    - If a matching device cannot be found in Darktrace for a specific entity, that
    entity will be reported as failed in the final output message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action enriches entities by adding data tables containing similar device
      information and populates the action's JSON results with the retrieved data.
