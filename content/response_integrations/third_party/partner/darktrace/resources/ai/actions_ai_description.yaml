Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query in Darktrace to retrieve specific event or threat
    data within a defined timeframe. This action allows users to leverage Darktrace's
    advanced search capabilities directly from Google SecOps, returning raw search
    hits for further analysis or automation logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The specific Darktrace query string to be executed. |

    | Time Frame | DDL | No | The temporal scope for the search. Options include relative
    ranges (e.g., 'Last Hour'), alert-relative ranges (e.g., '5 Minutes Around Alert
    Time'), or 'Custom'. Defaults to 'Last Hour'. |

    | Start Time | String | No | The ISO 8601 formatted start time. This is mandatory
    if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The ISO 8601 formatted end time. If 'Custom' is selected
    and this is empty, the current time is used. |

    | Max Results To Return | String | No | Limits the number of hits returned by
    the search. Defaults to 50. |


    ### Additional Notes

    - If 'Custom' is selected as the 'Time Frame', the 'Start Time' parameter must
    be provided, otherwise the action will fail.

    - When using alert-relative timeframes (e.g., '30 Minutes Around Alert Time'),
    the action automatically calculates the range based on the start and end times
    of the current alert in Google SecOps.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves API configuration and user-provided search
    parameters.

    2. **Time Range Calculation**: Determines the absolute start and end timestamps
    based on the 'Time Frame' selection and alert context.

    3. **Query Encoding**: Formats the search parameters into a JSON structure and
    encodes it into a Base64 string as required by the Darktrace Advanced Search API.

    4. **API Execution**: Sends a GET request to the Darktrace `/advancedsearch/api/search/{base64_query}`
    endpoint.

    5. **Data Parsing**: Processes the API response and converts the resulting hits
    into a structured JSON format.

    6. **Result Reporting**: Returns the search results to the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
