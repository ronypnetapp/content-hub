List Endpoint Events:
  ai_description: >-
    ### General Description

    This action retrieves the latest security and network events related to specific
    endpoints from Darktrace. It supports searching for events based on IP addresses,
    Hostnames, or MAC addresses. The action allows users to filter by specific event
    types (such as connections, unusual connections, or model breaches) and define
    a specific time window for the search. The retrieved data is presented as data
    tables on the case wall and as a raw JSON result for further automation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Event Type** | String | Yes | A comma-separated list of event types to retrieve.
    Supported values include: `connection`, `unusualconnection`, `newconnection`,
    `notice`, `devicehistory`, `modelbreach`. |

    | **Time Frame** | DDL | Yes | The time range for the search (e.g., Last Hour,
    Last 24 Hours). If set to "Custom", the "Start Time" parameter must be provided.
    |

    | **Start Time** | String | No | The start time for the search in ISO 8601 format.
    This is mandatory only if "Time Frame" is set to "Custom". |

    | **End Time** | String | No | The end time for the search in ISO 8601 format.
    If left empty while using a "Custom" time frame, the current time is used. |

    | **Max Events To Return** | String | No | The maximum number of events to return
    per event type. Defaults to 50. |


    ### Additional Notes

    - Events are returned in the UTC timezone.

    - The action first attempts to resolve the entity to a Darktrace Device ID (`did`)
    before fetching events.

    - If multiple event types are requested, a separate data table is created for
    each type per entity.


    ### Flow Description

    1. **Parameter Initialization**: Extracts API configuration and action parameters,
    validating that the provided event types and limits are valid.

    2. **Time Calculation**: Determines the start and end timestamps based on the
    selected "Time Frame" or custom inputs.

    3. **Entity Resolution**: For each supported entity (IP, Hostname, or MAC Address),
    the action queries Darktrace to find the corresponding internal Device ID.

    4. **Event Retrieval**: If a device is found, the action iterates through the
    requested event types and fetches the latest events within the specified time
    range.

    5. **Data Output**: Successfully retrieved events are formatted into data tables
    and added to the case wall. The full dataset is also attached as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds data tables to the Google SecOps case wall to display the retrieved
      endpoint events.
  categories:
