Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, MAC Address, and URL entities using threat intelligence
    and device metadata from Darktrace. This action retrieves comprehensive device
    details, endpoint information, and optionally historical connection data to provide
    security analysts with context regarding internal and external endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fetch Connection Data | boolean | No | If enabled, the action retrieves additional
    information about network connections related to internal Darktrace endpoints.
    |

    | Max Hours Backwards | string | No | Specifies the lookback window (in hours)
    for fetching connection data. Defaults to 24. If a value less than 1 is provided,
    the default is used. |

    | Create Endpoint Insight | boolean | No | If enabled, generates a detailed insight
    for the entity in the Google SecOps case containing hostname, IP, MAC, OS, and
    device type information. |


    ### Flow Description

    1. **Initialization**: The action extracts API credentials (API Root, Token, Private
    Token) and configuration parameters, including the connection data toggle and
    lookback window.

    2. **Entity Filtering**: It identifies supported entities from the case, specifically
    targeting IP Addresses, Hostnames, MAC Addresses, and URLs.

    3. **Data Retrieval**: For each entity, the action queries the Darktrace API:
        * **IP/MAC**: Fetches device or endpoint details directly.
        * **Hostname**: Searches for the device to retrieve its IP or MAC, then fetches
    full details.
        * **URL**: Extracts the domain or path and queries for endpoint details.
    4. **Connection Enrichment**: If `Fetch Connection Data` is active and a device
    ID is found, the action retrieves historical connection logs for the specified
    timeframe.

    5. **Internal Updates**: The action enriches the entities by updating their additional
    properties with Darktrace metadata, adding data tables for interacted devices
    and connections, and marking the entities as enriched.

    6. **Insight Generation**: If `Create Endpoint Insight` is enabled, a formatted
    insight is added to the entity for quick reference.

    7. **Finalization**: The action updates the entities in the Google SecOps environment
    and returns a JSON summary of the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with enrichment data, sets the 'is_enriched'
      flag, adds data tables to the case, and creates entity insights containing device
      and endpoint details.
  categories:
    enrichment: true
  entity_usage:
