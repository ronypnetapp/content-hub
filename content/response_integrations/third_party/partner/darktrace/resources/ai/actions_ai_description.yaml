Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Darktrace server. It validates that the integration's configuration
    parameters, such as the API Root and authentication tokens, are correctly set
    and that the Darktrace API is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Darktrace API instance (e.g.,
    https://darktrace-instance.com). |

    | **API Token** | String | Yes | The public API token used for authentication.
    |

    | **API Private Token** | String | Yes | The private API token used to generate
    the HMAC signature for request headers. |

    | **Verify SSL** | Boolean | No | If set to true, the action will validate the
    SSL certificate of the Darktrace server. |


    ### Additional Notes

    This action does not process any entities and is strictly used for testing the
    integration's communication with the Darktrace API. It targets the `/status` endpoint
    to confirm service availability.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, API Token, Private
    Token, and SSL verification settings from the integration configuration.

    2. **Manager Initialization:** It initializes the `DarktraceManager` with the
    extracted credentials.

    3. **Connectivity Test:** The manager executes a signed GET request to the Darktrace
    `/status` endpoint.

    4. **Response Validation:** The action checks the HTTP response and any error
    messages returned by the API.

    5. **Execution Result:** If the request is successful, the action completes with
    a success message; otherwise, it fails and provides the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
