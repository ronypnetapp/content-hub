Add Comment To Model Breach:
  ai_description: "### General Description\nAdds a comment to a specific model breach\
    \ in Darktrace. This action allows analysts to document findings, provide updates,\
    \ or add context directly to a Darktrace alert from within Google SecOps. It targets\
    \ a specific model breach using its unique identifier.\n\n### Parameters Description\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Model Breach ID | String | Yes | The unique identifier of the model breach\
    \ in Darktrace to which the comment will be added. |\n| Comment | String | Yes\
    \ | The text content of the comment to be appended to the model breach record.\
    \ |\n\n### Flow Description\n1. **Initialization**: The action extracts the necessary\
    \ API configuration (Root URL, Token, Private Token) and the specific action parameters\
    \ (Model Breach ID and Comment).\n2. **API Connection**: Initializes the Darktrace\
    \ Manager to establish a secure connection to the Darktrace API.\n3. **Execution**:\
    \ Sends a POST request to the Darktrace endpoint `/modelbreaches/{model_breach_id}/comments`\
    \ containing the comment payload.\n4. **Error Handling**: Specifically catches\
    \ cases where the Model Breach ID does not exist (NotFoundException) and provides\
    \ a clear error message. \n5. **Completion**: Returns the JSON response from the\
    \ Darktrace API and marks the action as completed or failed based on the outcome.\n\
    \n### Additional Notes\nThis action performs a state-changing operation in the\
    \ external Darktrace system. It does not interact with or modify entities within\
    \ the Google SecOps environment."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment to a model breach record in the Darktrace platform via a
      POST request to the API.
    fetches_data: false
    internal_data_mutation_explanation: null
