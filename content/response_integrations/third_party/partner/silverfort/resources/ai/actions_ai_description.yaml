List Policies:
  ai_description: >-
    ### General Description

    This action retrieves a comprehensive list of authentication policies from the
    Silverfort Identity Security platform. It allows users to fetch all configured
    policies or filter the response to include only specific fields of interest, such
    as policy names, status, authentication types, and protocols. This is primarily
    used for auditing, configuration review, or as a helper step in automation playbooks
    to identify existing security controls.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Fields | A comma-separated list of specific policy attributes to include in
    the response (e.g., `enabled, policyName, action`). If left empty, all available
    fields are returned. Valid fields include: `enabled`, `policyName`, `authType`,
    `protocols`, `policyType`, `allUsersAndGroups`, `usersAndGroups`, `allDevices`,
    `sources`, `allDestinations`, `destinations`, `action`, `MFAPrompt`, `all`, `bridgeType`.
    | String | No |


    ### Additional Notes

    - If invalid fields are provided in the `Fields` parameter, the action will log
    a warning and ignore the invalid entries while continuing to process the valid
    ones.

    - This action does not require or interact with any specific entities (like IPs
    or Users) from the Google SecOps case; it performs a global query against the
    Silverfort environment.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Fields` input provided
    by the user.

    2. **Field Validation:** If fields are specified, the script parses the comma-separated
    string and validates each field against the supported Silverfort policy schema.
    Invalid fields are logged as warnings.

    3. **API Client Initialization:** The action initializes a `PolicyApiClient` using
    the integration's configured API Root and credentials (JWT-based authentication).

    4. **Data Retrieval:** The action sends a request to the Silverfort `/v2/public/policies/index`
    endpoint to fetch the policy data.

    5. **Result Processing:** The retrieved list of policies is converted into a JSON
    format and attached to the action's results. A success message indicating the
    total count of policies found is generated.
