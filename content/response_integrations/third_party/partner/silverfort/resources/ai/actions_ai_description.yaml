Change Policy State:
  ai_description: >-
    ### General Description

    This action enables or disables an authentication policy in Silverfort. It allows
    security analysts to quickly toggle the active state of a policy without needing
    to modify its underlying configuration. This is useful for emergency containment
    or temporary policy adjustments during an incident.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy ID | string | Yes | The unique identifier of the Silverfort policy to
    be enabled or disabled. |

    | Enable Policy | boolean | Yes | Set to `true` to enable the policy or `false`
    to disable it. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Policy ID` and the desired
    `Enable Policy` state from the user input.

    2. **API Client Initialization**: It initializes the Silverfort Policy API client
    using the configured integration credentials.

    3. **State Change Request**: The action sends a POST request to the Silverfort
    `/v1/public/changePolicyState` endpoint with the policy ID and the target state.

    4. **Result Processing**: Upon a successful API response, the action constructs
    a JSON result containing the policy ID and its new status, and provides a success
    message to the SOAR case wall.
