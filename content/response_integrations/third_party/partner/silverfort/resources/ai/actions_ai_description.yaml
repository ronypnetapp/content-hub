Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Silverfort API. It ensures that the provided **External API Key** is valid
    and tests the connection for each specific Silverfort module (Risk, Service Accounts,
    and Policies) that has been configured with credentials.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Silverfort API instance. |

    | **External API Key** | String | Yes | The primary API key used for authentication
    across all Silverfort services. |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Silverfort API. Defaults to `True`. |

    | **Risk App User ID / Secret** | String | No | Credentials required to test connectivity
    specifically for the Risk API. |

    | **Service Accounts App User ID / Secret** | String | No | Credentials required
    to test connectivity specifically for the Service Accounts API. |

    | **Policies App User ID / Secret** | String | No | Credentials required to test
    connectivity specifically for the Policies API. |


    ### Additional Notes

    - At least one set of API credentials (Risk, Service Accounts, or Policies) must
    be configured in the integration settings for the action to perform specific module
    tests.

    - If no module-specific credentials are provided, the action will raise an error
    indicating that no credentials are configured.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the integration parameters,
    including the API Root and various credentials.

    2. **API Identification:** It determines which Silverfort APIs (Risk, Service
    Accounts, Policies) are configured based on the presence of User IDs and Secrets.

    3. **Connectivity Testing:** For each configured API, the action performs a lightweight
    request:
        - **Risk API:** Attempts a GET request to the `getEntityRisk` endpoint.
        - **Service Accounts API:** Attempts a POST request to the `list_service_accounts`
    endpoint with a page size of 1.
        - **Policies API:** Attempts a GET request to the `get_rules_names_and_ids`
    endpoint.
    4. **Result Aggregation:** The action collects the results. If all configured
    APIs connect, it returns a success message. If some fail, it returns a partial
    success message listing the failed modules. If all fail or none are configured,
    it returns an error.
