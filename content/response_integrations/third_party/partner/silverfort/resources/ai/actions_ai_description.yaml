Get Policy:
  ai_description: >-
    ### General Description

    The **Get Policy** action retrieves comprehensive configuration details for a
    specific authentication policy within the Silverfort platform. It is used to inspect
    policy settings, including associated users, groups, source/destination constraints,
    and the specific security actions (e.g., MFA, Block) defined for that policy.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Policy ID** | String | Yes | The unique identifier of the Silverfort policy
    to retrieve. |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the mandatory `Policy ID` from
    the input parameters.

    2. **Client Initialization:** It initializes an authenticated connection to the
    Silverfort Policies API using the configured credentials.

    3. **Data Retrieval:** The action sends a GET request to the Silverfort API endpoint
    `/v2/public/policies/{policy_id}` to fetch the policy details.

    4. **Result Processing:** The retrieved policy configuration is parsed into a
    structured JSON object and returned as the action's result, providing visibility
    into the policy's state and rules.


    ### Additional Notes

    - This action does not operate on SOAR entities; it requires a specific Policy
    ID as input.

    - The returned data includes detailed configuration such as authentication types,
    protocols, and destination services.
