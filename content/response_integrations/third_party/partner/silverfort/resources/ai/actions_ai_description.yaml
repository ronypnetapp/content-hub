Get Entity Risk:
  ai_description: >-
    ### General Description

    This action retrieves detailed risk information for a specific user or resource
    from the Silverfort Identity Security platform. It provides visibility into the
    security posture of an entity by returning its current risk score, severity level
    (e.g., Low, Medium, High, Critical), and specific risk factors identified by Silverfort's
    analysis engine.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | String | No* | The User Principal Name (UPN) of the user
    (e.g., user@domain.com). |

    | Resource Name | String | No* | The name of the resource for non-user entities.
    |


    **Additional Notes:** Either the 'User Principal Name' or the 'Resource Name'
    must be provided for the action to execute successfully. If both are missing,
    the action will fail with a validation error.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the 'User Principal Name' and
    'Resource Name' from the input parameters.

    2. **Validation**: It validates that at least one of the two identifiers is provided
    to ensure the API request has a target entity.

    3. **API Client Initialization**: The action initializes the Silverfort Risk API
    client using the integration's configured credentials and API root.

    4. **Data Retrieval**: It performs a GET request to the Silverfort `/v1/public/getEntityRisk`
    endpoint using the provided identifier.

    5. **Result Processing**: The action captures the risk score, severity, and risk
    factors from the API response, stores them in the action's JSON results, and generates
    a success message for the case wall.
