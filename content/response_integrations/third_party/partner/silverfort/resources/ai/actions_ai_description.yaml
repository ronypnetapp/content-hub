Update Entity Risk:
  ai_description: >-
    ### General Description

    Updates risk information for a specific user in Silverfort. This action allows
    security analysts to manually or automatically adjust a user's risk profile (type,
    severity, and duration) based on external intelligence or observed behavior within
    the Silverfort platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | String | Yes | The user principal name (e.g., user@domain.com)
    of the user whose risk profile is being updated. |

    | Risk Type | DDL | Yes | The specific category of risk to update. Options include:
    `activity_risk`, `malware_risk`, `data_breach_risk`, or `custom_risk`. |

    | Severity | DDL | Yes | The severity level to assign to the risk indicator. Options
    include: `low`, `medium`, `high`, or `critical`. |

    | Valid For Hours | String | Yes | The duration (in hours) for which this risk
    indicator should remain valid. This must be a positive integer. |

    | Description | String | Yes | A descriptive text providing context or a reason
    for the risk update. |


    ### Additional Notes

    This action performs a state-changing operation in the external Silverfort system.
    It does not automatically iterate over entities in the Google SecOps case; instead,
    it relies on the provided `User Principal Name` parameter.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the UPN, risk type, severity,
    duration, and description from the input parameters.

    2. **Validation:** It validates that the `Risk Type` and `Severity` match supported
    Silverfort values and ensures the `Valid For Hours` is a positive integer.

    3. **API Client Initialization:** Initializes the Silverfort Risk API client using
    the configured integration credentials.

    4. **Risk Update Execution:** Constructs a risk update payload and sends a POST
    request to the Silverfort `/v1/public/updateEntityRisk` endpoint.

    5. **Result Reporting:** Captures the API response and updates the action's output
    message and JSON results to reflect the success of the operation.
