Update Policy:
  ai_description: >-
    ### General Description

    Updates an existing authentication policy in Silverfort. This action allows for
    the modification of a policy's operational state (enabled or disabled) and provides
    granular control over the policy's scope by adding or removing specific users,
    groups, network sources, and destinations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy ID | String | Yes | The unique identifier of the Silverfort policy to
    update. |

    | Enabled | Boolean | No | Sets the policy to enabled (true) or disabled (false).
    |

    | Add Users and Groups | String | No | A JSON array of user/group objects to add
    to the policy scope. Format: `[{"identifierType": "upn", "identifier": "user@domain.com"}]`.
    |

    | Remove Users and Groups | String | No | A JSON array of user/group objects to
    remove from the policy scope. |

    | Add Sources | String | No | A JSON array of source objects (e.g., IP addresses)
    to add to the policy. Format: `[{"identifierType": "ip", "identifier": "10.0.0.1"}]`.
    |

    | Remove Sources | String | No | A JSON array of source objects to remove from
    the policy. |

    | Add Destinations | String | No | A JSON array of destination objects to add.
    Format: `[{"identifierType": "hostname", "identifier": "server.com", "services":
    ["rdp"]}]`. |

    | Remove Destinations | String | No | A JSON array of destination objects to remove
    from the policy. |


    ### Additional Notes

    - The action expects JSON-formatted strings for all 'Add' and 'Remove' parameters.
    Incorrectly formatted JSON will result in a validation error.

    - This action utilizes the Silverfort Policies API v2.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the mandatory Policy ID and optional
    configuration parameters from the SOAR environment.

    2. **JSON Parsing**: Input strings for users, groups, sources, and destinations
    are parsed from JSON into structured data models (`PolicyIdentifier` and `PolicyDestination`).

    3. **Client Initialization**: The action initializes a `PolicyApiClient` using
    the integration's configured credentials and API root.

    4. **API Execution**: A PATCH request is sent to the Silverfort `/v2/public/policies/{policy_id}`
    endpoint with the constructed payload containing the updates.

    5. **Result Processing**: The action confirms the update status and returns a
    success message along with the updated policy ID in the JSON results.
