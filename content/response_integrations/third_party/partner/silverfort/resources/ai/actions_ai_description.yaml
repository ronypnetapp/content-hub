List Service Accounts:
  ai_description: >-
    ### General Description

    The **List Service Accounts** action retrieves a paginated list of service accounts
    from the Silverfort platform. This action is primarily used for discovery and
    auditing of service accounts within the environment, providing details such as
    risk levels, protection status, and authentication patterns. It allows security
    analysts to query the Silverfort inventory without targeting specific entities
    in a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Page Size** | String | No | The number of results to return per page (range
    1-100). Defaults to 50. |

    | **Page Number** | String | No | The specific page number of results to retrieve.
    Defaults to 1. |

    | **Fields** | String | No | A comma-separated list of specific service account
    attributes to include in the response (e.g., `guid`, `risk`, `upn`). If left empty,
    all available fields are returned. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the user-provided pagination
    settings (Page Size and Page Number) and the list of requested fields.

    2. **Field Validation**: If specific fields are requested, the action validates
    them against a predefined list of supported Silverfort service account attributes
    (e.g., `guid`, `display_name`, `risk`). Invalid fields are logged as warnings
    and ignored.

    3. **API Request**: The action initializes a connection to the Silverfort Service
    Accounts API and sends a POST request to the `/v1/public/serviceAccounts/index`
    endpoint to fetch the data based on the pagination and field filters.

    4. **Result Processing**: The retrieved list of service accounts is formatted
    into a JSON result, and a summary message is generated indicating the number of
    accounts found on the requested page.


    ### Additional Notes

    - This action does not operate on specific entities within the SOAR case; it performs
    a global query against the Silverfort environment.

    - Valid fields for the **Fields** parameter include: `guid`, `display_name`, `sources_count`,
    `destinations_count`, `number_of_authentications`, `risk`, `predictability`, `protected`,
    `upn`, `dn`, `spn`, `comment`, `owner`, `type`, `domain`, `category`, `creation_date`,
    `highly_privileged`, `interactive_login`, `broadly_used`, `suspected_brute_force`,
    `repetitive_behavior`.
