Update SA Policy:
  ai_description: "### General Description\nUpdates the protection policy for a specific\
    \ service account within the Silverfort Identity Security platform. This action\
    \ allows for granular control over how a service account is protected, including\
    \ its operational state, enforcement actions (blocking), and logging configurations.\
    \ It is primarily used to tune security policies or respond to identified risks\
    \ by modifying allowlists and protocol restrictions.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Service Account GUID** | string | Yes | The unique identifier (GUID) of the\
    \ service account in Silverfort that you wish to update. |\n| **Enabled** | boolean\
    \ | No | If set to true, the policy is active. If false, the policy is disabled.\
    \ |\n| **Block** | boolean | No | If set to true, Silverfort will block authentication\
    \ attempts that violate the policy. |\n| **Send to SIEM** | boolean | No | If\
    \ set to true, policy violation events will be forwarded to the configured SIEM.\
    \ |\n| **Risk Level** | ddl | No | Sets the risk level threshold for the policy.\
    \ Supported values: `low`, `medium`, `high`. |\n| **Allow All Sources** | boolean\
    \ | No | If true, the policy will allow authentications from any source, ignoring\
    \ the specific allowed sources list. |\n| **Allow All Destinations** | boolean\
    \ | No | If true, the policy will allow authentications to any destination, ignoring\
    \ the specific allowed destinations list. |\n| **Protocols** | string | No | A\
    \ comma-separated list of protocols to allow (e.g., `Kerberos, ldap, ntlm`). |\n\
    | **Add Allowed Sources** | string | No | A JSON array of source objects to add\
    \ to the allowlist. Format: `[{\"key\": \"10.0.0.1\", \"key_type\": \"ip\"}]`.\
    \ |\n| **Remove Allowed Sources** | string | No | A JSON array of source objects\
    \ to remove from the allowlist. Format: `[{\"key\": \"10.0.0.1\", \"key_type\"\
    : \"ip\"}]`. |\n| **Add Allowed Destinations** | string | No | A JSON array of\
    \ destination objects to add to the allowlist. Format: `[{\"key\": \"10.0.0.1\"\
    , \"key_type\": \"ip\"}]`. |\n| **Remove Allowed Destinations** | string | No\
    \ | A JSON array of destination objects to remove from the allowlist. Format:\
    \ `[{\"key\": \"10.0.0.1\", \"key_type\": \"ip\"}]`. |\n\n### Additional Notes\n\
    - The `Add/Remove` parameters for sources and destinations require a specific\
    \ JSON format containing `key` and `key_type` fields. \n- Valid `key_type` values\
    \ typically include `ip`, `hostname`, or `dn` depending on the Silverfort API\
    \ version.\n- If `Allow All Sources` or `Allow All Destinations` is set to true,\
    \ the respective allowlists are effectively bypassed.\n\n### Flow Description\n\
    1. **Parameter Extraction:** The action retrieves the Service Account GUID and\
    \ all optional policy configuration parameters from the user input.\n2. **Validation:**\
    \ It validates that the `Risk Level` and `Protocols` (if provided) match the allowed\
    \ enums defined in the Silverfort integration.\n3. **JSON Parsing:** It parses\
    \ the JSON strings for adding or removing sources and destinations into structured\
    \ `AllowedEndpoint` objects.\n4. **API Interaction:** The action uses the Silverfort\
    \ Service Account API client to send a POST request to the `/v1/public/serviceAccounts/policy/{guid}`\
    \ endpoint with the updated configuration payload.\n5. **Result Handling:** Upon\
    \ a successful API response, it generates a success message and returns a JSON\
    \ result indicating the GUID and the updated status."
