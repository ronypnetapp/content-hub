Get Service Account:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific service account from Silverfort
    using its unique identifier (GUID). This action provides comprehensive attributes
    for the account, including its risk score, predictability, protection status,
    authentication counts, and privilege levels. It is primarily used for deep-dive
    investigation into service account behavior and security posture within the Silverfort
    environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Account GUID | String | Yes | The unique identifier (GUID) of the service
    account to retrieve from Silverfort. |


    ### Additional Notes

    This action does not automatically iterate over entities in the Google SecOps
    case. It requires the specific GUID of the service account to be provided as an
    input parameter. The results are returned as a JSON object for use in downstream
    playbook logic.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the mandatory `Service Account
    GUID` from the input parameters.

    2. **Client Initialization**: It initializes the Silverfort Service Account API
    client using the configured integration credentials and an authenticated JWT session.

    3. **Data Retrieval**: The action performs a GET request to the Silverfort API
    endpoint `/v1/public/serviceAccounts/{guid}` to fetch the account's metadata.

    4. **Result Processing**: The retrieved service account data is converted to a
    JSON format and attached to the action's results. A success message is generated
    containing the account's display name or UPN.
