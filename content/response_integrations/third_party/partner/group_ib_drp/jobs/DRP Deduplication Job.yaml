name: DRP Deduplication Job
parameters:
-   name: Case Type
    default_value: Violations
    type: string
    description: Violations, Violations Under Review or Typosquatting
    is_mandatory: true
-   name: Max Cases To Process
    default_value: '2000'
    type: integer
    description: Max Cases To Process
    is_mandatory: true
-   name: Lookback Days
    default_value: '1'
    type: integer
    description: Number of days to lookback
    is_mandatory: true
-   name: Dry Run
    default_value: 'true'
    type: boolean
    description: Set true for test run purposes only. Otherwise false
    is_mandatory: false
-   name: Close Root Cause
    default_value: Duplicate
    type: string
    description: 'Default root cause for closing duplicated tickets '
    is_mandatory: true
-   name: Close Reason
    default_value: Maintenance
    type: string
    description: 'Default reason for closing the ticket '
    is_mandatory: true
-   name: Merge Mode
    default_value: close
    type: string
    description: 'The way to handle duplications: merge to an already exiting case  or
        close. '
    is_mandatory: true
-   name: Carry Over To Primary
    default_value: 'false'
    type: boolean
    description: 'Close mode only. Set true if you want all entities and comments
        from a duplicate case to be carried to a primary one. '
    is_mandatory: false
-   name: Chronicle Instance Path
    default_value: ''
    type: string
    description: 'Merge mode only

        '
    is_mandatory: false
description: ''
integration: Group-IB-DRP
creator: 3b3a3ff7-0285-4ba3-b030-53f16918a9cc
