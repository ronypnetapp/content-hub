[project]
name = "Group-IB-DRP"
version = "1.0"
description = "This integration connects the Group-IB Digital Risk Protection portal to Google SecOps SOAR. It imports DRP violation events into SecOps as structured cases, surfaces URLs as actionable entities, and enables analysts to approve or reject violations directly from SecOps playbooks — without leaving the SOAR platform. In case of any queries, please reach out to integration@group-ib.com."
requires-python = ">=3.11,<3.12"
dependencies = [
    "ciaops==1.0.1",
    "environmentcommon",
    "tipcommon",
    "validators>=0.35.0",
]

[tool.uv.sources]
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.0.6-py2.py3-none-any.whl" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.0.6-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "integration-testing",
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
