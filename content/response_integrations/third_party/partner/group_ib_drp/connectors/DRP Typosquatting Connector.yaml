name: DRP Typosquatting Connector
parameters:
-   name: API login
    default_value: 'your@email.com   '
    type: email
    description: ' Email used for DRP portal login '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API key
    default_value: '789987'
    type: password
    description: 'API token from DRP profile   '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API URL
    default_value: https://drp.group-ib.com/client_api/
    type: string
    description: DRP URL
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: Verify the server's SSL certificate.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Case name
    default_value: 'Typosquatting Domain '
    type: string
    description: 'Default — label shown on cases  '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Case type
    default_value: 'Typosquatting    '
    type: string
    description: type
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Case severity
    default_value: Medium
    type: string
    description: 'Options: Informative / Low / Medium / High / Critical '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Start date
    default_value: ''
    type: string
    description: 'Blank = start from 1 day ago. Set YYYY-MM-DD only for a historical
        backfill '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: DeviceProductField
    default_value: title
    type: string
    description: ''
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: id
    type: string
    description: ''
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '30'
    type: string
    description: ''
    is_mandatory: true
    is_advanced: false
    mode: regular
description: DRP Typosquatting Connector
