EnrichAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities with detailed asset information retrieved from the
    CylusOne platform. This action is designed to provide security analysts with deeper
    context regarding network assets by fetching metadata such as MAC addresses, associated
    IP lists, and custom asset properties. The retrieved data is mapped directly to
    the entity's additional properties within Google SecOps, facilitating better informed
    incident response.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (Base URL, API Key, and Verify SSL).


    ### Flow Description

    1. **Initialization**: The action initializes the CylusOne API manager using the
    integration's global configuration parameters.

    2. **Entity Filtering**: It iterates through all target entities in the current
    context, specifically filtering for those of type `ADDRESS` (IP Address).

    3. **Validation**: Each IP address is validated against a standard IPv4 regex
    pattern to ensure API compatibility.

    4. **Data Retrieval**: For each valid IP, the action performs a GET request to
    the CylusOne `/rest/v1/assets/by-ip` endpoint.

    5. **Data Transformation**: If an asset is found, the action flattens the response
    data. Custom properties are prefixed with `Cylus_prop_`, and list-based fields
    (like MACs) are converted into comma-separated strings.

    6. **Internal Update**: The processed enrichment data is added to the entity's
    `additional_properties` dictionary, and the entity's `is_enriched` status is set
    to `True`.

    7. **Finalization**: The action updates the entities in the Google SecOps platform
    and returns a JSON object containing the enrichment results for all processed
    identifiers.


    ### Additional Notes

    - This action only supports IPv4 addresses.

    - If an asset is not found in CylusOne for a specific IP, the action will report
    a failure for that specific entity but continue processing others.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with asset metadata from CylusOne and sets
      the 'is_enriched' flag to true for successful lookups.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the CylusOne platform. This action
    verifies that the provided Base URL and API Key are correct and that the network
    connection is functional.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters:

    * **Base URL**: The root URL of the CylusOne API.

    * **Cylus API Key**: The API key used for authentication.

    * **Verify SSL**: Boolean flag indicating whether to verify the SSL certificate
    of the CylusOne server.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the integration's configuration parameters
    (Base URL, API Key, and SSL verification setting) using utility functions.

    2. **API Initialization**: Initializes the `ApiManager` with the retrieved credentials
    and session headers.

    3. **Connectivity Test**: Executes the `test_connectivity` method, which performs
    a GET request to a sample asset endpoint (`/rest/v1/assets/by-ip`) using a placeholder
    IP address to verify authentication and network reachability.

    4. **Result Reporting**: Returns a success status if the API responds with a valid
    status code (200 or 404). If the request fails (e.g., 401 Unauthorized, 403 Forbidden,
    or connection timeout), it captures the error and reports a failure.


    ### Additional Notes

    This is a standard health check action. Per system rules, actions named 'Ping'
    are not categorized as enrichment actions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
