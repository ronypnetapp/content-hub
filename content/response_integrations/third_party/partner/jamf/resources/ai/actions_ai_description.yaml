Wipe Managed Device:
  ai_description: >-
    ### General Description

    Remotely erases a managed computer using the Jamf Pro `ERASE_DEVICE` MDM command.
    This action is designed for security containment, allowing administrators to wipe
    a compromised or lost computer to prevent data exfiltration. It is specifically
    intended for computers; for mobile devices, use the 'Wipe Mobile Device' action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Computer ID | String | Yes | The unique identifier of the computer to erase
    in Jamf Pro. |

    | PIN | String | Yes | Optional 6-digit PIN for the erase command. Note: While
    marked mandatory in the configuration, it can be left as an empty string if not
    required by the target device. |

    | Obliteration Behavior | DDL | Yes | Defines how the device should be obliterated
    during the erase process. Options: Default, DoNotObliterate, ObliterateWithWarning,
    Always. |

    | Return to Service | Boolean | Yes | Whether to enable 'Return to Service' after
    the erase, allowing the device to automatically re-enroll. |

    | MDM Profile Data | String | No | Base64-encoded MDM profile data for Return
    to Service. Required if 'Return to Service' is enabled. |

    | WiFi Profile Data | String | No | Base64-encoded WiFi profile data for Return
    to Service. Required if 'Return to Service' is enabled. |


    ### Additional Notes

    - If **Return to Service** is enabled, at least one of **MDM Profile Data** or
    **WiFi Profile Data** must be provided, or the action will fail with a validation
    error.

    - The **PIN**, if provided, must be exactly a 6-digit number.


    ### Flow Description

    1. **Authentication**: Obtains an OAuth access token from the Jamf Pro API.

    2. **Management ID Retrieval**: Fetches the detailed inventory for the specified
    `Computer ID` to retrieve its `managementId`.

    3. **Validation**: Validates the PIN format and ensures Return to Service requirements
    are met.

    4. **Command Execution**: Sends a POST request to the Jamf Pro MDM commands endpoint
    with the `ERASE_DEVICE` command type and specified parameters.

    5. **Result Reporting**: Returns the initiation status of the MDM command and
    detailed execution metadata.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates an ERASE_DEVICE MDM command in Jamf Pro, which remotely wipes all
      data from the target managed computer.
    fetches_data: true
    internal_data_mutation_explanation: null
