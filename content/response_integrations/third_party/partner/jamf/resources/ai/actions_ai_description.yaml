Assign to Group:
  ai_description: >-
    ### General Description

    This action adds computers to a specific computer group in Jamf Pro using various
    identifiers such as computer IDs, names, or serial numbers. It is designed for
    bulk operations, allowing users to provide comma-separated lists of identifiers
    to update group memberships efficiently.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Group ID | The unique ID of the computer group in Jamf Pro that you want to
    modify. | String | Yes |

    | Computer IDs | A comma-separated list of Jamf computer IDs to add (e.g., "123,456").
    | String | No |

    | Computer Names | A comma-separated list of computer names to add. Note: Names
    may not be unique in Jamf; the API acts on the first match. | String | No |

    | Computer Serial Numbers | A comma-separated list of computer serial numbers
    to add (e.g., "ABC123,DEF456"). | String | No |


    ### Additional Notes

    * **Validation Requirement:** At least one of the following parameters must be
    provided for the action to execute: `Computer IDs`, `Computer Names`, or `Computer
    Serial Numbers`.

    * **Identification Reliability:** Using `Computer IDs` or `Computer Serial Numbers`
    is recommended over `Computer Names` for more reliable identification, as names
    are not strictly unique in Jamf Pro.


    ### Flow Description

    1. **Initialization:** The action extracts the Jamf Pro integration configuration
    (API Root, Credentials, SSL settings) and the action-specific parameters.

    2. **Input Validation:** It verifies that at least one computer identifier (ID,
    Name, or Serial Number) has been provided. If all are empty, the action fails.

    3. **Data Parsing:** Comma-separated strings are parsed into clean Python lists,
    removing whitespace and empty entries.

    4. **API Interaction:** The action initializes the `JamfManager`, authenticates
    with Jamf Pro, and calls the `assign_to_group` method.

    5. **Mutation:** The manager constructs an XML payload containing the computer
    additions and sends a `PUT` request to the Jamf Pro Classic API endpoint (`/JSSResource/computergroups/id/{id}`).

    6. **Result Processing:** The action parses the XML response from Jamf, extracts
    the group name and the count of processed computers, and returns a summary message
    and JSON result to the Google SecOps platform.
