    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mobile Device ID | String | Yes | The unique identifier of the mobile device
    in Jamf Pro that you wish to lock. |

    | Message | String | No | An optional custom message to display on the device's
    lock screen (e.g., 'This device has been locked by IT'). |

    | Phone Number | String | No | An optional phone number to display on the lock
    screen so the user can contact the administrator. |


