Get Mobile Device Inventory:
  ai_description: >-
    ### General Description

    Retrieves mobile device inventory data from Jamf Pro using the v2 API. This action
    allows for granular searching of mobile devices based on specific identifiers
    like serial numbers or usernames, with support for pagination, sorting, and the
    ability to request specific data sections (e.g., Hardware, Security, Applications)
    to optimize performance.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page | String | No | The page number to retrieve (default is 0). |

    | Page Size | String | No | The number of records to return per page (default
    is 100, maximum is 2000). |

    | Filter | DDL | Yes | The field used to filter the inventory. Supported fields:
    `serialNumber`, `udid`, `username`, `emailAddress`. |

    | Filter Value | String | Yes | The specific value to search for in the selected
    filter field. |

    | Section | DDL | No | Specific data sections to include in the response (e.g.,
    `HARDWARE`, `SECURITY`, `APPLICATIONS`). Selecting `ALL` retrieves all available
    data. |

    | Sort | Multi-choice | No | Criteria for sorting the results (e.g., `displayName:asc`).
    Multiple fields can be selected. |


    ### Additional Notes

    - The action automatically includes the necessary data section required by the
    chosen `Filter` field (e.g., if filtering by `udid`, the `HARDWARE` section is
    automatically added if not already selected).

    - Page and Page Size must be valid integers.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves and validates pagination, filtering, and
    sorting parameters from the action configuration.

    2. **Section Logic**: Determines which Jamf Pro data sections are required based
    on the user's filter choice to ensure the query returns the expected data.

    3. **API Authentication**: Obtains an OAuth2 bearer token from Jamf Pro using
    the provided Client ID and Secret.

    4. **Data Retrieval**: Executes a GET request to the `/api/v2/mobile-devices/detail`
    endpoint with the constructed query parameters (page, page-size, sort, filter,
    and sections).

    5. **Result Processing**: Cleans the returned JSON data to ensure compatibility
    with the SOAR platform and outputs the inventory details as a JSON result.
