Remote Lock Mobile Device:
  ai_description: >-
    Remotely locks a managed mobile device using Jamf Pro MDM commands. This action
    is used to secure a device by locking its screen, preventing unauthorized access.
    It allows for an optional custom message and a contact phone number to be displayed
    on the locked screen.


