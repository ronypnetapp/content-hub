Wipe Mobile Device:
  ai_description: >-
    Remotely erases or wipes a managed mobile device using the Jamf Pro ERASE_DEVICE
    MDM command. This action is primarily used for containment when a device is lost,
    stolen, or compromised. It supports advanced configurations such as preserving
    eSIM data plans, disabling proximity setup on reboot, and enabling 'Return to
    Service' by providing MDM and WiFi profiles.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mobile Device ID | string | Yes | The unique identifier of the mobile device
    in Jamf Pro to be erased. |

    | Preserve Data Plan | boolean | No | If set to true, preserves the data plan
    on devices with eSIM functionality (iOS 11+). Default is false. |

    | Disallow Proximity Setup | boolean | No | If set to true, disables Proximity
    Setup on the next reboot and skips the pane in Setup Assistant (iOS 11+). Default
    is false. |

    | Return to Service | boolean | Yes | Whether to enable the 'Return to Service'
    feature, allowing the device to automatically re-enroll after the wipe. Default
    is true. |

    | MDM Profile Data | string | No | Base64-encoded MDM profile data required if
    'Return to Service' is enabled. |

    | WiFi Profile Data | string | No | Base64-encoded WiFi profile data required
    if 'Return to Service' is enabled to allow the device to connect to the network.
    |

    | Bootstrap Token | string | No | Base64-encoded bootstrap token for the device,
    used if 'Return to Service' is enabled. |


    ### Additional Notes

    - This action does not run on entities; it requires a specific 'Mobile Device
    ID' provided as a parameter.

    - If 'Return to Service' is enabled, it is highly recommended to provide at least
    one profile (MDM or WiFi) to ensure the device can successfully re-enroll.


    ### Flow Description

    1. **Authentication**: The action authenticates with the Jamf Pro API using OAuth2
    client credentials.

    2. **Device Lookup**: It retrieves the specific management ID for the mobile device
    using the provided 'Mobile Device ID'.

    3. **Command Construction**: It builds an ERASE_DEVICE MDM command payload, incorporating
    optional flags for data plans and setup behavior.

    4. **Execution**: The action sends a POST request to the Jamf Pro MDM commands
    endpoint to initiate the wipe.

    5. **Result Reporting**: It returns a JSON object containing the API response
    from Jamf and the details of the command initiated.
