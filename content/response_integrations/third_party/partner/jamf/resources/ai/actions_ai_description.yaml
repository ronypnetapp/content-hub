Get Computer Inventory:
  ai_description: >-
    ### General Description

    Retrieves paginated computer inventory records from Jamf Pro. This action allows
    for comprehensive searching and filtering of managed computers based on attributes
    like name, serial number, UDID, or user email. It supports advanced sorting and
    allows users to specify which data sections (e.g., Hardware, Security, Applications)
    should be included in the response to optimize performance and data relevance.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter | DDL | Yes | The field to filter the inventory by. Options include `general.name`,
    `hardware.serialNumber`, `udid`, `userAndLocation.username`, and `userAndLocation.email`.
    |

    | Filter Value | String | Yes | The specific value to search for within the selected
    filter field. |

    | Page | String | No | The page number to retrieve for paginated results. Defaults
    to "0". |

    | Page Size | String | No | The number of records to return per page. Defaults
    to "100". |

    | Section | Multi-select | No | Specific data categories to include in the response
    (e.g., `HARDWARE`, `SECURITY`, `APPLICATIONS`). Selecting `ALL` retrieves all
    available data. |

    | Sort | Multi-select | No | Criteria for sorting the results, including field
    and direction (e.g., `general.name:asc`). |


    ### Flow Description

    1. **Initialization:** The action extracts Jamf Pro API credentials and user-provided
    parameters from the environment and action configuration.

    2. **Validation:** It validates that the `Page` and `Page Size` parameters are
    valid integers and within acceptable ranges.

    3. **Query Preparation:** The action constructs a Jamf-compliant filter string
    (e.g., `field=="value"`) and formats the sort criteria and requested data sections.

    4. **Section Optimization:** If a specific filter field is used, the action automatically
    ensures the corresponding data section is included in the API request to ensure
    the filter can be processed correctly.

    5. **API Execution:** It authenticates with the Jamf Pro API and performs a GET
    request to the `/api/v1/computers-inventory` endpoint with the constructed query
    parameters.

    6. **Output:** The retrieved inventory data, along with pagination and metadata,
    is returned as a JSON result for further analysis or display.


    ### Additional Notes

    This action does not operate on specific SecOps entities (like IP or Hostname)
    but rather performs a global search against the Jamf Pro inventory. It is strictly
    a read-only enrichment action.
