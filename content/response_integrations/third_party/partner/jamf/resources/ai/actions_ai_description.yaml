Update Extension Attribute:
  ai_description: >-
    ### General Description

    Updates a specific extension attribute for a computer managed in Jamf Pro. This
    action allows security analysts to programmatically modify computer metadata,
    such as department assignments, asset tags, or custom status fields, directly
    from Google SecOps.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Computer ID | string | Yes | The unique identifier of the computer in Jamf Pro
    that needs to be updated. |

    | Extension Attribute Name | string | Yes | The display name of the extension
    attribute to update. The action will automatically resolve this name to its internal
    Jamf ID. |

    | Values | string | Yes | A comma-separated list of values to assign to the extension
    attribute. |


    ### Flow Description

    1. **Initialization:** Extracts the Jamf Pro API configuration and action parameters
    (Computer ID, Attribute Name, and Values).

    2. **Value Parsing:** Converts the comma-separated 'Values' string into a list,
    ensuring at least one value is provided.

    3. **Attribute Resolution:** Fetches the complete list of computer extension attributes
    from the Jamf Pro API to find the `definitionId` associated with the provided
    'Extension Attribute Name'.

    4. **Update Execution:** Sends a PATCH request to the Jamf Pro API for the specified
    Computer ID, updating the targeted extension attribute with the new values.

    5. **Result Handling:** Retrieves the updated computer details (Name, Serial Number,
    Platform) and provides a summary message and full JSON result of the operation.
