Get Device Group Membership:
  ai_description: >-
    ### General Description

    The **Get Device Group Membership** action retrieves the list of computers belonging
    to a specific computer group in Jamf Pro. It provides detailed membership information,
    including the total count of member devices and their basic details. This action
    is compatible with both static and smart computer groups, allowing security teams
    to identify all devices associated with a specific management group for further
    investigation or orchestration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | Yes | The unique identifier of the computer group in Jamf
    Pro to retrieve membership for. |


    ### Flow Description

    1. **Initialization**: The action initializes the Jamf Pro API manager using the
    integration's configuration (API Root, Client ID, and Secret).

    2. **Parameter Extraction**: The action retrieves the `Group ID` provided by the
    user.

    3. **API Request**: It calls the Jamf Pro API endpoint `/JSSResource/computergroups/id/{id}`
    to fetch the group's membership data.

    4. **Data Processing**: The action extracts the list of computers from the response
    and calculates the total member count.

    5. **Result Delivery**: The membership data and count are added to the action's
    JSON results, and a summary message is provided.


    ### Additional Notes

    - This action does not operate on entities; it requires the manual input of a
    Group ID.

    - If the specified Group ID does not exist, the action will report that no membership
    data was found.
