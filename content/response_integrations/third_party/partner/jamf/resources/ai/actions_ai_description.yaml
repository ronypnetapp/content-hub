Get Device Information:
  ai_description: >-
    ### General Description

    The **Get Device Information** action retrieves comprehensive details for a specific
    computer managed in Jamf Pro using its unique Computer ID. This action is designed
    for deep enrichment, providing technical data points such as hardware specifications,
    operating system details, disk encryption status, and user/location information.
    It is particularly useful for security analysts needing to verify the state or
    ownership of a macOS or Windows device during an investigation.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **Computer ID** | The unique numerical identifier of the computer in Jamf Pro
    for which information should be retrieved. | String | Yes |


    ### Additional Notes

    * This action does not automatically iterate over SecOps entities (like Hostnames
    or IPs). It requires the specific Jamf Computer ID to be provided as an input
    parameter.

    * The action includes a data-cleaning layer that handles unescaped quotes and
    special characters in the Jamf API response to ensure the resulting JSON is valid
    for display in the Google SecOps UI.


    ### Flow Description

    1. **Authentication**: The action connects to the Jamf Pro API using OAuth2 credentials
    (Client ID and Secret) to obtain a temporary access token.

    2. **Input Validation**: The mandatory `Computer ID` parameter is extracted and
    validated.

    3. **API Request**: The action performs a GET request to the Jamf Pro `/api/v1/computers-inventory-detail/{id}`
    endpoint.

    4. **Data Sanitization**: The raw API response is processed through a cleaning
    utility to escape control characters and fix common JSON structural issues found
    in Jamf inventory data (e.g., within extension attributes or certificates).

    5. **Result Delivery**: The sanitized device information is returned as a JSON
    object and made available for subsequent playbook steps or UI widgets.
