Remote Lock Managed Device:
  ai_description: >-
    ### General Description

    Remotely lock a managed computer using Jamf Pro MDM commands. This action is designed
    specifically for computers. It locks the device screen and can optionally display
    a custom message and phone number. For mobile device lock functionality, use the
    "Remote Lock Mobile Device" action instead.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Computer ID | String | Yes | The ID of the computer to lock. |

    | PIN | String | Yes | A 6-digit PIN code required to unlock the device. Note:
    While the configuration might suggest this is optional, the underlying logic requires
    a valid 6-digit numeric PIN to execute the lock command. |

    | Message | String | No | Optional custom message to display on the locked device
    screen. |

    | Phone Number | String | No | Optional phone number to display on the locked
    device screen for contact. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Jamf Pro API using the
    provided Client ID and Secret to obtain a bearer token.

    2. **Management ID Retrieval**: It retrieves the detailed inventory for the specified
    Computer ID to obtain the `managementId` required for MDM commands.

    3. **Command Initiation**: It sends a `DEVICE_LOCK` MDM command to the Jamf Pro
    API targeting the specific `managementId`. The command payload includes the PIN
    and any optional display information (message/phone number).

    4. **Result Reporting**: The action captures the API response, adds the command
    details to the JSON results, and provides a success or failure message to the
    case wall.


    ### Additional Notes

    - This action is intended for macOS computers managed by Jamf Pro.

    - The PIN must be exactly 6 digits long.
