Update Protect Prevent List:
  ai_description: "### General Description\nThe **Update Protect Prevent List** action\
    \ allows security administrators to modify an existing prevent list within Jamf\
    \ Protect. This action is primarily used for containment by adding new indicators\u2014\
    such as file hashes, Team IDs, or Signing IDs\u2014to a blocklist to prevent malicious\
    \ activity on managed macOS devices.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Prevent\
    \ List Name** | String | Yes | The exact name of the existing prevent list in\
    \ Jamf Protect that you wish to update. |\n| **Prevent List Description** | String\
    \ | No | An optional field to update the description of the prevent list. If left\
    \ blank, the existing description is preserved. |\n| **Prevent Type** | DDL |\
    \ Yes | The type of indicators the list contains. Options include `File Hash`,\
    \ `Signing Information - Team ID`, `Signing Information - Code Directory Hash`,\
    \ and `Signing Information - Signing ID`. **Note:** This must match the type of\
    \ the existing list. |\n| **Prevent List Data** | String | Yes | A comma-separated\
    \ list of the new indicators (e.g., SHA-256 hashes) to be added to the prevent\
    \ list. |\n| **Prevent List Tags** | String | No | A comma-separated list of tags\
    \ to be added to the prevent list. |\n\n### Flow Description\n1. **Authentication**:\
    \ Connects to the Jamf Protect API using the provided credentials.\n2. **List\
    \ Retrieval**: Fetches all available prevent lists from the Jamf Protect environment.\n\
    3. **Target Identification**: Searches for a list matching the provided **Prevent\
    \ List Name**.\n4. **Validation**: Verifies that the target list exists and that\
    \ the provided **Prevent Type** matches the list's current configuration (as Jamf\
    \ Protect does not allow changing the type of an existing list).\n5. **Data Merging**:\
    \ Combines the new indicators and tags with the existing ones, ensuring all entries\
    \ are unique and properly formatted.\n6. **Indicator Validation**: Performs regex-based\
    \ validation on the new indicators (e.g., ensuring file hashes are valid SHA-1\
    \ or SHA-256 strings).\n7. **Update Execution**: Sends a GraphQL mutation to Jamf\
    \ Protect to apply the updates to the prevent list.\n\n### Additional Notes\n\
    - This action does not run on entities; it relies entirely on the provided input\
    \ parameters.\n- The action will fail if the specified list name is not found\
    \ or if the indicator formats are invalid for the selected type."
