    1.  **Authentication**: The action authenticates with the Jamf Pro API using the
    provided Client ID and Secret to obtain a bearer token.

    2.  **Device Identification**: It retrieves the detailed inventory information
    for the specified `Mobile Device ID` to obtain the necessary `managementId` required
    for MDM commands.

    3.  **Command Execution**: It sends a `DEVICE_LOCK` MDM command to the Jamf Pro
    `/api/v2/mdm/commands` endpoint, targeting the specific device's management ID.

    4.  **Result Processing**: The action captures the API response, logs the command
    details (including whether a message or phone number was used), and returns a
    success or failure status to Google SecOps.
