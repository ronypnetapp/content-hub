Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity and authentication
    configuration between Google SecOps and the Jamf Pro and Jamf Protect APIs. It
    ensures that the provided credentials (Client ID and Secret) are valid and that
    the network path to the API endpoints is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Jamf Pro API Root | String | Yes | The base URL of the Jamf Pro server (e.g.,
    `https://yourserver.jamfcloud.com`). |

    | Jamf Pro Client API ID | String | Yes | The API Client ID used for authentication
    with Jamf Pro. |

    | Jamf Pro Client API Secret | String | Yes | The API Client Secret used for authentication
    with Jamf Pro. |

    | Verify SSL | Boolean | No | If enabled (default), the action will verify the
    SSL certificate of the Jamf servers. |

    | Jamf Protect API Root | String | No | The base URL of the Jamf Protect server.
    Required only if testing Jamf Protect connectivity. |

    | Jamf Protect Client API ID | String | No | The API Client ID for Jamf Protect.
    Required only if testing Jamf Protect connectivity. |

    | Jamf Protect Client API Secret | String | No | The API Client Secret for Jamf
    Protect. Required only if testing Jamf Protect connectivity. |


    ### Additional Notes

    - To test Jamf Protect connectivity, all three Protect-related parameters (`API
    Root`, `Client ID`, and `Client Secret`) must be provided. If any are missing,
    the action will only test Jamf Pro.

    - This action does not process any entities.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves Jamf Pro and Jamf Protect configuration
    details from the integration settings.

    2. **Jamf Pro Connectivity Test:**
       - Initializes the `JamfManager`.
       - Attempts to obtain an OAuth2 access token via a POST request.
       - Calls the Jamf Pro version endpoint (GET) to confirm API responsiveness.
    3. **Jamf Protect Connectivity Test (Optional):**
       - If Protect credentials are provided, initializes the `JamfProtectManager`.
       - Attempts to obtain an access token for the Jamf Protect GraphQL API.
    4. **Result Reporting:** Returns a success message if the tests pass, or a failure
    message with error details if any step fails.
