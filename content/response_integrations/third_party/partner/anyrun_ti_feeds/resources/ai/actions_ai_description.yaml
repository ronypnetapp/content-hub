Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the ANY.RUN TI Feeds service. It ensures that the provided API
    key is valid and that the network configuration (including optional proxy settings)
    allows for successful communication with the ANY.RUN API.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN TI Feeds API key | String | Yes | The API key used to authenticate requests
    to the ANY.RUN TI Feeds service. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the ANY.RUN API endpoint. |

    | Enable proxy | Boolean | No | If enabled, the action will attempt to route the
    connection through a proxy server. |

    | Proxy host | String | No | The hostname or IP address of the proxy server. Required
    if 'Enable proxy' is true. |

    | Proxy port | String | No | The port number of the proxy server. Required if
    'Enable proxy' is true. |


    ### Additional Notes

    - This action does not process any entities and is strictly used for configuration
    validation.

    - If 'Enable proxy' is selected, both 'Proxy host' and 'Proxy port' must be correctly
    configured in the integration settings.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API key, SSL verification
    preference, and proxy settings from the integration configuration.

    2. **Proxy Validation (Optional):** If proxying is enabled, the action first attempts
    to establish a connection to the ANY.RUN service through the specified proxy host
    and port.

    3. **Authorization Check:** The action initializes a connection to the ANY.RUN
    TI Feeds API and executes a `check_authorization` call to validate the API key.

    4. **Result Reporting:** If the authorization is successful, the action completes
    with a success message. If any step fails (e.g., network timeout, invalid key,
    proxy error), it catches the exception and reports a failure status.
