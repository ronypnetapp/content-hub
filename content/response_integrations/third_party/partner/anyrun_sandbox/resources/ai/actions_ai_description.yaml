Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the ANY.RUN Sandbox service.
    This action is used to verify that the integration is correctly configured and
    can successfully communicate with the ANY.RUN API.


    ### Parameters Description

    This action does not take any action-specific parameters. It relies on the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN Sandbox API KEY | String | Yes | The API key used to authenticate with
    the ANY.RUN Sandbox service. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the ANY.RUN API. |

    | Enable proxy | Boolean | No | If enabled, the action will use the configured
    proxy to connect to the ANY.RUN API. |

    | Proxy host | String | No | The hostname or IP address of the proxy server. Required
    if 'Enable proxy' is true. |

    | Proxy port | String | No | The port of the proxy server. Required if 'Enable
    proxy' is true. |


    ### Additional Notes

    - This is a standard 'Ping' action used for troubleshooting connectivity and credential
    issues.

    - The action will fail if the API key is invalid or if the network connection
    (including proxy settings) is misconfigured.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API key, SSL verification
    setting, and proxy configuration from the integration's global settings.

    2. **Proxy Validation (Optional)**: If the 'Enable proxy' setting is true, the
    action attempts to validate the proxy connection using the provided host and port.

    3. **Authorization Check**: The action makes a request to the ANY.RUN Sandbox
    API to verify the validity of the provided API key.

    4. **Result Reporting**: If the authorization check is successful, the action
    logs a success message and completes. If an error occurs (e.g., authentication
    failure or network timeout), the action logs the error and fails.
