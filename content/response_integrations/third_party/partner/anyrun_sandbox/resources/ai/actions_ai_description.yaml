URL Android Analysis:
  ai_description: >-
    ### General Description

    The **URL Android Analysis** action submits one or more URLs to the ANY.RUN Sandbox
    for automated analysis using an Android virtual machine. This action is designed
    to observe the behavior of URLs in a mobile environment, providing detailed threat
    intelligence, including HTML reports, Indicators of Compromise (IOCs), and a final
    analysis verdict.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Url** | String | Yes | The URL(s) to be analyzed. Defaults to `[Entity.Identifier]`.
    Multiple URLs can be provided as a comma-separated list. |

    | **Timeout In Seconds** | String | No | The duration for the analysis task, ranging
    from 10 to 660 seconds. Default is 120. |

    | **Command line** | String | No | Optional command-line arguments for the analyzed
    object. |

    | **System's language** | String | No | The operating system's locale or country
    name (e.g., 'en-US'). |

    | **User Tags** | String | No | Custom tags to categorize the task in ANY.RUN
    (max 8 tags, 16 chars each). |

    | **Analysis Privacy Type** | DDL | No | Privacy level for the task: `public`,
    `bylink`, `owner`, or `byteam`. Default is `bylink`. |

    | **Network Connect** | Boolean | No | Enables network connectivity for the analysis
    VM. Default is `true`. |

    | **Network Fakenet** | Boolean | No | Enables the FakeNet feature to simulate
    network services. |

    | **Network Tor** | Boolean | No | Routes VM traffic through the TOR network.
    |

    | **Network Geo** | String | No | Geolocation for TOR or proxy exit nodes (e.g.,
    'US', 'AU'). |

    | **Network Mitm** | Boolean | No | Enables HTTPS MITM Proxy for traffic inspection.
    |

    | **Network Residential Proxy** | Boolean | No | Uses a residential proxy for
    the analysis. |

    | **Network Residential Proxy Geo** | String | No | Geolocation for the residential
    proxy. |


    ### Flow Description

    1. **Setup**: Extracts API credentials and configuration settings for the ANY.RUN
    Sandbox.

    2. **Task Submission**: Submits the target URL(s) to the ANY.RUN API to initiate
    an Android-based analysis task.

    3. **Interactive Link**: Immediately adds a case comment with a link to the live
    interactive analysis on the ANY.RUN platform.

    4. **Status Polling**: Monitors the task status until the analysis is complete.

    5. **Report Retrieval**: Downloads the final analysis report in HTML format and
    attaches it to the Google SecOps Case Wall.

    6. **IOC Extraction**: Retrieves detected Indicators of Compromise (IOCs). If
    any are classified as suspicious or malicious, a summary is added to the case
    comments.

    7. **Final Verdict**: Fetches the final analysis verdict and adds a concluding
    comment to the case with the analysis status.
