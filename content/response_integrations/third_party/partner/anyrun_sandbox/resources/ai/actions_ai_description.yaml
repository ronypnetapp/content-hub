URL Windows Analysis:
  ai_description: >-
    ### General Description

    Submits URLs to the ANY.RUN Sandbox for automated and interactive analysis using
    a Windows Virtual Machine. This action allows security analysts to safely execute
    and observe the behavior of suspicious links in a controlled environment, providing
    detailed reports on network activity, process execution, and threat indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Url | String | Yes | The destination URL(s) to analyze. Supports comma-separated
    values. Defaults to the entity identifier. |

    | Browser | DDL | Yes | The browser used for the analysis (Microsoft Edge, Google
    Chrome, Mozilla Firefox, Internet Explorer). |

    | Timeout In Seconds | String | No | Task completion time (10-660 seconds). Default
    is 120. |

    | Command line | String | No | Optional command-line arguments for the analyzed
    object. |

    | System's language | String | No | Operation system's language (e.g., 'en-US'
    or 'Brazil'). |

    | User Tags | String | No | Custom tags for the task (max 8 unique tags, 16 characters
    each). |

    | Analysis Privacy Type | DDL | No | Privacy settings for the analysis (public,
    bylink, owner, byteam). |

    | Network Connect | Boolean | No | Enable network connection during analysis.
    |

    | Network Fakenet | Boolean | No | Enable FakeNet feature to simulate network
    services. |

    | Network Tor | Boolean | No | Enable TOR for network traffic. |

    | Network Geo | String | No | TOR geolocation option (e.g., US, AU). |

    | Network Mitm | Boolean | No | Enable HTTPS MITM Proxy for traffic inspection.
    |

    | Network Residential Proxy | Boolean | No | Use a residential proxy for the analysis.
    |

    | Network Residential Proxy Geo | String | No | Residential proxy geolocation
    option. |


    ### Additional Notes

    - The action can process multiple URLs simultaneously if they are provided as
    a comma-separated list in the `Url` parameter.

    - While the action is designed to work with URL entities via the `[Entity.Identifier]`
    placeholder, it processes the input as a string and does not directly modify entity
    attributes.


    ### Flow Description

    1. **Initialization**: Retrieves the API key and SSL verification settings from
    the integration configuration.

    2. **Input Parsing**: Extracts the target URL(s) from the action parameters.

    3. **Task Submission**: For each URL, it initiates a Windows-based analysis task
    in the ANY.RUN sandbox using the specified browser, timeout, and network configurations.

    4. **Interactive Link**: Immediately adds a case comment containing a direct link
    to the ANY.RUN interactive analysis session.

    5. **Monitoring**: Polls the ANY.RUN API to monitor the status of the analysis
    task.

    6. **Report Retrieval**: Once the analysis is complete, it fetches the full HTML
    report and attaches it to the Google SecOps Case Wall.

    7. **IOC Extraction**: Retrieves identified Indicators of Compromise (IOCs) and
    posts a summary of suspicious or malicious findings as a case comment.

    8. **Final Verdict**: Fetches the final analysis verdict and status, adding them
    as a concluding comment to the case.
