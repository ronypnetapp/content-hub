URL Linux Analysis:
  ai_description: >-
    ### General Description

    Submits one or more URLs to the ANY.RUN Sandbox for automated analysis using a
    Linux virtual machine. This action allows security analysts to safely investigate
    suspicious URLs in a controlled environment, providing detailed reports on network
    activity, file modifications, and threat indicators.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Url | The destination URL(s) to analyze. Supports a comma-separated list of
    URLs. Defaults to the identifier of the entity in scope. | String | Yes |

    | Machine Os | The Linux operating system version to use for the analysis. Supported
    values: `ubuntu`, `debian`. | DDL | Yes |

    | Browser | The web browser to use for the analysis. Supported values: `Google
    Chrome`, `Mozilla Firefox`. | DDL | Yes |

    | Timeout In Seconds | The duration of the analysis task in the sandbox. Range:
    10-660 seconds. Default is 120. | String | No |

    | Command line | Optional command-line arguments to be passed to the analyzed
    object. | String | No |

    | System's language | The language/locale of the sandbox operating system (e.g.,
    'en-US' or 'Brazil'). | String | No |

    | User Tags | Custom tags to associate with the analysis task. Max 8 unique tags,
    16 characters each. | String | No |

    | Analysis Privacy Type | Privacy level for the analysis task. Supported values:
    `public`, `bylink`, `owner`, `byteam`. | DDL | No |

    | Network Connect | Enables or disables network connectivity within the sandbox.
    | Boolean | No |

    | Network Fakenet | Enables the FakeNet feature to simulate network services.
    | Boolean | No |

    | Network Tor | Enables the use of the TOR network for analysis. | Boolean | No
    |

    | Network Geo | Specifies the TOR geolocation (e.g., 'US', 'AU'). Default is 'fastest'.
    | String | No |

    | Network Mitm | Enables an HTTPS MITM (Man-In-The-Middle) proxy. | Boolean |
    No |

    | Network Residential Proxy | Enables the use of a residential proxy. | Boolean
    | No |

    | Network Residential Proxy Geo | Specifies the residential proxy geolocation
    (e.g., 'US', 'AU'). Default is 'fastest'. | String | No |


    ### Flow Description

    1. **Initialization**: The action extracts the ANY.RUN API key and SSL verification
    settings from the integration configuration.

    2. **URL Parsing**: It retrieves the `Url` parameter and splits it by commas to
    handle multiple URLs in a single execution.

    3. **Task Submission**: For each URL, it initiates a Linux-based analysis task
    in ANY.RUN using the specified OS, browser, and network configuration parameters.

    4. **Interactive Link**: A comment is added to the Google SecOps case containing
    a direct link to the interactive analysis task on the ANY.RUN platform.

    5. **Monitoring**: The action polls the ANY.RUN API to monitor the status of the
    analysis task until completion.

    6. **Report Retrieval**: Once finished, it downloads the full HTML analysis report
    and attaches it to the Case Wall.

    7. **IOC Summary**: It fetches the Indicator of Compromise (IOC) report. If any
    malicious or suspicious indicators are found, it adds a summary comment to the
    case.

    8. **Verdict**: Finally, it retrieves the analysis verdict and adds a concluding
    comment with the final status of the URL analysis.
