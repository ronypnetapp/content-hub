File Android Analysis:
  ai_description: >-
    ### General Description

    This action performs automated file analysis using an Android Virtual Machine
    within the ANY.RUN sandbox environment. It is designed to process file attachments
    associated with a case, providing deep behavioral analysis, network activity monitoring,
    and threat intelligence. The action submits the file to the ANY.RUN platform,
    monitors the analysis progress, and retrieves comprehensive reports including
    HTML summaries and identified Indicators of Compromise (IOCs).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeout In Seconds | String | No | Defines the duration for the analysis task.
    Range: 10-660 seconds. Default is 240. |

    | Change to valid extension | Boolean | No | If enabled, automatically adjusts
    the file extension to a valid format for analysis. |

    | Command line | String | No | Optional command-line arguments to be passed to
    the object during analysis. |

    | System's language | String | No | Sets the operating system language for the
    sandbox (e.g., 'en-US', 'Brazil'). |

    | User Tags | String | No | Custom tags to categorize the task in ANY.RUN. Max
    8 tags, 16 chars each. |

    | Analysis Privacy Type | DDL | No | Sets visibility of the analysis: public,
    bylink, owner, or byteam. |

    | Network Connect | Boolean | No | Enables or disables network connectivity for
    the analyzed file. |

    | Network Fakenet | Boolean | No | Enables the FakeNet feature to simulate network
    services. |

    | Network Tor | Boolean | No | Routes sandbox traffic through the TOR network.
    |

    | Network Geo | String | No | Specifies the geolocation for TOR or proxy exit
    nodes (e.g., 'US', 'AU'). |

    | Network Mitm | Boolean | No | Enables HTTPS Man-In-The-Middle proxy for traffic
    inspection. |

    | Network Residential Proxy | Boolean | No | Uses a residential proxy for network
    traffic. |

    | Network Residential Proxy Geo | String | No | Specifies the geolocation for
    the residential proxy. |


    ### Additional Notes

    - This action operates on the **first attachment** found in the Google SecOps
    case. If no attachments are present, the action will fail.

    - It requires a valid ANY.RUN Sandbox API Key to be configured in the integration
    settings.

    - The action results in both a new attachment (HTML report) and case comments
    (analysis link and IOC summary).


    ### Flow Description

    1. **Initialization:** Retrieves the ANY.RUN API key and SSL configuration from
    the integration settings.

    2. **Attachment Retrieval:** Fetches the first available attachment from the current
    case context.

    3. **Task Submission:** Submits the file to the ANY.RUN Android sandbox using
    the specified environment, network, and privacy parameters.

    4. **Interactive Link:** Immediately posts a case comment containing the URL to
    the live interactive analysis in ANY.RUN.

    5. **Status Monitoring:** Polls the ANY.RUN API to monitor the progress of the
    analysis task.

    6. **Report Retrieval:** Once complete, downloads the HTML version of the analysis
    report.

    7. **Internal Mutation (Attachment):** Saves the HTML report as a new attachment
    on the Google SecOps case wall.

    8. **IOC Processing:** Fetches IOC data; if suspicious or malicious indicators
    are found, it formats and posts them as a summary comment in the case.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new sandbox analysis task and uploads a file to the ANY.RUN platform
      for processing.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments to the case wall containing analysis links and IOC summaries,
      and uploads the generated HTML report as a new case attachment.
