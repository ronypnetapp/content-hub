File Linux Analysis:
  ai_description: >-
    ### General Description

    The **File Linux Analysis** action automates the submission of file attachments
    to the ANY.RUN sandbox for behavioral analysis within a Linux environment (Ubuntu
    or Debian). It allows security analysts to safely execute suspicious files, observe
    their network activity, and retrieve detailed forensic reports directly within
    Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Env Os** | DDL | Yes | Specifies the Linux distribution for the analysis (ubuntu
    or debian). |

    | **StartFolder** | DDL | No | The directory where the file will be placed (desktop,
    home, downloads, temp). |

    | **Run As Root** | Boolean | No | If true, executes the file with superuser privileges.
    |

    | **Timeout In Seconds** | String | No | Duration of the analysis (10 to 660 seconds).
    Default is 240. |

    | **Change to valid extension** | Boolean | No | Automatically renames the file
    to a valid extension if necessary. |

    | **Command line** | String | No | Optional arguments to pass to the file during
    execution. |

    | **System's language** | String | No | The locale/language of the OS (e.g., 'en-US').
    |

    | **User Tags** | String | No | Custom tags for the ANY.RUN task (max 8 tags,
    16 chars each). |

    | **Analysis Privacy Type** | DDL | No | Sets visibility of the task (public,
    bylink, owner, byteam). |

    | **Network Connect** | Boolean | No | Enables or disables internet access for
    the VM. |

    | **Network Fakenet** | Boolean | No | Enables FakeNet to simulate network services.
    |

    | **Network Tor** | Boolean | No | Routes traffic through the TOR network. |

    | **Network Geo** | String | No | Geolocation for TOR exit nodes (e.g., 'US').
    |

    | **Network Mitm** | Boolean | No | Enables HTTPS Man-In-The-Middle proxying.
    |

    | **Network Residential Proxy** | Boolean | No | Uses a residential proxy for
    network traffic. |

    | **Network Residential Proxy Geo** | String | No | Geolocation for the residential
    proxy. |


    ### Additional Notes

    - This action requires at least one attachment to be present in the Google SecOps
    case. It processes the first attachment found.

    - The action provides a direct link to the interactive ANY.RUN session in the
    case comments.


    ### Flow Description

    1. **Attachment Retrieval:** Fetches the first available attachment from the current
    case.

    2. **Sandbox Submission:** Uploads the file to ANY.RUN using the Linux connector
    with the configured OS and network parameters.

    3. **Task Monitoring:** Polls the ANY.RUN API to monitor the status of the analysis.

    4. **Report Retrieval:** Once complete, it downloads the HTML analysis report
    and extracts Indicators of Compromise (IOCs).

    5. **Case Enrichment:** Saves the HTML report to the Case Wall and adds comments
    containing the task URL and a summary of malicious/suspicious IOCs.
