File Windows Analysis:
  ai_description: >-
    ### General Description

    Performs automated malware analysis of file attachments using ANY.RUN's Windows
    sandbox environment. This action allows security analysts to submit suspicious
    files directly from a Google SecOps case to ANY.RUN, where they are executed in
    a controlled virtual machine to observe behavior, network activity, and potential
    threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Environment Version | DDL | No | Specifies the Windows OS version (7, 10, or
    11). Default is 10. |

    | Environment Bitness | DDL | No | Specifies the OS architecture (32 or 64 bit).
    Default is 64. |

    | Environment Type | DDL | No | Selects the environment preset. 'development'
    is only for Windows 10 x64; 'complete' is required for others. |

    | File Force Elevation | Boolean | No | If true, forces the file to execute with
    administrative privileges (PE files only). |

    | StartFolder | DDL | No | The directory where the file will be executed (e.g.,
    temp, desktop, downloads). |

    | Timeout In Seconds | String | No | The duration of the analysis task (10-660
    seconds). Default is 240. |

    | Change to valid extension | Boolean | No | Automatically corrects the file extension
    to match the file type. |

    | Command line | String | No | Optional arguments to pass to the file during execution.
    |

    | System's language | String | No | Sets the OS locale (e.g., 'en-US'). |

    | User Tags | String | No | Custom tags for the ANY.RUN task (max 8 tags, 16 chars
    each). |

    | Analysis Privacy Type | DDL | No | Sets visibility of the task (public, bylink,
    owner, byteam). |

    | Network Connect | Boolean | No | Enables or disables network connectivity for
    the sandbox. |

    | Network Fakenet | Boolean | No | Enables the FakeNet feature to simulate network
    services. |

    | Network Tor | Boolean | No | Routes sandbox traffic through the TOR network.
    |

    | Network Geo | String | No | Specifies the TOR exit node location (e.g., 'US').
    |

    | Network Mitm | Boolean | No | Enables HTTPS Man-In-The-Middle proxy for traffic
    inspection. |

    | Network Residential Proxy | Boolean | No | Uses a residential proxy for the
    sandbox connection. |

    | Network Residential Proxy Geo | String | No | Specifies the residential proxy
    location. |


    ### Additional Notes

    * This action does not run on specific entities (like IP or Hostname) but instead
    processes **attachments** associated with the current case.

    * At least one attachment must be present in the case for the action to execute
    successfully.


    ### Flow Description

    1. **Attachment Retrieval:** The action fetches the first available attachment
    from the Google SecOps case.

    2. **Task Submission:** It uploads the file to the ANY.RUN API, creating a new
    Windows analysis task with the configured environment and network settings.

    3. **Monitoring:** The action polls the ANY.RUN service to monitor the status
    of the analysis.

    4. **Reporting:** Once complete, it retrieves the full HTML analysis report and
    saves it as a new attachment to the case wall.

    5. **IOC Extraction:** It fetches identified Indicators of Compromise (IOCs) and
    posts a summary comment to the case wall, highlighting suspicious or malicious
    findings.

    6. **Verdict:** The action concludes by providing the final analysis verdict (e.g.,
    Malicious, Suspicious, Clean) as the action result.
