Parse EML Base64 Blob:
  ai_description: >-
    ### General Description

    The **Parse EML Base64 Blob** action is a utility designed to decode a base64-encoded
    string and parse its contents as an EML (Email) file. This action is used to extract
    structured information from raw email data, including headers, metadata, and body
    content. It is particularly useful in workflows where email files are passed as
    encoded strings, allowing for automated analysis of sender information, recipient
    lists, and message bodies without requiring external services.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64 EML Blob** | String | Yes | The base64-encoded string of the EML file
    to be parsed. |


    ### Additional Notes

    - This action performs local parsing and does not interact with external APIs
    or Google SecOps entities.

    - It supports recursive parsing of nested EML attachments found within the primary
    blob.

    - The output is provided as a JSON result containing detailed metadata and content
    for each parsed email object.


    ### Flow Description

    1. **Input Retrieval:** The action retrieves the base64-encoded EML blob from
    the input parameters.

    2. **Decoding:** The blob is decoded from base64 into a UTF-8 string.

    3. **EML Parsing:** The decoded string is parsed into an email message object
    using standard libraries.

    4. **Metadata Extraction:** The action extracts key headers such as 'From', 'To',
    'CC', 'BCC', 'Subject', and 'Date'.

    5. **Content Extraction:** It retrieves the plain text and HTML bodies of the
    email, along with a count of the email parts.

    6. **Recursive Attachment Processing:** The action iterates through the email
    payload to find nested multipart sections that represent attached EML files. If
    found, these are also decoded and parsed.

    7. **Result Output:** The extracted data for the main email and any nested emails
    is returned as a structured JSON array.
