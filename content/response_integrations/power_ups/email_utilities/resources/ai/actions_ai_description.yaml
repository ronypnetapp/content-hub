Analyze Headers:
  ai_description: >-
    Analyzes email headers provided in JSON format to perform a comprehensive security
    audit of an email's origin and routing path. The action validates authentication
    records (SPF, DMARC, DKIM, ARC), traces the relay hops, and enriches the data
    with threat intelligence.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Headers JSON | String | Yes | A JSON object containing the email headers to
    be analyzed. This is typically extracted from an email parsing action. |


    ### Flow Description

    1. **Input Extraction:** Retrieves the `Headers JSON` parameter and parses it
    into a Python dictionary.

    2. **Metadata Extraction:** Identifies core email attributes such as the sender,
    recipient, subject, and message ID.

    3. **Domain Security Validation:** Performs DNS queries to check the sender domain's
    SPF, DMARC, MX, and DNSSec records using the `checkdmarc` library.

    4. **Signature Verification:** Validates DKIM and ARC (Authenticated Receive Chain)
    signatures to ensure the email has not been tampered with during transit.

    5. **Relay Path Analysis (Hops):** Iterates through the 'Received' headers in
    reverse order to reconstruct the email's journey.

    6. **Threat Intelligence Enrichment:** For each relay server identified in the
    hops:
        *   Checks the IP or domain against multiple Real-time Block Lists (RBLs)
    using `pydnsbl` to identify known malicious senders.
        *   Performs RDAP/WHOIS lookups via `IPWhois` to determine ownership information.
        *   Retrieves geographic location data (City, Country, Coordinates) using
    the `DbIpCity` service.
    7. **Timing Analysis:** Calculates the delay (in seconds) between each relay hop
    to identify potential anomalies in delivery time.

    8. **Result Aggregation:** Consolidates all authentication results, blacklist
    statuses, and enrichment data into a structured JSON object for use in subsequent
    playbook steps.
