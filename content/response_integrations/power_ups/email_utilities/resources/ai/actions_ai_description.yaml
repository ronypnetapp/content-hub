Parse Base64 Email:
  ai_description: >-
    ### General Description

    Parses EML and MSG email files provided as a Base64 encoded string. This action
    is a comprehensive utility designed to extract structured data from email blobs,
    including headers, body content, and attachments. It automatically identifies
    and extracts Indicators of Compromise (IOCs) such as URLs, domains, IP addresses,
    and email addresses from the email's headers and body. The action supports recursive
    parsing, meaning it will also parse emails that are attached within the primary
    email file.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | EML/MSG Base64 String | Content | Yes | The Base64 encoded string representing
    the EML or MSG file to be parsed. |

    | Stop Transport At Header | String | No | A specific header field name. If provided,
    the action will stop processing transport/hop headers once this field is encountered.
    |

    | Blacklisted Headers | String | No | A comma-separated list of header names to
    be excluded from the final output. |

    | Use Blacklist As Whitelist | Boolean | No | If set to `true`, the headers provided
    in the 'Blacklisted Headers' parameter will be treated as an allowlist (only those
    headers will be included). Default is `false`. |


    ### Additional Notes

    - This action is a local processing utility; it does not make external API calls
    to threat intelligence services.

    - It handles both standard EML formats and Microsoft Outlook MSG (OLE) formats.

    - The action returns a detailed JSON object containing the parsed structure, which
    is ideal for automated analysis in playbooks.


    ### Flow Description

    1. **Decode Input:** Decodes the provided Base64 string into raw binary data.

    2. **Format Detection:** Identifies whether the binary data represents an OLE-based
    MSG file or a standard EML file.

    3. **Header Extraction:** Parses email headers (To, From, Subject, Date, etc.),
    applying any blacklist or whitelist filters provided in the parameters.

    4. **Body Parsing:** Extracts the email body in both plain text and HTML formats.
    If HTML is present, it is rendered to plain text for IOC extraction.

    5. **IOC Extraction:** Scans the headers and body content for IP addresses, URLs,
    domains, and email addresses using specialized regex and extraction libraries.

    6. **Attachment Processing:** Iterates through all attachments, extracting metadata
    (filename, size, hashes). If an attachment is another email (EML/MSG), it is parsed
    recursively.

    7. **Result Generation:** Aggregates all extracted data into a single structured
    JSON object and attaches it to the action's output.
