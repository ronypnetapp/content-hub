Parse Case Wall Email:
  ai_description: >-
    Parses EML or MSG email files attached to the Google SecOps case wall to extract
    headers, body content, and nested attachments. This action automates the decomposition
    of email files into structured data, facilitating the identification of indicators
    and the creation of related entities within the case context.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Entities | Boolean | No | When enabled (default: true), the action creates
    User entities for the 'To' and 'From' headers and an Email Subject entity for
    the 'Subject' field. |

    | Exclude Entities Regex | String | No | A regular expression used to prevent
    the creation of specific entities that match the pattern. |

    | Original EML Only | Boolean | No | If enabled (default: true), the action will
    only extract attachments from the original EML file. |

    | Create Observed Entities | DDL | No | Determines which indicator types (URLs,
    Emails, IPs, Hashes) to extract from the email body. Options include 'All', specific
    types, or 'None'. |

    | Save Attachments to Case Wall | Boolean | No | When enabled (default: true),
    any attachments found within the parsed email are extracted and saved back to
    the case wall. |

    | Fang Entities | Boolean | No | If enabled (default: true), defanged indicators
    (e.g., `example[.]com`) are converted back to their fanged versions (e.g., `example.com`)
    during extraction. |

    | Custom Entity Regexes | Code | No | A JSON object containing custom regular
    expressions to parse specific entity types from the email body and subject. |


    ### Additional Notes

    - This action does not require specific input entities to run; it operates on
    the attachments associated with the current case or alert.

    - Extracted attachments are linked to their corresponding `FILENAME` entities
    in the case by updating the entity's `attachment_id` property.


    ### Flow Description

    1. **Attachment Identification:** The action scans the case wall and alert wall
    for supported email file formats (.eml, .msg).

    2. **Email Parsing:** It utilizes the `EmailManager` to parse the identified file,
    extracting metadata (Subject, From, To, Date), body content (Text/HTML), and nested
    attachments.

    3. **Indicator Extraction:** The action identifies URLs, IPs, Emails, and Hashes
    within the email body and headers based on the `Create Observed Entities` and
    `Custom Entity Regexes` settings.

    4. **Entity Creation:** If configured, it creates new entities in the SOAR case
    for the email participants, subject, and discovered indicators, establishing directional
    relationships between them.

    5. **Attachment Processing:** If `Save Attachments to Case Wall` is true, nested
    files are uploaded to the case. The action also updates existing `FILENAME` entities
    in the alert with the new attachment IDs.

    6. **Result Output:** The complete parsed email structure is returned as a JSON
    object for use in downstream playbook tasks.
