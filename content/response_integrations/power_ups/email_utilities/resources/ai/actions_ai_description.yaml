Analyze EML Headers:
  ai_description: >-
    Analyzes email headers provided either as a base64-encoded EML file or a JSON-formatted
    list of headers. The action performs a security-focused heuristic analysis to
    identify potential spoofing, misconfigurations, or suspicious patterns. It evaluates
    routing information from 'Received' headers and compares key fields such as 'Return-Path',
    'From', and 'Reply-To' to detect mismatches. Additionally, it checks for the presence
    of specific headers like 'X-Distribution' and 'Bcc', and validates the 'Message-ID'
    format. The results include a detailed JSON breakdown of extracted headers and
    a formatted HTML summary of security recommendations and matched rules.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 EML | String | No | The base64-encoded content of an EML file. If provided,
    the action will parse this file to extract headers. |

    | Header List | String | No | A JSON-formatted string representing a list of email
    headers. Used if a full EML file is not available. |


    ### Additional Notes

    - Either 'Base64 EML' or 'Header List' must be configured for the action to run;
    if both are missing, the action will fail.

    - The action handles duplicate header keys by appending a numeric suffix (e.g.,
    'Received_2').


    ### Flow Description

    1. **Input Retrieval**: The action checks for the 'Base64 EML' or 'Header List'
    parameters.

    2. **Header Extraction**: If an EML is provided, it is decoded and parsed using
    standard email libraries. If a header list is provided, it is parsed from JSON.

    3. **Normalization**: Headers are organized into a dictionary, and duplicate keys
    are handled to ensure all data is captured.

    4. **Routing Analysis**: The action extracts domains and IP addresses from 'Received'
    headers to map the email's path.

    5. **Heuristic Security Checks**: The code runs several checks:
        - Compares 'Return-Path' against 'From' and 'X-Original-Sender'.
        - Compares 'Reply-To' against 'From'.
        - Validates 'X-Authenticated-User' against the 'From' address.
        - Checks for suspicious headers (e.g., 'X-Distribution', 'X-UIDL', 'Bcc').
        - Inspects 'Message-ID' for anomalies.
    6. **Result Generation**: Scores are calculated based on matched rules, and the
    findings are outputted as both raw JSON and a formatted HTML table.
