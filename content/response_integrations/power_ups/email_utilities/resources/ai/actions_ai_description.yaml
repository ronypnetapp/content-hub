    ### General Description

    Verifies the connectivity between Google SecOps and the Email Utilities integration.
    This action serves as a basic health check to ensure that the integration is correctly
    configured and reachable within the environment.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This is a standard 'Ping' action used for troubleshooting and configuration validation.
    It does not perform any data processing, external API calls, or entity enrichment.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify SDK environment.

    2. **Connectivity Check**: The script executes a simple completion command to
    confirm the execution environment is functional.

    3. **Completion**: Returns a success message 'Siemplify is connected' to the SOAR
    interface.
