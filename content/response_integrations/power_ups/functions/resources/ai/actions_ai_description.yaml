SanitizeHTML:
  ai_description: >-
    ### General Description

    The **SanitizeHTML** action is a utility designed to clean and sanitize HTML fragments.
    It uses the `bleach` library to parse HTML according to the HTML5 standard, stripping
    or escaping tags, attributes, and CSS styles that are not explicitly permitted.
    This is primarily used to prevent Cross-Site Scripting (XSS) or to clean up malformed
    HTML data retrieved from external sources.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Input HTML** | String | Yes | The HTML fragment that needs to be sanitized.
    |

    | **Tags** | String | No | A comma-separated list of allowed HTML tags. Tags not
    in this list will be escaped or stripped. Default includes common safe tags like
    `a`, `p`, `div`, etc. |

    | **Attributes** | String | No | A comma-separated list of allowed HTML attributes.
    |

    | **Styles** | String | No | A comma-separated list of allowed CSS properties
    (e.g., `color`, `background-color`). |

    | **Allow All Attributes** | Boolean | No | If set to `True`, the action will
    allow all attributes on the permitted tags. |


    ### Additional Notes

    - If no `Tags` are provided, the action uses a default set of safe tags defined
    in the integration.

    - The action logic also checks for `Allow All Tags` and `Allow All Styles` parameters
    in the code, though they may not be exposed in all configuration versions.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input HTML and the configuration
    for allowed tags, attributes, and styles from the action parameters.

    2. **Sanitization Configuration**: It parses the comma-separated strings into
    lists and initializes a CSS sanitizer if specific styles are allowed.

    3. **Processing**: It applies the `bleach.clean` method to the input HTML, filtering
    it against the defined allow-lists for tags, attributes, and CSS properties.

    4. **Completion**: The sanitized HTML string is returned as the action's result
    value, and a success message is logged.
