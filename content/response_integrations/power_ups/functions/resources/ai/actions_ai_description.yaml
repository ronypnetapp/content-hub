XMLtoJson:
  ai_description: >-
    ### General Description

    The **XMLtoJson** action is a utility function designed to convert XML-formatted
    strings into JSON objects. This is particularly useful for parsing responses from
    legacy systems or APIs that return data in XML format, allowing subsequent playbook
    steps to easily access the data using JSON path notation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **xml** | String | Yes | The XML formatted string that needs to be converted
    to JSON. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the XML string provided in the
    `xml` input parameter.

    2. **Parsing**: It utilizes the `xmltodict` library to parse the XML string into
    a structured Python dictionary.

    3. **Result Attachment**: The resulting dictionary is added to the action's execution
    results as a JSON object via `add_result_json`.

    4. **Completion**: The action concludes by returning the JSON data and a success
    status. If the XML is malformed and cannot be parsed, the action flags an execution
    failure and returns the error message.
