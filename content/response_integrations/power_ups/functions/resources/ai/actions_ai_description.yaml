Extract IOCs:
  ai_description: >-
    ### General Description

    The **Extract IOCs** action is a utility designed to parse a provided text string
    and identify common Indicators of Compromise (IOCs). It specifically identifies
    and extracts URLs, domains, IPv4/IPv6 addresses, and email addresses from unstructured
    text. This action is typically used to process data from sources like email bodies,
    log entries, or threat reports to isolate actionable security identifiers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input String | String | Yes | The raw text string from which the action will
    attempt to extract IOCs. |


    ### Additional Notes

    - This action performs local parsing using regular expressions and specialized
    libraries (`URLExtract`, `tld`) and does not interact with external APIs.

    - It includes logic to filter out common false positives in URLs (e.g., specific
    file extensions like .js, .css, .png) and validates IP addresses to ensure they
    are syntactically correct.

    - By default, it includes internal/private IP addresses in the extraction results.


    ### Flow Description

    1. **Input Retrieval**: The action retrieves the `Input String` provided as a
    parameter.

    2. **URL Extraction**: Uses the `URLExtract` library to identify potential URLs,
    cleaning them of noise and validating their structure.

    3. **Domain Extraction**: For every valid URL identified, the action extracts
    the First Level Domain (FLD) using the `tld` library.

    4. **IP Extraction**: Scans the text for IPv4 and IPv6 patterns, validating them
    using the `ipaddress` module to ensure they are valid network addresses.

    5. **Email Extraction**: Uses a regular expression to identify and extract email
    addresses from the text.

    6. **Result Compilation**: Aggregates all identified IOCs into a structured JSON
    object and generates a summary message for the action output.
