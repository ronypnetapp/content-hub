Detect Hash Type:
  ai_description: >-
    ### General Description

    The **Detect Hash Type** action identifies the most likely hash algorithm (MD5,
    SHA-1, SHA-256, or SHA-512) for provided strings or `FILEHASH` entities. It uses
    the `hashid` library to perform local identification without external API calls.
    This utility is primarily used to categorize hash values for downstream logic
    in playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Hashes** | String | No | A comma-separated list of hash strings to identify.
    If provided, the action will identify the types for these specific strings in
    addition to any entities in the case scope. |


    ### Flow Description

    1. **Parameter Parsing**: The action retrieves the `Hashes` parameter and splits
    it into individual strings if provided.

    2. **Manual Identification**: For each string in the `Hashes` parameter, the action
    uses the `hashid` library to detect the algorithm. It checks if the detected type
    is within the supported set (MD5, SHA-1, SHA-256, SHA-512).

    3. **Entity Filtering**: The action iterates through all entities in the current
    case scope, specifically targeting those with the type `FILEHASH`.

    4. **Entity Identification**: For each `FILEHASH` entity, the action identifies
    the hash type using the same logic as the manual identification.

    5. **Internal Enrichment**: The action updates the `additional_properties` of
    the `FILEHASH` entities with a new key `HashType` containing the detected algorithm
    name.

    6. **Result Reporting**: The action compiles all identified hash types (from both
    parameters and entities) into a JSON result and provides a summary message.


    ### Additional Notes

    - If a hash cannot be identified or does not match the supported types, the `HashType`
    is set to `UNDETECTED`.

    - This action is entirely local and does not require network connectivity to external
    threat intelligence services.
  capabilities:
