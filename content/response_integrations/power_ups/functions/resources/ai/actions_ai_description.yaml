Detect IP Type:
  ai_description: >-
    ### General Description

    The **Detect IP Type** action is a utility designed to identify whether an IP
    address is in IPv4 or IPv6 format. It processes both manually provided IP addresses
    and existing IP Address entities within a case, enriching the entities with the
    detected type.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | No | A comma-separated list of IP addresses to evaluate.
    If provided, these addresses are processed alongside case entities. |


    ### Additional Notes

    - This action uses local regular expression matching and does not require connectivity
    to external threat intelligence services.

    - If an address does not conform to standard IPv4 or IPv6 formats, it is categorized
    as 'UNDETECTED'.


    ### Flow Description

    1. **Input Retrieval**: The action fetches the 'IP Addresses' parameter and splits
    it into a list if it contains values.

    2. **Manual IP Processing**: Each IP address from the parameter is checked against
    IPv4 and IPv6 regex patterns. The results are stored for the final output.

    3. **Entity Filtering**: The action iterates through the case's `target_entities`
    and identifies those with the type `ADDRESS`.

    4. **Type Detection**: For each identified entity, the action applies regex patterns
    to its identifier to determine the IP version.

    5. **Internal Enrichment**: The detected type is added to the entity's `additional_properties`
    dictionary under the key `IPType`.

    6. **State Update**: The action updates the modified entities within Google SecOps
    and returns a comprehensive JSON result containing all detected types.
