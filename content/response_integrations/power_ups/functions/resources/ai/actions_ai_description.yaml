Time Duration Calculator:
  ai_description: "### General Description\nThe **Time Duration Calculator** is a\
    \ utility action designed to calculate the precise time difference between two\
    \ date-time inputs. It supports various input formats and can dynamically use\
    \ the current system time as one of the comparison points. The action outputs\
    \ the duration in a human-readable format (years, days, hours, minutes, seconds)\
    \ and provides the total duration in seconds as the primary result value.\n\n\
    ### Parameters Description\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Input DateTime 1 | String | Yes | The first\
    \ datetime value to compare. Supports specific date strings or the keyword \"\
    now\" for the current UTC time. |\n| Input DateTime 1 Format | String | Yes |\
    \ The `strftime` format used to parse Input DateTime 1 (e.g., `%Y-%m-%dT%H:%M:%S%z`).\
    \ |\n| Input DateTime 2 | String | Yes | The second datetime value to compare.\
    \ Supports specific date strings or the keyword \"now\" for the current UTC time.\
    \ |\n| Input DateTime 2 Format | String | Yes | The `strftime` format used to\
    \ parse Input DateTime 2 (e.g., `%Y-%m-%dT%H:%M:%S%z`). |\n\n### Additional Notes\n\
    - If a provided datetime string does not include timezone information, the action\
    \ automatically localizes it to UTC to ensure accurate calculations.\n- The action\
    \ is purely mathematical and does not interact with external APIs or modify SecOps\
    \ entities.\n\n### Flow Description\n1. **Parameter Extraction:** The action retrieves\
    \ the two input datetime strings and their corresponding format strings from the\
    \ environment.\n2. **Datetime Parsing:** \n    - If an input is set to \"now\"\
    , the current UTC time is captured.\n    - Otherwise, the string is parsed using\
    \ the provided `strftime` format.\n    - Timezone awareness is checked; if the\
    \ object is naive, it is localized to UTC.\n3. **Duration Calculation:** The action\
    \ calculates the delta between the two datetime objects.\n4. **Data Breakdown:**\
    \ The total delta is decomposed into years, days, hours, minutes, and seconds.\n\
    5. **Output Generation:** The action populates a JSON result with the breakdown\
    \ and sets the total seconds as the main script result."
