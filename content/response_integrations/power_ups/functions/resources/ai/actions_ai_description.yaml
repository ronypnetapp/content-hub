IP to Integer:
  ai_description: >-
    ### General Description

    This action is a utility function designed to convert IPv4 addresses into their
    corresponding integer (long) format. It is primarily used for data normalization
    or when interacting with systems that require IP addresses in numeric form rather
    than string format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | string | Yes | A comma-separated list of IPv4 addresses (e.g.,
    "192.168.1.1, 10.0.0.1") to be converted into integers. |


    ### Additional Notes

    - This action does not interact with any external APIs or services.

    - It does not process or modify Google SecOps entities; it operates strictly on
    the provided input parameter string.

    - The conversion uses network byte order (big-endian).


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `IP Addresses` parameter and splits
    the string by commas, removing any leading or trailing whitespace.

    2. **Conversion**: For each IP address in the list, the script uses the `socket`
    and `struct` libraries to convert the string representation into a 32-bit unsigned
    integer.

    3. **Result Compilation**: The results are stored in a JSON dictionary mapping
    the original IP to the integer, and also joined into a comma-separated string
    for the main result value.

    4. **Output**: The action returns the converted values and provides a summary
    message in the execution log.
