Math Functions:
  ai_description: >-
    ### General Description

    The **Math Functions** action provides a suite of built-in Python mathematical
    operations to process numeric data within a playbook. It allows users to perform
    calculations, formatting, and transformations on a list of numbers provided as
    a comma-separated string.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Function** | DDL | Yes | The mathematical operation to execute. Supported
    options: `Max` (largest item), `Min` (smallest item), `Round` (rounds numbers),
    `Sort` (sorts numbers), `Sum` (totals the items), `Float` (converts to floating
    point), `Hex` (converts to hexadecimal), `Int` (converts to integer), `Abs` (absolute
    value), and `Display` (adds comma separators). |

    | **Numbers** | String | Yes | A comma-separated list of numbers (e.g., "13.5,
    -90, 566") to be processed by the selected function. |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `Numbers` string and splits it
    by commas. It attempts to parse each element into a float or integer.

    2. **Function Execution**: Based on the selected `Function` parameter, the action
    applies the corresponding Python logic (e.g., `abs()`, `max()`, `sum()`, or string
    formatting for `Display`).

    3. **Result Generation**: The processed numbers are stored in a list. If the `Hex`
    function is chosen, the action specifically filters for integer-compatible values.

    4. **Output**: The action returns the result as a JSON array and sets the script
    result value to the processed data (or a single value if only one result exists).


    ### Additional Notes

    - This action does not interact with SecOps entities; it operates strictly on
