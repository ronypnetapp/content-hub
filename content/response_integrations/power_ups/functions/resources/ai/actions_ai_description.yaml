Defang Text:
  ai_description: >-
    ### General Description

    This action defangs a provided text string by modifying potentially dangerous
    indicators such as URLs, IP addresses, and email addresses. Defanging is a security
    practice used to prevent accidental clicking or automatic resolution of malicious
    links by rendering them non-functional while remaining human-readable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input | string | No | The raw text string that needs to be defanged. If the
    input is empty or not provided, the action will return an empty string. |


    ### Flow Description

    1. **Extraction**: The action retrieves the `Input` string from the action parameters.

    2. **Validation**: If the input text is empty, the action sets the output message
    to "Input text is empty" and returns an empty result.

    3. **URL Defanging**: Identifies HTTP/HTTPS URLs and replaces `http` with `hxxp`
    and replaces dots in the domain with `[.]` (e.g., `http://example.com` becomes
    `hxxp://example[.]com`).

    4. **IP Defanging**: Identifies IPv4 addresses and replaces the dots with `[.]`
    (e.g., `1.1.1.1` becomes `1[.]1[.]1[.]1`).

    5. **Email Defanging**: Identifies email addresses and replaces the `@` symbol
    with `[at]` and dots in the domain with `[.]` (e.g., `user@example.com` becomes
    `user[at]example[.]com`).

    6. **Result**: The final modified string is returned in the `converted_text` JSON
    result field.


    ### Additional Notes

    This is a utility action that performs local text transformation. It does not
    interact with external APIs, does not require network connectivity, and does not
    modify any internal SOAR objects like entities or case comments.
