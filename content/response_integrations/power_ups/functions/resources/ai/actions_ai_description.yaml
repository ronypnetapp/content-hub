Run JSONPath Query:
  ai_description: >-
    ### General Description

    The **Run JSONPath Query** action is a utility designed to parse a JSON string
    and extract specific values based on a provided JSONPath expression. It leverages
    the `jsonpath-ng` library to navigate complex JSON structures, making it highly
    useful for data transformation and extraction within playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Json** | Code/String | Yes | The raw JSON string that you want to query. |

    | **JSONPath Expression** | String | Yes | The JSONPath expression used to locate
    and extract data from the input JSON. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input JSON string and the
    JSONPath expression from the action parameters.

    2. **JSON Parsing**: The input string is converted into a Python dictionary or
    list structure.

    3. **Expression Evaluation**: The JSONPath expression is parsed and applied against
    the JSON data.

    4. **Result Compilation**: All matching values found by the expression are collected
    into a list under the key `matches`.

    5. **Output**: The resulting JSON object containing the matches is returned to
    the SOAR platform for use in subsequent playbook steps.


    ### Additional Notes

    - This action is a pure data processing function and does not interact with external
    APIs or Google SecOps entities.

    - If the input JSON is malformed or the JSONPath expression is invalid, the action
    will fail with an error.
