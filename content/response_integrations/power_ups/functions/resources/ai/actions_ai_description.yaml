Convert Time Format:
  ai_description: "### General Description\nThis action converts a datetime value\
    \ from one format to another using the `arrow` library. It is a utility function\
    \ designed to normalize time data within a playbook, allowing for format conversion,\
    \ timezone adjustments, and time shifting (adding or subtracting seconds).\n\n\
    ### Parameters Description\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| Input | string | Yes | The input datetime value\
    \ to be converted. If left empty, the current time is used. Supports epoch timestamps\
    \ (10 or 13 digits). |\n| From Format | string | Yes | The `strftime` format of\
    \ the input string (e.g., `%Y-%m-%d %H:%M:%S`). Special handling is included for\
    \ 'UTC' or 'GMT' suffixes. |\n| To Format | string | Yes | The desired output\
    \ format using Arrow tokens (e.g., `YYYY/MM/DD`). |\n| Time Delta In Seconds |\
    \ string | Yes | A shift value in seconds to move the time forward (positive)\
    \ or backward (negative). Default is 0. |\n| Timezone | string | No | The target\
    \ timezone for the output (e.g., 'UTC', 'US/Eastern'). |\n\n### Additional Notes\n\
    - If the `Input` parameter is a 10-digit or 13-digit number, the action treats\
    \ it as a Unix timestamp (seconds or milliseconds respectively) regardless of\
    \ the `From Format` provided.\n- The action handles 'UTC' and 'GMT' offsets directly\
    \ if they are appended to the `From Format` string.\n\n### Flow Description\n\
    1. **Parameter Extraction**: Retrieves the input string, source format, target\
    \ format, time delta, and timezone from the action parameters.\n2. **Time Parsing**:\
    \ \n    - If no input is provided, it defaults to the current time.\n    - If\
    \ the input is numeric, it parses it as a Unix timestamp.\n    - Otherwise, it\
    \ attempts to parse the string using the provided `From Format`.\n3. **Time Manipulation**:\
    \ Applies the `Time Delta In Seconds` to shift the time and converts the object\
    \ to the specified `Timezone` if provided.\n4. **Formatting**: Converts the resulting\
    \ datetime object into the string format defined by `To Format`.\n5. **Output**:\
    \ Returns the formatted string as the action result."
