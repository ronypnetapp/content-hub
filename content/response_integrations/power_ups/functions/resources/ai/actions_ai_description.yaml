Create Thumbnail:
  ai_description: "### General Description\nThe **Create Thumbnail** action is a utility\
    \ function designed to generate a resized version (thumbnail) of an image provided\
    \ in Base64 format. This action is primarily used for data transformation within\
    \ a playbook, allowing users to standardize image sizes for reporting or display\
    \ purposes without interacting with external APIs.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Base64 Image** | String | No | The Base64 encoded string of the image to be\
    \ resized. This parameter is used if the image is provided directly rather than\
    \ through a JSON structure. |\n| **Thumbnail Size** | String | Yes | A comma-separated\
    \ string representing the target width and height in pixels (e.g., \"250,250\"\
    ). |\n| **Input JSON** | String | No | A JSON-formatted string (typically an array\
    \ of objects) containing image data. If provided, the action will iterate through\
    \ the JSON to find images. |\n| **Image Key Path** | String | No | A dot-notation\
    \ path (e.g., \"data.content.image\") used to locate the Base64 image string within\
    \ the objects provided in the `Input JSON`. |\n\n### Additional Notes\n- The action\
    \ requires either the **Base64 Image** or the **Input JSON** parameter to be populated\
    \ to function correctly.\n- The output thumbnail is always returned in PNG format,\
    \ encoded as a Base64 string.\n- This action does not interact with the Google\
    \ SecOps entity model directly; it processes data passed through parameters.\n\
    \n### Flow Description\n1. **Initialization**: The action extracts the target\
    \ dimensions from the `Thumbnail Size` parameter and identifies the source of\
    \ the image data.\n2. **Data Extraction**: \n    - If `Input JSON` is provided,\
    \ the action parses the JSON and uses the `Image Key Path` to recursively find\
    \ the Base64 image strings for each entry.\n    - If `Input JSON` is not provided,\
    \ it uses the single string from the `Base64 Image` parameter.\n3. **Image Processing**:\
    \ For each identified image, the action decodes the Base64 string, utilizes the\
    \ PIL (Pillow) library to resize the image to the specified dimensions, and saves\
    \ the result as a PNG.\n4. **Encoding**: The resized PNG image is re-encoded into\
    \ a Base64 string.\n5. **Result Generation**: The action compiles the processed\
    \ thumbnails into a JSON result object and completes the execution."
