Calculate Timestamp:
  ai_description: >-
    Calculates one or more new timestamps by applying specified time offsets (deltas)
    to a baseline starting point. This utility action is part of the 'Functions' integration
    and is used to generate relative time ranges or specific points in time for use
    in subsequent playbook steps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input Type | Dropdown | No | Defines the baseline time source. Options: 'Current
    Time' (default), 'Alert Creation Time', 'Case Creation Time', or 'Custom Timestamp'.
    |

    | Custom Timestamp | String | No | The specific date/time string to use as a baseline.
    **Mandatory** if 'Input Type' is set to 'Custom Timestamp'. |

    | Custom Timestamp Format | String | No | The strftime-style format of the 'Custom
    Timestamp'. Defaults to ISO 8601 (%Y-%m-%dT%H:%M:%S%z). If empty, the action attempts
    to parse as epoch. |

    | Timestamp Delta | String | No | A comma-separated list of offsets to apply.
    Format: [operator][value][unit]. Units: m (months), d (days), H (hours), M (minutes),
    S (seconds). Example: '+1d, -30M'. |

    | Output Timestamp Format | String | No | The desired format for the resulting
    timestamps. Use 'epoch' for Unix timestamps or strftime-style strings. Defaults
    to ISO 8601. |


    ### Additional Notes

    - If 'Input Type' is 'Custom Timestamp', the 'Custom Timestamp' parameter must
    be populated.

    - If 'Output Timestamp Format' is set to 'epoch', the result will be an integer
    representing seconds since the Unix epoch.


    ### Flow Description

    1. **Baseline Identification**: The action determines the starting timestamp based
    on the 'Input Type' (e.g., fetching the current system time or the creation time
    of the active alert/case).

    2. **Parsing**: If a custom timestamp is provided, it is parsed using the specified
    format or identified as an epoch value.

    3. **Delta Calculation**: The action iterates through the 'Timestamp Delta' list,
    applying each offset (addition or subtraction) to the baseline time using the
    `arrow` library.

    4. **Formatting**: The original baseline and all calculated offsets are formatted
    according to the 'Output Timestamp Format'.

    5. **Output**: The results are returned as a JSON object containing the 'original_timestamp'
    and a dictionary of 'calculated_timestamps'.
