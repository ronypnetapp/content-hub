String Functions:
  ai_description: >-
    ### General Description

    This action provides a suite of Python-based string manipulation utilities designed
    to transform, analyze, or format strings within a playbook. It allows users to
    perform common operations like case conversion, regex matching, and base64 encoding/decoding
    on a provided input string without requiring custom script blocks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input | String | Yes | The source string to be processed. |

    | Function | DDL | Yes | The specific string operation to apply. Options include:
    Lower, Upper, Count, Find, IsAlpha, IsDigit, Replace, Strip, Title, Regex Replace,
    JSON Serialize, Regex, Split, DecodeBase64, EncodeBase64, and RemoveNewLines.
    |

    | Param 1 | String | No | The first contextual argument required by some functions
    (e.g., the substring to count, the regex pattern, or the delimiter for splitting).
    |

    | Param 2 | String | No | The second contextual argument required by some functions
    (e.g., the replacement string for 'Replace' or the join character for 'Regex').
    |


    ### Additional Notes

    - The placeholder `_SPACE_` can be used in `Param 1` and `Param 2` for the 'Replace'
    and 'Regex Replace' functions; it will be automatically converted to a literal
    space character before processing.

    - For 'DecodeBase64' and 'EncodeBase64', `Param 1` defaults to 'UTF-8' if not
    specified or if it doesn't match 'UTF-8' or 'ASCII'.

    - The 'Split' function will default to a comma (`,`) delimiter if `Param 1` is
    not provided.


    ### Flow Description

    1. **Parameter Retrieval**: The action fetches the `Input` string, the selected
    `Function`, and any optional arguments (`Param 1`, `Param 2`).

    2. **Placeholder Normalization**: For replacement-based functions, it substitutes
    the `_SPACE_` placeholder with actual space characters.

    3. **Logic Execution**: The action executes the specific Python string method
    or library function (e.g., `re`, `base64`, `json`) corresponding to the user's
    selection.

    4. **Result Output**: The transformed string or boolean result is returned to
    the SOAR platform. For the 'Split' function, the resulting list is also attached
    as a JSON result.
