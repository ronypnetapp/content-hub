Remove Entity from File:
  ai_description: >-
    ### General Description\nRemoves the identifiers of target entities from a specified
    local file. This utility action is primarily used for managing local state, exclusion
    lists, or temporary data stores within the SOAR environment's local filesystem.\n\n###
    Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---
    | :--- | :--- | :--- |\n| Filename | string | Yes | The name of the file (located
    in the /tmp/ directory) from which the entity identifiers will be removed. |\n\n###
    Flow Description\n1. **Initialization**: The action extracts the `Filename` parameter
    and constructs the full path within the `/tmp/` directory.\n2. **File Locking**:
    It opens the file using a locking mechanism to ensure exclusive access and prevent
    data corruption from concurrent processes.\n3. **Entity Processing**: The action
    iterates through all entities provided in the current context (`target_entities`).\n4.
    **Removal Logic**: For each entity, it checks if the identifier exists in the
    file's content. If found, the identifier is removed from the internal list.\n5.
    **Persistence**: The updated list of identifiers is written back to the file,
    and the lock is released.\n6. **Result Evaluation**: If any entity identifier
    was not found in the file, the action's final result is set to `False`. Otherwise,
    it returns `True`.\n\n### Additional Notes\n- The action operates strictly on
    the local filesystem of the SOAR runner.\n- It returns a failure status if at
    least one entity was missing from the file, even if others were successfully removed.
