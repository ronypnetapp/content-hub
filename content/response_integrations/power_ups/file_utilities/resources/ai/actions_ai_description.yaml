    ### General Description

    The **Get Files as Base64** action is a utility designed to read local files from
    the system where the Google SecOps runner is executing and convert their content
    into Base64-encoded strings. This action is primarily used to prepare file data
    for transmission to external APIs, inclusion in reports, or further processing
    within a playbook where binary data is not supported.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Paths** | String | Yes | A comma-delimited list of absolute file paths
    to be processed (e.g., `/tmp/logs/audit.log, /home/user/evidence.bin`). |


    ### Additional Notes

    - The action includes specialized logic to handle filenames that may contain commas
    by recursively checking for the existence of path segments on the local filesystem.

    - If a file cannot be read or does not exist, the action will log an error and
    fail the execution.


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `File Paths` parameter and splits
    it into individual path strings.

    2. **Path Resolution**: It utilizes a helper function to correctly identify file
    boundaries, ensuring that paths containing commas are correctly interpreted if
    they exist on the disk.

    3. **File Access**: The action iterates through the resolved file paths and attempts
    to open each file in binary read mode (`rb`).

    4. **Encoding**: The raw binary content of each file is encoded into a Base64
    string using the UTF-8 character set.

    5. **Metadata Extraction**: For each file, the action extracts the directory path,
    filename, and file extension.

    6. **Result Construction**: All encoded data and associated metadata are compiled
    into a JSON object.

    7. **Output**: The final JSON result is returned to the SOAR platform, and the
    action completes with a summary of the converted files.
