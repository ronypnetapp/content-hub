Extract Archive:
  ai_description: >-
    ### General Description

    The **Extract Archive** action is a utility designed to decompress archive files
    located on the local filesystem of the Google SecOps server. It supports multiple
    formats including ZIP, TAR, GZTAR, BZTAR, and XTAR. The action is primarily used
    to prepare files for further analysis by expanding their contents into a structured
    directory and providing a detailed map of the extracted files.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Archive** | String | Yes | A comma-separated list of absolute file paths to
    the archives that need to be extracted. Example: `/tmp/data.zip, /tmp/logs.tar.gz`.
    |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `Archive` parameter and splits
    it into a list of individual file paths.

    2. **Directory Preparation**: For each archive path provided, the action creates
    a specific destination directory within the predefined path `/opt/siemplify/siemplify_server/Scripting/FileUtilities/Extract`
    based on the archive's name.

    3. **Extraction**: It uses the Python `shutil` library to unpack the archive contents
    into the newly created destination directory.

    4. **Structure Mapping**: The action recursively traverses the extracted directory
    to build a hierarchical dictionary (JSON) representing the file structure, including
    file names, types, extensions, and full paths.

    5. **Result Compilation**: It aggregates the success status, folder location,
    and file lists for all processed archives into a single JSON result and provides
    an output message summarizing the operation.


    ### Additional Notes

    - This action performs operations on the local filesystem of the SOAR execution
    environment.

    - It does not interact with external APIs or modify case entities directly.
