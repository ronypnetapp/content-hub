Decode Base64:
  ai_description: >-
    ### General Description

    The **Decode Base64** action is a utility designed to convert Base64-encoded strings
    back into their original text format. It allows users to specify the character
    encoding (UTF-8 or ASCII) to ensure the decoded content is interpreted correctly.
    This is particularly useful for decoding data found in logs, email headers, or
    payloads that are often obfuscated or transmitted in Base64 format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 Input | String | Yes | The Base64 encoded string that needs to be decoded.
    |

    | Encoding | DDL | Yes | The character encoding to use for the decoded string.
    Options include **UTF-8** and **ASCII**. |


    ### Additional Notes

    - This action does not interact with external APIs; it performs the decoding logic
    locally within the execution environment.

    - If the input string is not a valid Base64 sequence or the encoding fails, the
    action will return a failure status.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Base64 Input` string and
    the selected `Encoding` from the user input.

    2. **Decoding**: It uses the standard Base64 library to decode the input string
    into a byte object.

    3. **String Conversion**: The byte object is converted into a string using the
    specified encoding (UTF-8 or ASCII).

    4. **Result Output**: The decoded string is packaged into a JSON object and returned
    as the action's result.
