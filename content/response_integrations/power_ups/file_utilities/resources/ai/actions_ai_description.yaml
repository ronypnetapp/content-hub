Extract Zip Files:
  ai_description: >-
    ### General Description

    This action extracts files from ZIP archives associated with `FILENAME` entities
    within a Google SecOps case. It is designed to handle password-protected archives
    through either a provided list of passwords or a brute-force approach. The action
    can automatically enrich the case by adding the extracted files back to the case
    wall and creating new entities for the extracted files and their corresponding
    hashes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Include Data In JSON Result | boolean | No | If set to `true`, the base64 encoded
    content of the extracted files will be included in the action's JSON output. Default
    is `false`. |

    | Create Entities | boolean | No | If set to `true`, the action will create new
    `FILENAME` and `FILEHASH` entities for every file extracted from the archive.
    Default is `true`. |

    | Zip File Password | string | No | A string containing one or more passwords
    used to attempt extraction of protected ZIP files. |

    | BruteForce Password | boolean | No | If set to `true`, the action will attempt
    to brute-force the ZIP password using a built-in wordlist if the provided passwords
    fail. Default is `false`. |

    | Add to Case Wall | boolean | No | If set to `true`, the extracted files will
    be uploaded as new attachments to the case wall. Default is `true`. |

    | Zip Password List Delimiter | string | Yes | The character used to separate
    multiple passwords provided in the 'Zip File Password' parameter (e.g., a comma).
    |


    ### Additional Notes

    * The action specifically targets `FILENAME` entities that possess an `attachment_id`
    attribute in their additional properties. This ID is required to retrieve the
    file from the SOAR's internal storage.

    * When creating entities, the action also generates relationships between the
    extracted files and the original ZIP archive or the relevant email subject.


    ### Flow Description

    1. **Identification**: The action iterates through all `FILENAME` entities in
    the current context, looking for those with an `attachment_id`.

    2. **Retrieval**: For each valid entity, it downloads the associated file content
    from the Google SecOps attachment service.

    3. **Extraction**: It verifies if the file is a valid ZIP archive and attempts
    to extract its contents. If the ZIP is encrypted, it uses the provided passwords
    (split by the delimiter) and/or performs a brute-force attack if enabled.

    4. **Internal Mutation (Case Wall)**: If 'Add to Case Wall' is enabled, each extracted
    file is uploaded back to the case as a new attachment.

    5. **Internal Mutation (Entities)**: If 'Create Entities' is enabled, the action
    creates new `FILENAME` entities for the extracted files and `FILEHASH` entities
    for their MD5 hashes, establishing parent-child relationships where applicable.

    6. **Output**: The action returns a JSON summary of the extracted files, including
    metadata like size, MIME type, and hashes (MD5, SHA1, SHA256, SHA512).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds extracted files as new attachments to the case wall and creates
      new FILENAME and FILEHASH entities within the Google SecOps case environment.
