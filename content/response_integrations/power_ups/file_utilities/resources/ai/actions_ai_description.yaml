Count Files:
  ai_description: >-
    ### General Description

    The **Count Files** action is a utility designed to count the number of files
    within a specified directory on the local filesystem. It allows users to filter
    files by a specific extension and optionally perform a recursive search through
    subdirectories. This is particularly useful for automated workflows that need
    to verify the presence or volume of specific file types (e.g., logs, temporary
    files, or artifacts) as part of an investigation or maintenance task.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Folder** | String | Yes | The absolute or relative directory path where the
    file count should be performed. |

    | **File Extension** | String | No | A glob-style pattern to filter files (e.g.,
    `*.txt`, `*.log`). If not provided, it defaults to `*.*` (all files). |

    | **Is Recursive** | Boolean | No | If set to `true`, the action will search for
    files in the specified folder and all its subfolders. Defaults to `false`. |


    ### Additional Notes

    - The action uses the Python `glob` library to resolve file paths.

    - If the provided `Folder` path does not exist or is inaccessible, the action
    will return a count of 0 or may fail depending on environment permissions.

    - This action does not interact with SecOps entities (IPs, Hostnames, etc.) and
    operates strictly on the filesystem path provided.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Folder`, `File Extension`,
    and `Is Recursive` flag from the input parameters.

    2. **Pattern Construction:** If no file extension is provided, it defaults to
    `*.*`. It then combines the folder path and the extension into a full search pattern.

    3. **File Discovery:** The action uses the `glob.glob` method with the specified
    recursion flag to find all matching file paths.

    4. **Counting and Completion:** It calculates the length of the resulting list
    of files and returns this integer as the final result to the SOAR platform.
