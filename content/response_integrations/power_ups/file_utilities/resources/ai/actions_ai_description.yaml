Add Attachment:
  ai_description: >-
    ### General Description

    The **Add Attachment** action allows users to upload and attach files directly
    to the case wall within Google SecOps. This utility is designed to facilitate
    evidence preservation and documentation by allowing users to provide file content
    in Base64 format, which is then stored as a formal attachment within the context
    of the current case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | The name of the attachment file as it will appear on the
    case wall. |

    | IsFavorite | boolean | No | If set to `true`, the attachment will be marked
    as a favorite or important item in the case wall. Defaults to `false`. |

    | Base64 Blob | string | Yes | The actual content of the file, encoded in Base64
    format. |

    | Type | string | Yes | The file extension or type (e.g., .txt, .pdf, .png). |

    | Description | string | Yes | A descriptive note providing context or details
    about the attachment. |


    ### Flow Description

    1. **Input Retrieval**: The action extracts the file name, Base64-encoded content,
    file type, and description from the user-provided parameters.

    2. **Data Modeling**: It initializes a `CaseWallAttachment` object, associating
    the file data with the current case's unique identifier.

    3. **Internal API Interaction**: The action calls the internal Google SecOps API
    (via `save_attachment_to_case_wall`) to upload the file content and metadata to
    the case wall.

    4. **Response Handling**: It processes the response from the internal API, transforms
    it into a structured JSON result containing attachment metadata (like `evidenceId`
    and `creationTime`), and marks the action as successfully completed.


    ### Additional Notes

    This action is a local utility and does not communicate with external third-party
    services. It strictly modifies internal case data by adding attachments.
  capabilities:
