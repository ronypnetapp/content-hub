Create Hash From Base64:
  ai_description: >-
    ### General Description

    This action converts Base64 encoded strings into cryptographic hashes. It is a
    utility tool used to generate file-like identifiers (MD5, SHA1, SHA256, etc.)
    from encoded data provided as input. This is particularly useful for processing
    file content extracted from emails or other sources where the raw data is available
    in Base64 format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 | Content | Yes | One or more Base64 encoded strings to be hashed, separated
    by the 'Base64 Separator'. |

    | Hash Algorythm | DDL | Yes | The cryptographic hashing algorithm to apply (e.g.,
    md5, sha1, sha256, sha512). |

    | Names | String | No | A list of names (e.g., filenames) corresponding to the
    Base64 strings, separated by the 'Names Separator'. |

    | Names Separator | String | Yes | The character used to split the 'Names' parameter
    (default is ','). |

    | Include Base64 | Boolean | No | If true, the original Base64 string will be
    included in the JSON output. |

    | Base64 Separator | String | Yes | The character used to split the 'Base64' parameter
    (default is ','). |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `Base64` input and splits it into
    a list using the `Base64 Separator`. If the `Names` parameter is provided, it
    is also split using the `Names Separator`.

    2. **Decoding**: Each string in the `Base64` list is decoded from Base64 into
    raw bytes using the Python `base64` library.

    3. **Hashing**: The specified `Hash Algorythm` is dynamically invoked from the
    `hashlib` library and applied to the decoded bytes to generate a hexadecimal digest.

    4. **Result Construction**: A dictionary is created for each item containing the
    generated hash, the algorithm used, and the associated name (if provided). If
    `Include Base64` is set to true, the original encoded string is also included
    in the dictionary.

    5. **Output**: The resulting list of dictionaries is added to the action's JSON
    results and the script result.


    ### Additional Notes

    If the `Names` parameter is provided, it should ideally contain the same number
    of items as the `Base64` parameter to ensure correct one-to-one mapping in the
    output.
