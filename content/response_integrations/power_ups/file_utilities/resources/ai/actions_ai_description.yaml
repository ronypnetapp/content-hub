Save Base64 to File:
  ai_description: >-
    ### General Description

    The **Save Base64 to File** action converts base64-encoded strings into physical
    files and saves them to the local filesystem of the Google SecOps runner (either
    on the main server or a remote agent). This utility is primarily used to stage
    file content received via logs or API responses for subsequent analysis or processing
    steps within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64 Input** | String | Yes | A comma-separated list of base64 encoded strings
    to be converted into files. |

    | **Filename** | String | Yes | A comma-separated list of filenames corresponding
    to the base64 inputs. |

    | **File Extension** | String | No | An optional comma-separated list of file
    extensions (e.g., 'txt', '.png') to append to the filenames. |


    ### Additional Notes

    - This action is a utility and does not interact with SOAR entities or external
    APIs.

    - If the number of provided **File Extensions** is less than the number of **Filenames**,
    the action automatically applies the last extension in the list to all remaining
    files.

    - Filenames are sanitized to remove invalid characters before saving.


    ### Flow Description

    1. **Parameter Parsing**: The action splits the `Base64 Input`, `Filename`, and
    `File Extension` parameters into lists based on comma separators.

    2. **Directory Preparation**: It identifies the target download folder on the
    runner's filesystem and ensures the directory exists.

    3. **Extension Alignment**: If extensions are provided, the action ensures the
    extension list matches the length of the filename list by repeating the last provided
    extension as needed.

    4. **Decoding and Writing**: The action iterates through the inputs, decodes each
    base64 string into binary data, and writes it to the calculated file path on the
    disk.

    5. **Result Compilation**: It generates a JSON result containing the filename,
    full path, and extension for every file successfully created.
