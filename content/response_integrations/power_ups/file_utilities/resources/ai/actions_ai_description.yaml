Get Attachment:
  ai_description: >-
    ### General Description

    This action retrieves file attachments from the Google SecOps case wall or alert
    wall and provides them as Base64-encoded strings. It is primarily used to programmatically
    access files uploaded to a case for further processing in a playbook, such as
    sending them to a sandbox or a malware analysis tool.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attachment Scope | DDL | Yes | Determines the scope of the search. If set to
    'Alert', the action only retrieves attachments associated with the current alert.
    If set to 'Case', it retrieves all attachments associated with the entire case.
    |


    ### Flow Description

    1. **Scope Identification**: The action reads the 'Attachment Scope' parameter
    to decide whether to filter by the specific alert or the whole case.

    2. **Metadata Retrieval**: It fetches the metadata for all items on the case wall
    using the case identifier.

    3. **Filtering**: The action filters the wall items to identify those of type
    'attachment' (type 4). If the scope is 'Alert', it further filters items to match
    the current alert's unique identifier.

    4. **Content Extraction**: For each identified attachment, the action calls the
    internal SOAR API to retrieve the raw binary content.

    5. **Encoding**: The binary content is encoded into a Base64 string.

    6. **Result Compilation**: The action appends the Base64 blob to the attachment
    metadata and returns the complete list as a JSON result.
