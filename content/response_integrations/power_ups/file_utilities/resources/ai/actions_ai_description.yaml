Create Archive:
  ai_description: "### General Description\nThis action creates compressed archive\
    \ files from a specified list of files or a directory located on the Google SecOps\
    \ server. It supports multiple archive formats including ZIP and various TAR configurations.\
    \ The resulting archive is stored in a predefined local directory on the server,\
    \ and the action returns the full path to the created file.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Archive Type | Dropdown | Yes | The compression format to use.\
    \ Supported values: `zip`, `tar` (uncompressed), `gztar` (gzip), `bztar` (bzip2),\
    \ and `xztar` (xz). |\n| Archive Base Name | String | Yes | The name of the archive\
    \ file to be created (do not include the file extension). |\n| Archive Input |\
    \ String | Yes | A comma-separated list of absolute file paths or a single absolute\
    \ directory path to be included in the archive. |\n\n### Additional Notes\n- The\
    \ action operates on the local filesystem of the Google SecOps (Siemplify) server.\
    \ \n- The output directory is hardcoded to `/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`.\
    \ If this directory does not exist, the action attempts to create it.\n- If a\
    \ list of files is provided, the action creates a temporary directory to stage\
    \ the files before archiving.\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ Retrieves the archive type, base name, and input paths from the action configuration.\n\
    2. **Directory Validation**: Checks for the existence of the destination directory\
    \ on the server and creates it if necessary.\n3. **Input Processing**: \n    -\
    \ If the input is a directory, it prepares to archive the directory directly.\n\
    \    - If the input is a list of files, it copies them to a temporary system directory.\n\
    4. **Archive Creation**: Uses the Python `shutil` library to generate the archive\
    \ file in the specified format.\n5. **Cleanup**: If a temporary directory was\
    \ used for individual files, it is deleted after the archive is created.\n6. **Completion**:\
    \ Returns the path of the generated archive and provides a JSON result indicating\
    \ success."
  capabilities:
