Add Entity to File:
  ai_description: >-
    ### General Description

    The **Add Entity to File** action appends the unique identifiers of target entities
    to a local text file stored on the SOAR runner. This utility is primarily used
    for state management, such as tracking which entities have already been processed
    or creating simple local blocklists/allowlists within a playbook's lifecycle.
    It ensures that each entity identifier is only recorded once in the specified
    file.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filename** | String | Yes | The name of the file (e.g., `processed_entities.txt`)
    where the entity identifiers will be stored. Files are stored in the `/tmp/` directory
    of the runner. |


    ### Flow Description

    1. **Initialization**: The action retrieves the `Filename` parameter and constructs
    the full file path in the `/tmp/` directory.

    2. **File Locking**: It utilizes a file-locking mechanism (`EntityFileManager`)
    to ensure thread-safe operations, preventing concurrent actions from corrupting
    the file.

    3. **Deduplication Check**: The action reads the existing contents of the file
    and compares them against the identifiers of the `target_entities` provided in
    the current context.

    4. **Update**: If an entity identifier is not already present in the file, it
    is appended to the list.

    5. **Persistence**: The updated list of identifiers is written back to the file,
    and the file lock is released.

    6. **Result Reporting**: The action provides an output message detailing which
    entities were added and which were already present. If any entity was already
    in the file, the action's result value is set to `False`.


    ### Additional Notes

    - This action operates strictly on the local file system of the execution environment
    and does not interact with external APIs.

    - It does not modify Google SecOps case, alert, or entity metadata.
