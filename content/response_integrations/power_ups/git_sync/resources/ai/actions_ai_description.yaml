Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity and configuration
    of the GitSync integration. It ensures that the Google SecOps environment can
    successfully communicate with both the internal Chronicle SOAR API and the external
    Git repository (via SSH or HTTPS) using the provided credentials and settings.


    ### Parameters Description

    This action does not have any action-specific input parameters. It utilizes the
    global integration configuration parameters, such as the Repository URL, Branch,
    Git Credentials, and SOAR API credentials, to perform its connectivity tests.


    ### Flow Description

    1. **Configuration Loading**: The action retrieves integration-level settings,
    including repository details, authentication tokens, and SSL verification preferences.

    2. **Author Format Validation**: It validates the `Commit Author` string against
    a specific regex pattern (`Name <email@example.com>`) to ensure future commits
    will be valid.

    3. **SOAR API Connectivity Test**: It attempts to connect to the Chronicle SOAR
    API and retrieve the current system version. A failure here indicates incorrect
    SOAR credentials or network issues.

    4. **Git Repository Connectivity Test**: If a `Git Server Fingerprint` is provided,
    the action connects to the remote Git server to verify the SSH host key and attempts
    to fetch the repository's head tree. This verifies both the network path and the
    Git credentials (SSH key or Token).

    5. **Final Status**: If all checks pass, the action completes successfully, confirming
    the integration is ready for use.
