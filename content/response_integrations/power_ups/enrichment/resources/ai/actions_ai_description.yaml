Mark Entity as Suspicious:
  ai_description: >-
    ### General Description

    Marks all entities within the current scope as suspicious. This is an internal
    utility action used to flag entities for further investigation or to trigger specific
    playbooks based on the suspicious status within Google SecOps.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not interact with any external services. It only modifies the
    internal state of entities within Google SecOps. It processes all entities in
    the scope regardless of their type.


    ### Flow Description

    1. **Retrieve Entities**: The action accesses the list of target entities in the
    current scope.

    2. **Flag Entities**: It iterates through every entity and sets its `is_suspicious`
    attribute to `True`.

    3. **Update Platform**: The action sends the updated entity objects back to Google
    SecOps to persist the changes.

    4. **Finalize**: It reports the total number of entities successfully marked as
    suspicious and completes the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
