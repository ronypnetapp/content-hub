Enrich Entity From Event Field:
  ai_description: >-
    ### General Description

    This action extracts specific data fields from the first security event of an
    alert and maps them to the entities within that alert. It is designed to enrich
    entity profiles with contextual information already present in the event logs,
    such as custom metadata or specific identifiers that were not automatically mapped
    during ingestion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields to enrich | String | Yes | A comma-separated list of field names (e.g.,
    'src_port, device_id') to extract from the event's additional properties and add
    to the entities. |


    ### Additional Notes

    - The action performs a case-insensitive search for the specified fields within
    the event's `additional_properties`.

    - Only the first security event (`security_events[0]`) associated with the alert
    is used as the data source.


    ### Flow Description

    1. **Initialization**: Retrieves the comma-separated list of field names from
    the action parameters.

    2. **Data Retrieval**: Accesses the first security event of the current alert
    and converts its additional properties into a case-insensitive dictionary.

    3. **Entity Processing**: Iterates through all target entities in the current
    scope.

    4. **Field Mapping**: For each entity, it checks if the requested fields exist
    in the event data. If found, the field and its value are added to the entity's
    `additional_properties`.

    5. **Update**: Updates all modified entities in Google SecOps and outputs the
    enriched data as a JSON result.
