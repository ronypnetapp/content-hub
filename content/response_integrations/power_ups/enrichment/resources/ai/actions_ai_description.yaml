Enrich FileName Entity with Path:
  ai_description: >-
    ### General Description

    This action parses file path strings from entity identifiers to extract and enrich
    entities with specific file-related metadata, including the directory path, the
    full filename, and the file extension. It is designed to work with both Windows
    and Unix-style path conventions.


    ### Parameters Description

    No parameters are required for this action.


    ### Additional Notes

    This action does not interact with external APIs or services. It performs local
    string manipulation on the entity's identifier to derive its components. If an
    identifier cannot be parsed as a valid path (e.g., it does not contain a directory
    component), the entity will not be enriched.


    ### Flow Description

    1. **Iterate Entities**: The action retrieves all target entities from the current
    context.

    2. **Path Analysis**: For each entity, it examines the identifier to detect the
    path format (Windows vs. Unix).

    3. **Extraction**: It utilizes path-parsing libraries to split the identifier
    into `file_path`, `file_name`, and `file_extension`.

    4. **Internal Mutation**: If parsing is successful, it updates the entity's `additional_properties`
    with the extracted values.

    5. **Update and Report**: It updates the entities within Google SecOps and returns
    a JSON result mapping identifiers to their parsed details.
