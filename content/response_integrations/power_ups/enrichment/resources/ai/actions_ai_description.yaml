Enrich Entities from List with Field:
  ai_description: >-
    ### General Description

    The **Enrich Entities from List with Field** action is designed to bulk-update
    entities within a Google SecOps case by adding a custom field and value to their
    metadata. This action is particularly useful for tagging or labeling a specific
    subset of entities (e.g., marking a list of IP addresses as 'Known Malicious'
    or 'Executive Owned') based on a provided list of identifiers.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List of Entities** | String | Yes | A delimited string containing the identifiers
    of the entities to be enriched (e.g., '192.168.1.1, 192.168.1.2'). |

    | **Entity Type** | String | Yes | The specific type of entities to target (e.g.,
    ADDRESS, HOSTNAME, USERUNIQNAME). Only entities matching this type will be processed.
    |

    | **Entity Delimiter** | String | Yes | The character used to separate the identifiers
    in the 'List of Entities' parameter (e.g., a comma, semicolon, or pipe). |

    | **Enrichment Field** | String | Yes | The name of the property/key to be added
    to the entity's 'additional_properties'. |

    | **Enrichment Value** | String | Yes | The value to be assigned to the specified
    'Enrichment Field'. |


    ### Flow Description

    1. **Initialization:** The action retrieves the input parameters, including the
    list of entities, the target entity type, the delimiter, and the enrichment key-value
    pair.

    2. **Parsing:** The 'List of Entities' string is split into individual identifiers
    using the provided delimiter, and whitespace is trimmed from each entry.

    3. **Entity Retrieval:** The action fetches all entities associated with the alerts
    in the current Google SecOps case.

    4. **Matching Logic:** It iterates through the parsed list of identifiers and
    attempts to find matching entities in the case. A match is confirmed if the entity's
    identifier (case-insensitive) and entity type both align with the input parameters.

    5. **Data Mutation:** For every matched entity, the action updates its `additional_properties`
    dictionary by inserting the 'Enrichment Field' as the key and the 'Enrichment
    Value' as the value.

    6. **Commitment:** The action calls the SDK's `update_entities` method to save
    the changes back to the Google SecOps platform and returns the count of successfully
    enriched entities.


    ### Additional Notes

    This action performs internal data manipulation only and does not interact with
    any external APIs or services. It is strictly used for organizing and enriching
    data already present within the SOAR environment.
