Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps (Chronicle) environment and the integration's execution
    context. It serves as a health check to ensure that the integration is correctly
    configured and reachable within the SOAR platform.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify action module to establish
    a session.

    2. **Connectivity Confirmation**: The action immediately terminates with a success
    status and a message indicating that the connection is active ('Siemplify is connected').


    ### Additional Notes

    This action does not perform any data retrieval from external sources, nor does
    it interact with or modify any entity data or case information. It is strictly
    used for configuration validation.
