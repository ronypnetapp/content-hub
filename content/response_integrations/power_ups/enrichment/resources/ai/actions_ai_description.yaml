Enrich Entity From JSON:
  ai_description: >-
    ### General Description

    The **Enrich Entity From JSON** action is a utility designed to update entity
    attributes within Google SecOps using data provided in a JSON format. It allows
    users to map external data (passed as a parameter) to existing entities by matching
    identifiers. This is particularly useful for manual enrichment or when data is
    retrieved in a previous step of a playbook and needs to be associated with entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Enrichment JSON** | String | Yes | A JSON-formatted list of objects containing
    the enrichment data. |

    | **Identifier KeyPath** | String | Yes | The path within the JSON objects to
    the field that matches the entity's identifier (e.g., `EntityResult.id`). Supports
    multiple paths separated by newlines. |

    | **Separator** | String | Yes | The character used to separate keys in the `Identifier
    KeyPath` (default is `.`). |

    | **PrefixForEnrichment** | String | No | An optional prefix to prepend to the
    keys of the added enrichment data. |

    | **Enrichment JSONPath** | String | No | An optional JSONPath expression to extract
    specific subsets of data from the matching JSON object. |


    ### Additional Notes

    - The action flattens nested JSON structures into a flat key-value format before
    adding them to the entity's `additional_properties`.

    - If multiple key paths are provided in `Identifier KeyPath`, the action will
    check them sequentially.

    - This action does not perform external API calls; it processes data already present
    in the playbook context.


    ### Flow Description

    1. **Data Parsing**: The action parses the `Enrichment JSON` input into a list
    of dictionaries.

    2. **Entity Iteration**: It iterates through all target entities in the current
    context.

    3. **Identifier Matching**: For each entity, it searches the JSON list for a record
    where the value at `Identifier KeyPath` matches the entity's identifier.

    4. **Data Extraction**:
        - If `Enrichment JSONPath` is provided, it extracts the specific data matching
    the path.
        - Otherwise, it uses the entire matching JSON object.
    5. **Flattening and Prefixing**: The extracted data is flattened into a single-level
    dictionary. If a `PrefixForEnrichment` is defined, it is applied to all keys.

    6. **Entity Update**: The entity's `additional_properties` are updated with the
    processed data.

    7. **Finalization**: The action updates the entities in the system and returns
    the count of successfully enriched entities.
