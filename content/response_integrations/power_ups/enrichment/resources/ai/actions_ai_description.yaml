Enrich Entity from Explorer Attributes:
  ai_description: >-
    ### General Description

    Enriches entities within a case by retrieving historical attribute data from the
    Google SecOps Entity Explorer. This action allows analysts to automatically populate
    entity properties with previously discovered information, ensuring consistency
    and providing immediate context without manual lookups.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field Name | string | No | A comma-separated list of specific field names to
    retrieve from the Entity Explorer. If left empty, all available fields (except
    system fields) will be processed. |

    | Use Field Name as Whitelist | boolean | No | Determines how the 'Field Name'
    parameter is applied. If 'true' (default), only the specified fields are added
    to the entity. If 'false', the specified fields are excluded (denylist), and all
    other available fields are added. |


    ### Additional Notes

    - The action automatically filters out internal system fields (e.g., 'IsSuspicious',
    'Environment', 'Type') to prevent accidental overwriting of core platform data.

    - If a field already exists as a standard attribute on the entity object, it is
    updated directly; otherwise, it is added to the entity's 'additional_properties'
    dictionary.


    ### Flow Description

    1. **Initialization**: The action retrieves the configuration parameters, specifically
    the list of fields and the allowlist/denylist toggle.

    2. **Data Retrieval**: For every entity targeted in the current scope, the action
    calls the internal SecOps API to fetch historical data stored in the Entity Explorer.

    3. **Filtering**: The retrieved fields are filtered based on the 'Field Name'
    and 'Use Field Name as Whitelist' logic. System-protected fields are explicitly
    excluded from the update list.

    4. **Entity Update**: The action maps the filtered data to the entity object.
    It attempts to set attributes directly if they exist or appends them to the 'additional_properties'
    metadata.

    5. **Commit**: The updated entity objects are sent back to the Google SecOps platform
    to persist the changes, and a summary of the updated properties is logged.
