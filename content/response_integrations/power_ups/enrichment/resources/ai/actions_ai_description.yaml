Enrich Entity With Field:
  ai_description: >-
    ### General Description

    This action allows users to manually enrich entities within a Google SecOps case
    by adding custom key-value pairs to their 'additional_properties' attribute. It
    is primarily used to inject static data or context into entities that may not
    be available through automated enrichment sources.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields to enrich | string | Yes | A JSON-formatted string representing a list
    of objects. Each object must contain `entity_field_name` (the key) and `entity_field_value`
    (the value) to be added to the entities. Example: `[{"entity_field_name": "Department",
    "entity_field_value": "Finance"}]`. |


    ### Additional Notes

    - This action does not interact with any external APIs; it only processes the
    data provided in the input parameters.

    - The action updates all entities currently in the scope of the action execution.


    ### Flow Description

    1. **Parse Input:** The action retrieves the `Fields to enrich` parameter and
    parses the JSON string into a Python list of dictionaries.

    2. **Iterate Entities:** It iterates through all `target_entities` provided in
    the current context.

    3. **Apply Enrichment:** For each entity, it loops through the list of key-value
    pairs and adds them to the entity's `additional_properties` dictionary.

    4. **Update Internal State:** The action calls the SDK's `update_entities` method
    to persist the changes within Google SecOps.

    5. **Report Results:** It adds a JSON result for each updated entity and concludes
    the execution with a summary message indicating the number of enriched entities.
