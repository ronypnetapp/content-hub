Enrich Source and Destinations:
  ai_description: "### General Description\nThis action enriches entities within a\
    \ Google SecOps alert by identifying their roles as network sources or destinations.\
    \ It retrieves contextual data from the Chronicle Investigator API to determine\
    \ which identifiers are associated with source and destination activities and\
    \ then updates the corresponding entities in the SOAR with specific flags.\n\n\
    ### Parameters\nThere are no user-configurable parameters for this action. It\
    \ automatically processes entities based on the context of the current alert.\n\
    \n### Additional Notes\n- This action specifically targets entities associated\
    \ with the current alert being processed.\n- It relies on the `get_investigator_data`\
    \ method to fetch the underlying security event details from Google SecOps.\n\
    - The enrichment is internal to the SOAR, adding `isSource` or `isDest` attributes\
    \ to the entity's additional properties.\n\n### Flow Description\n1. **Fetch Alert\
    \ Context**: The action calls the Chronicle Investigator API to retrieve the full\
    \ JSON representation of the current alert.\n2. **Identify Roles**: It parses\
    \ the alert data (specifically looking at `securityEventCards` or field groups)\
    \ to extract lists of identifiers categorized as 'sources' and 'destinations'.\n\
    3. **Match Entities**: The action iterates through all entities associated with\
    \ the current alert.\n4. **Apply Enrichment**: \n    - If an entity's identifier\
    \ matches a 'source' from the API data, the property `isSource: true` is added\
    \ to the entity.\n    - If an entity's identifier matches a 'destination' from\
    \ the API data, the property `isDest: true` is added to the entity.\n5. **Update\
    \ SOAR**: The modified entities are updated within the Google SecOps platform\
    \ to reflect these new attributes."
