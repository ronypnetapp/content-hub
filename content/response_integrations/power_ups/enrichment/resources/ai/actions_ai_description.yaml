Whois:
  ai_description: >-
    ### General Description

    The **Whois** action queries WHOIS and RDAP servers to retrieve registration and
    ownership information for various entity types, including IP Addresses, Domains,
    URLs, and Email addresses. It provides critical context regarding domain age,
    registrar details, and geographic location for IP addresses to assist in threat
    analysis.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Entities | boolean | No | If set to `true`, the action extracts the root
    domain from URLs or Email addresses and creates a new, linked DOMAIN entity within
    the case. Default is `true`. |

    | Domain Age Threshold | string | No | A threshold in days. If a domain's age
    is less than this value, the entity is marked as suspicious. A value of 0 or empty
    disables this check. |


    ### Flow Description

    1. **Entity Identification**: The action iterates through all target entities
    in the current context.

    2. **IP Enrichment**: For `ADDRESS` entities, it performs an RDAP lookup and a
    geographic lookup (via DB-IP) to identify the owner, ASN, and physical location.

    3. **Domain/URL/Email Processing**: For other entities, it extracts the registered
    domain using the `tldextract` library.

    4. **WHOIS Query**: It performs a WHOIS lookup for the extracted domain to retrieve
    creation dates, expiration dates, and registrar information.

    5. **Entity Creation**: If the `Create Entities` parameter is enabled and a new
    domain is identified (e.g., extracted from a URL or Email), a new `DOMAIN` entity
    is created and linked to the source entity.

    6. **Risk Assessment**: The action calculates the domain age in days. If the age
    is below the user-defined `Domain Age Threshold`, the entity's `is_suspicious`
    attribute is set to `true`.

    7. **Data Update**: All retrieved information is flattened and added to the entities'
    additional properties with a `WHOIS` prefix. The entities are then marked as enriched
    and updated in the system.


    ### Additional Notes

    - This action requires outbound network access to WHOIS/RDAP servers and the DB-IP
    API.

    - The `Domain Age Threshold` parameter is processed as an integer; ensure numeric
    values are provided.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates new DOMAIN entities and establishes relationships between
      them and the original entities. It also updates existing entities by setting
      'is_suspicious' based on domain age, marking them as 'is_enriched', and adding
      WHOIS/Geo-location data to their additional properties.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - DOMAIN
    - DestinationURL
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
