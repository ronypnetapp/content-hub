Render Template:
  ai_description: >-
    ### General Description

    This action renders a Jinja2 template using a provided JSON object as the data
    source. It is designed to transform raw data into formatted strings or HTML, which
    can then be used in subsequent playbook steps, such as sending emails or creating
    reports. The action supports custom Jinja filters for advanced data manipulation,
    including JSON-to-HTML table conversion, regex operations, and date formatting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON Object** | JSON Object | No | The raw JSON object or list that will be
    used as the context for the Jinja template. This data is accessible via the `input_json`
    variable within the template. Defaults to `{}`. |

    | **Jinja** | Code | No | The Jinja2 template code to be rendered. If provided,
    this value takes precedence over the 'Template' parameter. |

    | **Include Case Data** | Boolean | No | If enabled, the action injects current
    alert events and target entities into the template context under `input_json['SiemplifyEvents']`
    and `input_json['SiemplifyEntities']`. |

    | **Template** | Email Content | No | A pre-defined Jinja2 template (e.g., from
    Environment Settings). This is used only if the 'Jinja' parameter is empty. |


    ### Additional Notes

    - Either the **Jinja** or **Template** parameter should be configured for the
    action to produce meaningful output.

    - The action includes a robust set of built-in filters such as `json2tbl` (converts
    JSON to HTML tables), `regex_match`, `filter_datetime`, and `to_nice_json`.

    - If the **JSON Object** is a list, the action will iterate through the list and
    append the rendered output for each item into a single result string.


    ### Flow Description

    1. **Initialization**: The action extracts the input parameters and parses the
    provided **JSON Object**.

    2. **Context Preparation**: If **Include Case Data** is true, the action retrieves
    security events (additional properties) and target entities from the current SecOps
    alert context and merges them into the input data.

    3. **Environment Setup**: A Jinja2 environment is initialized with auto-escaping
    enabled. It loads standard filters from `JinjaFilters.py` and attempts to load
    any user-defined filters from `CustomFilters.py`.

    4. **Template Selection**: The action determines which template to use, prioritizing
    the raw **Jinja** code block over the **Template** selection.

    5. **Rendering**: The template is rendered using the prepared JSON context. If
    the input is a list, it renders the template for each element and concatenates
    the results.

    6. **Output**: The final rendered string is saved to the action's JSON result
    under the key `html_output` and returned as the main result value.
