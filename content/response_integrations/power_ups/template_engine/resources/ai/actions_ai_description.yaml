Render Template from Array:
  ai_description: >-
    ### General Description

    The **Render Template from Array** action is a utility designed to process a list
    of data objects and transform them into a formatted string using the Jinja2 templating
    engine. It is particularly useful for generating HTML reports, summaries, or formatted
    logs from arrays of data produced by previous playbook steps. The action iterates
    through each item in a provided JSON array, applies a user-defined Jinja template
    to that item, and then joins the resulting strings together with a specified separator.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Array input** | Content | No | A JSON-formatted string representing an array
    of objects. If a single object is provided, it will be treated as a single-item
    array. Default is `[]`. |

    | **Jinja** | Code | No | The Jinja2 template code used to render each item in
    the array. Within the template, the current item is accessible via the `row` variable
    or directly by its keys. Default is a simple template showing `row.name`. |

    | **join** | String | No | The character or string used to join the rendered output
    of each array item (e.g., a comma, a newline, or an HTML break tag). Default is
    a comma. |

    | **prefix** | String | No | A string to be prepended to the final aggregated
    output. |

    | **suffix** | String | No | A string to be appended to the final aggregated output.
    |


    ### Additional Notes

    - The action includes a robust set of custom Jinja filters (e.g., `json2tbl`,
    `regex_match`, `filter_datetime`, `epochTimeToHuman`) to assist in complex data
    formatting.

    - If the `Array input` is not a valid JSON list, the action attempts to treat
    it as a single JSON object and wraps it in a list automatically.

    - The output is provided both as a simple result value and as a JSON object containing
    `html_output`.


    ### Flow Description

    1. **Initialization**: The action extracts the input parameters, including the
    JSON array, the Jinja template, and formatting options (join, prefix, suffix).

    2. **JSON Parsing**: The `Array input` string is parsed into a Python list. If
    parsing fails, the action terminates with an error.

    3. **Environment Setup**: A Jinja2 environment is initialized, and a comprehensive
    suite of custom filters (for regex, date parsing, and HTML table conversion) is
    loaded into the environment.

    4. **Template Rendering**: The action loops through each element in the input
    list. For each element, it renders the provided Jinja template, passing the element
    as the context.

    5. **Aggregation**: All rendered strings are joined using the `join` parameter.
    The `prefix` and `suffix` are then added to the start and end of the resulting
    string.

    6. **Completion**: The final formatted string is returned as the action result
    and stored in the `html_output` JSON field.
