Entity Insight:
  ai_description: >-
    ### General Description

    This action transforms a provided JSON object into human-readable entity insights
    using a Jinja2 template. It is designed to take raw data (typically from a previous
    integration action) and format it into a structured, analyst-friendly layout within
    the Google SecOps case. It supports a wide range of custom Jinja filters for data
    manipulation, such as date formatting, regex operations, and converting JSON to
    HTML tables.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON Object** | content | Yes | The raw JSON object containing the data to
    be rendered. It must contain a list of entries where each entry specifies an 'Entity'
    and its 'EntityResult'. |

    | **Template** | email_content | Yes | The Jinja2 template used to format the
    data. This can be a simple string or a complex HTML template. |

    | **Triggered By** | string | Yes | The name of the integration or process that
    triggered the insight, which will be displayed in the insight header. |

    | **Remove BRs** | boolean | No | If set to `true`, the action will strip all
    `<br>` tags from the rendered template output. Default is `false`. |

    | **Create Insight** | boolean | No | If set to `true`, the action will generate
    an Entity Insight in the SOAR platform. Default is `true`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input JSON, the Jinja2 template,
    and configuration flags (Remove BRs, Create Insight).

    2. **Environment Setup**: It initializes a Jinja2 environment and loads a comprehensive
    set of filters from `JinjaFilters` and `CustomFilters` (if available).

    3. **Entity Processing**: It iterates through the target entities in the current
    context, excluding any entities that are internally flagged as 'ALERT' types via
    their additional properties.

    4. **Data Matching**: For each valid entity, the action searches the input JSON
    for a matching 'Entity' identifier.

    5. **Template Rendering**: If a match is found, the action combines the entity's
    properties with the result data and renders the Jinja2 template.

    6. **Result Attachment**: The rendered output is attached to the entity as a JSON
    result. If 'Create Insight' is enabled, it also creates a formal Entity Insight.


    ### Additional Notes

    - **Mandatory Discrepancy**: While the integration metadata (YAML) lists the 'Template'
    parameter as optional, the underlying Python code treats it as mandatory (`is_mandatory=True`).
    Users should ensure a template is provided to avoid execution errors.

    - **Entity Result Format**: The input JSON is expected to be a list of dictionaries,
    each containing an 'Entity' key (matching the entity identifier) and an 'EntityResult'
    key (containing the data to render).
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights and attaches JSON results to entities within the Google
      SecOps case.
