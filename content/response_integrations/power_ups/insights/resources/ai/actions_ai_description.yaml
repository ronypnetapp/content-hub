Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Insights integration. It serves as a basic health
    check to ensure that the integration environment is correctly configured and that
    the action runner can execute scripts within the context of the integration.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not interact with any external APIs or internal data structures.
    It is strictly used for connectivity testing.


    ### Flow Description

    1. **Initialization**: The action initializes the `SiemplifyAction` module to
    establish the execution context.

    2. **Connectivity Check**: The script executes a simple termination command without
    performing any external network requests.

    3. **Completion**: The action concludes by returning a success message ('Siemplify
    is connected') to the Google SecOps workbench, indicating that the integration
    is functional.
