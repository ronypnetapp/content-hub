Create Entity Insight From Enrichment:
  ai_description: >-
    ### General Description

    This action generates entity insights within Google SecOps by populating a template
    message with data retrieved from an entity's enrichment fields (`additional_properties`).
    It is primarily used to surface specific details from previous enrichment steps
    (such as Active Directory attributes or Threat Intelligence scores) directly onto
    the entity's insight panel for better visibility during investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message | string | Yes | A template string containing placeholders in curly
    braces (e.g., `{AD_DisplayName}`). These placeholders must match keys found in
    the entity's `additional_properties` dictionary. |

    | Triggered By | string | No | The name of the integration or source to be displayed
    as the creator of the insight. Defaults to "Siemplify". |


    ### Flow Description

    1. **Parameter Retrieval**: The action retrieves the template `Message` and the
    `Triggered By` source name from the action configuration.

    2. **Entity Iteration**: The script iterates through all target entities in the
    current scope.

    3. **Template Parsing**: For each entity, the `parse_raw_message` utility is called.
    This utility maps the placeholders defined in the `Message` parameter to the corresponding
    values stored in the entity's `additional_properties` attribute.

    4. **Insight Creation**: If the message is successfully populated with data, the
    action creates an entity insight using the `add_entity_insight` method, attributing
    it to the specified trigger source.

    5. **Final Reporting**: The action completes by providing a summary of all entities
    that successfully received an insight.


    ### Additional Notes

    - This action is dependent on data being present in the `additional_properties`
    of the entity. This typically requires a preceding enrichment action (e.g., "Active
    Directory Get User Details") to have run in the playbook.

    - If the template parsing results in a valid message, the insight is added; otherwise,
    the entity is skipped.
