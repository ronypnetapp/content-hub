"Create Entity Insight From Multiple JSONs":
  ai_description: >-
    ### General Description

    This action creates formatted Entity Insights within Google SecOps by parsing
    multiple JSON strings provided as input. It is primarily used to transform raw
    JSON data (often retrieved from previous enrichment steps in a playbook) into
    human-readable tables or lists associated with specific entities in the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON1 - JSON5 | String | No | JSON strings containing lists of objects. Each
    object must include an "Entity" key (matching the entity identifier) and an "EntityResult"
    key (containing the data to parse). |

    | Fields1 - Fields5 | String | No | Extraction logic for the corresponding JSON.
    Format: `Label:path.to.key`. Multiple entries are separated by the 'Placeholder
    Separator'. Supports advanced pipes like `count()`, `to_str()`, and `join()`.
    |

    | Title1 - Title5 | String | No | The title used for the insight section created
    from the corresponding JSON/Fields pair. Note: A title must be provided for a
    JSON/Fields set to be processed. |

    | Placeholder Separator | String | No | The character used to separate multiple
    field definitions in the 'Fields' parameters. Default is a comma (`,`). |


    ### Additional Notes

    - The action expects the input JSON to be a list of dictionaries.

    - Each dictionary must have an "Entity" key that matches the identifier of an
    entity in the current scope.

    - The "EntityResult" key should contain the actual data structure you wish to
    extract values from.

    - If a field definition does not contain a colon (`:`), the value is added as
    a plain string rather than a table row.


    ### Flow Description

    1. **Initialization**: The action reads up to five sets of JSON data, field mappings,
    and titles from the parameters.

    2. **Field Parsing**: It splits the 'Fields' strings into individual mapping instructions
    based on the 'Placeholder Separator'.

    3. **Entity Iteration**: The script loops through every entity currently active
    in the playbook scope.

    4. **Data Matching**: For each entity, it searches the provided JSON arrays for
    an entry where the "Entity" field matches the entity's identifier.

    5. **Extraction**: If a match is found, it uses the 'Fields' logic to extract
    specific values from the "EntityResult" object, supporting nested paths and transformation
    pipes (e.g., counting list items or joining arrays).

    6. **Formatting**: Extracted data is formatted into HTML tables (for labeled fields)
    or text blocks.

    7. **Insight Creation**: The action calls the SOAR API to attach the formatted
    message as an Insight to the entity, using the provided 'Title' as the trigger
    source.
