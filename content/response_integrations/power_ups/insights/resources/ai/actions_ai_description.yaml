Create Entity Insight From JSON:
  ai_description: >-
    ### General Description

    The **Create Entity Insight From JSON** action allows users to generate custom
    entity insights within Google SecOps by processing a provided JSON string. This
    utility action is designed to map data from a JSON object (often produced by a
    previous playbook step) to specific entities in a case, formatting that data into
    a readable insight message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON** | String | Yes | The raw JSON string containing the data to be used
    for the insight. |

    | **Identifier KeyPath** | String | Yes | The dot-notation path (e.g., `user.email`
    or `id`) within the JSON object that corresponds to the entity's identifier for
    matching. |

    | **Message** | String | Yes | A template for the insight message. Use curly braces
    `{}` to reference keys in the JSON (e.g., `{status}`). Supports pipes for transformations
    like `| count()`, `| to_str()`, or `| join()`. |

    | **Triggered By** | String | No | Specifies the integration name to be associated
    with the insight. Defaults to 'Siemplify'. |


    ### Flow Description

    1. **JSON Parsing**: The action parses the input `JSON` parameter into a structured
    object.

    2. **Entity Matching**: The action iterates through all entities in the current
    Google SecOps case. For each entity, it searches the provided JSON data for a
    record where the value at the specified `Identifier KeyPath` matches the entity's
    identifier (case-insensitive).

    3. **Message Templating**: If a match is found, the action extracts the relevant
    data from the JSON and populates the `Message` template. It resolves placeholders
    and applies any specified pipe functions (e.g., `count` to get list length, `join`
    to concatenate arrays).

    4. **Insight Creation**: The final formatted message is added as an entity insight
    to the matching entity in the case, attributed to the integration specified in
    `Triggered By`.


    ### Additional Notes

    - The `Identifier KeyPath` supports nested objects using dot notation (e.g., `data.user.id`).

    - The `Message` parameter supports advanced formatting via the `ToolsCommon` library,
    allowing for default values and complex data transformations within the insight
    text.
