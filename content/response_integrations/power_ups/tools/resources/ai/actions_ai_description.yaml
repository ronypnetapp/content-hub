Search Text:
  ai_description: >-
    ### General Description

    Searches for a specific string or a list of regular expressions within a provided
    text block. This utility action is used to validate the presence of specific patterns
    or keywords in data extracted from previous playbook steps or alert fields. It
    returns a boolean result indicating whether a match was found and provides detailed
    match information in JSON format.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Text | String | Yes | The source text that will be searched. |

    | Search For | String | No | The specific string to search for within the Text.
    |

    | Search For Regex | String | No | A comma-separated list of regular expressions
    to search for. Regexes should be wrapped in double quotes. |

    | Case Sensitive | Boolean | No | If true, the search will be case-sensitive.
    Default is false. |


    ### Additional Notes

    * At least one of the parameters **Search For** or **Search For Regex** must be
    provided for the action to execute successfully. If both are empty, the action
    will fail.

    * The action supports multiline searching for regex patterns.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the input text, search string, regex list,
    and case sensitivity setting from the action parameters.

    2. **Validation**: Checks if at least one search method (string or regex) is defined.
    If both are missing, the action status is set to failed.

    3. **String Search**: If the **Search For** parameter is provided, the action
    performs a substring check on the input text, respecting the case sensitivity
    flag. If a match is found, the result is set to true.

    4. **Regex Search**: If the **Search For Regex** parameter is provided, the action
    splits the input into a list of patterns, strips quotes, and iterates through
    them. It attempts to find a match using Python's regex engine with multiline support.
    If any pattern matches, the result is set to true.

    5. **Result Aggregation**: The action adds a JSON object containing the list of
    successful matches to the execution results and terminates with the final match
    status.
