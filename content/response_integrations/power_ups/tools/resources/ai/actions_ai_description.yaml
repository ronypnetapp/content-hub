Get Case Data:
  ai_description: >-
    ### General Description

    The **Get Case Data** action retrieves comprehensive information for a specific
    case within Google SecOps and returns it as a structured JSON object. This data
    includes comments, entity information, insights, playbooks, alert details, and
    events. It is primarily used as a utility to gather context for playbook logic
    or to export case details to external systems.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Case Id** | String | No | The unique identifier of the case to query. If left
    empty, the action defaults to the current case ID where the playbook is executing.
    |

    | **Fields to Return** | String | No | A comma-separated list of specific JSON
    fields to include in the output. If omitted, the entire case data object is returned.
    Supports nested paths (e.g., `alerts.0.events`) using the specified delimiter.
    |

    | **Nested Keys Delimiter** | String | No | The character used to separate levels
    in nested field paths within the 'Fields to Return' parameter. Defaults to a dot
    (`.`). This cannot be a comma (`,`). |


    ### Flow Description

    1. **Initialization:** The action extracts the Case ID, requested fields, and
    the nested key delimiter from the input parameters.

    2. **Validation:** It verifies that the 'Nested Keys Delimiter' is not a comma
    to avoid conflicts with the field list parsing.

    3. **Case Data Retrieval:** The action calls the internal SOAR API to fetch the
    full overview of the case, including metadata and alert cards.

    4. **Data Transformation:** The retrieved data is converted to JSON, and the `alertCards`
    field is renamed to `alerts` for consistency.

    5. **Filtering:** If specific fields were requested, the action traverses the
    JSON structure and extracts only the relevant data points.

    6. **Insight Enrichment:** The action identifies all insights associated with
    the case. For insights that reference external data blobs, it performs additional
    internal API calls to retrieve, Base64-decode, and parse the content into the
    final JSON structure.

    7. **Final Output:** The aggregated data is returned as a JSON result for use
    in subsequent playbook steps.


    ### Additional Notes

    - This action is strictly read-only; it does not modify any data within Google
    SecOps or external systems.

    - If 'Fields to Return' is provided but none of the specified fields exist in
    the case data, the action will result in a failure.
