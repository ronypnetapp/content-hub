Lock Playbook:
  ai_description: "Pauses the execution of the current playbook until all playbooks\
    \ associated with the chronologically preceding alert in the same case have finished.\
    \ This action is used to enforce sequential processing of alerts within a single\
    \ case, ensuring that automation logic for one alert does not overlap with or\
    \ precede the completion of a previous alert's logic.\n\n### Parameters\n| Parameter\
    \ Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| None\
    \ | N/A | N/A | This action does not take any input parameters. |\n\n### Additional\
    \ Notes\n- This action is asynchronous (`is_async: true`), allowing it to remain\
    \ in an 'In Progress' state until the dependency is met.\n- It relies on the `creation_time`\
    \ of alerts within a case to determine the execution order.\n\n### Flow Description\n\
    1. **Alert Retrieval:** Fetches all alerts associated with the current case and\
    \ sorts them by their creation timestamp.\n2. **Position Identification:** Determines\
    \ the index of the current alert within the sorted list.\n3. **First Alert Check:**\
    \ If the current alert is the first one in the case (index 0), the action completes\
    \ immediately to allow the playbook to proceed.\n4. **Dependency Check:** If the\
    \ current alert is not the first, the action identifies the immediately preceding\
    \ alert and queries the SOAR API for the status of its workflow instances.\n5.\
    \ **State Management:** \n    - If any playbooks for the previous alert are still\
    \ running (not in a 'Completed' state), the action returns an 'In Progress' status,\
    \ effectively locking the current playbook.\n    - Once all playbooks for the\
    \ previous alert are confirmed as 'Completed', the action returns a 'Completed'\
    \ status, releasing the lock and allowing the current playbook to continue."
