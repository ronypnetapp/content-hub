Buffer:
  ai_description: >-
    ### General Description\n\nThe **Buffer** action is a utility tool within the
    Tools integration designed to facilitate data handling and flow control within
    playbooks. Its primary purpose is to receive a JSON string and a result value
    as inputs and 'buffer' them into the action's output. This is particularly useful
    for converting string-based JSON data into a structured format that subsequent
    playbook actions can easily consume, or for explicitly setting the result value
    of a step to control playbook logic flow.\n\n### Parameters Description\n\n| Parameter
    | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **JSON**
    | String | No | A JSON-formatted string. If provided, the action attempts to parse
    this string and include the resulting object in the action's JSON results. |\n|
    **ResultValue** | String | No | A string value that will be returned as the primary
    result of the action. This is often used for conditional branching in playbooks.
    |\n\n### Flow Description\n\n1. **Parameter Retrieval:** The action starts by
    retrieving the `JSON` and `ResultValue` inputs from the playbook context.\n2.
    **JSON Parsing:** If the `JSON` parameter is populated, the script attempts to
    deserialize the string into a structured JSON object using `json.loads()`.\n3.
    **Result Attachment:** \n    * If parsing is successful, the structured data is
    added to the action's result JSON using `add_result_json` and `add_json` (under
    the key 'Json').\n    * If parsing fails, an error message is appended to the
    final output message.\n4. **Action Completion:** The action concludes by calling
    `siemplify.end()` with a status message and the provided `ResultValue`.\n\n###
    Additional Notes\n\n* This action does not interact with any external APIs or
    modify any SecOps entities.\n* It serves strictly as a data transformation and
    flow control utility.
