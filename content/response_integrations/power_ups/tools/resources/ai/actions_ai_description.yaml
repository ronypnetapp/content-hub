Attach Playbook to Alert:
  ai_description: >-
    ### General Description

    This action attaches one or more playbooks (or blocks) to a specific alert within
    Google SecOps. It is primarily used to dynamically trigger additional automated
    workflows based on the logic or findings of a parent playbook. The action can
    handle multiple playbook names provided as a comma-separated list and includes
    logic to prevent or allow duplicate attachments.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Playbook Name | String | Yes | A comma-separated list of the names of the playbooks
    or blocks that should be attached to the alert. |

    | Allow Duplicates | Boolean | No | If set to `true` (default), the action will
    attach the playbook even if it is already attached to the alert. If `false`, it
    will skip playbooks that are already present. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the list of playbook names and
    the duplicate attachment policy from the input parameters.

    2. **Fetch Existing Workflows**: It identifies the current alert and calls the
    internal API to retrieve a list of playbooks already attached to that specific
    alert.

    3. **Validation and Filtering**: The action iterates through the requested playbook
    names. If `Allow Duplicates` is disabled, it checks the requested names against
    the list of already attached playbooks.

    4. **Attachment**: For each valid playbook name, it invokes the `attach_workflow_to_case`
    method to link the playbook to the alert context.

    5. **Reporting**: The action compiles a summary message indicating which playbooks
    were successfully attached, which were skipped as duplicates, and which failed
    (e.g., due to spelling errors).
  capabilities:
