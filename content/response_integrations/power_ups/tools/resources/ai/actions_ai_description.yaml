Unflatten JSON:
  ai_description: >-
    ### General Description

    Unflattens a flattened JSON object or a list of flattened JSON objects into a
    nested structure. This action is particularly useful for transforming data from
    systems that provide flat key-value pairs (e.g., `user_id`, `user_name`) into
    a hierarchical JSON format required by other integrations or playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON Object** | String | Yes | The JSON string (object or list) that needs
    to be unflattened. |

    | **Delimiter** | String | No | The character used to separate keys for nesting
    (e.g., `_` or `.`). If left empty, the action will split keys by any non-alphanumeric
    character (excluding underscores) using a word-boundary regex. |


    ### Additional Notes

    - If the input JSON is a list, the action will iterate through and unflatten each
    item in the list.

    - If a key token is a digit, the action will attempt to create a list at that
    level of the hierarchy.


    ### Flow Description

    1. **Initialization**: The action retrieves the input JSON string and the optional
    delimiter from the parameters.

    2. **Parsing**: The input string is parsed into a Python dictionary or list using
    the standard JSON library.

    3. **Unflattening Logic**: The action iterates through the keys of the object.
    For each key, it splits the string into tokens based on the provided delimiter
    or regex.

    4. **Structure Reconstruction**: It recursively builds a nested dictionary or
    list structure by traversing the tokens. If a token represents an index (digit),
    it initializes a list; otherwise, it initializes a dictionary.

    5. **Output**: The final nested JSON structure is returned as the action's JSON
    result.
