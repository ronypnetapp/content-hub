Add Or Update Alert Additional Data:
  ai_description: "### General Description\nThis action allows for the dynamic addition\
    \ or updating of information within the 'Additional Data' field of a Google SecOps\
    \ alert. It is designed to act as a temporary or persistent storage mechanism\
    \ for data collected during a playbook's execution, enabling subsequent actions\
    \ to access this accumulated context. The action supports structured JSON (dictionaries\
    \ and lists) as well as plain text.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Json Fields\
    \ | string | Yes | The data to be added to the alert. This can be a raw string,\
    \ a JSON-formatted dictionary, or a JSON-formatted list. If a dictionary is provided,\
    \ it is merged into the existing 'dict' key. If a list is provided, it is appended\
    \ to the 'list' key. Any other input is stored in the 'data' key. |\n\n### Additional\
    \ Notes\n- The action automatically initializes a structured schema within the\
    \ alert's additional data if it doesn't exist, containing 'dict', 'list', and\
    \ 'data' keys.\n- If the input string is not valid JSON, it will be treated as\
    \ a standard string and stored in the 'data' field.\n\n### Flow Description\n\
    1. **Input Parsing**: The action retrieves the 'Json Fields' parameter and attempts\
    \ to parse it as a JSON object (dictionary or list). If parsing fails, it treats\
    \ the input as a raw string.\n2. **Data Retrieval**: It fetches the current alert's\
    \ existing 'additional_data' content.\n3. **Structure Normalization**: If the\
    \ existing data is empty or lacks the standard keys ('dict', 'list', 'data'),\
    \ the action initializes them to ensure a consistent data structure.\n4. **Data\
    \ Merging**: \n    - If the input is a **List**, it extends the existing list\
    \ in the alert data.\n    - If the input is a **Dictionary**, it updates the existing\
    \ dictionary in the alert data with the new key-value pairs.\n    - If the input\
    \ is a **String**, it overwrites the 'data' field with the new value.\n5. **Internal\
    \ Update**: The action calls the Google SecOps API to update the alert's metadata\
    \ with the newly merged JSON structure.\n6. **Output**: The final accumulated\
    \ data is returned as a JSON result for use in the playbook."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the 'additional_data' field of the current alert within Google SecOps
      to store or update contextual information.
