    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      The action updates alert context properties (ALERT_SCORE_INFO, ALERT_SCORE,
      and ALERT_SEVERITY) to store and aggregate risk scoring data within the alert.
