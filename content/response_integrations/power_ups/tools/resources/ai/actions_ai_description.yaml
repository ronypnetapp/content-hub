Update Alert Score:
  ai_description: >-
    ### General Description

    The **Update Alert Score** action is a utility designed to dynamically modify
    the numerical score associated with an alert in Google SecOps. This is typically
    used within playbooks to adjust the priority or risk level of an alert based on
    logic-driven findings (e.g., increasing the score if a file is found to be malicious
    or decreasing it if an IP is internal).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Input** | String | Yes | The integer value to increment or decrement the alert
    score by. For example, '10' increases the score, while '-5' decreases it. |


    ### Additional Notes

    - The action interacts with the internal alert context property `ALERT_SCORE`.

    - If no current score exists, the action defaults the starting score to 0.

    - The input must be a string representation of an integer.


    ### Flow Description

    1. **Extract Input:** The action retrieves the `Input` value provided by the user
    or playbook.

    2. **Retrieve Current Score:** It fetches the current value of the `ALERT_SCORE`
    property from the alert's context.

    3. **Calculate New Score:** It converts both the current score and the input value
    to integers and calculates the sum.

    4. **Update Context:** The action saves the newly calculated score back to the
    alert's `ALERT_SCORE` context property.

    5. **Finalize:** The action completes, returning the new score as the result value
    and displaying a success message.
