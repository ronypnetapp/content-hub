Add Comment to Entity Log:
  ai_description: >-
    ### General Description

    The **Add Comment to Entity Log** action allows users to programmatically add
    comments to the internal logs of specific entities within Google SecOps. This
    is useful for auditing, providing context for future investigations, or documenting
    automated findings directly on the entity's record in the Entity Explorer.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User** | User | Yes | The username or identifier of the person or system account
    that will be credited as the author of the comment. Defaults to `@Administrator`.
    |

    | **Comment** | Content | Yes | The actual text content that will be appended
    to the entity's log. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `User` and `Comment` values
    from the input configuration.

    2. **Entity Iteration**: The script iterates through all entities currently in
    the action's scope (`target_entities`).

    3. **Internal API Call**: For each entity, it invokes the `add_comment_to_entity`
    helper function, which sends a request to the Google SecOps internal API to attach
    the comment to the entity's log in the specified environment.

    4. **Result Reporting**: The action compiles a summary message detailing which
    entities received the comment and completes the execution.


    ### Additional Notes

    This action does not modify the entity's attributes (like reputation or tags)
    but rather adds a historical log entry visible in the Entity Explorer.
