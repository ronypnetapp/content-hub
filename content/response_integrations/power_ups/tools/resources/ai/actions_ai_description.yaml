    ### General Description

    The **Attach Playbook to All Case Alerts** action is designed to programmatically
    assign a specific playbook to every alert associated with a case in Google SecOps.
    This is particularly useful for ensuring that all alerts within a single investigation
    follow a consistent automated response or investigation workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Playbook Name** | String | Yes | The exact name of the playbook that should
    be attached to all alerts in the current case. |


    ### Flow Description

    1. **Input Retrieval**: The action retrieves the `Playbook Name` from the user-defined
    parameters.

    2. **Alert Iteration**: The script accesses the current case object and iterates
    through every alert linked to that case.

    3. **Workflow Attachment**: For each alert, the action calls the internal SOAR
    API (`attach_workflow_to_case`) to link the specified playbook to the alert's
    unique identifier.

    4. **Status Reporting**: The action evaluates the success of the attachment process
    and returns a final message to the case wall indicating whether the playbook was
    successfully attached to the alerts.
