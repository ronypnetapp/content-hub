Create Siemplify Task:
  ai_description: >-
    This action creates and assigns a new task to a specific user or role within the
    context of the current Google SecOps case. It is used to manage manual workflows
    or follow-up actions by setting clear instructions and deadlines.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Assign To | User | Yes | The user or role the task will be assigned to. |

    | Task Content | Content | Yes | The detailed instructions or content of the task.
    |

    | SLA (in minutes) | String | No | The amount of time (in minutes) the assigned
    user/role has to respond. Default is 480. |

    | Task Title | String | No | The title of the task (Supported in versions 6.0.0.0
    and higher). |

    | Due Date | String | No | Specific deadline for the task in ISO8601 format. If
    provided, this takes priority over the SLA parameter. |


    ### Additional Notes

    - Either the "Due Date" or the "SLA (in minutes)" parameter must be configured
    for the action to execute successfully.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the assignee, task content,
    title, and deadline parameters (SLA or Due Date).

    2. **Validation:** It verifies that at least one deadline mechanism (SLA or Due
    Date) is provided.

    3. **Deadline Calculation:** The action calculates the task's expiration time
    in epoch milliseconds. If a Due Date is provided, it parses the ISO8601 string;
    otherwise, it adds the SLA minutes to the current system time.

    4. **Version Compatibility Check:** The script checks the Google SecOps system
    version to determine whether to use the v5 or v6 API for task creation.

    5. **Task Creation:** The action calls the internal SOAR API to create the task
    and link it to the current case ID.
