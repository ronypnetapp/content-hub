Convert Into Simulated Case:
  ai_description: "### General Description\nConverts alert data into a format suitable\
    \ for the Google SecOps Case Simulator. This action extracts raw event data from\
    \ an entity's additional properties, transforms it into a standardized case JSON\
    \ structure, and provides options to either push the case directly to the simulator\
    \ or save it as a file attachment on the case wall for manual import.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Push to Simulated Cases | boolean | No | If set to `true`,\
    \ the action will automatically import the generated case JSON into the Google\
    \ SecOps Simulator via the SOAR API. |\n| Save JSON as Case Wall File | boolean\
    \ | No | If set to `true`, the action will attach the generated JSON as a `.case`\
    \ file to the case wall for manual download. |\n| Override Alert Name | string\
    \ | No | Allows the user to specify a custom name for the simulated case, overriding\
    \ the default name derived from the source data. |\n| Full path name | boolean\
    \ | No | If set to `true`, the action constructs the case name using the format:\
    \ `SourceSystemName_DeviceProduct_Name`. |\n\n### Additional Notes\n* The action\
    \ specifically targets the **first entity** of the current alert and expects it\
    \ to contain a `SourceFileContent` property within its `additional_properties`\
    \ attribute. If this property is missing or contains invalid JSON, the action\
    \ will fail.\n* This action is primarily used for testing and simulation purposes\
    \ within the Google SecOps platform.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify context and extracts the user-provided\
    \ parameters for simulation, file storage, and naming conventions.\n2. **Data\
    \ Retrieval**: It accesses the first entity of the current alert and retrieves\
    \ the `SourceFileContent` string from its `additional_properties`.\n3. **Data\
    \ Transformation**: The action parses the JSON content and normalizes event fields,\
    \ specifically ensuring that `DeviceEventClassId` and `Name` are correctly mapped\
    \ within the event list.\n4. **Naming Logic**: It determines the final name of\
    \ the case based on whether `Full path name` is enabled or if an `Override Alert\
    \ Name` has been provided.\n5. **Simulation and Storage**: \n    * If `Push to\
    \ Simulated Cases` is enabled, it calls the internal SOAR API to import the case\
    \ into the simulator.\n    * If `Save JSON as Case Wall File` is enabled, it base64-encodes\
    \ the JSON and adds it as an attachment to the case wall.\n6. **Finalization**:\
    \ The action outputs the processed JSON as a result and completes the execution\
    \ with a status message."
