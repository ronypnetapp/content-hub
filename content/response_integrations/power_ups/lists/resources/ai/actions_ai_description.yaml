Search Custom Lists:
  ai_description: >-
    ### General Description

    Searches for specific strings within Google SecOps Custom Lists. This action allows
    users to query internal tracking lists for specific identifiers or categories,
    providing a way to programmatically access and filter custom list data within
    a playbook. It is primarily used to check if certain values exist within managed
    lists or to retrieve the contents of specific list categories.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String to Search | String | No | The specific string to look for within the
    `entityIdentifier` field of the custom list records. This performs a substring
    match. |

    | Categories | String | No | A comma-separated list of custom list names (categories)
    to restrict the search to. |


    ### Additional Notes

    - If no `Categories` are provided, the action retrieves records from all available
    custom lists.

    - If no `String to Search` is provided, the action returns all records within
    the specified categories (or all records if no categories are specified).

    - The action returns a boolean result indicating if any matches were found and
    provides the matching records in JSON format.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Categories` and `String
    to Search` parameters from the input configuration.

    2. **Data Retrieval**: It utilizes the internal SOAR API (`get_traking_list_record`)
    to fetch records from the custom lists based on the provided categories.

    3. **Category Filtering**: If specific categories were requested, the action ensures
    the results are filtered to only include records belonging to those categories.

    4. **String Matching**: If a search string is provided, the action iterates through
    the retrieved records and filters for those where the `entityIdentifier` contains
    the search string.

    5. **Result Output**: The final set of matching records is added to the action's
    JSON result. The action completes with a success message indicating the number
    of records found.
