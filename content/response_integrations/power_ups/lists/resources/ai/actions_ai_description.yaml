Remove String from Custom List:
  ai_description: >-
    ### General Description

    The **Remove String from Custom List** action is designed to delete a specific
    string entry from an internal Google SecOps custom list. This is typically used
    for managing allowlists, blocklists, or other reference datasets within the SOAR
    platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Category** | String | Yes | The name of the custom list category (e.g., 'WhiteList')
    from which the item should be removed. |

    | **ListItem** | String | Yes | The specific string value to be removed from the
    custom list. |


    ### Additional Notes

    - This action operates on internal Google SecOps data (Custom Lists) and does
    not interact with external APIs.

    - **Note**: The parameter description for 'ListItem' in the configuration metadata
    incorrectly mentions 'adding' the string, but the action logic and name confirm
    it performs a removal.


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the 'Category' and 'ListItem'
    values from the user input.

    2. **Object Construction**: It creates a 'CustomList' object using the provided
    string, category, and the current environment context.

    3. **Removal Execution**: It invokes the 'remove_entities_from_custom_list' method
    to delete the entry from the internal database.

    4. **Completion**: The action returns a success status and an output message confirming
    the removal.
