Add String to Custom List:
  ai_description: >-
    ### General Description

    Adds a user-defined string to a specific Google SecOps custom list category. This
    action is primarily used for managing internal platform lists, such as allowlists,
    blocklists, or watchlists, by programmatically inserting new entries.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ListItem | String | Yes | The specific string value to be added to the custom
    list. |

    | Category | String | Yes | The name of the custom list category where the string
    will be stored. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `ListItem` (the string to
    add) and the `Category` (the target list) from the input parameters.

    2. **Object Preparation**: It creates a `CustomList` data object containing the
    input string, the target category, and the current environment context.

    3. **Internal Mutation**: The action calls the internal SDK method `add_entities_to_custom_list`
    to update the specified Google SecOps custom list with the new string.

    4. **Finalization**: The action concludes by providing a success message confirming
    the addition of the item to the category.


    ### Additional Notes

    This action does not interact with external APIs; it only modifies internal Google
    SecOps data structures.
