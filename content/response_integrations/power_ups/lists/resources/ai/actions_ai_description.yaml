Search Environment Custom Lists:
  ai_description: >-
    ### General Description

    The **Search Environment Custom Lists** action allows users to query and filter
    records stored within the Google SecOps environment's custom lists. It is a utility
    action designed to find specific entries (such as indicators, usernames, or identifiers)
    across various list categories. If no search criteria are provided, the action
    retrieves all available records from the environment.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **String to Search** | The specific text string to look for within the `entityIdentifier`
    field of the custom list records. | String | No |

    | **Categories** | A comma-separated list of categories (e.g., "Suspicious IPs,
    VIP Users") to narrow the search scope to specific lists. | String | No |


    ### Additional Notes

    - If both parameters are left empty, the action will return all records from all
    custom lists in the environment.

    - The search logic is case-sensitive or case-insensitive depending on the underlying
    API implementation, but typically matches the string within the `entityIdentifier`
    field.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Categories` and `String
    to Search` parameters provided by the user.

    2. **Data Retrieval**: It fetches custom list records from the internal Google
    SecOps database using the `get_traking_list_records_filtered` helper method.

    3. **Category Filtering**: If the `Categories` parameter is provided, the action
    filters the retrieved records to include only those belonging to the specified
    categories.

    4. **String Matching**: If a `String to Search` is provided, the action filters
    the records further, keeping only those where the search string is contained within
    the `entityIdentifier` attribute.

    5. **Result Finalization**: The matching records are added to the action's JSON
    results, and the action completes with a summary of the number of matches found.
