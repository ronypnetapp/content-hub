Is String In Custom List:
  ai_description: >-
    ### General Description

    This action checks if a specific set of strings exists within a designated Google
    SecOps Custom List category. It is primarily used for whitelist/blacklist validation
    or verifying if specific identifiers (like IPs, domains, or usernames) are already
    known to the system within a specific context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IdentifierList** | String | Yes | A list of strings to compare against the
    custom list. This can be provided as a comma-separated string (e.g., `1.2.3.4,google.com`)
    or a valid JSON array. |

    | **Category** | String | Yes | The name of the Custom List category (e.g., `WhiteList`,
    `BlackList`) to search within for the current environment. |


    ### Additional Notes

    - The action handles both comma-separated strings and JSON-formatted arrays for
    the `IdentifierList` parameter.

    - It performs the check specifically for the environment associated with the current
    execution context.


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the `Category` and `IdentifierList`
    from the input parameters.

    2. **Parsing**: It attempts to parse the `IdentifierList` as JSON; if that fails,
    it splits the string by commas and trims whitespace from each entry.

    3. **Custom List Lookup**: For each identifier in the list, the action creates
    a `CustomList` object and uses the SOAR SDK method `any_entity_in_custom_list`
    to verify its existence in the specified category.

    4. **Result Aggregation**: It builds a JSON object mapping each identifier to
    a boolean value (`true` if found, `false` otherwise) and maintains a counter of
    total matches found.

    5. **Completion**: The action outputs the total count of found items as the result
    value and attaches the detailed mapping as a JSON result.
