Convert File:
  ai_description: >-
    Converts files between PNG and PDF formats on a Remote Agent. This action allows
    for the transformation of image and document formats directly on the filesystem
    where the Remote Agent is deployed. It is particularly useful for workflows that
    require file format standardization before further processing, such as OCR or
    report generation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input File Format | DDL | Yes | The original format of the file to be converted.
    Supported values: PDF, PNG. |

    | Input File Path | String | Yes | The absolute path to the source file on the
    Remote Agent's filesystem. |

    | Output File Format | DDL | Yes | The desired format for the resulting file.
    Supported values: PNG, PDF. |


    ### Flow Description

    1. **Environment Validation**: Checks if the action is running on a Remote Agent;
    if not, it raises an error.

    2. **Parameter Validation**: Verifies that the input file exists at the specified
    path and ensures the input and output formats are not the same.

    3. **File Conversion**:
        - **PDF to PNG**: Uses the `pdf2image` library (requiring `pdftoppm`) to convert
    the first page of the PDF into a PNG image.
        - **PNG to PDF**: Uses the `PIL` (Pillow) library to convert the PNG image
    into a PDF document.
    4. **Result Generation**: Saves the converted file to a temporary directory with
    a timestamped filename and returns the new file path and format in the action's
    JSON results.


    ### Additional Notes

    - This action requires a Remote Agent to function as it interacts with the local
    filesystem.

    - For PDF to PNG conversion, the `poppler-utils` package (specifically `pdftoppm`)
    must be installed on the Remote Agent host.
