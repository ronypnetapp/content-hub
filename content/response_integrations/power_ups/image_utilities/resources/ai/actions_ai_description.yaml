Rasterize Content:
  ai_description: >-
    The Rasterize Content action converts vector or complex content, such as URLs,
    raw HTML, or Email bodies, into fixed bitmap image formats (PNG) or PDF documents.
    This action is particularly useful for capturing visual evidence of phishing sites,
    rendered emails, or web-based reports directly into a security case. It utilizes
    a headless Chromium browser (via Playwright) to ensure accurate rendering of dynamic
    content.


    ### Parameters Description


    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Input Type | DDL | Yes | HTML | Specifies the format of the input: 'URL' (fetches
    a webpage), 'HTML' (renders raw HTML), or 'Email' (renders email content). |

    | URLs or Body | String | Yes | N/A | The actual content to process. Provide a
    comma-separated list for URLs, or the full text/HTML body for other types. |

    | Output Type | DDL | No | PNG | The desired output format: 'PNG', 'PDF', or 'Both'.
    |

    | Export Method | DDL | No | Case Attachment | Determines where to save the result:
    'Case Attachment' (adds to the SOAR case), 'File Path' (returns the local path),
    or 'Both'. |

    | Width | String | Yes | 1920 | The browser viewport width in pixels. |

    | Height | String | Yes | 1080 | The browser viewport height in pixels (ignored
    if 'Full Screen' is enabled). |

    | Full Screen | Boolean | Yes | False | If true, the action captures the entire
    scrollable height of the content rather than just the viewport. |

    | Timeout | String | No | 120 | Maximum time in seconds to wait for the page to
    render. |

    | Wait For | DDL | No | NETWORK_IDLE | The browser state to reach before capturing:
    'LOAD', 'DOM_CONTENT_LOADED', 'NETWORK_IDLE', or 'COMMIT'. |

    | Wait for Selector | String | No | N/A | A CSS selector that must become visible
    on the page before the capture occurs. |


    ### Additional Notes

    - **Remote Agent Required:** This action must run on a Remote Agent because it
    requires specific browser binaries (Playwright/Chromium) not present in the default
    cloud environment.

    - **Environment Setup:** Ensure Playwright and Chromium dependencies are installed
    on the Remote Agent as described in the action's error messages if execution fails.


    ### Flow Description

    1. **Validation:** The action verifies it is running on a Remote Agent and validates
    all input parameters.

    2. **Input Preparation:** Depending on the 'Input Type', it either parses a list
    of URLs or wraps HTML/Email content into a renderable format.

    3. **Browser Initialization:** Launches a headless Chromium instance using Playwright
    with the specified viewport dimensions.

    4. **Content Rendering:** Navigates to the URL or loads the HTML content, waiting
    for the specified 'Wait For' state and/or the 'Wait for Selector' to appear.

    5. **Capture:** Generates a PNG screenshot and/or a PDF document based on the
    'Output Type'. If 'Full Screen' is active, it calculates the full page height
    before capturing.

    6. **Export:** Attaches the generated files to the Google SecOps case and/or provides
    the file paths in the action's JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds the generated PNG or PDF files as attachments to the current
      Google SecOps case.
