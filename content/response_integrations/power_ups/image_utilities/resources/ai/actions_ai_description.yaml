Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity and environment readiness for the Image Utilities integration.
    This action specifically validates that the execution environment is a Google
    SecOps Remote Agent and checks for the presence of critical local dependencies:
    the Tesseract OCR engine and Playwright browser binaries (Chromium). It is used
    to ensure that the system is correctly configured to perform image processing
    and web content rasterization tasks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action must be executed on a Remote Agent. If dependencies are missing, the
    action provides specific shell commands in the error message to help administrators
    resolve the issues within the container environment.


    ### Flow Description

    1. **Environment Validation**: Verifies that the action is running on a Remote
    Agent by checking the environment context.

    2. **Tesseract Verification**: Attempts to retrieve the Tesseract version using
    the `pytesseract` library to confirm the OCR engine is installed and accessible.

    3. **Playwright Verification**: Attempts to launch a headless Chromium instance
    using the Playwright library to confirm browser binaries and system dependencies
    are correctly installed.

    4. **Result Reporting**: Returns a success message if all checks pass, or raises
    an informative error with installation instructions if dependencies are missing.
