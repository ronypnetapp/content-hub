OCR Image:
  ai_description: >-
    Extracts text from image files using Optical Character Recognition (OCR). This
    action leverages the Tesseract OCR engine to process images provided either as
    a Base64 encoded string or via a local file path on a Remote Agent.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 Encoded Image | String | No | The base64 encoded string of the image
    file. If provided, this is processed first. |

    | File Path | String | No | The path to the image file on the Remote Agent's file
    system. |


    ### Additional Notes

    - Either **Base64 Encoded Image** or **File Path** must be configured for the
    action to run.

    - This action **must** be executed on a Remote Agent.

    - The Remote Agent must have the `tesseract-ocr` package installed (e.g., via
    `apt-get install -y tesseract-ocr`).


    ### Flow Description

    1. **Environment Validation**: Verifies that the action is executing on a Remote
    Agent.

    2. **Parameter Extraction**: Retrieves the image data (Base64) or the file path
    from the action configuration.

    3. **Image Preparation**: If a Base64 string is provided, it is decoded and written
    to a temporary PNG file. Otherwise, the provided file path is used.

    4. **OCR Processing**: Invokes the `pytesseract` library to perform OCR on the
    image file and extract text content.

    5. **Result Output**: Trims the extracted text and returns it within the `extracted_text`
    field of the JSON result.
