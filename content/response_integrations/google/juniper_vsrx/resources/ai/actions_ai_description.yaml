Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and a **Juniper VSRX** instance. Its primary purpose is to validate
    that the provided configuration details (Address, Port, Username, and Password)
    are correct and that the network path to the device is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters as it uses
    the global integration configuration. |


    ### Additional Notes

    - This action is a standard health check and does not interact with any security
    entities or alert data.

    - It is recommended to run this action immediately after configuring the Juniper
    VSRX integration to ensure the setup is functional.


    ### Flow Description

    1. **Retrieve Configuration**: The action fetches the connection parameters (Address,
    Port, Username, and Password) from the integration's shared configuration.

    2. **Initialize Manager**: It creates an instance of the `JuniperVSRXManager`
    to handle the communication logic.

    3. **Connectivity Probe**: The action executes a `probe()` call to the Juniper
    device to test the network connection and authentication.

    4. **Session Cleanup**: The connection session is explicitly closed to release
    resources.

    5. **Final Status**: The action reports whether the connection was successfully
    established or if it failed.
