name: Get Report
description: Get report for task ids.
integration_identifier: McAfeeATD
parameters:
-   name: Task IDs
    default_value: ''
    type: string
    description: The IDs of the tasks to fetch reports for, comma separated
    is_mandatory: true
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the report.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_report_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
script_result_name: report
