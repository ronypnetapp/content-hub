name: Submit File
description: Submit File for Analysis.
integration_identifier: McAfeeATD
parameters:
-   name: File Paths
    type: string
    description: 'The paths of the file to submit, comma separated. Notice - some
        file types are not supported by ATD (i.e: CSV files).'
    is_mandatory: true
-   name: Analyzer Profile ID
    type: string
    description: The ID of the analyzer profile to analyze with
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/submit_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: task_id
