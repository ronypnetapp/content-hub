Get Report:
  ai_description: >-
    ### General Description

    The **Get Report** action retrieves detailed analysis reports from McAfee Advanced
    Threat Defense (ATD) for a specific set of Task IDs. It is an asynchronous action
    that monitors the status of the tasks and fetches the results once the analysis
    is complete. It provides the report in multiple formats, including JSON for automated
    processing, PDF as a case attachment, and a text summary as a case insight.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Task IDs** | String | Yes | A comma-separated list of McAfee ATD Task IDs
    for which reports should be retrieved. |

    | **Create Insight** | Boolean | No | If enabled (default), the action will create
    a Case Insight containing a text summary of the report. |


    ### Flow Description

    1. **Initialization**: The action connects to the McAfee ATD server using the
    provided credentials and API root.

    2. **Status Check**: It iterates through the provided Task IDs and checks their
    current status via the ATD API.

    3. **Async Wait**: If any of the tasks are not yet in a 'Completed' state, the
    action sets its execution state to 'In Progress' and will be re-triggered by the
    SOAR platform until the tasks are ready.

    4. **Data Retrieval**: Once all tasks are ready, the action fetches the JSON report
    and the PDF report for each Task ID.

    5. **Insight Creation**: If the 'Create Insight' parameter is enabled, it fetches
    a text-based summary and adds it as a Case Insight for the current case.

    6. **Attachment**: The PDF report is downloaded, base64-encoded, and added as
    an attachment to the case wall.

    7. **Output**: The action returns the JSON report data as the result and provides
    a summary message of the successful retrievals.


    ### Additional Notes

    - This action does not process entities directly; it relies on Task IDs typically
    generated by previous submission actions (e.g., Submit File or Submit URL).

    - The action will only complete once all provided Task IDs have reached a 'Completed'
    status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights with report summaries and adds PDF reports as attachments
      to the case.
  categories:
    enrichment: false
