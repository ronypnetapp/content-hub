Submit URL:
  ai_description: "Submits URL entities to McAfee Advanced Threat Defense (ATD) for\
    \ sandbox analysis and retrieves detailed threat reports. This is an asynchronous\
    \ action that operates in two stages: submission and polling. \n\n### General\
    \ Description\nThis action allows security analysts to automate the submission\
    \ of suspicious URLs to a McAfee ATD appliance. It utilizes specific analyzer\
    \ profiles to execute the URL in a sandbox environment, subsequently retrieving\
    \ JSON, PDF, and TXT reports. The action enriches the URL entities within Google\
    \ SecOps with the analysis results and can automatically flag entities as suspicious\
    \ based on a severity threshold.\n\n### Parameters Description\n| Parameter |\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Analyzer\
    \ Profile ID | String | Yes | The ID of the analyzer profile (VM Profile) to be\
    \ used for the analysis. |\n| Create Insight | Boolean | No | If enabled (default:\
    \ true), the action will create a case insight containing the text-based analysis\
    \ report. |\n| Threshold | Integer | No | A severity threshold (default: 3) used\
    \ to determine if an entity should be marked as suspicious based on the ATD verdict.\
    \ |\n\n### Flow Description\n1. **Submission Stage**: The action identifies all\
    \ URL entities in the current context and submits them to McAfee ATD using the\
    \ provided Analyzer Profile ID. It stores the resulting Task IDs.\n2. **Polling\
    \ Stage**: The action periodically checks the status of the submitted tasks until\
    \ they reach a 'Completed' state.\n3. **Data Retrieval**: Once analysis is finished,\
    \ the action fetches JSON reports (for enrichment), PDF reports (as attachments),\
    \ and TXT reports (for insights).\n4. **Enrichment & Internal Mutation**: \n \
    \   *   Updates entity `additional_properties` with summary data.\n    *   Marks\
    \ entities as suspicious if the ATD severity score exceeds the defined threshold.\n\
    \    *   Attaches the PDF report to the case.\n    *   Creates a case insight\
    \ if the 'Create Insight' parameter is enabled."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious status and additional properties based on analysis
      results. It also adds PDF report attachments and creates case insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
