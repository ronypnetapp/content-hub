Get Connections for Endpoint:
  ai_description: >-
    ### General Description

    Retrieves a list of network connections for specific endpoints (IP addresses or
    Hostnames) from the CyberX platform. This action helps security analysts understand
    the network activity and communication patterns of a device by fetching its connection
    history and displaying it directly within the Google SecOps entity context.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    * The action requires a valid API Root and Access Token configured in the CyberX
    integration settings.

    * It supports both IP Address (ADDRESS) and Hostname (HOSTNAME) entity types.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all target entities in the current
    context that are either IP Addresses or Hostnames.

    2. **Device Identification**: For each identified entity, the action queries the
    CyberX API to find the corresponding internal Device ID based on the IP or Hostname.

    3. **Connection Retrieval**: Once the Device ID is obtained, the action fetches
    the list of network connections associated with that device from CyberX.

    4. **Data Enrichment**: The retrieved connection data is flattened and attached
    as a data table to the respective entity in Google SecOps for easy review.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table to the entity in Google SecOps containing the network connection
      information retrieved from CyberX.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
