Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the CyberX platform. It ensures that the integration is correctly
    configured and that the service is reachable using the provided credentials.


    ### Parameters Description

    This action does not have any direct action parameters. It relies on the global
    integration configuration:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the CyberX instance (e.g., `https://cyberx-server.com`).
    |

    | Access Token | String | Yes | The API token used to authenticate requests to
    the CyberX API. |

    | Verify SSL | Boolean | No | Determines whether to verify the SSL certificate
    of the CyberX server. Defaults to `false`. |


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the API Root, Access Token,
    and SSL verification settings from the CyberX integration configuration.

    2. **Manager Initialization:** It initializes the `CyberXManager` with the retrieved
    settings.

    3. **Connectivity Test:** The action executes the `get_all_devices` method, which
    performs a `GET` request to the `/api/v1/devices` endpoint.

    4. **Result Handling:** If the API call is successful, the action concludes with
    a success status and a "Connection established" message. If the call fails (e.g.,
    due to invalid credentials or network issues), an exception is raised, indicating
    a connection failure.


    ### Additional Notes

    - This action does not process any entities and is strictly used for system health
    checks.

    - As per standard SOAR practices, this action is excluded from being categorized
    as an enrichment action despite fetching data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
