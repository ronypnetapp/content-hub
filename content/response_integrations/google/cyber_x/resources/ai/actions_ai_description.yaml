Enrich Endpoints:
  ai_description: >-
    ### General Description

    Enriches **Hostname** and **IP Address** entities with comprehensive device information
    retrieved from the CyberX platform. This action helps security analysts gain visibility
    into OT/IoT devices by providing context such as device type, vendor, and operating
    system directly within the Google SecOps environment.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    The action enriches entities by adding custom properties prefixed with `CX_` and
    attaching a detailed data table to each successfully matched entity.


    ### Flow Description

    1. **Initialization**: Establishes a connection to the CyberX API using the integration's
    configuration (API Root and Access Token).

    2. **Entity Filtering**: Identifies all Hostname and IP Address entities within
    the current alert context.

    3. **Data Retrieval**: For each entity, it queries the CyberX API to find matching
    device records based on the IP address or hostname.

    4. **Enrichment**:
        - Updates the entity's `additional_properties` with the flattened device data.
        - Adds a formatted data table to the entity for quick reference in the UI.
    5. **Reporting**: Summarizes the enrichment results and logs any errors encountered
    during the process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties with enriched device information
      from CyberX and adds an entity data table to the entity's view.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Alerts:
  ai_description: "### General Description\nThe **Get Alerts** action retrieves a\
    \ comprehensive list of all security alerts detected by the CyberX XSense platform.\
    \ This action is primarily used for visibility and reporting, allowing security\
    \ analysts to pull the current state of alerts from the CyberX environment into\
    \ Google SecOps for further review or documentation.\n\n### Parameters Description\n\
    There are no input parameters for this action.\n\n### Additional Notes\nThis action\
    \ does not operate on specific entities; it performs a global fetch of all alerts\
    \ available in the CyberX system. The results are presented both as a formatted\
    \ data table and as a raw JSON object.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the CyberX manager using the API Root, Access Token,\
    \ and SSL verification settings from the integration configuration.\n2. **API\
    \ Request**: It executes a GET request to the CyberX `/api/v1/alerts` endpoint\
    \ to retrieve the list of alerts.\n3. **Data Processing**: \n    - If alerts are\
    \ retrieved, the action flattens the dictionary objects and constructs a CSV-formatted\
    \ data table titled \"Result ALerts\".\n    - It calculates the total count of\
    \ alerts found for the output message.\n4. **Output**: The action returns the\
    \ count of alerts in the execution summary and provides the full list of alerts\
    \ in JSON format for use in downstream playbook steps."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
