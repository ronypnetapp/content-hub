Get Analysis Results:
  ai_description: >-
    ### General Description

    Enriches `FileHash` and `URL` entities by retrieving results from previously completed
    analysis tasks in Lastline. This action is useful for gaining immediate context
    on known files or URLs without triggering a new sandbox submission. It retrieves
    scores, malicious activity summaries, and technical metadata, updating the entity's
    profile within Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | Yes | The score threshold (default is 70). If the retrieved
    Lastline analysis score is higher than this value, the entity is marked as suspicious
    in Google SecOps. |

    | Search in last x scans | Integer | Yes | The number of recent analysis records
    in Lastline to search through (default is 25) to find a match for the entity.
    |

    | Create Insight? | Boolean | No | If set to `True`, the action creates a detailed
    insight on the entity in the Google SecOps case containing the score and observed
    malicious activities. |


    ### Additional Notes

    - The action supports `FileHash` entities in **MD5** and **SHA-1** formats only.

    - It always fetches the **latest** available analysis for the provided entity
    within the specified search limit.

    - If no previous analysis is found within the search limit, the entity will not
    be enriched.


    ### Flow Description

    1. **Authentication**: Connects to the Lastline service using the provided API
    credentials.

    2. **Entity Filtering**: Iterates through the target entities, filtering for supported
    types (`URL` and `FileHash`).

    3. **History Search**: For each valid entity, it searches the Lastline analysis
    history (up to the defined 'Search in last x scans' limit) to find the most recent
    completed task.

    4. **Result Retrieval**: If a task is found, it fetches the detailed analysis
    report using the task's unique identifier (UUID).

    5. **Internal Mutation (Enrichment)**:
        - Updates the entity's `additional_properties` with technical details (timestamps,
    hashes, scores).
        - Sets the entity as `is_enriched`.
        - Compares the analysis score against the `Threshold`; if exceeded, marks
    the entity as `is_suspicious`.
    6. **Reporting**: Adds a data table to the case wall and, if configured, creates
    a case insight for the entity.

    7. **Completion**: Updates the entities in the SOAR and returns the raw JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, marks entities as suspicious
      based on score thresholds, and creates case insights and data tables.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Lastline service.\
    \ It ensures that the provided integration parameters\u2014such as the API Root,\
    \ Username, and Password\u2014are correct and that the Lastline API is reachable\
    \ from the environment.\n\n### Parameters Description\nThis action uses the integration's\
    \ global configuration parameters rather than action-specific inputs:\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Api Root**\
    \ | String | Yes | The base URL of the Lastline API instance. |\n| **Username**\
    \ | String | Yes | The username used for authenticating with the Lastline service.\
    \ |\n| **Password** | String | Yes | The password associated with the provided\
    \ username. |\n| **Verify SSL** | Boolean | No | If enabled (default), the action\
    \ will verify the SSL certificate of the Lastline server. |\n\n### Additional\
    \ Notes\n- This action is typically used during the initial setup of the integration\
    \ or for troubleshooting connection issues.\n- It does not process any entities\
    \ or modify any data within Google SecOps or Lastline.\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the Siemplify context and retrieves\
    \ the global configuration parameters (API Root, Username, Password, and SSL verification\
    \ setting).\n2. **Manager Setup**: It instantiates the `LastlineManager`, which\
    \ immediately attempts to establish a session by requesting a session cookie from\
    \ the Lastline `/papi/login` endpoint.\n3. **Connectivity Test**: The action calls\
    \ the `test_connectivity` method, which performs a GET request to the login endpoint\
    \ to validate that the credentials are valid and the service is responsive.\n\
    4. **Result Handling**: \n    - If the request is successful, the action returns\
    \ a success message and sets the execution state to completed.\n    - If an authentication\
    \ error occurs, it catches the `LastlineAuthenticationException` and reports a\
    \ failure.\n    - If any other network or API error occurs, it catches the general\
    \ exception and provides the error details."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
