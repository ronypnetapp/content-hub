Submit File:
  ai_description: >-
    Submits a file to the Lastline sandbox for automated analysis and retrieves the
    resulting report. This action operates asynchronously, meaning it can submit the
    file and then poll for the analysis results until they are ready. Note that this
    action does not process Google SecOps entities; instead, it requires a direct
    file path provided as an input parameter.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The full local path to the file that should be uploaded
    to Lastline for analysis. |

    | Wait for the report? | Boolean | No | If set to 'True' (default), the action
    will wait for the analysis to complete and fetch the full report. If 'False',
    the action completes immediately after the file is successfully submitted. |


    ### Flow Description

    1. **Submission**: The action reads the file from the specified path and performs
    a POST request to the Lastline API to create a new analysis task.

    2. **Async Handling**: If 'Wait for the report?' is enabled, the action enters
    an 'In Progress' state, storing the task UUID.

    3. **Status Polling**: In subsequent execution cycles, the action queries the
    Lastline API to check the progress of the analysis.

    4. **Data Retrieval**: Once the analysis is marked as completed, the action fetches
    the final results, including scores and observed malicious activities.

    5. **Output**: The action outputs the raw analysis data as a JSON object and,
    if the report was waited for, attaches a CSV data table to the case containing
    the summary of the analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Lastline platform, which creates a new analysis task and
      consumes sandbox resources.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table to the Google SecOps case containing the file analysis results.
  categories:
    enrichment: false
