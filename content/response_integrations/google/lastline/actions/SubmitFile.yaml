name: Submit File
description: 'Submit analysis task for the provided URL. Note: Action is not working
    with Siemplify entities, full path to file to analyze should be provided as action
    input parameter.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/lastline#submit_file
integration_identifier: Lastline
parameters:
-   name: File Path
    default_value: ''
    type: string
    description: Specify full path to file to analyze.
    is_mandatory: true
-   name: Wait for the report?
    default_value: 'True'
    type: boolean
    description: Specify whether the action should wait for the report creation. Report
        also can be obtained later with Get Analysis Results action once scan is completed.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/submit_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities":[]}'
