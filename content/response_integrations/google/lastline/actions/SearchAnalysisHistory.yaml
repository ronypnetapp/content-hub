name: Search Analysis History
description: 'Search Lastline completed analysis tasks history. For submission either
    URL or Filehash in a format of md5 or sha1 can be provided. Note: Action is not
    working with Siemplify entities, only action input parameters are used.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/lastline#search_analysis_history
integration_identifier: Lastline
parameters:
-   name: Submission Name
    default_value: ''
    type: string
    description: Submission name to search for. Can be either URL or Filehash in a
        format of MD5 and SHA1.
    is_mandatory: false
-   name: Submission Type
    default_value: Not specified
    type: ddl
    optional_values:
    - Not specified
    - URL
    - FileHash
    description: Optionally specify a submission type to search for, either URL or
        FileHash.
    is_mandatory: false
-   name: Max Hours Backwards
    default_value: 24
    type: string
    description: Time frame for which to search for completed analysis tasks.
    is_mandatory: false
-   name: Search in last x scans
    default_value: 100
    type: string
    description: Search for report in last x analyses executed in Lastline.
    is_mandatory: true
-   name: Skip first x scans
    default_value: 0
    type: string
    description: Skip first x scans returned by Lastline API.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_analysis_history_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
