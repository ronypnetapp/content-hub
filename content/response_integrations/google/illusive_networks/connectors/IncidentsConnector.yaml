name: Illusive Networks - Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: details_serviceType
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '180'
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Root
    default_value: http://x.x.x.x
    type: string
    description: API root of the Illusive Networks instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: 'API Key of the Illusive Networks. Note: string "Basic" shouldn''t
        be a part of the value.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: Base 64 encoded CA certificate file.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Illusive Networks server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Severity
    default_value: Medium
    type: string
    description: 'Severity of the Siemplify alert that will be created based on the
        incidents from Illusive Networks. Possible values: Informational Low Medium
        High Critical'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Incidents To Fetch
    default_value: 10
    type: integer
    description: How many incidents to process per one connector iteration. Maximum
        is 1000.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: true
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: 'Pull incidents with related forensic timeline from Illusive Networks.
    Note: This connector requires changes to the rate limiting on the Illusive Networks
    server. Default rate limit is too small. All of the steps are available in the
    documentation. Whitelisting and Blacklisting is done via type of the incident'
integration: IllusiveNetworks
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/illusive-networks#connectors
rules:
-   rule_name: EXTERNAL
    rule_type: allow_list
is_connector_rules_supported: false
creator: admin
