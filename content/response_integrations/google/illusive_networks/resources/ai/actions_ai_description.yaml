    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Add Deceptive User:
  ai_description: >-
    ### General Description

    Adds a new deceptive user to the Illusive Networks platform. This action is used
    to create honey-tokens or decoy accounts within the network to detect lateral
    movement and unauthorized access by attackers. It allows for the specification
    of credentials, domain association, and the application of specific security policies.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Username** | String | Yes | The username for the new deceptive user to be
    created. |

    | **Password** | Password | Yes | The password associated with the new deceptive
    user. |

    | **DNS Domain** | String | No | The DNS domain name where the deceptive user
    will be registered. |

    | **Policy Names** | String | No | A comma-separated list of Illusive Networks
    policies to apply to the user. If left empty, the system applies all available
    policies by default. |


    ### Additional Notes

    - The action first checks if a user with the same username already exists in Illusive
    Networks. If the user exists, the action will fail with a 'ManagerAlreadyExistException'
    to prevent accidental overwrites.

    - This action does not run on entities; it relies entirely on the provided input
    parameters.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Root, API Key,
    SSL settings) and action parameters (Username, Password, DNS Domain, Policy Names).

    2. **Manager Setup**: Initializes the Illusive Networks API manager.

    3. **Existence Check**: Queries the Illusive Networks API to determine if the
    specified username already exists as a deceptive user.

    4. **User Creation**: If the user does not exist, sends a POST request to the
    Illusive Networks API to create the deceptive user with the provided credentials
    and policies.

    5. **Completion**: Returns a success message if the user is created or an error
    message if the user already exists or if the API call fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
