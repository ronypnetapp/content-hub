Remove Deceptive Server:
  ai_description: >-
    ### General Description

    Removes a deceptive server configuration from the Illusive Networks platform.
    This action is used to decommission or clean up specific deceptive assets that
    are no longer required in the environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Server Name** | String | Yes | The specific name of the deceptive server that
    needs to be removed from the Illusive Networks instance. |


    ### Additional Notes

    * This action does not operate on SecOps entities; it requires the manual input
    of a server name.

    * The action first verifies the existence of the server before attempting the
    removal process.


    ### Flow Description

    1. **Initialization**: Connects to the Illusive Networks API using the provided
    credentials and configuration.

    2. **Verification**: Queries the external system to retrieve the details of the
    deceptive server specified by the 'Server Name' parameter.

    3. **Removal**: If the server is found, the action sends a DELETE request to the
    Illusive Networks API to remove the server configuration.

    4. **Completion**: Reports a success message if the server was successfully removed
    or an error message if the server was not found or the deletion failed.
