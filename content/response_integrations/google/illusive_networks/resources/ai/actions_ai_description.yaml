    to be removed from the Illusive Networks system. |


    ### Flow Description

    1. **Initialization**: The action initializes the Illusive Networks manager using
    the provided API credentials and configuration.

    2. **User Verification**: It first attempts to retrieve the deceptive user details
    from the external system using the provided username to ensure the user exists.

    3. **Removal**: If the user is found, the action sends a DELETE request to the
    Illusive Networks API to remove the specified deceptive user.

