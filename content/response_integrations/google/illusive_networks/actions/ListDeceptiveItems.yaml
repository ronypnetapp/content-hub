name: List Deceptive Items
description: List available deceptive items in Illusive Networks.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/illusive-networks#list_deceptive_items
integration_identifier: IllusiveNetworks
parameters:
-   name: Deceptive Type
    default_value: All
    type: ddl
    optional_values:
    - All
    - Only Users
    - Only Servers
    description: Specify what kind of deceptive items should be returned.
    is_mandatory: true
-   name: Deceptive State
    default_value: All
    type: ddl
    optional_values:
    - All
    - Only Approved
    - Only Suggested
    description: Specify what kind of deceptive items should be returned based on
        state.
    is_mandatory: true
-   name: Max Items To Return
    default_value: 50
    type: string
    description: 'Specify how many items to return. Default: 50. If nothing is specified,
        action will return all items.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_deceptive_items_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
