name: Run Forensic Scan
description: Run forensic scan on the endpoint in the Illusive Networks. Works with
    IP and Hostname entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/illusive-networks#run_forensic_scan
integration_identifier: IllusiveNetworks
parameters:
-   name: Include System Information
    default_value: true
    type: boolean
    description: If enabled, action will return system information.
    is_mandatory: true
-   name: Include Prefetch Files Information
    default_value: true
    type: boolean
    description: If enabled, action will return information about prefetch files.
    is_mandatory: true
-   name: Include Add-Remove Programs Information
    default_value: false
    type: boolean
    description: If enabled, action will return information about add-remove programs.
    is_mandatory: true
-   name: Include Startup Processes Information
    default_value: false
    type: boolean
    description: If enabled, action will return information about startup processes.
    is_mandatory: true
-   name: Include Running Processes Information
    default_value: false
    type: boolean
    description: If enabled, action will return information about running processes.
    is_mandatory: false
-   name: Include User-Assist Programs Information
    default_value: false
    type: boolean
    description: If enabled, action will return information about user-assist programs.
    is_mandatory: true
-   name: Include Powershell History Information
    default_value: false
    type: boolean
    description: If enabled, action will return information about powershell history.
    is_mandatory: true
-   name: Max Items To Return
    default_value: 50
    type: string
    description: Specify how many items to return. If nothing is provided, action
        will return everything.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_forensic_scan_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME","ADDRESS"]}'
