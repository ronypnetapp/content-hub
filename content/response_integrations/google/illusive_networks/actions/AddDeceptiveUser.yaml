name: Add Deceptive User
description: Add deceptive users in Illusive Networks.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/illusive-networks#add_deceptive_user
integration_identifier: IllusiveNetworks
parameters:
-   name: Username
    default_value: ''
    type: string
    description: Specify the username for the new deceptive user.
    is_mandatory: true
-   name: Password
    default_value: ''
    type: password
    description: Specify the password for the new deceptive user.
    is_mandatory: true
-   name: DNS Domain
    default_value: ''
    type: string
    description: Specify the domain name for the new deceptive user.
    is_mandatory: false
-   name: Policy Names
    default_value: ''
    type: string
    description: Specify a comma-separated list of policies that need to be applied
        to the new deceptive user. If nothing is provided action will use by default
        all policies.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
