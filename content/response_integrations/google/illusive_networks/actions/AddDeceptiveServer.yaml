name: Add Deceptive Server
description: Add deceptive servers in Illusive Networks.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/illusive-networks#add_deceptive_server
integration_identifier: IllusiveNetworks
parameters:
-   name: Server Name
    default_value: ''
    type: string
    description: Specify what kind of deceptive items should be returned.
    is_mandatory: true
-   name: Service Types
    default_value: DB
    type: string
    description: Specify a comma-separated list of service types for new deceptive
        server.
    is_mandatory: true
-   name: Policy Names
    default_value: ''
    type: string
    description: Specify a comma-separated list of policies that need to be applied
        to the new deceptive server. If nothing is provided action will use by default
        all policies.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
