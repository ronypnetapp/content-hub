Execute Query:
  ai_description: >-
    ### General Description

    Execute queries on endpoints based on IP and Hostname entities in Cisco Orbital.
    This action allows security analysts to perform live investigations by running
    SQL-like queries (osquery) against remote hosts to retrieve system information,
    process lists, network connections, and more. The action operates asynchronously,
    allowing for long-running queries to complete over time.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The SQL query to be executed on the target endpoints.
    |

    | Name | String | No | A custom name for the query job. If not provided, a default
    name with a GUID is used. |

    | Custom Context Fields | String | No | Key-value pairs (format: `key:value,key:value`)
    to add metadata to the job. |

    | Max Results To Return | Integer | No | The maximum number of result rows to
    retrieve (default is 100). |

    | Hide Case Wall Table | Boolean | No | If set to true, the action will not create
    a visual table in the case wall. |


    ### Flow Description

    1. **Initialization**: The action authenticates with Cisco Orbital using the provided
    Client ID and Client Secret to obtain an OAuth2 token.

    2. **Job Submission**: It identifies relevant entities (IPs and Hostnames) from
    the alert and submits a query job to Cisco Orbital via a POST request.

    3. **Asynchronous Polling**: Because endpoint queries can take time, the action
    enters an asynchronous state, polling the job status until results are ready or
    the timeout (up to 24 hours) is reached.

    4. **Data Retrieval**: Once the job completes, the action fetches the results
    from Cisco Orbital, respecting the defined row limit.

    5. **Output**: Results are attached to the action as JSON and, unless disabled,
    rendered as data tables on the case wall for each successful entity.


    ### Additional Notes

    - The action supports a maximum timeout of 24 hours. Users should adjust the IDE
    timeout value accordingly for long-running queries.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds query results as data tables to the case wall for each successful entity.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Cisco Orbital\
    \ API. It validates that the integration's configuration parameters\u2014specifically\
    \ the API Root, Client ID, and Client Secret\u2014are correct and that the Cisco\
    \ Orbital service is reachable and responding to requests.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **API Root** | String | Yes | The base URL of the Cisco Orbital API instance\
    \ used for all requests. |\n| **Client ID** | String | Yes | The unique identifier\
    \ for the OAuth2 client used to authenticate with Cisco Orbital. |\n| **Client\
    \ Secret** | String | Yes | The secret key associated with the Client ID for secure\
    \ authentication. |\n| **Verify SSL** | Boolean | Yes | Determines whether the\
    \ action should verify the SSL certificate of the Cisco Orbital server. |\n\n\
    ### Additional Notes\nThis action does not interact with any entities (IPs, Hostnames,\
    \ etc.) and is strictly used for testing the integration's communication channel.\
    \ It is typically executed during the initial setup or when troubleshooting authentication\
    \ errors.\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the Siemplify environment and extracts the necessary configuration parameters\
    \ from the integration settings.\n2. **Authentication**: It attempts to obtain\
    \ an OAuth2 bearer token from the Cisco Orbital authentication endpoint (`v0/oauth2/token`)\
    \ using the provided credentials.\n3. **Connectivity Test**: Upon successful authentication,\
    \ it sends a GET request to the Cisco Orbital health check endpoint (`v0/ok`).\n\
    4. **Outcome Reporting**: If the health check returns a successful response, the\
    \ action completes with a success message. If any step fails (authentication or\
    \ connectivity), it catches the exception and reports a failure with the specific\
    \ error details."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
