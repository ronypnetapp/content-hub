name: Execute Query
description: 'Execute queries on endpoints based on IP and Hostname entities in Cisco
    Orbital. Note: Action is running as async, please adjust script timeout value
    in Siemplify IDE for action as needed. Maximum timeout is 24 hours.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cisco-orbital#execute_query
integration_identifier: CiscoOrbital
parameters:
-   name: Query
    default_value: ''
    type: string
    description: Specify the query that needs to be executed.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: 'Specify the name for the query job. If nothing is specified, action
        will use a name in the following format: Siemplify-{guid}'
    is_mandatory: false
-   name: Custom Context Fields
    default_value: ''
    type: string
    description: 'Specify additional custom context fields that should be added to
        the job. Format: key_1:value_1,key_2:value_1.'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 100
    type: string
    description: Specify how many results should be returned.
    is_mandatory: false
-   name: Hide Case Wall Table
    default_value: false
    type: boolean
    description: If enabled, action will not prepare a case wall table.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["ADDRESS","HOSTNAME"]}'
