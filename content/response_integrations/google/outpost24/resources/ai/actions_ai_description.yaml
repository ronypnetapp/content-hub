Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using information from Outpost24. This
    action retrieves comprehensive device details, including business criticality,
    exposure status, and source information. It can also fetch specific security findings
    (vulnerabilities and informational items) associated with the entities, allowing
    for detailed risk assessment within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Finding Risk Level Filter | String | No | A comma-separated list of risk levels
    to filter findings (e.g., 'Low, Medium, High, Critical, Recommendation, Initial').
    If empty, all levels are fetched. |

    | Max Findings To Return | Integer | No | The maximum number of findings to process
    and return per entity. Defaults to 100. |

    | Return Finding Information | Boolean | No | If enabled, the action retrieves
    and displays detailed security findings for the endpoint. |

    | Finding Type | Enum | No | Specifies the category of findings to return: 'All',
    'Vulnerability', or 'Information'. |

    | Create Insight | Boolean | No | If enabled, creates a detailed SOAR insight
    for each enriched entity containing a summary of findings and device status. |


    ### Additional Notes

    - The action supports both IP Address and Hostname entity types.

    - If 'Return Finding Information' is disabled, parameters like 'Finding Risk Level
    Filter' and 'Finding Type' will be ignored.

    - The action uses a prefix 'Outpost24' for all enrichment fields added to entities.


    ### Flow Description

    1. **Authentication**: Connects to the Outpost24 API using provided credentials
    to obtain a bearer token.

    2. **Entity Filtering**: Identifies all IP Address and Hostname entities within
    the current context.

    3. **Device Lookup**: For each entity, queries Outpost24 to find matching device
    records. Hostnames are searched via direct filters, while IP addresses are found
    by scanning the target list.

    4. **Findings Retrieval**: If configured, fetches security findings for the identified
    device, applying risk level and type filters.

    5. **Data Enrichment**: Updates the entity's additional properties with device
    metadata and sets the 'is_enriched' flag to true.

    6. **UI Enhancement**: Adds data tables to the case for device details and findings,
    and generates an entity insight if requested.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, sets the 'is_enriched' status
      to true, and creates detailed entity insights summarizing security findings.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe Ping action is a diagnostic tool designed\
    \ to verify the connectivity between Google SecOps and the Outpost24 server. It\
    \ ensures that the provided integration configuration parameters\u2014such as\
    \ the API Root, Username, and Password\u2014are correct and that the network path\
    \ is open.\n\n### Parameters Description\nThis action does not have any action-specific\
    \ parameters. It relies entirely on the global integration configuration parameters:\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| API Root | String | Yes | The base URL of the Outpost24 API instance. |\n\
    | Username | String | Yes | The username used for authentication. |\n| Password\
    \ | String | Yes | The password used for authentication. |\n| Verify SSL | Boolean\
    \ | Yes | If enabled, the action will verify the SSL certificate of the Outpost24\
    \ server. |\n\n### Additional Notes\n- This action is typically used during the\
    \ initial setup of the integration or for troubleshooting connection issues.\n\
    - It performs a lightweight GET request to the Outpost24 findings endpoint to\
    \ confirm that the authentication token is valid and the service is reachable.\n\
    \n### Flow Description\n1. **Parameter Extraction:** The action retrieves the\
    \ API Root, Username, Password, and SSL verification settings from the integration\
    \ configuration.\n2. **Manager Initialization:** It initializes the Outpost24\
    \ Manager, which handles the authentication process by requesting a Bearer token\
    \ from the `/opi/rest/auth/login` endpoint.\n3. **Connectivity Test:** The action\
    \ calls the `test_connectivity` method, which executes a GET request to the findings\
    \ endpoint (`/opi/rest/outscan/findings?limit=1`).\n4. **Result Reporting:** If\
    \ the request is successful, the action completes with a success message. If any\
    \ step fails (e.g., authentication error, network timeout), it catches the exception\
    \ and reports a failure."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
