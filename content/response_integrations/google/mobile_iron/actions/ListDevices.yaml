name: List Devices
description: Get the list of al the devices at the system.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mobileiron#list_devices
integration_identifier: MobileIron
parameters:
-   name: Fields To Fetch
    default_value: ''
    type: string
    description: 'The values of the inserted fields will be fetched for a device(Has
        to be comma separated string), ex: ios.DeviceName,user.display_name,user.email_address,user.user_id'
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
