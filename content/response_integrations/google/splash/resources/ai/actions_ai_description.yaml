Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches URL and IP Address entities using the Splash rendering service. This
    action interacts with a Splash instance to process entities, retrieve metadata,
    and optionally capture visual screenshots, redirection history, and HTTP Archive
    (HAR) data. It is primarily used to gain visibility into the content and behavior
    of web-based indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Create Insight | Boolean | No | True | If enabled, the action creates a case-level
    insight containing the retrieved information about the entity. |

    | Include PNG Screenshot | Boolean | No | True | If enabled, includes a PNG screenshot
    of the rendered page within the insight. Note: This requires 'Create Insight'
    to be enabled. |

    | Include History | Boolean | No | False | If enabled, the action retrieves and
    includes the redirection history for the URL. |

    | Include HAR | Boolean | No | False | If enabled, the action retrieves and includes
    HTTP Archive (HAR) information for the session. |


    ### Additional Notes

    - **URL Normalization:** For IP Address entities or URLs missing a schema, the
    action automatically prepends `https://` before sending the request to Splash.

    - **Attachments:** Regardless of the 'Create Insight' parameter, the action attempts
    to add the rendered PNG as an entity attachment.


    ### Flow Description

    1. **Filter Entities:** Identifies supported entities (URL and IP Address) from
    the current context.

    2. **Normalization:** Ensures every identifier has a valid URI schema (defaulting
    to HTTPS).

    3. **Data Retrieval:** Calls the Splash API's `/render.json` endpoint with the
    specified parameters (history, HAR, and PNG rendering).

    4. **Internal Enrichment:** Updates the entity's additional properties with metadata
    such as the final URL, page title, and redirection status.

    5. **Evidence Collection:** Adds a CSV table of the results to the entity and
    attaches the rendered PNG file to the entity record.

    6. **Case Reporting:** If configured, generates a formatted Case Insight and updates
    the global entity state in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with enrichment data, attaches PNG screenshots
      to entities, and creates case-level insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Splash server to ensure that the integration configuration
    parameters (API Root and SSL verification) are correct and the service is reachable.
    This action is primarily used for health checks and troubleshooting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Splash instance used for API requests.
    |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    for the connection to the Splash server. |


    ### Additional Notes

    There are no action-specific parameters; the action relies entirely on the integration's
    global configuration settings. This action does not process or require any entities.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the 'API Root' and 'Verify
    SSL' parameters from the integration configuration.

    2. **Manager Initialization**: Initializes the `SplashManager` with the retrieved
    connection details.

    3. **Connectivity Check**: Executes a GET request to the `/_ping` endpoint of
    the Splash service.

    4. **Response Validation**: Validates the HTTP response. If the service is reachable
    and returns a successful status code, the action completes successfully.

    5. **Error Handling**: If the connection fails or the service returns an error,
    the action captures the exception and reports a failure status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
