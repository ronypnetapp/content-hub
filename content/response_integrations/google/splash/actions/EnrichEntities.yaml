name: Enrich Entities
description: 'Enrich entities using information from Splash. Supported entities: URL,
    IP Address. Note: URLs need to have a schema. For IP addresses, action will add
    the “HTTPS” schema.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splash#enrich_entities
integration_identifier: Splash
parameters:
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the entity.
    is_mandatory: false
-   name: Include PNG Screenshot
    default_value: true
    type: boolean
    description: 'If enabled, action will return a PNG screenshot in an insight. Note:
        “Create Insight” should be enabled for this parameter to work.'
    is_mandatory: false
-   name: Include History
    default_value: false
    type: boolean
    description: If enabled, action will return history information.
    is_mandatory: false
-   name: Include HAR
    default_value: false
    type: boolean
    description: If enabled, action will return HAR information.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL", "ADDRESS"]}'
