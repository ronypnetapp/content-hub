    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Micro Focus ITSMA instance.
    This action is used to verify that the integration configuration parameters, such
    as API Root, Username, Password, and Tenant ID, are correctly configured and that
    the external system is reachable.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration's global
    configuration settings, including the API Root, credentials, and Tenant ID.

    2. **Manager Initialization**: Initializes the `MicroFocusITSMAManager` using
    the retrieved configuration.

    3. **Authentication Check**: Executes the `get_token` method, which sends a POST
    request to the Micro Focus ITSMA authentication endpoint to retrieve a session
    token.

    4. **Connection Validation**: Evaluates whether a token was successfully returned
    by the external service.

    5. **Action Completion**: Reports 'Connection Established' if the token retrieval
    was successful, or 'Connection Failed' otherwise.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
