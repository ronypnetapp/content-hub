Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Site24x7 service. It ensures that the provided integration parameters
    (API Root, Client ID, Client Secret, and Refresh Token) are valid and that the
    network connection is functional.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Site24x7 instance (e.g., `https://www.site24x7.com`).
    |

    | **Client ID** | String | Yes | The OAuth2 Client ID generated from the Zoho
    API Console. |

    | **Client Secret** | String | Yes | The OAuth2 Client Secret generated from the
    Zoho API Console. |

    | **Refresh Token** | String | Yes | The OAuth2 Refresh Token used to obtain access
    tokens for API calls. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the Site24x7 server. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection details from
    the integration configuration.

    2. **Manager Initialization**: It initializes the `Site24x7Manager`, which triggers
    an OAuth2 authentication flow to generate a temporary access token using the provided
    `Client ID`, `Client Secret`, and `Refresh Token`.

    3. **Connectivity Test**: The action performs a `GET` request to the `/api/monitors`
    endpoint of the Site24x7 API.

    4. **Validation**: If the API responds with a successful status code and no internal
    error messages, the action completes successfully, confirming the integration
    is correctly configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
