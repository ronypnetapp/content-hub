name: Site24x7 - Alerts Log Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: eventType
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://www.site24x7.{region}
    type: string
    description: "API root of the Site24x7 instance. Possible api roots:\n United\
        \ States\n https://www.site24x7.com\n Europe\n https://www.site24x7.eu\n China\n\
        \ https://www.site24x7.cn\n India\n https://www.site24x7.in\n Australia\n\
        \ https://www.site24x7.net.au"
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Refresh Token
    default_value: ''
    type: password
    description: Site24x7 Refresh token. You can generate this token using action
        "Get Refresh Token".
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client ID of the Site24x7 instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Client Secret of the Site24x7 instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Site24x7 server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: 1
    type: integer
    description: Number of days before the first connector iteration to retrieve alert
        logs from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alert Logs To Fetch
    default_value: 10
    type: integer
    description: 'How many alert logs to process per one connector iteration. Default:
        100.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Disable Overflow
    default_value: true
    type: boolean
    description: If enabled, connector will ignore the overflow mechanism.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull information about alert logs from Site24x7.
integration: Site24x7
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/site24x7#site-24-x7-alerts-log-connector
rules: []
is_connector_rules_supported: false
creator: admin
