name: Generate Refresh Token
description: Generate a refresh token needed for Integration configuration. Please
    refer to the documentation portal for more details.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/site24x7#generate_refresh_token
integration_identifier: Site24x7
parameters:
-   name: Authorization Code
    default_value: ''
    type: password
    description: Specify the authorization code.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/generate_refresh_token_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
