Change Policy Enforcement Mode:
  ai_description: >-
    Changes the enforcement mode of a specific security policy within F5 Big-IQ. This
    action is used to programmatically switch policies between modes such as 'blocking'
    or 'transparent' to control how traffic is handled by the security appliance.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Policy ID | String | Yes | The unique identifier of the policy to be modified.
    |

    | Enforcement Mode | String | Yes | The target enforcement mode to apply (e.g.,
    'blocking', 'transparent'). |


    ### Flow Description

    1. **Authentication**: The action authenticates with the F5 Big-IQ server using
    the provided credentials and obtains an authentication token.

    2. **Parameter Extraction**: Retrieves the 'Policy ID' and 'Enforcement Mode'
    from the action parameters.

    3. **API Request**: Executes a PATCH request to the F5 Big-IQ REST API endpoint
    for the specified policy ID, updating the `enforcementMode` field with the new
    value.

    4. **Completion**: Returns a success status and an informative message to the
    Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the 'enforcementMode' attribute of a security policy on the F5 Big-IQ
      appliance via a PATCH request.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
