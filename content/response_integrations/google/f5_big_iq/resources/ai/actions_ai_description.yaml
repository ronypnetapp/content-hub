Get Event Logs By Blocking ID:
  ai_description: >-
    ### General Description

    The **Get Event Logs By Blocking ID** action retrieves detailed event logs from
    an F5 Big-IQ system associated with a specific Blocking ID (also referred to as
    a Support ID in F5 ASM). This action allows security analysts to fetch the full
    context of a blocked request, including violation details, directly into Google
    SecOps for investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Blocking ID | String | Yes | The unique identifier (Support ID) generated by
    F5 ASM for a specific blocked or logged event. |


    ### Flow Description

    1. **Authentication**: The action establishes a session with the F5 Big-IQ server
    using the configured credentials and retrieves an authentication token.

    2. **Log Retrieval**: It executes a search query against the F5 Big-IQ ASM index
    (`asmindex`) specifically filtering for the provided `Blocking ID`.

    3. **Data Processing**: The action parses the JSON response from the F5 API.

    4. **Output**: If matching logs are found, they are added to the action's JSON
    results. If no logs are found, the action completes with a negative result status.
  capabilities:
