Delete Sample:
  ai_description: >-
    ### General Description

    The **Delete Sample** action allows security analysts to remove specific file
    samples from a Reversinglabs A1000 appliance. This operation is destructive, as
    it deletes the sample file itself along with all related metadata and extracted
    data associated with that file hash on the appliance.


    ### Parameters Description

    There are no user-configurable parameters for this action. It operates directly
    on the entities provided in the context.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Reversinglabs
    A1000 appliance using the API Root, Username, and Password provided in the integration
    configuration.

    2. **Entity Filtering**: The script iterates through the target entities in the
    current scope and identifies those of type `FILEHASH`.

    3. **Deletion Request**: For each identified file hash, the action sends a `DELETE`
    request to the A1000 API endpoint (`/api/samples/{hash}/`).

    4. **Result Tracking**: The action monitors the API response. If the status code
    is 200, the hash is added to a list of successfully deleted items.

    5. **Final Output**: The action concludes by providing a summary message of the
    deleted hashes and sets the action's result value to `True` if at least one deletion
    was successful, or `False` otherwise.


    ### Additional Notes

    * This action is irreversible. Once a sample is deleted from the A1000 appliance,
    its analysis data cannot be recovered unless the file is re-uploaded.

    * The action converts all hash identifiers to lowercase before sending the request
    to ensure compatibility with the A1000 API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes file samples, extracted data, and associated metadata from the Reversinglabs
      A1000 appliance via a DELETE API request.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Report:
  ai_description: >-
    ### General Description

    The **Get Report** action retrieves a comprehensive classification summary and
    detailed analysis for file samples from a ReversingLabs A1000 Malware Analysis
    appliance using their hash values. This action is designed to enrich file hash
    entities with threat intelligence, providing critical data points such as threat
    status, malware names, threat levels, and trust factors.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action iterates through all entities in the current
    context and filters for those of type `FILEHASH`.

    2. **API Authentication**: It initializes the ReversingLabs A1000 client using
    the integration's configured API Root, Username, and Password to obtain an authorization
    token.

    3. **Data Retrieval**: The action sends a batch request to the A1000 `/api/samples/list/`
    endpoint, passing the collected hash values and requesting specific fields including
    `threat_status`, `threat_level`, `threat_name`, and `trust_factor`.

    4. **Result Processing**: For each hash that returns a report, the action flattens
    the dictionary and generates a dedicated data table on the case wall for that
    specific hash.

    5. **Output**: The action concludes by attaching the complete raw JSON response
    to the execution results, allowing for further automated analysis or logic in
    the playbook.


    ### Additional Notes

    This action is strictly read-only regarding the external ReversingLabs system.
    It queries existing reports and does not trigger new file uploads or analysis
    tasks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds detailed classification data tables to the case wall for each
      processed file hash and attaches the raw JSON results to the action output.
  categories:
    enrichment: true
  entity_usage:
