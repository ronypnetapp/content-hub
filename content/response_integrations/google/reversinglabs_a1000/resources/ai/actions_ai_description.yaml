Upload File:
  ai_description: >-
    ### General Description

    Uploads a file from a specified local path to the ReversingLabs A1000 appliance
    for automated malware analysis. This action is used to submit samples that are
    not yet present in the A1000 environment to retrieve detailed threat intelligence,
    including classification, threat level, and trust factors.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The full local path to the file on the system where
    the agent is running that should be uploaded for analysis. |


    ### Flow Description

    1. **Authentication**: Connects to the ReversingLabs A1000 appliance using the
    configured API credentials.

    2. **File Upload**: Submits the file located at the provided 'File Path' to the
    A1000 `/api/uploads/` endpoint.

    3. **Processing Wait**: Enters a polling loop, checking the processing status
    of the uploaded file's SHA1 hash until the status is marked as 'processed'.

    4. **Report Retrieval**: Fetches the summary classification report for the file
    once processing is complete.

    5. **Data Output**: Formats the analysis results into a data table ('File Details:')
    and attaches the full JSON response to the action results.


    ### Additional Notes

    This action does not run on SecOps entities; it requires a direct file path as
    input. It is a synchronous action that will wait (block) until the A1000 appliance
    finishes analyzing the file.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a new file sample to the ReversingLabs A1000 appliance, which creates
      a new analysis record in the external system.
