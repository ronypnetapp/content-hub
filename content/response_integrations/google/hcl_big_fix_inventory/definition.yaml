identifier: HCLBigFixInventory
name: HCL BigFix Inventory
parameters:
-   name: API Root
    default_value: https://{{ip address}}:9081
    type: string
    description: API root of the HCL BigFix Inventory instance.
    is_mandatory: true
    integration_identifier: HCLBigFixInventory
-   name: API Token
    default_value: ''
    type: password
    description: API Token of the HCL BigFix Inventory account.
    is_mandatory: true
    integration_identifier: HCLBigFixInventory
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        HCL BigFix Inventory server is valid.
    is_mandatory: true
    integration_identifier: HCLBigFixInventory
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/hcl-bigfix-inventory
categories:
- Asset Management
svg_logo_path: resources/logo.svg
image_path: resources/image.png
