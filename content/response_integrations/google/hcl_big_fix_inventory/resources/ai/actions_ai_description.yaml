Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information retrieved from HCL
    BigFix Inventory. This action queries the BigFix Inventory API to find matching
    computer records and populates the entity's context with hardware, software, and
    health details. It helps analysts understand the state of a device, including
    its OS, last scan time, and disk space status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Custom Fields | String | No | A comma-separated list of additional fields to
    be returned from the BigFix Inventory API in addition to the default set. |

    | Create Insight | Boolean | No | If set to `true` (default), the action will
    create a detailed insight on the entity containing the retrieved information.
    |


    ### Additional Notes

    - The action uses a prefix `HCLBigFixInv` for all enriched entity attributes.

    - Supported entity types are Hostname and IP Address.


    ### Flow Description

    1. **Initialization**: The action initializes the HCL BigFix Inventory manager
    using the provided API Root, Token, and SSL configuration.

    2. **Connectivity Check**: Performs a test connectivity call to ensure the API
    is reachable.

    3. **Entity Filtering**: Identifies all Hostname and IP Address entities within
    the current context.

    4. **Data Retrieval**: For each entity, it queries the `/api/sam/v2/computers`
    endpoint using the entity's identifier (IP or Hostname) as criteria.

    5. **Enrichment**: If a matching device is found:
        - Updates the entity's `additional_properties` with device metadata.
        - Sets the entity's `is_enriched` status to `true`.
        - Adds a data table to the entity containing key device metrics.
        - Optionally creates an entity insight if the `Create Insight` parameter is
    enabled.
    6. **Finalization**: Updates the entities in Google SecOps and returns a summary
    message and JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional_properties), sets the enriched status,
      and adds insights and data tables to the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the HCL BigFix Inventory server. It ensures that the integration configuration
    parameters, such as the API Root and API Token, are correct and that the server
    is reachable. This is typically used during the initial setup or for troubleshooting
    connection issues.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration parameters:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the HCL BigFix Inventory API. |

    | API Token | String | Yes | The authentication token used to authorize requests.
    |

    | Verify SSL | Boolean | Yes | Determines whether to validate the SSL certificate
    of the server. |


    ### Additional Notes

    - This action does not process any entities.

    - It performs a simple GET request to the `/api/sam/about` endpoint to validate
    the connection.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, API Token, and
    SSL verification settings from the integration's configuration.

    2. **Manager Initialization:** It initializes the `HCLBigFixInventoryManager`
    with the retrieved credentials.

    3. **Connectivity Test:** The manager executes a GET request to the HCL BigFix
    Inventory 'about' endpoint.

    4. **Result Handling:** If the request is successful (HTTP 200), the action returns
    a success status. If an error occurs (e.g., authentication failure or network
    timeout), it catches the exception and reports a failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
