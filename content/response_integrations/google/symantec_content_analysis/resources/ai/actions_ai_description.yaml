Get Hash Report:
  ai_description: >-
    ### General Description

    Enriches File Hash entities by retrieving sample reports from Symantec Content
    Analysis. This action supports both MD5 and SHA256 hash types, providing detailed
    sample information in a tabular format and updating the entity's metadata within
    Google SecOps.


    ### Parameters

    There are no specific action parameters for this action. It relies on the global
    integration configuration (API Root, API Key, and Verify SSL).


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `FILEHASH` entities within
    the current context.

    2. **Hash Validation**: For each entity, it validates the hash type based on string
    length (32 characters for MD5, 64 characters for SHA256).

    3. **Data Retrieval**: It performs a GET request to the Symantec Content Analysis
    API to fetch sample data associated with the specific hash.

    4. **Data Attachment**: If a report is found, the action converts the results
    into a CSV format and attaches it as an entity table.

    5. **Internal Enrichment**: The raw JSON response is mapped to the entity's 'additional_properties'
    field.

    6. **Entity Update**: Finally, the action updates the entities in the case to
    persist the enriched data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with the retrieved hash report and adds
      a data table to the entity in the SOAR.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Symantec Content Analysis server. It ensures that the provided
    API Root and API Key are valid and that the network path is open.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (API Root, API Key, and Verify SSL).


    ### Additional Notes

    - This action is typically used during the initial setup or troubleshooting of
    the Symantec Content Analysis integration.

    - According to standard SOAR practices, Ping actions are not categorized as enrichment
    actions.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration's global settings,
    including the API Root, API Key, and SSL verification preference.

    2. **Manager Initialization**: It initializes the `SymantecContentAnalysisManager`
    with the retrieved credentials.

    3. **Connectivity Test**: The manager executes a `GET` request to the `rapi/pattern_groups`
    endpoint of the Symantec Content Analysis API.

    4. **Validation**: The action validates the HTTP response. If the status code
    indicates success, it confirms the connection.

    5. **Result Reporting**: The action outputs 'Connection Established' on success
    or 'Connection Failed' if an error occurs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
