    filters_by_modification_time: false
Submit File:
  ai_description: "### General Description\nThis action uploads a file from a specified\
    \ local path to Symantec Content Analysis for security scanning and reputation\
    \ analysis. It is used to determine if a file is malicious or suspicious by leveraging\
    \ Symantec's analysis engine. The action retrieves a reputation score and provides\
    \ immediate feedback within the case.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| File Path\
    \ | String | Yes | The full local path to the file that should be uploaded and\
    \ scanned. |\n\n### Flow Description\n1. **Configuration Retrieval**: The action\
    \ initializes the Symantec Content Analysis manager using the provided API Root\
    \ and API Key.\n2. **File Submission**: It reads the file from the provided `File\
    \ Path` and performs a POST request to the Symantec `rapi/cas/scan` endpoint.\n\
    3. **Score Extraction**: The action waits for the scan results (with a 5-minute\
    \ timeout) and extracts the `file_reputation_score` from the API response.\n4.\
    \ **Insight Creation**: \n    * If the score is between 2 and 6, a 'File Found\
    \ as Suspicious' insight is created.\n    * If the score is between 7 and 10,\
    \ a 'File Found as Malicious' insight is created.\n5. **Completion**: The action\
    \ ends by returning the reputation score and a summary message to the Google SecOps\
    \ workbench."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights in Google SecOps based on the reputation score returned
      by the Symantec Content Analysis scan.
  categories:
    enrichment: true
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
