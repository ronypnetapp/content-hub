Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Portnox instance. This action
    verifies that the provided credentials (Username, Password) and the API Root URL
    are correct and that the service is reachable. It serves as a health check to
    ensure the integration is properly configured and functional.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connection issues. It does not interact with any entities or modify
    any data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root, Username, Password,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: A `PortnoxManager` instance is initialized with
    the retrieved configuration.

    3. **Connectivity Test**: The action calls the `test_conectivity` method, which
    performs a GET request to the `/auth/user` endpoint of the Portnox API.

    4. **Response Validation**: The manager validates the API response to ensure successful
    authentication and connectivity.

    5. **Action Completion**: If the connection is successful, the action ends with
    a success message and a result value of `true`.
