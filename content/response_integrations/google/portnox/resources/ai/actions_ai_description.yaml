Revalidate Device:
  ai_description: >-
    ### General Description

    Revalidates a device's policy within the Portnox Network Access Control (NAC)
    system. This action is used to force a security posture check or policy re-evaluation
    for a specific device managed by Portnox, ensuring it complies with current network
    security requirements.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceId | String | Yes | The unique identifier of the device in Portnox that
    needs to be revalidated. |


    ### Additional Notes

    This action does not run on SecOps entities automatically; it requires a specific
    `DeviceId` provided as an input parameter. The action includes a polling mechanism
    that waits for the external system to confirm the revalidation is complete before
    finishing.


    ### Flow Description

    1. **Initialization**: Retrieves Portnox API credentials and the `DeviceId` from
    the action parameters.

    2. **Trigger Revalidation**: Sends a POST request to the Portnox API to initiate
    the revalidation process for the specified device.

    3. **Status Polling**: Enters a loop that periodically fetches the device's information
    from Portnox to monitor its `securityStatus`.

    4. **Completion**: The action concludes successfully once the device status changes
    to 'AuthorizationPassed'. If the status does not update within the timeout period,
    an error is raised.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a device policy revalidation process in Portnox NAC, which initiates
      a state change/security check on the target device.
    fetches_data: true
    internal_data_mutation_explanation: null
