Enrich Device:
  ai_description: "### General Description\nEnriches IP Address and MacAddress entities\
    \ with comprehensive device information retrieved from Portnox. This action helps\
    \ analysts gain visibility into device details such as security status, location,\
    \ and history directly within the Google SecOps platform by mapping Portnox device\
    \ data to entity attributes.\n\n### Parameters Description\nThere are no parameters\
    \ for this action.\n\n### Flow Description\n1. **Initialization**: The action\
    \ establishes a connection to the Portnox API using the integration's configuration\
    \ (API Root, Username, Password, and SSL verification settings).\n2. **Entity\
    \ Processing**: The action iterates through the target entities provided in the\
    \ context.\n3. **Device Search**: \n    - For **IP Address** entities, it searches\
    \ Portnox for a device matching the IP.\n    - For **MacAddress** entities, it\
    \ searches Portnox for a device matching the MAC address.\n4. **Data Transformation**:\
    \ If a device is found, the action flattens the resulting JSON data and adds a\
    \ 'Portnox' prefix to all keys to ensure clear data provenance.\n5. **Internal\
    \ Enrichment**: The action updates the entity's `additional_properties` with the\
    \ flattened device data and sets the `is_enriched` flag to `True`.\n6. **Final\
    \ Update**: The action commits the enriched data back to Google SecOps using the\
    \ `update_entities` method and provides a summary message of the enriched entities.\n\
    \n### Additional Notes\n- While the action uses a `POST` request to the `/devices`\
    \ endpoint for searching, this is a read-only query operation and does not modify\
    \ the state of the device in Portnox."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of the entities with device information
      retrieved from Portnox and sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
