Get User History:
  ai_description: >-
    ### General Description

    This action retrieves the user authentication history for specific devices from
    Portnox. It targets entities of type IP Address or MAC Address, searches for the
    corresponding device in the Portnox system, and fetches a detailed log of users
    who have authenticated on that device. The results are presented as a CSV-formatted
    data table attached to the entity within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the integration configuration. |


    ### Additional Notes

    * The action relies on the integration's global configuration for API credentials
    and connectivity.

    * If multiple devices match a search criteria in Portnox, the action defaults
    to the first device returned by the API.


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the Portnox API
    using the configured API Root, Username, and Password.

    2. **Entity Filtering**: It iterates through the target entities, specifically
    looking for `ADDRESS` (IP) and `MacAddress` types.

    3. **Device Search**: For each supported entity, it queries Portnox to find a
    matching device ID based on the IP or MAC address.

    4. **History Retrieval**: If a device is found, the action calls the Portnox API
    to fetch the `userHistory` for that specific device ID.

    5. **Data Transformation**: The retrieved JSON history data is converted into
    a CSV format.

    6. **Internal Enrichment**: The CSV data is added as an entity-specific data table
    in Google SecOps, and the entity is marked as updated.

    7. **Completion**: The action returns a summary message listing all entities for
    which authentication history was successfully retrieved.
