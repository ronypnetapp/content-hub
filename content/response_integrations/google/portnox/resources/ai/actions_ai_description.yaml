Get Installed Applications:
  ai_description: >-
    ### General Description

    The **Get Installed Applications** action retrieves a comprehensive list of all
    software applications installed on a specific device managed by Portnox. This
    action provides visibility into the software inventory of endpoints, which is
    essential for security audits and compliance monitoring. It supports both IP Address
    and MAC Address entities.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - The action identifies devices in Portnox using either their IP Address or MAC
    Address.

    - The retrieved application list is attached to the entity as a data table in
    CSV format.


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Portnox API using the configured
    credentials.

    2. **Entity Filtering**: Iterates through the target entities, focusing on IP
    Address and MAC Address types.

    3. **Device Search**: Queries Portnox to find a device record matching the entity's
    identifier.

    4. **Inventory Retrieval**: If a match is found, the action fetches the list of
    installed applications for that device.

    5. **Data Enrichment**: Formats the application list as a CSV and attaches it
    to the entity as a data table.

    6. **Entity Update**: Updates the entities within the Google SecOps case to include
    the new information.
