Revalidate Device By Address:
  ai_description: >-
    ### General Description

    The **Revalidate Device By Address** action triggers a revalidation of the authentication
    policy for devices connected to the Portnox NAC (Network Access Control) system.
    It identifies devices using their IP address or MAC address and forces the system
    to re-evaluate their security posture or authorization status. This is typically
    used to ensure a device still complies with network policies after a change in
    its behavior or environment.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    Portnox integration configuration (API Root, Username, Password, and SSL verification).


    ### Flow Description

    1. **Entity Filtering**: The action iterates through the target entities in the
    current scope, specifically looking for `ADDRESS` (IP) and `MacAddress` types.

    2. **Device Search**: For each valid entity, it queries the Portnox API to find
    a matching device record using the identifier.

    3. **Trigger Revalidation**: If a device is found, the action sends a POST request
    to Portnox to initiate the revalidation process for that specific device ID.

    4. **Status Polling**: The action then waits for the revalidation to complete
    by polling the device's security status until it reaches the 'AuthorizationPassed'
    state or times out.

    5. **Reporting**: Finally, it provides a summary message listing all entities
    whose associated devices were successfully revalidated.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a revalidation action in Portnox NAC, which forces a device to undergo
      authentication and authorization checks again, potentially changing its access
      status on the network.
