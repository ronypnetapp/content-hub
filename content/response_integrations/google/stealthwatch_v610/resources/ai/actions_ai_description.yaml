Search Flows:
  ai_description: "### General Description\nThe **Search Flows** action retrieves\
    \ network flow records from Cisco Stealthwatch (Secure Network Analytics) for\
    \ specific IP address entities. It identifies flows where the target entity acts\
    \ as either the source or the destination within a user-defined timeframe. This\
    \ action is primarily used for network forensics and visibility, allowing analysts\
    \ to see which internal or external hosts an IP has been communicating with.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Timeframe** | Integer | Yes | The number of\
    \ hours to look back from the current time (e.g., 3) to define the search window.\
    \ |\n| **Limit** | Integer | Yes | The maximum number of flow records to retrieve\
    \ for each search (source and destination). |\n\n### Flow Description\n1. **Initialization**:\
    \ The action retrieves the integration configuration (API Root, credentials) and\
    \ the user-provided parameters: `Timeframe` and `Limit`.\n2. **Time Calculation**:\
    \ It calculates the `start_time` and `end_time` in ISO format based on the current\
    \ UTC time and the `Timeframe` parameter.\n3. **Domain Identification**: For each\
    \ IP address entity, the action queries the Stealthwatch API to find the `domain_id`\
    \ associated with that specific IP.\n4. **Flow Searching**: For each valid domain\
    \ found, the action initiates two separate asynchronous search queries:\n    *\
    \ A search for flows where the entity is the **source IP**.\n    * A search for\
    \ flows where the entity is the **destination IP**.\n5. **Data Retrieval**: The\
    \ action polls the Stealthwatch API for the status of the search jobs. Once completed,\
    \ it retrieves the flow results up to the specified `Limit`.\n6. **Enrichment\
    \ and Output**: \n    * The raw flow data is attached to the action results as\
    \ a JSON object.\n    * A flattened CSV table of the flows is created and attached\
    \ as an **Entity Table** for the specific IP address.\n7. **Completion**: The\
    \ action concludes by listing the entities for which flows were successfully identified\
    \ and retrieved."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
