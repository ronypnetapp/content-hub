Unblock IP:
  ai_description: "### General Description\nUnblocks specific IP address entities\
    \ within McAfee Network Security Manager (NSM). This action identifies the firewall\
    \ rule objects associated with the target IP addresses, removes the IPs from those\
    \ rules (or deletes the rule object if it contains only that IP), and then triggers\
    \ a configuration deployment to the relevant sensors to apply the changes.\n\n\
    ### Parameters Description\nThere are no parameters for this action.\n\n### Additional\
    \ Notes\n* This action requires a pre-configured 'Siemplify Policy Name' and a\
    \ list of 'Sensors' in the integration settings to know where to apply the unblocking\
    \ logic.\n* The action performs a 'Deploy Changes' operation at the end of the\
    \ process to ensure the firewall updates are active on the physical or virtual\
    \ sensors.\n\n### Flow Description\n1. **Initialization**: Connects to the McAfee\
    \ NSM API using provided credentials and configuration.\n2. **Entity Filtering**:\
    \ Identifies all `ADDRESS` entities within the current action scope.\n3. **Rule\
    \ Identification**: For each IP address, it searches for the corresponding rule\
    \ object within the specified Siemplify policy in NSM.\n4. **IP Removal**: \n\
    \    * If the rule object contains multiple IPs, it removes only the target IP.\n\
    \    * If the rule object contains only the target IP, it removes the rule object\
    \ from the policy and deletes the object entirely.\n5. **Deployment**: Triggers\
    \ a configuration update (`deploy_changes`) for all sensors defined in the integration\
    \ configuration to finalize the unblocking.\n6. **Cleanup**: Logs out of the NSM\
    \ session and reports the list of successfully unblocked entities."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes IP addresses from firewall rule objects, deletes empty rule objects,
      and updates sensor configurations to deploy changes in McAfee NSM.
    fetches_data: true
    internal_data_mutation_explanation: null
