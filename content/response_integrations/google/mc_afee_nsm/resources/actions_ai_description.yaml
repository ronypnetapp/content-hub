Ping:
  ai_description: >-
    Tests connectivity to the McAfee Network Security Manager (NSM) instance. This
    action validates the provided credentials and network reachability by attempting
    to establish an API session and immediately terminating it.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration configuration,
    including API Root, credentials, and Domain ID.

    2. **Authentication**: The `NsmManager` is initialized, which automatically attempts
    to authenticate with the NSM API to retrieve a session token via a GET request
    to the session endpoint.

    3. **Session Termination**: The action explicitly calls the `logout` method to
    close the established session using a DELETE request.

    4. **Result Reporting**: If the authentication and logout cycle completes without
    error, the action reports a successful connection.
