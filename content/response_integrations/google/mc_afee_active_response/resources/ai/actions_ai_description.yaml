Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the McAfee Active Response (MAR) fabric. This action
    verifies that the provided configuration parameters, such as Broker URLs, CA Bundle,
    Certificate, and Private Key, are correct and that a connection to the Data Exchange
    Layer (DXL) can be successfully established.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the integration
    setup. It does not interact with any entities or fetch security data.


    ### Flow Description

    1. **Retrieve Configuration**: The action fetches the necessary connection details
    (Broker URLs, CA Bundle, Certificate, and Private Key) from the integration settings.

    2. **Initialize Manager**: It initializes the `McAfeeActiveResponseManager` using
    the retrieved credentials.

    3. **Establish Connection**: The manager attempts to connect to the DXL fabric
    using the `dxlclient` library. The connection is established during the initialization
    phase of the manager.

    4. **Report Result**: If the connection is successful, the action ends with a
    'Connection Established' message and a success status.
