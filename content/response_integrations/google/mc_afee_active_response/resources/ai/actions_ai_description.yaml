Search:
  ai_description: "### General Description\nThis action performs a real-time search\
    \ across multiple collectors within McAfee Active Response (MAR) via the Data\
    \ Exchange Layer (DXL) fabric. It allows security analysts to query live endpoint\
    \ data\u2014such as running processes, file details, network connections, and\
    \ registry keys\u2014across the environment. The action supports complex filtering\
    \ to narrow down results based on specific collector attributes.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Collectors | String | Yes | A comma-separated list of MAR collectors\
    \ to query (e.g., `Processes,Files,NetworkFlow`). |\n| Filter Collector | String\
    \ | No | The specific collector name to which the filter should be applied. |\n\
    | Filter By | String | No | The specific field/output of the collector to filter\
    \ on (e.g., `name` for Processes). |\n| Filter Operator | String | No | The logical\
    \ operator for the filter. Supported values: `GreaterEqualThan`, `GreaterThan`,\
    \ `LessEqualThan`, `LessThan`, `Equals`, `Contains`, `StartWith`, `EndsWith`,\
    \ `Before`, `After`. |\n| Filter Value | String | No | The value to match against\
    \ the filtered field. |\n\n### Additional Notes\n* **Conditional Logic:** If the\
    \ `Filter Collector` parameter is provided, then `Filter By`, `Filter Operator`,\
    \ and `Filter Value` must also be configured for the search to execute correctly.\n\
    * This action does not target specific entities in the SOAR case; it is a global\
    \ search tool.\n\n### Flow Description\n1. **Initialization:** Establishes a connection\
    \ to the McAfee DXL fabric using the provided broker URLs and certificates.\n\
    2. **Parameter Parsing:** Retrieves the list of collectors and optional filter\
    \ criteria from the action configuration.\n3. **Search Execution:** Sends a search\
    \ request to the MAR client, specifying the projections (collectors) and conditions\
    \ (filters).\n4. **Data Processing:** If results are returned, the action flattens\
    \ the nested JSON output and extracts metadata such as hit counts and timestamps.\n\
    5. **Output Generation:** Results are attached to the case as a raw JSON object\
    \ and a formatted data table named \"Results\"."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
