Unblock Url API:
  ai_description: >-
    Unblocks one or more URLs by removing them from a specified API-managed category
    in Websense. This action allows for targeted unblocking via a parameter or bulk
    unblocking of URL entities present in the alert context. It interacts with the
    Websense Content Gateway API using a transaction-based approach (start, remove,
    commit).


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | CategoryName | String | Yes | The name of the API-managed category in Websense
    from which the URL(s) should be removed. |

    | URL | String | No | A specific URL to unblock. If provided, this takes precedence
    over entity processing. If omitted, the action processes all URL entities in the
    scope. |


    ### Additional Notes

    - This action only works with categories that are 'API managed' within Websense.

    - If the `URL` parameter is provided, the action will ignore any URL entities
    in the case and only process that specific URL.


    ### Flow Description

    1. **Initialization**: Connects to the Websense API using the provided root URL
    and credentials.

    2. **Target Identification**: Determines the list of URLs to unblock. It uses
    the `URL` parameter if provided; otherwise, it collects all entities of type `DestinationURL`
    from the current context.

    3. **Transaction Management**: For each URL, it obtains a unique Transaction ID
    from Websense to begin the modification process.

    4. **Removal Request**: Sends a request to Websense to delete the specific URL
    from the designated `CategoryName`.

    5. **Commit/Rollback**: If the removal request is successful, it commits the transaction
    to apply the changes. If any step fails, it attempts to roll back the transaction
    to maintain system integrity.

    6. **Final Reporting**: Returns a success status and a message listing the URLs
    that were successfully removed from the category.
