Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the **Websense** API. It ensures that the integration configuration, including
    the API Root and credentials, is valid and that the service is reachable over
    the network.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Websense server. Default is `False`. |


    ### Additional Notes

    This action does not process any entities and is strictly used for system health
    and configuration validation. It does not retrieve or modify any business data.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration configuration
    (API Root, Username, Password) and the 'Verify SSL' parameter.

    2. **Manager Initialization**: Initializes the `WebsenseAPIManager` with the retrieved
    credentials and SSL settings.

    3. **Connectivity Test**: Calls the `test_connectivity` method, which attempts
    to start a transaction (`_obtain_transaction_id`) and then immediately commits
    it (`_commit_changes`). This sequence verifies both authentication and write-permissions/API
    responsiveness.

    4. **Result Reporting**: Returns 'Connection Established' if the transaction cycle
    completes successfully, otherwise reports an error.
