Block Url API:
  ai_description: >-
    Blocks URLs in Websense by adding them to a specified API-managed category. This
    action interacts with the Websense Content Gateway API to perform a transactional
    update, ensuring that URLs are correctly categorized for blocking. It can process
    URLs provided directly as a parameter or automatically target URL entities present
    in the current Google SecOps context.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | CategoryName | String | Yes | The name of the API-managed category in Websense
    where the URLs should be added. |

    | Urls | String | No | A comma-separated list of URLs to block. If this parameter
    is left empty, the action will attempt to process all URL entities found in the
    context. |


    ### Flow Description

    1. **Initialization**: Retrieves Websense configuration (API Root, Credentials,
    SSL verification) and action parameters.

    2. **URL Identification**: Determines the list of URLs to process. It prioritizes
    the 'Urls' input parameter; if empty, it filters the case's target entities for
    those of type URL.

    3. **Transaction Management**: For each URL, the action communicates with the
    Websense API to obtain a unique Transaction ID.

    4. **Category Update**: Sends a request to add the specific URL to the designated
    category using the active Transaction ID.

    5. **Commitment**: Finalizes the change by committing the transaction. If the
    update fails at any stage, it attempts to roll back the transaction to maintain
    system integrity.

    6. **Reporting**: Summarizes the results, listing all successfully blocked URLs
    or indicating if no actions were taken.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds URLs to a specific category within the Websense Content Gateway, which
      changes the filtering policy and blocks access to those URLs.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - DestinationURL
