Get Category Urls API:
  ai_description: >-
    ### General Description

    The **Get Category Urls API** action retrieves a list of URLs associated with
    a specific API-managed category in Websense. This action is used to audit or verify
    the contents of custom categories created via the API, providing visibility into
    the specific web addresses assigned to them.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **CategoryName** | String | Yes | The name of the API-managed category for which
    you want to retrieve the URL list. |


    ### Additional Notes

    - This action does not run on entities; it is a standalone utility action.

    - It specifically targets categories that are managed via the Websense API.


    ### Flow Description

    1. **Configuration Initialization:** The action retrieves the Websense API root,
    credentials, and SSL verification settings from the integration configuration.

    2. **Parameter Extraction:** It captures the `CategoryName` provided by the user.

    3. **API Request:** The action calls the Websense API using a GET request to fetch
    the list of URLs associated with the specified category name.

    4. **Data Formatting:** The retrieved list of URLs is processed and a header is
    added for display purposes.

    5. **Output Generation:** The resulting list is added to the Google SecOps action
    results as a data table named 'Siemplify Websense Category URls'.
