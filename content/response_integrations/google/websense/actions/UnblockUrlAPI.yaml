name: Unblock Url API
description: Unblock URL in WebSense API category
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/websense#unblock_url_api
integration_identifier: Websense
parameters:
-   name: CategoryName
    default_value: ''
    type: string
    description: The API manage category name.
    is_mandatory: true
-   name: URL
    default_value: ''
    type: string
    description: The url to block.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
