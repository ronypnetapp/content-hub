  # Check whether target.resource is present.
  mutate{
    replace=>{
      "tmp_prd_id" => "%{token_target.resource.product_object_id}"
    }
    on_error => "no_prd_obj_id"
  }
  mutate{
    replace=>{
      "tmp_res_parent" => "%{token_target.resource.parent}"
    }
    on_error => "no_res_parent"
  }
  mutate{
