      "app_protocol_output" => "SMTP"
    }
  }
}
else if [app_protocol_src] in [ "53", "DNS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DNS"
    }
  }
}
else if [app_protocol_src] in [ "80", "8080", "HTTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTP"
    }
  }
}
else if [app_protocol_src] in [ "443", "HTTPS", "TLS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTPS"
    }
  }
}
else if [app_protocol_src] in [ "7400", "7401", "7402", "DDS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DDS"
    }
  }
}
else if [app_protocol_src] in [ "SMB", "SMBV1" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMB"
    }
  }
}
else if [app_protocol_src] in [
  "UNKNOWN_APPLICATION_PROTOCOL", "AFP", "APPC", "AMQP", "ATOM", "BEEP",
  "BITCOIN", "BIT_TORRENT", "CFDP", "COAP", "DEVICE_NET", "DHCP", "E_DONKEY",
  "ENRP", "FAST_TRACK", "FINGER", "FREENET", "FTAM", "GOPHER", "HL7", "H323",
  "IRCP", "KADEMLIA", "LDAP", "LPD", "MIME", "MODBUS", "MQTT", "NETCONF",
  "NFS", "NIS", "NNTP", "NTCIP", "NTP", "OSCAR", "PNRP", "QUIC", "RDP", "RELP",
  "RIP", "RLOGIN", "RPC", "RTMP", "RTP", "RTPS", "RTSP", "SAP", "SDP", "SIP",
  "SLP", "SNTP", "SSMS", "STYX", "TCAP", "TDS", "TOR", "TSP", "VTP", "WHOIS",
  "WEB_DAV", "X400", "X500", "XMPP", "IEC104", "DCERPC"
] {
  mutate {
    replace => {
      "app_protocol_output" => "%{app_protocol_src}"
    }
  }

} else {
  mutate {
    replace => {
      "app_protocol_output" => ""
    }
  }
}

    if [app_protocol_output] != "" {
      mutate {
        rename => {
          "app_protocol_output" => "token_network.application_protocol"
        }
      }
    }
    else {
      mutate {
        replace => {
          "token_target.application" => "%{app}"
        }
      }
    }
  }

  # Datatype conversion required for UDM validation.
  mutate {
    convert => {
      "dest_port" => "integer"
      "src_port" => "integer"
      "cpu_load_mhz" => "uinteger"
      "target_file_size" => "uinteger"
      "about_file_size" => "uinteger"
      "object_size" => "integer"
      "cpu_cores" => "uinteger"
      "cpu_mhz" => "integer"
      "mem" => "uinteger"
      "lease_time_second" => "uinteger"
      "bytes_in" => "uinteger"
      "bytes_out" => "uinteger"
      "dest_translated_port" => "integer"
      "src_translated_port" => "integer"
      "response_code" => "integer"
      "size" => "uinteger"
      "free_bytes" => "uinteger"
      "node_port" => "integer"
      "cvss" => "float"
      "ttl" => "uinteger"
    }
  }

  # Common field UDM mapping.

  # Principal
  # principal -> hostname
  mutate { replace => { "token_principal.hostname" => "%{principal_hostname}" } on_error => "_" }
  mutate { replace => { "token_principal.hostname" => "%{splunk_server_hostname}" } on_error => "_" }

  # principal -> asset_id
  mutate { replace => { "token_principal.asset_id" => "Image ID: %{image_id}" } on_error => "_" }

  # principal -> user -> userid
  mutate { replace => { "token_principal.user.userid" => "%{owner_id}" } on_error => "_" }

  # Target
  # target -> hostname
  mutate { replace => { "token_target.hostname" => "%{target_hostname}" } on_error => "_" }

  # target -> application
  mutate { replace => { "token_target.application" => "%{service}" } on_error => "_" }

  # target -> process -> pid
  mutate { replace => { "token_target.process.pid" => "%{os_pid}" } on_error => "_" }

  # target -> resouce -> resource_type (enum)
  if [dest_type] != ""{
    mutate { replace => { "token_target.resource.resource_type" => "%{dest_type}" } on_error => "_" }
  }

  # target -> resouce -> parent
  mutate { replace => { "token_target.resource.parent" => "%{result.parent_object}" } on_error => "_" }

  # target -> resouce -> product_object_id
  mutate { replace => { "token_target.resource.product_object_id" => "%{result.serial_num}" } on_error => "_" }

  # target -> file -> full_path
  mutate { replace => { "token_target.file.full_path" => "%{result.object_path}" } on_error => "object_path_not_set" }

  if [object_path_not_set] {
    mutate { replace => { "token_target.file.full_path" => "%{result.file_path}" } on_error => "_" }
  }

  # target -> registry -> registry_key
  mutate {
    replace => { "token_target.registry.registry_key" => "%{result.registry_key_name}" }
    on_error => "target_registry_key_not_present"
  }

  if [src_type] != ""{
    mutate{
      rename => {
        # principal -> resouce -> resource_type
        "src_type" => "token_principal.resource.resource_type"
      }
    }
  }

  if [direction] != ""{
    if [direction] in ["0","client-to-server"] {
      mutate {
        replace => {
          "token_network.direction" => "OUTBOUND"
        }
      }
    }
    else if [direction] in ["1","server-to-client"] {
      mutate {
        replace => {
          "token_network.direction" => "INBOUND"
        }
      }
    }else {
      mutate{
        rename => {
          # network -> direction
          "direction" => "token_network.direction"
        }
      }
    }
  }

  if [ttype] != ""{
    mutate{
      rename => {
        # security_result -> alert_state
        "ttype" => "security_result.alert_state"
      }
    }
  }

  if [no_dvc_ip] {
    for index , value in dvc {
      mutate {
        replace => {
          "_token" => "%{value}"
        }
        on_error => "_"
      }
      if index == 0 {
        mutate {
          replace => {
            "dvc_fields" => "%{_token}"
          }
          on_error => "_"
        }
      }
      else {
        mutate {
          replace => {
            "dvc_fields" => "%{dvc_fields},%{_token}"
          }
          on_error => "_"
        }
      }
    }

    if [dvc_fields] != "" {
      mutate{
        replace => {
          "principal_asset_hostname" => "%{dvc_fields}"
        }
        on_error => "_"
      }
    }

    mutate{
      replace => {
        "principal_asset_hostname" => "%{dvc}"
      }
      on_error => "asset_hostname_already_present"
    }
  }

  mutate {
    replace => {
      "token_principal.process.parent_process.product_specific_process_id" =>
      "guid:%{parent_process_guid}"
    }
    on_error => "parent_process_guid_not_found"
  }

  mutate {
    replace => {
      "token_principal.process.product_specific_process_id" =>
      "guid:%{process_guid}"
    }
    on_error => "process_guid_not_found"
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "Splunk"
      "event.idm.read_only_udm.metadata.product_name" => "CIM"
    }
    rename => {
      # Metadata
      "signature_id" => "event.idm.read_only_udm.metadata.product_event_type"
      "signature" => "event.idm.read_only_udm.metadata.description"
      "app_id" => "event.idm.read_only_udm.metadata.product_log_id"

      # Target
      # target -> port
      "node_port" => "token_target.port"
      "dest_port" => "token_target.port"

      # target -> nat_port
      "dest_translated_port" => "token_target.nat_port"

      # target -> user -> product_object_id
      "object_id" => "token_target.user.product_object_id"

      # target -> file -> size
      "target_file_size" => "token_target.file.size"
      "object_size" => "token_target.file.size"

      # target -> administrative_domain
      "dest_name" => "token_target.administrative_domain"
      "dest_nt_domain" => "token_target.administrative_domain"

      # target -> url
      "dest_url" => "token_target.url"

      # target -> registry -> registry_value_name
      "registry_value_name" => "token_target.registry.registry_value_name"

      # target -> registry -> registry_value_data
      "registry_value_data" => "token_target.registry.registry_value_data"

      # target -> location -> country_or_region
      "dest_zone" => "token_target.location.country_or_region"

      # target -> asset -> attribute -> creation_time
      "file_create_time" => "token_target.asset.attribute.creation_time"
      "description" => "security_result.description"

      # Principal
      # principal -> asset -> hostname
      "principal_asset_hostname" => "token_principal.asset.hostname"

      # principal -> asset -> hardware -> serial_number
      "serial" => "hardware.serial_number"

      # principal -> asset -> hardware -> cpu_number_cores
      "cpu_cores" => "hardware.cpu_number_cores"

      # principal -> asset -> hardware -> cpu_clock_speed
      "cpu_mhz" => "hardware.cpu_clock_speed"

      # principal -> asset -> hardware -> ram
      "mem" => "hardware.ram"

      # principal -> asset -> hardware
      "cpu_load_mhz" => "hardware.cpu_clock_speed"

      # principal -> asset -> location -> country_or_region
      "dvc_zone" => "token_principal.asset.location.country_or_region"

      # principal -> asset -> platform_software -> platform_version
      "os" => "token_principal.asset.platform_software.platform_version"

      # principal -> process -> pid
      "process_id" => "token_principal.process.pid"

      # principal -> process -> parent_process.parent_pid
      "parent_process_id" => "token_principal.process.parent_process.parent_pid"

      # principal -> process -> parent_process -> command_line
      "parent_process_path" => "token_principal.process.parent_process.command_line"

      # principal -> resource -> parent
      "parent" => "token_principal.resource.parent"

      # principal -> port
      "src_port" => "token_principal.port"

      # principal -> nat_port
      "src_translated_port" => "token_principal.nat_port"

      # principal -> location -> country_or_region
      "src_zone" => "token_principal.location.country_or_region"

      # principal -> administrative_domain
      "src_nt_domain" => "token_principal.administrative_domain"
      "src_user_domain" => "token_principal.administrative_domain"

      # Src
      # src -> file -> full_path
      "original_file_name" => "event.idm.read_only_udm.src.file.full_path"

      # SecurityResult
      # security_result -> summary
      "reason" => "security_result.summary"

      # security_result -> action_details
      "action" => "security_result.action_details"
      "action_name" => "security_result.action_details"

      # security_result -> description
      "jvm_description" => "security_result.description"
      "error_code" => "security_result.description"
      "change_result" => "security_result.description"

      # security_result -> rule_version
      "signature_version" => "security_result.rule_version"

      # security_result -> rule_id
      "rule" => "security_result.rule_id"

      # security_result -> priority_details
      "priority" => "security_result.priority_details"

      # Observer
      # observer -> application
      "observer_application" => "event.idm.read_only_udm.observer.application"

      # About
      # about -> location -> country_or_region
      "vendor_region" => "about.location.country_or_region"

      # about -> hostname
      "machine" => "about.hostname"

      # about -> file -> size
      "free_bytes" => "about.file.size"
      "size" => "about.file.size"
      "about_file_size" => "about.file.size"

      # about -> resource -> name
      "tablespace_name" => "about.resource.name"
      "storage_name" => "about.resource.name"

      # about -> file -> full_path
      "service_dll_path" => "about.file.full_path"

      # about -> asset -> network_domain
      "url_domain" => "about.asset.network_domain"

      # about -> resource -> resource_type
      "cluster" => "about.resource.resource_type"

      # Extension
      # extnsion -> auth -> auth_details
      "authentication_service" => "event.idm.read_only_udm.extensions.auth.auth_details"

      # extension -> vulns -> vulnerabilities -> cve_description
      "cve" => "vulnerabilities.cve_description"

      # extension -> vulns -> vulnerabilities -> cvss_base_score
      "cvss" => "vulnerabilities.cvss_base_score"

      # Network
      # network -> tls -> client -> certifficate -> issuer
      "ssl_issuer" => "token_network.tls.client.certificate.issuer"

      # network -> tls -> client -> certifficate -> serial
      "ssl_serial" => "token_network.tls.client.certificate.serial"

      # network -> tls -> client -> certifficate -> subject
      "ssl_subject" => "token_network.tls.client.certificate.subject"

      # network -> tls -> client -> certifficate -> not_after
      "ssl_validity_window" => "token_network.client.certificate.not_after"

      # network -> tls -> client -> certifficate -> version
      "ssl_version" => "token_network.client.certificate.version"

      # network -> session_id
      "session_id" => "token_network.session_id"
      "ssl_session_id" => "token_network.session_id"

      # network -> email -> from
      "orig_src" => "token_network.email.from"

      # network -> dhcp -> lease_time_second
      "lease_time_second" => "token_network.dhcp.lease_time_second"

      # network -> received_bytes
      "bytes_in" => "token_network.received_bytes"

      # network -> sent_bytes
      "bytes_out" => "token_network.sent_bytes"

      # network -> dns -> additional -> ttl
      "ttl" => "add.ttl"

      # network -> http -> method
      "http_method" => "token_network.http.method"

      # network -> http -> referral_url
      "http_referrer" => "token_network.http.referral_url"

      # network -> http -> response_code
      "response_code" => "token_network.http.response_code"
    }
  }

  # Security Result Category Details
  mutate {
    merge => {
      "security_result.category_details" => "change_type"
    }
    on_error => "_"
  }

  mutate {
    merge => {
      "security_result.category_details" => "category"
    }
    on_error => "_"
  }


  # IP
  mutate {
    merge => {
      "token_target.ip" => "target_ip"
    }
    on_error => "target_ip_not_set"
  }

  mutate {
    merge => {
      "token_principal.ip" => "principal_ip"
    }
    on_error => "principal_ip_not_set"
  }

  mutate {
    merge => {
      "token_principal.ip" => "splunk_server_ip"
    }
    on_error => "splunk_server_ip_not_set"
  }

  # MAC
  mutate {
    merge => {
      "token_principal.mac" => "src_mac"
    }
    on_error => "principal_mac_not_present"
  }

  # User Roles
  if [user_type] != ""{
    mutate {
      replace => {
        "roles.type" => "%{user_type}"
      }
      on_error => "no_user_type"
    }
    if ![no_user_type] {
      if [splunk_tags] =~ "change" {
        mutate {
          replace => {
            "is_account" => "false"
          }
        }
        for index in tag {
          if [index] == "account" {
            mutate {
              replace => {
                "is_account" => "true"
              }
            }
          }
        }
        if [is_account] == "true" {
          mutate {
            merge => {
              "token_target.user.attribute.roles" => "roles"
            }
            on_error => "_"
          }
        }
        else {
          mutate {
            merge => {
              "token_principal.user.attribute.roles" => "roles"
            }
            on_error => "_"
          }
        }
      }
      else {
        mutate {
          merge => {
            "token_principal.user.attribute.roles" => "roles"
          }
          on_error => "_"
        }
      }
    }
    else {
      mutate {
        replace => {
          "roles.type" => "%{src_user_type}"
        }
        on_error => "no_src_user_type"
      }
      if ![no_src_user_type] {
        mutate {
          merge => {
            "token_principal.user.attribute.roles" => "roles"
          }
          on_error => "_"
        }
      }
    }
  }

  mutate {
    replace => {
      "roles.name" => "%{user_role}"
    }
    on_error => "user_role_data_not_available"
  }
  if [user_role_data_not_available] {
    mutate {
      replace => {
        "roles.name" => "%{src_user_role}"
      }
      on_error => "_"
    }
    mutate {
      merge => {
        "token_principal.user.attribute.roles" => "roles"
      }
      on_error => "_"
    }
  }
  else {
    mutate {
      merge => {
        "token_principal.user.attribute.roles" => "roles"
      }
      on_error => "_"
    }
  }

  mutate {
    merge => {
      "token_principal.user.group_identifiers" => "user_group"
    }
    on_error => "_"
  }

  # Asset
  mutate {
    merge => {
      "token_principal.asset.ip" => "ip"
    }
    on_error => "_"
  }

  mutate {
    merge => {
      "token_principal.asset.ip" => "principal_asset_ip"
    }
    on_error => "_"
  }

  grok{
    match => {
      "mac"=> ["%{MAC:mac}"]
    }
    overwrite => ["mac"]
    on_error => "invalid_mac"
  }

  if ![invalid_mac] {
    mutate {
      merge => {
        "token_principal.asset.mac" => "mac"
      }
      on_error => "_"
    }
  }

  grok{
    match => {
      "dvc_mac"=> "%{MAC:dvc_mac}"
    }
    overwrite => ["dvc_mac"]
    on_error => "invalid_dvc_mac"
  }

  if ![invalid_dvc_mac] {
    mutate {
      merge => {
        "token_principal.asset.mac" => "dvc_mac"
      }
      on_error => "_"
    }
  }

  mutate {
    merge => {
      "token_principal.asset.hardware" => "hardware"
    }
    on_error => "_"
  }

  # DHCP
  if [splunk_tags] =~ "dhcp" {
    mutate {
      replace => {
        "token_network.dhcp.chaddr" => "%{dest_mac}"
      }
      on_error => "chaddr_not_set"
    }
  }
  else {
    mutate {
      merge => {
        "token_target.mac" => "dest_mac"
      }
      on_error => "target_mac_not_present"
    }
  }

  # Nat ip
  mutate {
    merge => {
      "token_target.nat_ip" => "dest_translated_ip"
    }
    on_error => "_"
  }
  mutate {
    merge => {
      "token_principal.nat_ip" => "src_translated_ip"
    }
    on_error => "_"
  }

  # User Attribute
  mutate {
    replace => {
      "user_category_attribute.key" => "user_category"
      "user_category_attribute.value" => "%{user_category}"
    }
    on_error => "no_user_category"
  }
  if ![no_user_category] {
    mutate {
      merge => {
        "token_principal.user.attribute.labels" => "user_category_attribute"
      }
    }
  }

  mutate {
    replace => {
      "label.key" => "ticket_id"
      "label.value" => "%{ticket_id}"
    }
    on_error => "no_ticket_id"
  }
  if ![no_ticket_id] {
    mutate {
      merge => {
        "token_target.user.attribute.label" => "label"
      }
    }
  }

  mutate {
    replace => {
      "priority_attribute.key" => "user_priority"
      "priority_attribute.value" => "%{user_priority}"
    }
    on_error => "no_user_priority"
  }
  if ![no_user_priority] {
    mutate {
      merge => {
        "token_principal.user.attribute.labels" => "priority_attribute"
      }
      on_error => "_"
    }
  }

  # Resource Attribute
  mutate {
    replace => {
      "mount_attribute.key" => "mount"
      "mount_attribute.value" => "%{mount}"
    }
    on_error => "no_mount"
  }
  if ![no_mount] {
    mutate {
      merge => {
        "token_target.resource.attribute.labels" => "mount_attribute"
      }
      on_error => "_"
    }
  }

  mutate {
    replace => {
      "instance_attribute.key" => "instance_name"
      "instance_attribute.value" => "%{instance_name}"
    }
    on_error => "no_instance_name"
  }
  if ![no_instance_name] {
    mutate {
      merge => {
        "token_target.resource.attribute.labels" => "instance_attribute"
      }
      on_error => "_"
    }
  }

  mutate {
    replace => {
      "instance_attribute1.key" => "instance_version"
      "instance_attribute1.value" => "%{instance_version}"
    }
    on_error => "no_version"
  }
  if ![no_version] {
    mutate {
      merge => {
        "token_target.resource.attribute.labels" => "instance_attribute1"
      }
      on_error => "_"
    }
  }

  # Network Email
  mutate {
    merge => {
      "token_network.email.to" => "recipient"
    }
    on_error => "_"
  }

  mutate {
    merge => {
      "token_network.email.subject" => "subject"
    }
    on_error => "_"
  }

  # User Email
  mutate {
    merge => {
      "token_principal.user.email_addresses" => "email"
    }
    on_error => "email_not_set"
  }

  # Network DNS
  mutate {
    merge => {
      "token_network.dns.additional" => "add"
    }
    on_error => "_"
  }

  # Parsing timestamps required for UDM validation of client certificate and
  # user attribute fields.
  date {
    match => ["ssl_start_time","UNIX_MS", "ISO8601", "yyyy-MM-dd HH:mm:ss", "MM/dd/yyyy HH:mm:ss A", "RFC3339"]
    target => "token_network.tls.client.certificate.not_after"
    on_error => "_"
  }

  date {
    match => ["ssl_end_time","UNIX_MS", "ISO8601", "yyyy-MM-dd HH:mm:ss", "MM/dd/yyyy HH:mm:ss A", "RFC3339"]
    target => "token_network.tls.client.certificate.not_before"
    on_error => "_"
  }

  date {
    match => ["file_create_time","UNIX_MS", "ISO8601", "yyyy-MM-dd HH:mm:ss", "MM/dd/yyyy HH:mm:ss A", "RFC3339"]
    target => "token_target.user.attribute.creation_time"
    on_error => "_"
  }

  # ===========================================================================
  # UDM Validation:
  # To be as close as possible, we would validate the required fields for UDM
  # event type and if those fields are absent, map with GENERIC_EVENT. For
  # nested UDM fields, eg. principal.process.parent_process.pid, initialize and
  # check only those UDM fields which are used in the conf.

  # Check whether principal.ip is present.
  if ![principal_ip_not_set] or ![src_ip_not_set] or ![splunk_server_ip_not_set] {
    mutate {
      replace => { "principal_ip_present" => "true" }
    }
  }

  # Check whether target.ip is present.
  if ![dest_ip_not_set] or ![target_ip_not_set] {
    mutate {
      replace => { "target_ip_present" => "true" }
    }
  }

  # UDM User ID validation. Either of principal.user.userid/email_addresses/
