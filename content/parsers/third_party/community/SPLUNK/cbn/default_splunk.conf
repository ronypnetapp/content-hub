# Product: Splunk CIM
# Category: Security log
# Supported Format: JSON
# Reference: https://docs.splunk.com/Documentation/CIM/4.20.0/User/CIMfields
# Last Updated: 2024-05-01
# Copyright 2022 Chronicle LLC

filter {
  mutate {
    replace => {
      "token_principal" => ""
      "token_target" => ""
      "token_network" => ""
      "token_metadata" => ""
    }
  }
  # As the order of execution in replace stanza is not guaranteed to be
  # sequential, conf validation passes randomly. So in order to avoid that,
  # initialized above and below stanza separately.
  mutate {
    replace => {
      "question.name" => ""
      "user_type" => ""
      "direction" => ""
      "src_user_type" => ""
      "dest_type" => ""
      "src_type" => ""
      "ttype" => ""
      "splunk_tags" => ""
      "host_fields" => ""
      "dvc_fields" => ""
      # Flags
      "dest_ip_not_set" => "true"
      "target_mac_not_present" => "true"
      "src_user_not_email" => "true"
      "principal_ip_present" => "false"
      "target_ip_present" => "false"
      "principal_userid_present" => "false"
      "client_device_present" => "false"
      "target_device_present" => "false"
      "target_resource_present" => "false"
      "target_file_present" => "false"
      "no_duration" => "false"
      "invalid_mac" => "false"
      "invalid_dvc_mac" => "false"
      "no_user_id_found" => "false"
    }
  }

  mutate {
    convert => {
      "dest_ip_not_set" => "boolean"
      "target_mac_not_present" => "boolean"
      "src_user_not_email" => "boolean"
      "no_duration" => "boolean"
      "invalid_mac" => "boolean"
      "invalid_dvc_mac" => "boolean"
    }
  }

  # Remove syslog header, if present and extract JSON.
  grok {
    match => {
      "message" => ["([^{]+)?(?P<message>.*)"]
    }
    overwrite => ["message"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [not_json] {
    drop { tag => "TAG_MALFORMED_ENCODING" }
  }

  # Normalize splunk tags to "," seperated string.
  for index , value in tag {
    mutate {
      replace => {
        "_token" => "%{value}"
      }
      on_error => "_"
    }
    if index == 0 {
      mutate {
        replace => {
          "splunk_tags" => "%{_token}"
        }
        on_error => "_"
      }
    }
    else {
      mutate {
        replace => {
          "splunk_tags" => "%{splunk_tags},%{_token}"
        }
        on_error => "_"
      }
    }
  }

  if [splunk_tags] == ""{
    mutate{
      replace => {
        "splunk_tags" => "%{tag}"
      }
      on_error => "tag_not_found"
    }
  }

  # Parsing timestamps.
  mutate {
    convert => {
      "_time" => "string"
    }
    on_error => "already_string"
  }

  date {
    match => ["_time", "UNIX_MS", "ISO8601", "RFC3339"]
  }

  # Common Splunk field extractions and mapping.

  # Network -> Session Duration.
  grok {
    match => {
      "duration" => "%{GREEDYDATA:duration}"
    }
    overwrite => ["duration"]
    on_error => "no_duration"
  }
  if ![no_duration] {
    mutate {
      convert => {
        "duration" => "string"
      }
      on_error => "conversion_error"
    }

    date {
      match => ["duration", "UNIX"]
      target => "token_network.session_duration"
      on_error => "_invalid_format"
    }
  }

  # SecurityResult -> Action.
  grok {
    match => {
      "action" => "%{GREEDYDATA:action}"
    }
    overwrite => ["action"]
    on_error => "_action_not_set"
  }
  if [_action_not_set] {
    grok {
      match => {
        "rule_action" => "%{GREEDYDATA:action}"
      }
      overwrite => ["action"]
      on_error => "_action_not_set"
    }
  }

  if ![_action_not_set] {
    if [action] in ["success", "created", "started", "delivered", "allowed"] {
      mutate {
        replace => {
          "temp_action" => "ALLOW"
        }
      }
    }
    else if [action] in ["failure", "blocked", "teardown", "deferred",
    "deleted", "rejected", "dropped", "error"] {
      mutate {
        replace => {
          "temp_action" => "BLOCK"
        }
      }
    }
    else if [action] in ["acl_modified", "modified"] {
      mutate {
        replace => {
          "temp_action" => "ALLOW_WITH_MODIFICATION"
        }
      }
    }
    else if [action] == "quarantined" {
      mutate {
        replace => {
          "temp_action" => "QUARANTINE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "temp_action" => ""
        }
      }
    }

    if [temp_action] != "" {
      mutate {
        merge => {
          "security_result.action" => "temp_action"
        }
        on_error => "_"
      }
    }
  }

  # Extract and map src field to principal.ip/principal.hostname UDM if
  # more specific fields like src_ip are absent, otherwise, map to
  # principal.labels.key/value UDM.
  mutate {
    replace => {
      "principal_hostname" => "%{src_host}"
    }
    on_error => "src_host_not_set"
  }

  mutate {
    merge => {
      "token_principal.ip" => "src_ip"
    }
    on_error => "src_ip_not_set"
  }

  if [src_ip_not_set] {
    grok {
      match => {
        "src" => "%{IP:src}"
      }
      overwrite => ["src"]
      on_error => "src_not_ip"
    }
    if ![src_not_ip] {
      mutate {
        rename => {
          "src" => "principal_ip"
        }
      }
    }
    else if [src_host_not_set] {
      grok {
        match => {
          "src" => "%{HOSTNAME:src}"
        }
        overwrite => ["src"]
        on_error => "src_not_hostname"
      }
      if ![src_not_hostname] {
        mutate {
          replace => {
            "principal_hostname" => "%{src}"
          }
        }
      }
      else {
        mutate {
          replace => {
            "src.key" => "src"
            "src.value" => "%{src}"
          }
          on_error => "src_not_set"
        }
        if ![src_not_set] and [src] != "" {
          mutate {
            merge => { "token_principal.labels" => "src" }
          }

          mutate {
            replace => {
              "additional_src" => ""
            }
          }

          mutate {
            replace => {
              "additional_src.key" => "%{src.key}"
              "additional_src.value.string_value" => "%{src.value}"
            }
            on_error => "src_not_found"
          }

           if ![src_not_found] {
            mutate {
              merge => {
                "token_additional.fields" => "additional_src"
              }
            }
          }
        }
      }
    }
  }

  # Extract and map dest field to target.ip/target.hostname UDM if
  # more specific fields like dest_ip are absent, otherwise, map to
  # target.labels.key/value UDM.
  mutate {
    replace => {
      "target_hostname" => "%{dest_host}"
    }
    on_error => "dest_host_not_set"
  }

  if [splunk_tags] =~ "dhcp" {
    grok{
      match => {
        "dest_ip" => "%{IP:dest_ip}"
      }
      overwrite => ["dest_ip"]
      on_error => "no_ip"
    }
    if ![no_ip]{
      mutate {
        replace => {
          "token_network.dhcp.ciaddr" => "%{dest_ip}"
        }
        on_error => "ciaddr_not_set"
      }
    }
  }
  else {
    mutate {
      merge => {
        "token_target.ip" => "dest_ip"
      }
      on_error => "dest_ip_not_set"
    }

    if [dest_ip_not_set] {
      grok {
        match => {
          "dest" => "%{IP:dest}"
        }
        overwrite => ["dest"]
        on_error => "dest_not_ip"
      }
      if ![dest_not_ip] {
        mutate {
          rename => {
            "dest" => "target_ip"
          }
        }
      }
      else if [dest_host_not_set] {
        grok {
          match => {
            "dest" => "%{HOSTNAME:dest}"
          }
          overwrite => ["dest"]
          on_error => "dest_not_hostname"
        }
        if ![dest_not_hostname] {
          mutate {
            replace => {
              "target_hostname" => "%{dest}"
            }
          }
        }
        else {
          mutate {
            replace => {
              "dest.key" => "dest"
              "dest.value" => "%{dest}"
            }
            on_error => "dest_not_set"
          }
          if ![dest_not_set] and [dest] != "" {
            mutate {
              merge => { "token_target.labels" => "dest" }
            }

            mutate {
              replace => {
                "additional_dest" => ""
              }
            }

            mutate {
              replace => {
                "additional_dest.key" => "%{dest.key}"
                "additional_dest.value.string_value" => "%{dest.value}"
              }
              on_error => "dest_not_found"
            }

             if ![dest_not_found] {
              mutate {
                merge => {
                  "token_additional.fields" => "additional_dest"
                }
              }
            }
          }
        }
      }
    }
  }

  # Extract and map dvc to ip/hostname based on grok.
  grok {
    match => {
      "dvc" => "%{IP:dvc}"
    }
    overwrite => ["dvc"]
    on_error => "no_dvc_ip"
  }
  if ![no_dvc_ip] {
    mutate {
      rename => {
        "dvc" => "principal_asset_ip"
      }
    }
  }

  # Extract and map splunk_server to ip/hostname based on grok.
  grok {
    match => {
      "splunk_server" => "%{IP:splunk_server}"
    }
    overwrite => ["splunk_server"]
    on_error => "no_splunk_server"
  }
  if ![no_splunk_server] {
    mutate {
      rename => {
        "splunk_server" => "splunk_server_ip"
      }
    }
  }
  else {
    mutate {
      rename => {
        "splunk_server" => "splunk_server_hostname"
      }
    }
  }

  # Identify specific file hash (md5/sha1/sha256) by determining string length.
  grok {
    match => {
      "file_hash" => [
        "(?P<md5hash>^([0-9a-zA-Z]{32})$)"
        "(?P<sha1hash>^([0-9a-zA-Z]{40})$)"
        "(?P<sha256hash>^([0-9a-zA-Z]{64})$)"
      ]
    }
    overwrite => ["md5hash","sha1hash","sha256hash"]
    on_error => "no_hash"
  }

  # Using separate replace stanzas as it results into TAP presubmit failures,
  # (flaky behavior) if used one mutate stanza.
  if [splunk_tags] =~ "email" {
    mutate {
      replace => {
        "event.idm.read_only_udm.about.file.md5" => "%{md5hash}"
      }
      on_error => "_"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.about.file.sha1" => "%{sha1hash}"
      }
      on_error => "_"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.about.file.sha256" => "%{sha256hash}"
      }
      on_error => "_"
    }
  }
  else {
    mutate {
      replace => {
        "token_target.file.md5" => "%{md5hash}"
      }
      on_error => "_"
    }
    mutate {
      replace => {
        "token_target.file.sha1" => "%{sha1hash}"
      }
      on_error => "_"
    }
    mutate {
      replace => {
        "token_target.file.sha256" => "%{sha256hash}"
      }
      on_error => "_"
    }
  }

  grok {
    match => {
      "process_hash" => [
        "(?P<md5hash>^([0-9a-zA-Z]{32})$)"
        "(?P<sha1hash>^([0-9a-zA-Z]{40})$)"
        "(?P<sha256hash>^([0-9a-zA-Z]{64})$)"
      ]
    }
    overwrite => ["md5hash","sha1hash","sha256hash"]
    on_error => "no_hash"
  }
  mutate {
    replace => {
      "token_principal.process.file.md5" => "%{md5hash}"
    }
    on_error => "_"
  }
  mutate {
    replace => {
      "token_principal.process.file.sha1" => "%{sha1hash}"
    }
    on_error => "_"
  }
  mutate {
    replace => {
      "token_principal.process.file.sha256" => "%{sha256hash}"
    }
    on_error => "_"
  }

  # Extract and map user_id and if it is not present then use src_user_id for
  # mapping to UDM field.
  mutate {
    replace => {
      "token_principal.user.userid" => "%{result.user_id}"
    }
    on_error => "no_user_id"
  }
  if ![no_user_id] {
    mutate {
      replace => {
        "token_principal.user.userid" => "%{result.src_user_id}"
      }
      on_error => "_"
    }
  }

  # DNS Question name.
  mutate {
    replace => {
      "question.name" => "%{result.query}"
    }
    on_error => "no_query"
  }

  # DNS Question type.
  grok {
    match => {
      "query_type" => "%{GREEDYDATA:query_type}"
    }
    overwrite => ["query_type"]
    on_error => "no_query_type"
  }
  if ![no_query_type] {
    mutate {
      replace => {
        "record_type" => "%{query_type}"
      }
    }
    # Product: DNS
# Category: .include library
# Supported Format: NA
# Reference: https://www.iana.org/assignments/dns-parameters/dns-parameters.xhtml#dns-parameters-4
# Last Updated: 2022-01-11
# Copyright 2022 Chronicle LLC

mutate {
  uppercase => ["record_type"]
}

        if [record_type] == "A"                 {mutate {replace => {  "question.type" => "1"  }}
}  else if [record_type] == "NS"                {mutate {replace => {  "question.type" => "2"  }}
}  else if [record_type] == "MD"                {mutate {replace => {  "question.type" => "3"  }}
}  else if [record_type] == "MF"                {mutate {replace => {  "question.type" => "4"  }}
}  else if [record_type] == "CNAME"             {mutate {replace => {  "question.type" => "5"  }}
}  else if [record_type] == "SOA"               {mutate {replace => {  "question.type" => "6"  }}
}  else if [record_type] == "MB"                {mutate {replace => {  "question.type" => "7"  }}
}  else if [record_type] == "MG"                {mutate {replace => {  "question.type" => "8"  }}
}  else if [record_type] == "MR"                {mutate {replace => {  "question.type" => "9"  }}
}  else if [record_type] == "NULL"              {mutate {replace => {  "question.type" => "10"  }}
}  else if [record_type] == "WKS"               {mutate {replace => {  "question.type" => "11"  }}
}  else if [record_type] == "PTR"               {mutate {replace => {  "question.type" => "12"  }}
}  else if [record_type] == "HINFO"             {mutate {replace => {  "question.type" => "13"  }}
}  else if [record_type] == "MINFO"             {mutate {replace => {  "question.type" => "14"  }}
}  else if [record_type] == "MX"                {mutate {replace => {  "question.type" => "15"  }}
}  else if [record_type] == "TXT"               {mutate {replace => {  "question.type" => "16"  }}
}  else if [record_type] == "RP"                {mutate {replace => {  "question.type" => "17"  }}
}  else if [record_type] == "AFSDB"             {mutate {replace => {  "question.type" => "18"  }}
